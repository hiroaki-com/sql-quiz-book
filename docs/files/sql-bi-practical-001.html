<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  ROW_NUMBER / RANK / DENSE_RANK — カテゴリ別売上ランキング
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "ROW_NUMBER / RANK / DENSE_RANK — カテゴリ別売上ランキングの使い分け",
  tags: [["r","ROW_NUMBER"],["r","RANK"],["r","DENSE_RANK"],["o","PARTITION BY"],["p","ランキングAPI"]],
  premise: `<p><strong>ROW_NUMBER・RANK・DENSE_RANK</strong> はいずれも「順位を付ける」ウィンドウ関数ですが、<em>同順位（タイ）の扱いが異なります</em>。実務では「カテゴリ内でトップNを抽出する」APIエンドポイントで最も多用されます。</p>
<pre><span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>)
<span class="cmt">-- 同値でも必ず連番（1,2,3,4…）。タイ無し</span>

<span class="fn">RANK</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>)
<span class="cmt">-- 同値は同順位、次の順位は飛ぶ（1,1,3…）</span>

<span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>)
<span class="cmt">-- 同値は同順位、次の順位は飛ばない（1,1,2…）</span></pre>
<div class="callout"><strong>PARTITION BY の役割：</strong>GROUP BY のようにグループを区切りますが、行を集約せず「グループ内で独立した連番・順位」を振ります。PARTITION BY を省略するとテーブル全体が1つのパーティションになります。</div>
<p>実務での使い分け：<em>ユニークな行番号が欲しい → ROW_NUMBER</em>、<em>同点を同順位にしたい → RANK/DENSE_RANK</em>。トップN抽出のフィルタには ROW_NUMBER が最もシンプルです。</p>`,
  question: `<p>以下の <code>product_sales</code> テーブルから、<em>カテゴリ（category）ごとに売上（sales）の降順で ROW_NUMBER・RANK・DENSE_RANK を付与</em>し、それぞれの違いが分かる形で全行を出力してください。</p>
<p>出力：category, product_name, sales, row_num, rank_val, dense_rank_val</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ product_sales</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>product_id</th><th>category</th><th>product_name</th><th>sales</th></tr>
        <tr><td>P01</td><td>Food</td><td>りんご</td><td>85000</td></tr>
        <tr><td>P02</td><td>Food</td><td>バナナ</td><td>62000</td></tr>
        <tr><td>P03</td><td>Food</td><td>みかん</td><td>62000</td></tr>
        <tr><td>P04</td><td>Food</td><td>ぶどう</td><td>41000</td></tr>
        <tr><td>P05</td><td>Drink</td><td>緑茶</td><td>95000</td></tr>
        <tr><td>P06</td><td>Drink</td><td>コーヒー</td><td>78000</td></tr>
        <tr><td>P07</td><td>Drink</td><td>ジュース</td><td>78000</td></tr>
        <tr><td>P08</td><td>Drink</td><td>水</td><td>55000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>category</th><th>product_name</th><th>sales</th><th class="tc-hi">row_num</th><th class="tc-g">rank_val</th><th class="tc-p">dense_rank_val</th></tr>
<tr><td>Drink</td><td>緑茶</td><td>95000</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-p">1</td></tr>
<tr><td>Drink</td><td>コーヒー</td><td>78000</td><td class="tc-hi">2</td><td class="tc-g">2</td><td class="tc-p">2</td></tr>
<tr><td>Drink</td><td>ジュース</td><td>78000</td><td class="tc-hi">3</td><td class="tc-g">2</td><td class="tc-p">2</td></tr>
<tr><td>Drink</td><td>水</td><td>55000</td><td class="tc-hi">4</td><td class="tc-g">4</td><td class="tc-p">3</td></tr>
<tr><td>Food</td><td>りんご</td><td>85000</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-p">1</td></tr>
<tr><td>Food</td><td>バナナ</td><td>62000</td><td class="tc-hi">2</td><td class="tc-g">2</td><td class="tc-p">2</td></tr>
<tr><td>Food</td><td>みかん</td><td>62000</td><td class="tc-hi">3</td><td class="tc-g">2</td><td class="tc-p">2</td></tr>
<tr><td>Food</td><td>ぶどう</td><td>41000</td><td class="tc-hi">4</td><td class="tc-g">4</td><td class="tc-p">3</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  category,
  product_name,
  sales,

  <span class="cmt">-- ① 同カテゴリ内で売上降順の連番（タイでも必ず異なる番号）</span>
  <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category        <span class="cmt">-- カテゴリ単位でリセット</span>
    <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>          <span class="cmt">-- 売上の大きい順に番号を振る</span>
  ) <span class="kw">AS</span> row_num,

  <span class="cmt">-- ② 同点は同順位、次順位は飛ぶ（78000が2位タイ → 次は4位）</span>
  <span class="fn">RANK</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category
    <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>
  ) <span class="kw">AS</span> rank_val,

  <span class="cmt">-- ③ 同点は同順位、次順位は飛ばない（78000が2位タイ → 次は3位）</span>
  <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category
    <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>
  ) <span class="kw">AS</span> dense_rank_val

<span class="kw">FROM</span>     <span class="tbl">product_sales</span>
<span class="kw">ORDER BY</span> category, sales <span class="kw">DESC</span>;  <span class="cmt">-- カテゴリ → 売上降順で出力</span>

<span class="cmt">/*
  実行順序:
  1. FROM product_sales              → テーブルを全件読み込む
  2. ウィンドウ関数の評価             → PARTITION BY category で区切り、
                                       ORDER BY sales DESC で各行に順位を付与
                                       （行は消えない・集約されない）
  3. SELECT で列を選択               → 3種類の順位列を並べる
  4. ORDER BY category, sales DESC   → 出力を並べ替える
  ★ PARTITION BY ≠ GROUP BY: GROUP BY は行を集約するが PARTITION BY は行を残したまま窓を区切る
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>PARTITION BY の動作</strong> — category でパーティションを区切り、内部で ORDER BY sales DESC</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>category</th><th>product_name</th><th>sales</th><th class="tc-hi">ROW_NUMBER</th><th class="tc-g">RANK</th><th class="tc-p">DENSE_RANK</th></tr>
<tr class="tr-hi4"><td colspan="6" style="color:var(--orange);font-size:10px;padding:3px 11px;">── Drink パーティション ──</td></tr>
<tr><td>Drink</td><td>緑茶</td><td>95000</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-p">1</td></tr>
<tr class="tr-hi"><td>Drink</td><td>コーヒー</td><td>78000</td><td class="tc-hi">2</td><td class="tc-g">2</td><td class="tc-p">2</td></tr>
<tr class="tr-hi"><td>Drink</td><td>ジュース</td><td>78000</td><td class="tc-hi">3</td><td class="tc-g">2 ←タイ</td><td class="tc-p">2 ←タイ</td></tr>

{

  title: "CASE WHEN ピボット — 縦持ちデータを横持ちクロス集計表に変換する",
  tags: [["r","CASE WHEN"],["o","ピボット"],["g","GROUP BY"],["p","クロス集計API"]],
  premise: `<p>RDBのデータは通常「縦持ち（行方向）」で格納されますが、BIダッシュボードでは「横持ち（列方向）クロス集計」が求められます。SQLには専用のPIVOT構文がないDBが多いため、<strong>CASE WHEN + SUM/COUNT の組み合わせ</strong>でピボットを実現します。</p>
<pre><span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'Food'</span>  <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> food_sales
<span class="cmt">-- CASE WHEN: 条件に合う行だけ amount を取り出し、合わない行は 0 にする</span>
<span class="cmt">-- SUM: グループ内で合算すると「Food のみの売上合計」になる</span></pre>
<div class="callout"><strong>ピボットの基本手順：</strong><br>
① GROUP BY する軸（行の切り口）を決める → 例: order_month<br>
② 列にしたい値（カテゴリなど）を CASE WHEN で分岐する<br>
③ SUM/COUNT で集計すると横に並んだクロス集計表になる</div>
<p><code>ELSE 0</code> を <code>ELSE NULL</code> にすると、SUM は NULL を無視するため結果は同じです。ただし <em>「売上なし」を 0 で表示したい場合は ELSE 0</em>、NULL のままにしたい場合は省略します。</p>`,
  question: `<p>以下の <code>orders</code> テーブルから、<em>月（order_month）を行、カテゴリ（category）を列</em>とした売上クロス集計表を作成してください。</p>
<p>カテゴリは Food / Drink / Other の3種。月順に並べ、それぞれの月の合計も出力してください。</p>
<p>出力：order_month, food_sales, drink_sales, other_sales, total_sales</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>order_month</th><th>category</th><th>amount</th></tr>
        <tr><td>1</td><td>2024-01</td><td>Food</td><td>30000</td></tr>
        <tr><td>2</td><td>2024-01</td><td>Drink</td><td>45000</td></tr>
        <tr><td>3</td><td>2024-01</td><td>Food</td><td>20000</td></tr>
        <tr><td>4</td><td>2024-02</td><td>Other</td><td>15000</td></tr>
        <tr><td>5</td><td>2024-02</td><td>Drink</td><td>52000</td></tr>
        <tr><td>6</td><td>2024-02</td><td>Food</td><td>38000</td></tr>
        <tr><td>7</td><td>2024-03</td><td>Other</td><td>22000</td></tr>
        <tr><td>8</td><td>2024-03</td><td>Food</td><td>41000</td></tr>
        <tr><td>9</td><td>2024-03</td><td>Drink</td><td>61000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-g">food_sales</th><th class="tc-hi">drink_sales</th><th class="tc-p">other_sales</th><th class="tc-y">total_sales</th></tr>
<tr><td>2024-01</td><td class="tc-g">50000</td><td class="tc-hi">45000</td><td class="tc-p">0</td><td class="tc-y">95000</td></tr>
<tr><td>2024-02</td><td class="tc-g">38000</td><td class="tc-hi">52000</td><td class="tc-p">15000</td><td class="tc-y">105000</td></tr>
<tr><td>2024-03</td><td class="tc-g">41000</td><td class="tc-hi">61000</td><td class="tc-p">22000</td><td class="tc-y">124000</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  order_month,

  <span class="cmt">-- ① Foodカテゴリの行だけ amount を取り出して合算</span>
  <span class="fn">SUM</span>(
    <span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'Food'</span>
         <span class="kw">THEN</span> amount    <span class="cmt">-- 条件に合う行はそのamountを使う</span>
         <span class="kw">ELSE</span> <span class="num">0</span>         <span class="cmt">-- 合わない行は0にして加算しても影響なし</span>
    <span class="kw">END</span>
  ) <span class="kw">AS</span> food_sales,

  <span class="cmt">-- ② Drinkカテゴリの行だけ amount を取り出して合算</span>
  <span class="fn">SUM</span>(
    <span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'Drink'</span>
         <span class="kw">THEN</span> amount
         <span class="kw">ELSE</span> <span class="num">0</span>
    <span class="kw">END</span>
  ) <span class="kw">AS</span> drink_sales,

  <span class="cmt">-- ③ Otherカテゴリの行だけ amount を取り出して合算</span>
  <span class="fn">SUM</span>(
    <span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'Other'</span>
         <span class="kw">THEN</span> amount
         <span class="kw">ELSE</span> <span class="num">0</span>
    <span class="kw">END</span>
  ) <span class="kw">AS</span> other_sales,

  <span class="cmt">-- ④ カテゴリに関係なく全件のSUM = 月の合計売上</span>
  <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_sales

<span class="kw">FROM</span>     <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> order_month    <span class="cmt">-- 月単位でグループ化して集計</span>
<span class="kw">ORDER BY</span> order_month;   <span class="cmt">-- 月順に並べる</span>

<span class="cmt">/*
  実行順序:
  1. FROM orders                   → テーブルを全件読み込む
  2. GROUP BY order_month          → 月単位でグループを作る（行が圧縮される）
  3. SUM(CASE WHEN category=...)   → グループ内でCASE評価 → 0 or amount → SUM
  4. ORDER BY order_month          → 月順に並べる
  ★ CASE WHEN は SELECT の中でも GROUP BY の中でも WHERE の中でも使える万能な条件分岐

</div>
`

{
  num: 4,
  title: "LEFT JOIN + COALESCE — 購入ゼロ顧客もヌケなく集計する",
  tags: [["r","LEFT JOIN"],["r","COALESCE"],["o","NULL処理"],["g","顧客分析"],["p","顧客一覧API"]],
  premise: `<p><strong>LEFT JOIN（左外部結合）</strong>は「左テーブルの全行を保持し、右テーブルに対応する行がなければ NULL を埋める」結合です。購入履歴のない顧客・応募のない求人など「0件でも一覧に載せたい」ケースに必須です。</p>
<pre><span class="kw">FROM</span>       <span class="tbl">customers</span> c           <span class="cmt">-- 左テーブル: 全顧客を起点</span>
<span class="kw">LEFT JOIN</span>  <span class="tbl">orders</span>    o            <span class="cmt">-- 右テーブル: 注文がない顧客も残す</span>
  <span class="kw">ON</span> c.customer_id <span class="op">=</span> o.customer_id</pre>
<p><strong>COALESCE(値1, 値2, …)</strong> は「左から順に評価して最初に NULL でない値を返す」関数。NULL を 0 や空文字に置換するときの定番です。</p>
<pre><span class="fn">COALESCE</span>(o.amount, <span class="num">0</span>)
<span class="cmt">-- o.amount が NULL なら 0 を返す（購入なし顧客のNULLをゼロに変換）</span></pre>
<div class="callout warn"><strong>INNER JOIN との違い：</strong>INNER JOIN は両テーブルに一致する行のみ残す。LEFT JOIN は左テーブルの全行を必ず残し、右テーブルとのマッチがなければ NULL を付与する。</div>`,
  question: `<p>以下の <code>customers</code> と <code>orders</code> テーブルを使い、<em>購入履歴のない顧客も含めた顧客ごとの注文件数・購入合計金額</em>を出力してください。</p>

        <tr><td>1</td><td>C001</td><td>12000</td></tr>
        <tr><td>2</td><td>C001</td><td>8500</td></tr>
        <tr><td>3</td><td>C003</td><td>21000</td></tr>

</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>customer_id</th><th>customer_name</th><th class="tc-hi">order_count</th><th class="tc-g">total_amount</th></tr>

</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  c.customer_id,
  c.customer_name,

  <span class="fn">COALESCE</span>(<span class="fn">SUM</span>(o.amount), <span class="num">0</span>) <span class="kw">AS</span> total_amount
  <span class="cmt">--   SUM(NULL) → NULL になるので COALESCE で 0 に変換する</span>

<span class="kw">FROM</span>      <span class="tbl">customers</span> c         <span class="cmt">-- 全顧客を左テーブルとして起点にする</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span>    o         <span class="cmt">-- 注文があれば結合、なければNULLを付与</span>

  5. COALESCE(SUM(o.amount), 0)    → SUMがNULLなら0に変換

*/</span></pre>`,

<tr><td>鈴木</td><td class="tc-hi">1</td><td>21000</td><td class="tc-g">21000</td></tr>
<tr class="tr-hi"><td>田中</td><td class="tc-hi">0 ←NULL除外</td><td class="null">NULL ←SUM無し</td><td class="tc-g">0 ←変換</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(*) vs COUNT(列名)：</strong><code>COUNT(*)</code>はNULLを含む全行数。<code>COUNT(o.order_id)</code>はNULLを除いた行数。LEFT JOIN後の「注文なし行」は <code>COUNT(*)</code> だと1件とカウントされてしまう。<em>必ず結合先の列名を指定する。</em></div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>COALESCE の多引数活用：</strong><code>COALESCE(col1, col2, 0)</code>のように複数引数を渡すと、左から順に最初の非NULLを返す。NULLのフォールバック優先順位を表現できる。</div></div>

</div>

{

  premise: `<p>実務のBIでは日時データを「月単位」「週単位」「曜日別」などに集計する機会が非常に多いです。<strong>DATE_TRUNC</strong> は日付を指定単位で切り捨て、<strong>EXTRACT</strong> は日付の特定部分（年・月・曜日など）を数値で取り出します。</p>
<pre><span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at)
<span class="cmt">-- 2024-03-15 → 2024-03-01（月の先頭に切り捨て）</span>
<span class="cmt">-- 'week'/'quarter'/'year'/'hour' なども指定可</span>

<span class="fn">EXTRACT</span>(<span class="kw">DOW FROM</span> created_at)
<span class="cmt">-- Day of Week: 0=日曜 〜 6=土曜（PostgreSQL）</span>
<span class="cmt">-- YEAR / MONTH / DAY / HOUR / MINUTE も指定可</span></pre>
<div class="callout"><strong>DB別の月次切り捨て：</strong><br>
PostgreSQL: <code>DATE_TRUNC('month', col)</code><br>
BigQuery: <code>DATE_TRUNC(col, MONTH)</code>（引数順に注意）<br>
MySQL: <code>DATE_FORMAT(col, '%Y-%m-01')</code></div>
<p>DATE_TRUNC で切り捨てた値を GROUP BY に使うと、<em>月次・週次の集計が1行で書ける</em>のが最大の強みです。</p>`,

  answer: `<pre><span class="cmt">-- ① 月次集計: DATE_TRUNC で月の先頭日に切り捨てて GROUP BY</span>

</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  customer_id,
  <span class="fn">COUNT</span>(<span class="op">*</span>)         <span class="kw">AS</span> order_count,   <span class="cmt">-- グループ内の注文件数</span>
  <span class="fn">SUM</span>(amount)      <span class="kw">AS</span> total_amount    <span class="cmt">-- グループ内の合計金額</span>

<span class="kw">HAVING</span>   <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="op">>=</span> <span class="num">2</span>               <span class="cmt">-- ③ 集計後フィルタ: 2件以上のグループだけ残す</span>

<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>HAVINGでエイリアスは使えないDBがある：</strong>PostgreSQLは <code>HAVING order_count >= 2</code> でも動くが、標準SQLとMySQLは <code>HAVING COUNT(*) >= 2</code> と書く必要がある。移植性のためには集計関数を直接書く方が安全。</div></div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>HAVINGだけでフィルタしようとする（遅い）：</strong>全件集計後にHAVINGでフィルタするより、WHEREで集計前に行を減らした方が効率的。期間や状態の絞り込みはWHEREで先にやること。</div></div>
</div>
`

{
  num: 9,
  title: "再帰CTE — WITH RECURSIVE で組織ツリーの全階層を展開する",
  tags: [["r","WITH RECURSIVE"],["r","再帰CTE"],["o","階層データ"],["g","深さ計算"],["p","組織ツリーAPI"]],
  premise: `<p><strong>再帰CTE（WITH RECURSIVE）</strong>は自分自身を参照するCTEで、階層構造・木構造データを<em>深さが不明でも全階層を一気に展開</em>できます。通常のSELF JOINでは深さが固定されてしまうのに対し、再帰CTEは深さに関わらず動作します。</p>
<pre><span class="kw">WITH RECURSIVE</span> cte <span class="kw">AS</span> (
  <span class="cmt">-- ① アンカー: 再帰の起点（ルートノード）</span>
  <span class="kw">SELECT</span> id, name, parent_id, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span>   <span class="tbl">table</span>
  <span class="kw">WHERE</span>  parent_id <span class="kw">IS NULL</span>

  <span class="kw">UNION ALL</span>

  <span class="cmt">-- ② 再帰部: CTEを自己参照して子ノードを追加</span>
  <span class="kw">SELECT</span> t.id, t.name, t.parent_id, cte.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span>   <span class="tbl">table</span> t
  <span class="kw">JOIN</span>   cte <span class="kw">ON</span> t.parent_id <span class="op">=</span> cte.id      <span class="cmt">-- 前の結果を親として子を探す</span>
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> cte;</pre>
<div class="callout warn"><strong>無限ループに注意：</strong>データに循環参照があると無限ループになります。PostgreSQLでは <code>CYCLE id SET is_cycle USING path</code>（v14+）や最大深さ制限（<code>WHERE depth &lt; 10</code>）で防御します。</div>`,

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>1クエリ多KPIの実務意義：</strong>ダッシュボードAPIが「月次サマリ」をレスポンスする場合、1クエリで全KPIを取得することでDBへのラウンドトリップを1回に抑えられる。複数クエリを順番に実行する設計（N+1問題）よりも大幅にパフォーマンスが向上する。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>COUNT(DISTINCT col) FILTER (WHERE …)：</strong>PostgreSQLはこの組み合わせも使える。「completedステータスのユニーク顧客数だけ知りたい」ときに <code>COUNT(DISTINCT customer_id) FILTER (WHERE status='completed')</code> と書ける。CASE WHENでは <code>COUNT(DISTINCT CASE WHEN ... THEN customer_id END)</code> と書く。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>COALESCE と NULLIF の使い分け：</strong><code>COALESCE(val, 0)</code> は「NULLなら0を返す（出力変換）」、<code>NULLIF(val, 0)</code> は「0なら NULLを返す（ゼロ除算防止）」。役割が逆なので混同しないこと。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>BigQueryでFILTER句を使う：</strong>BigQuery Standard SQLはFILTER句非対応。BigQueryでは <code>COUNTIF(status='completed')</code>（BigQuery固有）か <code>COUNT(CASE WHEN status='completed' THEN 1 END)</code> を使う。移植性を考えるならCASE WHENに統一する。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>100.0 を掛け忘れる整数除算：</strong>PostgreSQLでも <code>2 / 3</code> は整数除算で <code>0</code> になる。<code>2 * 100.0 / 3</code> や <code>2::FLOAT / 3</code> のように明示的に浮動小数点にキャストすること。</div></div>
</div>
`
}

];

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','基礎文法・概念',q.premise)}
      ${acc('❓','pill-green','問題','テーブルデータ付き',q.question)}
      ${acc('📊','pill-orange','出力例','期待する結果',q.output)}
      ${acc('✅','pill-red','模範回答','SQL（コメント付き）',q.answer)}
      ${acc('🔍','pill-purple','解説','変化の可視化＋学習ポイント',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
