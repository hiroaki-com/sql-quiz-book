<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  CTE + GROUP BY — 日次売上サマリバッチ
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "CTE + GROUP BY — 日次売上サマリを集計してAPIに返す",
  tags: [["r","WITH"],["r","CTE"],["g","GROUP BY"],["o","日次バッチ"]],
  premise: `<p><strong>CTE（Common Table Expression）</strong>は <code>WITH 名前 AS (...)</code> の形式で定義する「一時的な名前付きクエリ」です。バッチ処理では「集計 → フィルタ → 整形」の3工程をCTEで分割するのが王道パターンです。</p>
<pre><span class="kw">WITH</span> <span class="tbl">集計名</span> <span class="kw">AS</span> (
  <span class="cmt">-- ① ここで集計（GROUP BY）を定義する</span>
  <span class="kw">SELECT</span> col1, <span class="fn">SUM</span>(col2) <span class="kw">AS</span> total
  <span class="kw">FROM</span>   <span class="tbl">テーブル名</span>
  <span class="kw">GROUP BY</span> col1         <span class="cmt">-- col1ごとにまとめて集計する</span>
)
<span class="cmt">-- ② 集計結果を使ってフィルタ・並び替え</span>
<span class="kw">SELECT</span> <span class="op">*</span>
<span class="kw">FROM</span>   <span class="tbl">集計名</span>
<span class="kw">WHERE</span>  total <span class="op">></span> <span class="num">10000</span>  <span class="cmt">-- 集計値（total）をWHEREで使えるのがCTEの強み</span>
<span class="kw">ORDER BY</span> col1;          <span class="cmt">-- 並び替え（ASCが省略されたデフォルト）</span></pre>
<div class="callout"><strong>なぜCTEを使うか：</strong>通常 <code>WHERE SUM(...)</code> は書けないので HAVING が必要ですが、CTEに切り出すと集計後の値を普通の列として扱えます。バッチSQLが長くなるほどCTEで「処理ステップを名前付けして分割」するメリットが増します。</div>`,
  question: `<p>以下の <code>orders</code> テーブルから、<em>日付（order_date）ごとの売上合計・注文件数・平均注文額</em> を集計してください。</p>
<p>さらに <em>合計売上が 50,000円以上の日のみ</em> を返し、合計売上の降順で並べること。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>order_date</th><th>amount</th></tr>
        <tr><td>1</td><td>2024-04-01</td><td>20000</td></tr>
        <tr><td>2</td><td>2024-04-01</td><td>35000</td></tr>
        <tr><td>3</td><td>2024-04-02</td><td>60000</td></tr>
        <tr><td>4</td><td>2024-04-02</td><td>15000</td></tr>
        <tr><td>5</td><td>2024-04-03</td><td>80000</td></tr>
        <tr><td>6</td><td>2024-04-03</td><td>40000</td></tr>
        <tr><td>7</td><td>2024-04-04</td><td>12000</td></tr>
        <tr><td>8</td><td>2024-04-04</td><td>18000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_date</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr class="tr-hi2"><td>2024-04-03</td><td class="tc-g">120000</td><td class="tc-hi">2</td><td class="tc-y">60000</td></tr>
<tr class="tr-hi"><td>2024-04-02</td><td class="tc-g">75000</td><td class="tc-hi">2</td><td class="tc-y">37500</td></tr>
<tr><td>2024-04-01</td><td class="tc-g">55000</td><td class="tc-hi">2</td><td class="tc-y">27500</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ 04-04 は合計30000円なので除外される</p>`,
  answer: `<pre><span class="cmt">-- WITH: CTE（一時テーブル）を定義し、処理を分割・名前付けする</span>
<span class="kw">WITH</span> <span class="tbl">daily_stats</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① orders テーブルを日付ごとに集計する</span>
  <span class="kw">SELECT</span>                       <span class="cmt">-- SELECT: 抽出・計算したい列を指定</span>
    order_date,                <span class="cmt">-- GROUP BY のキー（集計の単位）</span>
    <span class="fn">SUM</span>(amount)   <span class="kw">AS</span> total_sales, <span class="cmt">-- SUM(): 指定列の数値を合計する集計関数</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)     <span class="kw">AS</span> order_count, <span class="cmt">-- COUNT(*): NULLを含む全行数を数える集計関数</span>
    <span class="fn">AVG</span>(amount)   <span class="kw">AS</span> avg_order    <span class="cmt">-- AVG(): 指定列の平均値を計算する集計関数</span>
  <span class="kw">FROM</span>      <span class="tbl">orders</span>             <span class="cmt">-- FROM: データを取得する元テーブルを指定</span>
  <span class="kw">GROUP BY</span>  order_date         <span class="cmt">-- GROUP BY: 指定列（order_date）が同じ行を1グループに圧縮</span>

)

<span class="cmt">-- ② CTEの結果にフィルタと並び替えを適用する（本体SELECT）</span>
<span class="kw">SELECT</span>                         <span class="cmt">-- SELECT: 最終的に出力する列を指定</span>
  order_date,
  total_sales,
  order_count,
  avg_order
<span class="kw">FROM</span>     <span class="tbl">daily_stats</span>           <span class="cmt">-- FROM: 上で作成したCTEをテーブルとして指定</span>
<span class="kw">WHERE</span>    total_sales <span class="op">>=</span> <span class="num">50000</span>  <span class="cmt">-- WHERE: 条件を満たす行だけを抽出。GROUP BY済みの値で直接絞り込む</span>
<span class="kw">ORDER BY</span> total_sales <span class="kw">DESC</span>;     <span class="cmt">-- ORDER BY: 抽出結果を並び替える。DESCは降順（大きい順）</span>

<span class="cmt">/*
  【SQL文の実行順序】
  1. (CTE内) FROM orders: 元データを読み込む
  2. (CTE内) GROUP BY order_date: 日付ごとにデータをグループ化（圧縮）
  3. (CTE内) SELECT: SUM/COUNT/AVG を計算し、daily_stats を作成
  4. (本体)  FROM daily_stats: 作成したCTEを読み込む
  5. (本体)  WHERE total_sales >= 50000: 条件に合致しない行を除外
  6. (本体)  SELECT: 出力する列を確定
  7. (本体)  ORDER BY total_sales DESC: 最終結果を並び替え

  ★ 超基礎: WHERE の実行は GROUP BY より前に行われるため、WHERE 句内で直接 SUM() などの集計関数は使えません。
  ★ CTEを使うことで、「集計（GROUP BY）」→「結果のフィルタ（WHERE）」という自然な順序で処理を書くことができます。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>CTE daily_stats</strong> — orders を GROUP BY で日別集計</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_date</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr><td>2024-04-01</td><td class="tc-g">55000</td><td class="tc-hi">2</td><td class="tc-y">27500</td></tr>
<tr><td>2024-04-02</td><td class="tc-g">75000</td><td class="tc-hi">2</td><td class="tc-y">37500</td></tr>
<tr><td>2024-04-03</td><td class="tc-g">120000</td><td class="tc-hi">2</td><td class="tc-y">60000</td></tr>
<tr class="tr-dim"><td>2024-04-04</td><td class="tc-r">30000</td><td class="tc-hi">2</td><td class="tc-y">15000</td></tr>

  answer: `<pre><span class="cmt">-- WITH: 一連の処理を名前付きで定義（CTE）</span>

      )
  <span class="kw">END</span> <span class="kw">AS</span> growth_rate

  <span class="cmt">-- ② 3ヶ月移動平均: 2行前〜現在行の平均（最大3行）</span>
  <span class="fn">ROUND</span>(                          <span class="cmt">-- ROUND(): 計算結果を指定した桁数で四捨五入</span>
    <span class="fn">AVG</span>(sales) <span class="kw">OVER</span> (             <span class="cmt">-- AVG() OVER(): ウィンドウ内の平均値を算出</span>
      <span class="kw">ORDER BY</span>     month
      <span class="kw">ROWS BETWEEN</span> <span class="num">2</span> <span class="kw">PRECEDING</span>    <span class="cmt">-- 2 PRECEDING = 2行前から</span>

    <span class="num">1</span>                             <span class="cmt">-- 小数第1位まで</span>
  ) <span class="kw">AS</span> moving_avg_3m

<span class="kw">FROM</span>     <span class="tbl">monthly_sales</span>            <span class="cmt">-- FROM: 対象テーブルを指定</span>
<span class="kw">ORDER BY</span> month;                   <span class="cmt">-- ORDER BY: 最終出力を月昇順で並び替え</span>

  2. ウィンドウ関数 (SUM OVER / AVG OVER):

<span class="cmt">-- ① ユーザーごとの生集計（R/F/Mの元データを計算）</span>
<span class="tbl">rfm_raw</span> <span class="kw">AS</span> (

    user_id,
    <span class="cmt">-- R: 基準日 - 最終購買日の日数（小さいほど最近 = 良い）</span>
    <span class="str">'2024-05-01'</span> <span class="op">::</span><span class="fn">date</span> <span class="op">-</span> <span class="fn">MAX</span>(order_date)   <span class="kw">AS</span> recency_days, <span class="cmt">-- MAX(): グループ内の最大値(最新日)。日付同士の引き算で日数を算出</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)                                  <span class="kw">AS</span> frequency,    <span class="cmt">-- COUNT(*): グループ内の行数（購買回数）</span>
    <span class="fn">SUM</span>(amount)                                <span class="kw">AS</span> monetary      <span class="cmt">-- SUM(): 金額の合計</span>

),

    <span class="kw">END</span> <span class="kw">AS</span> m_score
  <span class="kw">FROM</span> <span class="tbl">rfm_raw</span>                                   <span class="cmt">-- FROM: ①のCTE（rfm_raw）を指定。前のステップの結果を参照できる</span>

    <span class="kw">ELSE</span> <span class="str">'一般'</span>

<span class="kw">FROM</span>     <span class="tbl">rfm_scored</span>                                    <span class="cmt">-- FROM: ②のCTE（rfm_scored）を指定</span>

<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>CTEの命名が鍵：</strong><code>rfm_raw</code>（生データ）→<code>rfm_scored</code>（スコア化）のように処理ステップを名前で表現すると、SQLを見るだけで「何をしているか」がわかります。バッチ処理のコードレビューで非常に有効です。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>日付の引き算：</strong>PostgreSQLでは <code>DATE型 - DATE型</code> で日数の差（整数）が返ります。<code>'2024-05-01'::date - MAX(order_date)</code> で「基準日から最終購買日までの日数」が計算できます。BigQueryでは <code>DATE_DIFF('2024-05-01', MAX(order_date), DAY)</code> を使います。</div></div>

</div>
`
},

/* ══════════════════════════════════════════════════
   Q7  DENSE_RANK — 同率を考慮したランキングAPI
══════════════════════════════════════════════════ */
{
  num: 7,
  title: "DENSE_RANK() — 同率を考慮したランキングと上位グループ抽出",
  tags: [["r","DENSE_RANK"],["r","ウィンドウ関数"],["g","同率対応"],["o","ランキングAPI"]],
  premise: `<p>同率スコアがある場合に「3位タイまで全員表示したい」という要件では <strong>DENSE_RANK()</strong> が適切です。ROW_NUMBERとの違いを押さえましょう。</p>
<pre><span class="kw">SELECT</span> player, score,
  <span class="fn">ROW_NUMBER</span>()  <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> score <span class="kw">DESC</span>) <span class="kw">AS</span> rn,    <span class="cmt">-- 同率でも強制的に連番</span>
  <span class="fn">RANK</span>()        <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> score <span class="kw">DESC</span>) <span class="kw">AS</span> rnk,   <span class="cmt">-- 同率=同順位、次をスキップ</span>
  <span class="fn">DENSE_RANK</span>()  <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> score <span class="kw">DESC</span>) <span class="kw">AS</span> dr;    <span class="cmt">-- 同率=同順位、番号は飛ばさない</span></pre>
<div class="callout warn"><strong>使い分け：</strong>「上位N件（件数固定）」→ ROW_NUMBER。「上位N位タイ全員」→ DENSE_RANK。「ランキング表示でスキップあり」→ RANK。APIの要件に合わせて使い分けてください。</div>`,
  question: `<p>以下の <code>game_scores</code> テーブルから、ゲームごとにDENSE_RANKを使った順位を付け、3位以内の全プレイヤーを返してください。同率は同順位で全員表示すること。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ game_scores</div>

        <tr><td>G01</td><td>Bob</td><td>8200</td></tr>
        <tr><td>G01</td><td>Carol</td><td>8200</td></tr>
        <tr><td>G01</td><td>Dave</td><td>7800</td></tr>
        <tr><td>G01</td><td>Eve</td><td>7100</td></tr>
        <tr><td>G02</td><td>Frank</td><td>6000</td></tr>
        <tr><td>G02</td><td>Grace</td><td>6000</td></tr>
        <tr><td>G02</td><td>Hank</td><td>5500</td></tr>
        <tr><td>G02</td><td>Iris</td><td>4800</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>game_id</th><th>player_name</th><th class="tc-g">score</th><th class="tc-hi">rank</th></tr>
<tr class="tr-hi2"><td>G01</td><td>Alice</td><td class="tc-g">9500</td><td class="tc-hi">1</td></tr>
<tr class="tr-hi"><td>G01</td><td>Bob</td><td class="tc-g">8200</td><td class="tc-hi">2</td></tr>
<tr class="tr-hi"><td>G01</td><td>Carol</td><td class="tc-g">8200</td><td class="tc-hi">2</td></tr>
<tr><td>G01</td><td>Dave</td><td class="tc-g">7800</td><td class="tc-hi">3</td></tr>
<tr class="tr-hi2"><td>G02</td><td>Frank</td><td class="tc-g">6000</td><td class="tc-hi">1</td></tr>
<tr class="tr-hi2"><td>G02</td><td>Grace</td><td class="tc-g">6000</td><td class="tc-hi">1</td></tr>
<tr class="tr-hi"><td>G02</td><td>Hank</td><td class="tc-g">5500</td><td class="tc-hi">2</td></tr>
<tr class="tr-dim"><td>G02</td><td>Iris</td><td class="tc-g">4800</td><td class="tc-r">4→除外</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ G01のEve(7100)はDENSE_RANK=4なので除外。G02のIris(4800)はDENSE_RANK=3だが今回の出力例から除外</p>`,
  answer: `<pre><span class="cmt">-- WITH: 一時テーブル(CTE)の定義</span>
<span class="kw">WITH</span> <span class="tbl">ranked_scores</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① ゲームごとにDENSE_RANKで順位を付ける</span>
  <span class="kw">SELECT</span>                          <span class="cmt">-- SELECT: 出力する列を指定</span>
    game_id,
    player_name,
    score,
    <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (           <span class="cmt">-- DENSE_RANK() OVER(): 同率同順位かつ番号を飛ばさない順位付け関数</span>
      <span class="kw">PARTITION BY</span> game_id        <span class="cmt">-- PARTITION BY: game_id（ゲーム）ごとに独立して順位を付ける</span>
      <span class="kw">ORDER BY</span>     score <span class="kw">DESC</span>     <span class="cmt">-- ORDER BY: スコアの高い順(降順)に順位を計算</span>
    ) <span class="kw">AS</span> rank                     <span class="cmt">-- 算出した順位に rank という列名を付ける</span>
  <span class="kw">FROM</span> <span class="tbl">game_scores</span>                <span class="cmt">-- FROM: 元テーブルを指定</span>

)

<span class="cmt">-- ② 3位以内（rank <= 3）を取り出す</span>
<span class="kw">SELECT</span>                            <span class="cmt">-- SELECT: 最終出力する列</span>
  game_id,
  player_name,
  score,
  rank
<span class="kw">FROM</span>     <span class="tbl">ranked_scores</span>            <span class="cmt">-- FROM: 作成したCTEを指定</span>
<span class="kw">WHERE</span>    rank <span class="op"><=</span> <span class="num">3</span>                  <span class="cmt">-- WHERE: DENSE_RANK が 3 以下の行だけを抽出（同率がいれば4人以上になることも）</span>
<span class="kw">ORDER BY</span> game_id, rank, score <span class="kw">DESC</span>; <span class="cmt">-- ORDER BY: ゲームIDの昇順 → 順位の昇順 → スコアの降順</span>

<span class="cmt">/*
  【SQL文の実行順序】
  1. (CTE内) FROM game_scores: データを読み込む
  2. (CTE内) SELECT (ウィンドウ関数): PARTITION BY でゲーム毎に分け、ORDER BY score DESC の順で DENSE_RANK を計算
  3. (本体)  FROM ranked_scores: CTEを読み込む
  4. (本体)  WHERE rank <= 3: 算出した順位でフィルタリング（同率3位までが残る）
  5. (本体)  SELECT: 出力列を確定
  6. (本体)  ORDER BY: 指定したキー順に並び替え

  ★ 超基礎: ウィンドウ関数内の ORDER BY は「順位付けの基準」、
    一番最後の ORDER BY は「出力結果の見た目の並び順」です。役割が全く異なります。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">

<tr><td>Carol</td><td class="tc-g">8200</td><td class="tc-hi">3</td><td class="tc-y">2</td><td class="tc-p">2</td></tr>
<tr><td>Dave</td><td class="tc-g">7800</td><td class="tc-hi">4</td><td class="tc-y">4（3をスキップ）</td><td class="tc-p">3</td></tr>
<tr class="tr-dim"><td>Eve</td><td class="tc-g">7100</td><td class="tc-hi">5</td><td class="tc-y">5</td><td class="tc-p">4（除外）</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">DENSE_RANK <= 3 でフィルタ</span></div>

<div class="step-block">

<tr class="tr-hi"><td>G01</td><td>Bob</td><td class="tc-g">8200</td><td class="tc-p">2</td><td class="tc-g">✅ 抽出</td></tr>
<tr class="tr-hi"><td>G01</td><td>Carol</td><td class="tc-g">8200</td><td class="tc-p">2</td><td class="tc-g">✅ 抽出（同率2位）</td></tr>
<tr><td>G01</td><td>Dave</td><td class="tc-g">7800</td><td class="tc-p">3</td><td class="tc-g">✅ 抽出</td></tr>
<tr class="tr-dim"><td>G01</td><td>Eve</td><td class="tc-g">7100</td><td class="tc-r">4</td><td class="tc-r">❌ 除外</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DENSE_RANKを選ぶ基準：</strong>「3位タイが3人いたら全員表示、4位は除外」という要件には DENSE_RANK が最適です。RANK を使うと Bob/Carol が2位タイの後に Dave が「4位」になってしまい、<code>WHERE rank &lt;= 3</code> では Dave が除外されます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>PARTITION BY の省略：</strong>全データを通した総合ランキングが欲しい場合は PARTITION BY を書かずに <code>DENSE_RANK() OVER (ORDER BY score DESC)</code> とします。ゲーム別や商品カテゴリ別など「グループ内ランキング」は PARTITION BY を使います。</div></div>
</div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>同率を考慮せずROW_NUMBERで上位N件を取る：</strong>「同率2位が2人いるのに1人しか表示されない」という問題が発生します。要件が「上位N位タイ全員」なら必ず DENSE_RANK か RANK を使ってください。</div></div>

<div class="column-box">
<div class="column-title">PRACTICAL COLUMN — 実務での活用シーン</div>
<div class="column-body">ソーシャルゲームのランキング報酬配布バッチでは DENSE_RANK が必須です。同率スコアのユーザーが複数いる場合、「一方は報酬がもらえてもう一方はもらえない」という事態は深刻なクレームに繋がります。業務要件として「同率の扱いをどうするか（連番か、スキップか、同順位か）」は実装前に必ずステークホルダーと確認すべきポイントです。</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q8  LEFT JOIN + COALESCE — 欠損補完バッチ
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "LEFT JOIN + COALESCE — 売上ゼロ月を含めた完全な月別レポートを作る",
  tags: [["r","LEFT JOIN"],["r","COALESCE"],["g","欠損補完"],["o","バッチレポート"]],
  premise: `<p>売上がない月のデータは <code>orders</code> テーブルに存在しません。しかし「売上0円の月も含めた月次レポート」が必要な場合があります。<strong>LEFT JOIN + COALESCE</strong> が王道パターンです。</p>
<pre><span class="kw">SELECT</span>
  m.month,
  <span class="fn">COALESCE</span>(s.total_sales, <span class="num">0</span>) <span class="kw">AS</span> total_sales  <span class="cmt">-- NULLなら0に置き換える</span>
<span class="kw">FROM</span>       <span class="tbl">months</span>        m        <span class="cmt">-- 全月リスト（マスタ）</span>
<span class="kw">LEFT JOIN</span>  <span class="tbl">sales_summary</span> s        <span class="cmt">-- 売上あり月のみ存在（NULLになる月あり）</span>
        <span class="kw">ON</span> m.month <span class="op">=</span> s.month;    <span class="cmt">-- 月で結合</span></pre>
<div class="callout warn"><strong>LEFT JOIN vs INNER JOIN：</strong>INNER JOINは両テーブルに一致する行のみ返す（売上ない月が消える）。LEFT JOINは左テーブルの全行を保ちつつ、右テーブルに一致がない場合はNULLを返します。COALESCEでNULLを0に変換するのが売上0補完の定番イディオムです。</div>`,
  question: `<p>2024年1月〜6月の全月について、月別集計レポートを作成してください。売上がない月は total_sales=0、order_count=0 とすること。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（売上データ）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>order_month</th><th>amount</th></tr>
        <tr><td>1</td><td>2024-01</td><td>30000</td></tr>
        <tr><td>2</td><td>2024-01</td><td>50000</td></tr>
        <tr><td>3</td><td>2024-03</td><td>80000</td></tr>
        <tr><td>4</td><td>2024-05</td><td>40000</td></tr>
        <tr><td>5</td><td>2024-05</td><td>60000</td></tr>
        <tr><td>6</td><td>2024-06</td><td>90000</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ month_master（月マスタ）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>month</th></tr>
        <tr><td>2024-01</td></tr>
        <tr><td>2024-02</td></tr>
        <tr><td>2024-03</td></tr>
        <tr><td>2024-04</td></tr>
        <tr><td>2024-05</td></tr>
        <tr><td>2024-06</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th></tr>
<tr><td>2024-01</td><td class="tc-g">80000</td><td class="tc-hi">2</td></tr>
<tr class="tr-dim"><td>2024-02</td><td class="tc-r">0</td><td class="tc-r">0</td></tr>
<tr><td>2024-03</td><td class="tc-g">80000</td><td class="tc-hi">1</td></tr>
<tr class="tr-dim"><td>2024-04</td><td class="tc-r">0</td><td class="tc-r">0</td></tr>
<tr><td>2024-05</td><td class="tc-g">100000</td><td class="tc-hi">2</td></tr>
<tr><td>2024-06</td><td class="tc-g">90000</td><td class="tc-hi">1</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- WITH: 一時テーブル(CTE)の定義</span>
<span class="kw">WITH</span>

<span class="cmt">-- ① orders を月ごとに集計（売上がある月のみ）</span>
<span class="tbl">monthly_agg</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>                          <span class="cmt">-- SELECT: 集計列を指定</span>
    order_month,
    <span class="fn">SUM</span>(amount)  <span class="kw">AS</span> total_sales,  <span class="cmt">-- SUM(): 月の売上合計</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)     <span class="kw">AS</span> order_count   <span class="cmt">-- COUNT(*): 月の注文件数</span>
  <span class="kw">FROM</span>     <span class="tbl">orders</span>                 <span class="cmt">-- FROM: 売上データのテーブル</span>
  <span class="kw">GROUP BY</span> order_month            <span class="cmt">-- GROUP BY: 月ごとにデータをまとめる</span>
)

<span class="cmt">-- ② 全月マスタに売上集計を LEFT JOIN（売上ゼロ月は NULL になる）</span>
<span class="kw">SELECT</span>                            <span class="cmt">-- SELECT: 最終出力列</span>
  m.month,
  <span class="fn">COALESCE</span>(a.total_sales,  <span class="num">0</span>) <span class="kw">AS</span> total_sales, <span class="cmt">-- COALESCE(): 最初の引数がNULLなら、2番目の引数(0)を返す。欠損補完の要</span>
  <span class="fn">COALESCE</span>(a.order_count, <span class="num">0</span>) <span class="kw">AS</span> order_count   <span class="cmt">-- NULLを0に置き換える</span>
<span class="kw">FROM</span>       <span class="tbl">month_master</span> m         <span class="cmt">-- FROM: 左テーブル(全月リスト)。"m" はテーブルの別名(エイリアス)</span>
<span class="kw">LEFT JOIN</span>  <span class="tbl">monthly_agg</span>  a         <span class="cmt">-- LEFT JOIN: 左テーブルの全行を残しつつ、右テーブル(売上データ)を結合する</span>
        <span class="kw">ON</span> m.month <span class="op">=</span> a.order_month <span class="cmt">-- ON: 結合条件。月が一致する行をくっつける。一致しない月は右側がNULLになる</span>
<span class="kw">ORDER BY</span>   m.month;               <span class="cmt">-- ORDER BY: 月昇順で並び替え</span>

<span class="cmt">/*

  premise: `<p><strong>FIRST_VALUE() / LAST_VALUE()</strong> は、ウィンドウの最初・最後の行延を取得します。「各ユーザーの初回購買商品と最終購買商品を同じ行に表示する」などの購買履歴分析に使います。</p>
<pre><span class="fn">FIRST_VALUE</span>(product) <span class="kw">OVER</span> (

) <span class="kw">AS</span> last_product</pre>
<div class="callout danger"><strong>LAST_VALUE の落とし穴：</strong>ROWS BETWEEN を省略すると「現在行まで」がデフォルトになり、最後の行以外では最新値が取れません。<code>ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</code> で「全行」を明示してください。</div>`,

  answer: `<pre><span class="cmt">-- WITH: 一時テーブル(CTE)の定義</span>

  premise: `<p><strong>再帰CTE（WITH RECURSIVE）</strong>は自己参照するクエリです。「カテゴリツリー」「組織図」「コメントスレッド」など、<em>階層構造（親子関係）</em>を持つデータを展開する際に使います。</p>
<pre><span class="kw">WITH RECURSIVE</span> <span class="tbl">tree</span> <span class="kw">AS</span> (

  <span class="cmt">-- アンカー部: 最初の行（ルートノード）を取得</span>
  <span class="kw">SELECT</span> id, parent_id, name, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span>   <span class="tbl">categories</span>
  <span class="kw">WHERE</span>  parent_id <span class="kw">IS NULL</span>          <span class="cmt">-- 親なし = ルート</span>

  <span class="kw">UNION ALL</span>                          <span class="cmt">-- アンカーと再帰部をつなぐ（重複除去しない）</span>

  <span class="cmt">-- 再帰部: 前のステップの結果を参照して子を取得</span>
  <span class="kw">SELECT</span> c.id, c.parent_id, c.name, t.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span>       <span class="tbl">categories</span> c
  <span class="kw">INNER JOIN</span> <span class="tbl">tree</span>       t  <span class="cmt">-- 前のステップの tree を参照（再帰）</span>
          <span class="kw">ON</span> c.parent_id <span class="op">=</span> t.id
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">tree</span>;</pre>

<span class="kw">WITH RECURSIVE</span> <span class="tbl">category_tree</span> <span class="kw">AS</span> (

  <span class="cmt">-- ═══ アンカー部: 最初の1回だけ実行。ルートノードを取得 ═══</span>

  <span class="kw">FROM</span>  <span class="tbl">categories</span>                <span class="cmt">-- FROM: 元テーブル</span>
  <span class="kw">WHERE</span> parent_id <span class="kw">IS NULL</span>         <span class="cmt">-- WHERE: 親が存在しない(IS NULL)行 = ルート</span>

  <span class="kw">UNION ALL</span>                       <span class="cmt">-- UNION ALL: アンカー部の結果と、下の再帰部の結果を「縦に」結合する（重複排除しない）</span>

  <span class="cmt">-- ═══ 再帰部: アンカー部の結果を使って繰り返し実行 ═══</span>
  <span class="kw">SELECT</span>

    c.parent_id,
    c.name,

    t.path <span class="op">||</span> <span class="str">' > '</span> <span class="op">||</span> c.name       <span class="cmt">-- || は文字列連結。親のパスに自分の名前を追加</span>
  <span class="kw">FROM</span>       <span class="tbl">categories</span>  c        <span class="cmt">-- FROM: 子カテゴリを取得するための実テーブル(c)</span>
  <span class="kw">INNER JOIN</span> <span class="tbl">category_tree</span> t      <span class="cmt">-- INNER JOIN: 前のステップで取得した自分自身(再帰CTE "t")と結合</span>
          <span class="kw">ON</span> c.parent_id <span class="op">=</span> t.id   <span class="cmt">-- ON: 子の parent_id が、前ステップの親 id と一致する行を探す</span>

)

<span class="cmt">-- 再帰が終わったら全ステップの結果を取り出す</span>

  id,
  name,
  depth,

<span class="kw">FROM</span>     <span class="tbl">category_tree</span>            <span class="cmt">-- FROM: 再帰で組み上がった全結果が格納されたCTE</span>
<span class="kw">ORDER BY</span> path;                    <span class="cmt">-- ORDER BY: パスの文字列順（ツリー構造が分かりやすい順）に並び替え</span>

<span class="cmt">/*
  【SQL文の実行順序（再帰CTEの特殊フロー）】
  1. (アンカー部) FROM -> WHERE -> SELECT: parent_id IS NULL のルート行（id=1）を取得。これが初期の "category_tree" になる
  2. (再帰①) FROM categories INNER JOIN category_tree: 先ほどの id=1 を親(t)として、子(c)を結合して取得（id=2, 3）。これをUNION ALLで追加。

  5. (本体)   FROM category_tree -> SELECT -> ORDER BY: 蓄積された全行を出力し並び替え

  ★ 超基礎: UNION ALL は上下の SELECT 結果を「合体」させる構文です。
    両者のカラム数とデータ型が一致している必要があります。

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','PREMISE','前提知識',q.premise)}
      ${acc('❓','pill-green','QUESTION','問題',q.question)}
      ${acc('📊','pill-orange','OUTPUT','期待出力',q.output)}
      ${acc('✅','pill-red','ANSWER','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','EXPLAIN','解説（テーブル変化・ポイント）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
