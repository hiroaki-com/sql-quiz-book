        <div class="header-title">パフォーマンス最適化で学ぶ SQL 基礎10選（JOIN使い分け／FROM句サブクエリ／ORDER BY INDEX／COUNT最適化／デッドロック回避／pg_trgm全文検索／タイムゾーン対応／UPDATE JOIN／DISTINCT vs GROUP BY／NULLと部分INDEX 編）</div>

</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  INNER JOIN vs LEFT JOIN — 欠損データと結果行数の違い
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "INNER JOIN vs LEFT JOIN — 欠損データが生む「消えた行」を防ぐ",
  tags: [["r","INNER JOIN"],["r","LEFT JOIN"],["o","欠損データ"],["g","結果行数"]],
  premise: `<p><strong>INNER JOIN</strong> は両テーブルの<em>両方に一致する行</em>だけを返します。片方に一致がなければその行は結果から消えます。<strong>LEFT JOIN</strong> は左テーブルの全行を保持し、右テーブルに一致がない場合は NULL を補完して返します。</p>
<pre><span class="cmt">-- INNER JOIN: 両方に一致する行のみ（一致しない行は消える）</span>
<span class="kw">SELECT</span> u.user_id, o.order_id
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">INNER JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id;

<span class="cmt">-- LEFT JOIN: 左テーブル（users）の全行を保持、ordersがなければNULL</span>
<span class="kw">SELECT</span> u.user_id, o.order_id
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id;</pre>
<div class="callout warn"><strong>INNER JOIN で行が消えるバグ：</strong>「ユーザー一覧を返すAPI」でINNER JOINを使うと、注文を1件も持たないユーザーがAPIレスポンスから無音で消えます。「全ユーザーを返したい」要件にはLEFT JOINが必要です。</div>`,
  question: `<p><code>users</code> テーブルの<em>全ユーザー</em>を、それぞれの<em>注文件数・合計金額</em>と共に返すAPIがあります。注文がないユーザーも必ず含め、その場合は件数0・金額0を返してください。現在のINNER JOINクエリを修正してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ users（4件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>user_id(PK)</th><th>name</th><th>plan</th></tr>
        <tr><td>U001</td><td>田中</td><td>premium</td></tr>
        <tr><td>U002</td><td>鈴木</td><td>free</td></tr>
        <tr><td>U003</td><td>佐藤</td><td>premium</td></tr>
        <tr><td>U004</td><td>高橋</td><td>free</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（3件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id(PK)</th><th>user_id</th><th>amount</th></tr>
        <tr><td>1</td><td>U001</td><td>3000</td></tr>
        <tr><td>2</td><td>U001</td><td>5000</td></tr>
        <tr><td>3</td><td>U003</td><td>1500</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 現在の問題あるクエリ（注文なしユーザーが消える）</span>
<span class="kw">SELECT</span> u.user_id, u.name,
       <span class="fn">COUNT</span>(o.order_id) <span class="kw">AS</span> order_count,
       <span class="fn">SUM</span>(o.amount)    <span class="kw">AS</span> total_amount
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">INNER JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- ❌ 注文なしのユーザーが消える</span>
<span class="kw">GROUP BY</span> u.user_id, u.name;</pre>`,
  output: `<p>期待する結果（U002・U004も含まれ、件数は0・金額は0）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th class="tc-g">order_count</th><th class="tc-y">total_amount</th></tr>
<tr class="tr-hi2"><td>U001</td><td>田中</td><td class="tc-g">2</td><td class="tc-y">8000</td></tr>
<tr class="tr-hi"><td>U002</td><td>鈴木</td><td class="tc-g">0</td><td class="tc-g">0</td></tr>
<tr class="tr-hi2"><td>U003</td><td>佐藤</td><td class="tc-g">1</td><td class="tc-y">1500</td></tr>
<tr class="tr-hi"><td>U004</td><td>高橋</td><td class="tc-g">0</td><td class="tc-g">0</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 修正版: INNER JOIN → LEFT JOIN に変更してCOALESCEでNULLを0に変換</span>
<span class="kw">SELECT</span>
    u.user_id,                              <span class="cmt">-- 【超基礎】左テーブル（users）の列</span>
    u.name,
    <span class="fn">COUNT</span>(o.order_id)           <span class="kw">AS</span> order_count,   <span class="cmt">-- 【超基礎】結合テーブルの列を数える（NULLは0件）</span>
    <span class="fn">COALESCE</span>(<span class="fn">SUM</span>(o.amount), <span class="num">0</span>) <span class="kw">AS</span> total_amount   <span class="cmt">-- 【超基礎】SUM がNULLなら0を返す（注文なしユーザー対策）</span>
<span class="kw">FROM</span>      <span class="tbl">users</span>  u                         <span class="cmt">-- 【超基礎】LEFT JOINの左テーブル（全行が保持される）</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span> o                         <span class="cmt">-- ✅ LEFT JOIN: ordersに一致がなくてもusersの行は残る</span>
          <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id         <span class="cmt">-- 【超基礎】結合条件: user_idが一致する行を紐付ける</span>
<span class="kw">GROUP BY</span>  u.user_id, u.name;               <span class="cmt">-- 【超基礎】ユーザーごとにグループ化して集計</span>

<span class="cmt">-- INNER JOIN との結果の違いを明示するためのメモ:
-- INNER JOIN → U002・U004 が結果から消える（一致するordersがないため）
-- LEFT  JOIN → U002・U004 も残り、order_count=0, total_amount=0 になる</span>

<span class="cmt">-- COUNT(o.order_id) と COUNT(*) の違いも重要:
-- COUNT(o.order_id) → NULLのorder_idはカウントしない → 注文なしユーザーは0件 ✅
-- COUNT(*)          → NULL行も1件とカウント → 注文なしユーザーが1件になる ❌</span>

<span class="cmt">/*
  実行順序:
  1. FROM users u            → usersテーブルを全行参照（4件）
  2. LEFT JOIN orders o      → ordersを user_id で結合（一致なければNULLで補完）
  3. GROUP BY user_id, name  → ユーザーごとにグループ化
  4. COUNT / SUM + COALESCE  → 各グループを集計、NULLを0に変換
  5. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>INNER JOIN の結果：一致しないU002・U004が消える</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>users行</th><th>ordersの一致</th><th>INNER JOINの結果</th></tr>
<tr class="tr-hi2"><td>U001（田中）</td><td>order 1, order 2（あり）</td><td class="tc-g">✓ 結果に含まれる</td></tr>
<tr class="tr-hi"><td>U002（鈴木）</td><td>なし</td><td class="tc-r">✗ 消える（バグ）</td></tr>
<tr class="tr-hi2"><td>U003（佐藤）</td><td>order 3（あり）</td><td class="tc-g">✓ 結果に含まれる</td></tr>
<tr class="tr-hi"><td>U004（高橋）</td><td>なし</td><td class="tc-r">✗ 消える（バグ）</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">LEFT JOIN に変えると左テーブルの全行が保持される</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>LEFT JOIN の結果：一致がない行はNULLで補完されて残る</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>users行</th><th>ordersの一致</th><th>LEFT JOIN後のorders列</th><th>GROUP BY後</th></tr>
<tr class="tr-hi2"><td>U001（田中）</td><td>2件一致</td><td class="tc-g">order_id=1, 2</td><td class="tc-g">count=2, sum=8000</td></tr>
<tr class="tr-hi"><td>U002（鈴木）</td><td>なし</td><td class="null">NULL（補完）</td><td class="tc-g">count=0, sum=0</td></tr>
<tr class="tr-hi2"><td>U003（佐藤）</td><td>1件一致</td><td class="tc-g">order_id=3</td><td class="tc-g">count=1, sum=1500</td></tr>
<tr class="tr-hi"><td>U004（高橋）</td><td>なし</td><td class="null">NULL（補完）</td><td class="tc-g">count=0, sum=0</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>INNER JOINは「両テーブルに存在する行だけ」を返します。LEFT JOINは「左テーブルの全行を保持し、右テーブルに一致がなければNULLで補完」します。「全ユーザーを返したい」「全商品を返したい」のような要件ではLEFT JOINが正解です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(結合テーブルの列) vs COUNT(*)：</strong>LEFT JOINと組み合わせる場合、<code>COUNT(*)</code> は一致なしの行（NULLが入っている）も1件とカウントするため、注文なしユーザーが「0件」ではなく「1件」になります。<em>必ず <code>COUNT(o.order_id)</code> のように結合テーブルの列を指定</em>してください。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>パフォーマンスの観点：</strong>INNER JOINとLEFT JOINのコストはほぼ同じです。「絞り込みが目的でなく必要な行を保持したい」場合はLEFT JOIN、「両方に存在する行だけが必要」な場合はINNER JOINと意図を明確にしてください。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>LEFT JOINの後にWHERE で右テーブル列を絞るとINNER JOINになる：</strong><code>LEFT JOIN orders o ON … WHERE o.status = 'completed'</code> のように、WHERE句で右テーブルの列をNULL不可の条件で絞ると、一致なしのNULL行が除外されINNER JOINと同じになります。RIGHT テーブルの条件はJOINのON句に書くか、<code>WHERE o.status = 'completed' OR o.status IS NULL</code> とする必要があります。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>RIGHT JOINを使う：</strong><code>RIGHT JOIN</code> はLEFT JOINのテーブル順序を入れ替えただけです。テーブルの左右を入れ替えてLEFT JOINで書く方が読みやすく、チームでのコード理解が統一されます。RIGHT JOINは使わない運用が一般的です。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：JOINの種類と使いどころ一覧</div>
<div class="column-body">
実務で使うJOINは主に3種類です。<strong>INNER JOIN</strong>（両テーブルに存在する行）は「注文詳細＋商品情報を同時に取得」のように確実に関係が存在する場合。<strong>LEFT JOIN</strong>（左テーブル全行保持）は「ユーザー一覧＋それぞれの注文件数（0件含む）」のように左テーブルを主体とする場合。<strong>CROSS JOIN</strong>（全組み合わせ）はカレンダー生成など特殊用途のみ。「どのJOINを選ぶか」はデータの存在保証と要件定義を突き合わせて決定することが、バグのないSQL設計の基本です。
</div>
</div>
`
},

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>FROM句サブクエリは「内側を先に全件実行してから外側で使う」という評価順です。集計後の結果に対する絞り込みを外側のWHEREで書くより、GROUP BY + HAVING でまとめる方が意図が明確でDBも最適化しやすくなります。</div></div>

<div class="column-body">
PostgreSQLでFROM句サブクエリを使ったときに、外側のWHERE条件が内側にプッシュダウン（条件適用を内側に押し込む最適化）されているかを確認するには <code>EXPLAIN</code> の出力で <strong>「Filter」がサブクエリの外か内か</strong>を見ます。「Subquery Scan」ノードの内側にFilterが表示されていればプッシュダウン成功です。外側にしかFilterがなければ全件マテリアライズされています。チューニング時にはEXPLAINで確認する習慣を持ちましょう。
</div>
</div>

<pre><span class="cmt">-- インデックスが (created_at ASC) の場合</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">ASC</span>;   <span class="cmt">-- ✅ ソート不要（インデックス順と一致）</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>;  <span class="cmt">-- ✅ インデックスを逆読みするだけ（Sort不要）</span>
<span class="kw">ORDER BY</span> amount <span class="kw">DESC</span>;      <span class="cmt">-- ❌ インデックスと別列 → Sort ノードが追加される</span></pre>
<div class="callout ok"><strong>複合インデックスとORDER BYの組み合わせ：</strong>ORDER BY で複数列を使う場合、インデックスの列順・昇降順が完全に一致するとソートを回避できます。<code>ORDER BY user_id ASC, created_at DESC</code> の場合は <code>CREATE INDEX ON t (user_id ASC, created_at DESC)</code> のインデックスが必要です。</div>`,
  question: `<p><code>orders</code> テーブルで、「ユーザーごとの注文を<em>新しい順</em>で取得する」クエリがあります。EXPLAINでSortノードが出ており遅い状況です。<em>ソートを回避するインデックスを設計</em>し、クエリの実行計画の変化を示してください。</p>
<pre><span class="cmt">-- 遅いクエリ（user_id は単一インデックスがあるが created_at がない）</span>
<span class="kw">SELECT</span> order_id, user_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>   <span class="cmt">-- created_at のインデックスがない → Sort が発生</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;</pre>
<div class="data-section">

<div class="tbl-wrap"><table class="vtbl">
<tr><th>ノード</th><th class="tc-g">コスト（改善後）</th><th>変化</th></tr>

</table></div>`,
  answer: `<pre><span class="cmt">-- ① ソートを回避するための複合インデックスを作成する</span>

<span class="kw">SELECT</span>
    order_id,                 <span class="cmt">-- 【超基礎】必要な列だけ指定</span>
    user_id,
    amount,
    created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id    <span class="op">=</span> <span class="str">'U001'</span>  <span class="cmt">-- 【超基礎】インデックス先頭列で絞り込み → Index Scan 発動</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>    <span class="cmt">-- ✅ インデックスの2列目と一致 → Sort ノードが不要になる</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;                   <span class="cmt">-- 【超基礎】先頭20件 → 早期打ち切りで高速終了</span>

<span class="cmt">-- ③ ORDER BY が複数列・複合昇降順の場合のインデックス設計例</span>
<span class="cmt">-- クエリ: ORDER BY user_id ASC, created_at DESC</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_asc_created_desc
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id <span class="kw">ASC</span>, created_at <span class="kw">DESC</span>);  <span class="cmt">-- 各列の昇降順をORDER BYに揃える</span>

<span class="cmt">-- ④ EXPLAIN で Sortノードの有無を確認する方法</span>
<span class="kw">EXPLAIN ANALYZE</span>
<span class="kw">SELECT</span> order_id, user_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;
<span class="cmt">-- 改善前: Sort -> Index Scan  (Sortノードあり)
-- 改善後: Index Scan Backward (Sortノードなし → インデックスを逆順に読むだけ)</span>

<span class="cmt">/*
  実行順序（インデックス作成後）:
  1. FROM orders                     → テーブル参照
  2. Index Scan（user_id='U001'）    → 先頭列で絞り込み
  3. created_at DESC 順で取得        → インデックス順と一致 → Sort 不要
  4. LIMIT 20                        → 20件取得した時点で早期終了
  5. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>Sortノードありの実行計画（インデックスなし）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理順</th><th>ノード</th><th>コスト</th><th>説明</th></tr>
<tr class="tr-hi"><td>①</td><td>Index Scan on user_id</td><td class="tc-y">320</td><td>user_idでフィルタ（例:100件取得）</td></tr>
<tr class="tr-hi"><td>②</td><td class="tc-r">Sort（created_at DESC）</td><td class="tc-r">4520（追加コスト）</td><td class="tc-r">取得した100件をメモリでソート</td></tr>
<tr class="tr-hi"><td>③</td><td>Limit 20</td><td>—</td><td>ソート済み先頭20件を返す</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">複合インデックス (user_id, created_at DESC) を作成するとSortが消える</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>Sortノードなしの実行計画（複合インデックスあり）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理順</th><th>ノード</th><th>コスト</th><th>説明</th></tr>
<tr class="tr-hi2"><td>①</td><td class="tc-g">Index Scan Backward（user_id, created_at）</td><td class="tc-g">85</td><td class="tc-g">インデックスを逆順に読む（created_at DESC順）</td></tr>
<tr class="tr-hi2"><td>②</td><td>Limit 20</td><td class="tc-g">—</td><td class="tc-g">20件で早期終了（ソート不要）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>ORDER BYはインデックスの並び順と一致するとき「Sort ノード（追加ソート処理）」が不要になります。EXPLAINの出力で <code>Sort</code> ノードが見えたら、そのORDER BYに対応したインデックスを作成できないか検討してください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DESCとインデックスの向き：</strong>PostgreSQLのBTreeインデックスは順方向・逆方向どちらにも走査できます。<code>created_at ASC</code> のインデックスがあれば <code>ORDER BY created_at DESC</code> も「Index Scan Backward」として追加コストなく使えます。ただし、複合インデックスで<em>列ごとに昇降順が混在する場合</em>（例：<code>ORDER BY a ASC, b DESC</code>）は、インデックス側でも昇降順を合わせる必要があります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>LIMIT との組み合わせが鍵：</strong>LIMIT を付けることでインデックス走査が必要な行数に達した時点で早期終了します。Sort後にLIMITする場合は「全件ソートしてから先頭N件を返す」ため、LIMITの恩恵を受けられません。インデックスによるSort回避 + LIMIT の組み合わせが最大効果を発揮します。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY に関数や式を使う：</strong><code>ORDER BY LOWER(name)</code> や <code>ORDER BY created_at + INTERVAL '1 day'</code> は通常のインデックスでのSort回避ができません。どうしても必要な場合は式インデックス（<code>CREATE INDEX ON t (LOWER(name))</code>）を作成してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY rand()（ランダム並び）にインデックスを期待する：</strong><code>ORDER BY RANDOM()</code> は毎回異なる順序を要求するためインデックスが使えず常に全件ソートになります。大規模テーブルでランダム取得が必要な場合は、PKの最大値を取得してランダム範囲でLIMIT検索するなど別の手法を検討してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：タイムライン系APIのインデックス設計</div>
<div class="column-body">
SNSやECの「最新投稿一覧」「注文履歴」のようなタイムライン系APIは <code>WHERE user_id = ? ORDER BY created_at DESC LIMIT 20</code> が典型的なパターンです。このパターンには必ず <strong>(user_id, created_at DESC) の複合インデックス</strong>を設計してください。これだけで Sort ノードが消え、大量データでも LIMIT 件数分だけ取得して即終了できます。QPS（秒間クエリ数）が高いAPIほどこのチューニングの効果が大きく出ます。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════

{
  num: 4,
  title: "COUNT最適化 — COUNT(*) / COUNT(col) / EXISTS の正しい使い分け",
  tags: [["r","COUNT"],["r","EXISTS"],["o","NULL除外"],["g","件数確認"]],
  premise: `<p>SQLのCOUNTには3つの書き方があり、それぞれ動作とパフォーマンスが異なります。目的に合った書き方を選ぶことが「正確さ」と「速さ」の両立につながります。</p>
<pre><span class="cmt">-- COUNT(*): 全行をカウント（NULLも含む・最速）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- COUNT(col): 指定列がNULLでない行だけをカウント</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(user_id) <span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- COUNT(DISTINCT col): 重複を除いた種類数をカウント（重い）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id) <span class="kw">FROM</span> <span class="tbl">orders</span>;</pre>
<div class="callout warn"><strong>「行が存在するか」の確認にCOUNTを使わない：</strong><code>SELECT COUNT(*) FROM orders WHERE user_id='U001'</code> で件数が0かどうか確認するのは非効率です。<code>EXISTS</code> は1件見つかった瞬間に処理を終了するため、存在確認には必ずEXISTSを使います。</div>`,
  question: `<p>以下の3つのシナリオで、<em>正しいCOUNT / EXISTS の書き方</em>をそれぞれ示してください。パフォーマンスの観点から理由も説明してください。</p>
<pre><span class="cmt">-- シナリオA: ordersテーブルの総件数を取得したい</span>
<span class="cmt">-- シナリオB: emailがNULLでないユーザーの件数を取得したい（usersテーブル）</span>
<span class="cmt">-- シナリオC: 特定ユーザー（user_id='U001'）の注文が「1件でもあるか」を確認したい</span></pre>
<div class="data-section">
  <div class="data-label">usersテーブルの状況</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>user_id</th><th>name</th><th>email</th></tr>
    <tr><td>U001</td><td>田中</td><td>tanaka@example.com</td></tr>
    <tr><td>U002</td><td>鈴木</td><td class="null">NULL（未登録）</td></tr>
    <tr><td>U003</td><td>佐藤</td><td>sato@example.com</td></tr>
  </table></div>
</div>`,
  output: `<p>各シナリオの期待結果：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>シナリオ</th><th>正しい書き方</th><th class="tc-y">結果</th></tr>
<tr class="tr-hi2"><td>A: 総件数</td><td>COUNT(*)</td><td class="tc-y">3（全行カウント）</td></tr>
<tr class="tr-hi2"><td>B: email非NULLの件数</td><td>COUNT(email)</td><td class="tc-y">2（NULLを除く）</td></tr>
<tr class="tr-hi2"><td>C: 存在確認</td><td>EXISTS</td><td class="tc-y">TRUE / FALSE</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- シナリオA: 総件数 → COUNT(*) が最速・最適</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> total_orders     <span class="cmt">-- 【超基礎】全行をカウント（NULLも1件としてカウント）</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>;
<span class="cmt">-- COUNT(*) は列の値を参照しないため最も高速
-- PostgreSQLはシーケンシャルスキャンまたは最小インデックスでカウント</span>

<span class="cmt">-- シナリオB: NULL除外カウント → COUNT(列名) を使う</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(email) <span class="kw">AS</span> users_with_email  <span class="cmt">-- 【超基礎】email がNULLでない行だけをカウント</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>;
<span class="cmt">-- COUNT(email) は email = NULL の行をスキップする
-- NG: COUNT(*) を使うと「全ユーザー数」になり意図と異なる</span>

<span class="cmt">-- シナリオC: 存在確認 → EXISTS を使う（COUNT より圧倒的に高速）</span>
<span class="kw">SELECT</span>
    <span class="kw">CASE</span> <span class="kw">WHEN</span> <span class="kw">EXISTS</span> (            <span class="cmt">-- 【超基礎】サブクエリが1件でも返せばTRUE</span>
        <span class="kw">SELECT</span> <span class="num">1</span>                    <span class="cmt">-- 【超基礎】存在確認だけなのでSELECT 1が慣習（何を返すかは不問）</span>
        <span class="kw">FROM</span>   <span class="tbl">orders</span>
        <span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>    <span class="cmt">-- 【超基礎】存在を確認したい条件</span>
    ) <span class="kw">THEN</span> <span class="kw">TRUE</span>
      <span class="kw">ELSE</span> <span class="kw">FALSE</span>
    <span class="kw">END</span> <span class="kw">AS</span> has_orders;

<span class="cmt">-- アプリ側の IF 分岐に使う場合（より簡潔な書き方）</span>
<span class="kw">SELECT</span>
    u.user_id,
    u.name,
    <span class="kw">EXISTS</span> (                          <span class="cmt">-- 【応用】EXISTSをSELECT列として使うとBOOLEANが返る</span>
        <span class="kw">SELECT</span> <span class="num">1</span>
        <span class="kw">FROM</span>   <span class="tbl">orders</span> o
        <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- 外側のuser_idを参照（相関サブクエリ）</span>
    ) <span class="kw">AS</span> has_orders                   <span class="cmt">-- TRUE/FALSEのブール値を返す列</span>
<span class="kw">FROM</span>   <span class="tbl">users</span> u;

<span class="cmt">-- NG: COUNT(*) で存在確認（全件スキャンが必要で遅い）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="str">'U001'</span>;  <span class="cmt">-- ❌ 全件カウントしてから0かどうか判定</span>
<span class="cmt">-- EXISTS なら1件見つかった時点で終了。COUNT は全件走査が必要。</span>

<span class="cmt">/*
  実行順序（シナリオC のEXISTS版）:
  1. FROM users u                → usersを1行ずつ処理
  2. EXISTS サブクエリ評価        → ordersで user_id='U001' を1件でも見つけたら即TRUE
  3. Short-circuit               → 1件一致した時点で残りのordersを読むのをやめる
  4. SELECT has_orders           → TRUE/FALSE を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>COUNT の3つの動作の違い（usersテーブル、emailにNULLあり）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>書き方</th><th>U001(email=値)</th><th>U002(email=NULL)</th><th>U003(email=値)</th><th class="tc-y">結果</th></tr>
<tr class="tr-hi2"><td>COUNT(*)</td><td class="tc-g">カウント</td><td class="tc-g">カウント（NULLも含む）</td><td class="tc-g">カウント</td><td class="tc-y">3</td></tr>
<tr class="tr-hi"><td>COUNT(email)</td><td class="tc-g">カウント</td><td class="tc-r">スキップ（NULL除外）</td><td class="tc-g">カウント</td><td class="tc-y">2</td></tr>
<tr class="tr-hi3"><td>COUNT(DISTINCT email)</td><td class="tc-g">カウント</td><td class="tc-r">スキップ（NULL除外）</td><td class="tc-g">カウント（重複除去）</td><td class="tc-y">2</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">存在確認はCOUNTではなくEXISTSを使う（Short-circuitで高速）</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>COUNT(*) vs EXISTS の処理の違い（対象1000件のとき）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方法</th><th>走査行数</th><th>速度</th><th>用途</th></tr>
<tr class="tr-hi"><td>COUNT(*) = 0 で判定</td><td class="tc-r">条件に一致する全行</td><td class="tc-r">遅い（全件確認）</td><td>件数が必要なとき</td></tr>
<tr class="tr-hi2"><td>EXISTS</td><td class="tc-g">1件一致で即終了</td><td class="tc-g">速い（Short-circuit）</td><td class="tc-g">存在確認のみ</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong><code>COUNT(*)</code> は「NULLを含む全行を数える」、<code>COUNT(列名)</code> は「その列がNULLでない行を数える」という違いがあります。NULL があるカラムを数える場合は用途に応じてどちらを使うか意識して選択してください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(DISTINCT col) の重さ：</strong>COUNT(DISTINCT user_id) はまず全行のuser_idを集めて重複排除してからカウントするため、通常のCOUNT(*)より大幅に重い処理になります。大規模テーブルで正確なユニーク数が必要な場合は <code>HyperLogLog</code> や集計テーブルの事前計算を検討してください。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>テーブルの概算件数（高速）：</strong>PostgreSQLでは <code>SELECT reltuples FROM pg_class WHERE relname = 'orders'</code> で統計情報に基づく概算件数が瞬時に取得できます。「1億件中」のような表示に使う概算値にはCOUNT(*)より圧倒的に速い方法です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>全件COUNTをAPIの毎リクエストで実行する：</strong>「全100,000件中N件目」のようなページネーション表示のために<code>COUNT(*)</code>を毎回実行すると、大規模テーブルでは数秒かかることがあります。概算値・キャッシュ・ページネーション廃止（無限スクロール化）などで代替してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>COUNT(*) > 0 の条件判定：</strong><code>WHERE (SELECT COUNT(*) FROM orders WHERE user_id = u.user_id) > 0</code> は全件カウントしてから0より大きいか判定する最悪パターンです。<code>WHERE EXISTS (SELECT 1 FROM orders WHERE user_id = u.user_id)</code> に書き直してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：集計テーブルで COUNT を事前計算する</div>
<div class="column-body">
「ユーザーごとの注文件数」のような集計値をリアルタイムに計算するのではなく、<strong>バッチや INSERT/UPDATE トリガーで集計値を専用テーブル（user_stats など）に事前計算</strong>しておくパターンが高トラフィックサービスでよく使われます。例えば <code>users</code> テーブルに <code>order_count INTEGER NOT NULL DEFAULT 0</code> を追加し、注文のINSERT/DELETE時にこの値をインクリメント/デクリメントするトリガーを設定します。取得時はCOUNT(*)クエリが不要になり、インデックス付きの単純な列参照だけで済みます。
</div>
</div>
`

/* ══════════════════════════════════════════════════
   Q5  デッドロック回避 — ロック順序の統一で防ぐ
══════════════════════════════════════════════════ */
{
  num: 5,
  title: "デッドロック回避 — ロック取得順序を統一して循環待ちを防ぐ",
  tags: [["r","デッドロック"],["r","ロック順序"],["o","FOR UPDATE"],["g","トランザクション"]],
  premise: `<p><strong>デッドロック</strong>とは、2つのトランザクションが互いに相手が持つロックの解放を待ち続け、永遠に進めなくなる状態です。PostgreSQLは検出後に一方をロールバックして解消しますが、頻繁に起きるとパフォーマンスが低下します。</p>
<pre><span class="cmt">-- デッドロックが起きる典型例</span>
<span class="cmt">-- トランザクションA: 口座1をロック → 次に口座2をロックしようとする</span>
<span class="kw">BEGIN</span>; <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">1</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- ロック: id=1</span>
       <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">2</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- 待機: id=2はBがロック中</span>

<span class="cmt">-- トランザクションB: 口座2をロック → 次に口座1をロックしようとする</span>
<span class="kw">BEGIN</span>; <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">2</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- ロック: id=2</span>
       <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">1</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- 待機: id=1はAがロック中 → デッドロック</span></pre>
<div class="callout danger"><strong>デッドロックの結果：</strong>PostgreSQLはデッドロックを検出した時点でいずれかのトランザクションを強制ROLLBACKします。アプリはエラーを受け取り、再試行ロジックが必要です。</div>`,
  question: `<p><code>accounts</code> テーブルで「送金処理（送り元から引いて、受け取り先に足す）」を行うAPIがあります。同時に逆方向の送金が来るとデッドロックが起きています。<em>ロック取得順序を統一してデッドロックを防ぐSQL</em>を書いてください。</p>
<div class="data-section">
  <div class="data-label">accounts テーブル</div>

<pre><span class="cmt">-- 現在のデッドロックが起きるコード（概念）</span>

<span class="cmt">-- API Bが同時に呼ばれたとき: 送り元=2 → 受け取り先=1 の順にロック</span>

<div class="tbl-wrap"><table class="vtbl">
<tr><th>account_id</th><th>owner_name</th><th class="tc-g">balance（送金後）</th></tr>
<tr class="tr-hi2"><td>1</td><td>田中</td><td class="tc-g">90000</td></tr>
<tr class="tr-hi2"><td>2</td><td>鈴木</td><td class="tc-g">60000</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- デッドロック回避策: 常に「account_id の小さい方から順にロック」するルールを統一</span>

<span class="cmt">-- 送金処理（from_id=1, to_id=2, amount=10000 の例）</span>
<span class="kw">BEGIN</span>;                                       <span class="cmt">-- 【超基礎】トランザクション開始</span>

<span class="cmt">-- ① 小さいidから順にロックを取得（from_id と to_id のどちらが小さくても同じ順序）</span>
<span class="kw">SELECT</span> account_id, balance
<span class="kw">FROM</span>   <span class="tbl">accounts</span>
<span class="kw">WHERE</span>  account_id <span class="kw">IN</span> (<span class="num">1</span>, <span class="num">2</span>)              <span class="cmt">-- 【超基礎】両口座をIN句でまとめて指定</span>
<span class="kw">ORDER BY</span> account_id <span class="kw">ASC</span>                    <span class="cmt">-- ✅ 常にidの昇順で取得 → ロック順序を統一</span>
<span class="kw">FOR UPDATE</span>;                                 <span class="cmt">-- 【超基礎】取得した行に排他ロックをかける</span>
<span class="cmt">-- ASC指定により id=1 → id=2 の順でロックが取られる
-- 逆方向の送金（2→1）でも同じ順序になるのでデッドロックが起きない</span>

<span class="cmt">-- ② 残高チェック（送り元の残高が送金額以上か確認）</span>
<span class="cmt">-- ※ アプリ側でロック取得後に残高を確認し、不足なら ROLLBACK する</span>

<span class="cmt">-- ③ 送り元の残高を減らす</span>
<span class="kw">UPDATE</span> <span class="tbl">accounts</span>
<span class="kw">SET</span>    balance <span class="op">=</span> balance <span class="op">-</span> <span class="num">10000</span>          <span class="cmt">-- 【超基礎】現在のbalanceから送金額を減算</span>
<span class="kw">WHERE</span>  account_id <span class="op">=</span> <span class="num">1</span>;                   <span class="cmt">-- 送り元（田中）を更新</span>

<span class="cmt">-- ④ 受け取り先の残高を増やす</span>
<span class="kw">UPDATE</span> <span class="tbl">accounts</span>
<span class="kw">SET</span>    balance <span class="op">=</span> balance <span class="op">+</span> <span class="num">10000</span>          <span class="cmt">-- 【超基礎】現在のbalanceに送金額を加算</span>
<span class="kw">WHERE</span>  account_id <span class="op">=</span> <span class="num">2</span>;                   <span class="cmt">-- 受け取り先（鈴木）を更新</span>

<span class="kw">COMMIT</span>;                                    <span class="cmt">-- 【超基礎】トランザクション確定（ロック解放）</span>

<span class="cmt">-- デッドロック発生時の再試行パターン（アプリ側の疑似コード）
-- BEGIN ... FOR UPDATE ... UPDATE ... COMMIT
-- ↑ DEADLOCK エラー（PostgreSQL error 40P01）を受け取ったら

<span class="cmt">/*
  実行順序:
  1. BEGIN                          → トランザクション開始
  2. SELECT ... FOR UPDATE ORDER BY → id昇順でロック取得（id=1→id=2の順序を保証）
  3. UPDATE accounts SET balance-=  → 送り元の残高を減らす
  4. UPDATE accounts SET balance+=  → 受け取り先の残高を増やす
  5. COMMIT                         → 全更新を確定しロック解放
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>デッドロックが起きるロック取得パターン（NG）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>時刻</th><th>トランザクションA（1→2送金）</th><th>トランザクションB（2→1送金）</th></tr>
<tr class="tr-hi"><td>T1</td><td class="tc-g">id=1 をロック取得</td><td class="tc-g">id=2 をロック取得</td></tr>
<tr class="tr-hi"><td>T2</td><td class="tc-r">id=2 を待機（Bがロック中）</td><td class="tc-r">id=1 を待機（Aがロック中）</td></tr>

<div class="tbl-wrap"><table class="vtbl">
<tr><th>時刻</th><th>トランザクションA（1→2送金）</th><th>トランザクションB（2→1送金）</th></tr>
<tr class="tr-hi2"><td>T1</td><td class="tc-g">id=1 をロック取得（ORDER BY ASCで先）</td><td class="tc-y">id=1 を待機（Aがロック中）</td></tr>
<tr class="tr-hi2"><td>T2</td><td class="tc-g">id=2 をロック取得 → 処理完了</td><td class="tc-y">待機中…</td></tr>
<tr class="tr-hi2"><td>T3</td><td class="tc-g">COMMIT（ロック解放）</td><td class="tc-g">id=1, id=2 を順番にロック取得 → 正常処理</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>デッドロックは「2つのトランザクションが異なる順序で同じ行のロックを取ろうとするとき」に起きます。解決策はシンプルで「全てのトランザクションが同じ順序でロックを取得する」ことです。ORDER BY id ASC で取得順を固定するのが最も確実です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>アプリ側の再試行ロジック：</strong>デッドロックは「統計的に発生する可能性があるもの」として設計し、アプリ側でPostgreSQLの error code 40P01（deadlock_detected）を受け取ったら短いwait後に再試行するロジックを必ず実装してください。ロック順序統一と再試行の両方が揃って堅牢な設計になります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>lock_timeout の設定：</strong><code>SET lock_timeout = '5s'</code> でトランザクションごとにロック待ちのタイムアウトを設定できます。デッドロックではなく単純なロック待ちが長引く問題にはlock_timeoutが有効です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>トランザクション中に外部APIを呼ぶ：</strong>BEGIN〜COMMITの間に外部HTTP APIを呼ぶと、API応答待ちの間もDBのロックが保持されます。外部APIが遅れるとロック待ち時間が大幅に増加しデッドロックリスクも上がります。「DB処理 → COMMIT → 外部API呼び出し」の順序に変えてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>不必要にFOR UPDATEを使う：</strong>FOR UPDATEを「念のため」付けると更新しない行にも排他ロックがかかり、他のトランザクションを不要に待たせます。実際に更新する行にのみFOR UPDATEを使い、参照のみなら通常のSELECTを使いましょう。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：pg_locks でロック状況を可視化する</div>
<div class="column-body">
本番でデッドロックやロック待ちが多発している場合、<code>SELECT * FROM pg_locks l JOIN pg_stat_activity a ON l.pid = a.pid WHERE l.granted = false;</code> でロック待ちのクエリと待ち相手を確認できます。また <code>pg_blocking_pids(pid)</code> 関数でブロックしているPIDを特定できます。<strong>定期的にロック状況を監視するクエリをダッシュボードに組み込む</strong>ことで、デッドロックや長時間ロック待ちを早期発見できます。
</div>
</div>
`

{

  title: "pg_trgm + GINインデックス — LIKE '%keyword%' 部分一致を高速化する",
  tags: [["r","pg_trgm"],["r","GIN"],["o","LIKE部分一致"],["g","全文検索"]],
  premise: `<p>通常のBTreeインデックスは <code>LIKE '%keyword%'</code>（前後に%がある部分一致）に対応できずSeq Scanになります。PostgreSQLの <strong>pg_trgm 拡張</strong>を使うと、「3文字単位（トライグラム）に分解した転置インデックス（GIN）」を作成し、部分一致検索にもインデックスが効くようになります。</p>
<pre><span class="cmt">-- pg_trgm 拡張の有効化（初回のみ。スーパーユーザー権限が必要）</span>
<span class="kw">CREATE EXTENSION IF NOT EXISTS</span> pg_trgm;

<span class="cmt">-- トライグラムGINインデックスの作成</span>
<span class="kw">CREATE INDEX</span> idx_products_name_trgm
    <span class="kw">ON</span> <span class="tbl">products</span> <span class="kw">USING GIN</span> (name <span class="fn">gin_trgm_ops</span>);
<span class="cmt">-- gin_trgm_ops: LIKE/ILIKE/~ に対応したGIN演算子クラス</span></pre>
<div class="callout ok"><strong>トライグラムとは：</strong>文字列を3文字の重複ありスライスに分解したものです。例えば「postgres」は「pos」「ost」「stg」「tgr」…のように分解されます。この分解済みインデックスを使うことで、部分一致の高速検索が可能になります。</div>`,
  question: `<p><code>products</code> テーブル（50万件）で「商品名に特定のキーワードが含まれる商品を検索する」機能があります。現在のLIKE検索が遅い原因を特定し、<em>pg_trgm GINインデックスを使って高速化</em>してください。大文字小文字を無視した検索（ILIKE）にも対応してください。</p>
<pre><span class="cmt">-- 現在の遅い検索クエリ</span>
<span class="kw">SELECT</span> product_id, name, price
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  name <span class="kw">ILIKE</span> <span class="str">'%スマートフォン%'</span>   <span class="cmt">-- 前後に% → BTreeインデックス使えない → Seq Scan</span>

<div class="data-section">

  <div class="tbl-wrap"><table class="vtbl">

    <tr><td>2</td><td>スマートフォンケース</td><td>2000</td></tr>

    <tr><td>4</td><td>Android スマートフォン</td><td>80000</td></tr>
  </table></div>
</div>`,

  answer: `<pre><span class="cmt">-- ① pg_trgm 拡張を有効化（初回のみ実行）</span>

<span class="kw">CREATE INDEX</span> idx_products_name_trgm
    <span class="kw">ON</span> <span class="tbl">products</span> <span class="kw">USING GIN</span>             <span class="cmt">-- 【応用】GIN: 転置インデックス（LIKE/ILIKEに対応）</span>
    (name <span class="fn">gin_trgm_ops</span>);               <span class="cmt">-- 【応用】gin_trgm_ops: LIKE/ILIKEの演算子クラス</span>

<span class="kw">ORDER BY</span> price <span class="kw">ASC</span>                     <span class="cmt">-- 【超基礎】価格昇順で並び替え</span>

<span class="cmt">/*

  4. ORDER BY price ASC            → 結果をソート
  5. LIMIT 50                      → 先頭50件返す
*/</span></pre>`,

<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>BTreeインデックスは「前方一致（LIKE 'xxx%'）」には使えますが「中間・後方一致（LIKE '%xxx%'）」には使えません。部分一致検索が必要な列には pg_trgm 拡張のGINインデックスを作成することで、Seq Scanを回避できます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>gin_trgm_ops の文字数制限：</strong>pg_trgmの検索は3文字以上のキーワードで最も効果を発揮します。1〜2文字の検索ではトライグラムの候補が多すぎてGINの効果が薄くなり、Seq Scanより遅くなることもあります。最低3文字のキーワード入力をUI側で強制するのが実務のベストプラクティスです。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>pg_trgm vs 全文検索（tsvector）：</strong>pg_trgmは任意のキーワード部分一致に対応しますが、日本語の形態素解析には対応していません。日本語の自然言語検索（「スマホ」で「スマートフォン」を見つけるなど）にはMeCabを使った <code>pgroonga</code> 拡張や Elasticsearch が適しています。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>短い文字列カラム全体に pg_trgm インデックスを張る：</strong>pg_trgmのGINインデックスはBTreeより大きくなりがちです。文字列が短く（3文字以下が多い）、かつカーディナリティが低い列（ステータスフラグなど）に作成しても効果がほとんどありません。検索頻度が高い名前・タイトル・説明文などの長めの列に適用してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>EXPLAIN で効果を確認しない：</strong>pg_trgmインデックスを作成しても、検索語が短すぎたり統計情報が古かったりしてSeq Scanのままになることがあります。必ず <code>EXPLAIN ANALYZE</code> で「Bitmap Heap Scan」または「Bitmap Index Scan using idx_***_trgm」が出ていることを確認してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：検索機能のアーキテクチャ選択</div>
<div class="column-body">
Webサービスの検索機能は規模によって最適な技術が変わります。<strong>数万件〜数百万件のシンプルな部分一致検索</strong>ではpg_trgmのGINインデックスで十分です。<strong>日本語の形態素解析・シノニム（類義語）・スコアリング</strong>が必要になったら pgroonga（PostgreSQL拡張）または PGroonga。<strong>マルチテナント・リアルタイムインデックス・ファセット検索・スケールアウト</strong>が必要になったら Elasticsearch/OpenSearch へ移行する段階的アプローチが実務では一般的です。
</div>
</div>
`
},

{
  num: 7,
  title: "タイムゾーン対応 — TIMESTAMPTZ と AT TIME ZONE で時刻ズレを防ぐ",
  tags: [["r","TIMESTAMPTZ"],["r","AT TIME ZONE"],["o","タイムゾーン"],["g","UTC変換"]],
  premise: `<p>SQLのタイムスタンプ型には <strong>TIMESTAMP（タイムゾーンなし）</strong> と <strong>TIMESTAMPTZ（タイムゾーン付き）</strong> の2種類があります。グローバルなサービスやサマータイムがある国では、TIMESTAMPTZ を使わないと「同じ時刻でも国ごとに表示が変わる」バグが起きます。</p>
<pre><span class="cmt">-- PostgreSQL の型の違い</span>
created_at TIMESTAMP;      <span class="cmt">-- タイムゾーンなし: 入力された値をそのまま格納</span>
created_at TIMESTAMPTZ;    <span class="cmt">-- タイムゾーン付き: 内部でUTCに変換して格納・取得時にセッションTZに変換</span>

<span class="cmt">-- タイムゾーン変換の基本</span>
<span class="kw">SELECT</span> created_at <span class="kw">AT TIME ZONE</span> <span class="str">'Asia/Tokyo'</span> <span class="kw">FROM</span> <span class="tbl">orders</span>;
<span class="cmt">-- UTC で格納 → 'Asia/Tokyo'（+09:00）に変換して表示</span></pre>

</table></div>`,
  answer: `<pre><span class="cmt">-- ① 日本時間の1日分を UTC 範囲に変換してSARGable検索する（推奨）</span>
<span class="cmt">-- 日本時間(JST=UTC+9) の '2024-01-15 00:00:00' = UTC '2024-01-14 15:00:00'</span>
<span class="cmt">-- 日本時間(JST=UTC+9) の '2024-01-16 00:00:00' = UTC '2024-01-15 15:00:00'</span>
<span class="kw">SELECT</span>
    order_id,

<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;=</span> <span class="str">'2024-01-14 15:00:00+00'</span>       <span class="cmt">-- ✅ UTC基準で範囲指定（SARGable・インデックス有効）</span>
  <span class="kw">AND</span>  created_at  <span class="op">&lt;</span>  <span class="str">'2024-01-15 15:00:00+00'</span>;      <span class="cmt">-- JST '2024-01-16 00:00:00' をUTCに変換した値</span>

<span class="cmt">-- ② タイムゾーン変換を使って「日本時間でフィルタ」する書き方（可読性重視・インデックス無効に注意）</span>

<span class="cmt">-- 注意: 列に AT TIME ZONE を適用しているため SARGable でない → Seq Scan になる可能性

<span class="cmt">-- ③ アプリ側でJST→UTC変換してからSQLに渡すのが最も確実（推奨パターン）</span>

<span class="cmt">-- SQLにはUTC値をプレースホルダーで渡す:
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> created_at <span class="op">&gt;=</span> <span class="op">$</span><span class="num">1</span> <span class="kw">AND</span> created_at <span class="op">&lt;</span> <span class="op">$</span><span class="num">2</span>;</span>

<span class="cmt">-- ④ セッションのタイムゾーンを設定する方法</span>
<span class="kw">SET</span> timezone <span class="op">=</span> <span class="str">'Asia/Tokyo'</span>;           <span class="cmt">-- セッション全体をJSTに切り替え</span>
<span class="kw">SELECT</span> <span class="fn">NOW</span>();                          <span class="cmt">-- このセッションではJST時刻で表示される</span>
<span class="kw">RESET</span> timezone;                        <span class="cmt">-- デフォルト（UTCまたはサーバー設定）に戻す</span>

<span class="cmt">/*
  実行順序（①のクエリ）:

*/</span></pre>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>日本のサービスでも「DBはUTCで統一、アプリ層でJSTに変換」が国際的なベストプラクティスです。サーバーの地域が変わっても時刻データが壊れません。TIMESTAMPTZ を使えばPostgreSQLが自動でUTC変換してくれます。</div></div>

<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>サマータイム（DST）対応：</strong>UTC+一定オフセット（JST=UTC+9）ではサマータイムの問題は起きませんが、ヨーロッパ・アメリカ向けサービスでは夏/冬でオフセットが変わります。TIMESTAMPTZ + AT TIME ZONE 'America/New_York' のようにタイムゾーン名で変換すれば、DBがDSTを自動的に考慮します。</div></div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>アプリのタイムゾーン設定に依存する：</strong>アプリのタイムゾーン設定が変わると、TIMESTAMPで格納・取得する値が変わってしまいます。DBはUTC・TIMESTAMPTZで統一し、タイムゾーン変換はアプリ層でのみ行う設計が、環境依存バグを防ぐ最も確実な方法です。</div></div>

</div>

{

  title: "UPDATE JOIN — 別テーブルの値を使って効率よく一括更新する",

  premise: `<p>あるテーブルの行を「別テーブルの値に基づいて更新」したい場合、ループや相関サブクエリの代わりに <strong>UPDATE ... FROM（PostgreSQL）</strong> を使うと1クエリで効率よく更新できます。</p>
<pre><span class="cmt">-- NG: 相関サブクエリを使ったUPDATE（行ごとにSELECTが実行される）</span>
<span class="kw">UPDATE</span> <span class="tbl">orders</span>
<span class="kw">SET</span>    discount <span class="op">=</span> (
    <span class="kw">SELECT</span> discount_rate <span class="kw">FROM</span> <span class="tbl">coupons</span>
    <span class="kw">WHERE</span>  coupon_id <span class="op">=</span> orders.coupon_id   <span class="cmt">-- 行ごとにサブクエリ実行 → N+1問題</span>
);

<span class="cmt">-- OK: UPDATE ... FROM で1クエリ更新（PostgreSQL）</span>
<span class="kw">UPDATE</span> <span class="tbl">orders</span> o
<span class="kw">SET</span>    discount <span class="op">=</span> c.discount_rate         <span class="cmt">-- cテーブルの値を直接参照できる</span>
<span class="kw">FROM</span>   <span class="tbl">coupons</span> c
<span class="kw">WHERE</span>  c.coupon_id <span class="op">=</span> o.coupon_id;</pre>
<div class="callout ok"><strong>UPDATE ... FROM の利点：</strong>JOINで結合してからUPDATEするため、①相関サブクエリのN+1問題を回避、②1トランザクションで完結、③インデックスが活用できる、という3つのメリットがあります。</div>`,

  answer: `<pre><span class="cmt">-- NG: 相関サブクエリ版（全ユーザー数 × orders検索が発生 = N+1）</span>

    <span class="kw">SELECT</span>
        user_id,
        <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> cnt           <span class="cmt">-- 【超基礎】ユーザーごとの注文件数</span>
    <span class="kw">FROM</span>     <span class="tbl">orders</span>
    <span class="kw">GROUP BY</span> user_id              <span class="cmt">-- 【超基礎】user_idごとにグループ化して集計</span>
)
<span class="kw">UPDATE</span> <span class="tbl">users</span> u                   <span class="cmt">-- 【超基礎】更新対象のテーブル（エイリアスuを付ける）</span>
<span class="kw">SET</span>    total_orders <span class="op">=</span> <span class="fn">COALESCE</span>(oc.cnt, <span class="num">0</span>)  <span class="cmt">-- 【超基礎】一致がないとNULL→COALESCEで0に変換</span>
<span class="kw">FROM</span>   order_counts oc            <span class="cmt">-- 【応用】UPDATE ... FROM: 別テーブルの値でUPDATEできる</span>
<span class="kw">WHERE</span>  oc.user_id <span class="op">=</span> u.user_id;   <span class="cmt">-- 【超基礎】user_idが一致する行だけ更新</span>
<span class="cmt">-- ※ このCTEにないuser_id（U002=注文なし）は更新されない！</span>

<span class="cmt">-- 注文なしユーザーも0で更新するには、全usersを対象にしたUPDATEが必要</span>
<span class="kw">WITH</span> order_counts <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
        user_id,
        <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> cnt
    <span class="kw">FROM</span>     <span class="tbl">orders</span>
    <span class="kw">GROUP BY</span> user_id
)
<span class="kw">UPDATE</span> <span class="tbl">users</span> u
<span class="kw">SET</span>    total_orders <span class="op">=</span> <span class="fn">COALESCE</span>(oc.cnt, <span class="num">0</span>)  <span class="cmt">-- 集計値がなければ0（注文なしユーザー）</span>
<span class="kw">FROM</span>   (
    <span class="kw">SELECT</span> u2.user_id, oc2.cnt
    <span class="kw">FROM</span>      <span class="tbl">users</span>        u2
    <span class="kw">LEFT JOIN</span> order_counts  oc2 <span class="kw">ON</span> oc2.user_id <span class="op">=</span> u2.user_id  <span class="cmt">-- LEFT JOINで注文なしも含める</span>
) <span class="kw">AS</span> oc
<span class="kw">WHERE</span>  oc.user_id <span class="op">=</span> u.user_id;   <span class="cmt">-- 全ユーザーに対してUPDATE</span>

<span class="cmt">/*
  実行順序（CTE版）:
  1. CTE order_counts          → ordersを全件GROUP BYして user_id → cnt のマップを作成
  2. UPDATE users u            → usersの全行を処理対象にする
  3. FROM order_counts oc      → CTEとJOINして対応するcntを取得
  4. SET total_orders = COALESCE(cnt, 0)  → 値を更新（NULLなら0）
  5. WHERE oc.user_id = u.user_id        → 一致するユーザーだけ更新
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>相関サブクエリ版：ユーザー行ごとにorderを検索（N+1）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>users行</th><th>サブクエリ実行</th><th>結果</th></tr>
<tr class="tr-hi"><td>U001（田中）</td><td class="tc-r">COUNT(*) FROM orders WHERE user_id='U001' → 実行1回</td><td>2</td></tr>
<tr class="tr-hi"><td>U002（鈴木）</td><td class="tc-r">COUNT(*) FROM orders WHERE user_id='U002' → 実行2回</td><td>0</td></tr>
<tr class="tr-hi"><td>U003（佐藤）</td><td class="tc-r">COUNT(*) FROM orders WHERE user_id='U003' → 実行3回</td><td>1</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">UPDATE ... FROM なら ordersは1回のGROUP BY で全集計を完了</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>UPDATE ... FROM 版：CTEで1回集計 → JOINしてUPDATE</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>CTE（order_counts）</th><th>user_id</th><th>cnt</th><th>COALESCE(cnt,0)</th></tr>
<tr class="tr-hi2"><td>U001の集計</td><td>U001</td><td class="tc-g">2</td><td class="tc-g">2</td></tr>
<tr class="tr-hi"><td>U002（注文なし）</td><td>U002</td><td class="null">NULL（LEFT JOIN）</td><td class="tc-g">0</td></tr>
<tr class="tr-hi2"><td>U003の集計</td><td>U003</td><td class="tc-g">1</td><td class="tc-g">1</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>UPDATEは通常「自テーブルの値を変更する」命令ですが、PostgreSQLの <code>UPDATE ... FROM</code> を使うと「別テーブルの値を参照してUPDATE」ができます。MySQL/MariaDBでは <code>UPDATE a JOIN b ON ... SET a.col = b.col</code> という構文になります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>RETURNING句で更新結果を返す：</strong>PostgreSQLでは <code>UPDATE ... RETURNING user_id, total_orders</code> で更新後の値を同時に取得できます。「更新してから結果を確認するために再SELECT」する2クエリ構成を1クエリにまとめられます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>インデックス活用の注意：</strong>UPDATE ... FROM のJOIN条件にインデックスが張られているかを確認してください。<code>WHERE oc.user_id = u.user_id</code> の両側にインデックスがあれば Hash Join / Merge Join が選ばれ高速になります。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>UPDATE ... FROM で対象行が複数マッチすると意図しない更新になる：</strong>FROM句のテーブルに同じキーで複数行があると、PostgreSQLは「非決定的（どの行が使われるか不定）」な動作をします。FROM句のサブクエリやCTEで集計・DISTINCT・GROUP BYを使って結合する行を1対1に絞ってください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>大量UPDATE後にVACUUMを忘れる：</strong>PostgreSQLのUPDATEは「旧行を削除マーク+新行追加」として実装されるため、大量UPDATEの後はデッドタプルが大量発生します。バッチ完了後に <code>VACUUM ANALYZE テーブル名</code> を実行してデッドタプルを回収し統計情報も更新してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：集計テーブルの同期戦略</div>
<div class="column-body">
users.total_orders のような「集計値の非正規化列」を同期する戦略は大きく3つあります。①<strong>バッチ同期</strong>（今回のパターン）：定期的にUPDATE ... FROMで全件同期。シンプルだが最大N分のズレが生じる。②<strong>トリガー同期</strong>：ordersのINSERT/DELETEトリガーでインクリメント/デクリメント。リアルタイムだが複雑性が増す。③<strong>イベント駆動</strong>：注文作成APIが完了時にRedisカウンターをインクリメント、定期的にDBに反映。最も高スループットだが最も複雑。規模と要件に合った戦略を選択してください。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q9  DISTINCT vs GROUP BY — 重複除去の使い分けとパフォーマンス
══════════════════════════════════════════════════ */
{
  num: 9,
  title: "DISTINCT vs GROUP BY — 重複除去の使い分けとパフォーマンスの差",
  tags: [["r","DISTINCT"],["r","GROUP BY"],["o","重複除去"],["g","Sort/Hash"]],
  premise: `<p><strong>DISTINCT</strong> は全列の組み合わせが重複する行を除去します。<strong>GROUP BY</strong> はグループ化して集計します。「集計なしに重複を除去したい」場合は両方使えますが、内部処理と用途が異なります。</p>
<pre><span class="cmt">-- DISTINCT: 全列が同じ行を1行にまとめる</span>
<span class="kw">SELECT DISTINCT</span> user_id, status <span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- GROUP BY: グループ化して集計（集計なしの場合はDISTINCTと同等）</span>
<span class="kw">SELECT</span> user_id, status <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">GROUP BY</span> user_id, status;</pre>
<div class="callout warn"><strong>DISTINCTの問題点：</strong>SELECT * DISTINCT はテーブルの全列が比較対象になります。大きなテーブルで多数の列を持つ場合、比較コストが増大します。また「どの列の重複を除去したいのか」意図が不明確になりがちです。</div>`,
  question: `<p>以下の3つのシナリオで、<em>DISTINCT / GROUP BY / その他の書き方</em>のどれが最適か示してください。理由とパフォーマンスの観点も説明してください。</p>
<pre><span class="cmt">-- シナリオA: 注文を1件以上持つユーザーIDの一覧（重複なし）を取得</span>
<span class="kw">SELECT DISTINCT</span> user_id <span class="kw">FROM</span> <span class="tbl">orders</span>;   <span class="cmt">-- 現在の書き方</span>

<span class="cmt">-- シナリオB: ユーザーごとの注文件数と合計金額を集計</span>
<span class="kw">SELECT DISTINCT</span> user_id,                <span class="cmt">-- ❌ 集計にDISTINCTを使おうとしている</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> cnt,
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total
<span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- シナリオC: SELECT * でJOINした結果の重複を除去しようとしている</span>
<span class="kw">SELECT DISTINCT</span> u.<span class="op">*</span>
<span class="kw">FROM</span>      <span class="tbl">users</span>  u
<span class="kw">INNER JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id;</pre>`,
  output: `<p>各シナリオの推奨書き方：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>#</th><th class="tc-r">現在の書き方</th><th class="tc-g">推奨の書き方</th><th>理由</th></tr>
<tr class="tr-hi2"><td>A</td><td>SELECT DISTINCT user_id</td><td class="tc-g">GROUP BY または EXISTS</td><td>意図が明確</td></tr>
<tr class="tr-hi2"><td>B</td><td>SELECT DISTINCT + 集計関数</td><td class="tc-g">GROUP BY user_id</td><td>集計にはGROUP BY</td></tr>
<tr class="tr-hi2"><td>C</td><td>SELECT DISTINCT u.*（全列）</td><td class="tc-g">EXISTS サブクエリ</td><td>重複の根本原因を解消</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- シナリオA: 注文ありユーザーIDの一覧</span>
<span class="cmt">-- ① SELECT DISTINCT（現状・動作はするが意図が不明確）</span>
<span class="kw">SELECT DISTINCT</span> user_id          <span class="cmt">-- 全ordersを読んで重複除去 → Sort/Hash が発生</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>;

<span class="cmt">-- ② GROUP BY（DISTINCTと同等だが意図が明確）</span>
<span class="kw">SELECT</span>   user_id                 <span class="cmt">-- 【超基礎】取得する列</span>
<span class="kw">FROM</span>     <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> user_id;               <span class="cmt">-- 【超基礎】user_idごとに1行にまとめる（集計なし）</span>

<span class="cmt">-- ③ EXISTS（最も意図が明確・大規模では高速）</span>
<span class="kw">SELECT</span> user_id
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (                  <span class="cmt">-- 【超基礎】注文が1件でもあるかを確認</span>
    <span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> <span class="tbl">orders</span> o
    <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> users.user_id
);

<span class="cmt">-- シナリオB: 集計 → GROUP BY が唯一の正解</span>
<span class="cmt">-- ❌ DISTINCT + 集計関数（構文エラーになるかDISTINCTが無視される）</span>
<span class="cmt">-- ✅ GROUP BY で正しく書く</span>
<span class="kw">SELECT</span>
    user_id,
    <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> cnt,        <span class="cmt">-- 【超基礎】グループ内の行数をカウント</span>
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total        <span class="cmt">-- 【超基礎】グループ内の合計金額</span>
<span class="kw">FROM</span>     <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> user_id;               <span class="cmt">-- 【超基礎】user_idごとにグループ化して集計</span>

<span class="cmt">-- シナリオC: SELECT DISTINCT u.* はアンチパターン → EXISTS で書き直す</span>
<span class="cmt">-- ❌ 問題: u.* の全列で重複チェック → 比較コスト大 + 意図が不明確</span>
<span class="kw">SELECT</span> u.<span class="op">*</span>                      <span class="cmt">-- 注文ありユーザーのuserデータのみ取得</span>
<span class="kw">FROM</span>   <span class="tbl">users</span> u
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (                  <span class="cmt">-- ✅ JOINで行が増える根本原因を排除</span>
    <span class="kw">SELECT</span> <span class="num">1</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span> o
    <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- 【超基礎】注文が1件でも存在するか確認</span>
);

<span class="cmt">/*
  実行順序（シナリオB GROUP BY版）:
  1. FROM orders             → テーブル参照
  2. GROUP BY user_id        → user_idごとにグループ化
  3. COUNT / SUM             → グループごとに集計
  4. SELECT user_id, cnt, total → 結果を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>DISTINCT と GROUP BY の内部処理の違い</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方法</th><th>内部処理</th><th>コスト</th><th>用途</th></tr>
<tr class="tr-hi"><td>SELECT DISTINCT col</td><td>全行を読んでSort/Hashで重複除去</td><td class="tc-y">中（ソートコストあり）</td><td>単純な重複除去</td></tr>
<tr class="tr-hi2"><td>GROUP BY col</td><td>グループ化してから集計（集計なしでも使える）</td><td class="tc-y">中（同様）</td><td>集計 or 重複除去</td></tr>
<tr class="tr-hi3"><td>EXISTS サブクエリ</td><td>1件一致で即終了（Short-circuit）</td><td class="tc-g">低（最速の存在確認）</td><td>存在確認のみ</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">DISTINCTよりも「なぜ重複するか」の根本原因を解消するのが正しいアプローチ</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>シナリオCの行重複の原因：1対多JOINで行が増える</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>users行</th><th>orders行</th><th>INNER JOIN後の行数</th></tr>
<tr class="tr-hi2"><td>U001（田中）</td><td>2件</td><td class="tc-r">U001の行が2行になる</td></tr>
<tr class="tr-hi2"><td>U003（佐藤）</td><td>1件</td><td>1行（問題なし）</td></tr>
</table></div>
<p style="font-size:12px;margin-top:6px;color:var(--dim)">DISTINCTで後からまとめるのではなく、<span style="color:var(--green)">EXISTSで「注文が存在するか」だけ確認</span>することで行の重複自体を防ぐ。</p>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>DISTINCTは「取得した結果から重複を除去する」後処理です。GROUP BYは「グループ化して集計する」処理で、集計なしでもDISTINCTと同等の動作をします。「どの列の重複を除去したいか」を明確にするためにGROUP BYの方が意図が伝わりやすいケースが多いです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DISTINCTが発生するのは「設計の問題」：</strong>JOINして行が増えたからDISTINCTで除去する、というパターンは「結合の設計に問題がある」シグナルです。「相手テーブルのデータ列は不要で存在確認のみ」ならEXISTS、「集計値が必要」ならGROUP BY + 集計関数、という根本解決を検討してください。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>DISTINCT ON（PostgreSQL独自機能）：</strong>PostgreSQLには <code>SELECT DISTINCT ON (user_id) user_id, created_at FROM orders ORDER BY user_id, created_at DESC</code> のように「特定列の重複を除去しつつ他列は保持する」DISTINCT ONがあります。各ユーザーの最新注文1件を取得するようなTop-Nパターンに使えます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT DISTINCT * を多用する：</strong>全列の組み合わせで重複除去するDISTINCT *は、列数が多いほど比較コストが増大します。特にTEXT・JSONB列がある場合は非常に重くなります。「なぜ重複するか」の原因分析をせずDISTINCTで解決しようとするのはアンチパターンです。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BY の後にDISTINCTを付ける：</strong><code>SELECT DISTINCT user_id FROM orders GROUP BY user_id</code> のように GROUP BY の後に DISTINCT を付けるのは冗長です。GROUP BY の時点で user_id はすでに一意になっているため、DISTINCT は何もしません（二重のSort/Hashコストが発生する可能性がある）。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：DISTINCT が出てきたらSQLレビューのサイン</div>
<div class="column-body">
コードレビューでSQLに DISTINCT が出てきたら、チームで「なぜ重複が発生するのか」を確認するのが良い習慣です。多くの場合、<strong>①JOINの設計に問題がある（EXISTSで書き直せる）、②重複が発生しているなら GROUP BY を使うべき、③ DISTINCT ON で列を絞れる</strong>という3つのどれかに該当します。「DISTINCTは動作するが根本解決ではない」という認識を持つことで、より効率的なクエリ設計への改善が進みます。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q10  NULLと部分インデックス応用 — NULL制約のない列への高速検索
══════════════════════════════════════════════════ */
{
  num: 10,
  title: "NULLと部分インデックス応用 — IS NOT NULL 絞り込みを高速化する",
  tags: [["r","部分INDEX"],["r","IS NOT NULL"],["o","NULLスキップ"],["g","インデックスサイズ削減"]],
  premise: `<p>「NULLでない行だけを検索する」クエリはよくあるパターンです。通常のBTreeインデックスはNULLを含む全行を格納しますが、<strong>WHERE col IS NOT NULL 条件付きの部分インデックス</strong>を使うとNULL行をインデックスから除外でき、インデックスサイズを大幅に削減できます。</p>
<pre><span class="cmt">-- 通常のインデックス（NULLも含む全行）</span>
<span class="kw">CREATE INDEX</span> idx_users_email
    <span class="kw">ON</span> <span class="tbl">users</span> (email);            <span class="cmt">-- email=NULL の行もインデックスに含まれる</span>

<span class="cmt">-- 部分インデックス（NULLを除外）</span>
<span class="kw">CREATE INDEX</span> idx_users_email_notnull
    <span class="kw">ON</span> <span class="tbl">users</span> (email)
    <span class="kw">WHERE</span> email <span class="kw">IS NOT NULL</span>;      <span class="cmt">-- email=NULL の行をインデックスから除外</span></pre>
<div class="callout ok"><strong>適用シナリオ：</strong>NULLが多数存在する「任意項目」の列（メールアドレス・電話番号・外部ID等）。例えば1,000万件のうち100万件だけがemailを持つ場合、通常インデックスは1,000万行分ですが部分インデックスは100万行分になり1/10のサイズです。</div>`,
  question: `<p><code>users</code> テーブル（500万件）の <code>email</code> 列は任意項目でNULLが多数あります。メール登録済みユーザーを検索するクエリが遅い状況です。<em>部分インデックスで最適化</em>し、NULLが混在したデータに対するSQLのアンチパターンも合わせて示してください。</p>
<div class="data-section">
  <div class="data-label">usersテーブルの状況</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>email値</th><th>件数</th><th>割合</th></tr>
    <tr class="tr-hi"><td class="tc-g">値あり（登録済み）</td><td class="tc-y">50万件</td><td class="tc-y">10%</td></tr>
    <tr class="tr-dim"><td class="null">NULL（未登録）</td><td class="null">450万件</td><td class="null">90%</td></tr>
  </table></div>
</div>
<pre><span class="cmt">-- 遅いクエリ（emailが特定ドメインのユーザーを検索）</span>
<span class="kw">SELECT</span> user_id, name, email
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  email <span class="kw">IS NOT NULL</span>
  <span class="kw">AND</span>  email <span class="kw">LIKE</span> <span class="str">'%@example.com'</span>;</pre>`,
  output: `<p>emailが @example.com のユーザー（NULLは除外済み）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th class="tc-g">email</th></tr>
<tr class="tr-hi2"><td>U001</td><td>田中</td><td class="tc-g">tanaka@example.com</td></tr>
<tr class="tr-hi2"><td>U009</td><td>山田</td><td class="tc-g">yamada@example.com</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① IS NOT NULL の部分インデックスを作成（NULLの90%をインデックスから除外）</span>
<span class="kw">CREATE INDEX</span> idx_users_email_notnull
    <span class="kw">ON</span> <span class="tbl">users</span> (email)                    <span class="cmt">-- 【超基礎】emailでインデックスを作成</span>
    <span class="kw">WHERE</span> email <span class="kw">IS NOT NULL</span>;             <span class="cmt">-- ✅ emailがNULLでない行だけ（10%=50万件）</span>
<span class="cmt">-- 通常インデックス: 500万行分のエントリ
-- 部分インデックス:  50万行分のエントリ → サイズ1/10・キャッシュに乗りやすい</span>

<span class="cmt">-- ② クエリ（IS NOT NULLの条件がインデックス定義と一致 → 部分インデックスが発動）</span>
<span class="kw">SELECT</span>
    user_id,                              <span class="cmt">-- 【超基礎】必要な列を明示</span>
    name,
    email
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  email <span class="kw">IS NOT NULL</span>               <span class="cmt">-- ✅ 部分インデックスの条件と一致 → Index Scan 発動</span>
  <span class="kw">AND</span>  email <span class="kw">LIKE</span> <span class="str">'%@example.com'</span>;   <span class="cmt">-- ※LIKEの後方一致はBTreeでは効かない（trgm推奨）</span>

<span class="cmt">-- ③ IS NOT NULL + pg_trgm の組み合わせ（後方一致も高速化したい場合）</span>
<span class="kw">CREATE EXTENSION IF NOT EXISTS</span> pg_trgm;
<span class="kw">CREATE INDEX</span> idx_users_email_trgm
    <span class="kw">ON</span> <span class="tbl">users</span> <span class="kw">USING GIN</span> (email <span class="fn">gin_trgm_ops</span>)
    <span class="kw">WHERE</span> email <span class="kw">IS NOT NULL</span>;             <span class="cmt">-- 部分インデックス + GIN で後方一致も高速化</span>

<span class="cmt">-- ④ NULLに関するアンチパターン修正</span>
<span class="cmt">-- NG: NULLをIN句に含めると全件0件になる</span>
<span class="cmt">-- あるサブクエリが user_id の NULL を含む場合の罠</span>
<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">users</span>
<span class="kw">WHERE</span>  user_id <span class="kw">NOT IN</span> (
    <span class="kw">SELECT</span> blocked_user_id            <span class="cmt">-- blocked_user_id に NULL があると全件0件</span>
    <span class="kw">FROM</span>   <span class="tbl">blacklist</span>
);

<span class="cmt">-- OK: NOT EXISTS を使えばNULLに安全</span>
<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">users</span> u
<span class="kw">WHERE</span>  <span class="kw">NOT EXISTS</span> (               <span class="cmt">-- ✅ NULLが含まれていてもUNKNOWN行を無視して安全</span>
    <span class="kw">SELECT</span> <span class="num">1</span>
    <span class="kw">FROM</span>   <span class="tbl">blacklist</span> b
    <span class="kw">WHERE</span>  b.blocked_user_id <span class="op">=</span> u.user_id  <span class="cmt">-- NULLとの比較はUNKNOWN → 一致しない扱い → 安全</span>
);

<span class="cmt">/*
  実行順序（②のクエリ）:
  1. FROM users                    → テーブル参照
  2. 部分Index Scan（email notnull） → NULL除外済みの小さいインデックスで検索
  3. WHERE email IS NOT NULL       → インデックス条件と一致（重複フィルタ）
  4. AND email LIKE '%@example.com' → 部分一致フィルタ（BTreeでは効かない）
  5. SELECT user_id, name, email   → 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>通常インデックス vs 部分インデックスのサイズ比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>インデックス種別</th><th>格納される行</th><th>インデックスエントリ数</th><th>効果</th></tr>
<tr class="tr-hi"><td>CREATE INDEX idx ON users(email)</td><td class="tc-r">全500万件（NULL含む）</td><td class="tc-r">500万エントリ</td><td class="tc-r">大きい・キャッシュに乗りにくい</td></tr>
<tr class="tr-hi2"><td>CREATE INDEX ... WHERE email IS NOT NULL</td><td class="tc-g">50万件（非NULLのみ）</td><td class="tc-g">50万エントリ（1/10）</td><td class="tc-g">小さい・高速・省メモリ</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">NOT IN にNULLが混入するとSQL全体が意図しない動作になる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>NOT IN vs NOT EXISTS のNULL処理の違い</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>blacklistのblocked_user_id</th><th>NOT IN の結果</th><th>NOT EXISTS の結果</th></tr>
<tr class="tr-hi2"><td>(U005, U010)</td><td class="tc-g">正常（NULLなし）</td><td class="tc-g">正常</td></tr>
<tr class="tr-hi"><td>(U005, U010, <span class="tc-r">NULL</span>)</td><td class="tc-r">全件0件（バグ！）</td><td class="tc-g">正常（NULLを無視）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>SQLのNULLは「値が不明」を表すため、通常の比較演算子（= !=）では扱えません。<code>NULL = NULL</code> は TRUE ではなく UNKNOWN になります。NULLの判定には必ず <code>IS NULL</code> / <code>IS NOT NULL</code> を使ってください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>部分インデックスのNULL除外：</strong>「90%がNULL」のような疎な列にインデックスを張る場合、<code>WHERE col IS NOT NULL</code> の部分インデックスを使うことでインデックスサイズを1/10以下にできます。小さいインデックスはメモリのバッファキャッシュに乗りやすく、繰り返しアクセスでさらに高速になります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>NOT NULL制約とインデックスの設計：</strong>設計段階でNOT NULL制約を付けられる列には付けてください。NOT NULL制約があればNULL除外の部分インデックスは不要になり（全行が対象）、クエリの絞り込みも単純になります。「NULLを0やデフォルト値で代替できないか」を設計段階で検討することが、後のチューニングコストを下げます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BYやJOIN条件にNULLが含まれる列を使う：</strong>GROUP BY user_id でuser_idにNULLがある場合、全てのNULL行は「NULLというグループ」として1つのグループにまとめられます。これが意図した動作か確認し、必要なら <code>WHERE user_id IS NOT NULL</code> で事前除外してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>NULLの意味をテーブルで統一しない：</strong>あるカラムで「NULL=未設定」「NULL=無効」「NULL=対象外」など複数の意味でNULLを使うと、クエリが複雑になりバグの温床になります。NULLの意味を1つに決めてコメントやドキュメントで明示し、意味が複数必要な場合は別の列（status ENUM など）を用意してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：任意項目の設計とNULL戦略</div>
<div class="column-body">
ユーザー登録フォームの「任意入力項目」（電話番号・生年月日など）はNULLを使うか、空文字やデフォルト値を使うか、設計段階で決める必要があります。<strong>「入力されていないこと自体が意味を持つ」フィールドにはNULL、「必ず何かの値が入る（未入力=0や空文字）」フィールドにはNOT NULL制約＋デフォルト値</strong>というルールが実務での使い分けの基本です。また、NULL可能列でよく絞り込む場合は、今回のような部分インデックス（WHERE col IS NOT NULL）を設計段階で検討に含めておくと、データ量が増えてからのチューニングコストを大幅に削減できます。
</div>
</div>
`
}

/* ══════════════════════════════════════════════════
   UI Builder
══════════════════════════════════════════════════ */
function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 003</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();
</script>
