name: Auto Update Index HTML

on:
  push:
    branches:
      - main
    paths:
      - 'docs/files/**'
      - 'generate_index.sh'

jobs:
  update-index:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          chmod +x generate_index.sh
          ./generate_index.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/index.html
          
          # 差分がない場合は何もせず、差分がある場合のみ commit と push を実行する
          git diff --staged --quiet || (git commit -m "chore: auto-update index.html [skip ci]" && git push && echo "✅ index.html has been updated and pushed.")
