<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  CTE + GROUP BY — 日次売上サマリバッチ
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "CTE + GROUP BY — 日次売上サマリを集計してAPIに返す",
  tags: [["r","WITH"],["r","CTE"],["g","GROUP BY"],["o","日次バッチ"]],
  premise: `<p><strong>CTE（Common Table Expression）</strong>は <code>WITH 名前 AS (...)</code> の形式で定義する「一時的な名前付きクエリ」です。バッチ処理では「集計 → フィルタ → 整形」の3工程をCTEで分割するのが王道パターンです。</p>
<pre><span class="kw">WITH</span> <span class="tbl">集計名</span> <span class="kw">AS</span> (
  <span class="cmt">-- ① ここで集計（GROUP BY）を定義する</span>
  <span class="kw">SELECT</span> col1, <span class="fn">SUM</span>(col2) <span class="kw">AS</span> total
  <span class="kw">FROM</span>   <span class="tbl">テーブル名</span>
  <span class="kw">GROUP BY</span> col1         <span class="cmt">-- col1ごとにまとめて集計する</span>
)
<span class="cmt">-- ② 集計結果を使ってフィルタ・並び替え</span>
<span class="kw">SELECT</span> <span class="op">*</span>
<span class="kw">FROM</span>   <span class="tbl">集計名</span>
<span class="kw">WHERE</span>  total <span class="op">></span> <span class="num">10000</span>  <span class="cmt">-- 集計値（total）をWHEREで使えるのがCTEの強み</span>
<span class="kw">ORDER BY</span> col1;          <span class="cmt">-- 並び替え（ASCが省略されたデフォルト）</span></pre>
<div class="callout"><strong>なぜCTEを使うか：</strong>通常 <code>WHERE SUM(...)</code> は書けないので HAVING が必要ですが、CTEに切り出すと集計後の値を普通の列として扱えます。バッチSQLが長くなるほどCTEで「処理ステップを名前付けして分割」するメリットが増します。</div>`,
  question: `<p>以下の <code>orders</code> テーブルから、<em>日付（order_date）ごとの売上合計・注文件数・平均注文額</em> を集計してください。</p>
<p>さらに <em>合計売上が 50,000円以上の日のみ</em> を返し、合計売上の降順で並べること。<br>出力：order_date, total_sales, order_count, avg_order</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>order_date</th><th>amount</th></tr>
        <tr><td>1</td><td>2024-04-01</td><td>20000</td></tr>
        <tr><td>2</td><td>2024-04-01</td><td>35000</td></tr>
        <tr><td>3</td><td>2024-04-02</td><td>60000</td></tr>
        <tr><td>4</td><td>2024-04-02</td><td>15000</td></tr>
        <tr><td>5</td><td>2024-04-03</td><td>80000</td></tr>
        <tr><td>6</td><td>2024-04-03</td><td>40000</td></tr>
        <tr><td>7</td><td>2024-04-04</td><td>12000</td></tr>
        <tr><td>8</td><td>2024-04-04</td><td>18000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_date</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr class="tr-hi2"><td>2024-04-03</td><td class="tc-g">120000</td><td class="tc-hi">2</td><td class="tc-y">60000</td></tr>
<tr class="tr-hi"><td>2024-04-02</td><td class="tc-g">75000</td><td class="tc-hi">2</td><td class="tc-y">37500</td></tr>
<tr><td>2024-04-01</td><td class="tc-g">55000</td><td class="tc-hi">2</td><td class="tc-y">27500</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ 04-04 は合計30000円なので除外される</p>`,
  answer: `<pre><span class="cmt">-- CTEで日次集計を定義（WITH句は本体SELECTより前に書く）</span>
<span class="kw">WITH</span> <span class="tbl">daily_stats</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① orders テーブルを日付ごとに集計する</span>
  <span class="kw">SELECT</span>
    order_date,                           <span class="cmt">-- GROUP BY のキー（日付）</span>
    <span class="fn">SUM</span>(amount)   <span class="kw">AS</span> total_sales,        <span class="cmt">-- SUM: その日の売上合計</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)     <span class="kw">AS</span> order_count,        <span class="cmt">-- COUNT(*): 行数 = 注文件数</span>
    <span class="fn">AVG</span>(amount)   <span class="kw">AS</span> avg_order           <span class="cmt">-- AVG: 平均注文額（SUM/COUNTと同じ）</span>
  <span class="kw">FROM</span>      <span class="tbl">orders</span>                       <span class="cmt">-- FROM: どのテーブルから取るか</span>
  <span class="kw">GROUP BY</span>  order_date                   <span class="cmt">-- GROUP BY: order_dateが同じ行をまとめる</span>

)

<span class="cmt">-- ② CTEの結果にフィルタと並び替えを適用する（本体SELECT）</span>
<span class="kw">SELECT</span>
  order_date,
  total_sales,
  order_count,
  avg_order
<span class="kw">FROM</span>     <span class="tbl">daily_stats</span>                    <span class="cmt">-- CTE名をテーブルのように使う</span>
<span class="kw">WHERE</span>    total_sales <span class="op">>=</span> <span class="num">50000</span>           <span class="cmt">-- 集計値をWHEREで絞る（CTEのおかげで可能）</span>
<span class="kw">ORDER BY</span> total_sales <span class="kw">DESC</span>;             <span class="cmt">-- DESC: 降順（大きい順）</span>

<span class="cmt">/*
  実行順序:
  1. CTE daily_stats: FROM orders → GROUP BY order_date
                      → SUM / COUNT / AVG を日付ごとに計算
  2. 本体:            FROM daily_stats → WHERE total_sales >= 50000
  3. 本体:            ORDER BY total_sales DESC
  ★ WHERE の前に GROUP BY が実行される（GROUP BY → WHERE ではなく FROM → WHERE → GROUP BY の順）
  ★ ただしCTEの中の GROUP BY は CTEの外側から見ると「既に集計済み」なので
    外側の WHERE で集計値（total_sales）を直接フィルタできる
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>CTE daily_stats</strong> — orders を GROUP BY で日別集計</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_date</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr><td>2024-04-01</td><td class="tc-g">55000</td><td class="tc-hi">2</td><td class="tc-y">27500</td></tr>
<tr><td>2024-04-02</td><td class="tc-g">75000</td><td class="tc-hi">2</td><td class="tc-y">37500</td></tr>
<tr><td>2024-04-03</td><td class="tc-g">120000</td><td class="tc-hi">2</td><td class="tc-y">60000</td></tr>
<tr class="tr-dim"><td>2024-04-04</td><td class="tc-r">30000</td><td class="tc-hi">2</td><td class="tc-y">15000</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">WHERE total_sales >= 50000 で04-04（30000円）を除外</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>本体SELECT</strong> — フィルタ後を降順に並べる</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_date</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr class="tr-hi2"><td>2024-04-03</td><td class="tc-g">120000</td><td class="tc-hi">2</td><td class="tc-y">60000</td></tr>
<tr class="tr-hi"><td>2024-04-02</td><td class="tc-g">75000</td><td class="tc-hi">2</td><td class="tc-y">37500</td></tr>
<tr><td>2024-04-01</td><td class="tc-g">55000</td><td class="tc-hi">2</td><td class="tc-y">27500</td></tr>
</table></div>
</div>

<tr><td class="tc-y">HAVING</td><td>GROUP BY の直後に HAVING 節</td><td>HAVING 節が長くなる</td><td class="tc-y">○</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>SQLの実行順序（超基礎）：</strong>SELECT 文は書いた順ではなく <em>FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY</em> の順で実行されます。CTEを使うとこの流れが「CTE内部 → 外側クエリ」と明確に2層に分かれるため、処理の順番が視覚的にわかりやすくなります。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>COUNT(*) vs COUNT(col)：</strong><code>COUNT(*)</code> は NULL を含む全行を数えます。<code>COUNT(amount)</code> は amount が NULL の行を除いて数えます。注文件数のように「行の存在」を数える場合は <code>COUNT(*)</code> が正確です。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WHERE に集計関数を直接書く：</strong><code>WHERE SUM(amount) >= 50000</code> はエラーです。WHERE は GROUP BY より前に実行されるため集計値が存在しません。GROUP BY と同じクエリ内でフィルタするには <code>HAVING</code>、または今回のように CTE に切り出した外側の <code>WHERE</code> を使ってください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY を CTE の中に書く：</strong>CTE内の ORDER BY は多くのDB（PostgreSQL等）では意味がないか無視されます。並び替えは必ず外側の本体 SELECT で行ってください。</div></div>
</div>
`

<pre><span class="fn">LAG</span>(値の列, <span class="num">1</span>, <span class="num">0</span>) <span class="kw">OVER</span> (

  <span class="kw">ORDER BY</span>     順序列       <span class="cmt">-- この順序で「前の行」を決める</span>
) <span class="kw">AS</span> 前月値</pre>
<p>引数は <code>LAG(列, オフセット, デフォルト値)</code>。オフセット省略時は1（1行前）、デフォルト値は前の行がない場合（先頭行）に使われます。</p>
<div class="callout warn"><strong>OVER句とPARTITION BY：</strong>OVER()がウィンドウ関数を「行を消さずに計算する」のに必要。PARTITION BYを省略すると全行を1グループとして扱います。「カテゴリ別に前月比を計算したい」場合は <code>PARTITION BY category</code> のように指定します。</div>`,
  question: `<p>以下の <code>monthly_sales</code> テーブルから、各月の <em>前月売上・前月比の差額・前月比の増減率（%）</em> を計算してください。</p>

</table></div>`,
  answer: `<pre><span class="kw">WITH</span> <span class="tbl">sales_with_prev</span> <span class="kw">AS</span> (

<span class="cmt">/*

<pre><span class="kw">SELECT</span>
  category,
  <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'完了'</span> <span class="kw">THEN</span> <span class="num">1</span> <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> completed,
  <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'未完了'</span> <span class="kw">THEN</span> <span class="num">1</span> <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> pending

/* ══════════════════════════════════════════════════

{
  num: 6,
  title: "複数CTE連結 — RFMスコアでユーザーをセグメント分類するバッチ",
  tags: [["r","複数CTE"],["r","WITH"],["g","RFM"],["p","セグメント分類"]],
  premise: `<p><strong>複数のCTEをカンマ区切りで列挙</strong>すると、後のCTEが前のCTEを参照できるパイプライン構造を作れます。複雑なバッチ処理を「ステップ名付きの処理列」として整理できます。</p>
<pre><span class="kw">WITH</span>
<span class="tbl">step1</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span> user_id, <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> order_count
  <span class="kw">FROM</span> <span class="tbl">orders</span>
  <span class="kw">GROUP BY</span> user_id
),
<span class="tbl">step2</span> <span class="kw">AS</span> (               <span class="cmt">-- step1 を参照できる</span>
  <span class="kw">SELECT</span> <span class="op">*</span>,
    <span class="kw">CASE WHEN</span> order_count <span class="op">>=</span> <span class="num">5</span> <span class="kw">THEN</span> <span class="str">'優良'</span> <span class="kw">ELSE</span> <span class="str">'一般'</span> <span class="kw">END</span> <span class="kw">AS</span> segment
  <span class="kw">FROM</span> <span class="tbl">step1</span>
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">step2</span>;</pre>
<div class="callout"><strong>RFMとは：</strong>Recency（最終購買日）・Frequency（購買頻度）・Monetary（購買金額）の3指標でユーザーをスコアリングする手法。マーケティングのバッチ処理で非常に頻出です。</div>`,
  question: `<p>以下の <code>orders</code> テーブルから、各ユーザーの <em>R（最終購買からの日数）・F（購買回数）・M（購買金額合計）</em> を計算し、それぞれのスコア（1〜3）を付けて最終セグメントを分類してください。</p>
<p>基準日：2024-05-01。R: 30日以内=3, 60日以内=2, それ以外=1。F: 3回以上=3, 2回=2, 1回=1。M: 100000以上=3, 50000以上=2, それ以外=1。<br>出力：user_id, r_score, f_score, m_score, total_score, segment（total_score 8以上=VIP, 6以上=優良, それ以外=一般）</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>order_date</th><th>amount</th></tr>
        <tr><td>1</td><td>U01</td><td>2024-04-20</td><td>50000</td></tr>
        <tr><td>2</td><td>U01</td><td>2024-04-28</td><td>70000</td></tr>
        <tr><td>3</td><td>U01</td><td>2024-04-30</td><td>30000</td></tr>
        <tr><td>4</td><td>U02</td><td>2024-03-10</td><td>120000</td></tr>
        <tr><td>5</td><td>U02</td><td>2024-03-25</td><td>40000</td></tr>
        <tr><td>6</td><td>U03</td><td>2024-01-15</td><td>30000</td></tr>
        <tr><td>7</td><td>U04</td><td>2024-04-25</td><td>200000</td></tr>
        <tr><td>8</td><td>U04</td><td>2024-04-29</td><td>150000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th class="tc-hi">r_score</th><th class="tc-g">f_score</th><th class="tc-y">m_score</th><th class="tc-p">total_score</th><th>segment</th></tr>
<tr class="tr-hi2"><td>U04</td><td class="tc-hi">3</td><td class="tc-g">2</td><td class="tc-y">3</td><td class="tc-p">8</td><td class="tc-g">VIP</td></tr>
<tr class="tr-hi"><td>U01</td><td class="tc-hi">3</td><td class="tc-g">3</td><td class="tc-y">2</td><td class="tc-p">8</td><td class="tc-g">VIP</td></tr>
<tr><td>U02</td><td class="tc-hi">2</td><td class="tc-g">2</td><td class="tc-y">3</td><td class="tc-p">7</td><td class="tc-o">優良</td></tr>
<tr class="tr-dim"><td>U03</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-y">1</td><td class="tc-p">3</td><td class="tc-r">一般</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① ユーザーごとの生集計（R/F/Mの元データを計算）</span>
<span class="tbl">rfm_raw</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    <span class="cmt">-- R: 基準日 - 最終購買日の日数（小さいほど最近 = 良い）</span>
    <span class="str">'2024-05-01'</span> <span class="op">::</span><span class="fn">date</span> <span class="op">-</span> <span class="fn">MAX</span>(order_date)   <span class="kw">AS</span> recency_days, <span class="cmt">-- 日付の差（日数）</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)                                  <span class="kw">AS</span> frequency,    <span class="cmt">-- 購買回数</span>
    <span class="fn">SUM</span>(amount)                                <span class="kw">AS</span> monetary      <span class="cmt">-- 購買金額合計</span>
  <span class="kw">FROM</span>     <span class="tbl">orders</span>
  <span class="kw">GROUP BY</span> user_id                                              <span class="cmt">-- ユーザーごとに集計</span>
),

<span class="cmt">-- ② 各指標をスコア（1〜3）に変換</span>
<span class="tbl">rfm_scored</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    <span class="cmt">-- R スコア: 日数が少ない（最近）ほど高得点</span>
    <span class="kw">CASE</span>
      <span class="kw">WHEN</span> recency_days <span class="op"><=</span> <span class="num">30</span> <span class="kw">THEN</span> <span class="num">3</span>           <span class="cmt">-- 30日以内 → 3点</span>
      <span class="kw">WHEN</span> recency_days <span class="op"><=</span> <span class="num">60</span> <span class="kw">THEN</span> <span class="num">2</span>           <span class="cmt">-- 60日以内 → 2点</span>
      <span class="kw">ELSE</span> <span class="num">1</span>                                     <span class="cmt">-- それ以外 → 1点</span>
    <span class="kw">END</span> <span class="kw">AS</span> r_score,
    <span class="cmt">-- F スコア: 購買回数が多いほど高得点</span>
    <span class="kw">CASE</span>
      <span class="kw">WHEN</span> frequency <span class="op">>=</span> <span class="num">3</span> <span class="kw">THEN</span> <span class="num">3</span>               <span class="cmt">-- 3回以上 → 3点</span>
      <span class="kw">WHEN</span> frequency <span class="op">=</span>  <span class="num">2</span> <span class="kw">THEN</span> <span class="num">2</span>               <span class="cmt">-- 2回 → 2点</span>
      <span class="kw">ELSE</span> <span class="num">1</span>                                     <span class="cmt">-- 1回 → 1点</span>
    <span class="kw">END</span> <span class="kw">AS</span> f_score,
    <span class="cmt">-- M スコア: 購買金額が多いほど高得点</span>
    <span class="kw">CASE</span>
      <span class="kw">WHEN</span> monetary <span class="op">>=</span> <span class="num">100000</span> <span class="kw">THEN</span> <span class="num">3</span>           <span class="cmt">-- 10万以上 → 3点</span>
      <span class="kw">WHEN</span> monetary <span class="op">>=</span>  <span class="num">50000</span> <span class="kw">THEN</span> <span class="num">2</span>           <span class="cmt">-- 5万以上 → 2点</span>
      <span class="kw">ELSE</span> <span class="num">1</span>                                     <span class="cmt">-- それ以外 → 1点</span>
    <span class="kw">END</span> <span class="kw">AS</span> m_score
  <span class="kw">FROM</span> <span class="tbl">rfm_raw</span>                                 <span class="cmt">-- ①のCTE（rfm_raw）を参照</span>
)

<span class="cmt">-- ③ 合計スコアを算出してセグメントを決定</span>
<span class="kw">SELECT</span>
  user_id,
  r_score,
  f_score,
  m_score,
  r_score <span class="op">+</span> f_score <span class="op">+</span> m_score <span class="kw">AS</span> total_score,  <span class="cmt">-- R+F+Mの合計（最大9点）</span>
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> r_score <span class="op">+</span> f_score <span class="op">+</span> m_score <span class="op">>=</span> <span class="num">8</span> <span class="kw">THEN</span> <span class="str">'VIP'</span>    <span class="cmt">-- 8点以上 → VIP</span>
    <span class="kw">WHEN</span> r_score <span class="op">+</span> f_score <span class="op">+</span> m_score <span class="op">>=</span> <span class="num">6</span> <span class="kw">THEN</span> <span class="str">'優良'</span>   <span class="cmt">-- 6点以上 → 優良</span>
    <span class="kw">ELSE</span> <span class="str">'一般'</span>                                          <span class="cmt">-- それ以外 → 一般</span>
  <span class="kw">END</span> <span class="kw">AS</span> segment
<span class="kw">FROM</span>     <span class="tbl">rfm_scored</span>                                    <span class="cmt">-- ②のCTEを参照</span>
<span class="kw">ORDER BY</span> total_score <span class="kw">DESC</span>;                             <span class="cmt">-- 合計スコア降順で返す</span>

<span class="cmt">/*
  実行順序:
  1. CTE rfm_raw:    FROM orders → GROUP BY user_id
                     → MAX(order_date), COUNT(*), SUM(amount)
  2. CTE rfm_scored: FROM rfm_raw → CASE WHEN でR/F/Mを各1〜3点に変換
  3. 本体:           FROM rfm_scored → r+f+m で total_score → CASE WHEN でsegment
  4. 本体:           ORDER BY total_score DESC
  ★ CTE は上から順に定義し、後のCTEから前のCTEを参照できる（逆順は不可）
  ★ 複数CTEはWITH の後にカンマ区切りで列挙する
*/</span></pre>`,

<tr class="tr-hi"><td>G02</td><td>Hank</td><td class="tc-g">5500</td><td class="tc-hi">2</td></tr>
<tr class="tr-dim"><td>G02</td><td>Iris</td><td class="tc-g">4800</td><td class="tc-r">4→除外</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ G01のEve(7100)はDENSE_RANK=4なので除外。G02のIris(4800)はDENSE_RANK=3だが今回の出力例から除外</p>`,
  answer: `<pre><span class="kw">WITH</span> <span class="tbl">ranked_scores</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① ゲームごとにDENSE_RANKで順位を付ける</span>
  <span class="kw">SELECT</span>
    game_id,
    player_name,
    score,
    <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> game_id              <span class="cmt">-- ゲームごとに独立して順位を付ける</span>
      <span class="kw">ORDER BY</span>     score <span class="kw">DESC</span>          <span class="cmt">-- スコア降順（高い方が1位）</span>
    ) <span class="kw">AS</span> rank                           <span class="cmt">-- 同率は同順位、番号は飛ばさない</span>
  <span class="kw">FROM</span> <span class="tbl">game_scores</span>                     <span class="cmt">-- FROM: 元テーブル</span>

)

<span class="cmt">-- ② 3位以内（rank <= 3）を取り出す</span>
<span class="kw">SELECT</span>
  game_id,
  player_name,
  score,
  rank
<span class="kw">FROM</span>     <span class="tbl">ranked_scores</span>
<span class="kw">WHERE</span>    rank <span class="op"><=</span> <span class="num">3</span>                     <span class="cmt">-- DENSE_RANK が 3 以下の全員を返す</span>
<span class="kw">ORDER BY</span> game_id, rank, score <span class="kw">DESC</span>;  <span class="cmt">-- ゲーム→順位→スコア降順で並べる</span>

<span class="cmt">/*
  実行順序:
  1. CTE: FROM game_scores
          → DENSE_RANK() OVER(PARTITION BY game_id ORDER BY score DESC)
          → 各行に game_id 内での順位を付加
  2. 本体: FROM ranked_scores → WHERE rank <= 3
  3. 本体: ORDER BY game_id, rank, score DESC
  ★ DENSE_RANK: 同率は同順位、次の番号は飛ばさない（1,2,2,3,4...）
  ★ RANK:       同率は同順位、次の番号を飛ばす（1,2,2,4...）
  ★ ROW_NUMBER: 同率でも強制連番（1,2,3,4...）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>3種のランク関数の比較</strong> — G01を例に</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>player</th><th class="tc-g">score</th><th class="tc-hi">ROW_NUMBER</th><th class="tc-y">RANK</th><th class="tc-p">DENSE_RANK</th></tr>
<tr><td>Alice</td><td class="tc-g">9500</td><td class="tc-hi">1</td><td class="tc-y">1</td><td class="tc-p">1</td></tr>
<tr><td>Bob</td><td class="tc-g">8200</td><td class="tc-hi">2</td><td class="tc-y">2</td><td class="tc-p">2</td></tr>
<tr><td>Carol</td><td class="tc-g">8200</td><td class="tc-hi">3</td><td class="tc-y">2</td><td class="tc-p">2</td></tr>
<tr><td>Dave</td><td class="tc-g">7800</td><td class="tc-hi">4</td><td class="tc-y">4（3をスキップ）</td><td class="tc-p">3</td></tr>
<tr class="tr-dim"><td>Eve</td><td class="tc-g">7100</td><td class="tc-hi">5</td><td class="tc-y">5</td><td class="tc-p">4（除外）</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">DENSE_RANK <= 3 でフィルタ</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>WHERE rank &lt;= 3 の結果</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>game_id</th><th>player</th><th class="tc-g">score</th><th class="tc-p">DENSE_RANK</th><th>抽出結果</th></tr>
<tr class="tr-hi2"><td>G01</td><td>Alice</td><td class="tc-g">9500</td><td class="tc-p">1</td><td class="tc-g">✅ 抽出</td></tr>
<tr class="tr-hi"><td>G01</td><td>Bob</td><td class="tc-g">8200</td><td class="tc-p">2</td><td class="tc-g">✅ 抽出</td></tr>
<tr class="tr-hi"><td>G01</td><td>Carol</td><td class="tc-g">8200</td><td class="tc-p">2</td><td class="tc-g">✅ 抽出（同率2位）</td></tr>
<tr><td>G01</td><td>Dave</td><td class="tc-g">7800</td><td class="tc-p">3</td><td class="tc-g">✅ 抽出</td></tr>
<tr class="tr-dim"><td>G01</td><td>Eve</td><td class="tc-g">7100</td><td class="tc-r">4</td><td class="tc-r">❌ 除外</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DENSE_RANKを選ぶ基準：</strong>「3位タイが3人いたら全員表示、4位は除外」という要件には DENSE_RANK が最適です。RANK を使うと Bob/Carol が2位タイの後に Dave が「4位」になってしまい、<code>WHERE rank &lt;= 3</code> では Dave が除外されます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>PARTITION BY の省略：</strong>全データを通した総合ランキングが欲しい場合は PARTITION BY を書かずに <code>DENSE_RANK() OVER (ORDER BY score DESC)</code> とします。ゲーム別や商品カテゴリ別など「グループ内ランキング」は PARTITION BY を使います。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>同率を考慮せずROW_NUMBERで上位N件を取る：</strong>「同率2位が2人いるのに1人しか表示されない」という問題が発生します。要件が「上位N位タイ全員」なら必ず DENSE_RANK か RANK を使ってください。</div></div>
</div>
`
},

/* ══════════════════════════════════════════════════

{
  num: 8,
  title: "LEFT JOIN + COALESCE — 売上ゼロ月を含めた完全な月別レポートを作る",
  tags: [["r","LEFT JOIN"],["r","COALESCE"],["g","欠損補完"],["o","バッチレポート"]],
  premise: `<p>売上がない月のデータは <code>orders</code> テーブルに存在しません。しかし「売上0円の月も含めた月次レポート」が必要な場合があります。<strong>LEFT JOIN + COALESCE</strong> が王道パターンです。</p>
<pre><span class="kw">SELECT</span>
  m.month,
  <span class="fn">COALESCE</span>(s.total_sales, <span class="num">0</span>) <span class="kw">AS</span> total_sales  <span class="cmt">-- NULLなら0に置き換える</span>
<span class="kw">FROM</span>       <span class="tbl">months</span>        m        <span class="cmt">-- 全月リスト（マスタ）</span>
<span class="kw">LEFT JOIN</span>  <span class="tbl">sales_summary</span> s        <span class="cmt">-- 売上あり月のみ存在（NULLになる月あり）</span>
        <span class="kw">ON</span> m.month <span class="op">=</span> s.month;    <span class="cmt">-- 月で結合</span></pre>
<div class="callout warn"><strong>LEFT JOIN vs INNER JOIN：</strong>INNER JOINは両テーブルに一致する行のみ返す（売上ない月が消える）。LEFT JOINは左テーブルの全行を保ちつつ、右テーブルに一致がない場合はNULLを返します。COALESCEでNULLを0に変換するのが売上0補完の定番イディオムです。</div>`,
  question: `<p>2024年1月〜6月の全月について、<em>売上ゼロの月も含めて</em>月別集計レポートを作成してください。売上がない月は total_sales=0、order_count=0 とすること。</p>
<p>出力：month, total_sales, order_count</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（売上データ）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>order_month</th><th>amount</th></tr>
        <tr><td>1</td><td>2024-01</td><td>30000</td></tr>
        <tr><td>2</td><td>2024-01</td><td>50000</td></tr>
        <tr><td>3</td><td>2024-03</td><td>80000</td></tr>
        <tr><td>4</td><td>2024-05</td><td>40000</td></tr>
        <tr><td>5</td><td>2024-05</td><td>60000</td></tr>
        <tr><td>6</td><td>2024-06</td><td>90000</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ month_master（月マスタ）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>month</th></tr>
        <tr><td>2024-01</td></tr>
        <tr><td>2024-02</td></tr>
        <tr><td>2024-03</td></tr>
        <tr><td>2024-04</td></tr>
        <tr><td>2024-05</td></tr>
        <tr><td>2024-06</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th></tr>
<tr><td>2024-01</td><td class="tc-g">80000</td><td class="tc-hi">2</td></tr>
<tr class="tr-dim"><td>2024-02</td><td class="tc-r">0</td><td class="tc-r">0</td></tr>
<tr><td>2024-03</td><td class="tc-g">80000</td><td class="tc-hi">1</td></tr>
<tr class="tr-dim"><td>2024-04</td><td class="tc-r">0</td><td class="tc-r">0</td></tr>
<tr><td>2024-05</td><td class="tc-g">100000</td><td class="tc-hi">2</td></tr>
<tr><td>2024-06</td><td class="tc-g">90000</td><td class="tc-hi">1</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① orders を月ごとに集計（売上がある月のみ）</span>
<span class="tbl">monthly_agg</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    order_month,
    <span class="fn">SUM</span>(amount)   <span class="kw">AS</span> total_sales,          <span class="cmt">-- 月の売上合計</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)     <span class="kw">AS</span> order_count           <span class="cmt">-- 月の注文件数</span>
  <span class="kw">FROM</span>     <span class="tbl">orders</span>
  <span class="kw">GROUP BY</span> order_month                      <span class="cmt">-- 月ごとにまとめる</span>
)

<span class="cmt">-- ② 全月マスタに売上集計を LEFT JOIN（売上ゼロ月は NULL になる）</span>
<span class="kw">SELECT</span>
  m.month,
  <span class="fn">COALESCE</span>(a.total_sales,  <span class="num">0</span>) <span class="kw">AS</span> total_sales,  <span class="cmt">-- NULLなら0（売上ゼロ補完）</span>
  <span class="fn">COALESCE</span>(a.order_count, <span class="num">0</span>) <span class="kw">AS</span> order_count    <span class="cmt">-- NULLなら0（件数ゼロ補完）</span>
<span class="kw">FROM</span>       <span class="tbl">month_master</span> m                        <span class="cmt">-- 左テーブル: 全月リスト（基準）</span>
<span class="kw">LEFT JOIN</span>  <span class="tbl">monthly_agg</span>  a                        <span class="cmt">-- 右テーブル: 売上ありの月のみ</span>
        <span class="kw">ON</span> m.month <span class="op">=</span> a.order_month               <span class="cmt">-- 月で突合（一致しない月はNULL）</span>
<span class="kw">ORDER BY</span>   m.month;                              <span class="cmt">-- 月昇順で返す</span>

<span class="cmt">/*
  実行順序:
  1. CTE monthly_agg: FROM orders → GROUP BY order_month
                      → SUM / COUNT（売上ある月のみ: 4行）
  2. 本体:            FROM month_master LEFT JOIN monthly_agg ON month
                      → 左テーブル（6行）を基準、売上ない月はNULLで残る
  3. 本体:            COALESCE(NULL, 0) → 0 に置き換え
  4. 本体:            ORDER BY month
  ★ LEFT JOIN: 左テーブルの全行 + 右テーブルに一致する行（なければNULL）
  ★ COALESCE(x, y): x が NULL なら y を返す（NULL安全な置き換え）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>LEFT JOIN の動き</strong> — 全月マスタに売上を付加</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>m.month</th><th class="tc-g">a.total_sales</th><th class="tc-hi">a.order_count</th><th>結合状態</th></tr>
<tr><td>2024-01</td><td class="tc-g">80000</td><td class="tc-hi">2</td><td>✅ 一致あり</td></tr>
<tr class="tr-dim"><td>2024-02</td><td class="null">NULL</td><td class="null">NULL</td><td class="tc-r">❌ 一致なし（売上ゼロ月）</td></tr>
<tr><td>2024-03</td><td class="tc-g">80000</td><td class="tc-hi">1</td><td>✅ 一致あり</td></tr>
<tr class="tr-dim"><td>2024-04</td><td class="null">NULL</td><td class="null">NULL</td><td class="tc-r">❌ 一致なし（売上ゼロ月）</td></tr>
<tr><td>2024-05</td><td class="tc-g">100000</td><td class="tc-hi">2</td><td>✅ 一致あり</td></tr>
<tr><td>2024-06</td><td class="tc-g">90000</td><td class="tc-hi">1</td><td>✅ 一致あり</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">COALESCE(NULL, 0) で NULL → 0 に変換</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>JOIN の種類と結果行数の違い</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>JOINの種類</th><th>結果</th><th>用途</th></tr>
<tr class="tr-hi2"><td class="tc-g">LEFT JOIN</td><td class="tc-g">左テーブルの全6行（NULLあり）</td><td>欠損補完・ゼロ含む集計</td></tr>
<tr><td class="tc-hi">INNER JOIN</td><td class="tc-hi">売上ある4行のみ</td><td>両テーブルに存在するもの</td></tr>
<tr class="tr-dim"><td class="tc-y">RIGHT JOIN</td><td class="tc-y">右テーブルの全行</td><td>（LEFT JOINの逆、あまり使わない）</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>月マスタテーブルを用意するパターン：</strong>実務では <code>month_master</code> のようなマスタテーブルを作るか、<code>generate_series</code>（PostgreSQL）や <code>UNNEST</code>（BigQuery）で動的に月リストを生成します。「存在しないデータを0で埋める」バッチはこのパターンが基本です。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>COALESCE の多引数：</strong><code>COALESCE(a, b, c)</code> は左から順に評価してNULLでない最初の値を返します。<code>COALESCE(a.total_sales, 0)</code> は「total_sales がNULLなら0を返す」という意味です。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>INNER JOINで「0件月が消える」バグ：</strong>売上のない月を含めてレポートしたいのにINNER JOINを使うと、その月のデータが結果から消えます。「全期間で集計」「欠損なし」が要件なら必ずLEFT JOINを使ってください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>NULLを0に変換し忘れる：</strong>LEFT JOIN後のNULLを変換せずに集計すると、SUM(NULL)=NULL、NULL+数値=NULLになりAPIが意図しないNULLを返すことがあります。COALESCE で必ずデフォルト値を設定してください。</div></div>
</div>
`
},

  <span class="kw">PARTITION BY</span> user_id          <span class="cmt">-- ユーザーごとに独立</span>

<tr><td>U02</td><td class="tc-hi">2024-01-15</td><td class="tc-g">緑茶</td><td class="tc-y">2024-03-30</td><td class="tc-p">コーヒー</td></tr>

}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','基礎文法・概念',q.premise)}
      ${acc('❓','pill-green','問題','テーブルデータ付き',q.question)}
      ${acc('📊','pill-orange','出力例','期待する結果',q.output)}
      ${acc('✅','pill-red','模範回答','SQL（コメント付き）',q.answer)}
      ${acc('🔍','pill-purple','解説','変化の可視化＋学習ポイント',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
