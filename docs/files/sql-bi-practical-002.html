  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }

</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  WITH句（CTE）— 複数CTEで月次売上サマリを構造化
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "WITH句（CTE）— 複数CTEを連鎖させて月次売上サマリを構造化",
  tags: [["r","WITH / CTE"],["o","GROUP BY"],["g","集計"],["p","月次レポートAPI"]],
  premise: `<p><strong>CTE（Common Table Expression）</strong>は <code>WITH 名前 AS (SELECT ...)</code> で一時的な名前付き結果セットを定義する構文です。サブクエリをネストする代わりに、処理を段階的に分けて記述できます。</p>
<pre><span class="kw">WITH</span>
  cte1 <span class="kw">AS</span> (
    <span class="kw">SELECT</span> ...              <span class="cmt">-- 第1ステップ: 元データを加工</span>
  ),
  cte2 <span class="kw">AS</span> (
    <span class="kw">SELECT</span> ... <span class="kw">FROM</span> cte1  <span class="cmt">-- 第2ステップ: cte1を参照して追加加工</span>
  )
<span class="kw">SELECT</span> * <span class="kw">FROM</span> cte2;      <span class="cmt">-- 最終SELECT: cte2を参照して出力</span></pre>
<div class="callout"><strong>CTEを使う3つのメリット：</strong><br>
① 可読性 — ネストが深いサブクエリを「名前付き処理」として平坦化できる<br>
② 再利用 — 同じ集計を1度定義して複数箇所から参照できる<br>
③ デバッグ — CTEを1つずつ単独実行してデータを確認できる</div>
<p>実務では「まず売上集計 → 次に月ごとに集約 → 最後にフィルタ」のように<em>処理を3段階に分けて書く</em>パターンが多用されます。</p>`,
  question: `<p>以下の <code>orders</code> テーブルから、CTEを2段階使って<em>月次の売上合計・注文件数・顧客数をまとめたサマリ</em>を作成してください。</p>
<p>第1CTE：注文ごとに <code>order_month</code>（YYYY-MM形式）・<code>amount</code>を整理。第2CTE：月ごとに集計。最終SELECTで月順に出力します。</p>
<p>出力：order_month, total_amount, order_count, unique_customers</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>customer_id</th><th>order_date</th><th>amount</th><th>status</th></tr>
        <tr><td>1</td><td>C001</td><td>2024-01-05</td><td>12000</td><td>completed</td></tr>
        <tr><td>2</td><td>C002</td><td>2024-01-18</td><td>8500</td><td>completed</td></tr>
        <tr><td>3</td><td>C001</td><td>2024-02-03</td><td>15000</td><td>completed</td></tr>
        <tr><td>4</td><td>C003</td><td>2024-02-14</td><td>3200</td><td>cancelled</td></tr>
        <tr><td>5</td><td>C002</td><td>2024-02-20</td><td>9800</td><td>completed</td></tr>
        <tr><td>6</td><td>C004</td><td>2024-03-07</td><td>22000</td><td>completed</td></tr>
        <tr><td>7</td><td>C001</td><td>2024-03-15</td><td>5500</td><td>completed</td></tr>
        <tr><td>8</td><td>C003</td><td>2024-03-28</td><td>11000</td><td>completed</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th>total_amount</th><th>order_count</th><th>unique_customers</th></tr>
<tr><td>2024-01</td><td>20500</td><td>2</td><td>2</td></tr>
<tr><td>2024-02</td><td>28000</td><td>3</td><td>3</td></tr>
<tr><td>2024-03</td><td>38500</td><td>3</td><td>3</td></tr>
</table></div>
<p style="margin-top:8px;font-size:12px;color:var(--dim);">※ cancelled を含む全注文が集計対象（フィルタは第1CTEで任意に追加可能）</p>`,
  answer: `<pre><span class="kw">WITH</span>
  <span class="cmt">-- ① 第1CTE: 日付から「年月」文字列を生成し、必要カラムだけ取り出す</span>
  monthly_base <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
      <span class="fn">TO_CHAR</span>(order_date, <span class="str">'YYYY-MM'</span>) <span class="kw">AS</span> order_month, <span class="cmt">-- 日付型→年月文字列に変換</span>
      customer_id,                                     <span class="cmt">-- ユニーク顧客数の計算に使う</span>
      amount                                           <span class="cmt">-- 売上合計の計算に使う</span>
    <span class="kw">FROM</span> <span class="tbl">orders</span>                          <span class="cmt">-- 元テーブルを参照（全件）</span>
  ),

  <span class="cmt">-- ② 第2CTE: 月ごとに集約（monthly_baseを参照）</span>
  monthly_summary <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
      order_month,
      <span class="fn">SUM</span>(amount)                   <span class="kw">AS</span> total_amount,    <span class="cmt">-- 月内の売上を全件加算</span>
      <span class="fn">COUNT</span>(*)                      <span class="kw">AS</span> order_count,     <span class="cmt">-- NULL含む全行数をカウント</span>
      <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> customer_id)  <span class="kw">AS</span> unique_customers <span class="cmt">-- 重複を除いたユニーク顧客数</span>
    <span class="kw">FROM</span>  monthly_base                                    <span class="cmt">-- 第1CTEを参照（サブクエリ不要）</span>
    <span class="kw">GROUP BY</span> order_month                                  <span class="cmt">-- 同じ年月の行をひとまとめにする</span>
  )

<span class="cmt">-- ③ 最終SELECT: 月順に並べて出力</span>
<span class="kw">SELECT</span>
  order_month,
  total_amount,
  order_count,
  unique_customers
<span class="kw">FROM</span>  monthly_summary
<span class="kw">ORDER BY</span> order_month; <span class="cmt">-- YYYY-MM形式の文字列は辞書順＝時系列順になる</span>

<span class="cmt">/*
  ▼ SQL実行順序
  1. WITH monthly_base     → ordersを全件読み込み、TO_CHARで年月文字列を生成
  2. WITH monthly_summary  → monthly_baseをorder_monthでGROUP BY集計（8行→3行）
  3. SELECT ... FROM       → monthly_summaryの全列を選択
  4. ORDER BY order_month  → 月の昇順でソートして出力
  ★ CTEは SELECT 実行前に評価される。依存関係の順に上から定義すること。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>第1CTE: monthly_base</strong> — TO_CHAR で日付を年月に変換（行数は変わらず8行）</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id（元）</th><th>order_date（元）</th><th class="tc-hi">order_month（生成）</th><th>customer_id</th><th>amount</th></tr>
<tr><td>1</td><td>2024-01-05</td><td class="tc-hi">2024-01</td><td>C001</td><td>12000</td></tr>
<tr><td>2</td><td>2024-01-18</td><td class="tc-hi">2024-01</td><td>C002</td><td>8500</td></tr>
<tr><td>3</td><td>2024-02-03</td><td class="tc-hi">2024-02</td><td>C001</td><td>15000</td></tr>

{

  tags: [["r","NTILE"],["o","顧客分析"],["g","セグメント"],["p","CRM・マーケ"]],
  premise: `<p><strong>NTILE(n)</strong> は ORDER BY で並べた行を n 等分し、各行に 1〜n のグループ番号を割り当てるウィンドウ関数です。顧客ランク・商品グレード・スコアの四分位分類に使います。</p>
<pre><span class="fn">NTILE</span>(<span class="num">4</span>) <span class="kw">OVER</span> (
  <span class="kw">ORDER BY</span> total_amount <span class="kw">DESC</span>  <span class="cmt">-- 金額降順で並べて4等分する</span>
) <span class="kw">AS</span> quartile               <span class="cmt">-- 1=最上位グループ 〜 4=最下位グループ</span></pre>
<div class="callout"><strong>行数が割り切れない場合：</strong><br>
全体の行数が n で割り切れないとき、余り分は先頭グループに1行ずつ多く割り当てられます。<br>
例：13行を4分位 → グループ1〜3が4行、グループ4が1行</div>
<p>CRMでは <em>「購入金額上位25%=VIPセグメント（Tier1）」</em>のように四分位で顧客セグメントを自動分類し、キャンペーン対象を絞るのが定番パターンです。</p>`,
  question: `<p><code>customers</code>テーブルに顧客ごとの累計購入金額が入っています。NTILE(4) で顧客を購入金額降順に4分位へ分類し、各グループのセグメント名（1=VIP, 2=ゴールド, 3=シルバー, 4=ブロンズ）を付与してください。</p>
<p>さらに最終SELECTではセグメントごとの顧客数・合計金額・平均金額をまとめてください。</p>

  output: `<div class="tbl-wrap"><table class="vtbl">

</table></div>`,
  answer: `<pre><span class="kw">WITH</span>
  <span class="cmt">-- ① 顧客ごとにNTILEで4分位グループ番号を付与する</span>
  ranked <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
      customer_id,
      customer_name,
      total_amount,
      <span class="fn">NTILE</span>(<span class="num">4</span>) <span class="kw">OVER</span> (
        <span class="kw">ORDER BY</span> total_amount <span class="kw">DESC</span>  <span class="cmt">-- 金額が多い順に並べる（DESCで降順）</span>
      ) <span class="kw">AS</span> quartile                  <span class="cmt">-- 1〜4の整数が各行に割り当てられる</span>
    <span class="kw">FROM</span> <span class="tbl">customers</span>
  ),

  <span class="cmt">-- ② グループ番号をわかりやすいセグメント名に変換する</span>
  segmented <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
      customer_id,
      total_amount,
      <span class="kw">CASE</span> quartile               <span class="cmt">-- CASEはif-elseに相当する条件分岐</span>
        <span class="kw">WHEN</span> <span class="num">1</span> <span class="kw">THEN</span> <span class="str">'VIP'</span>
        <span class="kw">WHEN</span> <span class="num">2</span> <span class="kw">THEN</span> <span class="str">'ゴールド'</span>
        <span class="kw">WHEN</span> <span class="num">3</span> <span class="kw">THEN</span> <span class="str">'シルバー'</span>
        <span class="kw">WHEN</span> <span class="num">4</span> <span class="kw">THEN</span> <span class="str">'ブロンズ'</span>
      <span class="kw">END</span> <span class="kw">AS</span> segment
    <span class="kw">FROM</span> ranked
  )

<span class="cmt">-- ③ セグメント別に集計してサマリを出力する</span>
<span class="kw">SELECT</span>
  segment,
  <span class="fn">COUNT</span>(*)                      <span class="kw">AS</span> customer_count, <span class="cmt">-- 各グループの顧客数</span>

  <span class="fn">ROUND</span>(<span class="fn">AVG</span>(total_amount), <span class="num">0</span>)  <span class="kw">AS</span> avg_amount      <span class="cmt">-- グループ内の平均金額</span>
<span class="kw">FROM</span> segmented
<span class="kw">GROUP BY</span> segment
<span class="kw">ORDER BY</span>                           <span class="cmt">-- 文字列順ではなく上位セグメントから並べる</span>
  <span class="kw">CASE</span> segment
    <span class="kw">WHEN</span> <span class="str">'VIP'</span>     <span class="kw">THEN</span> <span class="num">1</span>
    <span class="kw">WHEN</span> <span class="str">'ゴールド'</span> <span class="kw">THEN</span> <span class="num">2</span>
    <span class="kw">WHEN</span> <span class="str">'シルバー'</span> <span class="kw">THEN</span> <span class="num">3</span>
    <span class="kw">WHEN</span> <span class="str">'ブロンズ'</span> <span class="kw">THEN</span> <span class="num">4</span>
  <span class="kw">END</span>;

<span class="cmt">/*
  ▼ SQL実行順序
  1. WITH ranked     → NTILE(4)で顧客8名を金額降順に4グループに分類
  2. WITH segmented  → CASE式でグループ番号（1-4）をセグメント名に変換
  3. GROUP BY segment→ セグメント名でまとめて COUNT/SUM/AVG を集計
  4. ORDER BY CASE   → 文字列のアルファベット順ではなく、独自の並び順を定義
  ★ NTILEは具体的な境界値を指定せず、常に「全体の上位n%」を自動特定できる強み。
*/</span></pre>`,

/* ══════════════════════════════════════════════════
   Q5  再帰CTE — カテゴリ階層ツリーの全展開
══════════════════════════════════════════════════ */
{
  num: 5,
  title: "再帰CTE — 親子テーブルからカテゴリ階層を全展開してパスを生成",
  tags: [["r","再帰CTE"],["o","WITH RECURSIVE"],["g","階層構造"],["p","カテゴリAPI"]],
  premise: `<p><strong>再帰CTE（WITH RECURSIVE）</strong>は「ベースケース」と「再帰ステップ」をUNION ALLで結合し、親子関係を持つ階層データを再帰的に展開するテクニックです。</p>
<pre><span class="kw">WITH RECURSIVE</span> hier <span class="kw">AS</span> (
  <span class="cmt">-- ① アンカー（起点）: ルート行から開始する</span>
  <span class="kw">SELECT</span> id, name, parent_id, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span> <span class="tbl">categories</span> <span class="kw">WHERE</span> parent_id <span class="kw">IS NULL</span>

  <span class="kw">UNION ALL</span>

  <span class="cmt">-- ② 再帰ステップ: hierを参照して子行を追加（一致行がなくなるまで繰り返す）</span>
  <span class="kw">SELECT</span> c.id, c.name, c.parent_id, h.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span> <span class="tbl">categories</span> c
  <span class="kw">JOIN</span> hier h <span class="kw">ON</span> c.parent_id <span class="op">=</span> h.id
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> hier;</pre>
<div class="callout warn"><strong>PostgreSQL では</strong> <code>WITH RECURSIVE</code> が必須。BigQuery は 2023〜対応。MySQL 8.0以降対応。再帰の終了条件は「JOIN で一致する行がなくなった時点」。</div>`,
  question: `<p><code>categories</code>テーブルに商品カテゴリの親子関係が格納されています。再帰CTEを使って <em>全階層を展開し、ルートから各カテゴリまでの「フルパス」</em>（例：家電 &gt; PC &gt; ノートPC）を生成してください。</p>
<p>出力：category_id, category_name, depth（0始まり）, full_path</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ categories</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>category_id</th><th>category_name</th><th>parent_id</th></tr>
        <tr><td>1</td><td>家電</td><td class="null">NULL</td></tr>
        <tr><td>2</td><td>PC</td><td>1</td></tr>
        <tr><td>3</td><td>スマートフォン</td><td>1</td></tr>
        <tr><td>4</td><td>ノートPC</td><td>2</td></tr>
        <tr><td>5</td><td>デスクトップPC</td><td>2</td></tr>
        <tr><td>6</td><td>Android</td><td>3</td></tr>
        <tr><td>7</td><td>iPhone</td><td>3</td></tr>
        <tr><td>8</td><td>ゲーミングノート</td><td>4</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>category_id</th><th>category_name</th><th>depth</th><th>full_path</th></tr>
<tr><td>1</td><td>家電</td><td>0</td><td>家電</td></tr>
<tr><td>2</td><td>PC</td><td>1</td><td>家電 &gt; PC</td></tr>
<tr><td>3</td><td>スマートフォン</td><td>1</td><td>家電 &gt; スマートフォン</td></tr>
<tr><td>4</td><td>ノートPC</td><td>2</td><td>家電 &gt; PC &gt; ノートPC</td></tr>
<tr><td>5</td><td>デスクトップPC</td><td>2</td><td>家電 &gt; PC &gt; デスクトップPC</td></tr>
<tr><td>6</td><td>Android</td><td>2</td><td>家電 &gt; スマートフォン &gt; Android</td></tr>
<tr><td>7</td><td>iPhone</td><td>2</td><td>家電 &gt; スマートフォン &gt; iPhone</td></tr>
<tr><td>8</td><td>ゲーミングノート</td><td>3</td><td>家電 &gt; PC &gt; ノートPC &gt; ゲーミングノート</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH RECURSIVE</span>
  category_tree <span class="kw">AS</span> (

    <span class="cmt">-- ① アンカー: ルートカテゴリ（親がないカテゴリ）を起点にする</span>
    <span class="kw">SELECT</span>
      category_id,
      category_name,
      parent_id,
      <span class="num">0</span>             <span class="kw">AS</span> depth,       <span class="cmt">-- 階層の深さ: ルートは0からスタート</span>
      category_name <span class="kw">AS</span> full_path     <span class="cmt">-- パス: ルートはカテゴリ名のみ</span>
    <span class="kw">FROM</span> <span class="tbl">categories</span>
    <span class="kw">WHERE</span> parent_id <span class="kw">IS NULL</span>          <span class="cmt">-- NULL = 親を持たないルートノード</span>

    <span class="kw">UNION ALL</span>                        <span class="cmt">-- アンカーと再帰ステップの結果を積み上げる</span>

    <span class="cmt">-- ② 再帰ステップ: category_treeの行に子カテゴリを1階層ずつ追加</span>
    <span class="kw">SELECT</span>
      c.category_id,
      c.category_name,
      c.parent_id,
      ct.depth <span class="op">+</span> <span class="num">1</span>,                           <span class="cmt">-- 親の深さ+1が子の深さになる</span>
      ct.full_path <span class="op">||</span> <span class="str">' > '</span> <span class="op">||</span> c.category_name  <span class="cmt">-- || は文字列連結演算子（PostgreSQL）</span>
    <span class="kw">FROM</span>  <span class="tbl">categories</span>    c               <span class="cmt">-- c: 子カテゴリ側のテーブル</span>
    <span class="kw">JOIN</span>  category_tree  ct             <span class="cmt">-- ct: 再帰CTEを自己参照する</span>
      <span class="kw">ON</span> c.parent_id <span class="op">=</span> ct.category_id  <span class="cmt">-- 子のparent_id = 親のcategory_id で結合</span>
  )

<span class="kw">SELECT</span>
  category_id,
  category_name,
  depth,
  full_path
<span class="kw">FROM</span> category_tree
<span class="kw">ORDER BY</span> full_path;  <span class="cmt">-- パスの辞書順でツリー構造に近い並びになる</span>

<span class="cmt">/*
  ▼ SQL実行順序（再帰の繰り返し）
  1. アンカー実行    → id=1（家電）の1行のみ
  2. 再帰ステップ①  → id=2（PC）, id=3（スマホ）を追加
  3. 再帰ステップ②  → id=4,5（PC子）, id=6,7（スマホ子）を追加
  4. 再帰ステップ③  → id=8（ゲーミングノート）を追加
  5. 再帰ステップ④  → JOINで一致する子行なし → 再帰終了
  6. 全ステップの結果をUNION ALLで積み上げて8行を出力
  ★ 循環参照（A→B→A）があると無限ループになる。depth < 10 などの上限を安全策に追加する。
*/</span></pre>`,

<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>再帰の繰り返し</strong> — アンカー→再帰ステップで行が積み上がる</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ステップ</th><th>追加される行</th><th>depth</th><th class="tc-hi">full_path（生成）</th></tr>
<tr class="tr-hi"><td>アンカー</td><td>家電（id=1）</td><td>0</td><td class="tc-hi">家電</td></tr>
<tr class="tr-hi2"><td>再帰①</td><td>PC（id=2）</td><td>1</td><td class="tc-hi">家電 &gt; PC</td></tr>
<tr class="tr-hi2"><td>再帰①</td><td>スマートフォン（id=3）</td><td>1</td><td class="tc-hi">家電 &gt; スマートフォン</td></tr>
<tr class="tr-hi3"><td>再帰②</td><td>ノートPC（id=4）</td><td>2</td><td class="tc-hi">家電 &gt; PC &gt; ノートPC</td></tr>
<tr class="tr-hi3"><td>再帰②</td><td>Android（id=6）</td><td>2</td><td class="tc-hi">家電 &gt; スマートフォン &gt; Android</td></tr>
<tr class="tr-hi4"><td>再帰③</td><td>ゲーミングノート（id=8）</td><td>3</td><td class="tc-hi">家電 &gt; PC &gt; ノートPC &gt; ゲーミングノート</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>再帰CTEが必要な場面：</strong>カテゴリ階層・組織ツリー・フォルダ構造・部品展開（BOM）など、<em>深さが可変の親子構造</em>を展開するときに使う。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>|| 演算子（文字列連結）：</strong>PostgreSQL/BigQueryでは <code>||</code> で文字列を連結する。MySQLでは <code>CONCAT()</code> 関数を使う。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>循環参照への無対策：</strong>データに A→B→A のような循環があると再帰が終了しタイムアウトする。<code>WHERE depth &lt; 20</code> などの上限を再帰ステップに追加する。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>UNION（重複削除）を使う：</strong>UNION ALL の代わりに UNION を使うと毎ステップで重複チェックが走り非常に遅くなる。再帰CTEでは UNION ALL を使う。</div></div>
</div>`
},

{

  premise: `<p>SQLには専用のPIVOT構文がない（標準SQLの場合）ため、<strong>CASE式の中で集計関数を使う</strong>「条件付き集計（Conditional Aggregation）」でクロス集計テーブルを作ります。</p>
<pre><span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'食品'</span> <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> food_sales,
<span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'家電'</span> <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> electronics_sales</pre>
<div class="callout"><strong>仕組み：</strong>CASE WHEN で「特定カテゴリのときだけ金額を返し、それ以外は0」にすることで、GROUP BY した行の中でカテゴリ別の合計が列方向に展開されます。</div>`,
  question: `<p><code>sales</code>テーブルには注文日・カテゴリ・売上金額が格納されています。<em>月×カテゴリのクロス集計テーブル</em>（ピボット）を作成してください。</p>

<div class="data-section">

        <tr><td>3</td><td>2024-01-25</td><td>衣類</td><td>12000</td></tr>
        <tr><td>4</td><td>2024-02-05</td><td>食品</td><td>22000</td></tr>
        <tr><td>5</td><td>2024-02-12</td><td>家電</td><td>35000</td></tr>
        <tr><td>6</td><td>2024-02-18</td><td>食品</td><td>8000</td></tr>
        <tr><td>7</td><td>2024-03-03</td><td>衣類</td><td>19000</td></tr>
        <tr><td>8</td><td>2024-03-15</td><td>家電</td><td>62000</td></tr>
        <tr><td>9</td><td>2024-03-22</td><td>食品</td><td>11000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th>food_sales</th><th>electronics_sales</th><th>clothing_sales</th><th>monthly_total</th></tr>
<tr><td>2024-01</td><td>15000</td><td>48000</td><td>12000</td><td>75000</td></tr>
<tr><td>2024-02</td><td>30000</td><td>35000</td><td>0</td><td>65000</td></tr>
<tr><td>2024-03</td><td>11000</td><td>62000</td><td>19000</td><td>92000</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  <span class="fn">TO_CHAR</span>(order_date, <span class="str">'YYYY-MM'</span>) <span class="kw">AS</span> order_month, <span class="cmt">-- 日付を年月文字列に変換する</span>

  <span class="cmt">-- ① 食品カテゴリの列: 食品のときだけamountを集計、それ以外は0</span>
  <span class="fn">SUM</span>(
    <span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'食品'</span>
      <span class="kw">THEN</span> amount
      <span class="kw">ELSE</span> <span class="num">0</span>            <span class="cmt">-- 食品以外は0として加算（存在しない月は自動的に0になる）</span>
    <span class="kw">END</span>
  ) <span class="kw">AS</span> food_sales,

  <span class="cmt">-- ② 家電カテゴリの列</span>
  <span class="fn">SUM</span>(
    <span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'家電'</span>
      <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span>
    <span class="kw">END</span>
  ) <span class="kw">AS</span> electronics_sales,

  <span class="cmt">-- ③ 衣類カテゴリの列</span>
  <span class="fn">SUM</span>(
    <span class="kw">CASE WHEN</span> category <span class="op">=</span> <span class="str">'衣類'</span>
      <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span>
    <span class="kw">END</span>
  ) <span class="kw">AS</span> clothing_sales,

  <span class="cmt">-- ④ 月合計: CASE条件なしのSUM（全カテゴリをそのまま合計）</span>
  <span class="fn">SUM</span>(amount) <span class="kw">AS</span> monthly_total

<span class="kw">FROM</span>  <span class="tbl">sales</span>
<span class="kw">GROUP BY</span> <span class="fn">TO_CHAR</span>(order_date, <span class="str">'YYYY-MM'</span>) <span class="cmt">-- GROUP BY にも同じ関数式を書く</span>

<span class="cmt">/*
  ▼ SQL実行順序
  1. FROM sales                       → テーブルを全件読み込む（9行）
  2. GROUP BY TO_CHAR(order_date,...) → 年月でグループ化（9行→3行）
  3. SUM(CASE WHEN category = ...)    → グループ内でカテゴリ別に合計する
  4. SUM(amount)                      → 全カテゴリの合計（月合計）
  5. ORDER BY order_month             → 月順でソート
  ★ CASE WHEN...ELSE 0 にすることで、そのカテゴリが存在しない月でも0を保証できる。
    ELSE を省略すると ELSE NULL になり SUM が正しく動作するが、意図を明示するために 0 を推奨。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>GROUP BY 前の縦長テーブル</strong> — CASE式でカテゴリを列に振り分ける</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th>category</th><th>amount</th><th class="tc-hi">CASE(食品)</th><th class="tc-g">CASE(家電)</th><th class="tc-p">CASE(衣類)</th></tr>
<tr><td>2024-01</td><td>食品</td><td>15000</td><td class="tc-hi">15000</td><td class="tc-g">0</td><td class="tc-p">0</td></tr>
<tr><td>2024-01</td><td>家電</td><td>48000</td><td class="tc-hi">0</td><td class="tc-g">48000</td><td class="tc-p">0</td></tr>
<tr><td>2024-01</td><td>衣類</td><td>12000</td><td class="tc-hi">0</td><td class="tc-g">0</td><td class="tc-p">12000</td></tr>
<tr><td>2024-02</td><td>食品</td><td>22000</td><td class="tc-hi">22000</td><td class="tc-g">0</td><td class="tc-p">0</td></tr>
<tr><td>2024-02</td><td>家電</td><td>35000</td><td class="tc-hi">0</td><td class="tc-g">35000</td><td class="tc-p">0</td></tr>
<tr><td>2024-02</td><td>食品</td><td>8000</td><td class="tc-hi">8000</td><td class="tc-g">0</td><td class="tc-p">0</td></tr>

</div>
<div class="arrow">↓ <span class="arrow-text">GROUP BY order_month + SUM() → 月ごとに各列を縦方向に合算</span></div>
<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-hi">food_sales</th><th class="tc-g">electronics</th><th class="tc-p">clothing</th><th class="tc-y">monthly_total</th></tr>
<tr><td>2024-01</td><td class="tc-hi">15000</td><td class="tc-g">48000</td><td class="tc-p">12000</td><td class="tc-y">75000</td></tr>
<tr><td>2024-02</td><td class="tc-hi">30000（22000+8000）</td><td class="tc-g">35000</td><td class="tc-p">0（該当なし）</td><td class="tc-y">65000</td></tr>
<tr><td>2024-03</td><td class="tc-hi">11000</td><td class="tc-g">62000</td><td class="tc-p">19000</td><td class="tc-y">92000</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ELSE 0 vs ELSE NULL：</strong>ELSE を省略すると ELSE NULL と同じ。SUM() は NULL を無視するので合計に影響しないが、<em>ELSE 0 と明示するほうがコードの意図が明確</em>で保守しやすい。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>FILTER 句（PostgreSQL）：</strong><code>SUM(amount) FILTER (WHERE category = '食品')</code> はCASEと同じ結果をより簡潔に書ける構文。PostgreSQL環境では積極的に使う。</div></div>

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
{
  num: 7,
  title: "NOT EXISTS + CTE — 特定期間未購入の顧客を抽出してLTV分析",
  tags: [["r","NOT EXISTS"],["o","CTE"],["g","離脱検知"],["p","CRM・リテンション"]],
  premise: `<p><strong>NOT EXISTS</strong> はサブクエリが0行を返す場合に TRUE となる存在確認演算子です。「特定条件を満たす行が存在しない顧客を取り出す」のに使います。</p>
<pre><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="tbl">customers</span> c
<span class="kw">WHERE</span> <span class="kw">NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span>           <span class="cmt">-- SELECT 1: 値は何でもよい。行が「存在するか」だけを確認する</span>
  <span class="kw">FROM</span>   <span class="tbl">orders</span> o
  <span class="kw">WHERE</span>  o.customer_id <span class="op">=</span> c.customer_id  <span class="cmt">-- 外部参照（相関サブクエリ）</span>
  <span class="kw">AND</span>    o.order_date <span class="op">>=</span> <span class="str">'2024-03-01'</span>
);</pre>
<div class="callout"><strong>NOT IN との違い（重要）：</strong><br>
<code>NOT IN (SELECT ...)</code> はサブクエリに NULL が1件でも含まれると全件が FALSE になるバグがある。<br>
<strong>NOT EXISTS は NULL に安全</strong>なので実務では NOT IN より NOT EXISTS を推奨。</div>`,
  question: `<p><code>customers</code>・<code>orders</code> テーブルを使って、<em>直近3か月（2024年2月以降）に購入がない離脱リスク顧客</em>を抽出し、その顧客の累計購入金額（LTV）と最終購入日も出力してください。</p>
<p>出力：customer_id, customer_name, total_ltv, last_order_date</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ customers</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>customer_id</th><th>customer_name</th></tr>
        <tr><td>C001</td><td>田中</td></tr>
        <tr><td>C002</td><td>佐藤</td></tr>
        <tr><td>C003</td><td>山田</td></tr>
        <tr><td>C004</td><td>鈴木</td></tr>

      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>customer_id</th><th>order_date</th><th>amount</th></tr>
        <tr><td>1</td><td>C001</td><td>2024-01-05</td><td>12000</td></tr>
        <tr><td>2</td><td>C001</td><td>2024-03-15</td><td>8500</td></tr>
        <tr><td>3</td><td>C002</td><td>2023-11-20</td><td>45000</td></tr>
        <tr><td>4</td><td>C002</td><td>2024-01-10</td><td>22000</td></tr>
        <tr><td>5</td><td>C003</td><td>2024-02-28</td><td>15000</td></tr>
        <tr><td>6</td><td>C004</td><td>2023-12-05</td><td>78000</td></tr>
        <tr><td>7</td><td>C005</td><td>2024-01-30</td><td>9500</td></tr>
        <tr><td>8</td><td>C005</td><td>2024-03-01</td><td>6000</td></tr>
      </table></div>
    </div>
  </div>

  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>customer_id</th><th>customer_name</th><th>total_ltv</th><th>last_order_date</th></tr>
<tr><td>C002</td><td>佐藤</td><td>67000</td><td>2024-01-10</td></tr>
<tr><td>C004</td><td>鈴木</td><td>78000</td><td>2023-12-05</td></tr>
</table></div>
<p style="margin-top:8px;font-size:12px;color:var(--dim);">※ 2024-02-01以降に注文がない顧客（C002・C004）のみ抽出。C003は2024-02-28購入で対象外。</p>`,
  answer: `<pre><span class="kw">WITH</span>
  <span class="cmt">-- ① 顧客ごとの累計購入金額（LTV）と最終購入日を集計する</span>
  customer_ltv <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
      customer_id,
      <span class="fn">SUM</span>(amount)      <span class="kw">AS</span> total_ltv,      <span class="cmt">-- 全注文の合計金額</span>
      <span class="fn">MAX</span>(order_date)  <span class="kw">AS</span> last_order_date  <span class="cmt">-- MAX(日付) = 最も新しい注文日</span>
    <span class="kw">FROM</span>      <span class="tbl">orders</span>
    <span class="kw">GROUP BY</span> customer_id       <span class="cmt">-- 顧客ごとに集約する</span>
  )

<span class="kw">SELECT</span>
  c.customer_id,
  c.customer_name,
  ltv.total_ltv,
  ltv.last_order_date

<span class="kw">FROM</span>  <span class="tbl">customers</span>    c         <span class="cmt">-- 全顧客テーブルを起点にする</span>
<span class="kw">JOIN</span>  customer_ltv ltv        <span class="cmt">-- CTEから累計金額と最終購入日を取得する</span>
  <span class="kw">ON</span> c.customer_id <span class="op">=</span> ltv.customer_id

<span class="kw">WHERE</span> <span class="kw">NOT EXISTS</span> (            <span class="cmt">-- サブクエリが0行のとき TRUE（条件を満たす）</span>
  <span class="kw">SELECT</span> <span class="num">1</span>                    <span class="cmt">-- 値は何でもよい。行の「存在確認」だけが目的</span>
  <span class="kw">FROM</span>   <span class="tbl">orders</span> o
  <span class="kw">WHERE</span>  o.customer_id <span class="op">=</span> c.customer_id   <span class="cmt">-- 外部クエリの c を参照（相関サブクエリ）</span>
  <span class="kw">AND</span>    o.order_date  <span class="op">>=</span> <span class="str">'2024-02-01'</span>   <span class="cmt">-- 2024年2月以降の注文が「存在しない」顧客を残す</span>
)

<span class="kw">ORDER BY</span> ltv.total_ltv <span class="kw">DESC</span>; <span class="cmt">-- LTV高い順（優先的にキャンペーン対象にするため）</span>

<span class="cmt">/*
  ▼ SQL実行順序
  1. WITH customer_ltv     → ordersを顧客ごとにGROUP BY集計（LTV・最終購入日）
  2. FROM customers c      → 全顧客テーブルを読み込む
  3. JOIN customer_ltv     → LTV情報を結合する
  4. NOT EXISTS(サブクエリ) → 顧客1人ずつ「2024-02以降の注文が存在するか」を確認
                              存在する→FALSE（除外）、存在しない→TRUE（残す）
  5. ORDER BY total_ltv    → LTV降順でソート
  ★ NOT EXISTS は相関サブクエリ。顧客1人ずつ評価されるがインデックスがあれば高速。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>CTE: customer_ltv</strong> — 全注文から顧客ごとのLTVを集計</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>customer_id</th><th class="tc-g">total_ltv</th><th class="tc-hi">last_order_date</th></tr>
<tr><td>C001</td><td class="tc-g">20500</td><td class="tc-hi">2024-03-15</td></tr>
<tr><td>C002</td><td class="tc-g">67000</td><td class="tc-hi">2024-01-10</td></tr>
<tr><td>C003</td><td class="tc-g">15000</td><td class="tc-hi">2024-02-28</td></tr>
<tr><td>C004</td><td class="tc-g">78000</td><td class="tc-hi">2023-12-05</td></tr>
<tr><td>C005</td><td class="tc-g">15500</td><td class="tc-hi">2024-03-01</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">NOT EXISTS: 各顧客の「2024-02-01以降の注文」をordersで確認する</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>NOT EXISTS の判定</strong> — 存在する=除外、存在しない=残す</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>customer_id</th><th>last_order_date</th><th>2024-02以降の注文？</th><th class="tc-hi">NOT EXISTS → 残す？</th></tr>
<tr class="tr-dim"><td>C001</td><td>2024-03-15</td><td class="tc-g">存在する</td><td class="tc-r">FALSE → 除外</td></tr>
<tr class="tr-hi"><td>C002</td><td>2024-01-10</td><td class="null">存在しない</td><td class="tc-hi">TRUE → 残す ✓</td></tr>
<tr class="tr-dim"><td>C003</td><td>2024-02-28</td><td class="tc-g">存在する</td><td class="tc-r">FALSE → 除外</td></tr>
<tr class="tr-hi"><td>C004</td><td>2023-12-05</td><td class="null">存在しない</td><td class="tc-hi">TRUE → 残す ✓</td></tr>
<tr class="tr-dim"><td>C005</td><td>2024-03-01</td><td class="tc-g">存在する</td><td class="tc-r">FALSE → 除外</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>NOT EXISTS vs LEFT JOIN + IS NULL：</strong>同じ結果を LEFT JOIN + WHERE IS NULL でも取得できる。<em>NOT EXISTSはサブクエリ内で最初に一致する行が見つかると即終了するため、大量データでは高速になることが多い。</em></div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>NOT IN の NULL バグ：</strong><code>NOT IN (SELECT customer_id FROM orders WHERE ...)</code>のサブクエリに NULL が1件でもあると全顧客がFALSEになり0件になるバグが発生する。NOT EXISTS は NULL に安全。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>EXISTS 内で SELECT * を使う：</strong><code>SELECT *</code> と <code>SELECT 1</code> は EXISTS/NOT EXISTS の文脈では性能差がない（最適化される）。ただし <code>SELECT 1</code> のほうがコードの意図が明確なので推奨。</div></div>
</div>`
},

/* ══════════════════════════════════════════════════
   Q8  ROW_NUMBER / RANK / DENSE_RANK — ランキング関数の比較
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "ROW_NUMBER / RANK / DENSE_RANK — カテゴリ別ランキングと同順位の違いを徹底比較",
  tags: [["r","ROW_NUMBER"],["r","RANK"],["r","DENSE_RANK"],["o","ランキング"],["p","商品分析"]],
  premise: `<p>SQLには3つの主要なランキング関数があり、<em>同順位（タイ）が発生したときの挙動</em>がそれぞれ異なります。</p>
<pre><span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>)  <span class="cmt">-- 常に連番（重複なし）</span>
<span class="fn">RANK</span>()       <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>)  <span class="cmt">-- 同値=同順位、次順位スキップ</span>
<span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> category <span class="kw">ORDER BY</span> sales <span class="kw">DESC</span>)  <span class="cmt">-- 同値=同順位、スキップなし</span></pre>
<div class="callout"><strong>3関数の違い（タイが発生した場合）：</strong><br>
<code>ROW_NUMBER</code>: 1, 2, 3, 4 — 値が同じでも必ず異なる番号を付与（tie-breaking は不定）<br>
<code>RANK</code>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: 1, 1, 3, 4 — 同値に同順位を付け、次の番号をスキップする<br>
<code>DENSE_RANK</code>: 1, 1, 2, 3 — 同値に同順位を付け、次の番号はスキップしない</div>
<p><em>ROW_NUMBER</em>は「上位N件抽出」、<em>RANK</em>は「同順位を明示したい試合結果」、<em>DENSE_RANK</em>は「メダルランク（金・銀・銅）」のような用途に向きます。</p>`,
  question: `<p><code>product_sales</code>テーブルには商品・カテゴリ・月間売上が格納されています。<em>カテゴリ内で売上降順にランキング</em>し、ROW_NUMBER・RANK・DENSE_RANK の3つの結果を並べて同順位の挙動の違いを確認してください。</p>
<p>出力：category, product_name, sales_amount, row_num, rank_num, dense_rank_num</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ product_sales</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>product_id</th><th>product_name</th><th>category</th><th>sales_amount</th></tr>
        <tr><td>1</td><td>スマートフォン</td><td>PC</td><td>91000</td></tr>
        <tr><td>2</td><td>ノートPC</td><td>PC</td><td>85000</td></tr>
        <tr><td>3</td><td>デスクトップ</td><td>PC</td><td>62000</td></tr>
        <tr><td>4</td><td>タブレット</td><td>PC</td><td>62000</td></tr>
        <tr><td>5</td><td>コーヒー</td><td>食品</td><td>45000</td></tr>
        <tr><td>6</td><td>紅茶</td><td>食品</td><td>45000</td></tr>
        <tr><td>7</td><td>緑茶</td><td>食品</td><td>32000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>category</th><th>product_name</th><th>sales_amount</th><th>row_num</th><th>rank_num</th><th>dense_rank_num</th></tr>
<tr><td>PC</td><td>スマートフォン</td><td>91000</td><td>1</td><td>1</td><td>1</td></tr>
<tr><td>PC</td><td>ノートPC</td><td>85000</td><td>2</td><td>2</td><td>2</td></tr>
<tr><td>PC</td><td>デスクトップ</td><td>62000</td><td>3</td><td>3</td><td>3</td></tr>
<tr><td>PC</td><td>タブレット</td><td>62000</td><td>4</td><td>3</td><td>3</td></tr>
<tr><td>食品</td><td>コーヒー</td><td>45000</td><td>1</td><td>1</td><td>1</td></tr>
<tr><td>食品</td><td>紅茶</td><td>45000</td><td>2</td><td>1</td><td>1</td></tr>
<tr><td>食品</td><td>緑茶</td><td>32000</td><td>3</td><td class="tc-r">3</td><td class="tc-g">2</td></tr>
</table></div>
<p style="margin-top:8px;font-size:12px;color:var(--dim);">※ 緑茶の rank_num=3（2をスキップ）vs dense_rank_num=2（スキップなし）が最大の違い。</p>`,
  answer: `<pre><span class="kw">SELECT</span>
  category,
  product_name,
  sales_amount,

  <span class="cmt">-- ① ROW_NUMBER: 同値でも必ず連番を付与（重複なし）</span>
  <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category      <span class="cmt">-- カテゴリごとに番号をリセットする</span>
    <span class="kw">ORDER BY</span>     sales_amount <span class="kw">DESC</span>  <span class="cmt">-- 売上降順で1から連番を振る</span>
  ) <span class="kw">AS</span> row_num,

  <span class="cmt">-- ② RANK: 同値には同じ順位、次の順位番号はスキップ（1,1,3 など）</span>
  <span class="fn">RANK</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category
    <span class="kw">ORDER BY</span>     sales_amount <span class="kw">DESC</span>  <span class="cmt">-- 同じ売上額は同じ順位になる</span>
  ) <span class="kw">AS</span> rank_num,

  <span class="cmt">-- ③ DENSE_RANK: 同値には同じ順位、次の順位番号はスキップしない（1,1,2 など）</span>
  <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> category
    <span class="kw">ORDER BY</span>     sales_amount <span class="kw">DESC</span>  <span class="cmt">-- 連続した番号を保証する点がRANKと異なる</span>
  ) <span class="kw">AS</span> dense_rank_num

<span class="kw">FROM</span> <span class="tbl">product_sales</span>
<span class="kw">ORDER BY</span>
  category,             <span class="cmt">-- まずカテゴリ順に並べる</span>
  sales_amount <span class="kw">DESC</span>;   <span class="cmt">-- 次に売上降順で並べる</span>

<span class="cmt">/*
  ▼ SQL実行順序
  1. FROM product_sales          → テーブルを全件読み込む（7行）
  2. ROW_NUMBER() OVER(PARTITION BY category ORDER BY sales DESC)
                                 → カテゴリ内で連番を付与（タイでも別番号）
  3. RANK()       OVER(...)      → カテゴリ内で順位付け（タイは同順位、次をスキップ）
  4. DENSE_RANK() OVER(...)      → カテゴリ内で順位付け（タイは同順位、スキップなし）
  5. ORDER BY category, sales_amount DESC → カテゴリ・売上順に出力
  ★ 3関数の違いが現れるのは「同じ値（タイ）が存在する行」だけ。タイがなければ同じ結果。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>食品カテゴリで3関数の違いを比較</strong> — コーヒー・紅茶が同値（45000）でタイが発生</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>product_name</th><th>sales_amount</th><th class="tc-hi">ROW_NUMBER</th><th class="tc-g">RANK</th><th class="tc-p">DENSE_RANK</th><th>説明</th></tr>
<tr><td>コーヒー</td><td>45000</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-p">1</td><td>1位（タイ）</td></tr>
<tr><td>紅茶</td><td>45000</td><td class="tc-hi">2</td><td class="tc-g">1</td><td class="tc-p">1</td><td>同値=同順位</td></tr>
<tr class="tr-hi"><td>緑茶</td><td>32000</td><td class="tc-hi">3</td><td class="tc-r">3（2をスキップ！）</td><td class="tc-g">2（スキップなし）</td><td>← ここが最大の違い</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">「上位N件を取りたい」場合はROW_NUMBERを使い WHERE row_num &lt;= N でフィルタする</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>PCカテゴリ</strong> — デスクトップとタブレットが同値（62000）でタイ</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>product_name</th><th>sales_amount</th><th class="tc-hi">ROW_NUMBER</th><th class="tc-g">RANK</th><th class="tc-p">DENSE_RANK</th></tr>
<tr><td>スマートフォン</td><td>91000</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-p">1</td></tr>
<tr><td>ノートPC</td><td>85000</td><td class="tc-hi">2</td><td class="tc-g">2</td><td class="tc-p">2</td></tr>
<tr><td>デスクトップ</td><td>62000</td><td class="tc-hi">3</td><td class="tc-g">3</td><td class="tc-p">3</td></tr>
<tr><td>タブレット</td><td>62000</td><td class="tc-hi">4</td><td class="tc-g">3（同値=同順位）</td><td class="tc-p">3（同値=同順位）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>実務での使い分け：</strong><code>ROW_NUMBER</code>は「上位3件だけ取得したい」場合にCTEと組み合わせて <code>WHERE row_num &lt;= 3</code> で使う。<code>RANK</code>は「3位が2人いる場合は両方表示したい」試合結果など。<code>DENSE_RANK</code>は「金・銀・銅のメダルで飛び番を出したくない」場合。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>PARTITION BY でカテゴリ別リセット：</strong><code>PARTITION BY category</code> がなければ全商品を通じてランキングされる。カテゴリ内での順位を出すには必ず PARTITION BY を指定する。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>CTE + ROW_NUMBER で「各カテゴリ上位N件」を取得：</strong><code>WITH ranked AS (SELECT ..., ROW_NUMBER() OVER (...) AS rn FROM ...) SELECT * FROM ranked WHERE rn &lt;= 3</code> が実務の定番パターン。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ROW_NUMBER でタイを無視する：</strong>ROW_NUMBERは同値でも必ず異なる番号を振るため、「5位が2人いる」場合に片方が6位として扱われてしまう。順位の公平性が重要な場面ではRANKまたはDENSE_RANKを使う。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WHERE句でウィンドウ関数の結果を直接フィルタする：</strong><code>WHERE ROW_NUMBER() OVER (...) &lt;= 3</code> はエラー。ウィンドウ関数はSELECTの後に評価されるため、必ずCTEでラップしてから WHERE でフィルタする。</div></div>
</div>`
},

{
  num: 9,
  title: "SELF JOIN — 社員テーブルを自己結合して上司・部下関係と給与差を展開",
  tags: [["r","SELF JOIN"],["o","自己結合"],["g","階層データ"],["p","HR・組織分析"]],
  premise: `<p><strong>SELF JOIN（自己結合）</strong>は同じテーブルを2回参照し、別々の別名（エイリアス）を付けて結合するテクニックです。1つのテーブル内に「自分」と「相手」の関係が格納されている場合に使います。</p>
<pre><span class="kw">FROM</span>      <span class="tbl">employees</span> e  <span class="cmt">-- e: 社員側（部下）として参照する</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">employees</span> m  <span class="cmt">-- m: 同じテーブルを上司側として参照する（別名を付ける）</span>
  <span class="kw">ON</span> e.manager_id <span class="op">=</span> m.employee_id  <span class="cmt">-- 部下のmanager_id = 上司のemployee_idで紐付ける</span></pre>
<div class="callout"><strong>LEFT JOIN を使う理由：</strong><br>
INNER JOIN にすると <code>manager_id = NULL</code>（最上位の社長など）の行が消えてしまう。<br>
<strong>LEFT JOIN</strong> なら manager_id が NULL でも左側（社員側）の行は保持される。</div>
<p>組織ツリー・フレンドリスト・部品の子部品など、<em>同一テーブル内の「自分→相手」関係</em>を展開するときに広く使われます。</p>`,
  question: `<p><code>employees</code>テーブルに社員の基本情報と上司のIDが格納されています。SELF JOINを使って<em>各社員の名前・部署・給与と、その上司の名前・給与差</em>を一覧で出力してください。</p>

        <tr><td>5</td><td>高橋（営業担当）</td><td>4</td><td>営業</td><td>380000</td></tr>

  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>employee_name</th><th>department</th><th>salary</th><th>manager_name</th><th>salary_diff</th></tr>

<tr><td>佐藤（営業部長）</td><td>営業</td><td>800000</td><td>田中（社長）</td><td>-700000</td></tr>
<tr><td>山田（開発部長）</td><td>開発</td><td>850000</td><td>田中（社長）</td><td>-650000</td></tr>
<tr><td>鈴木（営業課長）</td><td>営業</td><td>550000</td><td>佐藤（営業部長）</td><td>-250000</td></tr>
<tr><td>高橋（営業担当）</td><td>営業</td><td>380000</td><td>鈴木（営業課長）</td><td>-170000</td></tr>
<tr><td>木村（開発担当）</td><td>開発</td><td>420000</td><td>山田（開発部長）</td><td>-430000</td></tr>

    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','基礎文法・概念',q.premise)}
      ${acc('❓','pill-green','問題','テーブルデータ付き',q.question)}
      ${acc('📊','pill-orange','出力例','期待する結果',q.output)}
      ${acc('✅','pill-red','模範回答','SQL（コメント付き）',q.answer)}
      ${acc('🔍','pill-purple','解説','変化の可視化＋学習ポイント',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
