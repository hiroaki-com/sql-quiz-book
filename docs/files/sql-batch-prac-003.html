<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  相関サブクエリ — 最新レコード取得パターン
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "相関サブクエリ — 各ユーザーの「最新注文」だけを取得する",
  tags: [["r","相関サブクエリ"],["fn","MAX"],["g","最新レコード"],["o","注文API"]],
  premise: `<p><strong>相関サブクエリ（Correlated Subquery）</strong>とは、外側のクエリの列を内側のサブクエリが参照するサブクエリです。外側の行ごとにサブクエリが評価されるため、「この行と同じ条件で絞ったときの最大値・最小値」という処理に向いています。</p>
<pre><span class="kw">SELECT</span> *
<span class="kw">FROM</span>   <span class="tbl">orders</span> o1
<span class="kw">WHERE</span>  o1.ordered_at <span class="op">=</span> (
  <span class="kw">SELECT</span> <span class="fn">MAX</span>(o2.ordered_at)       <span class="cmt">-- 内側のクエリが外側の o1.user_id を参照 → 相関サブクエリ</span>
  <span class="kw">FROM</span>   <span class="tbl">orders</span> o2
  <span class="kw">WHERE</span>  o2.user_id <span class="op">=</span> o1.user_id  <span class="cmt">-- ← ここが「相関」の核心。外側の行ごとに評価される</span>
);</pre>
<div class="callout"><strong>ポイント：</strong>相関サブクエリは外側の行数 × サブクエリの実行回数になるため、大量データでは <code>ROW_NUMBER()</code> ウィンドウ関数を使った書き方が高速な場合があります。ただし可読性が高いため少量データや素直な要件には適しています。</div>
<p>「各ユーザーの直近ログイン」「各商品の最後の価格変更」など、グループ内の最新行取得は API・バッチ処理で最頻出のパターンの一つです。</p>`,
  question: `<p><code>orders</code> テーブルから、<em>各ユーザー（user_id）の最新注文（ordered_at が最大）の行</em>を取得してください。同一ユーザーの複数注文が存在する場合、最新の1行だけ返すこと。結果は user_id 昇順で並べてください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>amount</th><th>ordered_at</th></tr>
        <tr><td>1001</td><td>U01</td><td>3200</td><td>2024-03-10</td></tr>
        <tr><td>1002</td><td>U01</td><td>1500</td><td>2024-05-20</td></tr>
        <tr><td>1003</td><td>U02</td><td>8000</td><td>2024-04-01</td></tr>
        <tr><td>1004</td><td>U02</td><td>2100</td><td>2024-06-15</td></tr>
        <tr><td>1005</td><td>U03</td><td>500</td><td>2024-02-28</td></tr>
        <tr><td>1006</td><td>U01</td><td>4700</td><td>2024-06-01</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>各ユーザーの最新注文 1 行（user_id 昇順）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id</th><th>user_id</th><th>amount</th><th class="tc-hi">ordered_at</th></tr>
<tr class="tr-hi"><td>1006</td><td>U01</td><td>4700</td><td class="tc-hi">2024-06-01</td></tr>
<tr class="tr-hi"><td>1004</td><td>U02</td><td>2100</td><td class="tc-hi">2024-06-15</td></tr>
<tr class="tr-hi"><td>1005</td><td>U03</td><td>500</td><td class="tc-hi">2024-02-28</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 各ユーザーの最新注文のみを取得する（相関サブクエリ）</span>
<span class="kw">SELECT</span>
  o1.order_id,
  o1.user_id,
  o1.amount,
  o1.ordered_at
<span class="kw">FROM</span>   <span class="tbl">orders</span> o1                     <span class="cmt">-- 【超基礎】テーブルに別名(エイリアス)を付ける</span>
<span class="kw">WHERE</span>  o1.ordered_at <span class="op">=</span> (             <span class="cmt">-- この行の ordered_at が…</span>
  <span class="kw">SELECT</span> <span class="fn">MAX</span>(o2.ordered_at)           <span class="cmt">-- …同じ user_id の中の最大値（最新日付）に等しい行だけ残す</span>
  <span class="kw">FROM</span>   <span class="tbl">orders</span> o2
  <span class="kw">WHERE</span>  o2.user_id <span class="op">=</span> o1.user_id      <span class="cmt">-- ← 外側の o1.user_id を内側で参照 → これが「相関」</span>
)
<span class="kw">ORDER BY</span> o1.user_id <span class="kw">ASC</span>;             <span class="cmt">-- 【超基礎】user_id の昇順で並び替え</span>

<span class="cmt">/*
  実行順序（相関サブクエリ）:
  1. FROM orders o1              → 全行を対象にする（o1 という別名でアクセス）
  2. WHERE o1.ordered_at = (子)  → o1 の各行ごとに以下のサブクエリを実行する
     a. FROM orders o2           → 再び全行を走査
     b. WHERE o2.user_id = o1.user_id → 外側の行と同じ user_id に絞る
     c. MAX(o2.ordered_at)       → 絞り込み後の最大日付を求める
     → この最大値と o1.ordered_at が一致する行だけを残す
  3. SELECT o1.*                 → 必要な列を選択
  4. ORDER BY o1.user_id ASC     → user_id 昇順に並び替え
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>外側の行ごとにサブクエリが実行される — U01 の例</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>外側(o1) の行</th><th>内側サブクエリの動き（同一 user_id = U01 に絞る）</th><th>MAX の結果</th><th class="tc-g">残るか？</th></tr>
<tr class="tr-hi4"><td>order_id=1001 ordered_at=2024-03-10</td><td>U01 の ordered_at: 03-10, 05-20, 06-01</td><td>2024-06-01</td><td class="tc-r">× 不一致</td></tr>
<tr class="tr-hi4"><td>order_id=1002 ordered_at=2024-05-20</td><td>U01 の ordered_at: 03-10, 05-20, 06-01</td><td>2024-06-01</td><td class="tc-r">× 不一致</td></tr>
<tr class="tr-hi2"><td>order_id=1006 ordered_at=2024-06-01</td><td>U01 の ordered_at: 03-10, 05-20, 06-01</td><td>2024-06-01</td><td class="tc-g">✓ 一致 → 残る</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">全ユーザーで同様の処理を繰り返し → 最新行だけが残る</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>全ユーザーの結果まとめ</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>注文数</th><th>候補行</th><th class="tc-g">最新注文（残る行）</th></tr>
<tr class="tr-hi"><td>U01</td><td>3件</td><td>1001, 1002, 1006</td><td class="tc-g">order_id=1006 (2024-06-01)</td></tr>
<tr class="tr-hi"><td>U02</td><td>2件</td><td>1003, 1004</td><td class="tc-g">order_id=1004 (2024-06-15)</td></tr>
<tr class="tr-hi"><td>U03</td><td>1件</td><td>1005</td><td class="tc-g">order_id=1005 (2024-02-28)</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">同日時の最新注文が複数ある場合の代替手法</span></div>

<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：テーブルエイリアスとは：</strong><code>FROM orders o1</code> の <code>o1</code> はテーブルの別名（エイリアス）です。同じテーブルを2回参照するときや長いテーブル名を短縮するときに使います。<code>AS o1</code> と書いても同じですが <code>AS</code> は省略可能です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>相関サブクエリの識別方法：</strong>サブクエリ内に外側テーブルの列名（今回は <code>o1.user_id</code>）が登場していれば相関サブクエリです。外側の行ごとに実行されるため、行数 × サブクエリコストの計算量になります。EXPLAINで "SubPlan" と表示されたら相関サブクエリです。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>ROW_NUMBER() 代替パターン：</strong><code>WITH ranked AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY ordered_at DESC) rn FROM orders) SELECT * FROM ranked WHERE rn = 1;</code> と書くと「各 user_id の中で ordered_at が最大の行に rn=1 を割り当てる」ので同日時重複も安全に1行に絞れます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>EXISTS vs IN vs 相関サブクエリ：</strong>「存在確認」には EXISTS、「値リスト照合」には IN、「グループ内最大値取得」には相関サブクエリ（またはウィンドウ関数）が向いています。それぞれ目的に応じて使い分けることが実務の基本です。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>同日時の最新行が複数ある場合を考慮しない：</strong><code>MAX(ordered_at)</code> での絞り込みは、同じ日時の注文が2件以上あると2件とも返ってしまう。「必ず1行」が要件の場合は ROW_NUMBER() を使うこと。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>大量テーブルへの無条件な相関サブクエリ適用：</strong>数百万行のテーブルに相関サブクエリを使うと、行数 × インデックスを使えないサブクエリのコストで極端に遅くなることがある。まず EXPLAIN ANALYZE でプランを確認し、必要に応じてウィンドウ関数や JOIN に書き換えること。</div></div>

</div>
</div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：GROUP BY と SUM の関係：</strong><code>GROUP BY</code> は指定した列の値が同じ行をひとまとめにします。<code>SUM(amount)</code> はその固まりの中の amount を合計します。<code>GROUP BY</code> に書いた列と集計関数だけが <code>SELECT</code> に書けます（他の列は書けません）。</div></div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTE 内で必要以上の列を SELECT する：</strong>CTE で <code>SELECT *</code> を使うと不要な列も中間結果に含まれ、データ量が増える。後で使う列だけを明示的に書くこと。</div></div>

  premise: `<p><strong>WITH RECURSIVE</strong> は、CTE が自分自身を参照する「再帰クエリ」を書くための構文です。階層データ（カテゴリツリー・組織図・部品表）を再帰的にたどるときに使います。</p>
<pre><span class="kw">WITH RECURSIVE</span> <span class="tbl">cte</span> <span class="kw">AS</span> (
  <span class="cmt">-- ① アンカー部（再帰の起点。最初に1回だけ実行）</span>
  <span class="kw">SELECT</span> id, parent_id, name, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span>   <span class="tbl">categories</span>
  <span class="kw">WHERE</span>  id <span class="op">=</span> <span class="num">1</span>                  <span class="cmt">-- 起点となる行を1件選ぶ</span>

  <span class="kw">UNION ALL</span>                      <span class="cmt">-- アンカー部と再帰部をつなぐ（重複排除なしで高速）</span>

  <span class="cmt">-- ② 再帰部（cte = 前の反復の結果を参照。結果が0行になるまで繰り返す）</span>
  <span class="kw">SELECT</span> c.id, c.parent_id, c.name, r.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span>   <span class="tbl">categories</span> c
  <span class="kw">JOIN</span>   <span class="tbl">cte</span>         r <span class="kw">ON</span> c.parent_id <span class="op">=</span> r.id  <span class="cmt">-- 前の反復の id を親IDとして持つ行を取得</span>
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="tbl">cte</span>;</pre>
<div class="callout warn"><strong>無限ループ注意：</strong>データに循環参照（A→B→A）があると再帰が止まらなくなります。<code>depth &lt; 10</code> などの上限条件か、<code>path</code> 列を使ったループ検知を必ず入れましょう。</div>`,

  answer: `<pre><span class="kw">WITH RECURSIVE</span> <span class="tbl">category_tree</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① アンカー部：起点となる行（食品 = category_id 1）を1行取得</span>
  <span class="kw">SELECT</span>
    category_id,

  <span class="kw">FROM</span>   <span class="tbl">categories</span>
  <span class="kw">WHERE</span>  category_id <span class="op">=</span> <span class="num">1</span>                <span class="cmt">-- 再帰の起点を指定（食品カテゴリ）</span>

  <span class="kw">UNION ALL</span>                             <span class="cmt">-- アンカー結果と再帰結果を縦に結合</span>

  <span class="kw">FROM</span>   <span class="tbl">categories</span>     c
  <span class="kw">JOIN</span>   <span class="tbl">category_tree</span>  ct
         <span class="kw">ON</span> c.parent_id <span class="op">=</span> ct.category_id  <span class="cmt">-- 前回の結果の category_id を親に持つ子を探す</span>
  <span class="kw">WHERE</span>  ct.depth <span class="op"><</span> <span class="num">10</span>                  <span class="cmt">-- 安全装置: 深さ10を超えたら再帰を止める（無限ループ防止）</span>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：自己参照テーブルとは：</strong>自己参照テーブルは「同じテーブルの行を親として参照する構造」です。<code>parent_id</code> が同テーブルの <code>category_id</code> を指します。組織図・カテゴリツリー・部品表などで広く使われます。NULL の parent_id は「親がいない = ルート」を意味します。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>path 列でループ検知：</strong><code>ARRAY[category_id] AS path</code> から再帰で <code>path || c.category_id</code> と積み上げ、<code>WHERE NOT c.category_id = ANY(ct.path)</code> とすることで循環参照を検出して無限ループを完全に防げます。depth による上限より安全です。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>経路（パス）文字列の生成：</strong><code>'食品 > 飲料 > コーヒー'</code> のような経路表示も再帰CTEで作れます。アンカーで <code>name AS path</code>、再帰部で <code>ct.path || ' > ' || c.name AS path</code> と連結していくと各行にフルパスが付きます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>ltree 拡張：</strong>PostgreSQL には <code>ltree</code> というパス型があり <code>'food.drink.coffee'</code> のような文字列でツリーを表現し、<code>@&gt;</code>（先祖判定）や <code>~</code>（パスパターンマッチ）で高速に階層検索できます。大規模な階層データには ltree のほうが適しています。</div></div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：JSON vs JSONB の選び方：</strong>PostgreSQL には JSON 型と JSONB 型の2種類があります。JSON はテキストを保存しキーの順序・空白を保持しますが、インデックスが貼れません。JSONB はバイナリ変換して格納し、GINインデックスが使えて検索が高速です。<strong>実務では基本的に JSONB を選ぶ</strong>のが推奨です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>->> と -> のどちらを使うか：</strong><code>-&gt;&gt;</code> はテキスト型を返すので WHERE や GROUP BY での比較に便利。<code>-&gt;</code> は JSONB 型を返すのでネストされた JSON（<code>settings -&gt; 'address' -&gt;&gt; 'city'</code>）をたどるときに使います。</div></div>

</div>
</div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：NOT IN vs NOT EXISTS の違い：</strong>NOT IN はサブクエリの結果に NULL が1つでも含まれると全行がマッチしなくなる（NULL の三値論理の罠）。サブクエリにNULLが入りうる場合は <code>NOT EXISTS (...)</code> か <code>LEFT JOIN ... WHERE ... IS NULL</code> パターンが安全です。</div></div>

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p', fn:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
