<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  カバリングインデックス — ヒープアクセスをゼロにする
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "カバリングインデックス — ヒープアクセスをゼロにしてIndex Onlyを実現",
  tags: [["r","Covering Index"],["r","Index Only Scan"],["o","ヒープアクセス排除"],["g","INCLUDE"]],
  premise: `<p>通常のインデックスは検索条件の列だけを保持します。クエリがSELECTで追加の列を要求すると、インデックスで行を特定した後に<em>ヒープ（テーブル本体）へ再アクセス</em>が発生します。これを <strong>ヒープアクセス（Heap Fetch）</strong> と呼びます。</p>
<p><strong>カバリングインデックス</strong> はSELECTで使う列もインデックスに含めることで、クエリをインデックスだけで完結させ（<em>Index Only Scan</em>）、ヒープアクセスを完全に排除します。PostgreSQL 11以降では <code>INCLUDE</code> 句で検索に使わない列もインデックスに追加できます。</p>
<pre><span class="cmt">-- 通常インデックス: 検索後にヒープへ追加アクセスが発生する</span>
<span class="kw">CREATE INDEX</span> idx_orders_user
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id);     <span class="cmt">-- user_id だけ格納 → amount を返すためヒープへ</span>

<span class="cmt">-- カバリングインデックス: INCLUDE で追加列を格納 → ヒープ不要</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_covering
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id)
    <span class="kw">INCLUDE</span> (amount, created_at);  <span class="cmt">-- SELECT列もインデックスに格納 → Index Only Scan</span></pre>
<div class="callout ok"><strong>INCLUDE列はソートや絞り込みに使えない：</strong>INCLUDE句に入れた列はあくまで「値の格納」だけで、WHERE条件やORDER BYのインデックス利用はできません。絞り込みに使う列は必ず通常のインデックスキー列として指定してください。</div>`,
  question: `<p><code>orders</code> テーブルで「ユーザーの最新注文一覧API」が遅い状況です。EXPLAIN ANALYZEで<em>Heap Fetches が大量発生</em>していることが確認されました。<em>カバリングインデックスを設計</em>して、Index Only Scan へ改善してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（300万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id(PK)</th><th>user_id</th><th>amount</th><th>status</th><th>created_at</th></tr>
        <tr><td>1001</td><td>U001</td><td>3000</td><td>shipped</td><td>2024-06-01</td></tr>
        <tr><td>1002</td><td>U001</td><td>5000</td><td>pending</td><td>2024-07-15</td></tr>
        <tr><td>1003</td><td>U002</td><td>1200</td><td>shipped</td><td>2024-07-20</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 遅いクエリ（user_id のみのインデックスがある状態）</span>
<span class="kw">SELECT</span> order_id, amount, status, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>
<span class="kw">LIMIT</span>  <span class="num">10</span>;</pre>
<div class="data-section">
  <div class="data-label">EXPLAIN ANALYZE（改善前）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>ノード</th><th>コスト</th><th>Heap Fetches</th></tr>
    <tr class="tr-hi"><td>Index Scan on idx_orders_user</td><td class="tc-r">cost=0.56..8420</td><td class="tc-r">29,800件</td></tr>
  </table></div>
</div>`,
  output: `<p>改善後のEXPLAIN ANALYZE（Index Only Scan でHeap Fetchesがゼロに）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ノード</th><th class="tc-g">コスト（改善後）</th><th class="tc-g">Heap Fetches</th></tr>
<tr class="tr-hi2"><td>Index Only Scan on idx_orders_covering</td><td class="tc-g">cost=0.56..94</td><td class="tc-g">0件 ✅</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① 旧インデックスを削除（任意。競合を避けるため）</span>
<span class="kw">DROP INDEX IF EXISTS</span> idx_orders_user;

<span class="cmt">-- ② カバリングインデックスを作成</span>
<span class="kw">CREATE INDEX</span> idx_orders_covering
    <span class="kw">ON</span> <span class="tbl">orders</span> (
        user_id,              <span class="cmt">-- 【超基礎】WHERE user_id = ? の等値検索キー（先頭列）</span>
        created_at <span class="kw">DESC</span>       <span class="cmt">-- 【応用】ORDER BY created_at DESC のソートをインデックスで吸収</span>
    )
    <span class="kw">INCLUDE</span> (               <span class="cmt">-- 【応用】SELECT列をインデックスに格納してヒープアクセスを排除</span>
        amount,               <span class="cmt">-- SELECTで使うが検索・ソートには不要 → INCLUDEに入れる</span>
        status,               <span class="cmt">-- 同上</span>
        order_id              <span class="cmt">-- 同上（PK も格納してヒープへのポインタ参照も不要に）</span>
    );

<span class="cmt">-- ③ クエリ自体は変更なし（オプティマイザが自動でIndex Only Scanを選択する）</span>
<span class="kw">SELECT</span> order_id, amount, status, created_at  <span class="cmt">-- 【超基礎】必要な列だけ指定</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id    <span class="op">=</span> <span class="str">'U001'</span>                  <span class="cmt">-- 【超基礎】インデックスキー列で等値絞り込み</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>                     <span class="cmt">-- インデックスの列順・方向と一致 → Sort不要</span>
<span class="kw">LIMIT</span>  <span class="num">10</span>;                                  <span class="cmt">-- 【超基礎】最大取得件数を制限</span>

<span class="cmt">-- ④ visibility map が更新されているか確認（Index Only Scan の前提条件）</span>
<span class="kw">SELECT</span> relname, n_live_tup, n_dead_tup
<span class="kw">FROM</span>   pg_stat_user_tables
<span class="kw">WHERE</span>  relname <span class="op">=</span> <span class="str">'orders'</span>;                   <span class="cmt">-- dead tupleが多い場合はVACUUMを実行する</span>

<span class="cmt">/*
  実行順序（③のクエリ）:
  1. FROM orders                  → テーブル参照（ただしヒープは読まない）
  2. Index Only Scan              → インデックスから user_id='U001' の行を取得
  3. created_at DESC 順に取得     → インデックスの並び順がそのまま結果順序に
  4. LIMIT 10                     → 上位10件で打ち切り（インデックスの途中で停止）
  5. SELECT 列を返す              → 全列がインデックス内に存在 → ヒープアクセスなし
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>通常インデックスのアクセスフロー（ヒープアクセスあり）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ステップ</th><th>アクセス先</th><th>取得できる列</th><th>コスト</th></tr>
<tr class="tr-hi"><td>① Index Scan</td><td class="tc-y">インデックス（user_id）</td><td class="tc-y">TID（行のポインタ）のみ</td><td class="tc-r">低</td></tr>
<tr class="tr-hi"><td>② Heap Fetch × 29,800</td><td class="tc-r">ヒープ（テーブル本体）</td><td class="tc-r">amount, status, created_at</td><td class="tc-r">高（ランダムI/O）</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">INCLUDEで必要な列をインデックスに追加すると…</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>カバリングインデックスのアクセスフロー（ヒープアクセスなし）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ステップ</th><th>アクセス先</th><th>取得できる列</th><th>コスト</th></tr>
<tr class="tr-hi2"><td>① Index Only Scan</td><td class="tc-g">インデックスのみ</td><td class="tc-g">user_id + created_at + amount + status + order_id</td><td class="tc-g">低（シーケンシャルI/O）</td></tr>
<tr class="tr-hi2"><td>② ヒープアクセス</td><td class="tc-g">不要</td><td class="tc-g">—</td><td class="tc-g">0</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">Visibility Mapの役割：全ページが可視と確認済みならヒープ参照ゼロ</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn3">3</span><span class="step-desc"><strong>インデックスキー列 vs INCLUDE列の使い分け</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>用途</th><th>配置場所</th><th>ソート・絞り込み</th><th>インデックスサイズへの影響</th></tr>
<tr class="tr-hi"><td>WHERE / ORDER BY で使う</td><td class="tc-hi">インデックスキー列</td><td class="tc-g">✅ 使える</td><td class="tc-y">中（BTree構造で管理）</td></tr>
<tr class="tr-hi3"><td>SELECTで返すだけ</td><td class="tc-p">INCLUDE列</td><td class="tc-r">❌ 使えない</td><td class="tc-g">小（末端ページにのみ格納）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>インデックスは「本の索引」と同じです。通常の索引は「用語とページ番号」だけを持ち、本文は本（ヒープ）を開かないと読めません。カバリングインデックスは「用語・ページ番号・本文の要約」まで索引に載せるイメージです。本を開く手間（ヒープアクセス）がゼロになります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>Index Only Scan の前提条件：</strong>PostgreSQLのIndex Only Scanは <em>Visibility Map（可視性マップ）</em> を参照します。VACUUMが十分に走っていないテーブルでは dead tuple があり、可視性が不明なページでは Heap Fetch が発生します。<code>VACUUM ANALYZE orders;</code> を実行してからEXPLAIN ANALYZEで再確認する習慣を持ちましょう。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>インデックスサイズとのトレードオフ：</strong>INCLUDE列を多く追加するとインデックスが肥大化し、書き込み（INSERT/UPDATE）のコストが増えます。頻繁に更新される列をINCLUDEに入れると逆効果になる場合があります。<em>「参照が多く更新が少ない列」</em>をINCLUDEに入れるのがベストプラクティスです。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT * で全列を取得する：</strong><code>SELECT *</code> は全列を取得するため、インデックスにすべての列を含めない限りIndex Only Scanになりません。APIのレスポンス設計でも「必要な列だけSELECTする」習慣が、カバリングインデックスを活かす前提です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>INCLUDEに絞り込みに使う列を入れる：</strong><code>WHERE status = 'shipped'</code> のように絞り込みに使う列をINCLUDEに入れてもインデックスが効きません。絞り込みに使う列は必ずキー列（INCLUDE前の括弧内）に配置してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：API設計とカバリングインデックスのセット設計</div>
<div class="column-body">
実務では「APIのレスポンス仕様が決まったらカバリングインデックスを設計する」という順序が効果的です。例えば「注文一覧API: user_id で絞り込み、created_at の降順で order_id / amount / status を返す」という仕様があれば、<code>ON orders (user_id, created_at DESC) INCLUDE (order_id, amount, status)</code> が最適解として導けます。<strong>SELECT列 ＝ INCLUDE列、WHERE/ORDER BY列 ＝ キー列</strong>というマッピングを意識すると設計がシンプルになります。
</div>
</div>
`
},

<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id</th><th>user_id</th><th>created_at</th><th class="tc-hi">rn（付与後）</th><th>最終結果</th></tr>
<tr class="tr-hi2"><td>2</td><td>U001</td><td>2024-07-15</td><td class="tc-g">1</td><td class="tc-g">✅ 残る（rn=1）</td></tr>
<tr class="tr-dim"><td>1</td><td>U001</td><td>2024-06-01</td><td class="tc-r">2</td><td class="tc-r">❌ 除外</td></tr>
<tr class="tr-hi2"><td>4</td><td>U002</td><td>2024-09-01</td><td class="tc-g">1</td><td class="tc-g">✅ 残る（rn=1）</td></tr>
<tr class="tr-dim"><td>3</td><td>U002</td><td>2024-07-20</td><td class="tc-r">2</td><td class="tc-r">❌ 除外</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">同順位の扱い：ROW_NUMBER は必ず一意、RANK は同値に同番号を付与</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>3つの方法のパフォーマンス比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方法</th><th>スキャン回数</th><th>速度</th><th>使える場面</th></tr>
<tr class="tr-hi"><td>相関サブクエリ（旧）</td><td class="tc-r">行数分だけサブクエリ実行</td><td class="tc-r">遅い</td><td>小規模のみ</td></tr>
<tr class="tr-hi2"><td>ROW_NUMBER()</td><td class="tc-g">1パス + フィルタ</td><td class="tc-g">速い</td><td>2位以降も必要な場面</td></tr>
<tr class="tr-hi3"><td>DISTINCT ON</td><td class="tc-g">1パス（より簡潔）</td><td class="tc-g">速い</td><td>PostgreSQL専用・最新1件のみ</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>Window関数は <code>関数() OVER(PARTITION BY ... ORDER BY ...)</code> という構文です。GROUP BYと違い、<em>元の行を削除せず</em>に計算結果を列として追加します。GROUP BY後はグループが1行になりますが、Window関数後は元の行数がそのまま残ります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ROW_NUMBER vs RANK vs DENSE_RANK：</strong>同順位が存在する場合の違いがあります。<code>ROW_NUMBER</code>は常に一意の連番（1,2,3）、<code>RANK</code>は同値に同番号で次がスキップ（1,1,3）、<code>DENSE_RANK</code>は同値に同番号でスキップなし（1,1,2）です。「最新1件を確実に1件取る」には <em>ROW_NUMBER</em> が最適です。</div></div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>DISTINCT ON で ORDER BY の先頭列を揃えない：</strong><code>SELECT DISTINCT ON (user_id) ... ORDER BY created_at DESC</code> はエラーになります。PostgreSQLの仕様で、DISTINCT ON に指定した列がORDER BYの先頭に来る必要があります。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：「直近N件」パターンの設計</div>
<div class="column-body">
実務では「ユーザーごとの直近3件の注文を返す」など N件パターンが頻出です。ROW_NUMBERを使って <code>WHERE rn &lt;= 3</code> とするだけで対応できます。DISTINCT ONは1件限定のため、N件取得にはROW_NUMBERの方が汎用的です。また、ダッシュボードなどで「カテゴリごとの売れ筋TOP3商品」のような集計もWindow関数1本で解決できます。<strong>「グループ内の順位」が絡む要件はまずWindow関数を検討する</strong>習慣を持ちましょう。
</div>
</div>
`

{
  num: 3,
  title: "EXPLAIN ANALYZE の読み方 — ボトルネックノードを特定してチューニングに繋げる",

  premise: `<p><strong>EXPLAIN ANALYZE</strong> はSQLの実行計画（どの順序・手法でデータを取得するか）と実際の実行時間を出力します。ツリー構造で表示され、<em>内側（インデント深い）のノードが先に実行</em>されます。各ノードの読み方を理解することがSQLチューニングの第一歩です。</p>
<pre><span class="cmt">-- 基本構文（実際にクエリを実行して計画＋実測を返す）</span>
<span class="kw">EXPLAIN ANALYZE</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="str">'U001'</span>;</pre>
<div class="callout warn"><strong>EXPLAINとEXPLAIN ANALYZEの違い：</strong>EXPLAIN だけでは実際にはクエリを実行しない（推定コストのみ）。EXPLAIN ANALYZE は実際に実行するため、UPDATEやDELETEにはトランザクションでラップして <code>BEGIN; EXPLAIN ANALYZE UPDATE...; ROLLBACK;</code> とすることで副作用を防げます。</div>`,
  question: `<p>以下のEXPLAIN ANALYZE出力を読み解き、<em>ボトルネックとなっているノードを特定</em>し、改善クエリとインデックスを提示してください。</p>
<div class="data-section">
  <div class="data-label">EXPLAIN ANALYZE 出力（遅いクエリ）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>ノード</th><th>推定コスト</th><th>実測時間</th><th>行数（推定→実測）</th></tr>
    <tr class="tr-hi"><td>Sort（amount DESC）</td><td class="tc-r">cost=58420..58470</td><td class="tc-r">actual=4820ms</td><td>2M→2M</td></tr>
    <tr class="tr-hi"><td>&nbsp;&nbsp;→ Hash Join</td><td class="tc-r">cost=18000..52000</td><td class="tc-y">actual=2100ms</td><td>2M→2M</td></tr>
    <tr class="tr-hi"><td>&nbsp;&nbsp;&nbsp;&nbsp;→ Seq Scan on orders</td><td class="tc-r">cost=0..38000</td><td class="tc-r">actual=3200ms</td><td>5M→2M</td></tr>

  </table></div>
</div>
<pre><span class="cmt">-- 対象クエリ（遅い）</span>
<span class="kw">SELECT</span> o.order_id, u.name, o.amount, o.created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span> o
<span class="kw">JOIN</span>   <span class="tbl">users</span>  u <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id
<span class="kw">WHERE</span>  o.status     <span class="op">=</span> <span class="str">'shipped'</span>

  output: `<p>ボトルネック特定と改善後のEXPLAIN ANALYZE：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ノード（改善後）</th><th class="tc-g">推定コスト</th><th class="tc-g">実測時間</th></tr>
<tr class="tr-hi2"><td>Sort（amount DESC）</td><td class="tc-g">cost=280..295</td><td class="tc-g">actual=18ms</td></tr>
<tr class="tr-hi2"><td>→ Nested Loop Join</td><td class="tc-g">cost=0.56..265</td><td class="tc-g">actual=9ms</td></tr>
<tr class="tr-hi2"><td>&nbsp;&nbsp;→ Index Scan on orders（status+created_at）</td><td class="tc-g">cost=0.56..230</td><td class="tc-g">actual=7ms</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① ボトルネック分析のコメント</span>
<span class="cmt">-- 問題1: Seq Scan on orders（5M行全件スキャン）が最大ボトルネック</span>
<span class="cmt">--        → status と created_at にインデックスがなく全件読んでいる</span>
<span class="cmt">-- 問題2: Sort（amount DESC）がメモリ上で 2M行 をソートしている</span>
<span class="cmt">--        → 絞り込み後の行数を減らせばソートコストも減る</span>

<span class="cmt">-- ② 複合インデックスの作成（Seq Scanをなくす）</span>
<span class="kw">CREATE INDEX</span> idx_orders_status_created
    <span class="kw">ON</span> <span class="tbl">orders</span> (
        status,               <span class="cmt">-- 【超基礎】WHERE status='shipped' の等値絞り込み（先頭列）</span>
        created_at            <span class="cmt">-- 【超基礎】WHERE created_at >= の範囲絞り込み（2番目）</span>
    );
<span class="cmt">-- ※ amount はORDER BYのみで件数が多いためインデックスより絞り込み優先</span>

<span class="cmt">-- ③ EXPLAIN ANALYZE で確認（UPDATEなどの副作用があるクエリはROLLBACKと組み合わせる）</span>
<span class="kw">EXPLAIN</span> (<span class="fn">ANALYZE</span>, <span class="fn">BUFFERS</span>, <span class="fn">FORMAT</span> TEXT)   <span class="cmt">-- BUFFERSでキャッシュヒット率も確認</span>
<span class="kw">SELECT</span> o.order_id, u.name, o.amount, o.created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span> o
<span class="kw">JOIN</span>   <span class="tbl">users</span>  u <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id      <span class="cmt">-- 【超基礎】JOINの結合条件</span>
<span class="kw">WHERE</span>  o.status     <span class="op">=</span> <span class="str">'shipped'</span>              <span class="cmt">-- インデックス先頭列 → Index Scan で使える</span>
  <span class="kw">AND</span>  o.created_at <span class="op">&gt;=</span> <span class="str">'2024-01-01'</span>          <span class="cmt">-- インデックス2列目 → 範囲絞り込みに使える</span>
<span class="kw">ORDER BY</span> o.amount <span class="kw">DESC</span>;                       <span class="cmt">-- 絞り込み後の件数が少なければSortは速い</span>

<span class="cmt">/*
  実行順序:
  1. FROM orders                  → テーブル参照
  2. Index Scan（status+created） → インデックスで2条件に絞り込む（Seq Scan解消）
  3. Nested Loop JOIN users       → 絞り込み後の少数行にuserをJOIN
  4. ORDER BY amount DESC         → 絞り込み済みの少数行をソート（高速）
  5. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>EXPLAIN ANALYZEの主要フィールドの読み方</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>フィールド</th><th>意味</th><th>チューニングポイント</th></tr>
<tr class="tr-hi"><td>cost=X..Y</td><td>X=最初の1行までのコスト / Y=全行取得までの推定コスト</td><td class="tc-y">Yが大きいほど重い</td></tr>
<tr><td>actual time=A..B</td><td>A=最初の1行までの実測ms / B=全行実測ms</td><td class="tc-r">Bが大きいノードがボトルネック</td></tr>
<tr class="tr-hi2"><td>rows=推定 / actual rows=実測</td><td>推定と実測が大きく乖離 → 統計情報が古い</td><td class="tc-g">乖離が大きければANALYZEを実行</td></tr>
<tr><td>Seq Scan</td><td>テーブル全件スキャン</td><td class="tc-r">大テーブルでは要インデックス</td></tr>
<tr class="tr-hi2"><td>Index Scan / Only</td><td>インデックス経由</td><td class="tc-g">基本的に良い状態</td></tr>
<tr><td>Hash Join / Nested Loop</td><td>JOINの手法（件数で自動選択）</td><td class="tc-y">Nested Loopは件数少・Hash Joinは件数多に有利</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">ツリーの内側（インデント深い）ほど先に実行される</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>改善前後のコスト比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ノード</th><th>改善前（実測）</th><th>改善後（実測）</th><th>改善倍率</th></tr>
<tr class="tr-hi"><td>Seq Scan（orders全件）</td><td class="tc-r">3200ms</td><td class="tc-g">—（消滅）</td><td class="tc-g">∞倍高速</td></tr>
<tr class="tr-hi"><td>Sort</td><td class="tc-r">4820ms</td><td class="tc-g">18ms</td><td class="tc-g">267倍高速</td></tr>
<tr class="tr-hi"><td>全体</td><td class="tc-r">~5000ms</td><td class="tc-g">~27ms</td><td class="tc-g">185倍高速</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>EXPLAIN ANALYZEの出力はツリー形式で、<em>インデントが深いノードほど先に実行</em>されます。ボトルネックは「actual time（実測時間）が最も大きいノード」を探すことで特定できます。コストは相対的な推定値のため、actual timeと合わせて判断します。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>BUFFERS オプションを追加する：</strong><code>EXPLAIN (ANALYZE, BUFFERS)</code> とするとキャッシュヒット率も確認できます。<code>shared hit</code>（バッファキャッシュヒット）が多いほどI/Oコストは低く、<code>shared read</code>（ディスクI/O）が多いほど遅くなります。同じインデックスでも初回（cold）と2回目以降（warm）で速度が変わる理由がここで分かります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>統計情報の鮮度を確認する：</strong>推定行数と実測行数が大きく乖離している場合、テーブルの統計情報が古い可能性があります。<code>ANALYZE テーブル名;</code> を実行して統計情報を更新すると、オプティマイザが適切なプランを選択できるようになります。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>推定コストだけ見てチューニングする：</strong>EXPLAINのコストは推定値であり、実際の速度と乖離することがあります。必ずEXPLAIN ANALYZEで実測値を確認してからインデックスを追加してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>本番環境でEXPLAIN ANALYZEを実行する：</strong>EXPLAIN ANALYZEはクエリを実際に実行するため、重いクエリを本番DBで実行するとサービスに影響します。ステージング環境か、本番のリードレプリカで実行するのが安全です。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：pgBadgerとauto_explainによる自動ログ解析</div>
<div class="column-body">
実務では遅いクエリを手動で特定するのは困難です。PostgreSQLの <code>pg_stat_statements</code> 拡張を使うと「累積で最も時間がかかったクエリTOP N」を取得できます。さらに <code>auto_explain</code> 拡張を設定すると、一定時間を超えたクエリの実行計画をログに自動で記録します。<strong>遅いクエリを発見 → EXPLAIN ANALYZEで分析 → インデックス追加 → 再確認</strong>というサイクルを回す基盤として、これらの拡張をあらかじめ有効化しておくことが実務でのスタンダードです。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q4  N+1問題の解決 — JOINかサブクエリで1クエリに畳む
══════════════════════════════════════════════════ */
{
  num: 4,
  title: "N+1問題の解決 — ORMが生むN回クエリをJOINで1クエリに畳む",
  tags: [["r","N+1問題"],["r","JOIN"],["o","ORM"],["p","クエリ最適化"]],
  premise: `<p><strong>N+1問題</strong>は、1回の「親」クエリでN行を取得した後、各行に対して「子」クエリをN回実行するパターンです。DBへのラウンドトリップ（接続のやり取り）がN+1回発生するため、Nが大きくなるほどレイテンシが線形増加します。</p>
<pre><span class="cmt">-- N+1パターンの例（疑似コード）</span>
<span class="cmt">-- ① 1回目のクエリ（1回）</span>
orders = <span class="fn">query</span>(<span class="str">"SELECT * FROM orders WHERE status='shipped'"</span>);  <span class="cmt">-- N件取得</span>

<span class="cmt">-- ② 各orderに対してuserを取得（N回）</span>
<span class="kw">FOR</span> order <span class="kw">IN</span> orders:
    user = <span class="fn">query</span>(<span class="str">"SELECT * FROM users WHERE user_id = ?"</span>, order.user_id);  <span class="cmt">-- ❌ N回</span></pre>
<div class="callout danger"><strong>N+1は「動くが遅い」バグ：</strong>開発環境では件数が少なく気づきにくいですが、本番でN=10,000になると1万回のクエリが走ります。ORMのLazy Loadingが原因のことが多いため、発行されるSQLをログで確認する習慣が重要です。</div>`,
  question: `<p>注文一覧APIで「N+1問題」が発生しています。以下の2クエリを<em>1つのSQLに統合</em>して、DB接続回数を削減してください。さらに、ユーザーごとの注文件数も同時に返してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（10万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>amount</th><th>status</th></tr>
        <tr><td>1</td><td>U001</td><td>3000</td><td>shipped</td></tr>
        <tr><td>2</td><td>U001</td><td>5000</td><td>pending</td></tr>
        <tr><td>3</td><td>U002</td><td>1200</td><td>shipped</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ users（1万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>user_id(PK)</th><th>name</th><th>email</th></tr>
        <tr><td>U001</td><td>田中</td><td>tanaka@ex.com</td></tr>
        <tr><td>U002</td><td>鈴木</td><td>suzuki@ex.com</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 問題のあるN+1パターン（2本のクエリが分かれている）</span>
<span class="cmt">-- クエリ①: ordersを取得（1回）</span>
<span class="kw">SELECT</span> order_id, user_id, amount, status <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'shipped'</span>;

<span class="cmt">-- クエリ②: 各orderのuserを取得（orders件数分N回）</span>
<span class="kw">SELECT</span> name, email <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> user_id <span class="op">=</span> ?;  <span class="cmt">-- ❌ N回実行される</span></pre>`,
  output: `<p>統合後：1クエリでorder情報・user情報・注文件数を全取得：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id</th><th>user_name</th><th>email</th><th>amount</th><th class="tc-hi">user_order_count</th></tr>
<tr class="tr-hi2"><td>1</td><td>田中</td><td>tanaka@ex.com</td><td>3000</td><td class="tc-g">2</td></tr>
<tr class="tr-hi2"><td>3</td><td>鈴木</td><td>suzuki@ex.com</td><td>1200</td><td class="tc-g">1</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- N+1を解消する統合クエリ（JOIN + Window関数で1回のDB接続に集約）</span>
<span class="kw">SELECT</span>
    o.order_id,                           <span class="cmt">-- 【超基礎】ordersテーブルの列（エイリアスoで参照）</span>
    u.name        <span class="kw">AS</span> user_name,          <span class="cmt">-- 【超基礎】usersテーブルの列（エイリアスuで参照）</span>
    u.email,
    o.amount,
    <span class="fn">COUNT</span>(o.order_id) <span class="kw">OVER</span> (              <span class="cmt">-- 【応用】Window関数で同じuser_idの注文件数を各行に付与</span>
        <span class="kw">PARTITION BY</span> o.user_id            <span class="cmt">-- ユーザーごとにカウント（GROUP BYは不要）</span>
    ) <span class="kw">AS</span> user_order_count
<span class="kw">FROM</span>   <span class="tbl">orders</span> o                          <span class="cmt">-- 【超基礎】主テーブル</span>
<span class="kw">JOIN</span>   <span class="tbl">users</span>  u <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id  <span class="cmt">-- 【超基礎】user_idを結合キーにしてusers情報を付与</span>
<span class="kw">WHERE</span>  o.status <span class="op">=</span> <span class="str">'shipped'</span>;              <span class="cmt">-- 【超基礎】出荷済みのみを絞り込む</span>

<span class="cmt">-- 補足: ORMでのEager Load（Railsの場合）</span>
<span class="cmt">-- Order.where(status: 'shipped').includes(:user)  ← includesがJOINまたはIN句で一括取得</span>

<span class="cmt">-- インデックス（WHERE + JOIN の両方に有効）</span>
<span class="kw">CREATE INDEX</span> idx_orders_status    <span class="kw">ON</span> <span class="tbl">orders</span> (status);     <span class="cmt">-- WHERE絞り込み用</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_id   <span class="kw">ON</span> <span class="tbl">orders</span> (user_id);    <span class="cmt">-- JOIN結合キー用</span>

<span class="cmt">/*
  実行順序:
  1. FROM orders o WHERE status='shipped'  → インデックスでshippedのみ絞り込む
  2. JOIN users u ON u.user_id=o.user_id   → 各orderにuserを結合（Nested Loop or Hash）
  3. COUNT() OVER(PARTITION BY o.user_id)  → ウィンドウ関数でuser別件数を各行に追加
  4. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>N+1問題：クエリ発行回数の比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>パターン</th><th>DB接続回数</th><th>shipped件数1000の場合</th><th>総コスト</th></tr>
<tr class="tr-hi"><td>N+1（旧）</td><td class="tc-r">1 + N回</td><td class="tc-r">1 + 1000 = 1001回</td><td class="tc-r">ラウンドトリップ×1001</td></tr>
<tr class="tr-hi2"><td>統合クエリ（新）</td><td class="tc-g">1回</td><td class="tc-g">1回</td><td class="tc-g">ラウンドトリップ×1</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">ネットワーク往復コスト（1ms/回）だけで N+1 は 1000ms 余分にかかる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>JOINによるテーブル統合の流れ</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id</th><th>user_id（orders）</th><th>JOIN後のuser情報</th><th>Window関数で追加</th></tr>
<tr class="tr-hi"><td>1</td><td>U001</td><td class="tc-g">田中 / tanaka@ex.com</td><td class="tc-hi">user_order_count=2</td></tr>
<tr class="tr-hi"><td>3</td><td>U002</td><td class="tc-g">鈴木 / suzuki@ex.com</td><td class="tc-hi">user_order_count=1</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>JOINは「2つのテーブルを1つの結果表に結合する」操作です。<code>ON A.key = B.key</code> で結合条件を指定します。N+1問題の本質は「ループの中でDBに問い合わせる」ことで、JOINを使って「SQLの中でループを解決する」のが正しいアプローチです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ORMのEager Loadを使う：</strong>Railsの <code>includes</code>、LaravelのEager Loading（<code>with</code>）など、ORMにはN+1を回避する仕組みがあります。ただしORMが生成するSQLを必ずログで確認してください。「includesしているのに別途クエリが走っている」場合はEager Loadが効いていない可能性があります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>IN句バッチ取得：</strong>JOINが難しい場合のもう一つの解決策として「親のIDをまとめてIN句で子を一括取得する」方法があります。<code>SELECT * FROM users WHERE user_id IN (U001, U002, U003...)</code> のようにアプリ側で1回だけ子を取得してマッピングする方法で、N+1は2回のクエリに収まります。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ループの中でDBアクセスする：</strong>どの言語・フレームワークでも「forループ内でSQLを発行する」パターンは N+1 問題そのものです。コードレビューでこのパターンが見えたら必ず指摘してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>JOINを避けてアプリ側でマージする：</strong>「JOINは遅い」という誤解からアプリ側でデータをマージするパターンがあります。適切なインデックスがあればJOINはDBに任せる方が高速です。アプリ側のマージはネットワーク転送量が増え、メモリも余分に使います。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：SlowQueryログでN+1を検出する</div>
<div class="column-body">
N+1問題は開発中に気づきにくいため、<strong>SlowQueryログ</strong>と合わせて「同じクエリのパターンが短時間に何百回も記録されている」ことで発見することが多いです。PostgreSQLでは <code>pg_stat_statements</code> で「最も実行回数が多いクエリ」を確認すると、N+1起因のクエリが上位に現れます。Railsなら <code>bullet</code> gem、Laravelなら <code>Laravel Debugbar</code> などのN+1検出ツールも開発環境で活用しましょう。
</div>
</div>
`

{

  premise: `<p>APIの一覧エンドポイントで最も一般的なページングは <code>LIMIT N OFFSET M</code> です。しかしOFFSETは<em>スキップする行もすべて読んでから捨てる</em>ため、後半ページになるほど線形に遅くなります。</p>
<pre><span class="cmt">-- OFFSETページングの問題（10000ページ目）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>
<span class="kw">OFFSET</span> <span class="num">200000</span>;  <span class="cmt">-- ❌ 200000行読んでから捨てる → 後半ページほど遅い</span></pre>
<div class="callout warn"><strong>Keyset（カーソル）Pagination：</strong>前ページの最後の行のキー値を使って「それより大きい/小さい行」に絞り込む方式です。スキップ行のスキャンが発生せず、どのページでも一定のパフォーマンスが維持されます。</div>`,
  question: `<p><code>orders</code> テーブルに対する「前ページの最後のorder_id・created_atを受け取って次ページを返す」<em>Keyset Pagination クエリ</em>を実装してください。ソートは <code>created_at DESC, order_id DESC</code> です。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（500万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>amount</th><th>created_at</th></tr>

  premise: `<p>PostgreSQLの <strong>JSONB</strong> 型はJSONをバイナリ形式で格納し、キー・値の検索や演算子が使えます。ただし通常のBTreeインデックスはJSONBに効かず、<em>GIN（Generalized Inverted Index）インデックス</em> を使う必要があります。</p>
<pre><span class="cmt">-- GINインデックス: JSONB全体を対象にする</span>
<span class="kw">CREATE INDEX</span> idx_meta_gin <span class="kw">ON</span> <span class="tbl">products</span> <span class="kw">USING GIN</span> (metadata);

<span class="cmt">-- jsonb_path_ops: @> 演算子専用（サイズが小さく高速）</span>

  answer: `<pre><span class="cmt">-- ① GINインデックス（@> 演算子専用・最も効率的）</span>

<div class="viz-flow">

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>JSONBとJSONの違いは「バイナリ格納かテキスト格納か」です。JSONB はキーが自動ソートされ重複キーが除去されるため、<code>@&gt;</code> 演算子やインデックスが使えます。JSON型（非JSONB）はテキストのまま格納されるためインデックスが使えず、常にJSONBを選ぶべきです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>GINインデックスの更新コスト：</strong>GINインデックスは書き込み時に「ペンディングリスト」に溜めて非同期でインデックスに反映する仕組み（Fastupdate）を持ちます。書き込みが多い列にGINを張ると、Fastupdate のマージ処理が定期的に発生しI/Oが増えます。書き込み頻度が高い列には <code>WITH (fastupdate=off)</code> で無効化することも選択肢です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>JSONB vs 正規化テーブル：</strong>JSONBは「スキーマが頻繁に変わる」「カラムが多様でスパース」な場合に有効です。一方、「常にセットで使う」「型安全性が必要」「複雑なJOINを行う」場合は正規化した通常のテーブルの方が保守性・パフォーマンスともに優れます。JSONBは「正規化の例外」として使うべきものです。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>-&gt;&gt;演算子で取得してからアプリ側でフィルタ：</strong><code>SELECT * FROM products</code> で全件取得してアプリ側でJSONBのcolorをフィルタするパターンです。SQLのWHERE句でフィルタしてインデックスを効かせることが基本です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>JSON型（非JSONB）を使う：</strong>JSON型はインデックスも演算子も使えません。新しいプロジェクトではJSON型を使う理由はほぼないため、常にJSONBを選んでください。</div></div>
</div>

<div class="column-title">☕ 実務コラム：EAV（Entity-Attribute-Value）のアンチパターンとJSONB</div>
<div class="column-body">
かつて「動的属性」を表現するために <code>(entity_id, attribute_name, value)</code> の3列テーブル（EAV）が使われていましたが、JOINが爆発的に複雑になり保守困難になりました。PostgreSQLのJSONBはこのEAVの代替として優れており、<strong>スキーマが不定な属性はJSONBに、固定スキーマの属性は通常カラムに</strong>というハイブリッド設計が実務ではベストプラクティスです。例えば <code>products(id, name, price, metadata JSONB)</code> のように共通属性はカラムで持ち、商品カテゴリごとの追加属性だけをJSONBに格納する設計が推奨されます。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q7  Materialized View — 重い集計クエリのキャッシュ化
══════════════════════════════════════════════════ */
{
  num: 7,
  title: "Materialized View — 重い集計クエリをMVでキャッシュしてダッシュボードを高速化",
  tags: [["r","Materialized View"],["r","REFRESH"],["o","集計キャッシュ"],["g","ダッシュボード"]],
  premise: `<p><strong>Materialized View（MV）</strong>はビューの一種ですが、クエリ結果をディスクに物理的に保存します。通常のビューは毎回クエリを実行しますが、MVは<em>保存済みの結果を直接返す</em>ため、重い集計クエリのキャッシュとして機能します。</p>
<pre><span class="cmt">-- 通常ビュー: 参照するたびに内部クエリを実行する</span>
<span class="kw">CREATE VIEW</span> v_summary <span class="kw">AS</span>
    <span class="kw">SELECT</span> user_id, <span class="fn">SUM</span>(amount) <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">GROUP BY</span> user_id;

<span class="cmt">-- Materialized View: 結果をディスクに保存して高速返却</span>
<span class="kw">CREATE MATERIALIZED VIEW</span> mv_summary <span class="kw">AS</span>
    <span class="kw">SELECT</span> user_id, <span class="fn">SUM</span>(amount) <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">GROUP BY</span> user_id;</pre>
<div class="callout warn"><strong>REFRESH が必要：</strong>元テーブルのデータが変わってもMVは自動更新されません。<code>REFRESH MATERIALIZED VIEW</code> で手動更新します。CONCURRENTLY オプションを使うと参照をブロックせずに更新できます（一意インデックスが必要）。</div>`,
  question: `<p>ダッシュボードの「月別売上集計」クエリが毎回5秒以上かかっています。<em>Materialized Viewを作成</em>してダッシュボードを高速化し、合わせてCONCURRENTLYでの定期更新クエリも示してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（1000万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>amount</th><th>created_at</th></tr>
        <tr><td>1</td><td>U001</td><td>3000</td><td>2024-01-15</td></tr>
        <tr><td>2</td><td>U002</td><td>5000</td><td>2024-01-20</td></tr>
        <tr><td>3</td><td>U001</td><td>1200</td><td>2024-02-03</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 毎回5秒かかる集計クエリ（ダッシュボードで毎リクエスト実行）</span>
<span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month,
    <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> order_count,
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_amount,
    <span class="fn">AVG</span>(amount) <span class="kw">AS</span> avg_amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at)
<span class="kw">ORDER BY</span> month;</pre>`,
  output: `<p>MV作成後（ダッシュボードは mv_monthly_sales を参照 → 即時返却）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th>order_count</th><th>total_amount</th><th>avg_amount</th></tr>
<tr class="tr-hi2"><td>2024-01-01</td><td class="tc-g">2</td><td class="tc-y">8000</td><td class="tc-hi">4000.00</td></tr>
<tr class="tr-hi2"><td>2024-02-01</td><td class="tc-g">1</td><td class="tc-y">1200</td><td class="tc-hi">1200.00</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① Materialized View の作成（最初のREFRESHも同時に実行される）</span>
<span class="kw">CREATE MATERIALIZED VIEW</span> mv_monthly_sales  <span class="cmt">-- 【超基礎】MVの名前を定義</span>
<span class="kw">AS</span>
<span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month,  <span class="cmt">-- 【超基礎】月単位に丸める関数</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> order_count,                 <span class="cmt">-- 【超基礎】各月の注文件数</span>
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_amount,                <span class="cmt">-- 【超基礎】各月の合計金額</span>
    <span class="fn">AVG</span>(amount) <span class="kw">AS</span> avg_amount                   <span class="cmt">-- 【超基礎】各月の平均金額</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at)
<span class="kw">ORDER BY</span> month
<span class="kw">WITH DATA</span>;                                     <span class="cmt">-- 【超基礎】作成直後にデータを格納する</span>

<span class="cmt">-- ② CONCURRENTLY更新のための一意インデックス（必須）</span>
<span class="kw">CREATE UNIQUE INDEX</span> idx_mv_monthly_sales_month
    <span class="kw">ON</span> mv_monthly_sales (month);               <span class="cmt">-- CONCURRENTLYに一意インデックスが必須</span>

<span class="cmt">-- ③ 定期更新（cron や pg_cron で実行 → ダッシュボードは古いデータを参照し続けられる）</span>
<span class="kw">REFRESH MATERIALIZED VIEW CONCURRENTLY</span>        <span class="cmt">-- 【応用】参照ロックなしで更新（SELECT可能な状態を維持）</span>
    mv_monthly_sales;                          <span class="cmt">-- 更新するMV名</span>

<span class="cmt">-- ④ ダッシュボードクエリ（元の5秒クエリの代わりにMVを参照）</span>
<span class="kw">SELECT</span> month, order_count, total_amount, avg_amount  <span class="cmt">-- 【超基礎】MVをテーブルのように参照</span>
<span class="kw">FROM</span>   mv_monthly_sales
<span class="kw">ORDER BY</span> month;                                <span class="cmt">-- 【超基礎】月順に並べる</span>

<span class="cmt">-- ⑤ MVの最終更新時刻を確認する</span>
<span class="kw">SELECT</span> schemaname, matviewname, last_refresh
<span class="kw">FROM</span>   pg_matviews                             <span class="cmt">-- MVのメタ情報テーブル</span>
<span class="kw">WHERE</span>  matviewname <span class="op">=</span> <span class="str">'mv_monthly_sales'</span>;

<span class="cmt">/*
  実行順序（④のクエリ）:
  1. FROM mv_monthly_sales    → ディスクに保存済みの集計結果を直接読む（Seq Scan）
  2. ORDER BY month           → 少数行（月数分）をソート
  3. SELECT 列を返す          → 事前集計済みの結果を返す（集計処理は発生しない）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>通常ビュー vs Materialized View の動作比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>種別</th><th>データの所在</th><th>参照速度</th><th>データの鮮度</th><th>更新操作</th></tr>
<tr class="tr-hi"><td>通常 VIEW</td><td class="tc-r">毎回元テーブルから計算</td><td class="tc-r">遅い（5秒）</td><td class="tc-g">常に最新</td><td>不要</td></tr>
<tr class="tr-hi2"><td>Materialized VIEW</td><td class="tc-g">ディスクに保存済み</td><td class="tc-g">速い（数ms）</td><td class="tc-y">REFRESH時点</td><td class="tc-y">手動/定期が必要</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">REFRESH CONCURRENTLY により参照をブロックせずに更新できる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>REFRESH の種類と違い</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>REFRESH方式</th><th>参照ブロック</th><th>一意インデックス</th><th>動作</th></tr>
<tr class="tr-hi"><td>REFRESH MATERIALIZED VIEW</td><td class="tc-r">ブロックあり（AccessExclusiveLock）</td><td>不要</td><td>全件洗い替え</td></tr>
<tr class="tr-hi2"><td>REFRESH ... CONCURRENTLY</td><td class="tc-g">ブロックなし（参照可能）</td><td class="tc-r">必須</td><td>差分更新（重い）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>Materialized Viewは「計算結果を保存したテーブル」と思ってください。ダッシュボードや分析画面など「リアルタイム性よりも速度を優先したい」場面に最適です。元テーブルが更新されてもMVには自動で反映されないため、「許容できる遅延時間」を要件として決めてからREFREHのスケジュールを設定します。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>pg_cronで定期REFRESH：</strong>PostgreSQL拡張の <code>pg_cron</code> を使うと、DB内から定期的にREFRESHをスケジュールできます。<code>SELECT cron.schedule('*/10 * * * *', 'REFRESH MATERIALIZED VIEW CONCURRENTLY mv_monthly_sales')</code> で10分おきにREFRESHできます。外部のcronサーバーが不要になり、DB側で完結します。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>MVにインデックスを張れる：</strong>MVは通常テーブルと同様にインデックスを作成できます。CONCURRENT REFRESHに必要な一意インデックス以外にも、よく使うWHERE条件やJOIN条件用のインデックスをMVに追加することでさらに高速化できます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>リアルタイム性が必要な画面にMVを使う：</strong>注文確定直後に「最新の集計」を表示する画面にMVを使うと、REFRESHのタイミングまで古いデータが表示されます。MVは「多少古くても良い」ダッシュボード・分析・レポートに限定してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CONCURRENTLY なしでピーク時にREFRESHする：</strong>CONCURRENTLY なしのREFRESHは AccessExclusiveLock を取得するためMVへの参照が完全にブロックされます。トラフィックが多い時間帯に実行するとダッシュボードが数秒間応答不能になります。必ずCONCURRENTLYを使うか、低トラフィック時間帯に実行してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：MVとRedisキャッシュの使い分け</div>
<div class="column-body">
ダッシュボードの集計結果をキャッシュする手段として「MVをREFRESH」と「Redisにキャッシュ」の2択がよく議論されます。<strong>MVはDB内で完結して整合性管理が容易</strong>、<strong>RedisはTTLで柔軟にコントロールでき非常に高速</strong>という特徴があります。「1分ごとに更新でよい集計」ならMV、「複数サービスで共有が必要」「サブ秒で返したい」ならRedis、という使い分けが実務のスタンダードです。両者を組み合わせてMVで集計しRedisにコピーする設計もあります。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q8  UPSERT（INSERT ON CONFLICT） — 冪等なデータ更新
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "UPSERT（INSERT ON CONFLICT）— 冪等な書き込みパターンで二重挿入バグを防ぐ",
  tags: [["r","INSERT ON CONFLICT"],["r","UPSERT"],["o","冪等性"],["p","楽観的ロック"]],
  premise: `<p><strong>UPSERT</strong>（Update + Insert の合成語）は「レコードが存在しなければINSERT、存在すればUPDATE」を1回のクエリで安全に行うパターンです。PostgreSQLでは <code>INSERT ... ON CONFLICT</code> 構文で実現します。</p>
<pre><span class="cmt">-- 基本構文</span>
<span class="kw">INSERT INTO</span> <span class="tbl">テーブル</span> (col1, col2)
<span class="kw">VALUES</span> (val1, val2)
<span class="kw">ON CONFLICT</span> (unique_col)         <span class="cmt">-- どの列の重複で衝突を検出するか</span>
<span class="kw">DO UPDATE SET</span>                    <span class="cmt">-- 衝突時の更新内容</span>
    col2 <span class="op">=</span> <span class="kw">EXCLUDED</span>.col2;        <span class="cmt">-- EXCLUDED = INSERTしようとした値（新しい値）</span></pre>
<div class="callout ok"><strong>冪等性（Idempotency）：</strong>同じリクエストを何回実行しても結果が変わらない性質です。リトライが発生するAPIやバッチ処理では、冪等なDB書き込みが不可欠です。UPSERTを使うことで「二重実行しても最終状態が同じ」を保証できます。</div>`,
  question: `<p>ECサイトのカート更新APIで「カートに商品を追加or数量更新」する処理があります。現在は「SELECT → 存在確認 → INSERT or UPDATE」という3ステップになっており、<em>並行リクエスト時に二重INSERT</em>が発生しています。<em>UPSERTで1クエリに統合</em>してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ cart_items（ユニーク制約あり）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>cart_id</th><th>product_id</th><th>quantity</th><th>updated_at</th></tr>
        <tr><td>C001</td><td>P001</td><td>2</td><td>2024-09-01 10:00</td></tr>
        <tr><td>C001</td><td>P002</td><td>1</td><td>2024-09-01 10:05</td></tr>
      </table></div>
      <p style="font-size:11px;color:var(--dim);margin-top:4px;">UNIQUE(cart_id, product_id)</p>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 問題のある3ステップ方式（並行リクエストで二重INSERT発生）</span>
<span class="cmt">-- Step1: SELECT（存在確認）</span>
<span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> <span class="tbl">cart_items</span> <span class="kw">WHERE</span> cart_id<span class="op">=</span><span class="str">'C001'</span> <span class="kw">AND</span> product_id<span class="op">=</span><span class="str">'P001'</span>;
<span class="cmt">-- Step2a: 存在しなければINSERT</span>
<span class="kw">INSERT INTO</span> <span class="tbl">cart_items</span> (cart_id, product_id, quantity) <span class="kw">VALUES</span> (<span class="str">'C001'</span>,<span class="str">'P001'</span>,<span class="num">1</span>);
<span class="cmt">-- Step2b: 存在すればUPDATE</span>
<span class="kw">UPDATE</span> <span class="tbl">cart_items</span> <span class="kw">SET</span> quantity<span class="op">=</span>quantity<span class="op">+</span><span class="num">1</span> <span class="kw">WHERE</span> cart_id<span class="op">=</span><span class="str">'C001'</span> <span class="kw">AND</span> product_id<span class="op">=</span><span class="str">'P001'</span>;</pre>`,
  output: `<p>UPSERT実行後のcart_items（P001の数量が1→3に更新、P003が新規追加）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>cart_id</th><th>product_id</th><th class="tc-hi">quantity</th><th>updated_at</th></tr>
<tr class="tr-hi2"><td>C001</td><td>P001</td><td class="tc-g">3（+1）</td><td class="tc-hi">2024-09-01 11:00</td></tr>
<tr><td>C001</td><td>P002</td><td>1</td><td>2024-09-01 10:05</td></tr>
<tr class="tr-hi2"><td>C001</td><td>P003</td><td class="tc-g">1（新規）</td><td class="tc-hi">2024-09-01 11:00</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① 基本UPSERT：カートに商品を追加or数量を1増やす</span>
<span class="kw">INSERT INTO</span> <span class="tbl">cart_items</span> (         <span class="cmt">-- 【超基礎】INSERTのテーブルと列を指定</span>
    cart_id, product_id, quantity, updated_at
)
<span class="kw">VALUES</span> (
    <span class="str">'C001'</span>, <span class="str">'P001'</span>, <span class="num">1</span>, <span class="fn">NOW</span>()        <span class="cmt">-- 【超基礎】挿入する値（競合時はEXCLUDEDで参照できる）</span>
)
<span class="kw">ON CONFLICT</span> (cart_id, product_id) <span class="cmt">-- 【超基礎】この2列のUNIQUE制約で衝突を検出する</span>
<span class="kw">DO UPDATE SET</span>                      <span class="cmt">-- 【超基礎】衝突（すでに存在）した場合の更新処理</span>
    quantity   <span class="op">=</span> <span class="tbl">cart_items</span>.quantity <span class="op">+</span> <span class="kw">EXCLUDED</span>.quantity,  <span class="cmt">-- 既存量 + 新規量（加算）</span>
    updated_at <span class="op">=</span> <span class="kw">EXCLUDED</span>.updated_at; <span class="cmt">-- 【応用】EXCLUDED=INSERTしようとした値</span>

<span class="cmt">-- ② 無視パターン：同じ（cart_id, product_id）が来たら何もしない</span>
<span class="kw">INSERT INTO</span> <span class="tbl">cart_items</span> (cart_id, product_id, quantity, updated_at)
<span class="kw">VALUES</span> (<span class="str">'C001'</span>, <span class="str">'P001'</span>, <span class="num">1</span>, <span class="fn">NOW</span>())
<span class="kw">ON CONFLICT</span> (cart_id, product_id)
<span class="kw">DO NOTHING</span>;                         <span class="cmt">-- 【応用】衝突時に何もしない（重複挿入防止のみ）</span>

<span class="cmt">-- ③ 上書きパターン：新しい数量で強制上書き（在庫同期などに使う）</span>
<span class="kw">INSERT INTO</span> <span class="tbl">cart_items</span> (cart_id, product_id, quantity, updated_at)
<span class="kw">VALUES</span> (<span class="str">'C001'</span>, <span class="str">'P003'</span>, <span class="num">5</span>, <span class="fn">NOW</span>())
<span class="kw">ON CONFLICT</span> (cart_id, product_id)
<span class="kw">DO UPDATE SET</span>
    quantity   <span class="op">=</span> <span class="kw">EXCLUDED</span>.quantity,   <span class="cmt">-- 既存を無視して新しい値で上書き</span>
    updated_at <span class="op">=</span> <span class="kw">EXCLUDED</span>.updated_at
<span class="kw">WHERE</span>                                  <span class="cmt">-- 【応用】WHERE句で楽観ロック（古いデータなら上書きしない）</span>
    <span class="tbl">cart_items</span>.updated_at <span class="op">&lt;</span> <span class="kw">EXCLUDED</span>.updated_at;  <span class="cmt">-- 既存の方が新しければスキップ</span>

<span class="cmt">-- ④ 複数行をまとめてUPSERT（バッチ更新に使う）</span>
<span class="kw">INSERT INTO</span> <span class="tbl">cart_items</span> (cart_id, product_id, quantity, updated_at)
<span class="kw">VALUES</span>
    (<span class="str">'C001'</span>, <span class="str">'P001'</span>, <span class="num">2</span>, <span class="fn">NOW</span>()),      <span class="cmt">-- 行1</span>
    (<span class="str">'C001'</span>, <span class="str">'P002'</span>, <span class="num">3</span>, <span class="fn">NOW</span>()),      <span class="cmt">-- 行2（複数行を1クエリでUPSERT）</span>
    (<span class="str">'C001'</span>, <span class="str">'P004'</span>, <span class="num">1</span>, <span class="fn">NOW</span>())       <span class="cmt">-- 行3（新規挿入）</span>
<span class="kw">ON CONFLICT</span> (cart_id, product_id)
<span class="kw">DO UPDATE SET</span>
    quantity   <span class="op">=</span> <span class="kw">EXCLUDED</span>.quantity,
    updated_at <span class="op">=</span> <span class="kw">EXCLUDED</span>.updated_at;

<span class="cmt">/*
  実行順序（①のクエリ）:
  1. INSERT VALUES を試みる         → 新規行として挿入を試みる
  2. ON CONFLICT 検出               → (cart_id, product_id) のUNIQUE制約に違反を検知
  3. DO UPDATE SET                  → 既存行を更新（quantity加算、updated_at更新）
  4. 影響行数を返す                 → INSERT=0行, UPDATE=1行（または逆）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>SELECT→INSERT/UPDATEとUPSERTの並行実行安全性比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方式</th><th>DB往復回数</th><th>並行リクエストの安全性</th><th>二重INSERT発生</th></tr>
<tr class="tr-hi"><td>SELECT→INSERT or UPDATE（旧）</td><td class="tc-r">2〜3回</td><td class="tc-r">❌ 危険（TOCTOU競合）</td><td class="tc-r">あり得る</td></tr>
<tr class="tr-hi2"><td>INSERT ON CONFLICT（UPSERT）</td><td class="tc-g">1回</td><td class="tc-g">✅ 安全（アトミック）</td><td class="tc-g">発生しない</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">EXCLUDEDはINSERTしようとした（却下された）行の値を参照できる仮想テーブル</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>ON CONFLICT の3パターン使い分け</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>パターン</th><th>衝突時の動作</th><th>使用場面</th></tr>
<tr class="tr-hi2"><td>DO UPDATE SET col = EXCLUDED.col + 既存.col</td><td>加算・マージ更新</td><td>カート数量追加・カウンタ加算</td></tr>
<tr class="tr-hi"><td>DO UPDATE SET col = EXCLUDED.col</td><td>新しい値で上書き</td><td>在庫同期・設定の上書き</td></tr>
<tr class="tr-hi3"><td>DO NOTHING</td><td>何もしない（無視）</td><td>重複挿入防止・べき等な初期化</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>UPSERT の ON CONFLICT は「挿入しようとしたがUNIQUE制約に違反した場合に何をするか」を指定します。<code>EXCLUDED</code> は「INSERTしようとしたが弾かれた行」を指す仮想テーブル名で、新しい値を参照するために使います。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ON CONFLICT の対象制約を明示する：</strong><code>ON CONFLICT ON CONSTRAINT constraint_name</code> のように制約名で指定することもできます。テーブルにUNIQUE制約が複数ある場合は、どの制約で衝突を判定するかを列名または制約名で明示してください。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>RETURNING句で更新結果を取得する：</strong><code>INSERT ... ON CONFLICT ... RETURNING *</code> を追加すると、INSERT/UPDATEいずれの場合でも最終的な行の状態を返します。「UPSERTした結果のIDや updated_at を返したい」APIに便利です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT→INSERT/UPDATEパターン（TOCTOU競合）：</strong>SELECTで「存在しない」を確認した後、別のリクエストが先にINSERTする可能性があります（Time-Of-Check to Time-Of-Use競合）。UPSERTはこの競合をDBレベルでアトミックに解決します。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>UNIQUE制約なしにON CONFLICTを使う：</strong>ON CONFLICT の衝突検知には対象列にUNIQUE制約（またはUNIQUEインデックス）が必須です。制約がない場合はエラーになります。UPSERTを設計する前にUNIQUE制約を確認・追加してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：バッチ処理でのUPSERT活用</div>
<div class="column-body">
外部APIやCSVからのデータ同期バッチでは、「すでに取り込み済みのデータは更新、新規は挿入」というパターンが頻出です。ループでSELECT→INSERT/UPDATEを繰り返すと N×2回のDB往復が発生しますが、<strong>複数行を1つのUPSERT（VALUES多行）にまとめる</strong>ことでDB往復を1回に削減できます。1回あたり1000〜5000行をまとめてUPSERTするチャンク設計が実務のベストプラクティスです（Q10のバッチチャンク処理と組み合わせると効果的）。
</div>
</div>
`
},

  premise: `<p>「テーブルAに関連するテーブルBのレコードが存在するかどうか」を判定するには <code>EXISTS</code>、<code>IN</code>、<code>JOIN</code> の3つのアプローチがあります。それぞれ動作が異なり、データの規模・NULL含有・インデックスの有無によって最適な選択が変わります。</p>
<pre><span class="cmt">-- EXISTS: 相関サブクエリで存在確認（1件見つかれば即停止）</span>
<span class="kw">WHERE EXISTS</span> (<span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> <span class="tbl">B</span> <span class="kw">WHERE</span> B.id <span class="op">=</span> A.id);

<span class="cmt">-- IN: サブクエリの結果リストに含まれるかを確認</span>
<span class="kw">WHERE</span> A.id <span class="kw">IN</span> (<span class="kw">SELECT</span> id <span class="kw">FROM</span> <span class="tbl">B</span>);

<span class="cmt">-- JOIN（INNER JOIN）: 結合して一致する行のみ返す</span>
<span class="kw">FROM</span> <span class="tbl">A</span> <span class="kw">JOIN</span> <span class="tbl">B</span> <span class="kw">ON</span> A.id <span class="op">=</span> B.id;</pre>
<div class="callout warn"><strong>NULLのINの罠：</strong>サブクエリの結果にNULLが含まれると、<code>NOT IN</code> は全件0件を返すバグが発生します（Q1基礎編で解説）。NOT INを使う際は必ずNULLを除外するかNOT EXISTSを使ってください。</div>`,
  question: `<p>以下の3つの要件を、<em>EXISTS・IN・JOINそれぞれで実装</em>し、どの方式が適切かを判断してください。①購入実績のあるユーザー一覧、②購入実績のないユーザー一覧、③直近30日に購入したユーザーのメール一覧。</p>

<tr class="tr-hi"><td>②購入なし</td><td class="tc-g">U002</td><td class="tc-hi">NOT EXISTS</td></tr>

  answer: `<pre><span class="cmt">-- ① 購入実績のあるユーザー（3方式の比較）</span>

<span class="cmt">-- [EXISTS版] 相関サブクエリ（1件見つかれば即停止 → 大テーブル向き）</span>
<span class="kw">SELECT</span> u.user_id, u.name
<span class="kw">FROM</span>   <span class="tbl">users</span> u
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (                    <span class="cmt">-- 【超基礎】サブクエリが1行以上返ればtrue</span>
    <span class="kw">SELECT</span> <span class="num">1</span>                        <span class="cmt">-- 【超基礎】SELECT 1 は存在確認なので値は不要</span>

);

<span class="kw">SELECT</span> user_id, name
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  user_id <span class="kw">IN</span> (               <span class="cmt">-- 【超基礎】サブクエリの結果セットに含まれればtrue</span>
    <span class="kw">SELECT</span> <span class="kw">DISTINCT</span> user_id        <span class="cmt">-- 【応用】DISTINCTでIN句の重複を排除（オプティマイザが自動でやる場合も）</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span>
);

<span class="cmt">-- [JOIN版] INNER JOIN + DISTINCT（結合後に重複を除去）</span>
<span class="kw">SELECT DISTINCT</span> u.user_id, u.name  <span class="cmt">-- 【超基礎】同一ユーザーが複数回一致するためDISTINCTで重複除去</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">JOIN</span>   <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id;  <span class="cmt">-- 【超基礎】結合するとorder件数分だけ行が増える</span>

<span class="cmt">-- ② 購入実績のないユーザー（NOT EXISTS が安全・推奨）</span>
<span class="kw">SELECT</span> u.user_id, u.name
<span class="kw">FROM</span>   <span class="tbl">users</span> u
<span class="kw">WHERE</span>  <span class="kw">NOT EXISTS</span> (                 <span class="cmt">-- 【超基礎】サブクエリが0行ならtrue（NOT IN とは違いNULL安全）</span>
    <span class="kw">SELECT</span> <span class="num">1</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span> o
    <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id    <span class="cmt">-- NULLがあってもUNKNOWNにならずに安全に動作</span>
);

<span class="cmt">-- ③ 直近30日に購入したユーザーのメール（EXISTS + 日付条件）</span>
<span class="kw">SELECT</span> u.user_id, u.email
<span class="kw">FROM</span>   <span class="tbl">users</span> u
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (
    <span class="kw">SELECT</span> <span class="num">1</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span> o
    <span class="kw">WHERE</span>  o.user_id   <span class="op">=</span> u.user_id              <span class="cmt">-- 相関条件</span>
      <span class="kw">AND</span>  o.created_at <span class="op">&gt;=</span> <span class="fn">NOW</span>() <span class="op">-</span> <span class="kw">INTERVAL</span> <span class="str">'30 days'</span>  <span class="cmt">-- 【超基礎】INTERVALで相対日付を指定</span>
);

<span class="cmt">/*
  実行順序（① EXISTS版）:
  1. FROM users u                 → usersテーブルを全行スキャン
  2. EXISTS (SELECT 1 FROM orders WHERE o.user_id = u.user_id)
                                  → 各userに対してordersをインデックス検索
                                  → 1件でも見つかれば即STOP（Short-circuit）
  3. WHERE EXISTS → true の行のみ  → 購入ありユーザーを絞り込む
  4. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>EXISTS / IN / JOIN の特性比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方式</th><th>動作</th><th>NULL安全性</th><th>重複行</th><th>最適な場面</th></tr>
<tr class="tr-hi"><td>EXISTS</td><td class="tc-g">1件見つかれば即停止（Short-circuit）</td><td class="tc-g">安全</td><td class="tc-g">自動で除外</td><td>大きいサブテーブル・NOT EXISTS</td></tr>
<tr class="tr-hi2"><td>IN</td><td class="tc-y">サブクエリ全件をリスト化してから比較</td><td class="tc-r">NOT INは危険</td><td class="tc-g">自動で除外</td><td>小さい固定リスト・直接値リスト</td></tr>
<tr class="tr-hi3"><td>INNER JOIN</td><td class="tc-y">両テーブルを結合してフィルタ</td><td class="tc-g">安全</td><td class="tc-r">重複発生→DISTINCT必要</td><td>追加の列も同時取得したい</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">PostgreSQLは内部的にEXISTSとINをSemi-Joinに変換して最適化することが多い</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>NOT IN の NULL 罠シミュレーション</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ordersのuser_id列</th><th>NOT IN の評価</th><th>結果</th></tr>
<tr class="tr-hi2"><td>(U001, U003) ← NULLなし</td><td class="tc-g">正常に評価</td><td class="tc-g">U002が返る（正しい）</td></tr>
<tr class="tr-hi"><td>(U001, U003, <span class="tc-r">NULL</span>)</td><td class="tc-r">U002 NOT IN (..., NULL) → UNKNOWN</td><td class="tc-r">0件（バグ！）</td></tr>
<tr class="tr-hi2"><td>NOT EXISTSの場合（どちらでも）</td><td class="tc-g">NULLをUNKNOWNで無視</td><td class="tc-g">U002が返る（正しい）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>EXISTSの <code>SELECT 1</code> は「値は何でも良い」という意味です。EXISTSはサブクエリが「1行以上存在するか」だけを見るため、SELECTの中身は関係なく慣例的に <code>SELECT 1</code> が使われます。<code>SELECT *</code> でも動作は同じですが、パフォーマンス上も <code>SELECT 1</code> が推奨されます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>Semi-Join最適化：</strong>PostgreSQLは EXISTS / IN を内部的に「Semi-Join」という結合戦略に変換して実行計画を立てることが多いです。EXISTSとINは記述スタイルの違いはありますが、最近のオプティマイザはほぼ同等のプランを生成します。意味の明確さで選ぶなら「存在確認」にはEXISTS、「リストに含まれる」にはINが読みやすいです。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>JOINで追加列も取得する：</strong>「購入ありユーザーの名前と最新注文日を同時に返す」など、条件確認と同時に追加データを取得したい場合はJOINが最適です。EXISTSやINでは存在確認のみしか行えず、サブクエリ内の値を SELECT に持ち出すことができません。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>NOT IN でNULLを含む可能性がある列を使う：</strong>NOT IN のサブクエリが返す列にNULLが含まれると、全件0件という致命的なバグが発生します。NOT INを使う際は必ず <code>WHERE col IS NOT NULL</code> を追加するか、NOT EXISTSに書き換えてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>JOIN後にDISTINCTを忘れる：</strong>「購入ありユーザー」をINNER JOINで取得すると、購入件数分だけ同じユーザー行が重複します。DISTINCTを忘れると重複した行がAPIレスポンスに含まれます。EXISTS/INを使えばDISTINCTが不要になるケースでは積極的に使いましょう。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：EXPLAIN で Semi-Join の変換を確認する</div>
<div class="column-body">
PostgreSQLで <code>EXPLAIN SELECT ... WHERE EXISTS (...)</code> を実行すると、実行計画に <strong>「Hash Semi Join」</strong> や <strong>「Nested Loop Semi Join」</strong> が表示されることがあります。これはDBがEXISTS/INを内部的にSemi-Join（結合後に左テーブルの重複を自動除去する特殊JOIN）に変換した証拠です。同様にNOT EXISTSは「Anti-Join」に変換されます。EXISTSを使ってもEXPLAINでJoinノードが出ることを知っておくと、実行計画の読み間違いを防げます。
</div>
</div>
`
},

{

  question: `<p><code>logs</code> テーブルの「90日以上前のログ」300万件を削除するバッチを作成してください。本番DBへの影響を最小化するため、<em>1チャンク1000件ずつ・チャンク間にsleepを入れる</em>方式で実装してください。</p>
<div class="data-section">

  answer: `<pre><span class="cmt">-- ① インデックスの確認（チャンク処理でも毎回使われる）</span>
<span class="kw">CREATE INDEX</span> idx_logs_created_at
    <span class="kw">ON</span> <span class="tbl">logs</span> (created_at);   <span class="cmt">-- 日付絞り込みをインデックスで高速化</span>

<span class="cmt">-- ② 対象件数の事前確認（作業量の把握）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> target_count  <span class="cmt">-- 【超基礎】削除予定件数を事前に確認する</span>

<span class="cmt">-- ③ チャンク削除クエリ（アプリ側ループから繰り返し実行する）</span>
<span class="kw">DELETE FROM</span> <span class="tbl">logs</span>               <span class="cmt">-- 【超基礎】対象テーブルから削除</span>
<span class="kw">WHERE</span>  log_id <span class="kw">IN</span> (             <span class="cmt">-- 【応用】削除対象のIDをサブクエリで取得</span>
    <span class="kw">SELECT</span> log_id
    <span class="kw">FROM</span>   <span class="tbl">logs</span>
    <span class="kw">WHERE</span>  created_at <span class="op">&lt;</span> <span class="fn">NOW</span>() <span class="op">-</span> <span class="kw">INTERVAL</span> <span class="str">'90 days'</span>   <span class="cmt">-- 90日以上前</span>
    <span class="kw">ORDER BY</span> log_id              <span class="cmt">-- 【応用】IDの小さい順に削除（ページの断片化を最小化）</span>
    <span class="kw">LIMIT</span>  <span class="num">1000</span>                  <span class="cmt">-- 【超基礎】1チャンクの件数上限（1000件ずつ処理）</span>
);
<span class="cmt">-- ※ アプリ側でaffected_rows=0になるまでループ実行し、各ループ後に100ms sleep</span>

<span class="cmt">-- ④ PostgreSQL DO ブロックによるチャンク削除（DB内で完結させる場合）</span>
<span class="kw">DO</span> $$                           <span class="cmt">-- 【応用】PostgreSQLの無名PL/pgSQL関数ブロック</span>
<span class="kw">DECLARE</span>
    deleted_count <span class="kw">INT</span>;          <span class="cmt">-- 削除件数を保持する変数</span>
    total_deleted <span class="kw">INT</span> <span class="op">:=</span> <span class="num">0</span>;     <span class="cmt">-- 累計削除件数</span>
<span class="kw">BEGIN</span>
    <span class="kw">LOOP</span>                        <span class="cmt">-- 【超基礎】無限ループ（条件でEXIT）</span>
        <span class="kw">DELETE FROM</span> <span class="tbl">logs</span>
        <span class="kw">WHERE</span>  log_id <span class="kw">IN</span> (
            <span class="kw">SELECT</span> log_id <span class="kw">FROM</span> <span class="tbl">logs</span>
            <span class="kw">WHERE</span>  created_at <span class="op">&lt;</span> <span class="fn">NOW</span>() <span class="op">-</span> <span class="kw">INTERVAL</span> <span class="str">'90 days'</span>
            <span class="kw">ORDER BY</span> log_id
            <span class="kw">LIMIT</span>  <span class="num">1000</span>
        );

        <span class="fn">GET DIAGNOSTICS</span> deleted_count <span class="op">=</span> <span class="fn">ROW_COUNT</span>;  <span class="cmt">-- 直前のDMLの影響行数を取得</span>
        total_deleted <span class="op">:=</span> total_deleted <span class="op">+</span> deleted_count;

        <span class="fn">RAISE NOTICE</span> <span class="str">'削除: % 件（累計: % 件）'</span>, deleted_count, total_deleted;  <span class="cmt">-- ログ出力</span>

        <span class="kw">EXIT WHEN</span> deleted_count <span class="op">=</span> <span class="num">0</span>;    <span class="cmt">-- 削除件数が0になったらループ終了</span>
        <span class="fn">PERFORM</span> <span class="fn">pg_sleep</span>(<span class="num">0.1</span>);        <span class="cmt">-- 【応用】0.1秒スリープ（DB負荷を分散）</span>
    <span class="kw">END LOOP</span>;

    <span class="fn">RAISE NOTICE</span> <span class="str">'完了: 合計 % 件を削除しました'</span>, total_deleted;
<span class="kw">END</span>;
$$;

<span class="cmt">-- ⑤ チャンク削除後のVACUUM（dead tupleの回収）</span>
<span class="kw">VACUUM ANALYZE</span> <span class="tbl">logs</span>;            <span class="cmt">-- 【応用】大量削除後はVACUUMでdead tupleを回収・統計更新</span>

<span class="cmt">/*
  実行順序（③のチャンク削除）:
  1. サブクエリ: FROM logs WHERE created_at < 90日前 ORDER BY log_id LIMIT 1000
                              → インデックスで対象範囲を特定し、IDの小さい1000件取得
  2. DELETE FROM logs WHERE log_id IN (上記の1000件)
                              → 1000件のみにロックをかけて削除（短時間で完了）
  3. COMMIT                   → 1チャンクごとにコミット（ロック即解放）
  4. アプリ側: 100ms sleep → 次のチャンクを実行 → 影響行数=0になるまで繰り返す
*/</span></pre>`,

<div class="viz-flow">

<div class="tbl-wrap"><table class="vtbl">

<tr class="tr-hi"><td>全件DELETE（300万件）</td><td class="tc-r">数分〜数十分</td><td class="tc-r">長時間ブロック</td><td class="tc-r">大幅遅延</td></tr>

<tr class="tr-hi4"><td>ピーク時間帯</td><td class="tc-y">100〜500件</td><td class="tc-y">200〜500ms</td><td>ロック時間を最短に、間隔を広く</td></tr>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>PostgreSQLのDELETEは行を「dead tuple（不可視状態）」にするだけで、ディスク容量はすぐには回収されません。VACUUMを実行して初めてディスク領域が再利用可能になります。大量削除後は必ず <code>VACUUM ANALYZE</code> を実行してください。</div></div>

</div>

<div class="column-title">☕ 実務コラム：テーブルパーティショニングで大量削除を無くす設計</div>
<div class="column-body">
<code>logs</code> テーブルを月ごとのパーティションに分割する設計（Range Partitioning）にしておくと、90日前のパーティション（例: logs_2024_01, logs_2024_02, logs_2024_03）を <code>DROP TABLE logs_2024_01</code> するだけで瞬時に削除が完了します。これは内部的にファイルシステムのファイル削除と同じ操作のため、ロック・dead tuple・VACUUMのいずれも不要です。<strong>データ保持期間が決まっているテーブルには最初からパーティショニングを検討する</strong>ことが、後々のバッチ処理の複雑さをなくす設計上の最善手です。
</div>

/* ══════════════════════════════════════════════════

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 003 応用編</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();
</script>
