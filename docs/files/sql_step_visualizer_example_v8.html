<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL処理ステップ可視化 (苦手克服テーマ 5問 - 中級編)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; min-height: 100vh; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
    }

    .sql-viz-wrapper {
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      --font-sans: system-ui, -apple-system, sans-serif;

      --color-bg-base:    #0d1117;
      --color-bg-panel:   #161b22;
      --color-border-main:#30363d;
      --color-border-sub: #21262d;
      --color-txt-main:   #e6edf3;
      --color-txt-sub:    #8b949e;
      --color-txt-muted:  #6e7681;

      --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
      --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
      --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
      --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;
      --sql-purple-bg:  rgba(188, 140, 255, 0.15); --sql-purple-txt: #bc8cff;

      --sql-grp1-bg: rgba(88, 166, 255, 0.03);
      --sql-grp2-bg: rgba(88, 166, 255, 0.08);
      --sql-grp3-bg: rgba(88, 166, 255, 0.14);
      --sql-grp4-bg: rgba(227, 137, 59, 0.08);

      --border-radius: 6px;

      background: var(--color-bg-base);
      color: var(--color-txt-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .sv-tab { padding: 6px 14px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 13px; font-weight: 500; background: transparent; color: var(--color-txt-sub); cursor: pointer; transition: all 0.2s ease; }
    .sv-tab:hover { background: var(--color-bg-panel); }
    .sv-tab.active { background: var(--sql-blue-bg); color: var(--sql-blue-txt); border-color: var(--sql-blue-bd); }
    .sv-tab:focus-visible, .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline: 2px solid var(--sql-blue-txt); outline-offset: 2px; }

    .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 12px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
    .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }

    .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
    .sv-dot.done { background: var(--color-border-main); }
    .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }

    .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 12px; }
    .sv-table th { padding: 6px 12px; font-size: 11px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
    .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }

    .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
    .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
    .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }
    .sv-table th.col-window { background: var(--sql-purple-bg); color: var(--sql-purple-txt); }

    .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
    .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
    .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
    .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }
    .sv-table tr.row-grp-4 td { background: var(--sql-grp4-bg); }

    .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
    .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
    .sv-table td.val-warn   { background: var(--sql-orange-bg) !important; border-left: 2px solid var(--sql-orange-txt); color: var(--sql-orange-txt); font-weight: 600; }
    .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }

    .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
    
    .sql-hl-from, .sql-hl-join, .sql-hl-cte, .sql-hl-left { background: var(--sql-blue-bg); color: var(--sql-blue-txt); border-radius: 3px; padding: 2px 4px; transition: background 0.3s; }
    .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-exists, .sql-hl-order, .sql-hl-case, .sql-hl-in { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border-radius: 3px; padding: 2px 4px; transition: background 0.3s; }
    .sql-hl-select { background: var(--sql-green-bg); color: var(--sql-green-txt); border-radius: 3px; padding: 2px 4px; transition: background 0.3s; }
    .sql-hl-window, .sql-hl-cross, .sql-hl-union, .sql-hl-distinct { background: var(--sql-purple-bg); color: var(--sql-purple-txt); border-radius: 3px; padding: 2px 4px; transition: background 0.3s; }

    .sv-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
    .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
    .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }
    .badge-purple { background: var(--sql-purple-bg); color: var(--sql-purple-txt); border: 1px solid var(--sql-purple-txt); }

    @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .sv-animate { animation: sv-fade-in 0.3s ease forwards; }

    .tbl-label { font-size: 12px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }
    .row-count { font-size: 12px; font-family: var(--font-mono); color: var(--color-txt-sub); margin-top: 8px; text-align: right; }

    .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
    .sv-mobile-collapse summary { list-style: none; }
    .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
    .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }

    @media (min-width: 641px) {
      .sv-mobile-collapse > summary { pointer-events: none; }
      .sv-collapse-icon { display: none !important; }
    }
    @media (max-width: 640px) {
      .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; }
    }
  </style>
</head>
<body>

<h2 class="sr-only">SQL処理ステップ可視化 (苦手克服テーマ 5問 - 中級編)</h2>

<div class="sql-viz-wrapper">

  <div id="sv-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>

  <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">

    <div class="sv-sidebar" style="flex:0 0 300px;min-width:260px;">
      <div style="font-size:11px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
      <div id="sv-sqlbox" style="font-family:var(--font-mono);font-size:11px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>

      <details id="sv-legend-container" class="sv-mobile-collapse" style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:12px 14px;background:var(--color-bg-panel);">
        <summary style="font-size:11px;font-weight:600;color:var(--color-txt-muted);letter-spacing:0.06em;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;margin:0;">
          <span>LEGEND (現在のステップ)</span>
          <span class="sv-collapse-icon" style="font-size:10px;">▼</span>
        </summary>
        <div id="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:10px;margin-top:12px;border-top:1px dashed var(--color-border-sub);padding-top:12px;"></div>
      </details>
    </div>

    <div style="flex:1;min-width:300px;">
      <div id="sv-stepinfo" style="margin-bottom:16px;"></div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;" id="sv-ctrls"></div>
      <div style="font-size:11px;color:var(--color-txt-muted);margin-bottom:16px;">💡 キーボードの ← → 矢印キーでも移動できます</div>
      <div id="sv-tarea" class="sv-animate"></div>
      <div class="row-count" id="sv-rowcount"></div>
    </div>

  </div>
</div>

<script>
(() => {
  const EXERCISES = [
    {
      id: "q1", label: "Q1. 条件の複合 (IN / EXISTS)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "FROM employees e",
          desc: "ベースとなる社員テーブルです。全部で4人の社員が登録されています。",
          type: "base",
          cols: ["id", "name", "dept_id"], ch: ["col-base", "col-base", "col-base"],
          rows: [
            { v: [1, "Alice", 10] },
            { v: [2, "Bob", 20] },
            { v: [3, "Charlie", 10] },
            { v: [4, "Dave", 30] }
          ], cnt: "全 4行"
        },
        { id: "in", badge: "② IN 評価", bc: "badge-orange",
          label: "WHERE dept_id IN (10, 30)",
          desc: "まず IN句で dept_id が 10(IT) または 30(Sales) の社員に絞り込みます。dept_id=20 のBobは除外されます。",
          type: "eval",
          cols: ["id", "name", "dept_id"], ch: ["", "", "col-eval"],
          rows: [
            { v: [1, "Alice", 10], cc: ["", "", "val-pass"] },
            { c: "row-dimmed", v: [2, "Bob", 20], cc: ["val-dimmed", "val-dimmed", "val-fail"] },
            { v: [3, "Charlie", 10], cc: ["", "", "val-pass"] },
            { v: [4, "Dave", 30], cc: ["", "", "val-pass"] }
          ], cnt: "Bob を除外 (残り3行)"
        },
        { id: "exists", badge: "③ EXISTS 評価", bc: "badge-orange",
          label: "AND EXISTS (...)",
          desc: "次に、生き残った行に対して相関サブクエリを実行し、プロジェクトに参加しているか(projectsテーブルに存在するか)を判定します。",
          type: "eval",
          cols: ["id", "name", "dept_id", "EXISTS 判定"], ch: ["col-eval", "", "", "col-eval"],
          rows: [
            { v: [1, "Alice", 10, "True (参加あり)"], cc: ["", "", "", "val-pass"] },
            { c: "row-dimmed", v: [2, "Bob", 20, "(評価スキップ)"], cc: ["val-dimmed", "val-dimmed", "val-dimmed", "val-dimmed"] },
            { c: "row-dimmed", v: [3, "Charlie", 10, "False (参加なし)"], cc: ["", "", "", "val-fail"] },
            { v: [4, "Dave", 30, "True (参加あり)"], cc: ["", "", "", "val-pass"] }
          ], cnt: "Charlie を除外 (残り2行)"
        },
        { id: "select", badge: "④ SELECT", bc: "badge-green",
          label: "SELECT e.name",
          desc: "最終的に条件をすべて満たした社員の名前を出力します。",
          type: "select",
          cols: ["name"], ch: ["col-select"],
          rows: [
            { v: ["Alice"] },
            { v: ["Dave"] }
          ], cnt: "結果: 2行 × 1列"
        }
      ],
      sql: [
        { t: "SELECT\n", k: "sql-kw", h: "select" },
        { t: "  e.name\n", k: "", h: "select" },
        { t: "FROM ", k: "sql-kw", h: "from" }, { t: "employees e\n", k: "", h: "from" },
        { t: "WHERE ", k: "sql-kw", h: "in exists" }, 
        { t: "e.dept_id ", k: "", h: "in" }, { t: "IN ", k: "sql-kw", h: "in" }, { t: "(10, 30)\n", k: "", h: "in" },
        { t: "  AND ", k: "sql-kw", h: "exists" }, { t: "EXISTS ", k: "sql-kw", h: "exists" }, { t: "(\n", k: "", h: "exists" },
        { t: "    SELECT ", k: "sql-kw", h: "exists" }, { t: "1 ", k: "", h: "exists" }, { t: "FROM ", k: "sql-kw", h: "exists" }, { t: "projects p ", k: "", h: "exists" }, { t: "WHERE ", k: "sql-kw", h: "exists" }, { t: "p.emp_id = e.id\n", k: "", h: "exists" },
        { t: "  );", k: "", h: "exists" }
      ]
    },
    {
      id: "q2", label: "Q2. 条件分岐と集計 (CASE)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "FROM scores",
          desc: "テストの点数データです。点数に応じてランク分けし、それぞれのランクの人数を集計します。",
          type: "base",
          cols: ["name", "score"], ch: ["col-base", "col-base"],
          rows: [
            { v: ["Alice", 95] },
            { v: ["Bob", 85] },
            { v: ["Charlie", 75] },
            { v: ["Dave", 90] }
          ], cnt: "全 4行"
        },
        { id: "case", badge: "② CASE式の評価", bc: "badge-orange",
          label: "CASE WHEN score >= 90 THEN 'High' ELSE 'Normal' END",
          desc: "各行の score を評価し、90点以上の人に 'High'、それ未満に 'Normal' という仮想的なランクを付与します。",
          type: "eval",
          cols: ["name", "score", "CASE (rank)"], ch: ["", "col-eval", "col-eval"],
          rows: [
            { v: ["Alice", 95, "High"], cc: ["", "", "val-pass"] },
            { v: ["Bob", 85, "Normal"], cc: ["", "", "val-warn"] },
            { v: ["Charlie", 75, "Normal"], cc: ["", "", "val-warn"] },
            { v: ["Dave", 90, "High"], cc: ["", "", "val-pass"] }
          ], cnt: "ランクの付与"
        },
        { id: "group", badge: "③ GROUP BY", bc: "badge-orange",
          label: "GROUP BY CASE ...",
          desc: "先ほど評価した rank ('High' または 'Normal') をキーにしてグループ化し、人数を COUNT() で数えます。",
          type: "group",
          cols: ["rank", "COUNT(name)"], ch: ["col-eval", "col-eval"],
          rows: [
            { c: "row-grp-1", v: ["High", 2], cc: ["", "val-pass"] },
            { c: "row-grp-2", v: ["Normal", 2], cc: ["", "val-pass"] }
          ], cnt: "2つのグループに集約"
        },
        { id: "select", badge: "④ SELECT", bc: "badge-green",
          label: "SELECT rank, users",
          desc: "最終的な集計結果を出力します。",
          type: "select",
          cols: ["rank", "users"], ch: ["col-select", "col-select"],
          rows: [
            { v: ["High", 2] },
            { v: ["Normal", 2] }
          ], cnt: "結果: 2行 × 2列"
        }
      ],
      sql: [
        { t: "SELECT\n", k: "sql-kw", h: "select" },
        { t: "  CASE\n", k: "sql-kw", h: "select case" },
        { t: "    WHEN ", k: "sql-kw", h: "select case" }, { t: "score >= 90 ", k: "", h: "select case" }, { t: "THEN ", k: "sql-kw", h: "select case" }, { t: "'High'\n", k: "", h: "select case" },
        { t: "    ELSE ", k: "sql-kw", h: "select case" }, { t: "'Normal'\n", k: "", h: "select case" },
        { t: "  END ", k: "sql-kw", h: "select case" }, { t: "AS ", k: "sql-kw", h: "select" }, { t: "rank,\n", k: "", h: "select" },
        { t: "  COUNT", k: "sql-kw", h: "select group" }, { t: "(name) ", k: "", h: "select group" }, { t: "AS ", k: "sql-kw", h: "select" }, { t: "users\n", k: "", h: "select" },
        { t: "FROM ", k: "sql-kw", h: "from" }, { t: "scores\n", k: "", h: "from" },
        { t: "GROUP BY\n", k: "sql-kw", h: "group" },
        { t: "  CASE\n", k: "sql-kw", h: "group case" },
        { t: "    WHEN ", k: "sql-kw", h: "group case" }, { t: "score >= 90 ", k: "", h: "group case" }, { t: "THEN ", k: "sql-kw", h: "group case" }, { t: "'High'\n", k: "", h: "group case" },
        { t: "    ELSE ", k: "sql-kw", h: "group case" }, { t: "'Normal'\n", k: "", h: "group case" },
        { t: "  END;", k: "sql-kw", h: "group case" }
      ]
    },
    {
      id: "q3", label: "Q3. 完全外部結合 (FULL OUTER JOIN)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "左: sys_a (a), 右: sys_b (b)",
          desc: "2つの異なるシステムから抽出したデータです。両方に存在するID(2)もあれば、片方にしか存在しないIDもあります。",
          type: "base", join: true,
          left: {
            label: "sys_a (a) [左テーブル]", cols: ["id", "val_a"],
            rows: [ { v: [1, "A-1"] }, { v: [2, "A-2"] } ]
          },
          right: {
            label: "sys_b (b) [右テーブル]", cols: ["id", "val_b"],
            rows: [ { v: [2, "B-2"] }, { v: [3, "B-3"] } ]
          }, cnt: "結合前の2つのテーブル"
        },
        { id: "join", badge: "② FULL OUTER JOIN", bc: "badge-purple",
          label: "ON a.id = b.id",
          desc: "完全外部結合は、両方のテーブルの全行を保持します。結合相手が見つからない場合は NULL で埋められます。",
          type: "eval",
          cols: ["a.id", "a.val_a", "b.id", "b.val_b"], ch: ["col-eval", "", "col-eval", ""],
          rows: [
            { v: [1, "A-1", "NULL", "NULL"], cc: ["val-pass", "", "val-fail", "val-dimmed"] },
            { v: [2, "A-2", 2, "B-2"], cc: ["val-pass", "", "val-pass", ""] },
            { v: ["NULL", "NULL", 3, "B-3"], cc: ["val-fail", "val-dimmed", "val-pass", ""] }
          ], cnt: "欠損部分をNULLで補完して合体"
        },
        { id: "select", badge: "③ SELECT (COALESCE)", bc: "badge-green",
          label: "SELECT COALESCE(a.id, b.id)",
          desc: "出力時、COALESCE関数を使って「a.idがNULLならb.idを使う」という処理を行い、ID列を綺麗に統一します。",
          type: "select",
          cols: ["unified_id", "val_a", "val_b"], ch: ["col-select", "col-select", "col-select"],
          rows: [
            { v: [1, "A-1", "NULL"], cc: ["val-warn", "", ""] },
            { v: [2, "A-2", "B-2"], cc: ["val-pass", "", ""] },
            { v: [3, "NULL", "B-3"], cc: ["val-warn", "", ""] }
          ], cnt: "結果: 3行 × 3列"
        }
      ],
      sql: [
        { t: "SELECT\n", k: "sql-kw", h: "select" },
        { t: "  COALESCE", k: "sql-kw", h: "select" }, { t: "(a.id, b.id) ", k: "", h: "select" }, { t: "AS ", k: "sql-kw", h: "select" }, { t: "unified_id,\n", k: "", h: "select" },
        { t: "  a.val_a,\n  b.val_b\n", k: "", h: "select" },
        { t: "FROM ", k: "sql-kw", h: "from" }, { t: "sys_a a\n", k: "", h: "from" },
        { t: "FULL OUTER JOIN ", k: "sql-kw", h: "join" }, { t: "sys_b b\n", k: "", h: "join" },
        { t: "  ON ", k: "sql-kw", h: "join" }, { t: "a.id = b.id;", k: "", h: "join" }
      ]
    },
    {
      id: "q4", label: "Q4. 掛け合わせと補完 (CROSS JOIN)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "左: users, 右: months",
          desc: "ユーザー一覧と、月一覧のマスターデータです。",
          type: "base", join: true,
          left: {
            label: "users (u)", cols: ["name"],
            rows: [ { v: ["Alice"] }, { v: ["Bob"] } ]
          },
          right: {
            label: "months (m)", cols: ["mth"],
            rows: [ { v: ["Jan"] }, { v: ["Feb"] } ]
          }, cnt: "掛け合わせの元データ"
        },
        { id: "cross", badge: "② CROSS JOIN", bc: "badge-purple",
          label: "CROSS JOIN months",
          desc: "2つのテーブルの「すべての組み合わせ」を生成します。2人 × 2ヶ月 = 4行 のベースフレーム（マスタ）が完成します。",
          type: "eval",
          cols: ["u.name", "m.mth"], ch: ["col-eval", "col-eval"],
          rows: [
            { v: ["Alice", "Jan"], cc: ["val-warn", "val-warn"] },
            { v: ["Alice", "Feb"], cc: ["val-warn", "val-warn"] },
            { v: ["Bob", "Jan"], cc: ["val-warn", "val-warn"] },
            { v: ["Bob", "Feb"], cc: ["val-warn", "val-warn"] }
          ], cnt: "直積 (全4行) を生成"
        },
        { id: "left", badge: "③ LEFT JOIN 実績", bc: "badge-blue",
          label: "LEFT JOIN logins l",
          desc: "作成したベースフレームに対して、実際のログイン回数(logins)を紐付けます。実績がない箇所は NULL になります。",
          type: "eval",
          cols: ["u.name", "m.mth", "l.cnt (実績)"], ch: ["", "", "col-eval"],
          rows: [
            { v: ["Alice", "Jan", 5], cc: ["", "", "val-pass"] },
            { v: ["Alice", "Feb", "NULL"], cc: ["", "", "val-fail"] },
            { v: ["Bob", "Jan", "NULL"], cc: ["", "", "val-fail"] },
            { v: ["Bob", "Feb", 3], cc: ["", "", "val-pass"] }
          ], cnt: "欠損箇所が明確になる"
        },
        { id: "select", badge: "④ SELECT", bc: "badge-green",
          label: "COALESCE(l.cnt, 0)",
          desc: "実績が NULL の箇所を 0 に変換し、スパース(スカスカ)なデータを綺麗なマトリクスレポート用に整えます。",
          type: "select",
          cols: ["name", "mth", "cnt"], ch: ["col-select", "col-select", "col-select"],
          rows: [
            { v: ["Alice", "Jan", 5] },
            { v: ["Alice", "Feb", 0], cc: ["", "", "val-warn"] },
            { v: ["Bob", "Jan", 0], cc: ["", "", "val-warn"] },
            { v: ["Bob", "Feb", 3] }
          ], cnt: "結果: 4行 × 3列 (ゼロ埋め完了)"
        }
      ],
      sql: [
        { t: "SELECT\n", k: "sql-kw", h: "select" },
        { t: "  u.name,\n  m.mth,\n", k: "", h: "select" },
        { t: "  COALESCE", k: "sql-kw", h: "select" }, { t: "(l.cnt, 0) ", k: "", h: "select" }, { t: "AS ", k: "sql-kw", h: "select" }, { t: "cnt\n", k: "", h: "select" },
        { t: "FROM ", k: "sql-kw", h: "from" }, { t: "users u\n", k: "", h: "from" },
        { t: "CROSS JOIN ", k: "sql-kw", h: "cross" }, { t: "months m\n", k: "", h: "cross" },
        { t: "LEFT JOIN ", k: "sql-kw", h: "left" }, { t: "logins l\n", k: "", h: "left" },
        { t: "  ON ", k: "sql-kw", h: "left" }, { t: "u.name = l.name AND m.mth = l.mth;", k: "", h: "left" }
      ]
    },
    {
      id: "q5", label: "Q5. 縦積みと重複排除 (UNION)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "上: table_a, 下: table_b",
          desc: "同じ構造を持つ2つのテーブルです。(2, 'Y') という同一の行が両方のテーブルに存在しています。",
          type: "base", join: true,
          left: {
            label: "table_a [上]", cols: ["id", "val"],
            rows: [ { v: [1, "X"] }, { v: [2, "Y"] } ]
          },
          right: {
            label: "table_b [下]", cols: ["id", "val"],
            rows: [ { v: [2, "Y"] }, { v: [3, "Z"] } ]
          }, cnt: "2行ずつ、計4行のデータ"
        },
        { id: "union", badge: "② UNION (縦積み)", bc: "badge-purple",
          label: "SELECT ... UNION SELECT ...",
          desc: "まずは両方の結果を縦に繋ぎ合わせます（UNION ALL と同じ状態）。この時点では重複した行が含まれています。",
          type: "eval",
          cols: ["id", "val", "由来元"], ch: ["col-eval", "col-eval", ""],
          rows: [
            { v: [1, "X", "table_a"], cc: ["", "", "val-dimmed"] },
            { v: [2, "Y", "table_a"], cc: ["val-warn", "val-warn", "val-dimmed"] },
            { v: [2, "Y", "table_b"], cc: ["val-warn", "val-warn", "val-dimmed"] },
            { v: [3, "Z", "table_b"], cc: ["", "", "val-dimmed"] }
          ], cnt: "結合直後の全4行 (重複あり)"
        },
        { id: "distinct", badge: "③ 重複の排除", bc: "badge-orange",
          label: "(暗黙の DISTINCT 処理)",
          desc: "UNION 句の特性として、すべての列が全く同じ行は1つにまとめられます。（重複を残す場合は UNION ALL を使います）",
          type: "eval",
          cols: ["id", "val", "状態"], ch: ["", "", "col-eval"],
          rows: [
            { v: [1, "X", "保持"] },
            { v: [2, "Y", "統合して保持"], cc: ["", "", "val-pass"] },
            { c: "row-dimmed", v: [2, "Y", "重複のため削除"], cc: ["val-dimmed", "val-dimmed", "val-fail"] },
            { v: [3, "Z", "保持"] }
          ], cnt: "重複する 1行 を削除"
        },
        { id: "select", badge: "④ 最終出力", bc: "badge-green",
          label: "結果の返却",
          desc: "重複が排除された綺麗なデータセットが出力されます。",
          type: "select",
          cols: ["id", "val"], ch: ["col-select", "col-select"],
          rows: [
            { v: [1, "X"] },
            { v: [2, "Y"] },
            { v: [3, "Z"] }
          ], cnt: "結果: 3行 × 2列"
        }
      ],
      sql: [
        { t: "SELECT ", k: "sql-kw", h: "from select" }, { t: "id, val ", k: "", h: "from select" }, { t: "FROM ", k: "sql-kw", h: "from select" }, { t: "table_a\n", k: "", h: "from select" },
        { t: "UNION\n", k: "sql-kw", h: "union distinct" },
        { t: "SELECT ", k: "sql-kw", h: "from select" }, { t: "id, val ", k: "", h: "from select" }, { t: "FROM ", k: "sql-kw", h: "from select" }, { t: "table_b;", k: "", h: "from select" }
      ]
    }
  ];

  let currentExerciseIndex = 0;
  let currentStepIndex = 0;
  let wasMobile = window.innerWidth <= 640;

  window.addEventListener("resize", () => {
    const isMobile = window.innerWidth <= 640;
    if (wasMobile !== isMobile) {
      wasMobile = isMobile;
      document.querySelectorAll(".sv-mobile-collapse").forEach(el => el.open = !isMobile);
    }
  });

  function getLegendHTML(type) {
    const mkLegend = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const warnLegend = 
      `<div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-orange-bg);border-left:2px solid var(--sql-orange-txt);border-radius:2px;"></div><span style="color:var(--sql-orange-txt);font-weight:600;font-size:11px;">! 特殊(生成/保持)</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:11px;">✓ 通過/付与</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:11px;">✗ 除外/不一致</span></div>
        ${warnLegend}
      </div>`;

    if (type === "base") return mkLegend("blue", "データ取得・結合対象") + dimLegend;
    if (type === "eval") return mkLegend("orange", "評価対象の列・キー") + mkLegend("purple", "特殊結合・ウィンドウの評価") + dimLegend + passFail;
    if (type === "group") return mkLegend("orange", "グループ化キー・集計対象") + `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp4-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類・集計枠</span></div>` + passFail;
    if (type === "select") return mkLegend("green", "出力対象の列") + dimLegend;
    return "";
  }

  function renderSQL(ex, stepId) {
    return ex.sql.map(t => {
      const isMatch = t.h && t.h.split(" ").includes(stepId);
      const cls = `${t.k || ""} ${isMatch ? `sql-hl-${stepId}` : ""}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join("");
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" id="sv-stepinfo-details" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:10px 14px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>
          <code style="font-size:11px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
          <span class="sv-collapse-icon" style="margin-left:auto;font-size:10px;color:var(--color-txt-muted);">▼</span>
        </summary>
        <div style="margin-top:12px;font-size:13px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
      </details>
    `;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ""}">${col}</th>`).join("");
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ""}">${val}</td>`).join("");
      return `<tr class="${r.c || ""}">${tds}</tr>`;
    }).join("");
    const labelHtml = label ? `<div class="tbl-label">▸ ${label}</div>` : "";
    return `<div style="flex:1;min-width:260px;">${labelHtml}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ""}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
          ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
          <div style="display:flex;align-items:center;font-size:24px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
          ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
        </div>
      `;
    }
    return buildTable("", step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? "active" : (i < currentStepIndex ? "done" : "");
      return `<button class="sv-dot ${cls}" onclick="svGoToStep(${i})" aria-label="ステップ${i+1}"></button>`;
    }).join("");
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:12px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" onclick="svGoToStep(${currentStepIndex - 1})" ${currentStepIndex === 0 ? "disabled" : ""}>← Prev</button>
        <button class="sv-nav-btn" onclick="svGoToStep(${currentStepIndex + 1})" ${currentStepIndex === total - 1 ? "disabled" : ""}>Next →</button>
      </div>
    `;
  }

  function renderAll() {
    const ex = EXERCISES[currentExerciseIndex];
    const step = ex.steps[currentStepIndex];

    document.getElementById("sv-tabs").innerHTML = EXERCISES.map((e, i) =>
      `<button class="sv-tab ${i === currentExerciseIndex ? "active" : ""}" onclick="svGoToExercise(${i})">${e.label}</button>`
    ).join("");

    document.getElementById("sv-sqlbox").innerHTML = renderSQL(ex, step.id);
    document.getElementById("sv-legend").innerHTML = getLegendHTML(step.type);
    document.getElementById("sv-stepinfo").innerHTML = renderStepInfo(step);

    const tarea = document.getElementById("sv-tarea");
    tarea.classList.remove("sv-animate");
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add("sv-animate");

    document.getElementById("sv-rowcount").innerText = step.cnt || "";
    document.getElementById("sv-ctrls").innerHTML = renderControls(ex.steps.length);

    document.querySelectorAll(".sv-mobile-collapse").forEach(el => el.open = !wasMobile);
  }

  window.svGoToExercise = (i) => { currentExerciseIndex = i; currentStepIndex = 0; renderAll(); };
  window.svGoToStep = (i) => {
    const total = EXERCISES[currentExerciseIndex].steps.length;
    if (i >= 0 && i < total) { currentStepIndex = i; renderAll(); }
  };

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") svGoToStep(currentStepIndex + 1);
    else if (e.key === "ArrowLeft") svGoToStep(currentStepIndex - 1);
  });

  renderAll();
})();
</script>
</body>
</html>
