  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }

<main id="mainContent"></main>

<script>
const QS = [

/* ═══════════════════════════════════════════════════════
   Q1  SUM OVER (累積合計) — 日次売上ランニングトータル
═══════════════════════════════════════════════════════ */
{
  num: 1,
  title: "SUM OVER (累積合計) — 日次売上のランニングトータルを生成",
  tags: [["r","SUM OVER"],["o","累積合計"],["g","ROWS UNBOUNDED"],["p","グラフAPI"]],
  premise: `<p><strong>SUM() OVER (ORDER BY ... ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)</strong> は「ウィンドウの先頭行から現在行まで」を合計する累積集計です。グラフAPIで「今月の累積売上推移」などを返す際の定番パターンです。</p>
<pre><span class="fn">SUM</span>(amount) <span class="kw">OVER</span> (
  <span class="kw">ORDER BY</span> sale_date
  <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</span>
  <span class="cmt">-- ↑ 先頭行から現在行までを加算範囲に指定するフレーム句</span>
) <span class="kw">AS</span> cumulative_amount</pre>
<div class="callout"><strong>フレーム句の省略について：</strong><code>ORDER BY</code> のみを指定した場合、デフォルトのフレームは <code>RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</code> です。同日に複数行がある場合、RANGE は同値行全てをまとめて加算するため、ROWS と挙動が異なります。日次集計済みデータであれば同じ結果になります。</div>`,
  question: `<p>daily_sales テーブルを使い、<em>日付ごとの売上金額と当月の累積売上を同時に</em>取得してください。</p>
<p>さらに、前日比（当日売上 − 前日売上）も合わせて出力してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ daily_sales</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>sale_date</th><th>daily_amount</th><th>order_count</th></tr>
        <tr><td>2024-04-01</td><td>85,000</td><td>12</td></tr>
        <tr><td>2024-04-02</td><td>112,000</td><td>18</td></tr>
        <tr><td>2024-04-03</td><td>73,000</td><td>9</td></tr>
        <tr><td>2024-04-04</td><td>98,000</td><td>15</td></tr>
        <tr><td>2024-04-05</td><td>145,000</td><td>22</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount</th><th>cumulative_amount</th><th>day_over_day_diff</th></tr>
<tr><td>2024-04-01</td><td>85,000</td><td>85,000</td><td class="null">NULL</td></tr>
<tr><td>2024-04-02</td><td>112,000</td><td>197,000</td><td>+27,000</td></tr>
<tr><td>2024-04-03</td><td>73,000</td><td>270,000</td><td>-39,000</td></tr>
<tr><td>2024-04-04</td><td>98,000</td><td>368,000</td><td>+25,000</td></tr>
<tr><td>2024-04-05</td><td>145,000</td><td>513,000</td><td>+47,000</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  sale_date,
  daily_amount,

  <span class="cmt">-- 累積合計: 先頭行から現在行までの daily_amount を加算し続ける</span>
  <span class="fn">SUM</span>(daily_amount) <span class="kw">OVER</span> (
    <span class="kw">ORDER BY</span> sale_date                              <span class="cmt">-- 日付の古い順に並べてから累積計算する</span>
    <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING</span>               <span class="cmt">-- UNBOUNDED PRECEDING: ウィンドウの先頭行から</span>
               <span class="kw">AND CURRENT ROW</span>                   <span class="cmt">-- CURRENT ROW: 現在行まで（この2つでフレームを定義）</span>
  ) <span class="kw">AS</span> cumulative_amount,

  <span class="cmt">-- 前日比: LAG で1行前（前日）の値を取得して差分を計算</span>
  <span class="cmt">-- LAG(列, N): N行前の値を返すウィンドウ関数。最初の行は前行がないため NULL になる</span>
  daily_amount <span class="op">-</span> <span class="fn">LAG</span>(daily_amount, <span class="num">1</span>) <span class="kw">OVER</span> (
    <span class="kw">ORDER BY</span> sale_date  <span class="cmt">-- 前日との比較なので日付順の並びが必須</span>
  ) <span class="kw">AS</span> day_over_day_diff

<span class="kw">FROM</span>  <span class="tbl">daily_sales</span>
<span class="kw">ORDER BY</span> sale_date <span class="kw">ASC</span>;  <span class="cmt">-- 古い日付から順に出力</span>

<span class="cmt">/*
  実行順序 (超基礎):
  1. FROM daily_sales           → テーブル全行を読み込む
  2. SELECT SUM() OVER(...)     → 全行を対象にウィンドウ計算 (累積合計)
  3. SELECT LAG() OVER(...)     → 全行を対象にウィンドウ計算 (1行前の値)
  4. ORDER BY sale_date         → 結果を日付昇順で出力
  ※ ウィンドウ関数は GROUP BY を行わず全行を維持したまま集計値を付与できる点が特徴
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>daily_sales（元データ）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount</th></tr>
<tr><td>2024-04-01</td><td>85,000</td></tr>
<tr><td>2024-04-02</td><td>112,000</td></tr>
<tr><td>2024-04-03</td><td>73,000</td></tr>
<tr><td>2024-04-04</td><td>98,000</td></tr>
<tr><td>2024-04-05</td><td>145,000</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">SUM OVER (ROWS UNBOUNDED PRECEDING AND CURRENT ROW) — 行ごとに先頭から累積加算</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>ウィンドウフレームの動き</strong> — 行ごとに加算範囲が広がる</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>現在行</th><th>フレーム範囲</th><th class="tc-hi">cumulative_amount</th><th class="tc-g">day_over_day_diff</th></tr>
<tr class="tr-hi"><td>04-01</td><td>04-01 のみ</td><td class="tc-hi">85,000</td><td class="null">NULL (前行なし)</td></tr>
<tr class="tr-hi"><td>04-02</td><td>04-01 〜 04-02</td><td class="tc-hi">197,000</td><td class="tc-g">+27,000</td></tr>
<tr class="tr-hi"><td>04-03</td><td>04-01 〜 04-03</td><td class="tc-hi">270,000</td><td class="tc-r">-39,000</td></tr>
<tr class="tr-hi"><td>04-04</td><td>04-01 〜 04-04</td><td class="tc-hi">368,000</td><td class="tc-g">+25,000</td></tr>
<tr class="tr-hi"><td>04-05</td><td>04-01 〜 04-05</td><td class="tc-hi">513,000</td><td class="tc-g">+47,000</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">GROUP BY なし — 全行が保持されたまま累積値・差分が付与される</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn3">3</span><span class="step-desc"><strong>最終出力</strong> — 日次・累積・前日比が1クエリで揃う</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount</th><th class="tc-hi">cumulative_amount</th><th class="tc-g">day_over_day_diff</th></tr>
<tr><td>2024-04-01</td><td>85,000</td><td class="tc-hi">85,000</td><td class="null">NULL</td></tr>

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ROWS vs RANGE の使い分け：</strong>同じ日付の行が複数ある場合、<code>RANGE</code> は全同値行をまとめて加算し（その日の最後の行に累積値がジャンプする）、<code>ROWS</code> は行の物理的な順番通りに1行ずつ加算します。日次集計済みデータなら両者は同じ結果ですが、<em>安全のために ROWS を明示する</em>のがベストプラクティスです。</div></div>

  premise: `<p>売上データが存在しない日は orders テーブルに行がないため、単純な GROUP BY では日付に抜けが生じます。グラフAPIで「ゼロ日」を正しく表示するには、<strong>GENERATE_SERIES</strong> で日付の連続列を生成し、実データを LEFT JOIN して欠損日を補完します。</p>
<pre><span class="fn">GENERATE_SERIES</span>(
  <span class="str">'2024-04-01'</span><span class="op">::</span>date,   <span class="cmt">-- 開始日（date型にキャスト）</span>
  <span class="str">'2024-04-30'</span><span class="op">::</span>date,   <span class="cmt">-- 終了日</span>
  <span class="str">'1 day'</span><span class="op">::</span>interval    <span class="cmt">-- ステップ: 1日ずつ生成</span>
) <span class="kw">AS</span> d(calendar_date)     <span class="cmt">-- 生成された列に別名を付ける</span></pre>
<div class="callout warn"><strong>BigQueryの場合：</strong><code>GENERATE_DATE_ARRAY('2024-04-01', '2024-04-30', INTERVAL 1 DAY)</code> を使い、<code>UNNEST</code> で展開します。PostgreSQL専用の <code>GENERATE_SERIES</code> とは構文が異なります。</div>`,
  question: `<p>orders テーブルを使い、<em>2024年4月の全日付（1日〜30日）について、売上がない日は 0 として</em>、日次の注文件数と売上合計を取得してください。</p>
<p>さらに、曜日名（日本語）も出力してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（抜粋）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>ordered_at</th><th>amount</th><th>status</th></tr>
        <tr><td>1</td><td>2024-04-01</td><td>12,000</td><td>completed</td></tr>
        <tr><td>2</td><td>2024-04-01</td><td>8,500</td><td>completed</td></tr>
        <tr><td>3</td><td>2024-04-03</td><td>22,000</td><td>completed</td></tr>
        <tr><td colspan="4" style="text-align:center;color:#6a737d;">※ 2024-04-02, 04-04 は注文なし</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>calendar_date</th><th>day_of_week</th><th>order_count</th><th>total_amount</th></tr>
<tr><td>2024-04-01</td><td>月曜日</td><td>8</td><td>185,000</td></tr>
<tr class="tr-hi5"><td>2024-04-02</td><td>火曜日</td><td class="tc-r">0</td><td class="tc-r">0</td></tr>
<tr><td>2024-04-03</td><td>水曜日</td><td>5</td><td>112,000</td></tr>
<tr class="tr-hi5"><td>2024-04-04</td><td>木曜日</td><td class="tc-r">0</td><td class="tc-r">0</td></tr>

<tr><td>...</td><td>...</td><td>...</td><td>...</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 4月の全日付を1日ずつ生成する（データの有無に関係なく30行できる）</span>
calendar <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    d.calendar_date<span class="op">::</span>date <span class="kw">AS</span> calendar_date  <span class="cmt">-- ::date: timestamp 型を date 型に変換（キャスト）</span>
  <span class="kw">FROM</span> <span class="fn">GENERATE_SERIES</span>(
    <span class="str">'2024-04-01'</span><span class="op">::</span>date,    <span class="cmt">-- 開始日</span>
    <span class="str">'2024-04-30'</span><span class="op">::</span>date,    <span class="cmt">-- 終了日</span>
    <span class="str">'1 day'</span><span class="op">::</span>interval      <span class="cmt">-- interval: 時間間隔を表す型（'1 day'で1日ずつ）</span>
  ) <span class="kw">AS</span> d(calendar_date)     <span class="cmt">-- AS d(列名): GENERATE_SERIESの出力列に名前を付ける</span>
),

<span class="cmt">-- ② 実際の注文データを日付単位で集計する（注文がある日のみ行が存在）</span>
daily_orders <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    ordered_at<span class="op">::</span>date          <span class="kw">AS</span> order_date,  <span class="cmt">-- タイムスタンプから日付部分だけ取り出す</span>
    <span class="fn">COUNT</span>(*)                  <span class="kw">AS</span> order_count,
    <span class="fn">SUM</span>(amount)               <span class="kw">AS</span> total_amount
  <span class="kw">FROM</span>  <span class="tbl">orders</span>
  <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'completed'</span>
  <span class="kw">GROUP BY</span> ordered_at<span class="op">::</span>date
)

<span class="cmt">-- ③ カレンダー（全日付）を左側として注文データを LEFT JOIN でくっつける</span>
<span class="kw">SELECT</span>
  c.calendar_date,

  <span class="cmt">-- TO_CHAR: 日付を任意のフォーマット文字列に変換する関数</span>
  <span class="cmt">-- 'Day'は曜日の英語名を返す。日本語は直接指定不可のため CASE で変換</span>
  <span class="kw">CASE</span> <span class="fn">EXTRACT</span>(<span class="kw">DOW FROM</span> c.calendar_date)  <span class="cmt">-- EXTRACT(DOW FROM 日付): 曜日番号(0=日曜〜6=土曜)を返す</span>
    <span class="kw">WHEN</span> <span class="num">0</span> <span class="kw">THEN</span> <span class="str">'日曜日'</span> <span class="kw">WHEN</span> <span class="num">1</span> <span class="kw">THEN</span> <span class="str">'月曜日'</span>
    <span class="kw">WHEN</span> <span class="num">2</span> <span class="kw">THEN</span> <span class="str">'火曜日'</span> <span class="kw">WHEN</span> <span class="num">3</span> <span class="kw">THEN</span> <span class="str">'水曜日'</span>
    <span class="kw">WHEN</span> <span class="num">4</span> <span class="kw">THEN</span> <span class="str">'木曜日'</span> <span class="kw">WHEN</span> <span class="num">5</span> <span class="kw">THEN</span> <span class="str">'金曜日'</span>
    <span class="kw">ELSE</span>       <span class="str">'土曜日'</span>
  <span class="kw">END</span>                           <span class="kw">AS</span> day_of_week,

  <span class="cmt">-- COALESCE(値, デフォルト値): 最初の引数がNULLならデフォルト値を返す</span>
  <span class="cmt">-- LEFT JOINで注文がない日は order_count が NULL になるため 0 に変換</span>
  <span class="fn">COALESCE</span>(d.order_count,  <span class="num">0</span>)  <span class="kw">AS</span> order_count,
  <span class="fn">COALESCE</span>(d.total_amount, <span class="num">0</span>)  <span class="kw">AS</span> total_amount

<span class="kw">FROM</span>       calendar      c                   <span class="cmt">-- calendar が左側テーブル（全日付が必ず残る）</span>
<span class="kw">LEFT JOIN</span>  daily_orders  d  <span class="kw">ON</span> c.calendar_date <span class="op">=</span> d.order_date
<span class="cmt">-- LEFT JOIN: 左側(calendar)に存在するが右側(daily_orders)に存在しない日は NULL で補完される</span>
<span class="kw">ORDER BY</span> c.calendar_date <span class="kw">ASC</span>;

<span class="cmt">/*
  実行順序 (超基礎):
  1. GENERATE_SERIES(...)        → 4月1日〜30日の30行を生成 → calendar CTE 完成
  2. FROM orders / GROUP BY date → 注文がある日のみ集計 → daily_orders CTE 完成
  3. FROM calendar LEFT JOIN     → calendar の全行を保持しつつ daily_orders を結合
     → 注文のない日は d.order_count = NULL, d.total_amount = NULL になる
  4. COALESCE(NULL, 0)           → NULL を 0 に置換してゼロ補完
  5. CASE EXTRACT(DOW FROM ...)  → 曜日番号を日本語曜日名に変換
  6. ORDER BY calendar_date      → 日付昇順で出力
*/</span></pre>`,

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COALESCE の使い方：</strong><code>COALESCE(val1, val2, ...)</code> は引数を左から順に評価し、最初の非NULL値を返します。<em>LEFT JOIN 後のNULL補完</em>が最も多い用途です。<code>COALESCE(order_count, 0)</code> でゼロ補完、<code>COALESCE(name, '不明')</code> でデフォルト文字列補完などに活用します。</div></div>

<span class="kw">FROM</span>      <span class="tbl">users</span>       u
<span class="cmt">-- LEFT JOIN: ロールを1つも持たないユーザー(木村)も残す</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">user_roles</span>  ur <span class="kw">ON</span> u.user_id  <span class="op">=</span> ur.user_id
<span class="kw">LEFT JOIN</span> <span class="tbl">roles</span>       r  <span class="kw">ON</span> ur.role_id <span class="op">=</span> r.role_id
<span class="kw">GROUP BY</span>
  u.user_id,   <span class="cmt">-- 非集計列は GROUP BY に全て列挙する（PostgreSQLルール）</span>
  u.name
<span class="kw">ORDER BY</span> u.user_id <span class="kw">ASC</span>;

<span class="cmt">/*
  実行順序 (超基礎):
  1. FROM users u                   → 全ユーザー（4行）を準備
  2. LEFT JOIN user_roles ur        → ロール割り当て行を横に結合（ロールなしはNULL）
  3. LEFT JOIN roles r              → ロール名を横に結合
  4. GROUP BY user_id, name         → ユーザーごとに集約（展開された複数行を1行に）
  5. COUNT(r.role_id)               → NULL を除いたロール数を集計
  6. STRING_AGG(role_name, ', ')    → ロール名をカンマ区切り文字列に連結
  7. COALESCE(..., '無し')          → NULL（ロールなし）を '無し' に変換

*/</span></pre>`,
  explain: `
<div class="viz-flow">

</div>
<div class="arrow">↓ <span class="arrow-text">GROUP BY user_id → STRING_AGG でロール名を連結</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>STRING_AGG の動き</strong> — user_id ごとにロール名を連結</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>STRING_AGG の処理</th><th class="tc-hi">結果</th></tr>
<tr class="tr-hi"><td>1</td><td>'admin' + ', ' + 'editor'（アルファベット順）</td><td class="tc-hi">'admin, editor'</td></tr>

<tr class="tr-hi3"><td>3</td><td>'editor' + ', ' + 'viewer'</td><td class="tc-p">'editor, viewer'</td></tr>
<tr class="tr-hi5"><td>4</td><td>全てNULL → STRING_AGGはNULLを無視 → 結果もNULL</td><td class="null">NULL → COALESCE → '無し'</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">COALESCE で NULL を '無し' に変換 → 最終出力</span></div>
<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>role_count</th><th class="tc-hi">roles</th></tr>
<tr><td>1</td><td>田中</td><td>2</td><td class="tc-hi">admin, editor</td></tr>
<tr><td>2</td><td>佐藤</td><td>1</td><td class="tc-hi">admin</td></tr>
<tr><td>3</td><td>山田</td><td>2</td><td class="tc-hi">editor, viewer</td></tr>
<tr class="tr-hi5"><td>4</td><td>木村</td><td>0</td><td class="tc-r">なし</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ORDER BY inside STRING_AGG が重要な理由：</strong>ORDER BY を省略すると連結順序が実行ごとに変わる可能性があります。APIレスポンスの文字列が毎回異なると<em>キャッシュが無効になりフロントのテスト結果が安定しません</em>。必ず ORDER BY で順序を固定します。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>STRING_AGG は NULL を自動無視：</strong>集計関数の通則として、STRING_AGG は NULL 値を自動的にスキップして連結します。このため、ロールを持たないユーザーでは STRING_AGG の結果自体が NULL になり、COALESCE でデフォルト値に変換できます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>DISTINCT を忘れる（重複ロールが発生する場合）：</strong>JOINの条件によっては同じロールが複数回結合される場合があります。その場合は <code>STRING_AGG(DISTINCT role_name, ', ' ORDER BY role_name)</code> と DISTINCT を付けて重複を排除します。</div></div>
</div>
<div class="column-box">
<div class="column-title"><span class="insight-icon">💼</span> REAL WORLD COLUMN</div>
<div class="column-body">JWT認証ではトークンのペイロードに <code>"roles": ["admin", "editor"]</code> のような配列を含めることが多いです。この場合は STRING_AGG より ARRAY_AGG や JSON_AGG（Vol.1 Q10）の方が直接的ですが、ログ出力や管理画面の一覧表示などシンプルな文字列結合が必要な場面では STRING_AGG が最も簡潔です。</div>
</div>`
},

/* ═══════════════════════════════════════════════════════

<pre><span class="cmt">-- ① NOT EXISTS（推奨：短絡評価で高速）</span>
<span class="kw">WHERE NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span>  <span class="cmt">-- SELECT の中身は何でもよい（1 が慣習）</span>

  <span class="kw">WHERE</span> orders.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- 外側の u.user_id を参照（相関サブクエリ）</span>
)

<span class="cmt">-- ② LEFT JOIN + IS NULL（同じ結果）</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id

  answer: `<pre><span class="kw">SELECT</span>

<span class="kw">FROM</span> <span class="tbl">users</span> u

    <span class="kw">FROM</span>  <span class="tbl">orders</span>  o  <span class="cmt">-- orders テーブルで注文を探す</span>

<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>EXISTS の短絡評価（Early Exit）：</strong>EXISTS はサブクエリで1行見つかった時点で処理を打ち切り TRUE を返します。orders テーブルが1億行あっても、最初にマッチした1行で終了するため高速です。一方 LEFT JOIN は全行を結合してからフィルタするため相対的に低速になります。</div></div>

</div>`

  revenue <span class="op">-</span> <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month) <span class="kw">AS</span> mom_diff,

  <span class="cmt">-- 前年同月比成長率(%)</span>

<pre><span class="kw">INSERT INTO</span> <span class="tbl">products</span> (product_id, name, price, updated_at)

<span class="kw">ON CONFLICT</span> (product_id)          <span class="cmt">-- product_id が重複した場合の挙動を指定</span>
<span class="kw">DO UPDATE SET</span>                     <span class="cmt">-- DO UPDATE: 重複時は UPDATE に切り替える</span>
  name       <span class="op">=</span> <span class="kw">EXCLUDED</span>.name,   <span class="cmt">-- EXCLUDED: 挿入しようとした（弾かれた）行の値</span>

<span class="cmt">-- ON CONFLICT: 一意制約(product_id)に違反した場合（=既存レコード）の挙動を定義</span>
<span class="kw">ON CONFLICT</span> (product_id)
<span class="kw">DO UPDATE SET</span>
  <span class="cmt">-- name は常に最新値で上書き</span>
  name       <span class="op">=</span> <span class="kw">EXCLUDED</span>.name,      <span class="cmt">-- EXCLUDED: 挿入しようとして弾かれた行（新しい値）</span>

  updated_at <span class="op">=</span> <span class="kw">CASE</span>

<span class="cmt">/*

  3. product_id=2 → 重複検出      → ON CONFLICT 発動

*/</span></pre>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>冪等性（Idempotency）とは：</strong>同じAPIリクエストを何度送っても結果が変わらない性質です。UPSERTを使うことで、バッチが途中で失敗してリトライされても「同じデータが2重挿入される」ことを防げます。<em>べき等性の確保はAPI設計の基本原則</em>のひとつです。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>BigQuery/MySQL での代替：</strong>BigQueryは <code>MERGE</code> 文を使います。MySQLは <code>INSERT ... ON DUPLICATE KEY UPDATE</code> 構文（EXCLUDEDの代わりに VALUES(列名) を使う）があります。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ON CONFLICT 列に一意制約がない：</strong>ON CONFLICT (product_id) が機能するには <code>product_id</code> にユニーク制約（UNIQUE or PRIMARY KEY）が必要です。制約がない場合は ON CONFLICT が機能せずエラーになります。DDL（テーブル定義）との整合を必ず確認します。</div></div>
</div>
<div class="column-box">
<div class="column-title"><span class="insight-icon">💼</span> REAL WORLD COLUMN</div>
<div class="column-body">外部サービス（Stripe, Shopify, Salesforceなど）のWebhookを受け取ってDBに保存するAPIでは、Webhookが重複して届くことがあります。ON CONFLICTでUPSERTすることで「受け取り済みの通知を何度受けても正しくべき等処理できる」設計になります。これはマイクロサービスアーキテクチャのAt-least-once deliveryに対応するための必須テクニックです。</div>
</div>`

/* ═══════════════════════════════════════════════════════
   Q8  FIRST_VALUE / LAST_VALUE — セッションの最初・最後のページを取得
═══════════════════════════════════════════════════════ */
{
  num: 8,
  title: "FIRST_VALUE / LAST_VALUE — セッション内の入口・出口ページを取得",
  tags: [["r","FIRST_VALUE"],["o","LAST_VALUE"],["g","PARTITION BY"],["p","アクセス解析API"]],
  premise: `<p><strong>FIRST_VALUE(col) OVER (...)</strong> と <strong>LAST_VALUE(col) OVER (...)</strong> はウィンドウ内の最初・最後の値を返します。セッション内の「入口ページ（ランディング）」と「出口ページ（離脱ページ）」の分析に使います。</p>
<pre><span class="cmt">-- 注意: LAST_VALUE はデフォルトのフレーム(RANGE UNBOUNDED PRECEDING AND CURRENT ROW)では
--       「現在行」が最後になるため、意図した最後の値が取れない</span>
<span class="fn">LAST_VALUE</span>(page_url) <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> session_id
  <span class="kw">ORDER BY</span>     viewed_at
  <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</span>
  <span class="cmt">-- ↑ UNBOUNDED FOLLOWING: フレームをウィンドウの「最後の行まで」に拡張する</span>
)</pre>
<div class="callout warn"><strong>LAST_VALUE の落とし穴：</strong>フレームを <code>ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</code> に指定しないと、デフォルトでは「現在行まで」がフレームになり、常に現在行の値が返ります（意味のない結果になります）。</div>`,
  question: `<p>page_views テーブルを使い、<em>セッションごとの入口ページ（最初に見たURL）・出口ページ（最後に見たURL）・閲覧ページ数・滞在時間</em>を集計してください。</p>

  <div class="data-label">使用テーブル</div>

        <tr><td>3</td><td>s001</td><td>1</td><td>/cart</td><td>2024-04-01 10:08:00</td></tr>
        <tr><td>4</td><td>s002</td><td>2</td><td>/blog</td><td>2024-04-01 11:00:00</td></tr>
        <tr><td>5</td><td>s002</td><td>2</td><td>/contact</td><td>2024-04-01 11:05:00</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>session_id</th><th>user_id</th><th>entry_page</th><th>exit_page</th><th>page_count</th><th>session_duration_sec</th></tr>
<tr><td>s001</td><td>1</td><td>/home</td><td>/cart</td><td>3</td><td>480</td></tr>
<tr><td>s002</td><td>2</td><td>/blog</td><td>/contact</td><td>2</td><td>300</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① セッションごとに入口・出口・閲覧数・時間をウィンドウ関数で計算する</span>
session_analysis <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    session_id,
    user_id,
    viewed_at,

    <span class="cmt">-- FIRST_VALUE: ウィンドウ内の最初の行の値を返す（デフォルトフレームでOK）</span>
    <span class="fn">FIRST_VALUE</span>(page_url) <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> session_id     <span class="cmt">-- セッションごとに独立したウィンドウを作る</span>
      <span class="kw">ORDER BY</span>     viewed_at <span class="kw">ASC</span>  <span class="cmt">-- 古い順に並べると最初の行が入口ページ</span>
    ) <span class="kw">AS</span> entry_page,

    <span class="cmt">-- LAST_VALUE: ウィンドウ内の最後の行の値を返す</span>
    <span class="cmt">-- 必ず ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING でフレームを最後まで拡張する</span>
    <span class="fn">LAST_VALUE</span>(page_url) <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> session_id
      <span class="kw">ORDER BY</span>     viewed_at <span class="kw">ASC</span>
      <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING</span>   <span class="cmt">-- ウィンドウの先頭から</span>
               <span class="kw">AND UNBOUNDED FOLLOWING</span>   <span class="cmt">-- ウィンドウの最後まで（これがないと現在行が常に最後になる）</span>
    ) <span class="kw">AS</span> exit_page,

    <span class="cmt">-- COUNT(*) OVER: グループを変えずに件数をカウント（GROUP BY しないウィンドウ集計）</span>
    <span class="fn">COUNT</span>(*) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> session_id) <span class="kw">AS</span> page_count,

    <span class="cmt">-- セッション内の最初・最後の時刻差（秒換算）= 滞在時間</span>
    <span class="fn">EXTRACT</span>(<span class="kw">EPOCH FROM</span>
      <span class="fn">MAX</span>(viewed_at) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> session_id)  <span class="cmt">-- セッション内の最終時刻</span>
      <span class="op">-</span>
      <span class="fn">MIN</span>(viewed_at) <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> session_id)  <span class="cmt">-- セッション内の最初の時刻</span>
    ) <span class="kw">AS</span> session_duration_sec  <span class="cmt">-- EXTRACT(EPOCH FROM interval): interval を秒数に変換</span>

  <span class="kw">FROM</span> <span class="tbl">page_views</span>
)

<span class="cmt">-- ② 上記の結果はセッションの行数分あるため、DISTINCT で1セッション1行に集約</span>
<span class="kw">SELECT</span> <span class="kw">DISTINCT</span>        <span class="cmt">-- DISTINCT: 完全に重複した行を1行に集約する</span>
  session_id,
  user_id,
  entry_page,
  exit_page,
  page_count,
  session_duration_sec
<span class="kw">FROM</span>  session_analysis
<span class="kw">ORDER BY</span> session_id;

<span class="cmt">/*
  実行順序 (超基礎):
  1. FROM page_views                 → 全ページビューを読み込む
  2. FIRST_VALUE / LAST_VALUE OVER() → セッション内の最初・最後のページをウィンドウ計算
  3. COUNT / MAX / MIN OVER()        → セッション内の件数・時刻範囲をウィンドウ計算
     ※ この時点では1セッションにつき page_count 分の行が存在（全行に同じ値が付与される）
  4. SELECT DISTINCT                 → 完全一致行を1行に圧縮（1セッション1行になる）
  5. ORDER BY session_id             → セッションID順に出力
*/</span></pre>`,

<div class="arrow">↓ <span class="arrow-text">FIRST_VALUE / LAST_VALUE OVER (PARTITION BY session_id ORDER BY viewed_at)</span></div>
<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">

<tr><td>1</td><td>/home</td><td class="tc-hi">/home</td><td class="tc-g">/cart</td><td class="tc-p">3</td><td class="tc-y">480</td></tr>
<tr><td>2</td><td>/products</td><td class="tc-hi">/home</td><td class="tc-g">/cart</td><td class="tc-p">3</td><td class="tc-y">480</td></tr>
<tr><td>3</td><td>/cart</td><td class="tc-hi">/home</td><td class="tc-g">/cart</td><td class="tc-p">3</td><td class="tc-y">480</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">SELECT DISTINCT — 全列が同じ3行 → 1行に圧縮</span></div>
<div class="step-block">

</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>LAST_VALUE のフレーム指定は必須：</strong>デフォルトフレームは「先頭行から現在行まで」のため、LAST_VALUE は常に「現在行の値」を返します。<em>最後の行の値を取るには必ず <code>ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</code> を付けます</em>。これはLAST_VALUEを使う際の最大の落とし穴です。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>DISTINCT vs GROUP BY で1行化：</strong>ウィンドウ関数は行数を減らさないため、1セッション1行にするには後処理が必要です。全列が同じ値なら <code>SELECT DISTINCT</code>、集計計算が必要なら <code>GROUP BY</code> を使います。今回は全列が同じ値になるため DISTINCT が最もシンプルです。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>LAST_VALUE のフレームを省略する：</strong>フレームを指定せず <code>LAST_VALUE(page_url) OVER (PARTITION BY session_id ORDER BY viewed_at)</code> と書くと、全ての行で「現在行の page_url」が返り、FIRST_VALUE と実質的に同じ（または意味のない）結果になります。<em>LAST_VALUE を使う場合は必ず UNBOUNDED FOLLOWING を明記します。</em></div></div>
</div>
<div class="column-box">
<div class="column-title"><span class="insight-icon">💼</span> REAL WORLD COLUMN</div>
<div class="column-body">Google Analyticsのような「ランディングページ分析」「離脱ページ分析」はこのパターンが基礎です。「/products で離脱したセッションが多い」→「商品詳細ページの改善が必要」といったUX改善のPDCAにつながります。自社BI環境でGA4の生データ（BigQuery Export）を分析する際に直接使えるクエリパターンです。</div>
</div>`
},

metadata<span class="op">->></span><span class="str">'key'</span>       <span class="cmt">-- キーの値をテキスト型で取得（比較・表示に使う）</span>

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>@> (含有演算子) が高速な理由：</strong>通常のテキスト比較 <code>metadata->>'category' = 'electronics'</code> はテーブルフルスキャンが必要ですが、<code>@></code> は GIN インデックスを活用して高速に絞り込めます。大量データでのJSONB検索では <em><code>@></code> + GINインデックス</em>の組み合わせが必須です。</div></div>

{
  num: 10,
  title: "ROWS BETWEEN — 7日間移動平均でトレンドを平滑化",
  tags: [["r","ROWS BETWEEN"],["o","移動平均"],["g","ウィンドウフレーム"],["p","トレンド分析"]],
  premise: `<p><strong>ウィンドウフレーム句（ROWS BETWEEN N PRECEDING AND CURRENT ROW）</strong> は、ウィンドウ内の「何行前から現在行まで」を計算範囲として指定します。これを使って移動平均・移動合計が計算できます。</p>
<pre><span class="fn">AVG</span>(daily_amount) <span class="kw">OVER</span> (
  <span class="kw">ORDER BY</span> sale_date
  <span class="kw">ROWS BETWEEN</span> <span class="num">6</span> <span class="kw">PRECEDING AND CURRENT ROW</span>
  <span class="cmt">-- ↑ 現在行を含む直近7行（6行前+現在行）が計算範囲</span>
) <span class="kw">AS</span> moving_avg_7d</pre>
<div class="callout"><strong>フレーム句のパターン：</strong>
<br><code>N PRECEDING AND CURRENT ROW</code> → N行前〜現在行（移動平均の定番）
<br><code>UNBOUNDED PRECEDING AND CURRENT ROW</code> → 先頭〜現在行（累積集計: Q1参照）
<br><code>N PRECEDING AND N FOLLOWING</code> → 中央値周辺N行（中心移動平均）
</div>
<div class="callout warn"><strong>データが7日未満の期間の挙動：</strong> 先頭から6行以内の行ではフレームが7行に満たず、存在する行数のみで平均を計算します（短期平均になる）。これを避けたい場合は <code>WHERE row_num >= 7</code> で先頭行をカットします。</div>`,
  question: `<p>daily_sales テーブルを使い、<em>日次売上の7日間移動平均と3日間移動平均</em>を計算してください。</p>
<p>さらに、移動平均が前日より上昇/下降しているかのトレンド方向も出力してください。（データ不足期間は ROUND で小数点1桁）</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ daily_sales（抜粋）</div>

        <tr><th>sale_date</th><th>daily_amount</th><th>order_count</th></tr>

        <tr><td>2024-04-02</td><td>112,000</td><td>18</td></tr>
        <tr><td>2024-04-03</td><td>73,000</td><td>9</td></tr>
        <tr><td>2024-04-04</td><td>98,000</td><td>15</td></tr>
        <tr><td>2024-04-05</td><td>145,000</td><td>22</td></tr>
        <tr><td>2024-04-06</td><td>88,000</td><td>13</td></tr>
        <tr><td>2024-04-07</td><td>120,000</td><td>19</td></tr>
        <tr><td>2024-04-08</td><td>95,000</td><td>14</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount</th><th>ma3d</th><th>ma7d</th><th>ma7d_trend</th></tr>
<tr><td>2024-04-01</td><td>85,000</td><td>85,000.0</td><td>85,000.0</td><td class="null">—</td></tr>
<tr><td>2024-04-02</td><td>112,000</td><td>98,500.0</td><td>98,500.0</td><td class="tc-g">↑ UP</td></tr>
<tr><td>2024-04-03</td><td>73,000</td><td>90,000.0</td><td>90,000.0</td><td class="tc-r">↓ DOWN</td></tr>
<tr><td>...</td><td>...</td><td>...</td><td>...</td><td>...</td></tr>
<tr><td>2024-04-07</td><td>120,000</td><td>117,666.7</td><td>103,000.0</td><td class="tc-hi">→ FLAT</td></tr>
<tr><td>2024-04-08</td><td>95,000</td><td>101,000.0</td><td>104,428.6</td><td class="tc-hi">→ FLAT</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 移動平均を計算する</span>
moving_avg <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    sale_date,
    daily_amount,

    <span class="cmt">-- 3日間移動平均: 現在行を含む直近3行の平均</span>
    <span class="fn">ROUND</span>(
      <span class="fn">AVG</span>(daily_amount) <span class="kw">OVER</span> (
        <span class="kw">ORDER BY</span> sale_date
        <span class="kw">ROWS BETWEEN</span> <span class="num">2</span> <span class="kw">PRECEDING AND CURRENT ROW</span>  <span class="cmt">-- 2行前+現在行 = 計3行</span>
      )
    , <span class="num">1</span>) <span class="kw">AS</span> ma3d,

    <span class="cmt">-- 7日間移動平均: 現在行を含む直近7行の平均</span>
    <span class="fn">ROUND</span>(
      <span class="fn">AVG</span>(daily_amount) <span class="kw">OVER</span> (
        <span class="kw">ORDER BY</span> sale_date
        <span class="kw">ROWS BETWEEN</span> <span class="num">6</span> <span class="kw">PRECEDING AND CURRENT ROW</span>  <span class="cmt">-- 6行前+現在行 = 計7行</span>
      )
    , <span class="num">1</span>) <span class="kw">AS</span> ma7d

  <span class="kw">FROM</span> <span class="tbl">daily_sales</span>
),

<span class="cmt">-- ② 7日移動平均のトレンド方向を判定する（LAG で前日の ma7d を参照）</span>
with_trend <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    sale_date,
    daily_amount,
    ma3d,
    ma7d,
    <span class="cmt">-- LAG で前日の ma7d を取得（前日が存在しない最初の行は NULL）</span>
    <span class="fn">LAG</span>(ma7d, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> sale_date) <span class="kw">AS</span> prev_ma7d
  <span class="kw">FROM</span> moving_avg
)

<span class="cmt">-- ③ 前日との差でトレンドラベルを付与する</span>
<span class="kw">SELECT</span>
  sale_date,
  daily_amount,
  ma3d,
  ma7d,
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> prev_ma7d <span class="kw">IS NULL</span>       <span class="kw">THEN</span> <span class="str">'—'</span>         <span class="cmt">-- 最初の行（前日のデータなし）</span>
    <span class="kw">WHEN</span> ma7d <span class="op">></span>  prev_ma7d <span class="op">+</span> <span class="num">1000</span> <span class="kw">THEN</span> <span class="str">'↑ UP'</span>    <span class="cmt">-- 1,000円以上増加</span>
    <span class="kw">WHEN</span> ma7d <span class="op"><</span>  prev_ma7d <span class="op">-</span> <span class="num">1000</span> <span class="kw">THEN</span> <span class="str">'↓ DOWN'</span>  <span class="cmt">-- 1,000円以上減少</span>
    <span class="kw">ELSE</span>                                <span class="str">'→ FLAT'</span>  <span class="cmt">-- 誤差範囲（横ばい）</span>
  <span class="kw">END</span> <span class="kw">AS</span> ma7d_trend

<span class="kw">FROM</span>  with_trend
<span class="kw">ORDER BY</span> sale_date <span class="kw">ASC</span>;

<span class="cmt">/*
  実行順序 (超基礎):
  1. FROM daily_sales                         → テーブル全行を読み込む
  2. AVG(daily_amount) OVER(ROWS 2 PRECEDING) → 直近3行の平均（ma3d）を全行に付与
  3. AVG(daily_amount) OVER(ROWS 6 PRECEDING) → 直近7行の平均（ma7d）を全行に付与
     → moving_avg CTE 完成
  4. LAG(ma7d, 1) OVER(ORDER BY sale_date)    → 前日の ma7d を全行に付与
     → with_trend CTE 完成
  5. CASE ma7d vs prev_ma7d                   → トレンド方向を分類
  6. ORDER BY sale_date                        → 日付昇順で出力
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>ウィンドウフレームの動き</strong> — 各行で「7行前〜現在行」が計算範囲になる</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount</th><th>フレーム範囲（7日MA）</th><th class="tc-hi">ma7d</th><th>行数</th></tr>
<tr class="tr-hi"><td>04-01</td><td>85,000</td><td>04-01のみ</td><td class="tc-hi">85,000.0</td><td>1行</td></tr>
<tr class="tr-hi"><td>04-02</td><td>112,000</td><td>04-01 〜 04-02</td><td class="tc-hi">98,500.0</td><td>2行</td></tr>
<tr class="tr-hi"><td>04-03</td><td>73,000</td><td>04-01 〜 04-03</td><td class="tc-hi">90,000.0</td><td>3行</td></tr>
<tr><td>...</td><td>...</td><td>...</td><td>...</td><td>...</td></tr>
<tr class="tr-hi2"><td>04-07</td><td>120,000</td><td>04-01 〜 04-07</td><td class="tc-g">103,000.0</td><td>7行（フル）</td></tr>
<tr class="tr-hi2"><td>04-08</td><td>95,000</td><td>04-02 〜 04-08</td><td class="tc-g">104,428.6</td><td>7行（スライド）</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">3日MAと7日MAの比較 — 短期(3日)は変動が大きく、長期(7日)は滑らか</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>移動平均の平滑化効果</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount（生データ）</th><th class="tc-hi">ma3d（3日MA）</th><th class="tc-g">ma7d（7日MA）</th></tr>
<tr><td>04-01</td><td>85,000</td><td class="tc-hi">85,000.0（1行）</td><td class="tc-g">85,000.0（1行）</td></tr>
<tr><td>04-03</td><td>73,000（低い日）</td><td class="tc-hi">90,000.0（変動あり）</td><td class="tc-g">90,000.0（緩やか）</td></tr>
<tr><td>04-05</td><td>145,000（高い日）</td><td class="tc-hi">105,333.3（変動あり）</td><td class="tc-g">102,600.0（緩やか）</td></tr>
<tr><td>04-07</td><td>120,000</td><td class="tc-hi">117,666.7</td><td class="tc-g">103,000.0（最もなだらか）</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">LAG(ma7d, 1) でトレンド方向を判定 → 最終出力</span></div>
<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">
<tr><th>sale_date</th><th>daily_amount</th><th class="tc-hi">ma3d</th><th class="tc-g">ma7d</th><th class="tc-y">ma7d_trend</th></tr>

<tr><td>2024-04-07</td><td>120,000</td><td class="tc-hi">117,666.7</td><td class="tc-g">103,000.0</td><td class="tc-hi">→ FLAT</td></tr>

</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>移動平均の使い方：</strong>日次売上は曜日・特売日などのノイズが多く、短期的な変動が大きいです。<em>7日間移動平均で週次サイクルを均すと、本当のトレンド（上昇・下降・横ばい）が見えやすくなります</em>。3日MAと7日MAを重ねることで「直近の変化」と「中期トレンド」の両方を同時に把握できます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>フレーム句のパラメータの解釈：</strong><code>ROWS BETWEEN 6 PRECEDING AND CURRENT ROW</code> の <code>6 PRECEDING</code> は「物理的に6行前」を意味します。データが連続している場合のみ「6日前」になります。欠損日がある場合は Vol.2 Q2（GENERATE_SERIES）で補完してからこのクエリを実行します。</div></div>
</div>

</div>
<div class="column-box">
<div class="column-title"><span class="insight-icon">💼</span> REAL WORLD COLUMN</div>
<div class="column-body">7日移動平均はEC・SaaS・広告のKPIダッシュボードで最も広く使われる平滑化手法です。Google AnalyticsやMetaビジネスマネージャも移動平均グラフを標準提供しています。社内BIで同等の折れ線グラフAPIを作る際、SQL側で ma3d・ma7d・daily を全て返すことでフロント側の計算コストをゼロにできます。Q1（累積合計）・Q5（前月比）・Q10（移動平均）を組み合わせると、本格的な売上分析ダッシュボードのAPIが完成します。</div>
</div>`
}

]; // QS end

/* ─── UI ─── */
function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = { r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p' };
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識', q.premise)}
      ${acc('❓','pill-green','問題','問題', q.question)}
      ${acc('📊','pill-orange','出力','期待出力', q.output)}
      ${acc('✅','pill-red','回答','模範解答コード', q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）', q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildAll();
</script>
