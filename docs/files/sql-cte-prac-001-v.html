<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL CTE問題10選 — WITH句・再帰CTE・ウィンドウ関数でAPIを制する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .column-box {
    background: #0d1a15; border: 1px solid #1a4a30; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .column-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--green); letter-spacing: 1px; margin-bottom: 10px; }
  .column-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .column-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .column-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--green); }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }

  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;
    --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
    --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
    --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
    --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;
    --sql-grp1-bg: rgba(88, 166, 255, 0.03);
    --sql-grp2-bg: rgba(88, 166, 255, 0.08);
    --sql-grp3-bg: rgba(88, 166, 255, 0.14);
    --border-radius: 6px;
    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1rem;
    border-radius: var(--border-radius);
    margin-bottom: 4px;
  }

  .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline: 2px solid var(--sql-blue-txt); outline-offset: 2px; }

  .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 11px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
  .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }

  .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
  .sv-dot.done { background: var(--color-border-main); }
  .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }

  .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 10px; }
  .sv-table th { padding: 6px 12px; font-size: 9px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
  .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }

  .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
  .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
  .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }

  .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
  .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
  .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
  .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }

  .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
  .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
  .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }

  .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
  .sql-hl-from, .sql-hl-join, .sql-hl-where, .sql-hl-group, .sql-hl-having,
  .sql-hl-agg, .sql-hl-select, .sql-hl-sub {
    border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt);
  }
  .sql-hl-from, .sql-hl-join { background: var(--sql-blue-bg); color: var(--sql-blue-txt); }
  .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub { background: var(--sql-orange-bg); }
  .sql-hl-select { background: var(--sql-green-bg); color: var(--sql-green-txt); }

  .sv-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
  .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
  .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
  .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }

  @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .sv-animate { animation: sv-fade-in 0.3s ease forwards; }

  .tbl-label { font-size: 9px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }

  .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
  .sv-mobile-collapse summary { list-style: none; }
  .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
  .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }

  @media (min-width: 641px) {
    .sv-mobile-collapse > summary { pointer-events: none; }
    .sv-collapse-icon { display: none !important; }
  }
  @media (max-width: 640px) {
    .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">CTE 10</span></div>
      <div class="header-text-wrap">
        <div class="header-title">API実務で学ぶ SQL CTE 10選（WITH句・複数CTE・再帰CTE・ウィンドウ関数・累計・LEAD・RFM編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 中〜上級</span>
      <span class="htag">CTE王道パターン</span>
      <span class="htag">API実務</span>
      <span class="htag">PostgreSQL/BigQuery対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
function initVisualizer(root, data) {
  if (!root || !data) return;
  let currentStepIndex = 0;

  root.innerHTML = `
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
      <div class="sv-sidebar" style="flex:0 0 300px;min-width:240px;">
        <div style="font-size:12px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
        <div class="sv-sqlbox" style="font-family:var(--font-mono);font-size:11px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>
        <details class="sv-legend-container sv-mobile-collapse" style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:12px 14px;background:var(--color-bg-panel);">
          <summary style="font-size:11px;font-weight:600;color:var(--color-txt-muted);letter-spacing:0.06em;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;margin:0;">
            <span>LEGEND (現在のステップ)</span>
            <span class="sv-collapse-icon" style="font-size:10px;">▼</span>
          </summary>
          <div class="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:12px;margin-top:12px;border-top:1px dashed var(--color-border-sub);padding-top:12px;"></div>
        </details>
      </div>
      <div style="flex:1;min-width:300px;">
        <div class="sv-stepinfo" style="margin-bottom:16px;"></div>
        <div class="sv-ctrls" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;"></div>
        <div class="sv-tarea sv-animate"></div>
        <div class="sv-rowcount" style="font-size:12px;font-family:var(--font-mono);color:var(--color-txt-sub);margin-top:8px;text-align:right;"></div>
      </div>
    </div>`;

  function getLegendHTML(type) {
    const mkLegend = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div>
      </div>`;
    if (type === 'base')   return mkLegend('blue',   'データ取得・結合対象') + dimLegend;
    if (type === 'eval')   return mkLegend('orange', '評価対象の列・キー') + dimLegend + passFail;
    if (type === 'group')  return mkLegend('orange', 'グループ化キー・集計対象') +
      `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === 'select') return mkLegend('green',  '出力対象の列') + dimLegend;
    return '';
  }

  function renderSQL(step) {
    return data.sql.map(t => {
      const isMatch = t.h && t.h.split(' ').includes(step.id);
      const cls = `${t.k || ''} ${isMatch ? `sql-hl-${step.id}` : ''}`.trim();
      return cls ? `<span class="${cls}">${t.t}</span>` : t.t;
    }).join('');
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:10px 14px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>
          <code style="font-size:10px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
          <span class="sv-collapse-icon" style="margin-left:auto;font-size:9px;color:var(--color-txt-muted);">▼</span>
        </summary>
        <div style="margin-top:12px;font-size:11px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
      </details>`;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ''}">${col}</th>`).join('');
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ''}">${val}</td>`).join('');
      return `<tr class="${r.c || ''}">${tds}</tr>`;
    }).join('');
    const labelHtml = label ? `<div class="tbl-label">▸ ${label}</div>` : '';
    return `<div style="flex:1;min-width:260px;">${labelHtml}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ''}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
          ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
          <div style="display:flex;align-items:center;font-size:20px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
          ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
        </div>`;
    }
    return buildTable('', step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? 'active' : (i < currentStepIndex ? 'done' : '');
      return `<button class="sv-dot ${cls}" data-action="goto" data-idx="${i}" aria-label="ステップ${i+1}"></button>`;
    }).join('');
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:10px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" data-action="prev" ${currentStepIndex === 0 ? 'disabled' : ''}>← Prev</button>
        <button class="sv-nav-btn" data-action="next" ${currentStepIndex === total - 1 ? 'disabled' : ''}>Next →</button>
      </div>`;
  }

  function renderAll() {
    const step = data.steps[currentStepIndex];
    root.querySelector('.sv-sqlbox').innerHTML = renderSQL(step);
    root.querySelector('.sv-legend').innerHTML = getLegendHTML(step.type);
    root.querySelector('.sv-stepinfo').innerHTML = renderStepInfo(step);
    const tarea = root.querySelector('.sv-tarea');
    tarea.classList.remove('sv-animate');
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add('sv-animate');
    root.querySelector('.sv-rowcount').textContent = step.cnt || '';
    root.querySelector('.sv-ctrls').innerHTML = renderControls(data.steps.length);
    root.querySelectorAll('.sv-mobile-collapse').forEach(el => { el.open = window.innerWidth > 640; });
  }

  root.__viz = {
    next: () => { if (currentStepIndex < data.steps.length - 1) { currentStepIndex++; renderAll(); } },
    prev: () => { if (currentStepIndex > 0) { currentStepIndex--; renderAll(); } },
    goTo: i => { if (i >= 0 && i < data.steps.length) { currentStepIndex = i; renderAll(); } }
  };

  root.querySelector('.sv-ctrls').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    if (a === 'prev') root.__viz.prev();
    else if (a === 'next') root.__viz.next();
    else if (a === 'goto') root.__viz.goTo(Number(btn.dataset.idx));
  });

  renderAll();
}

{
  num: 4,
  title: "CTE + LAG — 前月比（MoM成長率）を計算する",
  tags: [["r","LAG"],["r","CTE"],["g","前月比"],["o","成長率"],["p","時系列API"]],
  premise: `<p><strong>LAG(col, n)</strong> はウィンドウ関数で、<em>現在行から n 行前の値</em>を返します。前月比・前年同月比・前日比など「時系列の比較」に必須です。</p>
<pre><span class="fn">LAG</span>(amount, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> order_month)
<span class="cmt">-- order_month 順に並べたとき、1行前の amount を返す</span>
<span class="cmt">-- 最初の行（前の行がない場合）は NULL になる</span></pre>
<div class="callout"><strong>LAGの第3引数（デフォルト値）：</strong><code>LAG(col, 1, 0)</code> のように書くと、NULLの代わりに 0 を返せます。APIのレスポンスで NULL を避けたい場合に使います。<br>逆に次の行を参照する <code>LEAD</code> もあります（Q9で扱います）。</div>
<p>前月比の計算式：<em>（今月 − 前月）÷ 前月 × 100</em>。前月がNULLまたは0の場合はゼロ除算が発生するため <code>NULLIF</code> で防ぎます。</p>`,
  question: `<p>以下の <code>monthly_sales</code> テーブルから、<em>各月の売上・前月売上・前月比（MoM成長率 %）</em>を計算するAPIを作成してください。</p>
<p>前月がない最初の月は <code>prev_sales</code> を NULL、<code>mom_rate</code> も NULL として出力してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ monthly_sales</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_month</th><th>sales</th></tr>
        <tr><td>2024-01</td><td>100000</td></tr>
        <tr><td>2024-02</td><td>120000</td></tr>
        <tr><td>2024-03</td><td>108000</td></tr>
        <tr><td>2024-04</td><td>135000</td></tr>
        <tr><td>2024-05</td><td>135000</td></tr>
        <tr><td>2024-06</td><td>150000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-g">sales</th><th class="tc-hi">prev_sales</th><th class="tc-y">mom_rate</th></tr>
<tr><td>2024-01</td><td class="tc-g">100000</td><td class="null">NULL</td><td class="null">NULL</td></tr>
<tr><td>2024-02</td><td class="tc-g">120000</td><td class="tc-hi">100000</td><td class="tc-y">+20.0</td></tr>
<tr><td>2024-03</td><td class="tc-g">108000</td><td class="tc-hi">120000</td><td class="tc-r">-10.0</td></tr>
<tr><td>2024-04</td><td class="tc-g">135000</td><td class="tc-hi">108000</td><td class="tc-y">+25.0</td></tr>
<tr><td>2024-05</td><td class="tc-g">135000</td><td class="tc-hi">135000</td><td class="tc-y">0.0</td></tr>
<tr><td>2024-06</td><td class="tc-g">150000</td><td class="tc-hi">135000</td><td class="tc-y">+11.1</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span> <span class="tbl">sales_with_lag</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① LAG で「1行前の売上」を各行に追加する</span>
  <span class="kw">SELECT</span>
    order_month,
    sales,
    <span class="fn">LAG</span>(sales, <span class="num">1</span>) <span class="kw">OVER</span> (                 <span class="cmt">-- LAG(列, n): n行前の値を取得（なければNULL）</span>
      <span class="kw">ORDER BY</span> order_month               <span class="cmt">-- ORDER BY: 月の昇順で並べ、何が「前」かを定義する</span>
    ) <span class="kw">AS</span> prev_sales                      <span class="cmt">-- AS: 列に名前をつける</span>
  <span class="kw">FROM</span> <span class="tbl">monthly_sales</span>                     <span class="cmt">-- FROM: データ取得元テーブル</span>

)

<span class="cmt">-- ② CTE を使って mom_rate（前月比）を計算する</span>
<span class="kw">SELECT</span>
  order_month,
  sales,
  prev_sales,
  <span class="fn">ROUND</span>(                                 <span class="cmt">-- ROUND(値, 桁数): 指定した桁数で四捨五入</span>
    (sales <span class="op">-</span> prev_sales)                 <span class="cmt">-- 今月と前月の差分（増加分）</span>
    <span class="op">*</span> <span class="num">100.0</span>                              <span class="cmt">-- 100.0を掛けて%化（整数同士の除算を浮動小数点に変換）</span>
    <span class="op">/</span> <span class="fn">NULLIF</span>(prev_sales, <span class="num">0</span>)              <span class="cmt">-- NULLIF(a,b): aがbなら NULLを返す（0で割るエラーを防ぐ）</span>
  , <span class="num">1</span>)                                   <span class="cmt">-- 第2引数: 小数点以下1桁に丸める</span>
  <span class="kw">AS</span> mom_rate                            <span class="cmt">-- 計算結果に mom_rate という名前をつける</span>
<span class="kw">FROM</span>     <span class="tbl">sales_with_lag</span>                  <span class="cmt">-- FROM: 上で作ったCTEを参照</span>
<span class="kw">ORDER BY</span> order_month;                    <span class="cmt">-- ORDER BY: 月の昇順で並べる</span>

<span class="cmt">/*
  実行順序:
  1. CTE内 FROM monthly_sales            → 全行読み込み（6行）
  2. CTE内 LAG(sales,1) OVER(ORDER BY order_month)
           → 月順に並べて各行に1行前のsalesを追加（先頭はNULL）
  3. 外側  FROM sales_with_lag           → CTE結果（sales + prev_sales）を参照
  4. 外側  ROUND((sales-prev_sales)*100.0 / NULLIF(prev_sales,0), 1)
           → 前月比を計算（prev_salesがNULLなら全体もNULL）
  5. 外側  ORDER BY order_month          → 月順で並べる
  ★ NULL を含む演算式は結果もNULL（NULLは伝播する）
  ★ CTEで prev_sales を確定してから外側で計算するのが正しいパターン
    （同じSELECT内で LAG結果の別名を使って計算はできない）
*/</span></pre>`,
  explain: `
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>LAGの実務用途：</strong>売上の前月比、ユーザー数の前週比、株価の前日比など時系列分析で必須。ダッシュボードAPIで「矢印↑↓」を表示するデータを返す際に使います。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>CTEに切り出す理由：</strong>LAGで計算した <code>prev_sales</code> を使って <code>mom_rate</code> を計算するには、同じSELECT内でLAG結果の別名を参照できないため、CTEで先に <code>prev_sales</code> を確定してから次のSELECTで使います。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY なしで LAG を使う：</strong>LAGはORDER BYで「前」を定義します。ORDER BYがないと結果が不安定です。必ず指定してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>整数同士の除算：</strong><code>(sales - prev_sales) / prev_sales</code> は整数÷整数 = 整数（切り捨て）になりゼロが返ります。<code>* 100.0</code> で先に浮動小数点に変換するのが必須です。</div></div>
</div>
<div class="column-box">

</div>`,

{
  num: 5,
  title: "再帰CTE — 組織階層（上司→部下）を全レベル展開する",
  tags: [["r","再帰CTE"],["r","RECURSIVE"],["o","階層クエリ"],["p","組織API"],["g","WITH RECURSIVE"]],
  premise: `<p><strong>再帰CTE（Recursive CTE）</strong>は <code>WITH RECURSIVE</code> を使い、<em>自分自身を参照することで階層構造を反復処理</em>できます。組織図・カテゴリ階層・BOM（部品展開）などに使います。</p>
<pre><span class="kw">WITH RECURSIVE</span> <span class="tbl">org_tree</span> <span class="kw">AS</span> (
  <span class="cmt">-- ① アンカーメンバー: 再帰の起点（トップの行を選ぶ）</span>
  <span class="kw">SELECT</span> id, name, manager_id, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span>   <span class="tbl">employees</span>
  <span class="kw">WHERE</span>  manager_id <span class="kw">IS NULL</span>    <span class="cmt">-- 上司がいない = トップ</span>

  <span class="kw">UNION ALL</span>                    <span class="cmt">-- アンカーと再帰部を縦結合（重複含む）</span>

  <span class="cmt">-- ② 再帰メンバー: 前ステップの結果に部下を追加し続ける</span>
  <span class="kw">SELECT</span> e.id, e.name, e.manager_id, t.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span>   <span class="tbl">employees</span> e
  <span class="kw">JOIN</span>   <span class="tbl">org_tree</span>   t <span class="kw">ON</span> e.manager_id <span class="op">=</span> t.id
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">org_tree</span>;</pre>
<div class="callout"><strong>再帰の終了条件：</strong>再帰メンバーが0行を返した時点で終了します。無限ループ防止のため <code>WHERE depth &lt; 10</code> のような深さ制限を実務では入れることを推奨します。</div>`,
  question: `<p>以下の <code>employees</code> テーブル（自己参照テーブル）から、<em>社長（manager_idがNULL）を起点に全従業員の階層を展開</em>してください。</p>
<p>各従業員について depth（階層深さ：社長=0）と path（例: "社長→部長→係長"）も出力してください。</p>

  <div class="data-label">使用テーブル</div>

  answer: `<pre><span class="cmt">-- 再帰CTEには WITH RECURSIVE を使う（PostgreSQL/BigQuery共通）</span>
<span class="kw">WITH RECURSIVE</span> <span class="tbl">org_tree</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① アンカーメンバー: 再帰の「起点」となる行（社長）を選ぶ</span>
  <span class="kw">SELECT</span>                                 <span class="cmt">-- SELECT: 取得する列</span>
    emp_id,
    name,
    manager_id,
    <span class="num">0</span>    <span class="kw">AS</span> depth,                       <span class="cmt">-- 起点の階層深さを0とする（ASで列名付与）</span>
    name <span class="kw">AS</span> path                         <span class="cmt">-- pathの初期値は自分の名前のみ</span>
  <span class="kw">FROM</span>  <span class="tbl">employees</span>                        <span class="cmt">-- FROM: データ元</span>
  <span class="kw">WHERE</span> manager_id <span class="kw">IS NULL</span>               <span class="cmt">-- WHERE ... IS NULL: 値が存在しない（上司がいない = トップ）行に絞る</span>

  <span class="kw">UNION ALL</span>                              <span class="cmt">-- UNION ALL: 複数のSELECT結果を縦にそのまま結合（重複含む）</span>

  <span class="cmt">-- ② 再帰メンバー: org_tree の結果に「部下」を追加し続ける</span>
  <span class="kw">SELECT</span>
    e.emp_id,
    e.name,
    e.manager_id,
    t.depth <span class="op">+</span> <span class="num">1</span>,                         <span class="cmt">-- 親の階層(depth)に +1 して1段深くする</span>
    t.path <span class="op">||</span> <span class="str">'→'</span> <span class="op">||</span> e.name               <span class="cmt">-- ||: 文字列同士を連結する演算子（PostgreSQL等）</span>
  <span class="kw">FROM</span>       <span class="tbl">employees</span>  e                <span class="cmt">-- FROM: e は部下側（次の階層）</span>
  <span class="kw">INNER JOIN</span> <span class="tbl">org_tree</span>   t                <span class="cmt">-- INNER JOIN: t は前ステップで確定した親の行</span>
          <span class="kw">ON</span> e.manager_id <span class="op">=</span> t.emp_id     <span class="cmt">-- ON: 「部下の上司ID = 親のemp_id」という条件で結合</span>
  <span class="kw">WHERE</span> t.depth <span class="op"><</span> <span class="num">10</span>                     <span class="cmt">-- WHERE: 無限ループを防止するため、最大10階層までに制限</span>

)

<span class="kw">SELECT</span>
  emp_id,
  name,
  manager_id,
  depth,
  path
<span class="kw">FROM</span>     <span class="tbl">org_tree</span>                        <span class="cmt">-- FROM: 完成した再帰CTEを参照</span>
<span class="kw">ORDER BY</span> depth, emp_id;                  <span class="cmt">-- ORDER BY: 階層(深さ)の昇順 → emp_idの昇順で並べる</span>

<span class="cmt">/*
  実行順序（再帰の反復）:
  Iter 0 アンカー:      manager_id IS NULL → {田中, depth=0, path="田中（社長）"}
  Iter 1 再帰1回目:     田中の部下 → {鈴木 depth=1, 佐藤 depth=1}
  Iter 2 再帰2回目:     鈴木→山田, 佐藤→渡辺 (depth=2)
  Iter 3 再帰3回目:     山田→伊藤 (depth=3)
  Iter 4 再帰4回目:     伊藤の部下なし → JOIN 0行 → 再帰終了
  最後: 全イテレーションを UNION ALL で縦積み → ORDER BY で整列
  ★ UNION ALL でないと再帰が動かないDBがある（UNIONは非推奨）
  ★ || は PostgreSQL の文字列連結（MySQL は CONCAT()、BigQuery は || も可）
*/</span></pre>`,

  premise: `<p>実データには「売上がなかった月・商品の組み合わせ」が欠損します。ダッシュボードAPIでは<em>全月×全商品の完全マトリックス（売上なしは0）</em>が必要なことが多く、<strong>CROSS JOIN + LEFT JOIN + COALESCE</strong> で作ります。</p>
<pre><span class="cmt">-- CROSS JOIN: 2テーブルの全組み合わせ（直積）を生成</span>
<span class="kw">SELECT</span> m.month, p.product_id
<span class="kw">FROM</span>   <span class="tbl">months</span>   m
<span class="kw">CROSS JOIN</span> <span class="tbl">products</span> p
<span class="cmt">-- months 3行 × products 4行 = 12行の全組み合わせ</span>

<span class="cmt">-- COALESCE: 最初のNULLでない値を返す関数</span>
<span class="fn">COALESCE</span>(sales, <span class="num">0</span>)   <span class="cmt">-- sales が NULL なら 0 を返す（売上なしを0で置換）</span></pre>
<div class="callout"><strong>なぜ LEFT JOIN が必要か：</strong>CROSS JOINで「全組み合わせ」を作り、実績テーブルを LEFT JOIN すると「売上がなかった組み合わせ」の売上列が NULL になります。その NULL を COALESCE で 0 に変換して完成です。</div>`,

  answer: `<pre><span class="kw">WITH</span>

<span class="tbl">months</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span> <span class="str">'2024-01'</span> <span class="kw">AS</span> sale_month         <span class="cmt">-- SELECT: 固定の文字列を取得し、列名をつける</span>

  <span class="kw">UNION ALL</span> <span class="kw">SELECT</span> <span class="str">'2024-03'</span>
),

<span class="cmt">-- ② 全月 × 全商品 の組み合わせ（CROSS JOIN: 3月 × 3商品 = 9行）</span>
<span class="tbl">all_combinations</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    m.sale_month,
    p.product_id,
    p.product_name
  <span class="kw">FROM</span>       <span class="tbl">months</span>   m                  <span class="cmt">-- FROM: 月テーブル（3行）</span>
  <span class="kw">CROSS JOIN</span> <span class="tbl">products</span> p                  <span class="cmt">-- CROSS JOIN: 結合条件なしで、全行×全行のすべての組み合わせ(直積)を作る</span>
),

<span class="cmt">-- ③ 実績テーブル sales を月×商品でグループ集計しておく</span>
<span class="tbl">sales_agg</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    sale_month,
    product_id,
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_sales           <span class="cmt">-- SUM: 同月同商品が複数行あれば合算</span>
  <span class="kw">FROM</span>     <span class="tbl">sales</span>
  <span class="kw">GROUP BY</span> sale_month, product_id        <span class="cmt">-- GROUP BY: 月と商品のペアでグループ化</span>
)

<span class="cmt">-- ④ 全組み合わせ に 実績を LEFT JOIN して0埋め</span>

  c.sale_month,

  c.product_name,
  <span class="fn">COALESCE</span>(s.total_sales, <span class="num">0</span>) <span class="kw">AS</span> total_sales  <span class="cmt">-- COALESCE(値, 代替値): NULLなら代替値(0)を返す</span>
<span class="kw">FROM</span>       <span class="tbl">all_combinations</span> c            <span class="cmt">-- FROM: 全組み合わせを基準（左テーブル）</span>
<span class="kw">LEFT JOIN</span>  <span class="tbl">sales_agg</span>        s            <span class="cmt">-- LEFT JOIN: 右(s)にデータがなくても、左(c)の行をそのまま残す結合</span>
        <span class="kw">ON</span>  c.sale_month  <span class="op">=</span> s.sale_month <span class="cmt">-- ON: 結合条件1（月が一致）</span>
       <span class="kw">AND</span>  c.product_id  <span class="op">=</span> s.product_id <span class="cmt">-- AND: 結合条件2（商品も一致）</span>
<span class="kw">ORDER BY</span> c.sale_month, c.product_id;     <span class="cmt">-- ORDER BY: 月の昇順 → 商品IDの昇順で並べる</span>

<span class="cmt">/*
  実行順序:

<span class="cmt">-- ① ユーザーごとに購入統計を集計する（3条件判定の基礎データ）</span>
<span class="tbl">user_stats</span> <span class="kw">AS</span> (

  <span class="kw">FROM</span>     <span class="tbl">orders</span>                        <span class="cmt">-- FROM: データ取得元テーブル</span>
  <span class="kw">GROUP BY</span> user_id                       <span class="cmt">-- GROUP BY: ユーザーごとにまとめて集計</span>

    <span class="kw">AND</span> total_amount    <span class="op">>=</span> <span class="num">50000</span>         <span class="cmt">-- AND: かつ。条件②: 合計金額が5万円以上</span>
    <span class="kw">AND</span> last_order_date <span class="op">>=</span> <span class="str">'2024-03-01'</span>  <span class="cmt">-- AND: かつ。条件③: 最終購入日が2024-03-01以降</span>

/* ══════════════════════════════════════════════════
   Q8  CTE + SUM OVER — 累計売上（ランニングトータル）API
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "CTE + SUM OVER — 累計売上（ランニングトータル）を計算する",
  tags: [["r","SUM OVER"],["r","CTE"],["g","累計"],["o","ROWS BETWEEN"],["p","進捗APIAPI"]],
  premise: `<p><strong>SUM() OVER (ORDER BY ...)</strong> はウィンドウ関数で、<em>現在行までの合計（累計）</em>を計算します。月ごとの売上推移だけでなく「年間目標に対して今どこにいるか」を返す進捗APIに使います。</p>
<pre><span class="fn">SUM</span>(sales) <span class="kw">OVER</span> (
  <span class="kw">ORDER BY</span> order_month              <span class="cmt">-- 月順に並べてから累計を計算</span>
  <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING</span>  <span class="cmt">-- ROWS BETWEEN: 集計対象の範囲を指定</span>
    <span class="kw">AND CURRENT ROW</span>                  <span class="cmt">-- 「先頭行から現在行まで」= 累計</span>
) <span class="kw">AS</span> cumulative_sales</pre>
<div class="callout"><strong>ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW：</strong>「先頭行から現在行まで」を意味するフレーム指定です。ORDER BY だけでも累計は計算されますが、明示的に書くと意図が明確になります。<code>UNBOUNDED</code> は「制限なし（端まで）」という意味です。</div>`,
  question: `<p>以下の <code>monthly_sales</code> テーブルから、<em>月ごとの売上・累計売上・年間目標（800,000円）に対する達成率（%）</em>を計算するAPIを作成してください。</p>
<p>CTEで月次集計を行い、外側のSELECTで累計と達成率を計算してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ monthly_sales</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_month</th><th>sales</th></tr>
        <tr><td>2024-01</td><td>95000</td></tr>
        <tr><td>2024-02</td><td>120000</td></tr>
        <tr><td>2024-03</td><td>108000</td></tr>
        <tr><td>2024-04</td><td>145000</td></tr>
        <tr><td>2024-05</td><td>132000</td></tr>
        <tr><td>2024-06</td><td>160000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-g">monthly_sales</th><th class="tc-hi">cumulative_sales</th><th class="tc-y">achievement_rate</th></tr>
<tr><td>2024-01</td><td class="tc-g">95000</td><td class="tc-hi">95000</td><td class="tc-y">11.9</td></tr>
<tr><td>2024-02</td><td class="tc-g">120000</td><td class="tc-hi">215000</td><td class="tc-y">26.9</td></tr>
<tr><td>2024-03</td><td class="tc-g">108000</td><td class="tc-hi">323000</td><td class="tc-y">40.4</td></tr>
<tr><td>2024-04</td><td class="tc-g">145000</td><td class="tc-hi">468000</td><td class="tc-y">58.5</td></tr>
<tr><td>2024-05</td><td class="tc-g">132000</td><td class="tc-hi">600000</td><td class="tc-y">75.0</td></tr>
<tr><td>2024-06</td><td class="tc-g">160000</td><td class="tc-hi">760000</td><td class="tc-y">95.0</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span> <span class="tbl">monthly_agg</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① 月ごとの売上を集計する</span>
  <span class="kw">SELECT</span>                                 <span class="cmt">-- SELECT: 取得列を指定</span>
    order_month,
    <span class="fn">SUM</span>(sales) <span class="kw">AS</span> monthly_sales          <span class="cmt">-- SUM(): 同月の売上を合算</span>
  <span class="kw">FROM</span>     <span class="tbl">monthly_sales</span>                 <span class="cmt">-- FROM: 元テーブル</span>
  <span class="kw">GROUP BY</span> order_month                   <span class="cmt">-- GROUP BY: 月ごとにグループ化</span>

)

<span class="cmt">-- ② 累計売上と達成率を計算する</span>
<span class="kw">SELECT</span>
  order_month,
  monthly_sales,

  <span class="cmt">-- SUM() OVER(...): ウィンドウ関数。行をまとめずに(GROUP BYせず)累計などを計算する</span>
  <span class="fn">SUM</span>(monthly_sales) <span class="kw">OVER</span> (              
    <span class="kw">ORDER BY</span> order_month                 <span class="cmt">-- ORDER BY: 月の昇順に並べてから累積していく</span>
    <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING</span>     <span class="cmt">-- ROWS BETWEEN: 計算対象の範囲を指定。UNBOUNDED PRECEDING は「最初の行から」</span>
      <span class="kw">AND CURRENT ROW</span>                    <span class="cmt">-- CURRENT ROW: 「現在の行まで」。つまり「最初から今までの累計」</span>
  ) <span class="kw">AS</span> cumulative_sales,                 <span class="cmt">-- AS: 列に cumulative_sales という別名をつける</span>

  <span class="cmt">-- 達成率 = 累計 / 年間目標 × 100</span>
  <span class="fn">ROUND</span>(                                 <span class="cmt">-- ROUND(値, 桁数): 四捨五入する関数</span>
    <span class="fn">SUM</span>(monthly_sales) <span class="kw">OVER</span> (            <span class="cmt">-- 上と同じ累計計算</span>
      <span class="kw">ORDER BY</span> order_month
      <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</span>
    ) <span class="op">*</span> <span class="num">100.0</span> <span class="op">/</span> <span class="num">800000</span>                   <span class="cmt">-- 100.0を掛けて%にし、年間目標(800000)で割る</span>
  , <span class="num">1</span>) <span class="kw">AS</span> achievement_rate               <span class="cmt">-- 小数点第1位に丸め、別名をつける</span>

<span class="kw">FROM</span>     <span class="tbl">monthly_agg</span>                     <span class="cmt">-- FROM: CTEを参照</span>
<span class="kw">ORDER BY</span> order_month;                    <span class="cmt">-- ORDER BY: 月の昇順で結果を並べる</span>

<span class="cmt">/*
  実行順序:
  1. CTE monthly_agg: FROM monthly_sales → GROUP BY order_month
                      → SUM(sales) で月次集計（6行）
  2. 外側: FROM monthly_agg
           → SUM() OVER(ORDER BY order_month ROWS BETWEEN ...) で累計計算
              ・1行目: 95000
              ・2行目: 95000 + 120000 = 215000
              ・3行目: 215000 + 108000 = 323000  ... と行ごとに加算される
  3. 外側: ROUND(累計 * 100.0 / 800000, 1) で達成率計算
  4. 外側: ORDER BY order_month → 整列
  ★ SUM() OVER() はGROUP BYと違い行を圧縮しない（各行に累計値が追加される）
  ★ ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW は
    「ORDER BYで並べた先頭行から現在行までを合計範囲にする」というフレーム指定
*/</span></pre>`,
  explain: `
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>累計の実務用途：</strong>「今月末時点での年間売上進捗ダッシュボード」「ユーザーの生涯購入額（LTV）の累積推移」「キャンペーン期間中の累積申込数」など、時系列の進捗を見せるAPIに必須です。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>なぜCTEで集計してから累計を計算するか：</strong>同じ月に複数行ある場合、先に GROUP BY で月次合計を出してからウィンドウ関数で累計を計算しないと、行単位で累計されてしまいます。CTE→SUM OVER の2ステップが安全です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ROWS BETWEEN を省略すると意図しない範囲になることがある：</strong>DBによっては ORDER BY だけ指定した場合のデフォルトフレームが「UNBOUNDED PRECEDING AND CURRENT ROW」でない場合があります。明示的に書くことで意図を明確にし、DB間の差異を防ぎます。</div></div>
</div>
<div class="column-box">

</div>`,

{

  premise: `<p><strong>LEAD(col, n)</strong> は LAG の逆で、<em>現在行から n 行後の値</em>を返します。「次の購入はいつか」「購入から次回購入まで何日かかったか」を計算するのに使います。</p>
<pre><span class="fn">LEAD</span>(order_date, <span class="num">1</span>) <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> user_id    <span class="cmt">-- ユーザーごとに独立して「次の行」を参照</span>
  <span class="kw">ORDER BY</span>     order_date  <span class="cmt">-- 日付順に並べた次の行の order_date を返す</span>
)
<span class="cmt">-- 最後の購入行（次がない行）は NULL になる</span></pre>
<div class="callout"><strong>日付の差分計算：</strong>PostgreSQL では <code>date2 - date1</code> で日数差を INTEGER で取得できます。BigQuery では <code>DATE_DIFF(date2, date1, DAY)</code> を使います。NULLが含まれる日付差はNULLになります（NULL伝播）。</div>`,

  answer: `<pre><span class="kw">WITH</span> <span class="tbl">purchase_with_next</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① LEAD で「次の購入日」を各行に追加する</span>
  <span class="kw">SELECT</span>                                 <span class="cmt">-- SELECT: 取得列</span>
    user_id,
    order_date,
    <span class="fn">LEAD</span>(order_date, <span class="num">1</span>) <span class="kw">OVER</span> (           <span class="cmt">-- LEAD(列, n): n行後（未来）の値を取得（なければNULL）</span>
      <span class="kw">PARTITION BY</span> user_id               <span class="cmt">-- PARTITION BY: ユーザーごとに区切って独立して処理する</span>
      <span class="kw">ORDER BY</span>     order_date            <span class="cmt">-- ORDER BY: 日付の昇順に並べて「次」を定義する</span>
    ) <span class="kw">AS</span> next_date                       <span class="cmt">-- AS: 別名をつける</span>
  <span class="kw">FROM</span> <span class="tbl">purchase_log</span>                      <span class="cmt">-- FROM: 元テーブル</span>

)

<span class="cmt">-- ② 次回購入日が確定したので日数差（購入間隔）を計算する</span>
<span class="kw">SELECT</span>
  user_id,
  order_date,
  next_date,
  <span class="cmt">-- 日付同士の引き算で日数差を計算</span>
  next_date <span class="op">-</span> order_date                 <span class="cmt">-- 次の購入日 - 今回の購入日 = 間隔日数</span>
    <span class="kw">AS</span> days_to_next                      <span class="cmt">-- ※ next_dateがNULLなら、結果の計算もNULLになる（NULLの伝播）</span>
<span class="kw">FROM</span>     <span class="tbl">purchase_with_next</span>              <span class="cmt">-- FROM: CTEを参照</span>
<span class="kw">ORDER BY</span> user_id, order_date;            <span class="cmt">-- ORDER BY: ユーザーIDの昇順 → 日付の昇順 で並べる</span>

<span class="cmt">/*
  実行順序:
  1. CTE内 FROM purchase_log           → 全行読み込み（6行）
  2. CTE内 LEAD(order_date,1) OVER(PARTITION BY user_id ORDER BY order_date)

  3. 外側  FROM purchase_with_next     → CTE結果を参照

  5. 外側  ORDER BY user_id, order_date → 整列

  ★ BigQuery では date型の差分に DATE_DIFF(next_date, order_date, DAY) を使う
*/</span></pre>`,

{

  title: "複数CTE + CASE WHEN — RFMスコアでユーザーをセグメント分類する",
  tags: [["r","複数CTE"],["r","CASE WHEN"],["g","RFM分析"],["o","DATEDIFF"],["p","セグメントAPI"]],
  premise: `<p><strong>RFM分析</strong>は顧客をRecency（最終購入からの経過日数）・Frequency（購入回数）・Monetary（購入額）の3軸で評価し、セグメント分類するマーケティング手法です。複数CTEでステップを分けることで、各スコアの計算ロジックを独立させられます。</p>
<pre><span class="cmt">-- CASE WHEN: 条件分岐で値を変換する（if〜else ifのイメージ）</span>
<span class="kw">CASE</span>
  <span class="kw">WHEN</span> recency_days <span class="op">&lt;</span>  <span class="num">30</span> <span class="kw">THEN</span> <span class="num">3</span>   <span class="cmt">-- 30日未満なら3点</span>
  <span class="kw">WHEN</span> recency_days <span class="op">&lt;</span>  <span class="num">90</span> <span class="kw">THEN</span> <span class="num">2</span>   <span class="cmt">-- 90日未満なら2点</span>
  <span class="kw">ELSE</span>                       <span class="num">1</span>   <span class="cmt">-- それ以外は1点</span>
<span class="kw">END</span></pre>
<div class="callout"><strong>基準日の設定：</strong>Recency は「今日から最終購入日までの日数」ですが、クエリの中では基準日を固定することが多いです（データが過去のものなので、<code>CURRENT_DATE</code> を使うとテスト時に結果が変わるため）。実務ではパラメータで受け取ります。</div>`,
  question: `<p>以下の <code>orders</code> テーブルから、<em>RFMスコア（各1〜3点）を計算してユーザーをセグメント（VIP / 一般 / 休眠）に分類する</em>APIを、複数CTEで作成してください。</p>
<p>基準日は <em>2024-04-01</em> とします。スコアリング基準：<br>
R（Recency）: &lt;30日=3, &lt;90日=2, それ以外=1<br>
F（Frequency）: ≥3回=3, ≥2回=2, それ以外=1<br>
M（Monetary）: ≥100000=3, ≥50000=2, それ以外=1<br>
セグメント: R+F+M が 8以上=VIP, 5以上=一般, それ以外=休眠</p>

        <tr><td>8</td><td>U04</td><td>20000</td><td>2024-03-31</td></tr>

  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>recency</th><th>freq</th><th>monetary</th><th class="tc-hi">R</th><th class="tc-g">F</th><th class="tc-y">M</th><th class="tc-o">total</th><th class="tc-p">segment</th></tr>
<tr class="tr-hi3"><td>U04</td><td>0日</td><td>3回</td><td>53000</td><td class="tc-hi">3</td><td class="tc-g">3</td><td class="tc-y">2</td><td class="tc-o">8</td><td class="tc-p">VIP</td></tr>
<tr class="tr-hi2"><td>U02</td><td>4日</td><td>2回</td><td>140000</td><td class="tc-hi">3</td><td class="tc-g">2</td><td class="tc-y">3</td><td class="tc-o">8</td><td class="tc-p">VIP</td></tr>
<tr><td>U01</td><td>7日</td><td>3回</td><td>120000</td><td class="tc-hi">3</td><td class="tc-g">3</td><td class="tc-y">3</td><td class="tc-o">9</td><td class="tc-p">VIP</td></tr>
<tr><td>U03</td><td>122日</td><td>1回</td><td>120000</td><td class="tc-hi">1</td><td class="tc-g">1</td><td class="tc-y">3</td><td class="tc-o">5</td><td class="tc-p">一般</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ 基準日 2024-04-01 からの経過日数で R を計算。U03はrecency122日（&lt;90日でないので1点）。total_score≥8=VIP, ≥5=一般, それ以外=休眠。</p>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① ユーザーごとにRFMの生データを集計する</span>
<span class="tbl">rfm_raw</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>                                 <span class="cmt">-- SELECT: 取得列</span>
    user_id,
    <span class="cmt">-- Recency: 基準日 - 最終購入日</span>
    <span class="str">'2024-04-01'</span><span class="op">::</span>date <span class="op">-</span> <span class="fn">MAX</span>(order_date) <span class="kw">AS</span> recency_days,
    <span class="cmt">-- ::date は文字列を日付型(DATE)に変換するPostgreSQLの書き方</span>
    <span class="cmt">-- MAX()で最新の購入日を取得し、引き算で経過日数を出す</span>

    <span class="cmt">-- Frequency: 購入回数</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)        <span class="kw">AS</span> frequency,        <span class="cmt">-- COUNT(*): 行数（=購入回数）をカウント</span>

    <span class="cmt">-- Monetary: 合計購入額</span>
    <span class="fn">SUM</span>(amount)     <span class="kw">AS</span> monetary          <span class="cmt">-- SUM(): 金額の合計を計算</span>
  <span class="kw">FROM</span>     <span class="tbl">orders</span>                        <span class="cmt">-- FROM: 元テーブル</span>
  <span class="kw">GROUP BY</span> user_id                       <span class="cmt">-- GROUP BY: ユーザーごとにまとめる</span>
),

<span class="cmt">-- ② RFMの生データを各スコア（1〜3点）に変換する</span>
<span class="tbl">rfm_scored</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    recency_days,
    frequency,
    monetary,

    <span class="cmt">-- R スコア: Recency（経過日数が少ないほど高スコア）</span>
    <span class="kw">CASE</span>                                 <span class="cmt">-- CASE: 条件によって返す値を変える（if文のようなもの）</span>
      <span class="kw">WHEN</span> recency_days <span class="op"><</span>  <span class="num">30</span> <span class="kw">THEN</span> <span class="num">3</span>     <span class="cmt">-- WHEN 条件 THEN 値: 30日未満なら3を返す</span>
      <span class="kw">WHEN</span> recency_days <span class="op"><</span>  <span class="num">90</span> <span class="kw">THEN</span> <span class="num">2</span>     <span class="cmt">-- 90日未満なら2を返す</span>
      <span class="kw">ELSE</span>                       <span class="num">1</span>       <span class="cmt">-- ELSE 値: どの条件にも当てはまらなければ1を返す</span>
    <span class="kw">END</span> <span class="kw">AS</span> r_score,                      <span class="cmt">-- END: CASE文の終わり。ASで別名をつける</span>

    <span class="cmt">-- F スコア: Frequency（購入回数が多いほど高スコア）</span>
    <span class="kw">CASE</span>
      <span class="kw">WHEN</span> frequency <span class="op">>=</span> <span class="num">3</span> <span class="kw">THEN</span> <span class="num">3</span>         <span class="cmt">-- 3回以上なら3を返す</span>
      <span class="kw">WHEN</span> frequency <span class="op">>=</span> <span class="num">2</span> <span class="kw">THEN</span> <span class="num">2</span>         <span class="cmt">-- 2回以上なら2を返す</span>
      <span class="kw">ELSE</span>                     <span class="num">1</span>         <span class="cmt">-- それ以外は1を返す</span>
    <span class="kw">END</span> <span class="kw">AS</span> f_score,

    <span class="cmt">-- M スコア: Monetary（購入額が多いほど高スコア）</span>
    <span class="kw">CASE</span>
      <span class="kw">WHEN</span> monetary <span class="op">>=</span> <span class="num">100000</span> <span class="kw">THEN</span> <span class="num">3</span>     <span class="cmt">-- 10万円以上なら3を返す</span>
      <span class="kw">WHEN</span> monetary <span class="op">>=</span>  <span class="num">50000</span> <span class="kw">THEN</span> <span class="num">2</span>     <span class="cmt">-- 5万円以上なら2を返す</span>
      <span class="kw">ELSE</span>                         <span class="num">1</span>     <span class="cmt">-- それ以外は1を返す</span>
    <span class="kw">END</span> <span class="kw">AS</span> m_score
  <span class="kw">FROM</span> <span class="tbl">rfm_raw</span>                           <span class="cmt">-- FROM: 1つ目のCTEを参照</span>
),

<span class="cmt">-- ③ R+F+M の合計スコアを計算する</span>
<span class="tbl">rfm_total</span> <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    <span class="op">*</span>,                                   <span class="cmt">-- *: すべての列をそのまま取得</span>
    r_score <span class="op">+</span> f_score <span class="op">+</span> m_score <span class="kw">AS</span> total_score  <span class="cmt">-- +: 足し算して合計スコアを算出</span>
  <span class="kw">FROM</span> <span class="tbl">rfm_scored</span>                        <span class="cmt">-- FROM: 2つ目のCTEを参照</span>
)

<span class="cmt">-- ④ 合計スコアでセグメントを判定して出力する</span>
<span class="kw">SELECT</span>
  user_id,
  recency_days,
  frequency,
  monetary,
  r_score,
  f_score,
  m_score,
  total_score,
  <span class="cmt">-- CASE WHEN でスコアをセグメント名（文字列）に変換</span>
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> total_score <span class="op">>=</span> <span class="num">8</span> <span class="kw">THEN</span> <span class="str">'VIP'</span>     <span class="cmt">-- 合計8点以上は'VIP'文字列を返す</span>
    <span class="kw">WHEN</span> total_score <span class="op">>=</span> <span class="num">5</span> <span class="kw">THEN</span> <span class="str">'一般'</span>    <span class="cmt">-- 合計5点以上は'一般'を返す</span>
    <span class="kw">ELSE</span>                       <span class="str">'休眠'</span>    <span class="cmt">-- それ以外は'休眠'を返す</span>
  <span class="kw">END</span> <span class="kw">AS</span> segment
<span class="kw">FROM</span>     <span class="tbl">rfm_total</span>                       <span class="cmt">-- FROM: 3つ目のCTEを参照</span>
<span class="kw">ORDER BY</span> total_score <span class="kw">DESC</span>, user_id;      <span class="cmt">-- ORDER BY ... DESC: 合計スコアの高い順 → ユーザーID順 に並べる</span>

<span class="cmt">/*
  実行順序:
  1. CTE rfm_raw:    FROM orders → GROUP BY user_id
                     → MAX(date)で最新購入日, COUNT(*)で購入回数, SUM(amount)で合計額
  2. CTE rfm_scored: FROM rfm_raw → CASE WHEN でR/F/Mを各1〜3点に変換
  3. CTE rfm_total:  FROM rfm_scored → r_score+f_score+m_score で合計スコア計算
  4. 本体:           FROM rfm_total → CASE WHEN でセグメント判定 → ORDER BY total_score DESC
  ★ CTEを3段に分けることで「集計」「スコア変換」「合計」「セグメント判定」の
    各ステップを独立してデバッグ・修正できる
  ★ '2024-04-01'::date は文字列をDATE型にキャスト（BigQueryでは DATE '2024-04-01'）
*/</span></pre>`,
  explain: `
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>RFM分析の実務価値：</strong>「VIPユーザーに向けた特別キャンペーンAPI」「休眠ユーザーへの再購入促進メール配信リスト取得」など、マーケティング施策のターゲティングに直結します。スコアリング基準は事業ドメインに応じて変えられます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>CASE WHEN の評価順：</strong>CASE WHEN は上から順に評価し、最初に合致した THEN の値を返します。<em>条件は排他的でなくてよい</em>（例: &lt;30 と &lt;90 は重複するが先に &lt;30 がチェックされるため問題なし）。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>スコアリング基準の外部化：</strong>実務では閾値（30日、90日、100000円など）をハードコードせず、パラメータテーブルや設定ファイルから取得します。CTEを使うとこの「設定値CTE」を先頭に追加するだけで対応でき、保守性が高まります。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CASE WHEN の ELSE を省略する：</strong>ELSE を書かないと、どの条件にも合致しない行は NULL になります。スコアがNULLになると total_score も NULL になり、セグメントも判定できなくなります。必ず ELSE でデフォルト値を設定してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>基準日に CURRENT_DATE を使う：</strong>テスト・再現性のために基準日は固定値にするのが推奨です。CURRENT_DATEを使うと、同じSQLを別の日に実行すると結果が変わり、デバッグが困難になります。</div></div>
</div>
<div class="column-box">
<div class="column-title">🏢 実務でのユースケース</div>
<div class="column-row"><span class="column-icon">💼</span><div class="column-body"><strong>顧客ターゲティングの自動化：</strong>RFM分析の結果を返すAPIは、マーケティングオートメーション（MA）ツールの根幹を担います。セグメントごとに異なる施策（VIPには限定イベント招待、休眠にはポイントプレゼントなど）を打ち出すためのリスト抽出に使われます。スコアリングの閾値（30日、90日、10万円など）は事業の成長フェーズによって見直されるため、実務ではCTEの中に数値を直書きするのではなく、パラメータとして外部から受け取る設計にするのがベストプラクティスです。</div></div>
</div>`,
  viz: {
    steps: [
      { id: 'group', badge: '① CTE① rfm_raw', bc: 'badge-orange',
        label: 'GROUP BY user_id → MAX(date) / COUNT(*) / SUM(amount)',
        desc: 'orders を user_id でグループ化し、RFMの生データを集計します。Recency は基準日（2024-04-01）から最終購入日を引いた経過日数、Frequency は購入回数、Monetary は合計購入額です。',
        type: 'group',
        cols: ['user_id', 'recency_days', 'frequency', 'monetary'],
        ch: ['col-eval', 'col-eval', 'col-eval', 'col-eval'],
        rows: [
          { v: ['U01', '7日',   '3回', '120,000'] },
          { v: ['U02', '4日',   '2回', '140,000'] },
          { v: ['U03', '122日', '1回', '120,000'] },
          { v: ['U04', '0日',   '3回', '53,000'] }
        ],
        cnt: '9行 → 4ユーザー分に集約' },

      { id: 'agg', badge: '② CTE② rfm_scored', bc: 'badge-orange',
        label: 'CASE WHEN → r_score / f_score / m_score (各1〜3点)',
        desc: 'CASE WHEN で各指標を1〜3点に変換します。上から順に評価され最初にマッチした値を返します。U03 は recency 122日（≥90日）なので R=1、frequency 1回（<2回）なので F=1 になります。',
        type: 'eval',
        cols: ['user_id', 'recency_days', 'r_score', 'frequency', 'f_score', 'monetary', 'm_score'],
        ch: ['', 'col-eval', 'col-eval', 'col-eval', 'col-eval', 'col-eval', 'col-eval'],
        rows: [
          { v: ['U01', '7日',   3, '3回', 3, '120,000', 3], cc: ['', '', 'val-pass', '', 'val-pass', '', 'val-pass'] },
          { v: ['U02', '4日',   3, '2回', 2, '140,000', 3], cc: ['', '', 'val-pass', '', '',         '', 'val-pass'] },
          { v: ['U03', '122日', 1, '1回', 1, '120,000', 3], cc: ['', '', 'val-fail', '', 'val-fail', '', 'val-pass'] },
          { v: ['U04', '0日',   3, '3回', 3, '53,000',  2], cc: ['', '', 'val-pass', '', 'val-pass', '', ''] }
        ],
        cnt: '全 4行（スコア変換完了）' },

      { id: 'where', badge: '③ CTE③ rfm_total', bc: 'badge-orange',
        label: 'r_score + f_score + m_score AS total_score',
        desc: 'rfm_scored の3スコアを合算して total_score を計算します。単純な加算で各ユーザーの総合評価が出ます。次のステップでこの合計値に応じてセグメントを判定します。',
        type: 'group',
        cols: ['user_id', 'r_score', 'f_score', 'm_score', 'total_score'],
        ch: ['', 'col-eval', 'col-eval', 'col-eval', 'col-eval'],
        rows: [
          { v: ['U01', 3, 3, 3, 9] },
          { v: ['U02', 3, 2, 3, 8] },
          { v: ['U03', 1, 1, 3, 5] },
          { v: ['U04', 3, 3, 2, 8] }
        ],
        cnt: '全 4行（合計スコア算出）' },

      { id: 'select', badge: '④ SELECT + segment', bc: 'badge-green',
        label: 'CASE WHEN total_score>=8 THEN VIP … → ORDER BY total_score DESC',
        desc: 'total_score に基づき CASE WHEN でセグメント名を決定します。≥8=VIP（3名）、≥5=一般（1名）。ORDER BY total_score DESC, user_id で降順整列して最終出力します。',
        type: 'select',
        cols: ['user_id', 'r_score', 'f_score', 'm_score', 'total_score', 'segment'],
        ch: ['col-select', 'col-select', 'col-select', 'col-select', 'col-select', 'col-select'],
        rows: [
          { v: ['U01', 3, 3, 3, 9, 'VIP'] },
          { v: ['U02', 3, 2, 3, 8, 'VIP'] },
          { v: ['U04', 3, 3, 2, 8, 'VIP'] },
          { v: ['U03', 1, 1, 3, 5, '一般'] }
        ],
        cnt: '結果: 4行 × 6列' }
    ],
    sql: [
      { t: 'WITH\n', k: 'sql-kw', h: '' },
      { t: 'rfm_raw', k: '', h: 'group' }, { t: ' AS (\n', k: '', h: '' },
      { t: "  SELECT user_id,\n", k: 'sql-kw', h: 'group' },
      { t: "    '2024-04-01'::date - MAX(order_date) AS recency_days,\n", k: '', h: 'group' },
      { t: '    COUNT(*) AS frequency,\n', k: '', h: 'group' },
      { t: '    SUM(amount) AS monetary\n', k: '', h: 'group' },
      { t: '  FROM ', k: 'sql-kw', h: 'group' }, { t: 'orders\n', k: '', h: 'group' },
      { t: '  GROUP BY ', k: 'sql-kw', h: 'group' }, { t: 'user_id\n', k: '', h: 'group' },
      { t: '),\n', k: '', h: '' },
      { t: 'rfm_scored', k: '', h: 'agg' }, { t: ' AS (\n', k: '', h: '' },
      { t: '  SELECT *, CASE\n', k: 'sql-kw', h: 'agg' },
      { t: '    WHEN recency_days < 30 THEN 3\n', k: '', h: 'agg' },
      { t: '    WHEN recency_days < 90 THEN 2\n', k: '', h: 'agg' },
      { t: '    ELSE 1 END AS r_score,\n', k: '', h: 'agg' },
      { t: '    CASE WHEN frequency >= 3 THEN 3\n', k: '', h: 'agg' },
      { t: '    WHEN frequency >= 2 THEN 2\n', k: '', h: 'agg' },
      { t: '    ELSE 1 END AS f_score,\n', k: '', h: 'agg' },
      { t: '    CASE WHEN monetary >= 100000 THEN 3\n', k: '', h: 'agg' },
      { t: '    WHEN monetary >= 50000 THEN 2\n', k: '', h: 'agg' },
      { t: '    ELSE 1 END AS m_score\n', k: '', h: 'agg' },
      { t: '  FROM ', k: 'sql-kw', h: 'agg' }, { t: 'rfm_raw\n', k: '', h: 'agg' },
      { t: '),\n', k: '', h: '' },
      { t: 'rfm_total', k: '', h: 'where' }, { t: ' AS (\n', k: '', h: '' },
      { t: '  SELECT *, r_score + f_score + m_score AS total_score\n', k: '', h: 'where' },
      { t: '  FROM ', k: 'sql-kw', h: 'where' }, { t: 'rfm_scored\n', k: '', h: 'where' },
      { t: ')\n', k: '', h: '' },
      { t: 'SELECT\n', k: 'sql-kw', h: 'select' },
      { t: '  user_id, r_score, f_score, m_score, total_score,\n', k: '', h: 'select' },
      { t: '  CASE\n', k: 'sql-kw', h: 'select' },
      { t: "    WHEN total_score >= 8 THEN 'VIP'\n", k: '', h: 'select' },
      { t: "    WHEN total_score >= 5 THEN '一般'\n", k: '', h: 'select' },
      { t: "    ELSE '休眠' END AS segment\n", k: '', h: 'select' },
      { t: 'FROM     ', k: 'sql-kw', h: 'select' }, { t: 'rfm_total\n', k: '', h: 'select' },
      { t: 'ORDER BY ', k: 'sql-kw', h: 'select' }, { t: 'total_score DESC, user_id;', k: '', h: 'select' }
    ]
  }
}

];

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力例','期待出力',q.output)}
      ${acc('✅','pill-red','模範回答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',
        (Array.isArray(q.viz)
          ? q.viz.map((_, vIdx) => `<div class="sql-viz-wrapper" id="viz-${i}-${vIdx}" tabindex="-1" style="margin-bottom: 24px;"></div>`).join('')
          : q.viz ? `<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>` : ''
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => {
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById(`viz-${i}-${vIdx}`), v));
      } else {
        initVisualizer(document.getElementById('viz-' + i), q.viz);
      }
    }
  });

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});

let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => { el.open = !wasMobile; });
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => { el.open = !isMobile; });
  }
});
</script>
</body>
</html>
