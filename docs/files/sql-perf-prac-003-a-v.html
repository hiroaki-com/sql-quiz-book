<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLパフォーマンス最適化5選 — カバリングINDEX／Window関数／EXPLAIN読解／N+1解決／Keyset Pagination（応用編003）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0e13;
  --bg2:    #131920;
  --bg3:    #1c2330;
  --bg4:    #263040;
  --border: #2a3545;
  --text:   #cdd9e5;
  --dim:    #768390;
  --accent: #4dabf7;
  --green:  #3fb950;
  --orange: #f0883e;
  --red:    #f85149;
  --purple: #bc8cff;
  --yellow: #e3b341;
  --kw:     #ff7b72;
  --fn:     #79c0ff;
  --str:    #a5d6ff;
  --num:    #f0c674;
  --cmt:    #6a737d;
  --tbl:    #ffa657;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}
.site-header{background:var(--bg2)}
.header-inner{padding:16px}
.header-flex{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.header-badge{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1;white-space:nowrap}
.header-text-wrap{flex:1}
.header-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.header-tags{display:flex;gap:6px;flex-wrap:wrap}
.htag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}
.sticky-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.tab-num{margin-right:5px}
.prog-wrap{height:2px;background:var(--bg4)}
.prog-fill{height:100%;background:var(--accent);transition:width .2s}
main{max-width:960px;margin:0 auto;padding:22px 14px 90px}
.panel{display:none}
.panel.active{display:block}
.q-header{margin-bottom:18px}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;font-weight:600}
.tag-r{background:#1a2c44;color:var(--accent);border:1px solid #1e4070}
.tag-g{background:#162416;color:var(--green);border:1px solid #1e3a1e}
.tag-o{background:#2e1e0a;color:var(--orange);border:1px solid #4a2e0a}
.tag-p{background:#1e1433;color:var(--purple);border:1px solid #3a2060}
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.acc-head:hover{background:var(--bg3)}
.acc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-title{font-size:13px;font-weight:600;flex:1}
.acc-pill{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;flex-shrink:0}
.pill-blue  {background:#112233;color:var(--accent);border:1px solid #1a3a55}
.pill-green {background:#0e1f0e;color:var(--green);border:1px solid #1a3a1a}
.pill-orange{background:#1e1205;color:var(--orange);border:1px solid #3a2010}
.pill-red   {background:#1e0a0a;color:var(--red);border:1px solid #3a1010}
.pill-purple{background:#160f2a;color:var(--purple);border:1px solid #3a1a60}
.acc-chevron{color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .2s}
.acc.closed .acc-chevron{transform:rotate(-90deg)}
.acc-body{padding:14px 16px;border-top:1px solid var(--border)}
.acc.closed .acc-body{display:none}
p{font-size:13.5px;margin-bottom:10px}
p:last-child{margin-bottom:0}
strong{color:var(--accent);font-weight:600}
em{color:var(--yellow);font-style:normal;font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--tbl)}
pre{background:#060a0f;border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;margin:8px 0}
.kw {color:var(--kw);font-weight:700}
.fn {color:var(--fn)}
.tbl{color:var(--tbl)}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.op {color:var(--orange)}
.callout{border-left:3px solid var(--accent);background:#0e1e33;padding:9px 13px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px}
.callout.warn  {border-left-color:var(--yellow);background:#1e1a08}
.callout.danger{border-left-color:var(--red);background:#1e0e0e}
.callout.ok    {border-left-color:var(--green);background:#0a1e0a}
.data-section{margin:14px 0}
.data-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tbl);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.data-label::before{content:'';display:block;width:3px;height:12px;background:var(--tbl);border-radius:2px}
.data-tables{display:flex;gap:14px;flex-wrap:wrap}
.data-tbl-wrap{flex:1;min-width:220px}
.data-tbl-name{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:4px}
.tbl-wrap{overflow-x:auto;margin-bottom:4px}
table.vtbl{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#060a0f;border:1px solid var(--border);border-radius:4px;min-width:100%}
table.vtbl th{background:var(--bg3);color:var(--tbl);padding:5px 11px;border:1px solid var(--border);text-align:left;white-space:nowrap;font-weight:600}
table.vtbl td{padding:4px 11px;border:1px solid #1c2635;white-space:nowrap}
table.vtbl tr:nth-child(even) td{background:#080c12}
.tr-hi  td{background:#0e1e33!important}
.tr-hi2 td{background:#0e1e0e!important}
.tr-hi3 td{background:#1e1433!important}
.tr-hi4 td{background:#1e1a0a!important}
.tr-dim td{opacity:.4}
.tc-hi{color:var(--accent)!important;font-weight:700}
.tc-g {color:var(--green)!important;font-weight:700}
.tc-p {color:var(--purple)!important;font-weight:700}
.tc-y {color:var(--yellow)!important;font-weight:700}
.tc-o {color:var(--orange)!important;font-weight:700}
.tc-r {color:var(--red)!important;font-weight:700}
.null {color:var(--dim)!important;font-style:italic}

.insight-box{background:#0a1520;border:1px solid #1a3a55;border-radius:8px;padding:14px 16px;margin-top:14px}
.insight-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.insight-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.insight-body{font-size:12.5px;color:var(--text);line-height:1.6}
.insight-body strong{color:var(--accent)}
.insight-body em{color:var(--yellow)}
.insight-body code{font-size:11px}
.anti-box{background:#160a0a;border:1px solid #3a1515;border-radius:8px;padding:14px 16px;margin-top:10px}
.anti-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:1px;margin-bottom:10px}
.anti-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.anti-body{font-size:12.5px;color:var(--text);line-height:1.6}
.anti-body strong{color:var(--red)}
.anti-body code{font-size:11px}
.column-box{background:#0d1520;border:1px solid #1c3550;border-left:3px solid var(--fn);border-radius:8px;padding:14px 16px;margin-top:10px}
.column-title{font-size:11px;font-weight:700;color:var(--fn);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.column-body{font-size:12.5px;color:var(--text);line-height:1.6}
.column-body strong{color:var(--fn)}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:#0e1e33}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}
@media(max-width:520px){
  .header-inner{padding:12px 10px 6px}
  .q-title{font-size:15px}
  pre{font-size:11px;padding:10px}
  table.vtbl{font-size:10.5px}
  .acc-title{font-size:12px}
  .header-badge{font-size:14px;padding:5px 8px}
  main{padding:16px 10px 60px}
  .data-tables{flex-direction:column}
}

/* ── SQL Step Visualizer ── */
.sql-viz-wrapper {
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-sans: 'Noto Sans JP', system-ui, sans-serif;
  --color-bg-base:    #0a0e13;
  --color-bg-panel:   #131920;
  --color-border-main:#2a3545;
  --color-border-sub: #1c2a38;
  --color-txt-main:   #cdd9e5;
  --color-txt-sub:    #768390;
  --color-txt-muted:  #4a5568;
  --sql-blue-bg:    rgba(77,171,247,0.12); --sql-blue-txt:   #4dabf7; --sql-blue-bd:    #1e4070;
  --sql-orange-bg:  rgba(240,136,62,0.12); --sql-orange-txt: #f0883e; --sql-orange-bd:  #7d4e00;
  --sql-green-bg:   rgba(63,185,80,0.12);  --sql-green-txt:  #3fb950; --sql-green-bd:   #1e4a1e;
  --sql-red-bg:     rgba(248,81,73,0.10);  --sql-red-txt:    #f85149;
  --sql-grp1-bg: rgba(77,171,247,0.04);
  --sql-grp2-bg: rgba(77,171,247,0.09);
  --sql-grp3-bg: rgba(77,171,247,0.15);
  --border-radius: 6px;
  color: var(--color-txt-main);
  font-family: var(--font-sans);
  min-height: auto;
  padding: 6px 0 2px;
}
.sv-nav-btn { padding:5px 14px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);font-size:11px;font-family:var(--font-mono);background:var(--color-bg-panel);color:var(--color-txt-main);cursor:pointer;transition:all .2s }
.sv-nav-btn:disabled { opacity:.3;cursor:not-allowed }
.sv-nav-btn:not(:disabled):hover { border-color:var(--color-border-main);background:#0e1a26 }
.sv-dot { height:6px;border:none;background:var(--color-border-sub);border-radius:3px;cursor:pointer;padding:0;transition:width .3s cubic-bezier(.4,0,.2,1),background .3s;flex-shrink:0;width:8px }
.sv-dot.done { background:var(--color-border-main) }
.sv-dot.active { background:var(--sql-blue-txt);width:24px }
.sv-table { border-collapse:collapse;width:100%;font-family:var(--font-mono);font-size:10px }
.sv-table th { padding:5px 11px;font-size:9px;font-weight:600;border:1px solid var(--color-border-sub);text-align:left;transition:all .3s ease;white-space:nowrap;background:var(--color-bg-panel);color:var(--color-txt-sub) }
.sv-table td { padding:5px 11px;border:1px solid var(--color-border-sub);white-space:nowrap;background:var(--color-bg-base);color:var(--color-txt-main);transition:background .3s ease,opacity .3s ease }
.sv-table th.col-base   { background:var(--sql-blue-bg);   color:var(--sql-blue-txt) }
.sv-table th.col-eval   { background:var(--sql-orange-bg); color:var(--sql-orange-txt) }
.sv-table th.col-select { background:var(--sql-green-bg);  color:var(--sql-green-txt) }
.sv-table tr.row-dimmed td { background:transparent;opacity:.28 }
.sv-table tr.row-grp-1 td { background:var(--sql-grp1-bg) }
.sv-table tr.row-grp-2 td { background:var(--sql-grp2-bg) }
.sv-table tr.row-grp-3 td { background:var(--sql-grp3-bg) }
.sv-table td.val-pass   { background:var(--sql-green-bg)!important;border-left:2px solid var(--sql-green-txt);color:var(--sql-green-txt);font-weight:600 }
.sv-table td.val-fail   { background:var(--sql-red-bg)!important;border-left:2px solid var(--sql-red-txt);color:var(--sql-red-txt);text-decoration:line-through;opacity:.7 }
.sv-table td.val-dimmed { background:transparent!important;opacity:.2;color:var(--color-txt-muted) }
.sql-kw { color:var(--sql-blue-txt);font-weight:600 }
.sql-hl-from,.sql-hl-join { background:var(--sql-blue-bg);border-radius:3px;padding:1px 3px;color:var(--sql-blue-txt) }
.sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-sub,.sql-hl-scan { background:var(--sql-orange-bg);border-radius:3px;padding:1px 3px;color:var(--sql-orange-txt) }
.sql-hl-select { background:var(--sql-green-bg);border-radius:3px;padding:1px 3px;color:var(--sql-green-txt) }
.sv-badge { display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;letter-spacing:.02em }
.badge-blue   { background:var(--sql-blue-bg);   color:var(--sql-blue-txt);   border:1px solid var(--sql-blue-bd) }
.badge-orange { background:var(--sql-orange-bg); color:var(--sql-orange-txt); border:1px solid var(--sql-orange-bd) }
.badge-green  { background:var(--sql-green-bg);  color:var(--sql-green-txt);  border:1px solid var(--sql-green-bd) }
@keyframes sv-fade-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.sv-animate { animation:sv-fade-in .3s ease forwards }
.sv-mobile-collapse summary::-webkit-details-marker { display:none }
.sv-mobile-collapse summary { list-style:none }
.sv-collapse-icon { transition:transform .2s ease;display:inline-block }
.sv-mobile-collapse[open] .sv-collapse-icon { transform:rotate(180deg) }
@media (min-width:641px) {
  .sv-mobile-collapse > summary { pointer-events:none }
  .sv-mobile-collapse .sv-collapse-icon { display:none!important }
}
@media (max-width:640px) {
  .sv-sidebar { flex:1 1 100%!important;min-width:100%!important }
  .sql-viz-wrapper { padding:4px 0 2px }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">PRAC</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 応用5選（カバリングINDEX／Window関数 vs GROUP BY／EXPLAIN読解／N+1解決／Keyset Pagination 編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★ 応用</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">チューニング</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">003</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>

function initVisualizer(root, data) {
  let currentStepIndex = 0;

  root.innerHTML = `
<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
  <div class="sv-sidebar" style="flex:0 0 280px;min-width:240px;">
    <div style="font-size:12px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
    <div class="sv-sqlbox" style="font-family:var(--font-mono);font-size:13px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>
    <details class="sv-legend-container sv-mobile-collapse" style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:12px 14px;background:var(--color-bg-panel);">
      <summary style="font-size:11px;font-weight:600;color:var(--color-txt-muted);letter-spacing:0.06em;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;margin:0;">
        <span>LEGEND (現在のステップ)</span>
        <span class="sv-collapse-icon" style="font-size:10px;">&#x25BC;</span>
      </summary>
      <div class="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:12px;margin-top:12px;border-top:1px dashed var(--color-border-sub);padding-top:12px;"></div>
    </details>
  </div>
  <div style="flex:1;min-width:300px;">
    <div class="sv-stepinfo" style="margin-bottom:16px;"></div>
    <div class="sv-ctrls" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;"></div>
    <div class="sv-tarea sv-animate"></div>
    <div class="sv-rowcount" style="font-size:12px;font-family:var(--font-mono);color:var(--color-txt-sub);margin-top:8px;text-align:right;"></div>
  </div>
</div>`;

  function getLegendHTML(type) {
    const mk = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dim =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const pf =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:11px;">&#x2713; 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:11px;">&#x2717; 除外</span></div>
      </div>`;
    if (type === 'base')   return mk('blue',   'データ取得・結合対象') + dim;
    if (type === 'eval')   return mk('orange', '評価対象の列・フィルタキー') + dim + pf;
    if (type === 'group')  return mk('orange', 'グループ化キー・集計対象') +
      `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;">
        <div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div>
        <div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div>
        <div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div>
      </div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === 'select') return mk('green',  '出力対象の列') + dim;
    return '';
  }

  function renderSQL(d, stepId) {
    return d.sql.map(t => {
      const isMatch = t.h && t.h.split(' ').includes(stepId);
      const cls = `${t.k || ''} ${isMatch ? `sql-hl-${stepId}` : ''}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join('');
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 12px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>

        <div style="margin-top:10px;font-size:12px;line-height:1.6;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:10px;">${step.desc}</div>
      </details>`;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((c, i) => `<th class="${headerClasses?.[i] || ''}">${c}</th>`).join('');
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ''}">${val}</td>`).join('');
      return `<tr class="${r.c || ''}">${tds}</tr>`;
    }).join('');
    const lbl = label ? `<div style="font-size:9px;font-weight:500;color:var(--color-txt-sub);margin-bottom:6px;">&#x25B8; ${label}</div>` : '';
    return `<div style="flex:1;min-width:240px;">${lbl}<div style="overflow-x:auto;"><table class="sv-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;">
        ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
        <div style="display:flex;align-items:center;font-size:20px;color:var(--sql-blue-txt);padding-top:28px;">&#x22C8;</div>
        ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
      </div>`;
    }
    return buildTable('', step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? 'active' : (i < currentStepIndex ? 'done' : '');
      return `<button class="sv-dot ${cls}" data-action="goto" data-idx="${i}" aria-label="ステップ${i+1}"></button>`;
    }).join('');
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:10px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" data-action="prev" ${currentStepIndex === 0 ? 'disabled' : ''}>&#x2190; Prev</button>
        <button class="sv-nav-btn" data-action="next" ${currentStepIndex === total - 1 ? 'disabled' : ''}>Next &#x2192;</button>
      </div>`;
  }

  function renderAll() {
    const step = data.steps[currentStepIndex];
    root.querySelector('.sv-sqlbox').innerHTML = renderSQL(data, step.id);
    root.querySelector('.sv-legend').innerHTML = getLegendHTML(step.type);
    root.querySelector('.sv-stepinfo').innerHTML = renderStepInfo(step);
    const tarea = root.querySelector('.sv-tarea');
    tarea.classList.remove('sv-animate');
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add('sv-animate');
    root.querySelector('.sv-rowcount').textContent = step.cnt || '';
    root.querySelector('.sv-ctrls').innerHTML = renderControls(data.steps.length);
    root.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = window.innerWidth > 640);
  }

  root.__viz = {
    next:  () => { if (currentStepIndex < data.steps.length - 1) { currentStepIndex++; renderAll(); } },
    prev:  () => { if (currentStepIndex > 0)                     { currentStepIndex--; renderAll(); } },
    goTo:  i  => { if (i >= 0 && i < data.steps.length)          { currentStepIndex = i; renderAll(); } }
  };

  root.querySelector('.sv-ctrls').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    if (a === 'prev') root.__viz.prev();
    else if (a === 'next') root.__viz.next();
    else if (a === 'goto') root.__viz.goTo(Number(btn.dataset.idx));
  });

  renderAll();
}

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>Window関数は <code>関数() OVER(PARTITION BY ... ORDER BY ...)</code> という構文です。GROUP BYと違い、<em>元の行を削除せず</em>に計算結果を列として追加します。GROUP BY後はグループが1行になりますが、Window関数後は元の行数がそのまま残ります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ROW_NUMBER vs RANK vs DENSE_RANK：</strong>同順位が存在する場合の違いがあります。<code>ROW_NUMBER</code>は常に一意の連番（1,2,3）、<code>RANK</code>は同値に同番号で次がスキップ（1,1,3）、<code>DENSE_RANK</code>は同値に同番号でスキップなし（1,1,2）です。「最新1件を確実に1件取る」には <em>ROW_NUMBER</em> が最適です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>CTEで可読性を上げる：</strong>Window関数を含むサブクエリはCTEに切り出すと読みやすくなります。<code>WITH ranked AS (SELECT ..., ROW_NUMBER() OVER (...) AS rn FROM orders) SELECT * FROM ranked WHERE rn = 1</code> のようにCTEを使うと、チームのレビューでも意図が伝わりやすくなります。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>相関サブクエリでMAX()を使う：</strong>今回の「旧方式」がこれです。外側のクエリが100万行あれば内側のサブクエリも100万回実行されます。Window関数に書き換えることでテーブルへのアクセスを1回に削減できます。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>DISTINCT ON で ORDER BY の先頭列を揃えない：</strong><code>SELECT DISTINCT ON (user_id) ... ORDER BY created_at DESC</code> はエラーになります。PostgreSQLの仕様で、DISTINCT ON に指定した列がORDER BYの先頭に来る必要があります。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：「直近N件」パターンの設計</div>
<div class="column-body">
実務では「ユーザーごとの直近3件の注文を返す」など N件パターンが頻出です。ROW_NUMBERを使って <code>WHERE rn &lt;= 3</code> とするだけで対応できます。DISTINCT ONは1件限定のため、N件取得にはROW_NUMBERの方が汎用的です。また、ダッシュボードなどで「カテゴリごとの売れ筋TOP3商品」のような集計もWindow関数1本で解決できます。<strong>「グループ内の順位」が絡む要件はまずWindow関数を検討する</strong>習慣を持ちましょう。
</div>
</div>
`

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 003 応用編</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',
        (Array.isArray(q.viz)
          ? q.viz.map((_, vIdx) => `<div class="sql-viz-wrapper" id="viz-${i}-${vIdx}" tabindex="-1" style="margin-bottom:24px;"></div>`).join('')
          : `<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>`
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => {
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById(`viz-${i}-${vIdx}`), v));
      } else {
        initVisualizer(document.getElementById('viz-' + i), q.viz);
      }
    }
  });

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});

let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});
</script>
