  .tc-o  { color: var(--orange) !important; font-weight: 700; }

  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">BATCH</span></div>
      <div class="header-text-wrap">
        <div class="header-title">WebApp API・バッチ処理で学ぶ SQL 実務10選（UPSERT・差分更新・重複排除・一括DELETE・ジョブ管理編）</div>
        <div class="header-sub">ON CONFLICT / UPDATE FROM / CTE-UPDATE / INSERT...SELECT / ROW_NUMBER重複排除 / CASE WHEN一括更新 / LAG差分 / カーソルページネーション / 論理削除 / バッチジョブ監視</div>

</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  INSERT ... ON CONFLICT DO UPDATE (UPSERT)
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "UPSERT — INSERT ... ON CONFLICT DO UPDATE で新規・更新を1クエリに統合する",
  tags: [["r","INSERT"],["r","ON CONFLICT"],["o","UPSERT"],["p","APIバッチ同期"]],
  premise: `<p><strong>UPSERT（Upsert = Update + Insert）</strong> は「レコードが存在すれば UPDATE、なければ INSERT」を1クエリで行うパターンです。APIバッチで外部サービスからデータを同期する処理の最頻出パターンです。</p>
<pre><span class="kw">INSERT INTO</span> <span class="tbl">target_table</span> (col1, col2, ...)
<span class="kw">VALUES</span> (...)
<span class="kw">ON CONFLICT</span> (unique_col)          <span class="cmt">-- 競合判定に使うユニークキー列を指定</span>
<span class="kw">DO UPDATE SET</span>
  col2 <span class="op">=</span> <span class="fn">EXCLUDED</span>.col2;          <span class="cmt">-- EXCLUDED = INSERTしようとした値（競合した新データ）</span></pre>
<div class="callout"><strong>EXCLUDED とは？</strong><br>ON CONFLICT DO UPDATE 内で使える特別なテーブル参照です。「INSERTしようとしたが競合した行の値」を指します。<code>EXCLUDED.col</code> で新しい値を、<code>target_table.col</code> で既存の値を参照できます。</div>
<p><em>DO NOTHING</em> を使うと「競合したら何もしない（スキップ）」になります。べき等性（同じデータを何度実行しても結果が変わらない性質）を保証する際に便利です。</p>`,
  question: `<p>外部ECサービスから商品マスタを毎日バッチ同期します。<code>products</code> テーブルに <em>新商品はINSERT、既存商品は name/price/updated_at を UPDATE</em> してください。</p>
<p>同期データ（VALUES に直書きする）：(外部ID: EXT-001, name: ワイヤレスマウス改, price: 3200), (EXT-002, メカニカルキーボード, 8900), (EXT-003, USBハブ4ポート, 1980)</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ products（同期前）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>id</th><th>external_id</th><th>name</th><th>price</th><th>updated_at</th></tr>
        <tr><td>1</td><td>EXT-001</td><td>ワイヤレスマウス</td><td>2800</td><td>2024-01-10</td></tr>
        <tr><td>2</td><td>EXT-002</td><td>メカニカルキーボード</td><td>8900</td><td>2024-01-10</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>クエリ実行後の <code>products</code> テーブル：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>id</th><th>external_id</th><th>name</th><th class="tc-y">price</th><th class="tc-hi">updated_at</th></tr>
<tr class="tr-hi4"><td>1</td><td>EXT-001</td><td class="tc-y">ワイヤレスマウス改</td><td class="tc-y">3200</td><td class="tc-hi">2024-06-01</td></tr>
<tr><td>2</td><td>EXT-002</td><td>メカニカルキーボード</td><td>8900</td><td>2024-01-10</td></tr>
<tr class="tr-hi2"><td>3</td><td class="tc-g">EXT-003</td><td class="tc-g">USBハブ4ポート</td><td class="tc-g">1980</td><td class="tc-g">2024-06-01</td></tr>
</table></div>
<p style="margin-top:8px;font-size:12px;color:var(--dim)">※ EXT-001は名前・価格が更新、EXT-002は変化なし（同値のためUPDATEされるが結果は同じ）、EXT-003は新規INSERT</p>`,
  answer: `<pre><span class="kw">INSERT INTO</span> <span class="tbl">products</span> (external_id, name, price, updated_at)
<span class="kw">VALUES</span>
  <span class="cmt">-- 同期対象の3件を一括でINSERTしようとする</span>
  (<span class="str">'EXT-001'</span>, <span class="str">'ワイヤレスマウス改'</span>, <span class="num">3200</span>, <span class="str">'2024-06-01'</span>),
  (<span class="str">'EXT-002'</span>, <span class="str">'メカニカルキーボード'</span>, <span class="num">8900</span>, <span class="str">'2024-06-01'</span>),
  (<span class="str">'EXT-003'</span>, <span class="str">'USBハブ4ポート'</span>, <span class="num">1980</span>, <span class="str">'2024-06-01'</span>)

<span class="kw">ON CONFLICT</span> (external_id)         <span class="cmt">-- external_id が重複したら競合と判定</span>
<span class="kw">DO UPDATE SET</span>
  <span class="cmt">-- EXCLUDED = 今INSERTしようとした行（新しいデータ）</span>
  name       <span class="op">=</span> <span class="fn">EXCLUDED</span>.name,      <span class="cmt">-- 新しい名前で上書き</span>
  price      <span class="op">=</span> <span class="fn">EXCLUDED</span>.price,     <span class="cmt">-- 新しい価格で上書き</span>
  updated_at <span class="op">=</span> <span class="fn">EXCLUDED</span>.updated_at; <span class="cmt">-- 同期日時で上書き</span>

<span class="cmt">/*
  実行順序:
  1. VALUES の3行を INSERT しようとする
  2. ON CONFLICT (external_id) で各行のexternal_idをUNIQUE制約と照合
  3. 競合なし(EXT-003) → そのままINSERT（新規追加）
  4. 競合あり(EXT-001, EXT-002) → DO UPDATE SET で指定列のみ上書き
  ★ id（シリアルPK）は DO UPDATE SET に含めない → 自動採番を壊さない
  ★ external_id に UNIQUE制約 or UNIQUE INDEXが必要（事前に定義）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>INSERT前の状態</strong> — 既存2件のみ</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>external_id</th><th>name</th><th>price</th><th>状態</th></tr>
<tr><td>EXT-001</td><td>ワイヤレスマウス</td><td>2800</td><td class="tc-y">旧データ（更新対象）</td></tr>
<tr><td>EXT-002</td><td>メカニカルキーボード</td><td>8900</td><td class="tc-dim">変化なし</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">INSERT 3件を試みる → ON CONFLICT でルーティング</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>ON CONFLICT の振り分け</strong> — 3件それぞれの行き先</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>external_id</th><th>競合?</th><th>処理</th><th>結果</th></tr>
<tr class="tr-hi4"><td>EXT-001</td><td class="tc-r">競合あり</td><td>DO UPDATE SET</td><td class="tc-y">name・price・updated_at が新値で上書き</td></tr>
<tr><td>EXT-002</td><td class="tc-r">競合あり</td><td>DO UPDATE SET</td><td class="null">同値なので実質変化なし</td></tr>
<tr class="tr-hi2"><td>EXT-003</td><td class="tc-g">競合なし</td><td>INSERT</td><td class="tc-g">新行として追加（id=3が自動採番）</td></tr>
</table></div>
</div>

<div class="step-block">
<div class="step-label"><span class="step-num sn3">3</span><span class="step-desc"><strong>EXCLUDED の参照先イメージ</strong> — EXT-001 の場合</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>参照方法</th><th>name</th><th>price</th><th>意味</th></tr>
<tr class="tr-hi4"><td class="tc-o">EXCLUDED.name</td><td class="tc-o">ワイヤレスマウス改</td><td class="tc-o">3200</td><td class="tc-o">INSERTしようとした新データ</td></tr>
<tr><td class="tc-hi">products.name</td><td class="tc-hi">ワイヤレスマウス</td><td class="tc-hi">2800</td><td class="tc-hi">競合した既存データ</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>

  answer: `<pre><span class="kw">UPDATE</span> <span class="tbl">jobs</span>

  premise: `<p><strong>LAG(列, N)</strong> は「同一パーティション内で N行前の値」を返すウィンドウ関数です。「前回のバッチ実行時の値」と「今回の値」を比較して<em>変化のある行だけ抽出</em>する差分バッチに最適です。</p>
<pre><span class="fn">LAG</span>(column, <span class="num">1</span>) <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> group_key        <span class="cmt">-- グループ単位で前後を比較</span>
  <span class="kw">ORDER BY</span>     time_col         <span class="cmt">-- 時系列で並べた「1つ前の行」の値を返す</span>
)                                <span class="cmt">-- 最初の行はNULL（前の行がないため）</span></pre>
<div class="callout"><strong>LEAD との違い：</strong><code>LAG</code> は前の行、<code>LEAD</code> は次の行の値を返します。差分検知には前回値と現在値を比べるため LAG を使います。</div>
<p>差分バッチのパターン：<em>全件取得ではなく「変化した行だけ処理」</em>することで外部API呼び出し回数を削減し、コストとレート制限の問題を回避します。</p>`,

  answer: `<pre><span class="kw">WITH</span> daily_diff <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    product_id,
    snapshot_date,
    quantity,                              <span class="cmt">-- 当日の在庫数</span>

    <span class="cmt">-- LAG: 同じproduct_idの中で1行前（前日）のquantityを取得</span>
    <span class="fn">LAG</span>(quantity, <span class="num">1</span>) <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> product_id             <span class="cmt">-- 商品ごとに独立して前後を比較</span>
      <span class="kw">ORDER BY</span>     snapshot_date          <span class="cmt">-- 日付の古い順に並べ→1つ前=前日</span>
    ) <span class="kw">AS</span> prev_quantity                    <span class="cmt">-- 前日在庫（最初の日はNULL）</span>

  <span class="kw">FROM</span> <span class="tbl">stock_snapshots</span>
)

<span class="kw">SELECT</span>
  product_id,
  snapshot_date,
  quantity,
  prev_quantity,
  quantity <span class="op">-</span> prev_quantity <span class="kw">AS</span> diff        <span class="cmt">-- 変化量（増加:正, 減少:負）</span>
<span class="kw">FROM</span>  daily_diff
<span class="kw">WHERE</span> prev_quantity <span class="kw">IS NOT NULL</span>           <span class="cmt">-- 初日（前日なし）はNULLなので除外</span>
  <span class="kw">AND</span>  quantity <span class="op">&lt;&gt;</span> prev_quantity           <span class="cmt">-- 前日と異なる行のみ（変化なし除外）</span>
<span class="kw">ORDER BY</span> product_id, snapshot_date;

</div>

<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">

  premise: `<p>APIで大量データを返す際、<code>LIMIT/OFFSET</code> によるページネーションは「OFFSETが大きくなるほどスキャン行数が増え遅くなる」問題があります。<strong>カーソルベースページネーション</strong>は、最後に取得したレコードのID（カーソル）を次のリクエストで渡す手法で、常にインデックスを活用できます。</p>
<pre><span class="cmt">-- OFFSET方式（問題あり）: 100万件目のページはオフセット分全スキャン</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">ORDER BY</span> id <span class="kw">LIMIT</span> <span class="num">10</span> <span class="kw">OFFSET</span> <span class="num">990000</span>; <span class="cmt">-- 遅い</span>

<span class="cmt">-- カーソル方式（推奨）: 前回の最後のidより大きい行をLIMITで取るだけ</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">WHERE</span>  id <span class="op">&gt;</span> :last_seen_id           <span class="cmt">-- カーソル: 前回最後に取得したID</span>

<pre><span class="cmt">-- 前回バッチ実行時刻を :last_run_at として渡す</span>

{
  num: 10,
  title: "バッチジョブ監視 — 実行時間・ストール・連続失敗をSQLで一元監視する",
  tags: [["r","EXTRACT"],["r","COUNT"],["o","ジョブ監視"],["p","バッチ運用"]],
  premise: `<p>バッチジョブの実行履歴テーブルに対して、<strong>実行時間・ストール（停止）・連続失敗</strong>を1クエリで監視するパターンです。APIのヘルスチェックエンドポイントや監視ダッシュボードで使われます。</p>
<pre><span class="cmt">-- 実行時間の計算: タイムスタンプ差を秒数に変換</span>
<span class="fn">EXTRACT</span>(<span class="kw">EPOCH FROM</span> (ended_at <span class="op">-</span> started_at)) <span class="kw">AS</span> duration_sec
<span class="cmt">-- EXTRACT(EPOCH FROM interval): インターバルを秒数（実数）に変換する</span>

<span class="cmt">-- 連続失敗カウント: 直近N件中の失敗件数</span>
<span class="fn">COUNT</span>(<span class="op">*</span>) <span class="fn">FILTER</span> (<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'failed'</span>)  <span class="cmt">-- 対象行のみカウント</span></pre>
<div class="callout"><strong>EXTRACT(EPOCH FROM interval)：</strong>2つのタイムスタンプの差（INTERVAL型）を秒数の実数に変換します。<code>(ended_at - started_at)</code> の結果が INTERVAL 型になるため、これを秒数に変換することで実行時間が計算できます。</div>`,
  question: `<p><code>job_runs</code> テーブルを使って、各ジョブの以下のサマリを1クエリで出力してください。</p>

<tr><td>order_sync</td><td class="tc-g">1</td><td class="tc-r">3</td><td class="tc-hi">165.0</td><td class="tc-p">true ⚠️</td><td class="tc-y">⚠️ ALERT</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span> recent_runs <span class="kw">AS</span> (
  <span class="cmt">-- ① 各ジョブの直近5件を ROW_NUMBER で特定</span>
  <span class="kw">SELECT</span>
    <span class="op">*</span>,
    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> job_name           <span class="cmt">-- ジョブ名ごとに独立してランク付け</span>
      <span class="kw">ORDER BY</span>     started_at <span class="kw">DESC</span>   <span class="cmt">-- 新しい順に並べる（1が最新）</span>
    ) <span class="kw">AS</span> rn
  <span class="kw">FROM</span> <span class="tbl">job_runs</span>
)

<span class="kw">SELECT</span>
  job_name,

  <span class="cmt">-- ② 直近5件の成功カウント（FILTER で success のみ集計）</span>
  <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="fn">FILTER</span> (<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'success'</span>)         <span class="kw">AS</span> success_count,

  <span class="cmt">-- ③ 直近5件の失敗カウント</span>
  <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="fn">FILTER</span> (<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'failed'</span>)          <span class="kw">AS</span> fail_count,

  <span class="cmt">-- ④ 完了済み実行の平均実行時間（秒）: ended_atがNULLのrunningは除外される</span>
  <span class="fn">ROUND</span>(
    <span class="fn">AVG</span>(
      <span class="fn">EXTRACT</span>(<span class="kw">EPOCH FROM</span> (ended_at <span class="op">-</span> started_at))  <span class="cmt">-- タイムスタンプ差→秒数</span>
    )
  , <span class="num">1</span>) <span class="kw">AS</span> avg_sec,

  <span class="cmt">-- ⑤ ストール検知: running かつ開始から30分以上経過</span>
  <span class="fn">BOOL_OR</span>(
    status <span class="op">=</span> <span class="str">'running'</span>
    <span class="kw">AND</span> started_at <span class="op">&lt;</span> <span class="fn">NOW</span>() <span class="op">-</span> <span class="kw">INTERVAL</span> <span class="str">'30 minutes'</span>  <span class="cmt">-- 30分以上前に開始</span>
  ) <span class="kw">AS</span> is_stalled,                                       <span class="cmt">-- BOOL_OR: 1件でもTRUEならTRUE</span>

  <span class="cmt">-- ⑥ アラート判定: 3回以上失敗でアラート文字列を返す</span>
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="fn">FILTER</span> (<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'failed'</span>) <span class="op">&gt;=</span> <span class="num">3</span>
      <span class="kw">THEN</span> <span class="str">'⚠️ ALERT'</span>                                   <span class="cmt">-- 連続失敗アラート</span>
    <span class="kw">ELSE</span> <span class="str">'OK'</span>                                           <span class="cmt">-- 正常</span>
  <span class="kw">END</span> <span class="kw">AS</span> alert

<span class="kw">FROM</span>  recent_runs
<span class="kw">WHERE</span> rn <span class="op">&lt;=</span> <span class="num">5</span>                                          <span class="cmt">-- 直近5件のみ集計対象</span>
<span class="kw">GROUP BY</span> job_name                                        <span class="cmt">-- ジョブ名ごとに集計</span>
<span class="kw">ORDER BY</span> job_name;

<span class="cmt">/*
  実行順序:
  1. FROM job_runs                    → 全行読み込み
  2. ROW_NUMBER OVER (PARTITION BY job_name ORDER BY started_at DESC)
                                      → 各ジョブの直近順に番号を振る
  3. WHERE rn <= 5                    → 直近5件のみ残す
  4. GROUP BY job_name                → ジョブ名でグループ化
  5. COUNT FILTER / AVG / BOOL_OR     → 各KPIを1行に集約
  6. CASE WHEN fail_count >= 3        → アラート判定
  7. ORDER BY job_name                → 昇順で出力
  ★ 1クエリで成功率・実行時間・ストール・アラートを全て出せるため
     監視APIのエンドポイントが1回のDBクエリで完結する
*/</span></pre>`,
  explain: `

];

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','基礎文法・概念',q.premise)}
      ${acc('❓','pill-green','問題','テーブルデータ付き',q.question)}
      ${acc('📊','pill-orange','出力例','期待する結果',q.output)}
      ${acc('✅','pill-red','模範回答','SQL（コメント付き）',q.answer)}
      ${acc('🔍','pill-purple','解説','変化の可視化＋学習ポイント',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
