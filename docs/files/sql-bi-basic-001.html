  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {

  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }

  .q-header { margin-bottom: 18px; }

  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .viz-flow { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }
  .step-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green); }
  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }
  .step-desc { color: var(--dim); }
  .step-desc strong { color: var(--text); }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;

  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: 0.4; }
  .tc-hi { color: var(--accent) !important; font-weight: 700; }
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }

  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">BI</span></div>
      <div class="header-text-wrap">
        <div class="header-title">マネタイズ BI 集計で学ぶ SQL 王道パターン10選（WINDOW関数 / DATE集計 / UPSERT / COALESCE / 複合JOIN / UNION / LATERAL / JSON / STRING_AGG / 条件付き集計）</div>
        <div class="header-sub">ROW_NUMBER / DATE_TRUNC / ON CONFLICT / COALESCE / LEFT JOIN 複合 / UNION ALL / LAG / JSONB / STRING_AGG / FILTER</div>

    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>

</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  ROW_NUMBER / RANK — ランキングAPI
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "ROW_NUMBER / RANK — 売上ランキングAPIの基本ウィンドウ関数",
  tags: [["r","ROW_NUMBER"],["r","RANK"],["r","OVER"],["g","ランキングAPI"]],
  premise: `<p><strong>ウィンドウ関数</strong>は <code>OVER()</code> 句を使い、<em>グループ化せずに</em>各行に集計値や順位を付与します。<code>ROW_NUMBER()</code> は連番、<code>RANK()</code> は同順位があると番号が飛びます。</p>
<pre><span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> col1   <span class="cmt">-- col1 の値ごとにリセットして採番（省略 = 全体で採番）</span>
  <span class="kw">ORDER BY</span>     col2 <span class="kw">DESC</span> <span class="cmt">-- この順に 1, 2, 3 … と連番を付ける</span>
)

<span class="fn">RANK</span>() <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> col1
  <span class="kw">ORDER BY</span>     col2 <span class="kw">DESC</span>  <span class="cmt">-- 同値があれば同じ順位 → 次の番号はスキップ（1,1,3）</span>
)</pre>
<div class="callout"><strong>GROUP BY との違い：</strong>GROUP BY は複数行を<em>1行に集約</em>する。ウィンドウ関数は各行をそのまま残しつつ<em>新しい列を付与</em>する。元の明細行を残したまま順位や累計を見たいときはウィンドウ関数一択。</div>`,
  question: `<p><code>orders</code> テーブルから、<em>プラン別（plan）に売上金額（amount）の降順で順位</em>を付けてください。同額の場合は同順位（RANK）とし、<code>plan, user_id, amount, rank_in_plan</code> を返してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>plan</th><th>amount</th></tr>
        <tr><td>1</td><td>U01</td><td>premium</td><td>12000</td></tr>
        <tr><td>2</td><td>U02</td><td>premium</td><td>8000</td></tr>
        <tr><td>3</td><td>U03</td><td>standard</td><td>5000</td></tr>
        <tr><td>4</td><td>U04</td><td>premium</td><td>8000</td></tr>
        <tr><td>5</td><td>U05</td><td>standard</td><td>3000</td></tr>
        <tr><td>6</td><td>U06</td><td>standard</td><td>5000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>プラン別に RANK を付与（同額は同順位・番号スキップ）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>plan</th><th>user_id</th><th>amount</th><th class="tc-p">rank_in_plan</th></tr>
<tr class="tr-hi3"><td>premium</td><td>U01</td><td>12000</td><td class="tc-p">1</td></tr>
<tr class="tr-hi3"><td>premium</td><td>U02</td><td>8000</td><td class="tc-p">2</td></tr>
<tr class="tr-hi3"><td>premium</td><td>U04</td><td>8000</td><td class="tc-p">2</td></tr>
<tr class="tr-hi4"><td>standard</td><td>U03</td><td>5000</td><td class="tc-p">1</td></tr>
<tr class="tr-hi4"><td>standard</td><td>U06</td><td>5000</td><td class="tc-p">1</td></tr>
<tr class="tr-hi4"><td>standard</td><td>U05</td><td>3000</td><td class="tc-p">3</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px">※ premium の U02・U04 は同額 8000 → 同じ 2位。次の順位は 3 になる（2が飛ぶ）</p>`,
  answer: `<pre><span class="kw">SELECT</span>
  plan,                             <span class="cmt">-- プラン名（PARTITION BY のキー）</span>
  user_id,                          <span class="cmt">-- ユーザーID</span>
  amount,                           <span class="cmt">-- 売上金額</span>

  <span class="cmt">-- RANK: plan 内で amount 降順に順位付け（同額 = 同順位、次はスキップ）</span>
  <span class="fn">RANK</span>() <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> plan              <span class="cmt">-- plan の値が変わるたびに順位をリセット</span>
    <span class="kw">ORDER BY</span>     amount <span class="kw">DESC</span>      <span class="cmt">-- amount が大きい順に 1, 2, 3 … を付ける</span>
  ) <span class="kw">AS</span> rank_in_plan                <span class="cmt">-- ウィンドウ関数の結果に列名を付ける</span>

<span class="kw">FROM</span>   <span class="tbl">orders</span>                        <span class="cmt">-- 対象テーブル（行数は変わらない）</span>
<span class="kw">ORDER BY</span>
  plan,                             <span class="cmt">-- まずプランでグループ化して並べる（表示用）</span>
  rank_in_plan;                     <span class="cmt">-- 次に順位で昇順に並べる</span>

<span class="cmt">/*
  実行順序:
  1. FROM orders               → 全6行読み込み
  2. RANK() OVER (PARTITION BY plan ORDER BY amount DESC)
       → plan='premium'  グループ: 12000→1位, 8000→2位, 8000→2位
       → plan='standard' グループ: 5000→1位, 5000→1位, 3000→3位（2は飛ぶ）
  3. SELECT plan, user_id, amount, rank_in_plan → 列を選択（行は6行のまま）
  4. ORDER BY plan, rank_in_plan → 並び替え
  ★ GROUP BY とは異なり、行は集約されず全6行が残る
  ★ PARTITION BY を省略すると全行を1グループとして扱い全体順位になる
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>PARTITION BY plan で分割 → 各パーティション内で RANK を計算</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>plan</th><th>user_id</th><th>amount</th><th>パーティション内ORDER</th><th class="tc-p">RANK()</th></tr>
<tr class="tr-hi3"><td>premium</td><td>U01</td><td>12000</td><td>1番目</td><td class="tc-p">1</td></tr>
<tr class="tr-hi3"><td>premium</td><td>U02</td><td>8000</td><td>2番目（同額）</td><td class="tc-p">2</td></tr>
<tr class="tr-hi3"><td>premium</td><td>U04</td><td>8000</td><td>2番目（同額）</td><td class="tc-p">2 ← 同順位</td></tr>
<tr class="tr-hi4"><td>standard</td><td>U03</td><td>5000</td><td>1番目（同額）</td><td class="tc-p">1</td></tr>
<tr class="tr-hi4"><td>standard</td><td>U06</td><td>5000</td><td>1番目（同額）</td><td class="tc-p">1 ← 同順位</td></tr>
<tr class="tr-hi4"><td>standard</td><td>U05</td><td>3000</td><td>3番目</td><td class="tc-y">3 ← 2はスキップ</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">ROW_NUMBER との違いを比較</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>ROW_NUMBER / RANK / DENSE_RANK の挙動比較（同額行あり）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>amount</th><th class="tc-hi">ROW_NUMBER()</th><th class="tc-p">RANK()</th><th class="tc-g">DENSE_RANK()</th></tr>
<tr><td>12000</td><td class="tc-hi">1</td><td class="tc-p">1</td><td class="tc-g">1</td></tr>
<tr><td>8000</td><td class="tc-hi">2</td><td class="tc-p">2</td><td class="tc-g">2</td></tr>
<tr><td>8000</td><td class="tc-hi">3 ← 連番強制</td><td class="tc-p">2 ← 同順位</td><td class="tc-g">2 ← 同順位</td></tr>
<tr><td>5000</td><td class="tc-hi">4</td><td class="tc-y">4 ← スキップ</td><td class="tc-g">3 ← 連続</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ランキングAPIの実装：</strong><code>GET /rankings?plan=premium&limit=3</code> では、このウィンドウ関数結果をサブクエリで包み <code>WHERE rank_in_plan &lt;= 3</code> で上位3件を絞るのが定石。GROUP BY では元の行を残せないため、ウィンドウ関数が必須。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>3種の使い分け：</strong><em>ROW_NUMBER</em> はページネーションの一意連番に、<em>RANK</em> は「同率○位」を正確に表現したいスポーツ・売上ランキングに、<em>DENSE_RANK</em> は番号を飛ばしたくないカテゴリーランキングに使う。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>PARTITION BY の省略：</strong>省略すると全行が1パーティションになり「全体ランキング」になる。ECサイトで「全商品中の売上順位」と「カテゴリー内の順位」を同時に出したい場合は、PARTITION BY を変えた列を2つ並べるだけで実現できる。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WHERE でウィンドウ関数の結果を直接絞る：</strong><code>WHERE RANK() OVER (...) &lt;= 3</code> はエラー。ウィンドウ関数はSELECTの評価後に確定するため、サブクエリかCTEで包んでから外側の WHERE で絞ること。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY の指定漏れ：</strong><code>OVER (PARTITION BY plan)</code> のように ORDER BY を省略すると、順位の根拠がなく結果が不定になる。RANK・ROW_NUMBER の OVER 内 ORDER BY は必須。</div></div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q3  LAG / LEAD — 前月比・前日比の成長率計算
══════════════════════════════════════════════════ */
{
  num: 3,
  title: "LAG / LEAD — 前月比・前日比の成長率をウィンドウ関数で計算",
  tags: [["r","LAG"],["r","LEAD"],["r","OVER"],["o","前月比"],["g","トレンド分析"]],
  premise: `<p><strong>LAG(col, n)</strong> は現在行から <em>n行前</em>の値、<strong>LEAD(col, n)</strong> は <em>n行後</em>の値を返します。前月比・前日比の計算など時系列分析に必須のウィンドウ関数です。</p>
<pre><span class="fn">LAG</span>(amount, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month)  <span class="cmt">-- 1行前（前月）の amount を取得</span>
<span class="fn">LEAD</span>(amount, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month) <span class="cmt">-- 1行後（翌月）の amount を取得</span>

<span class="cmt">-- 第3引数でデフォルト値を指定（前行がない場合に NULL の代わりに返す）</span>
<span class="fn">LAG</span>(amount, <span class="num">1</span>, <span class="num">0</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month) <span class="cmt">-- 前行がなければ 0 を返す</span></pre>
<div class="callout"><strong>成長率の計算式：</strong><code>(今月 - 前月) / 前月 * 100</code> で月次成長率（%）を算出。前月が 0 のときゼロ除算になるため <code>NULLIF(前月値, 0)</code> で NULL に変換して <code>/ NULLIF(...)</code> とするのが定石。</div>`,
  question: `<p>月次売上サマリー（<code>monthly_revenue</code>）テーブルから、各月の <em>前月売上（prev_revenue）</em>と<em>前月比成長率（growth_pct）</em>を小数点1桁で計算してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ monthly_revenue</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>month</th><th>revenue</th></tr>
        <tr><td>2024-01-01</td><td>100000</td></tr>
        <tr><td>2024-02-01</td><td>120000</td></tr>
        <tr><td>2024-03-01</td><td>108000</td></tr>
        <tr><td>2024-04-01</td><td>135000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>各月の前月比（1月は前月なし = NULL）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th>revenue</th><th class="tc-o">prev_revenue</th><th class="tc-p">growth_pct</th></tr>
<tr><td>2024-01-01</td><td>100000</td><td class="null">NULL</td><td class="null">NULL</td></tr>
<tr class="tr-hi2"><td>2024-02-01</td><td>120000</td><td class="tc-o">100000</td><td class="tc-g">+20.0 %</td></tr>
<tr class="tr-hi"><td>2024-03-01</td><td>108000</td><td class="tc-o">120000</td><td class="tc-r">-10.0 %</td></tr>
<tr class="tr-hi2"><td>2024-04-01</td><td>135000</td><td class="tc-o">108000</td><td class="tc-g">+25.0 %</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  month,                            <span class="cmt">-- 集計月</span>
  revenue,                          <span class="cmt">-- 今月の売上</span>

  <span class="cmt">-- LAG: ORDER BY month の順で 1行前（前月）の revenue を取得</span>
  <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (
    <span class="kw">ORDER BY</span> month               <span class="cmt">-- month の昇順で「前の行」を定義</span>
  ) <span class="kw">AS</span> prev_revenue,              <span class="cmt">-- 前月売上（先頭行は前行なし → NULL）</span>

  <span class="cmt">-- 前月比成長率 (%) = (今月 - 前月) / 前月 * 100</span>
  <span class="fn">ROUND</span>(
    (revenue <span class="op">-</span> <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month))  <span class="cmt">-- 差分（増減額）</span>
    <span class="op">/</span> <span class="fn">NULLIF</span>(                                         <span class="cmt">-- NULLIF: 前月が0ならNULLにしてゼロ除算防止</span>
        <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month),        <span class="cmt">-- 前月売上（分母）</span>
        <span class="num">0</span>                                              <span class="cmt">-- 0 のとき NULL を返す</span>
      )
    <span class="op">*</span> <span class="num">100.0</span>,                                          <span class="cmt">-- 100.0: 整数除算を回避（100 だと切り捨て）</span>
    <span class="num">1</span>                                                   <span class="cmt">-- ROUND の第2引数: 小数点以下1桁に丸める</span>
  ) <span class="kw">AS</span> growth_pct                    <span class="cmt">-- 成長率（%）</span>

<span class="kw">FROM</span>   <span class="tbl">monthly_revenue</span>               <span class="cmt">-- 対象テーブル</span>
<span class="kw">ORDER BY</span> month;                       <span class="cmt">-- 月昇順で出力</span>

<span class="cmt">/*
  実行順序:
  1. FROM monthly_revenue       → 4行読み込み
  2. LAG(revenue, 1) OVER (ORDER BY month)
       → month昇順で1行前のrevenueを取得
          1月: NULL（前行なし）, 2月: 100000, 3月: 120000, 4月: 108000
  3. (revenue - prev) / NULLIF(prev, 0) * 100.0
       → 1月: NULL, 2月: (120000-100000)/100000*100=20.0
          3月: (108000-120000)/120000*100=-10.0, 4月: (135000-108000)/108000*100=25.0
  4. ROUND(..., 1)              → 小数点1桁に丸める
  5. SELECT / ORDER BY          → 列選択・並び替え
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>LAG(revenue,1) OVER (ORDER BY month) — 各行に前月値を付与</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th>revenue（今月）</th><th class="tc-o">LAG → prev_revenue</th><th>差分</th><th class="tc-p">growth_pct</th></tr>
<tr><td>2024-01-01</td><td>100000</td><td class="null">NULL（前行なし）</td><td class="null">—</td><td class="null">NULL</td></tr>
<tr class="tr-hi2"><td>2024-02-01</td><td>120000</td><td class="tc-o">100000</td><td class="tc-g">+20000</td><td class="tc-g">+20.0</td></tr>
<tr class="tr-hi"><td>2024-03-01</td><td>108000</td><td class="tc-o">120000</td><td class="tc-r">-12000</td><td class="tc-r">-10.0</td></tr>
<tr class="tr-hi2"><td>2024-04-01</td><td>135000</td><td class="tc-o">108000</td><td class="tc-g">+27000</td><td class="tc-g">+25.0</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">NULLIF で先頭行のゼロ除算を防ぎ、ROUND で1桁に丸める</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>NULLIF の役割 — ゼロ除算防止</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>状況</th><th>NULLIF(prev, 0)</th><th>/ NULLIF(...)</th><th>結果</th></tr>
<tr class="tr-hi2"><td>前月あり (100000)</td><td class="tc-g">100000（そのまま）</td><td>÷ 100000</td><td class="tc-g">正常計算</td></tr>

</table></div>
</div>

<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>ON 句と WHERE 句のフィルタの違い：</strong>LEFT JOIN の右テーブルへの絞り込み条件は ON に書く。WHERE に書くと NULL 行（=注文なし）が除外されてしまい INNER JOIN と同じ動作になる。「LEFT JOIN なのに結果が少ない」バグの最多原因。</div></div>

  premise: `<p><strong>ON CONFLICT</strong>（PostgreSQL）は INSERT 時に一意制約違反が発生した場合の動作を指定します。<strong>DO UPDATE</strong> でUPDATE（UPSERT）、<strong>DO NOTHING</strong> でスキップができます。バッチで集計結果を冪等に書き込む際の必須パターンです。</p>
<pre><span class="kw">INSERT INTO</span> <span class="tbl">table_name</span> (col1, col2)
<span class="kw">VALUES</span> (<span class="str">'val1'</span>, <span class="num">100</span>)
<span class="kw">ON CONFLICT</span> (col1)               <span class="cmt">-- col1 の一意制約違反が起きたとき</span>
<span class="kw">DO UPDATE SET</span>
  col2 <span class="op">=</span> <span class="kw">EXCLUDED</span>.col2;          <span class="cmt">-- EXCLUDED: INSERTしようとした値（衝突した新しい値）</span></pre>
<div class="callout ok"><strong>EXCLUDED とは：</strong>ON CONFLICT 句の中で、INSERT しようとした値（衝突した行の値）を参照するキーワード。<code>EXCLUDED.col2</code> は「今回 INSERT しようとした col2 の値」を意味する。これで「衝突したら新しい値で上書き」が実現できる。</div>`,
  question: `<p>日次KPIサマリーテーブル（<code>daily_kpi</code>）に、<em>バッチを何度実行しても同じ結果になるよう（冪等）</em>、<code>report_date + metric_name</code> の組み合わせが重複した場合は <em>value を新しい値で上書き</em>し、<em>updated_at を現在時刻に更新</em>する INSERT を書いてください。</p>

  <div class="data-label">使用テーブル</div>

        <tr><td>id</td><td>BIGSERIAL</td><td>主キー</td></tr>
        <tr><td>report_date</td><td>DATE</td><td>UNIQUE(report_date, metric_name)</td></tr>
        <tr><td>metric_name</td><td>TEXT</td><td>同上</td></tr>
        <tr><td>value</td><td>NUMERIC</td><td>—</td></tr>

  output: `<p>2024-06-01 / revenue を再集計で 55000 に更新。new_metric を新規挿入：</p>

<tr class="tr-hi4"><td>1</td><td>2024-06-01</td><td>revenue</td><td class="tc-y">55000 ← 上書き</td><td class="tc-hi">NOW()</td></tr>

</table></div>`,
  answer: `<pre><span class="kw">INSERT INTO</span> <span class="tbl">daily_kpi</span> (              <span class="cmt">-- 挿入先テーブル（id は自動採番のため省略）</span>
  report_date,                      <span class="cmt">-- 集計対象日</span>
  metric_name,                      <span class="cmt">-- KPI名</span>

)
<span class="kw">VALUES</span>

  (<span class="str">'2024-06-01'</span>, <span class="str">'new_metric'</span>, <span class="num">9999</span>,  <span class="fn">NOW</span>())  <span class="cmt">-- 新規: 通常INSERT</span>

<span class="cmt">-- UNIQUE制約 (report_date, metric_name) が衝突した場合の処理を指定</span>
<span class="kw">ON CONFLICT</span> (report_date, metric_name)       <span class="cmt">-- どのUNIQUE制約が対象か</span>
<span class="kw">DO UPDATE SET</span>
  <span class="cmt">-- EXCLUDED: 今回INSERTしようとした行の値（新しい値）を参照するキーワード</span>
  value      <span class="op">=</span> <span class="kw">EXCLUDED</span>.value,            <span class="cmt">-- 衝突した場合は新しい value で上書き</span>
  updated_at <span class="op">=</span> <span class="kw">EXCLUDED</span>.updated_at;       <span class="cmt">-- 更新日時を現在時刻に更新</span>

<span class="cmt">/*
  実行順序:
  1. VALUES 1行目: ('2024-06-01','revenue',55000,NOW())
       → UNIQUE(report_date,metric_name)='2024-06-01/revenue' が既存と衝突
       → ON CONFLICT DO UPDATE SET value=55000, updated_at=NOW()
  2. VALUES 2行目: ('2024-06-01','new_metric',9999,NOW())
       → 衝突なし → 通常の INSERT（id=3 が自動採番される）
  ★ ON CONFLICT: 衝突がなければ通常INSERT, 衝突があればDO UPDATEが実行される
  ★ EXCLUDED: INSERTしようとした新しい値を参照する特殊テーブル名
  ★ DO NOTHING にすると衝突時はスキップ（更新しない）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>ON CONFLICT の動作フロー — 衝突ありとなしで処理が分岐</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>INSERT しようとした値</th><th>UNIQUE 衝突?</th><th>実行される処理</th><th class="tc-hi">結果</th></tr>
<tr class="tr-hi4"><td>2024-06-01 / revenue / 55000</td><td class="tc-r">✓ 衝突（id=1 が既存）</td><td>DO UPDATE SET value=55000</td><td class="tc-hi">value 更新</td></tr>
<tr class="tr-hi2"><td>2024-06-01 / new_metric / 9999</td><td class="tc-g">✗ 衝突なし</td><td>通常 INSERT</td><td class="tc-hi">新規行 追加</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">EXCLUDED の意味 — 「衝突した INSERT 側の値」を参照する</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>EXCLUDED vs テーブル名 — 新旧の値を使い分ける</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>参照</th><th>値の意味</th><th>よくある使い方</th></tr>
<tr class="tr-hi4"><td class="tc-y">EXCLUDED.value</td><td class="tc-y">今回INSERTしようとした値（新しい値）</td><td>新しい値で上書き</td></tr>
<tr class="tr-hi"><td class="tc-hi">daily_kpi.value</td><td>既存テーブルの値（古い値）</td><td>古い値を保持したい場合</td></tr>
<tr class="tr-hi2"><td class="tc-g">daily_kpi.value + EXCLUDED.value</td><td>加算（累積）</td><td>イベントカウンタの加算</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>バッチの冪等性を SQL レベルで保証：</strong>日次バッチが2重実行されても ON CONFLICT により同じ結果になる。「バッチを再実行して大丈夫か？」という疑問が出たらこのパターンを使う。CRON + UPSERT の組み合わせが最も安全なバッチ設計。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>カウンター加算パターン：</strong><code>value = daily_kpi.value + EXCLUDED.value</code> とすることで、ページビュー数などのカウンターを「既存値に加算」できる。INSERTとUPDATE COUNT を別クエリで書く必要がなくなる。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>DO NOTHING との使い分け：</strong>「既にデータがあれば何もしない（初回INSERTのみ）」なら <code>DO NOTHING</code>。「常に最新値で上書き」なら <code>DO UPDATE SET</code>。バッチの再集計結果を書き込む場合は DO UPDATE が適切。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ON CONFLICT の対象列が UNIQUE でない：</strong>ON CONFLICT の対象列には UNIQUE 制約または PRIMARY KEY が必要。UNIQUE 制約のない列を指定するとエラーになる。UPSERT を使いたい列には必ず UNIQUE 制約を付ける。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT → INSERT の2段階で冪等性を担保しようとする：</strong>アプリ層で「SELECT で存在確認 → なければ INSERT, あれば UPDATE」の2段階実装は競合状態（レースコンディション）が発生するリスクがある。ON CONFLICT なら1クエリでアトミックに処理されるため安全。</div></div>
</div>
`
},

  premise: `<p><strong>STRING_AGG(col, sep)</strong> は文字列を区切り文字で連結して1つの文字列に集約します。<strong>FILTER (WHERE 条件)</strong> は集計関数に条件を追加し、条件を満たす行だけを集計します。</p>
<pre><span class="fn">STRING_AGG</span>(tag_name, <span class="str">', '</span> <span class="kw">ORDER BY</span> tag_name) <span class="cmt">-- 'A, B, C' のように結合（ORDER BY で順序保証）</span>

<span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">FILTER</span> (<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'completed'</span>)  <span class="cmt">-- completed の行のみカウント</span>

  answer: `<pre><span class="kw">SELECT</span>
  p.product_id,                     <span class="cmt">-- 商品ID</span>
  p.name,                           <span class="cmt">-- 商品名</span>

  <span class="cmt">-- STRING_AGG: tag_name をアルファベット順で ',' + スペース区切りに連結</span>
  <span class="fn">STRING_AGG</span>(
    t.tag_name,                     <span class="cmt">-- 連結する列</span>
    <span class="str">', '</span>                            <span class="cmt">-- 区切り文字（コンマ + スペース）</span>
    <span class="kw">ORDER BY</span> t.tag_name             <span class="cmt">-- 連結順を安定させるためソートを指定</span>

  <span class="cmt">-- FILTER: published のレビューだけをカウント（pending はスキップ）</span>

  <span class="fn">ROUND</span>(

  <span class="kw">ON</span> p.product_id <span class="op">=</span> r.product_id   <span class="cmt">-- 商品IDで結合</span>

<span class="kw">GROUP BY</span> p.product_id, p.name;      <span class="cmt">-- 商品ごとに集約（STRINGAGGもFILTERも各グループで計算）</span>

<span class="cmt">/*

  1. FROM products p               → 2行（P01, P02）
  2. LEFT JOIN product_tags t      → タグを結合（P01:2行, P02:3行 → 計5行）

  premise: `<p><strong>WITH CTE（Common Table Expression）</strong> は一時的な名前付き結果セットを定義し、後続のSELECTから名前で参照できます。複雑な集計を「ステップごとに分解」して可読性を上げる必須テクニックです。</p>
<pre><span class="kw">WITH</span>
  cte1 <span class="kw">AS</span> (                         <span class="cmt">-- 最初のCTE: 1ステップ目の結果を定義</span>
    <span class="kw">SELECT</span> col1, <span class="fn">SUM</span>(col2) <span class="kw">AS</span> total
    <span class="kw">FROM</span> <span class="tbl">table_a</span>
    <span class="kw">GROUP BY</span> col1
  ),
  cte2 <span class="kw">AS</span> (                         <span class="cmt">-- 2番目のCTE: cte1 を参照できる</span>
    <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> cte1
    <span class="kw">WHERE</span> total <span class="op">&gt;</span> <span class="num">1000</span>
  )
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> cte2;               <span class="cmt">-- 最終クエリ: CTE を参照</span></pre>
<div class="callout ok"><strong>CTE の利点：</strong>①長いサブクエリをネストせず上から読める ②同じ中間結果を複数箇所で再利用できる ③デバッグ時にCTEごとに単独実行して確認できる。BIクエリでは「生データ収集 → フィルタ → 集計 → ランキング」をCTEで段階的に書くのが実務標準。</div>`,

  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 月次売上集計: DATE_TRUNC で月ごとに GROUP BY（Q2で学んだパターン）</span>
monthly_revenue <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, paid_at) <span class="kw">AS</span> month,  <span class="cmt">-- 月の先頭日に切り捨て</span>

  <span class="kw">GROUP BY</span>

),

<span class="cmt">-- ② 前月比計算: LAG で前月売上を取得し growth_pct を算出（Q3で学んだパターン）</span>
with_growth <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    month,                                    <span class="cmt">-- 月（CTEから引き継ぐ）</span>
    revenue,                                  <span class="cmt">-- 今月の売上</span>

    <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (
      <span class="kw">ORDER BY</span> month                        <span class="cmt">-- 月昇順で前月値を取得</span>
    ) <span class="kw">AS</span> prev_revenue,                      <span class="cmt">-- 前月売上（先頭月はNULL）</span>

    <span class="fn">ROUND</span>(
      (revenue <span class="op">-</span> <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month))
      <span class="op">/</span> <span class="fn">NULLIF</span>(<span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month), <span class="num">0</span>)
      <span class="op">*</span> <span class="num">100.0</span>,                              <span class="cmt">-- 100.0 で浮動小数点演算に</span>
      <span class="num">1</span>                                       <span class="cmt">-- 小数点以下1桁に丸める</span>
    ) <span class="kw">AS</span> growth_pct                          <span class="cmt">-- 前月比成長率（%）</span>

  <span class="kw">FROM</span> monthly_revenue                        <span class="cmt">-- ① の CTE を参照（テーブルのように使える）</span>
),

<span class="cmt">-- ③ 成長タイプ分類: CASE WHEN で growth_pct の値に応じてラベルを付与</span>
with_type <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    month,
    revenue,
    prev_revenue,

    <span class="cmt">-- CASE WHEN: growth_pct の値によって成長タイプを分類</span>
    <span class="kw">CASE</span>

      <span class="kw">WHEN</span> growth_pct <span class="op">&gt;=</span> <span class="num">10</span>        <span class="cmt">-- 10%以上の成長</span>
        <span class="kw">THEN</span> <span class="str">'急成長'</span>

        <span class="kw">THEN</span> <span class="str">'微増'</span>
      <span class="kw">ELSE</span>                           <span class="cmt">-- 0%未満（前月比マイナス）</span>
        <span class="str">'減少'</span>
    <span class="kw">END</span> <span class="kw">AS</span> growth_type              <span class="cmt">-- タイプラベル</span>

  <span class="kw">FROM</span> with_growth                  <span class="cmt">-- ② の CTE を参照</span>
)

<span class="cmt">-- 最終SELECT: ③ の CTE を全列取得・月昇順で返す</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> with_type             <span class="cmt">-- with_type の全列を返す</span>
<span class="kw">ORDER BY</span> month;                     <span class="cmt">-- 月昇順で出力</span>

<span class="cmt">/*

*/</span></pre>`,

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
