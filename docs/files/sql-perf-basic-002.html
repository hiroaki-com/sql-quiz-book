<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLパフォーマンス最適化10選（基礎編）— インデックス/SELECT*/JOIN/NULL/LIKE/GROUP BY/サブクエリ/ORDER BY/EXISTS/複合インデックス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ── */
:root {
  --bg:     #0a0e13;
  --bg2:    #131920;
  --bg3:    #1c2330;
  --bg4:    #263040;
  --border: #2a3545;
  --text:   #cdd9e5;
  --dim:    #768390;
  --accent: #4dabf7;
  --green:  #3fb950;
  --orange: #f0883e;
  --red:    #f85149;
  --purple: #bc8cff;
  --yellow: #e3b341;
  --kw:     #ff7b72;
  --fn:     #79c0ff;
  --str:    #a5d6ff;
  --num:    #f0c674;
  --cmt:    #6a737d;
  --tbl:    #ffa657;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}

/* ── Header ── */
.site-header{background:var(--bg2)}
.header-inner{padding:16px}
.header-flex{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.header-badge{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1;white-space:nowrap}
.header-text-wrap{flex:1}
.header-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.header-tags{display:flex;gap:6px;flex-wrap:wrap}
.htag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}

/* ── Sticky tabs ── */
.sticky-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.tab-num{margin-right:5px}
.prog-wrap{height:2px;background:var(--bg4)}
.prog-fill{height:100%;background:var(--accent);transition:width .2s}

/* ── Main / Panel ── */
main{max-width:960px;margin:0 auto;padding:22px 14px 90px}
.panel{display:none}
.panel.active{display:block}

/* ── Question header ── */
.q-header{margin-bottom:18px}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;font-weight:600}
.tag-r{background:#1a2c44;color:var(--accent);border:1px solid #1e4070}
.tag-g{background:#162416;color:var(--green);border:1px solid #1e3a1e}
.tag-o{background:#2e1e0a;color:var(--orange);border:1px solid #4a2e0a}
.tag-p{background:#1e1433;color:var(--purple);border:1px solid #3a2060}

/* ── Accordion ── */
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.acc-head:hover{background:var(--bg3)}
.acc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-title{font-size:13px;font-weight:600;flex:1}
.acc-pill{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;flex-shrink:0}
.pill-blue  {background:#112233;color:var(--accent);border:1px solid #1a3a55}
.pill-green {background:#0e1f0e;color:var(--green);border:1px solid #1a3a1a}
.pill-orange{background:#1e1205;color:var(--orange);border:1px solid #3a2010}
.pill-red   {background:#1e0a0a;color:var(--red);border:1px solid #3a1010}
.pill-purple{background:#160f2a;color:var(--purple);border:1px solid #3a1a60}
.acc-chevron{color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .2s}
.acc.closed .acc-chevron{transform:rotate(-90deg)}
.acc-body{padding:14px 16px;border-top:1px solid var(--border)}
.acc.closed .acc-body{display:none}

/* ── Typography ── */
p{font-size:13.5px;margin-bottom:10px}
p:last-child{margin-bottom:0}
strong{color:var(--accent);font-weight:600}
em{color:var(--yellow);font-style:normal;font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--tbl)}

/* ── Code blocks ── */
pre{background:#060a0f;border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;margin:8px 0}
.kw {color:var(--kw);font-weight:700}
.fn {color:var(--fn)}
.tbl{color:var(--tbl)}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.op {color:var(--orange)}

/* ── Callouts ── */
.callout{border-left:3px solid var(--accent);background:#0e1e33;padding:9px 13px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px}
.callout.warn  {border-left-color:var(--yellow);background:#1e1a08}
.callout.danger{border-left-color:var(--red);background:#1e0e0e}
.callout.ok    {border-left-color:var(--green);background:#0a1e0a}

/* ── Data section ── */
.data-section{margin:14px 0}
.data-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tbl);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.data-label::before{content:'';display:block;width:3px;height:12px;background:var(--tbl);border-radius:2px}
.data-tables{display:flex;gap:14px;flex-wrap:wrap}
.data-tbl-wrap{flex:1;min-width:220px}
.data-tbl-name{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:4px}

/* ── Visual tables ── */
.tbl-wrap{overflow-x:auto;margin-bottom:4px}
table.vtbl{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#060a0f;border:1px solid var(--border);border-radius:4px;min-width:100%}
table.vtbl th{background:var(--bg3);color:var(--tbl);padding:5px 11px;border:1px solid var(--border);text-align:left;white-space:nowrap;font-weight:600}
table.vtbl td{padding:4px 11px;border:1px solid #1c2635;white-space:nowrap}
table.vtbl tr:nth-child(even) td{background:#080c12}
.tr-hi  td{background:#0e1e33!important}
.tr-hi2 td{background:#0e1e0e!important}
.tr-hi3 td{background:#1e1433!important}
.tr-hi4 td{background:#1e1a0a!important}
.tr-dim td{opacity:.4}
.tc-hi{color:var(--accent)!important;font-weight:700}
.tc-g {color:var(--green)!important;font-weight:700}
.tc-p {color:var(--purple)!important;font-weight:700}
.tc-y {color:var(--yellow)!important;font-weight:700}
.tc-o {color:var(--orange)!important;font-weight:700}
.tc-r {color:var(--red)!important;font-weight:700}
.null {color:var(--dim)!important;font-style:italic}

/* ── Flow viz ── */
.viz-flow{margin:6px 0 14px}
.step-block{margin-bottom:8px}
.step-label{display:flex;align-items:center;gap:8px;font-size:11px;font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sn1{background:#1a2744;color:var(--accent)}
.sn2{background:#1a2e1a;color:var(--green)}
.sn3{background:#2e1a2e;color:var(--purple)}
.sn4{background:#2e1a0a;color:var(--orange)}
.step-desc{color:var(--dim)}
.step-desc strong{color:var(--text)}
.arrow{text-align:center;padding:4px 0;font-size:13px;font-family:'JetBrains Mono',monospace}
.arrow-text{color:var(--dim);font-size:11px}

/* ── Insight / Anti / Column boxes ── */
.insight-box{background:#0a1520;border:1px solid #1a3a55;border-radius:8px;padding:14px 16px;margin-top:14px}
.insight-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.insight-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.insight-body{font-size:12.5px;color:var(--text);line-height:1.6}
.insight-body strong{color:var(--accent)}
.insight-body em{color:var(--yellow)}
.insight-body code{font-size:11px}

.anti-box{background:#160a0a;border:1px solid #3a1515;border-radius:8px;padding:14px 16px;margin-top:10px}
.anti-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:1px;margin-bottom:10px}
.anti-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.anti-body{font-size:12.5px;color:var(--text);line-height:1.6}
.anti-body strong{color:var(--red)}
.anti-body code{font-size:11px}

.column-box{background:#0d1520;border:1px solid #1c3550;border-left:3px solid var(--fn);border-radius:8px;padding:14px 16px;margin-top:10px}
.column-title{font-size:11px;font-weight:700;color:var(--fn);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.column-body{font-size:12.5px;color:var(--text);line-height:1.6}
.column-body strong{color:var(--fn)}

/* ── Nav ── */
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:#0e1e33}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}

/* ── Responsive ── */
@media(max-width:520px){
  .header-inner{padding:12px 10px 6px}
  .q-title{font-size:15px}
  pre{font-size:11px;padding:10px}
  table.vtbl{font-size:10.5px}
  .acc-title{font-size:12px}
  .header-badge{font-size:14px;padding:5px 8px}
  main{padding:16px 10px 60px}
  .data-tables{flex-direction:column}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">BASIC</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 基礎10選（インデックス基礎／SELECT*問題／JOIN選択／NULL基礎／LIKE検索／GROUP BY集計／サブクエリ→JOIN変換／ORDER BYとインデックス／EXISTSとIN／複合インデックス 編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎〜中級</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">実務頻出</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">002</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  インデックスとSARGable条件 — 列に関数を使うとインデックスが効かない
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "インデックスとSARGable条件 — 列に関数を適用するとインデックスが無効になる",
  tags: [["r","インデックス"],["r","SARGable"],["o","Seq Scan"],["g","Index Scan"]],
  premise: `<p><strong>インデックス（Index）</strong>はテーブルの特定列を事前にソートして保持する「索引」です。WHERE句の条件がインデックスを使えるかどうかは<em>条件の書き方</em>によって決まります。</p>
<p><strong>SARGable（Search ARGument ABLE）</strong>とは「インデックスが使える条件の書き方」を意味します。列に関数を適用したり、列を演算式の右辺に置いたりするとインデックスが使えなくなります。</p>
<pre><span class="cmt">-- インデックスが使えない（Non-SARGable）パターン例</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> <span class="fn">YEAR</span>(created_at) <span class="op">=</span> <span class="num">2024</span>;   <span class="cmt">-- ❌ 列に関数適用 → Seq Scan</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> amount <span class="op">*</span> <span class="num">1.1</span> <span class="op">&gt;</span> <span class="num">10000</span>;     <span class="cmt">-- ❌ 列を演算 → Seq Scan</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span>  <span class="kw">WHERE</span> <span class="fn">LOWER</span>(email) <span class="op">=</span> <span class="str">'a@b.com'</span>; <span class="cmt">-- ❌ 列に関数適用 → Seq Scan</span></pre>
<div class="callout warn"><strong>なぜ関数を使うとインデックスが効かないのか：</strong>インデックスは「元の列の値」でソートされています。<code>YEAR(created_at)</code> のように変換した値はインデックスに存在しないため、DBは全行を読んでから関数を適用する「フルスキャン」になります。</div>`,
  question: `<p><code>orders</code>テーブルの <code>created_at</code> には既にインデックスが存在します。以下の3つのクエリは全件Seq Scanになっています。<em>インデックスが使えるSARGableな書き方に修正してください。</em></p>
<pre><span class="cmt">-- 問題1: 2024年の注文を取得したいが Seq Scan になっている</span>
<span class="kw">SELECT</span> order_id, amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  <span class="fn">DATE_PART</span>(<span class="str">'year'</span>, created_at) <span class="op">=</span> <span class="num">2024</span>;  <span class="cmt">-- ❌ 列に関数適用</span>

<span class="cmt">-- 問題2: 月初からのデータを取得したいが Seq Scan になっている</span>
<span class="kw">SELECT</span> order_id
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="op">=</span> <span class="str">'2024-06-01'</span>;  <span class="cmt">-- ❌ 列に関数適用</span>

<span class="cmt">-- 問題3: amountが10,000円超の注文（割引前）を取得したいが Seq Scan になっている</span>
<span class="kw">SELECT</span> order_id
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  amount <span class="op">*</span> <span class="num">0.9</span> <span class="op">&gt;</span> <span class="num">9000</span>;  <span class="cmt">-- ❌ 列を演算 → インデックス使用不可</span></pre>
<div class="data-section">
  <div class="data-label">ordersテーブル（インデックス付き）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>order_id(PK)</th><th>user_id</th><th>amount</th><th>created_at（INDEX済）</th></tr>
    <tr><td>1</td><td>U001</td><td>5000</td><td>2024-06-15 10:30</td></tr>
    <tr><td>2</td><td>U002</td><td>12000</td><td>2024-06-20 14:00</td></tr>
    <tr><td>3</td><td>U003</td><td>8000</td><td>2023-12-01 09:00</td></tr>
  </table></div>
</div>`,
  output: `<p>修正方針と比較：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>#</th><th class="tc-r">NG（Seq Scan）</th><th class="tc-g">OK（Index Scan）</th></tr>
<tr><td>1</td><td class="tc-r">DATE_PART('year', created_at) = 2024</td><td class="tc-g">created_at >= '2024-01-01' AND created_at &lt; '2025-01-01'</td></tr>
<tr><td>2</td><td class="tc-r">DATE_TRUNC('month', created_at) = '2024-06-01'</td><td class="tc-g">created_at >= '2024-06-01' AND created_at &lt; '2024-07-01'</td></tr>
<tr><td>3</td><td class="tc-r">amount * 0.9 > 9000</td><td class="tc-g">amount > 10000</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 問題1の修正: 関数をやめて「範囲指定」に変える</span>
<span class="kw">SELECT</span> order_id, amount         <span class="cmt">-- 【超基礎】取得したい列を列挙する</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>                   <span class="cmt">-- 【超基礎】対象テーブル</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;=</span> <span class="str">'2024-01-01'</span>  <span class="cmt">-- ✅ 列に何も適用しない → Index Scan が使える</span>
  <span class="kw">AND</span>  created_at <span class="op">&lt;</span>  <span class="str">'2025-01-01'</span>; <span class="cmt">-- ✅ 2024年末まで（= 2025-01-01 未満）を範囲指定</span>

<span class="cmt">-- 問題2の修正: DATE_TRUNCをやめて「範囲指定」に変える</span>
<span class="kw">SELECT</span> order_id
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;=</span> <span class="str">'2024-06-01'</span>  <span class="cmt">-- ✅ 2024年6月1日以降</span>
  <span class="kw">AND</span>  created_at <span class="op">&lt;</span>  <span class="str">'2024-07-01'</span>; <span class="cmt">-- ✅ 2024年7月1日未満（= 6月末まで）</span>

<span class="cmt">-- 問題3の修正: 列を動かさず、右辺の定数を計算する</span>
<span class="kw">SELECT</span> order_id
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  amount <span class="op">&gt;</span> <span class="num">10000</span>;            <span class="cmt">-- ✅ 「amount * 0.9 > 9000」は両辺を 0.9 で割ると amount > 10000 と等価</span>
<span class="cmt">-- ポイント: 列には何も適用しない。演算は「右辺の定数だけ」動かすこと。</span>

<span class="cmt">-- EXPLAIN で確認する方法（実際の実行計画を見る）</span>
<span class="kw">EXPLAIN ANALYZE</span>                   <span class="cmt">-- 【超基礎】クエリの実行計画と実際の時間を表示する</span>
<span class="kw">SELECT</span> order_id
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;=</span> <span class="str">'2024-01-01'</span>
  <span class="kw">AND</span>  created_at <span class="op">&lt;</span>  <span class="str">'2025-01-01'</span>;
<span class="cmt">-- 結果に「Index Scan using idx_orders_created_at」が出ればインデックス使用中</span>
<span class="cmt">-- 「Seq Scan」が出ていたらインデックスが使えていない証拠</span>

<span class="cmt">/*
  実行順序（問題1修正版）:
  1. FROM orders               → ordersテーブルを参照
  2. WHERE created_at の範囲   → created_at インデックスを使って対象行を絞り込む（Index Scan）
  3. SELECT order_id, amount   → 絞り込まれた行から列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>NG版：列に関数を適用すると全行スキャン（Seq Scan）になる</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理</th><th>内容</th><th>対象行数</th><th>コスト</th></tr>
<tr class="tr-hi"><td>全行読み込み（Seq Scan）</td><td>created_at の全行を読む</td><td class="tc-r">500万件すべて</td><td class="tc-r">高</td></tr>
<tr class="tr-hi"><td>DATE_PART 関数を各行に適用</td><td>1行ずつ年を計算してから比較</td><td class="tc-r">500万回の関数呼び出し</td><td class="tc-r">高</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">SARGableな書き方にすると、インデックスで一気にジャンプできる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>OK版：範囲指定でIndex Scanが使える</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理</th><th>内容</th><th>対象行数</th><th>コスト</th></tr>
<tr class="tr-hi2"><td>Index Scan（created_at）</td><td>インデックスで2024年の範囲に直接ジャンプ</td><td class="tc-g">2024年分だけ（例: 100万件）</td><td class="tc-g">低</td></tr>
<tr class="tr-hi2"><td>必要行のみ取得</td><td>インデックスが指す行だけ読む</td><td class="tc-g">100万件のみ</td><td class="tc-g">低</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>インデックスは「元の列値をそのままソートした索引」です。<code>DATE_PART('year', created_at)</code> のように変換した値はインデックスには存在しないため使えません。SARGableにするコツは「WHERE句の<em>左辺に列名だけ</em>を置き、右辺に定数を置く」ことです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>範囲指定の書き方：</strong>日付の年・月・日単位の絞り込みは <code>col >= '開始日' AND col &lt; '翌単位の日'</code> の形が基本です。「以上」は <code>>=</code>、「未満」は <code>&lt;</code> を使うと境界値ミスを防げます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>EXPLAIN ANALYZEで確認する習慣：</strong><code>EXPLAIN ANALYZE クエリ</code> で実行計画を確認することが、パフォーマンス改善の第一歩です。「Index Scan」が出ていれば高速、「Seq Scan」が出ていれば要改善のサインです。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>関数ベースの条件を慣習として書き続ける：</strong><code>DATE_FORMAT</code>・<code>SUBSTR</code>・<code>LOWER</code> などを WHERE 句の列に適用するパターンは、コードは読みやすく見えても必ずインデックスが効きません。書いた瞬間にSARGableかどうか確認する習慣をつけましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>インデックスがあれば必ず速いと思い込む：</strong>インデックスを作っても、クエリの書き方が Non-SARGable であれば全く使われません。「インデックス作成」と「SARGableな条件記述」はセットで考える必要があります。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：関数ベースインデックスという選択肢</div>
<div class="column-body">
どうしても <code>LOWER(email)</code> での検索が必要な場合は、PostgreSQLの<strong>関数ベースインデックス</strong>が使えます。<code>CREATE INDEX ON users (LOWER(email));</code> と作成すると、<code>WHERE LOWER(email) = 'a@b.com'</code> でインデックスが使えます。ただし、インデックスのメンテナンスコストが増えるため、「どうしても関数を使いたい場合の最終手段」として使いましょう。
</div>
</div>
`
},

  premise: `<p><strong>JOIN</strong>は2つ以上のテーブルを「共通の列（キー）」を使って横につなぐ操作です。JOINの種類によって「一致しない行をどう扱うか」が変わります。</p>
<pre><span class="cmt">-- INNER JOIN: 両テーブルに一致する行だけ返す（一致しない行は除外）</span>
<span class="kw">SELECT</span> u.name, o.amount
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">INNER JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id;  <span class="cmt">-- 注文のないユーザーは除外される</span>

<span class="cmt">-- LEFT JOIN: 左テーブルの全行 + 右テーブルに一致する行（一致しない場合はNULL）</span>
<span class="kw">SELECT</span> u.name, o.amount
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span> o <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id;   <span class="cmt">-- 注文のないユーザーもNULLで含まれる</span></pre>
<div class="callout danger"><strong>よくある0件バグ：</strong>「全ユーザーを表示したい」のにINNER JOINを使うと、注文・プロフィール等のデータがないユーザーが結果から消えます。「全件表示したい側」が LEFT JOIN の左（FROM句）に来るのが基本です。</div>`,

  answer: `<pre><span class="cmt">-- シナリオA（NG版: INNER JOIN → 注文のないユーザーが消える）</span>

<div class="viz-flow">

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>JOINの選択ルールは「一致しない行も結果に含みたいか」で決まります。「全員のリストに情報を付け足す」→ LEFT JOIN。「両方に存在するものだけでよい」→ INNER JOIN。このシンプルなルールを覚えてください。</div></div>

<div class="anti-box">

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>LEFT JOINの右テーブルにWHERE条件を付けるとINNER JOINになる：</strong><code>LEFT JOIN orders o ON ... WHERE o.status = 'pending'</code> は、o.statusがNULLのユーザー（注文なし）がWHEREで除外されます。「注文のないユーザーも含めたいが、あれば pending のもの」という場合は <code>ON ... AND o.status = 'pending'</code> とON句に条件を移してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>JOIN条件の列にインデックスがない：</strong>JOINのON句で指定する列（結合キー）にインデックスがないと、大きなテーブルのJOINが非常に遅くなります。外部キー（FK）列には必ずインデックスを作成するのが基本ルールです。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：JOINの種類まとめ</div>
<div class="column-body">
実務で使うJOINは主に3種類です。<strong>INNER JOIN：</strong>両テーブルに存在する行だけ（デフォルトのJOIN）。<strong>LEFT JOIN：</strong>左テーブルの全行 + 右の一致行（一致なしはNULL）。<strong>FULL OUTER JOIN：</strong>両テーブルのいずれかに存在する行（一致なしはNULL）。CROSS JOINはデカルト積（件数が膨大になる）でほぼ使いません。基本の2種類（INNER / LEFT）をしっかり使い分けられれば実務の9割はカバーできます。
</div>
</div>
`

<pre><span class="cmt">-- NULLとの比較は必ず UNKNOWN になる</span>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>NULLは「値が存在しない」特別な状態です。<code>NULL = NULL</code> は TRUE ではなく UNKNOWN です。NULLの判定は必ず <code>IS NULL</code> / <code>IS NOT NULL</code> を使います。これはSQLで最も多い初歩的なバグの一つです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COALESCEの書き方：</strong><code>COALESCE(expr1, expr2, expr3)</code> は左から評価して最初にNULLでない値を返します。<code>COALESCE(a, b, 0)</code> と書けば「aがNULLならb、bもNULLなら0」という連鎖が使えます。SUM/AVGはNULLを無視するため、「NULLを0として集計したい」場合は <code>SUM(COALESCE(col, 0))</code> と書きます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>NULLとインデックス：</strong>PostgreSQLのBTreeインデックスはNULL値も格納します。<code>WHERE phone IS NULL</code> の条件もインデックスを使えます。ただし、NULL値が多い列への <code>WHERE col IS NOT NULL</code> には部分インデックス（<code>WHERE col IS NOT NULL</code> 付き）を検討してください。</div></div>

</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：NOT NULL 制約とデフォルト値の設計</div>
<div class="column-body">
NULLの問題を根本から減らすには、スキーマ設計時に <strong>NOT NULL 制約と DEFAULT 値を積極的に使う</strong>ことが有効です。<code>bonus NUMERIC NOT NULL DEFAULT 0</code> とすることで、bonusにNULLが混入しません。「NULLが意味を持つ列（例: 退会日時 deleted_at）」と「本来NULLを許容すべきでない列（例: 金額）」を設計段階で分けておくことが品質の高いDBの基本です。
</div>
</div>

  tags: [["r","LIKE"],["r","前方一致"],["o","Seq Scan"],["g","インデックス活用"]],
  premise: `<p><strong>LIKE</strong> はパターンマッチング検索で、<code>%</code>（任意の文字列）と <code>_</code>（任意の1文字）を使います。インデックスが使えるかどうかは<em>%の位置</em>によって決まります。</p>
<pre><span class="cmt">-- 前方一致（prefix search）→ インデックス使用可</span>
<span class="kw">WHERE</span> name <span class="kw">LIKE</span> <span class="str">'田%'</span>       <span class="cmt">-- ✅ 「田」で始まる → BTreeインデックスで範囲検索</span>

<span class="cmt">-- 中間一致・後方一致 → インデックス使用不可（Seq Scan）</span>
<span class="kw">WHERE</span> name <span class="kw">LIKE</span> <span class="str">'%田%'</span>     <span class="cmt">-- ❌ どこかに「田」がある → 全件スキャン</span>
<span class="kw">WHERE</span> name <span class="kw">LIKE</span> <span class="str">'%田'</span>      <span class="cmt">-- ❌ 「田」で終わる → 全件スキャン</span></pre>
<div class="callout warn"><strong>なぜ前方一致だけインデックスが効くのか：</strong>BTreeインデックスはアルファベット・文字コード順にソートされています。「田で始まる」は「田≤ name &lt; 茁（田の次の文字）」の範囲検索と同じなのでインデックスが使えます。しかし「どこかに田が含まれる」では先頭が何であるか分からないため、全件を見るしかありません。</div>`,
  question: `<p>以下のLIKE検索クエリの問題点を指摘し、<em>それぞれの最適化方針を示してください。</em></p>
<pre><span class="cmt">-- クエリ1: 商品名に「リンゴ」が含まれる商品を検索（50万件のproductsテーブル）</span>
<span class="kw">SELECT</span> product_id, product_name, price
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  product_name <span class="kw">LIKE</span> <span class="str">'%リンゴ%'</span>;  <span class="cmt">-- 中間一致 → 現状Seq Scan</span>

<span class="cmt">-- クエリ2: メールアドレスが「@example.com」で終わるユーザーを検索</span>
<span class="kw">SELECT</span> user_id, email
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  email <span class="kw">LIKE</span> <span class="str">'%@example.com'</span>;  <span class="cmt">-- 後方一致 → Seq Scan</span>

<span class="cmt">-- クエリ3: 顧客コードが「CUS」で始まる顧客（これはインデックスが使えるか？）</span>
<span class="kw">SELECT</span> customer_id, company_name
<span class="kw">FROM</span>   <span class="tbl">customers</span>
<span class="kw">WHERE</span>  customer_id <span class="kw">LIKE</span> <span class="str">'CUS%'</span>;  <span class="cmt">-- 前方一致</span></pre>`,
  output: `<p>各クエリの評価：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>クエリ</th><th>パターン</th><th>インデックス</th><th>対応方針</th></tr>
<tr class="tr-hi"><td>1</td><td class="tc-r">%リンゴ%（中間一致）</td><td class="tc-r">❌ Seq Scan</td><td class="tc-y">全文検索（pg_trgm等）を検討</td></tr>
<tr class="tr-hi"><td>2</td><td class="tc-r">%@example.com（後方一致）</td><td class="tc-r">❌ Seq Scan</td><td class="tc-y">domain列を別途作成or逆文字列インデックス</td></tr>
<tr class="tr-hi2"><td>3</td><td class="tc-g">CUS%（前方一致）</td><td class="tc-g">✅ Index Scan</td><td class="tc-g">そのままでOK</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- クエリ1 中間一致の対策: pg_trgm 拡張でトライグラムインデックスを使う（PostgreSQL）</span>
<span class="kw">CREATE EXTENSION IF NOT EXISTS</span> pg_trgm;  <span class="cmt">-- 【応用】pg_trgm拡張を有効化（管理者権限が必要）</span>

<span class="kw">CREATE INDEX</span> idx_products_name_trgm
    <span class="kw">ON</span> <span class="tbl">products</span> <span class="kw">USING GIN</span> (product_name gin_trgm_ops);
    <span class="cmt">-- 【応用】GIN + トライグラム: 文字列を3文字ずつ分解して索引化 → 中間一致でもインデックス使用可能</span>

<span class="kw">SELECT</span> product_id, product_name, price
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  product_name <span class="kw">LIKE</span> <span class="str">'%リンゴ%'</span>;   <span class="cmt">-- ✅ GINトライグラムインデックスが使われる</span>

<span class="cmt">-- クエリ2 後方一致の対策①: ドメイン列を分離して通常インデックスを使う（スキーマ変更が必要）</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">users</span>
    <span class="kw">ADD COLUMN</span> email_domain VARCHAR(<span class="num">255</span>)
    <span class="kw">GENERATED ALWAYS AS</span>
    (<span class="fn">SPLIT_PART</span>(email, <span class="str">'@'</span>, <span class="num">2</span>)) <span class="kw">STORED</span>;  <span class="cmt">-- 【応用】email の @ 以降を生成列として保存</span>

<span class="kw">CREATE INDEX</span> idx_users_email_domain <span class="kw">ON</span> <span class="tbl">users</span> (email_domain);  <span class="cmt">-- 通常のBTreeインデックス</span>

<span class="kw">SELECT</span> user_id, email
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  email_domain <span class="op">=</span> <span class="str">'example.com'</span>;   <span class="cmt">-- ✅ 等値一致で高速</span>

<span class="cmt">-- クエリ2 後方一致の対策②: スキーマ変更なしなら LIKE より = の等値一致条件に変換を検討</span>
<span class="kw">SELECT</span> user_id, email
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  email <span class="op">=</span> <span class="str">'alice@example.com'</span>;    <span class="cmt">-- ✅ 完全一致なら通常インデックスが効く</span>

<span class="cmt">-- クエリ3 前方一致: そのままでOK（インデックスが効く）</span>
<span class="kw">SELECT</span> customer_id, company_name
<span class="kw">FROM</span>   <span class="tbl">customers</span>
<span class="kw">WHERE</span>  customer_id <span class="kw">LIKE</span> <span class="str">'CUS%'</span>;        <span class="cmt">-- ✅ 前方一致 → BTreeインデックスで範囲検索に変換</span>
<span class="cmt">-- DBは内部的に WHERE customer_id >= 'CUS' AND customer_id < 'CUT' と同等の範囲検索として処理</span>

<span class="cmt">/*
  実行順序（クエリ3）:
  1. FROM customers            → テーブル参照
  2. WHERE customer_id LIKE 'CUS%' → customer_id インデックスで 'CUS'〜'CUT' の範囲を特定
  3. Index Scan                → インデックスが指す行だけを読む
  4. SELECT customer_id, company_name → 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>LIKEパターン別のインデックス利用可否</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>パターン</th><th>種類</th><th>インデックス</th><th>DBの処理</th></tr>
<tr class="tr-hi2"><td>'田%'</td><td class="tc-g">前方一致</td><td class="tc-g">✅ Index Scan</td><td>「田≤ name &lt; 茁」の範囲検索と同等</td></tr>
<tr class="tr-hi"><td>'%田%'</td><td class="tc-r">中間一致</td><td class="tc-r">❌ Seq Scan</td><td>全行を読んで1文字ずつ確認</td></tr>
<tr class="tr-hi"><td>'%田'</td><td class="tc-r">後方一致</td><td class="tc-r">❌ Seq Scan</td><td>全行を読んで末尾を確認</td></tr>
<tr class="tr-hi2"><td>'田中'</td><td class="tc-g">完全一致（=と同等）</td><td class="tc-g">✅ Index Scan</td><td>等値検索</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">中間一致が必要ならpg_trgmのトライグラムインデックスを検討</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>pg_trgm：文字列を3文字ずつ分解して索引化する</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>product_name</th><th>トライグラム（3文字分解）</th></tr>
<tr class="tr-hi2"><td>国産リンゴジュース</td><td>'国産リ', '産リン', 'リンゴ', 'ンゴジ', 'ゴジュ', 'ジュー', 'ュース'</td></tr>
<tr class="tr-hi2"><td>リンゴ酢</td><td>'リンゴ', 'ンゴ酢'</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:4px">'%リンゴ%' の検索では「リンゴ」というトライグラムを持つ行をGINインデックスで高速に絞り込む</p>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>LIKE の <code>%</code> は「0文字以上の任意の文字列」を意味します。<code>%</code> が先頭にある（後方一致・中間一致）とBTreeインデックスは「何から始まるかわからない」ため使えません。前方一致（<code>値%</code>）のみインデックスが使えます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>全文検索の必要性：</strong>中間一致検索が必須のシステム（商品名検索、住所検索等）では、LIKEではなく全文検索を使うことを検討します。PostgreSQLの <code>pg_trgm</code>（トライグラム）、<code>tsvector/tsquery</code>（形態素解析）、または Elasticsearch などの専用検索エンジンが選択肢です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>ILIKEと大文字小文字：</strong>PostgreSQLの <code>ILIKE</code> は大文字小文字を区別しないLIKEです。<code>ILIKE 'abc%'</code> はインデックスを使えない場合があります（<code>citext</code> 型か <code>LOWER(col)</code> の関数インデックスが必要）。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ユーザー入力を直接 LIKE 条件に使う（SQLインジェクションリスク）：</strong>LIKE の検索文字列にユーザー入力をそのまま埋め込むと、<code>%</code> や <code>_</code> のメタ文字が含まれた場合に意図しない挙動になります。プリペアドステートメント（パラメーター化クエリ）を必ず使い、文字列をエスケープしてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>「インデックスを貼れば LIKE も速くなる」という誤解：</strong>中間一致・後方一致のLIKEは、列にインデックスがあっても通常のBTreeインデックスは使われません。「インデックスを追加したのに遅い」という場合、LIKE パターンを確認してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：ECサイトの商品名検索設計</div>
<div class="column-body">
ECサイトで商品名の部分一致検索を実装する場合、初期は <strong>pg_trgm + GINインデックス</strong> でPostgreSQL単体で対応できます。検索精度・速度の要求が高まった段階で Elasticsearch や Meilisearch などの専用検索エンジンへ移行するのが実務の定番パターンです。初期からElasticsearchを導入すると運用コストが高いため、<strong>まずpg_trgmでシンプルに実装し、スケール要件が出てきたら検索エンジンへ移行</strong>するアプローチが多くのプロダクトで採用されています。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q6  GROUP BY と集計関数の基礎 — WHERE / HAVING の正しい使い分け
══════════════════════════════════════════════════ */
{
  num: 6,
  title: "GROUP BY と集計 — WHERE は集計前・HAVING は集計後のフィルタリング",
  tags: [["r","GROUP BY"],["r","WHERE"],["o","HAVING"],["g","集計関数"]],
  premise: `<p><strong>GROUP BY</strong> は「同じ値を持つ行をグループ化して集計する」命令です。<code>COUNT</code>・<code>SUM</code>・<code>AVG</code>・<code>MAX</code>・<code>MIN</code> が<em>集計関数</em>です。</p>
<p><strong>SQL の論理的な実行順序</strong>は次の通りで、WHERE は GROUP BY の<em>前</em>に評価されます。</p>
<pre><span class="cmt">-- SQL の論理実行順序</span>
<span class="cmt">-- 1. FROM  → 2. WHERE  → 3. GROUP BY  → 4. HAVING  → 5. SELECT  → 6. ORDER BY  → 7. LIMIT</span>

<span class="cmt">-- WHERE: 集計前の行単位フィルタ（集計関数は使えない）</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'completed'</span>     <span class="cmt">-- ✅ 集計前にcompleted の行だけに絞る</span>

<span class="cmt">-- HAVING: 集計後のグループ単位フィルタ（集計関数が使える）</span>
<span class="kw">HAVING</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="op">&gt;=</span> <span class="num">5</span>            <span class="cmt">-- ✅ 集計後に「5件以上のグループ」に絞る</span></pre>
<div class="callout ok"><strong>使い分けの原則：</strong>集計関数（COUNT/SUM/AVG等）を含む条件は HAVING。含まない条件は必ず WHERE（WHEREなら集計前に行を絞れるため効率的）。</div>`,
  question: `<p><code>orders</code>テーブルで<em>「完了済み注文を月別・ユーザー別に集計し、合計金額が3万円以上のユーザーと月を抽出する」</em>クエリを書いてください。また、以下の間違ったクエリの問題点も指摘してください。</p>
<pre><span class="cmt">-- 間違ったクエリ（問題を探してください）</span>
<span class="kw">SELECT</span>
    user_id,
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month,
    <span class="fn">SUM</span>(amount)  <span class="kw">AS</span> total_amount,
    <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> order_count
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">HAVING</span> status <span class="op">=</span> <span class="str">'completed'</span>     <span class="cmt">-- ❌ 問題あり</span>
   <span class="kw">AND</span>  <span class="fn">SUM</span>(amount) <span class="op">&gt;=</span> <span class="num">30000</span>     <span class="cmt">-- これ自体は正しい</span>
<span class="kw">GROUP BY</span> user_id, month;          <span class="cmt">-- ❌ 問題あり（実行順序上）</span></pre>
<div class="data-section">
  <div class="data-label">orders テーブル（抜粋）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>order_id</th><th>user_id</th><th>amount</th><th>status</th><th>created_at</th></tr>
    <tr><td>1</td><td>U001</td><td>15000</td><td>completed</td><td>2024-01-10</td></tr>
    <tr><td>2</td><td>U001</td><td>20000</td><td>completed</td><td>2024-01-25</td></tr>
    <tr><td>3</td><td>U002</td><td>8000</td><td>completed</td><td>2024-01-15</td></tr>
    <tr><td>4</td><td>U001</td><td>5000</td><td class="tc-r">cancelled</td><td>2024-01-20</td></tr>
  </table></div>
</div>`,
  output: `<p>正しいクエリの期待結果：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>month</th><th class="tc-y">total_amount</th><th class="tc-g">order_count</th></tr>
<tr class="tr-hi2"><td>U001</td><td>2024-01-01</td><td class="tc-y">35000（15000+20000）</td><td class="tc-g">2</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim)">U002は8000円のみで3万円未満 → HAVING で除外。U001のcancelledの5000円はWHEREで除外。</p>`,
  answer: `<pre><span class="cmt">-- 間違ったクエリの問題点:</span>
<span class="cmt">-- ① HAVING status = 'completed' → 集計関数を含まない条件をHAVINGに書いている（WHEREに書くべき）</span>
<span class="cmt">-- ② GROUP BY user_id, month → SELECT の DATE_TRUNC結果と GROUP BY の month が別式（エラーまたは不正）</span>

<span class="cmt">-- 正しいクエリ</span>
<span class="kw">SELECT</span>
    user_id,                                          <span class="cmt">-- 【超基礎】GROUP BYに含める列はSELECTにも書ける</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month,        <span class="cmt">-- 【超基礎】月単位に切り捨て（2024-01-15 → 2024-01-01）</span>
    <span class="fn">SUM</span>(amount)  <span class="kw">AS</span> total_amount,                    <span class="cmt">-- 【超基礎】グループ内のamountを合計</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> order_count                        <span class="cmt">-- 【超基礎】グループ内の行数を数える</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'completed'</span>                          <span class="cmt">-- ✅ 【超基礎】集計前にcompletedだけに絞る（WHEREが正しい位置）</span>
<span class="cmt">-- ↑ これをHAVINGに書くと全件GROUP BYした後でフィルタ → 無駄な集計コストが発生</span>
<span class="kw">GROUP BY</span>                                             <span class="cmt">-- 【超基礎】GROUP BY: 同じ値の行をグループ化して集計</span>
    user_id,                                          <span class="cmt">-- 【超基礎】GROUP BYには集計関数以外のSELECT列を全て書く</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at)                  <span class="cmt">-- ✅ SELECTの式と同じ式をGROUP BYにも書く</span>
<span class="kw">HAVING</span>                                               <span class="cmt">-- 【超基礎】HAVING: GROUP BY 後の集計結果にフィルタをかける</span>
    <span class="fn">SUM</span>(amount) <span class="op">&gt;=</span> <span class="num">30000</span>                             <span class="cmt">-- ✅ 集計関数SUM → HAVINGが正しい位置</span>
<span class="kw">ORDER BY</span> month, user_id;                             <span class="cmt">-- 【超基礎】月順・ユーザー順に並べて表示</span>

<span class="cmt">/*
  SQL論理実行順序（このクエリ）:
  1. FROM orders               → テーブル参照
  2. WHERE status='completed'  → cancelled の行を除外（集計前に絞る）
  3. GROUP BY user_id, 月      → ユーザー×月ごとにグループ化して SUM/COUNT を計算
  4. HAVING SUM >= 30000       → 合計3万円未満のグループを除外（集計後のフィルタ）
  5. SELECT user_id, month, SUM, COUNT → 結果列を返す
  6. ORDER BY month, user_id   → 並び替え
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>WHERE → GROUP BY → HAVING の処理の流れ</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理ステップ</th><th>対象データ</th><th>行数</th></tr>
<tr class="tr-hi2"><td>FROM orders</td><td>全注文データ</td><td>4行</td></tr>
<tr class="tr-hi2"><td>WHERE status='completed'</td><td>completed の注文のみ（order_id=4のcancelledを除外）</td><td class="tc-g">3行</td></tr>
<tr class="tr-hi2"><td>GROUP BY user_id, 月</td><td>U001/2024-01: 2行（15000+20000=35000）、U002/2024-01: 1行（8000）</td><td class="tc-g">2グループ</td></tr>
<tr class="tr-hi2"><td>HAVING SUM >= 30000</td><td>U002（8000）を除外</td><td class="tc-g">1グループ</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">WHEREが先に実行されるため集計対象を事前に絞れる → GROUP BYのコストが下がる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>HAVING に非集計条件を書いた場合の無駄（NG版）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理ステップ</th><th>問題</th></tr>
<tr class="tr-hi"><td>FROM orders（全4行）</td><td>WHEREで絞らないため全4行が対象</td></tr>
<tr class="tr-hi"><td>GROUP BY（全4行を集計）</td><td class="tc-r">cancelled（order_id=4）も集計対象に含まれる → 無駄</td></tr>
<tr class="tr-hi"><td>HAVING status='completed'</td><td class="tc-r">集計後にフィルタするが、statusはグループの代表値が1つとは限らない → 論理的に誤り</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>GROUP BYはテーブルの行を「同じ値のグループ」にまとめます。SELECT に書けるのは「GROUP BYで指定した列」と「集計関数の結果」だけです。GROUP BYにない列をSELECTに書くとエラーになります（グループ内に複数の値があって一つに決められないため）。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>WHERE vs HAVING の判断基準：</strong>「この条件に集計関数（COUNT/SUM/AVG/MAX/MIN）が含まれるか？」で判断します。含まれる → HAVING。含まれない → WHERE。この基準を守るだけで意図通りの結果とパフォーマンスが得られます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>GROUP BY の列とSELECTの式を一致させる：</strong>DATE_TRUNC などの関数式をSELECTに書いた場合、GROUP BYにも同じ式を書きます。PostgreSQLではSELECTのエイリアス名（<code>AS month</code>）をGROUP BYに使える場合もありますが、移植性のために式をそのまま書くのが安全です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BYの列をSELECTに入れ忘れる：</strong><code>GROUP BY user_id, month</code> としているのに <code>SELECT SUM(amount)</code> だけ書くのは、どのユーザーのどの月の合計か分からなくなります。GROUP BYの列は全てSELECTにも含めましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>COUNT(*) と COUNT(列名) の違いを意識しない：</strong><code>COUNT(*)</code> は行数をカウント（NULLも含む）、<code>COUNT(列名)</code> はその列がNULLでない行だけをカウントします。「NULLがある列でカウントしたい」場合は意図に応じて使い分けてください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：集計クエリのEXPLAINの読み方</div>
<div class="column-body">
集計クエリのEXPLAIN ANALYZEでよく出てくるノードは <strong>HashAggregate</strong>（ハッシュを使ったGROUP BY）と <strong>GroupAggregate</strong>（ソート済みデータのGROUP BY）です。HashAggregateは大量データのGROUP BYで現れ、<code>work_mem</code>（PostgreSQLのメモリ設定）が小さいと一時ファイルに溢れて遅くなります。重い集計クエリがある場合は、セッション単位で <code>SET work_mem = '256MB';</code> と設定を調整することでパフォーマンスを改善できます。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════

{
  num: 7,
  title: "相関サブクエリを JOIN に書き換える — 行ごとに実行されるサブクエリを1回の結合に",
  tags: [["r","相関サブクエリ"],["r","JOIN変換"],["o","実行回数"],["g","クエリ統合"]],
  premise: `<p><strong>相関サブクエリ（Correlated Subquery）</strong>とは、外側のクエリの各行を参照するサブクエリです。「外側の行数N回だけサブクエリが実行される」ため、N+1問題と同様のパフォーマンス問題が発生します。</p>
<pre><span class="cmt">-- 相関サブクエリの例（外側の行ごとにサブクエリが実行される）</span>
<span class="kw">SELECT</span>
    u.user_id,
    (
        <span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>)             <span class="cmt">-- ← このサブクエリが各ユーザー行ごとに1回実行される</span>
        <span class="kw">FROM</span>   <span class="tbl">orders</span> o
        <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- ← 外側の u.user_id を参照（これが「相関」）</span>
    ) <span class="kw">AS</span> order_count
<span class="kw">FROM</span> <span class="tbl">users</span> u;                        <span class="cmt">-- 1,000ユーザーいれば1,000回サブクエリが実行される</span></pre>
<div class="callout warn"><strong>相関サブクエリの問題：</strong>外側テーブルの行数Nに比例してサブクエリが実行されます。GROUP BY + JOIN に書き換えると1回の実行で済みます。</div>`,
  question: `<p>以下の相関サブクエリを使ったクエリを、<em>JOIN（またはGROUP BY）を使って1回の実行で完結するように書き換えてください。</em></p>
<pre><span class="cmt">-- 現在の相関サブクエリ版（遅い）</span>
<span class="cmt">-- 各ユーザーの注文件数と最終注文日を取得する</span>
<span class="kw">SELECT</span>
    u.user_id,
    u.name,
    (
        <span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>)
        <span class="kw">FROM</span>   <span class="tbl">orders</span> o
        <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id
    ) <span class="kw">AS</span> order_count,
    (
        <span class="kw">SELECT</span> <span class="fn">MAX</span>(created_at)
        <span class="kw">FROM</span>   <span class="tbl">orders</span> o
        <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id
    ) <span class="kw">AS</span> last_order_at
<span class="kw">FROM</span> <span class="tbl">users</span> u
<span class="kw">WHERE</span> u.plan <span class="op">=</span> <span class="str">'premium'</span>;</pre>`,
  output: `<p>期待する結果（注文なしユーザーは count=0, last_order_at=NULL）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th class="tc-g">order_count</th><th class="tc-y">last_order_at</th></tr>
<tr class="tr-hi2"><td>U001</td><td>田中</td><td class="tc-g">5</td><td class="tc-y">2024-12-01</td></tr>
<tr class="tr-hi2"><td>U002</td><td>鈴木</td><td class="tc-g">0</td><td class="null">NULL</td></tr>
<tr class="tr-hi2"><td>U003</td><td>佐藤</td><td class="tc-g">3</td><td class="tc-y">2024-11-15</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 改善版①: LEFT JOIN + GROUP BY で1クエリに統合（推奨）</span>
<span class="kw">SELECT</span>
    u.user_id,                             <span class="cmt">-- 【超基礎】左テーブル（users）の列</span>
    u.name,
    <span class="fn">COUNT</span>(o.order_id)    <span class="kw">AS</span> order_count,  <span class="cmt">-- 【超基礎】COUNT(列名) → NULLを除いた件数（注文なし=0）</span>
    <span class="fn">MAX</span>(o.created_at)    <span class="kw">AS</span> last_order_at <span class="cmt">-- 【超基礎】MAX → グループ内の最大値（最終注文日）</span>
<span class="kw">FROM</span>      <span class="tbl">users</span>  u                        <span class="cmt">-- 【超基礎】「全件残したい側」を FROM（左テーブル）に</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span> o                        <span class="cmt">-- 【超基礎】LEFT JOIN で注文なしユーザーも保持</span>
          <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id        <span class="cmt">-- 【超基礎】結合条件</span>
<span class="kw">WHERE</span>  u.plan <span class="op">=</span> <span class="str">'premium'</span>               <span class="cmt">-- 【超基礎】集計前に premium のみに絞る</span>
<span class="kw">GROUP BY</span>                                  <span class="cmt">-- 【超基礎】ユーザーごとに集計するため GROUP BY</span>
    u.user_id,                             <span class="cmt">-- 集計関数を使わない SELECT 列は GROUP BY に含める</span>
    u.name;

<span class="cmt">-- 改善版②: CTEで集計してからJOIN（可読性重視のパターン）</span>
<span class="kw">WITH</span> order_stats <span class="kw">AS</span> (                     <span class="cmt">-- 【超基礎】CTE(WITH句): 名前付き一時テーブルを定義</span>
    <span class="kw">SELECT</span>
        user_id,
        <span class="fn">COUNT</span>(<span class="op">*</span>)        <span class="kw">AS</span> order_count,  <span class="cmt">-- ordersをuser_idごとに集計</span>
        <span class="fn">MAX</span>(created_at)  <span class="kw">AS</span> last_order_at
    <span class="kw">FROM</span>   <span class="tbl">orders</span>
    <span class="kw">GROUP BY</span> user_id                       <span class="cmt">-- 【超基礎】user_idごとにグループ化</span>
)
<span class="kw">SELECT</span>
    u.user_id,
    u.name,
    <span class="fn">COALESCE</span>(s.order_count, <span class="num">0</span>)   <span class="kw">AS</span> order_count,   <span class="cmt">-- 注文なしユーザーはNULL → 0に変換</span>
    s.last_order_at
<span class="kw">FROM</span>      <span class="tbl">users</span>       u
<span class="kw">LEFT JOIN</span> order_stats  s <span class="kw">ON</span> s.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- 集計結果とJOIN</span>
<span class="kw">WHERE</span>  u.plan <span class="op">=</span> <span class="str">'premium'</span>;

<span class="cmt">/*
  実行順序（改善版①）:
  1. FROM users u                 → users テーブル参照
  2. WHERE u.plan='premium'       → premium に絞る
  3. LEFT JOIN orders o ON...     → user_id で orders を結合（一致なしはNULL）
  4. GROUP BY u.user_id, u.name   → ユーザーごとにグループ化
  5. COUNT(o.order_id), MAX(...)  → 各グループで集計（1回のオーダーテーブルスキャン）
  6. SELECT 列を返す

  相関サブクエリ版との差: ユーザー数N回のサブクエリ → 1回のJOIN+集計
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>相関サブクエリ版：ユーザー行ごとにordersを2回スキャン</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理</th><th>実行回数</th><th>コスト</th></tr>
<tr class="tr-hi"><td>外側のSELECT（FROM users）</td><td>1回</td><td class="tc-y">低</td></tr>
<tr class="tr-hi"><td>COUNT(*)のサブクエリ</td><td class="tc-r">ユーザー数N回</td><td class="tc-r">高</td></tr>
<tr class="tr-hi"><td>MAX(created_at)のサブクエリ</td><td class="tc-r">ユーザー数N回</td><td class="tc-r">高</td></tr>
<tr class="tr-hi"><td>合計</td><td class="tc-r">2N+1回のordersアクセス</td><td class="tc-r">非常に高</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">LEFT JOIN + GROUP BY に変換すると ordersへのアクセスが1回になる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>LEFT JOIN + GROUP BY 版：ordersへのアクセスは1回</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理</th><th>実行回数</th><th>コスト</th></tr>
<tr class="tr-hi2"><td>FROM users LEFT JOIN orders</td><td class="tc-g">1回の結合処理</td><td class="tc-g">低</td></tr>
<tr class="tr-hi2"><td>GROUP BY + COUNT/MAX</td><td class="tc-g">1回の集計処理</td><td class="tc-g">低</td></tr>
<tr class="tr-hi2"><td>合計</td><td class="tc-g">2回のテーブルアクセス</td><td class="tc-g">非常に低</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>CTEは <code>WITH 名前 AS (クエリ)</code> と書いて名前付きの一時テーブルを定義します。複雑なクエリを段階的に書けるため可読性が上がります。CTEで先に集計してからJOINするパターンは実務でよく使われます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(*) vs COUNT(列名)：</strong>注文なしユーザーをLEFT JOINすると、ordersの列はNULLになります。<code>COUNT(*)</code> は行数をカウントするためNULL行も1としてカウントしますが、<code>COUNT(o.order_id)</code> はNULLを除外するため「注文なしユーザーは0件」と正しく計算できます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>相関サブクエリが有効な場面：</strong>相関サブクエリが常に悪いわけではありません。「外側の行数が少ない」「サブクエリでLIMIT 1を使う（Q1のLATERAL参照）」「EXISTS条件チェック」などでは相関サブクエリが簡潔に書けます。大量行の場合はJOIN変換を検討しましょう。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT句に複数の相関サブクエリを並べる：</strong>SELECTに3つの相関サブクエリを書くと、ユーザー数×3回のサブクエリが実行されます。同じテーブルに対する複数の相関サブクエリは1回のGROUP BY集計にまとめられないか検討してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTEを多用してパフォーマンスを下げる：</strong>PostgreSQL 12以前ではCTEはマテリアライズ（実体化）されてインデックスが効かない場合がありました。PostgreSQL 12以降はオプティマイザがインライン展開できるようになりましたが、重いCTEを何段も重ねる場合はEXPLAINで実行計画を確認してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：ORMが生成する相関サブクエリに注意</div>
<div class="column-body">
一部のORMは「集計値を付けて取得する」クエリを相関サブクエリで生成することがあります。<strong>ORMが生成したSQLをログで確認し、相関サブクエリが頻繁に実行されていないか監視すること</strong>が重要です。DjangoなどでのAnnotateやSQLAlchemyのhybrid_propertyは、内部で相関サブクエリになることがあります。スロークエリログで「同じパターンが大量に出ている」場合は相関サブクエリを疑いましょう。
</div>
</div>
`

/* ══════════════════════════════════════════════════
   Q8  ORDER BY とインデックス — ソートコストの削減
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "ORDER BY とインデックス — ソートコストを削減してレスポンスを高速化する",
  tags: [["r","ORDER BY"],["r","ソートインデックス"],["o","Seq Scan"],["g","Index Scan"]],
  premise: `<p><strong>ORDER BY</strong> は結果を特定の列でソートする命令です。ソート対象の列にインデックスがある場合、DBはそのインデックスを利用して「既にソート済みのデータを順番に読む」ため、追加のソート処理が不要になります。</p>
<pre><span class="cmt">-- ソートにインデックスが使える条件</span>
<span class="cmt">-- ① WHERE条件でインデックスを使って絞り込んだ後、そのインデックスの順序でORDER BY</span>
<span class="kw">SELECT</span> order_id, amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> 'U001'        <span class="cmt">-- user_id にインデックスあり</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>;     <span class="cmt">-- (user_id, created_at) 複合インデックスがあればさらに高速</span>

<span class="cmt">-- ② ページネーションと組み合わせる場合（OFFSET は大きくなると遅い）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">ORDER BY</span> order_id <span class="kw">LIMIT</span> <span class="num">10</span> <span class="kw">OFFSET</span> <span class="num">10000</span>;  <span class="cmt">-- OFFSET大 → 遅い</span></pre>
<div class="callout warn"><strong>大きなOFFSETの問題：</strong><code>LIMIT 10 OFFSET 10000</code> はDBが10010行読んでから先頭10000行を捨てます。ページ数が増えるほど遅くなります。「キーセットページネーション」（WHERE id > 最後のid の条件でページを進める）が高速な代替手段です。</div>`,
  question: `<p>以下の2つのシナリオでORDER BYのパフォーマンス問題があります。<em>それぞれ最適化してください。</em></p>
<p><strong>シナリオA：</strong>ユーザーU001の注文履歴を最新順に10件取得する。現在はソートが遅い。</p>
<p><strong>シナリオB：</strong>注文一覧の100ページ目（1ページ10件）を取得する。OFFSETが大きくなると遅い。</p>
<div class="data-section">
  <div class="data-label">ordersテーブル（既存インデックス）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>列名</th><th>インデックス</th><th>備考</th></tr>
    <tr><td>order_id（PK）</td><td class="tc-g">PRIMARY KEY（BTree）</td><td></td></tr>
    <tr class="tr-hi"><td>user_id</td><td class="tc-g">あり（単独）</td><td>結合・WHERE に使う</td></tr>
    <tr class="tr-hi4"><td>created_at</td><td class="tc-r">なし</td><td>← これが問題</td></tr>
    <tr><td>amount</td><td class="null">なし</td><td></td></tr>
    <tr><td>status</td><td class="null">なし</td><td></td></tr>
  </table></div>
</div>`,
  output: `<p>シナリオA（最新10件）の期待結果：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id</th><th>amount</th><th class="tc-y">created_at（降順）</th></tr>
<tr class="tr-hi2"><td>201</td><td>8000</td><td class="tc-y">2024-12-01</td></tr>
<tr class="tr-hi2"><td>150</td><td>5000</td><td class="tc-y">2024-11-15</td></tr>
<tr class="tr-hi2"><td>…</td><td>…</td><td class="tc-y">…（10件）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- シナリオA の最適化</span>

<span class="cmt">-- ① 複合インデックスを作成（user_id と created_at をセットで索引化）</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_created
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id, created_at <span class="kw">DESC</span>);
    <span class="cmt">-- 【応用】複合インデックス: user_id で絞り込んだ後、created_at 降順がそのまま使える</span>
    <span class="cmt">-- DESC を付けることでORDER BY created_at DESC がインデックスの順序と一致</span>

<span class="cmt">-- ② クエリ（インデックス作成後はこのクエリが高速になる）</span>
<span class="kw">SELECT</span>
    order_id,   <span class="cmt">-- 【超基礎】取得する列</span>
    amount,
    created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>          <span class="cmt">-- 【超基礎】user_id で絞り込み（複合インデックスの先頭列が使われる）</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>         <span class="cmt">-- 【超基礎】最新順に並べる（DESC=降順、ASC=昇順）</span>

<pre><span class="cmt">-- IN: サブクエリの全結果を取得してからリストと照合</span>
<span class="kw">WHERE</span> user_id <span class="kw">IN</span> (<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> status<span class="op">=</span><span class="str">'done'</span>)

<span class="kw">WHERE</span> <span class="kw">EXISTS</span> (

<div class="viz-flow">

<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>IN vs EXISTS の動作の違い</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方式</th><th>処理内容</th><th>DISTINCTの要否</th><th>短絡評価</th></tr>

<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>EXISTS は「サブクエリが1件でも結果を返すか」だけを確認します。SELECT に何を書いても結果に影響しないため <code>SELECT 1</code> と書くのが慣習です。「存在するかチェックするだけ」の用途では EXISTS が意図を明確に表現できます。</div></div>

<div class="column-body">
UPDATE や DELETE でも EXISTS が使えます。<strong><code>DELETE FROM users WHERE NOT EXISTS (SELECT 1 FROM orders WHERE orders.user_id = users.user_id)</code></strong> で「注文が一度もないユーザーを削除」といった操作が安全に記述できます。大量削除の場合はQ6で学んだバッチ分割と組み合わせましょう。EXISTSは WHERE句だけでなく、DELETE/UPDATE の絞り込みにも活用できる汎用的な書き方です。
</div>
</div>

  premise: `<p><strong>複合インデックス</strong>は複数の列を組み合わせたインデックスです。列の順序が重要で、<em>先頭列からしか左辺からの前方一致でしか使えない</em>という「先頭列の原則」があります。</p>
<pre><span class="cmt">-- 複合インデックス (a, b, c) を作成した場合に使えるWHERE条件</span>

<span class="kw">WHERE</span> a <span class="op">=</span> <span class="num">1</span> <span class="kw">AND</span> b <span class="op">=</span> <span class="num">2</span> <span class="kw">AND</span> c <span class="op">=</span> <span class="num">3</span> <span class="cmt">-- ✅ 全3列 → 使える</span>
<span class="kw">WHERE</span> b <span class="op">=</span> <span class="num">2</span>                     <span class="cmt">-- ❌ bは先頭ではない → 使えない</span>
<span class="kw">WHERE</span> a <span class="op">=</span> <span class="num">1</span> <span class="kw">AND</span> c <span class="op">=</span> <span class="num">3</span>          <span class="cmt">-- ⚠️  a部分は使えるがcは間にbが抜けているため使えない</span></pre>
<div class="callout ok"><strong>カバリングインデックス：</strong>クエリで必要な全ての列（WHERE・SELECT・ORDER BYで使う列）がインデックスに含まれていると、テーブル本体を一切読まずにインデックスだけで結果を返せます（Index Only Scan）。最高速のパターンです。</div>`,
  question: `<p>以下のクエリに対して<em>最適な複合インデックスを設計してください</em>。さらにカバリングインデックスになるよう改善する方針も示してください。</p>
<pre><span class="cmt">-- クエリA: 特定ユーザーの completed 注文を新しい順に取得</span>

<span class="cmt">-- クエリB: 特定期間の completed 注文の合計金額（ユーザー別集計）</span>

<tr class="tr-hi2"><td>A</td><td class="tc-g">(user_id, status, created_at DESC)</td><td>+ INCLUDE(order_id, amount) でカバリング</td></tr>

  answer: `<pre><span class="cmt">-- クエリAの分析とインデックス設計</span>
<span class="cmt">-- WHERE: user_id（等値）, status（等値）
-- ORDER BY: created_at DESC
-- SELECT: order_id, amount, created_at
-- LIMIT: 20</span>

<span class="cmt">-- ① 基本の複合インデックス（WHEREとORDER BYをカバー）</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_status_created
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id, status, created_at <span class="kw">DESC</span>);
    <span class="cmt">-- 【応用】列順の理由:
    --  先頭: user_id（等値絞り込み・選択度高い）→ 最初に絞り込む
    --  2番目: status（等値絞り込み）→ user_idで絞った後さらに絞る
    --  末尾: created_at DESC（ORDER BY列）→ インデックス順がそのままソート順に</span>

<span class="cmt">-- ② カバリングインデックス（SELECT列もインデックスに含める → Index Only Scan）</span>
<span class="kw">CREATE INDEX</span> idx_orders_covering_a
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id, status, created_at <span class="kw">DESC</span>)
    <span class="kw">INCLUDE</span> (order_id, amount);
    <span class="cmt">-- 【応用】INCLUDE: ORDER BY/WHERE の対象ではないが SELECT で必要な列を追加
    -- INCLUDEの列はリーフノードにのみ格納（インデックスの絞り込みには使われないが読める）
    -- → SELECT order_id, amount, created_at がインデックスだけで完結（Index Only Scan）</span>

<span class="cmt">-- クエリBの分析とインデックス設計</span>
<span class="cmt">-- WHERE: status（等値）, created_at（範囲）
-- GROUP BY: user_id
-- SELECT: user_id, SUM(amount)</span>

<span class="cmt">-- ③ クエリBの複合インデックス</span>
<span class="kw">CREATE INDEX</span> idx_orders_status_created
    <span class="kw">ON</span> <span class="tbl">orders</span> (status, created_at);
    <span class="cmt">-- 【応用】列順の理由:
    --  先頭: status（等値絞り込み）→ 等値条件は先頭に
    --  2番目: created_at（範囲絞り込み）→ 等値の後に範囲列
    -- ※ status は選択度が低い（3種類）が等値条件なので先頭でOK</span>

<span class="cmt">-- ④ クエリBのカバリングインデックス</span>
<span class="kw">CREATE INDEX</span> idx_orders_covering_b
    <span class="kw">ON</span> <span class="tbl">orders</span> (status, created_at)
    <span class="kw">INCLUDE</span> (user_id, amount);  <span class="cmt">-- SELECT/GROUP BYで使う列をINCLUDEに追加</span>

<span class="cmt">-- インデックスの使用確認</span>
<span class="kw">EXPLAIN ANALYZE</span>                 <span class="cmt">-- 【超基礎】実行計画と実測時間を表示</span>
<span class="kw">SELECT</span> order_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
  <span class="kw">AND</span>  status  <span class="op">=</span> <span class="str">'completed'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;
<span class="cmt">-- 「Index Only Scan」が出ればカバリングインデックス成功！
-- 「Index Scan」は複合インデックスは使えているがテーブル本体も読んでいる
-- 「Seq Scan」はインデックスが使われていない</span>

<span class="cmt">/*
  クエリAの実行順序（カバリングインデックスあり）:
  1. idx_orders_covering_a を使ってuser_id='U001' AND status='completed' に絞り込み
  2. インデックスが created_at DESC 順に並んでいるのでそのまま上から読む（ソート不要）
  3. LIMIT 20: 20件読んだら終了
  4. SELECT: インデックスに order_id, amount が INCLUDE されているため
     テーブル本体を読まずに完結（Index Only Scan）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>複合インデックスの列順と使える条件の対応</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>インデックス列順</th><th>WHERE条件</th><th>使えるか</th><th>理由</th></tr>
<tr class="tr-hi2"><td>(user_id, status, created_at)</td><td>user_id = 'U001'</td><td class="tc-g">✅ 先頭列のみ</td><td>先頭から一致</td></tr>
<tr class="tr-hi2"><td>(user_id, status, created_at)</td><td>user_id = X AND status = Y</td><td class="tc-g">✅ 先頭2列</td><td>先頭から連続</td></tr>
<tr class="tr-hi2"><td>(user_id, status, created_at)</td><td>user_id = X AND status = Y AND created_at &gt; Z</td><td class="tc-g">✅ 全3列</td><td>全列活用</td></tr>
<tr class="tr-hi"><td>(user_id, status, created_at)</td><td>status = Y（user_idなし）</td><td class="tc-r">❌ 先頭列がない</td><td>先頭列スキップ不可</td></tr>
<tr class="tr-hi"><td>(user_id, status, created_at)</td><td>user_id = X AND created_at &gt; Z（statusなし）</td><td class="tc-y">⚠️ user_id分のみ</td><td>間の列が抜けるとそこで止まる</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">INCLUDE句でSELECT列を追加するとIndex Only Scan（カバリングインデックス）になる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>通常インデックス vs カバリングインデックスのアクセスパス</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>パターン</th><th>インデックスで行を特定</th><th>テーブル本体</th><th>速度</th></tr>
<tr class="tr-hi"><td>Seq Scan</td><td class="tc-r">なし（全件スキャン）</td><td class="tc-r">全行読む</td><td class="tc-r">遅い</td></tr>
<tr class="tr-hi4"><td>Index Scan</td><td class="tc-y">インデックスで絞る</td><td class="tc-y">絞った行分読む</td><td class="tc-y">普通</td></tr>
<tr class="tr-hi2"><td>Index Only Scan</td><td class="tc-g">インデックスで絞る</td><td class="tc-g">読まない！</td><td class="tc-g">最速</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>複合インデックスは「先頭列から連続して一致する条件」にしか使えません。例えば (a, b, c) インデックスで b だけの条件には使えません。WHERE句の絞り込み列を「選択度が高い順（絞り込み力が強い順）に先頭へ」配置するのが基本の設計指針です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>INCLUDE句（PostgreSQL 11以降）：</strong><code>INCLUDE(列名)</code> で指定した列はインデックスのリーフノードにのみ格納されます。絞り込みには使えませんが、SELECT でその列が必要な場合にテーブル本体を読まずに済みます。よく SELECT される列を INCLUDE に追加することでIndex Only Scanを実現できます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>等値条件 → 範囲条件の順に列を並べる：</strong>複合インデックスの列順は「等値（=）条件の列を先に、範囲（&gt;, &lt;, BETWEEN）条件の列を後に」配置します。範囲条件の後の列はインデックスの絞り込みに効果がないためです。<code>(status, created_at)</code> の場合、status=等値、created_at=範囲の順が正しい設計です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>インデックスを作りすぎる：</strong>インデックスはSELECTを速くしますが、INSERT/UPDATE/DELETEのたびに更新されるためコストがかかります。使われないインデックスが増えるほど書き込みが遅くなります。Q9で学んだ <code>pg_stat_user_indexes</code> でインデックスの使用状況を定期的に確認しましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>選択度が低い列だけの単独インデックス：</strong><code>CREATE INDEX ON orders (status)</code> は status が3種類しかない場合、テーブルの1/3の行を返すインデックスになりシーケンシャルスキャンより遅いことがあります。選択度の低い列は複合インデックスの先頭や中間に含めて、他の高選択度列と組み合わせることで効果を発揮します。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：インデックス設計のアプローチ</div>
<div class="column-body">
インデックス設計の実務的なアプローチは<strong>「クエリファースト」</strong>です。①頻繁に実行される・遅いクエリをスロークエリログで特定 → ②そのクエリのWHERE・JOIN・ORDER BY・SELECT列を分析 → ③それらをカバーする複合インデックスを設計 → ④EXPLAIN ANALYZEで改善を確認という順序が効果的です。最初から全ての列にインデックスを張るのではなく、「遅いクエリに対して最適なインデックスを追加する」スタンスが無駄のないインデックス管理につながります。
</div>
</div>

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 002 BASIC</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();
</script>
