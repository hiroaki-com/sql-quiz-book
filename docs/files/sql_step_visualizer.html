<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL処理ステップ可視化</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0f172a; min-height: 100vh; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
    }

    .sql-viz-wrapper {
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      --font-sans: system-ui, -apple-system, sans-serif;

      --color-bg-base:    #0f172a;
      --color-bg-panel:   #1e293b;
      --color-border-main:#334155;
      --color-border-sub: #263348;
      --color-txt-main:   #e2e8f0;
      --color-txt-sub:    #a8bcce;
      --color-txt-muted:  #607899;

      --sql-blue-bg:    #0d3354;   --sql-blue-txt:   #38bdf8;  --sql-blue-bd:    #1d6a96;
      --sql-orange-bg:  #3d1c07;   --sql-orange-txt: #fb923c;  --sql-orange-bd:  #8c3c10;
      --sql-green-bg:   #052e16;   --sql-green-txt:  #4ade80;  --sql-green-bd:   #166534;
      --sql-red-txt:    #f87171;

      --sql-grp1-bg: #0d3354;
      --sql-grp2-bg: #052e16;
      --sql-grp3-bg: #3a2a06;

      --border-radius: 6px;

      background: var(--color-bg-base);
      color: var(--color-txt-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .sv-tab { padding: 6px 14px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 13px; font-family: var(--font-sans); font-weight: 500; background: transparent; color: var(--color-txt-sub); cursor: pointer; transition: all 0.2s ease; }
    .sv-tab:hover { background: var(--color-bg-panel); }
    .sv-tab.active { background: var(--sql-blue-bg); color: var(--sql-blue-txt); border-color: var(--sql-blue-bd); }
    .sv-tab:focus-visible, .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline: 2px solid var(--sql-blue-txt); outline-offset: 2px; }

    .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 12px; font-family: var(--font-sans); background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
    .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #2a3f58; }

    .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
    .sv-dot.done { background: var(--color-border-main); }
    .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }

    .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 12px; }
    .sv-table th { padding: 6px 12px; font-size: 11px; font-weight: 600; border: 1px solid var(--color-border-sub); color: var(--color-txt-sub); text-align: left; background: var(--color-bg-panel); transition: all 0.3s ease; white-space: nowrap; }
    .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }

    .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
    .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
    .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }

    .sv-table tr.row-active td { background: var(--color-bg-base); }
    .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
    .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
    .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
    .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }

    .sv-table td.val-pass   { background: rgba(74,222,128,0.18) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
    .sv-table td.val-fail   { background: rgba(248,113,113,0.14) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
    .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }

    .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
    .sql-tb { color: var(--sql-orange-txt); }
    .sql-hl-from,   .sql-hl-join                                       { background: var(--sql-blue-bg);   border-radius: 3px; padding: 2px 4px; }
    .sql-hl-where,  .sql-hl-and, .sql-hl-group, .sql-hl-having, .sql-hl-agg { background: var(--sql-orange-bg); border-radius: 3px; padding: 2px 4px; }
    .sql-hl-select, .sql-hl-order                                      { background: var(--sql-green-bg);  border-radius: 3px; padding: 2px 4px; }

    .sv-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-family: var(--font-sans); font-weight: 600; letter-spacing: 0.02em; }
    .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
    .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
    .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }

    @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .sv-animate { animation: sv-fade-in 0.3s ease forwards; }

    .tbl-label { font-size: 12px; font-family: var(--font-sans); font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }
    .row-count  { font-size: 12px; font-family: var(--font-mono); color: var(--color-txt-sub); margin-top: 8px; text-align: right; }
  </style>
</head>
<body>

<h2 class="sr-only">SQL処理ステップ可視化 — クエリの各句がテーブルの行・列に与える影響をステップ形式で確認できます。</h2>

<div class="sql-viz-wrapper">

  <div id="sv-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>

  <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">

    <div style="flex:0 0 280px;min-width:240px;">
      <div style="font-size:12px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
      <div id="sv-sqlbox" style="font-family:var(--font-mono);font-size:13px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>

      <div style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:12px 14px;background:var(--color-bg-panel);">
        <div style="font-size:11px;font-weight:600;color:var(--color-txt-muted);margin-bottom:10px;letter-spacing:0.06em;">LEGEND (現在のステップ)</div>
        <div id="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:12px;"></div>
      </div>
    </div>

    <div style="flex:1;min-width:300px;">
      <div id="sv-stepinfo" style="margin-bottom:16px;"></div>
      <div id="sv-tarea" class="sv-animate"></div>
      <div class="row-count" id="sv-rowcount"></div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:20px;flex-wrap:wrap;" id="sv-ctrls"></div>
      <div style="font-size:11px;color:var(--color-txt-muted);margin-top:12px;text-align:center;">💡 キーボードの ← → 矢印キーでも移動できます</div>
    </div>

  </div>
</div>

<script>

            { c: "row-active", v: [3, "山田 太郎", "開発部", 20], cdc: [null, null, null, "val-dimmed"] },
            { c: "row-active", v: [4, "鈴木 次郎", "営業部", 10], cdc: [null, null, null, "val-dimmed"] },
            { c: "row-active", v: [5, "高橋 三郎", "マーケ部", 30], cdc: [null, null, null, "val-dimmed"] }
          ], cnt: "結果: 5行 × 3列" }
      ],
      sql: [
        { t: "SELECT", k: "sql-kw", h: "select" }, { t: "  e.emp_id, e.emp_name, d.dept_name\n", k: "", h: "select" },
        { t: "FROM      ", k: "sql-kw", h: "from" }, { t: "employees", k: "sql-tb", h: "from" }, { t: " e\n", k: "", h: "from" },
        { t: "INNER JOIN", k: "sql-kw", h: "join" }, { t: " departments", k: "sql-tb", h: "join" }, { t: " d\n", k: "", h: "join" },
        { t: "  ON ", k: "sql-kw", h: "join" }, { t: "e.dept_id = d.dept_id\n", k: "", h: "join" },
        { t: "ORDER BY ", k: "sql-kw", h: "select" }, { t: "e.emp_id;", k: "", h: "select" }
      ]
    }
  ];

  let currentExerciseIndex = 0;
  let currentStepIndex = 0;

  function getLegendHTML(type) {
    const mkLegend = (colorVar, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${colorVar}-bg);border:1px solid var(--sql-${colorVar}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:rgba(74,222,128,0.18);border-left:2px solid #4ade80;border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:11px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:rgba(248,113,113,0.14);border-left:2px solid #f87171;border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:11px;">✗ 除外</span></div>
      </div>`;
    switch(type) {
      case "base":   return mkLegend("blue", "データ取得・結合対象") + dimLegend;
      case "eval":   return mkLegend("orange", "評価対象の列・キー") + mkLegend("blue", "条件をクリアした行") + dimLegend + passFail;
      case "group":  return mkLegend("orange", "グループ化キー・集計対象") +
               `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:2px;"><div style="width:8px;height:10px;background:var(--sql-grp1-bg);border-radius:1px;"></div><div style="width:8px;height:10px;background:var(--sql-grp2-bg);border-radius:1px;"></div><div style="width:8px;height:10px;background:var(--sql-grp3-bg);border-radius:1px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
      case "select": return mkLegend("green", "出力対象の列") + dimLegend;
      default: return "";
    }
  }

  function renderSQL() {
    const ex = EXERCISES[currentExerciseIndex];
    const stepId = ex.steps[currentStepIndex].id;
    return ex.sql.map(t => {
      const cls = `${t.k} ${t.h === stepId ? `sql-hl-${t.h}` : ""}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join("");
  }

  function renderStepInfo() {
    const step = EXERCISES[currentExerciseIndex].steps[currentStepIndex];
    return `
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="sv-badge ${step.bc}">${step.badge}</span>
        <code style="font-size:14px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
      </div>
      <div style="margin-top:8px;font-size:13px;line-height:1.5;color:var(--color-txt-sub);padding:10px 14px;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);">${step.desc}</div>
    `;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ""}">${col}</th>`).join("");
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => {
        const combined = [(r.cdc && r.cdc[ci]) || "", (r.cv && r.cv[ci]) || ""].filter(Boolean).join(" ");
        return `<td class="${combined}">${val}</td>`;
      }).join("");
      return `<tr class="${r.c}">${tds}</tr>`;
    }).join("");
    return `<div style="flex:1;min-width:260px;">${label ? `<div class="tbl-label">▸ ${label}</div>` : ""}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ""}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea() {
    const step = EXERCISES[currentExerciseIndex].steps[currentStepIndex];
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
          ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
          <div style="display:flex;align-items:center;font-size:24px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
          ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
        </div>
      `;
    }
    return buildTable("", step.cols, step.rows, step.ch);
  }

  function renderControls() {
    const total = EXERCISES[currentExerciseIndex].steps.length;
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? "active" : (i < currentStepIndex ? "done" : "");
      return `<button class="sv-dot ${cls}" onclick="window.svGoToStep(${i})" aria-label="ステップ${i+1}"></button>`;
    }).join("");
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:12px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" onclick="window.svGoToStep(${currentStepIndex - 1})" ${currentStepIndex === 0 ? "disabled" : ""}>← Prev</button>
        <button class="sv-nav-btn" onclick="window.svGoToStep(${currentStepIndex + 1})" ${currentStepIndex === total - 1 ? "disabled" : ""}>Next →</button>
      </div>
    `;
  }

  function renderAll() {
    const ex = EXERCISES[currentExerciseIndex];
    const step = ex.steps[currentStepIndex];

    document.getElementById("sv-tabs").innerHTML = EXERCISES.map((e, i) =>
      `<button class="sv-tab ${i === currentExerciseIndex ? "active" : ""}" onclick="window.svGoToExercise(${i})">${e.label}</button>`
    ).join("");

    document.getElementById("sv-sqlbox").innerHTML = renderSQL();
    document.getElementById("sv-legend").innerHTML = getLegendHTML(step.type);
    document.getElementById("sv-stepinfo").innerHTML = renderStepInfo();

    const tarea = document.getElementById("sv-tarea");
    tarea.classList.remove("sv-animate");
    tarea.offsetWidth;
    tarea.innerHTML = renderTableArea();
    tarea.classList.add("sv-animate");

    document.getElementById("sv-rowcount").innerText = step.cnt || "";
    document.getElementById("sv-ctrls").innerHTML = renderControls();
  }

  window.svGoToExercise = (i) => { currentExerciseIndex = i; currentStepIndex = 0; renderAll(); };
  window.svGoToStep = (i) => {
    const total = EXERCISES[currentExerciseIndex].steps.length;
    if (i >= 0 && i < total) { currentStepIndex = i; renderAll(); }
  };

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") window.svGoToStep(currentStepIndex + 1);
    else if (e.key === "ArrowLeft") window.svGoToStep(currentStepIndex - 1);
  });

  renderAll();
})();
</script>
</body>
</html>
