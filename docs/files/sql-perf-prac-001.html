<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  テーブルパーティショニング — RANGE PARTITION
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "テーブルパーティショニング — 巨大テーブルをRANGE分割してスキャン範囲を限定する",
  tags: [["r","PARTITION BY RANGE"],["r","Partition Pruning"],["o","大規模テーブル"],["g","スキャン削減"]],
  premise: `<p><strong>テーブルパーティショニング</strong>とは、1つの論理テーブルを複数の物理テーブル（パーティション）に分割して管理する仕組みです。日付など<em>範囲で絞り込むことが多いテーブル</em>に特に有効で、DBが「必要なパーティションだけ」を読む<em>Partition Pruning（剪定）</em>によってスキャン量を劇的に削減できます。</p>
<pre><span class="cmt">-- RANGE パーティションの基本構文（PostgreSQL）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">logs</span> (                      <span class="cmt">-- 親テーブル（仮想的な入口）</span>
    log_id     BIGINT,
    created_at TIMESTAMPTZ <span class="kw">NOT NULL</span>,      <span class="cmt">-- パーティションキー列は NOT NULL が必須</span>
    message    TEXT
) <span class="kw">PARTITION BY RANGE</span> (created_at);       <span class="cmt">-- どの列で分割するかを指定</span>

<span class="cmt">-- 子パーティションを月ごとに作成</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">logs_2024_01</span>
    <span class="kw">PARTITION OF</span> <span class="tbl">logs</span>                    <span class="cmt">-- 親テーブルに紐付ける</span>
    <span class="kw">FOR VALUES FROM</span> (<span class="str">'2024-01-01'</span>) <span class="kw">TO</span> (<span class="str">'2024-02-01'</span>); <span class="cmt">-- FROM は含む、TO は含まない</span></pre>
<div class="callout"><strong>Partition Pruning（パーティション剪定）：</strong><br>
WHERE句の条件がパーティションキーに合致する場合、DBは関係のないパーティションを読まずにスキップします。例えば <code>WHERE created_at >= '2024-06-01' AND created_at < '2024-07-01'</code> なら <code>logs_2024_06</code> だけを読みます。</div>
<p>パーティショニングのメリットは3つ：①スキャン範囲の削減、②古いデータの高速削除（DROP PARTITION）、③パーティションごとのVACUUM効率化。</p>`,
  question: `<p><code>access_logs</code>（10億件・日次1000万行ペースで増加中）に対して <em>月次のRANGEパーティション</em> を設計してください。また、特定月のログを取得するクエリと、古い月のパーティションを高速に削除するDDLも示してください。</p>
<div class="data-section">
  <div class="data-label">テーブル定義イメージ</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>列名</th><th>型</th><th>備考</th></tr>
    <tr><td>log_id</td><td>BIGINT</td><td>主キー</td></tr>
    <tr><td>user_id</td><td>VARCHAR(20)</td><td></td></tr>
    <tr><td>action</td><td>VARCHAR(50)</td><td>例: 'login', 'purchase'</td></tr>
    <tr><td>created_at</td><td>TIMESTAMPTZ</td><td>パーティションキー候補</td></tr>
  </table></div>
</div>`,
  output: `<p>設計するパーティション構成：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>パーティション名</th><th>対象期間</th><th>行数目安</th></tr>
<tr class="tr-hi2"><td>access_logs_2024_01</td><td>2024-01-01 〜 2024-01-31</td><td>約3100万行</td></tr>
<tr class="tr-hi2"><td>access_logs_2024_02</td><td>2024-02-01 〜 2024-02-29</td><td>約2900万行</td></tr>
<tr class="tr-hi4"><td>access_logs_2024_06</td><td>2024-06-01 〜 2024-06-30</td><td>約3000万行</td></tr>
<tr class="tr-dim"><td>…（毎月作成）</td><td>…</td><td>…</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① 親テーブルをRANGEパーティション構成で作成</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">access_logs</span> (
    log_id     BIGINT          <span class="kw">GENERATED ALWAYS AS IDENTITY</span>, <span class="cmt">-- 自動採番（SERIAL の現代版）</span>
    user_id    VARCHAR(<span class="num">20</span>)    <span class="kw">NOT NULL</span>,
    action     VARCHAR(<span class="num">50</span>)    <span class="kw">NOT NULL</span>,
    created_at TIMESTAMPTZ     <span class="kw">NOT NULL</span>                       <span class="cmt">-- パーティションキーはNOT NULL必須</span>
) <span class="kw">PARTITION BY RANGE</span> (created_at);   <span class="cmt">-- 【超基礎】created_at の値範囲でパーティション分割</span>

<span class="cmt">-- ② 月次パーティションを作成（月初 ≦ x &lt; 翌月初）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">access_logs_2024_06</span>
    <span class="kw">PARTITION OF</span> <span class="tbl">access_logs</span>           <span class="cmt">-- 親テーブルに所属させる</span>
    <span class="kw">FOR VALUES FROM</span> (<span class="str">'2024-06-01'</span>)
                <span class="kw">TO</span> (<span class="str">'2024-07-01'</span>);   <span class="cmt">-- TO は「含まない（exclusive）」に注意</span>

<span class="cmt">-- パーティションにインデックスを作成（子テーブルに直接作る）</span>
<span class="kw">CREATE INDEX</span> idx_logs_2024_06_user
    <span class="kw">ON</span> <span class="tbl">access_logs_2024_06</span> (user_id, created_at); <span class="cmt">-- 子テーブル単位でINDEX管理</span>

<span class="cmt">-- ③ Partition Pruning が効くクエリ（6月分だけ読む）</span>
<span class="kw">SELECT</span>
    user_id,
    action,
    created_at
<span class="kw">FROM</span>  <span class="tbl">access_logs</span>                    <span class="cmt">-- 【超基礎】親テーブルに対してSELECTするだけでOK</span>
<span class="kw">WHERE</span> created_at <span class="op">&gt;=</span> <span class="str">'2024-06-01'</span>      <span class="cmt">-- パーティションキーの範囲条件 → Partition Pruningが発動</span>
  <span class="kw">AND</span> created_at  <span class="op">&lt;</span>  <span class="str">'2024-07-01'</span>     <span class="cmt">-- access_logs_2024_06 だけがスキャン対象になる</span>
  <span class="kw">AND</span> user_id     <span class="op">=</span>  <span class="str">'U001'</span>           <span class="cmt">-- さらにインデックスで絞り込む</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>;

<span class="cmt">-- ④ 古いパーティションを高速削除（DELETEの数億倍速い）</span>
<span class="kw">DROP TABLE</span> <span class="tbl">access_logs_2024_01</span>;      <span class="cmt">-- 子テーブルを丸ごと削除 → DDLなので一瞬で完了</span>
<span class="cmt">-- または親テーブルから切り離してから削除（アーカイブ用途）</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">access_logs</span>
    <span class="kw">DETACH PARTITION</span> <span class="tbl">access_logs_2024_01</span>;  <span class="cmt">-- 切り離す（テーブルとしてはまだ存在する）</span>

<span class="cmt">/*
  実行順序（SELECTクエリ）:
  1. FROM access_logs             → 親テーブルへのアクセス開始
  2. Partition Pruning             → WHERE created_at の範囲から対象パーティションを絞り込む
                                     （access_logs_2024_06 のみスキャン対象）
  3. Index Scan on idx_logs_2024_06_user → user_id + created_at でさらに絞り込む
  4. WHERE フィルタ適用             → 残った行を確認

<span class="kw">SET</span> enable_nestloop <span class="op">=</span> off;   <span class="cmt">-- Nested Loop を無効化してテスト</span>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>JOINのアルゴリズムはDBが自動選択しますが、EXPLAIN ANALYZEで「Hash Join」「Nested Loop」「Merge Join」のどれが使われているかを確認することがチューニングの第一歩です。</div></div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>ウィンドウ関数はGROUP BYと違い「行を集約して消す」のではなく「各行にウィンドウ計算結果を付与する」ものです。元の行はそのまま残り、新しい列として計算結果が追加されます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>PARTITION BY vs GROUP BY：</strong><code>PARTITION BY</code> はウィンドウ関数内でグループを定義しますが、行は消えません。<code>GROUP BY</code> は行を集約して数を減らします。「各グループ内の順位を各行に付けたい」ならPARTITION BY、「グループを1行に集約したい」ならGROUP BYを使います。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>パフォーマンスの注意点：</strong>ウィンドウ関数は内部でソートを必要とします。<code>ORDER BY</code> に使う列にインデックスがあるとソートが高速化されます。また、同じOVER()句を複数回書く場合は <code>WINDOW w AS (...)</code> で定義を共有すると読みやすく効率的です。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ウィンドウ関数の結果をWHEREで直接フィルタする：</strong><code>WHERE ROW_NUMBER() OVER (...) &lt;= 3</code> は構文エラーです。ウィンドウ関数はSELECT句の評価後に計算されるため、WHERE句では参照できません。CTEかサブクエリに包んでから外側のWHEREでフィルタしてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>「上位N件」にLIMITを使う：</strong><code>LIMIT 3</code> はテーブル全体での上位3件を返しますが、「ユーザーごとの上位3件」はLIMITでは実現できません。ユーザーごとの絞り込みにはROW_NUMBER() + PARTITION BYが唯一の解です。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：ウィンドウ関数が活躍するユースケース</div>
<div class="column-body">
ウィンドウ関数は「グループ内の比較・ランキング・時系列の変化」に特化しています。実務でよく使う場面は：①各ユーザーの最終購入日の注文を取得（ROW_NUMBER + PARTITION BY user_id ORDER BY created_at DESC）、②月次売上の累計グラフ用データ生成（SUM(amount) OVER (ORDER BY month ROWS UNBOUNDED PRECEDING)）、③売上ランキングで同率順位を正確に扱う（DENSE_RANKで2位が複数人いる場合に3位がスキップされないようにする）です。<strong>「GROUP BYで行が消えてしまって困った」ときがウィンドウ関数の出番</strong>です。
</div>
</div>
`

  num: 6,
  title: "SELECT FOR UPDATE — 行ロックと SKIP LOCKED でキューの競合を制御する",
  tags: [["r","SELECT FOR UPDATE"],["r","SKIP LOCKED"],["o","デッドロック"],["g","楽観的ロック"]],
  premise: `<p>複数のトランザクションが同じ行を更新しようとすると<em>競合（Race Condition）</em>が発生します。これを防ぐのが<strong>SELECT FOR UPDATE（行ロック）</strong>です。トランザクション開始時に対象行を先にロックし、他のトランザクションがその行を変更できないようにします。</p>
<pre><span class="cmt">-- 行ロック（SELECT FOR UPDATE）の基本構文</span>
<span class="kw">BEGIN</span>;                               <span class="cmt">-- 【超基礎】トランザクションを開始する</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">tasks</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'pending'</span>
<span class="kw">LIMIT</span>  <span class="num">1</span>
<span class="kw">FOR UPDATE</span>;                          <span class="cmt">-- 取得した行に排他ロックをかける</span>
<span class="cmt">-- この時点で他のトランザクションはこの行を変更できない（ロック解放まで待つ）</span>
<span class="kw">UPDATE</span> <span class="tbl">tasks</span> <span class="kw">SET</span> status <span class="op">=</span> <span class="str">'processing'</span> <span class="kw">WHERE</span> id <span class="op">=</span> <span class="op">?</span>;
<span class="kw">COMMIT</span>;                              <span class="cmt">-- 【超基礎】コミットするとロックが解放される</span></pre>
<div class="callout warn"><strong>デッドロックとは：</strong>トランザクションAが行1をロックして行2を待ち、トランザクションBが行2をロックして行1を待つ→ 永遠に待ち続ける状態。PostgreSQLは自動でデッドロックを検出し、一方のトランザクションをロールバックします。</div>`,
  question: `<p>ジョブキューテーブル <code>tasks</code> から複数のワーカープロセスが<em>同じジョブを重複実行しない</em>ように安全にタスクを取得する仕組みを実装してください。また、<em>SKIP LOCKED</em> を使ったスケーラブルなキュー設計と、デッドロックを避けるための原則も示してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>id (PK)</th><th>job_type</th><th>status</th><th>payload</th><th>created_at</th></tr>
    <tr><td>1</td><td>email</td><td>pending</td><td>{…}</td><td>2024-06-15 09:00</td></tr>
    <tr><td>2</td><td>report</td><td>pending</td><td>{…}</td><td>2024-06-15 09:01</td></tr>
    <tr><td>3</td><td>email</td><td>pending</td><td>{…}</td><td>2024-06-15 09:02</td></tr>
  </table></div>
</div>`,
  output: `<p>安全なキュー取得の動作：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ワーカー</th><th>取得タスク</th><th>他ワーカーへの影響</th></tr>
<tr class="tr-hi2"><td>Worker-1</td><td>id=1（ロック取得）</td><td class="tc-g">id=1はSKIPして id=2 を取得可能</td></tr>
<tr class="tr-hi2"><td>Worker-2</td><td>id=2（ロック取得）</td><td class="tc-g">id=1,2はSKIPして id=3 を取得可能</td></tr>
<tr class="tr-hi2"><td>Worker-3</td><td>id=3（ロック取得）</td><td class="tc-g">競合なし</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① FOR UPDATE SKIP LOCKED を使ったジョブキュー（競合なし・スケーラブル）</span>
<span class="kw">BEGIN</span>;   <span class="cmt">-- 【超基礎】トランザクション開始（FOR UPDATEはトランザクション内で使う）</span>

<span class="kw">WITH</span> next_task <span class="kw">AS</span> (
    <span class="kw">SELECT</span> id, job_type, payload
    <span class="kw">FROM</span>   <span class="tbl">tasks</span>
    <span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'pending'</span>         <span class="cmt">-- 未処理タスクだけを対象にする</span>
    <span class="kw">ORDER BY</span> created_at               <span class="cmt">-- FIFO（先入れ先出し）で処理順を保証</span>
    <span class="kw">LIMIT</span>  <span class="num">1</span>                          <span class="cmt">-- 1件だけ取得（1ワーカー = 1タスク）</span>
    <span class="kw">FOR UPDATE SKIP LOCKED</span>           <span class="cmt">-- 他ワーカーがロック中の行はスキップして次の行へ</span>

<span class="kw">UPDATE</span> <span class="tbl">tasks</span>

<span class="kw">WHERE</span>  id <span class="op">=</span> (SELECT id <span class="kw">FROM</span> next_task)  <span class="cmt">-- CTEで取得した行だけを更新</span>
<span class="kw">RETURNING</span> id, job_type, payload;    <span class="cmt">-- 更新した行の内容をアプリに返す</span>

<span class="kw">COMMIT</span>;   <span class="cmt">-- コミット時にロック解放。他のワーカーがこのタスクを取得できなくなる</span>

<span class="cmt">-- ② デッドロックを防ぐ原則：複数テーブルをロックする順序を統一する</span>

<span class="cmt">-- ✅ OK: ロック取得順序をアプリ全体で統一する（tasks → inventories の順なら安全）</span>

<span class="cmt">-- ③ 楽観的ロック（競合が少ない場合の代替手法）</span>

<span class="cmt">-- UPDATEの影響行数が0 = 他者が更新済み → アプリでリトライ</span>

<span class="cmt">/*
  実行順序（SKIP LOCKEDキュー取得）:
  1. BEGIN                          → トランザクション開始
  2. CTE（next_task）               → pending行を1件選択・FOR UPDATE SKIPLOCKEDでロック試行

  3. UPDATE tasks SET status=...    → CTEで取得した行のstatusを変更

<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>FOR UPDATE vs FOR UPDATE SKIP LOCKED の動作比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>構文</th><th>ロック中の行に当たったとき</th><th>適したケース</th></tr>
<tr class="tr-hi"><td>FOR UPDATE</td><td class="tc-r">ロックが解放されるまで待つ（ブロック）</td><td>厳密な順序保証が必要な場合</td></tr>
<tr class="tr-hi2"><td>FOR UPDATE SKIP LOCKED</td><td class="tc-g">その行をスキップして次の行を取得</td><td class="tc-g">ジョブキュー・並列ワーカー処理</td></tr>
<tr class="tr-hi4"><td>FOR UPDATE NOWAIT</td><td class="tc-y">ロック取得できなければ即エラー</td><td>タイムアウトなしで失敗を検知したい</td></tr>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong><code>FOR UPDATE</code> はSELECT時点で「この行は私が処理する」という宣言を行い、他のトランザクションが同じ行を変更できないようにします。銀行のATMで「現在処理中」のランプが点灯するのと同じイメージです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>SKIP LOCKED がジョブキューに最適な理由：</strong>複数のワーカーが同じpendingタスクをFOR UPDATEで取得しようとすると、先のワーカーがロックを持っている間、後のワーカーは待ち続けます。SKIP LOCKEDを使うと待たずに次のタスクへ進むため、ワーカー数を増やしてもスループットがリニアに伸びます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>楽観的ロック（Optimistic Locking）：</strong>競合が稀な場合は、FOR UPDATEによる悲観的ロックよりも楽観的ロック（versionカラム + UPDATE ... WHERE version = ）の方が並列性が高くスループットが向上します。競合が多い場合はリトライのコストが増えるため悲観的ロックが有利になります。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>長いトランザクション内でFOR UPDATEを使う：</strong>SELECT FOR UPDATE でロックを取得した後に外部APIを呼んだり、時間がかかる処理を行うと、他のトランザクションがロック解放を待ち続けてシステム全体がボトルネックになります。ロック保持時間は最小限にするために「ロック → 即更新 → コミット」を素早く完了させる設計にしてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>デッドロックをアプリで無視する：</strong>PostgreSQLはデッドロックを検出した側をROLLBACKしますが、アプリがそのエラー（ERROR 40P01: deadlock detected）を適切にキャッチしてリトライしない場合、操作が失敗したままになります。デッドロックが頻発する場合はロック順序の設計を見直すサインです。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：pg_locks でロック競合をリアルタイム監視する</div>
<div class="column-body">
本番でロック競合が発生しているかどうかを確認するには <code>SELECT * FROM pg_locks l JOIN pg_stat_activity a ON l.pid = a.pid WHERE NOT l.granted</code> を実行します。<code>granted = false</code> の行がロック待ちをしているトランザクションです。<strong>長時間ロック待ちが発生している場合は <code>pg_cancel_backend(pid)</code> でキャンセルする</strong>か、元のロック保持者のクエリを特定して改善します。CloudWatchやDatadogのDBモニタリングでも「Locks」メトリクスを監視し、スパイクが発生したら即アラートを上げる体制を作っておくことが重要です。
</div>
</div>
`

<div class="column-title">☕ 実務コラム：\COPY とCOPYの違い（権限とセキュリティ）</div>
<div class="column-body">
<code>COPY</code>（SQLコマンド）はDBサーバー上のファイルを読むため、<strong>superuser権限</strong>が必要です。一方 <code>\COPY</code>（psqlのメタコマンド）はクライアント側のファイルを読み、一般ユーザーでも実行できます。本番環境ではsuperuser権限を持つユーザーを最小化するセキュリティ要件があるため、アプリから実行する場合は <code>pg_read_server_files</code> ロールを必要最小限のユーザーに付与するか、ライブラリのCOPY APIを使うのが安全です。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q8  統計情報とANALYZE — オプティマイザを正しく動かす
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "統計情報とANALYZE — オプティマイザが誤った実行計画を選ぶ原因と対策",
  tags: [["r","ANALYZE"],["r","n_distinct"],["o","統計情報"],["g","オプティマイザ"]],
  premise: `<p>PostgreSQLのオプティマイザは<em>統計情報</em>をもとに実行計画を決定します。統計情報が古くなると「実際は100万件あるのに10件と推定してNestedLoopを選ぶ」のような<em>誤選択</em>が発生し、突然クエリが遅くなります。</p>
<pre><span class="cmt">-- 統計情報を手動で更新する</span>
<span class="kw">ANALYZE</span> <span class="tbl">orders</span>;                     <span class="cmt">-- 指定テーブルの統計を更新</span>
<span class="kw">ANALYZE</span>;                              <span class="cmt">-- 全テーブルの統計を更新</span>

<span class="cmt">-- 現在の統計情報を確認する</span>
<span class="kw">SELECT</span>
    attname         <span class="kw">AS</span> col,           <span class="cmt">-- 列名</span>
    n_distinct,                        <span class="cmt">-- 推定ユニーク値数（負数は比率を意味する）</span>
    correlation                        <span class="cmt">-- 物理順序との相関（1.0=完全昇順,-1.0=完全降順）</span>
<span class="kw">FROM</span>   pg_stats
<span class="kw">WHERE</span>  tablename <span class="op">=</span> <span class="str">'orders'</span>;</pre>
<div class="callout warn"><strong>AUTO VACUUM と ANALYZE の関係：</strong>PostgreSQLは autovacuum デーモンが自動でVACUUM・ANALYZEを実行します。しかし「大量INSERT直後」「急激なデータ増加後」は autovacuum が追いつかず統計情報が古いままになることがあります。</div>`,
  question: `<p>以下のシナリオで<em>統計情報の問題</em>を特定し、適切なANALYZE・統計精度向上の設定を示してください。</p>
<p>シナリオ：<code>events</code> テーブルに大量INSERT後、特定のevent_typeを絞り込むクエリが急に遅くなった。EXPLAIN ANALYZEを確認すると「rows=100（推定）だが actual rows=500000」と大きく乖離している。</p>
<div class="data-section">
  <div class="data-label">pg_stats での確認結果（問題発生中）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>col</th><th>n_distinct</th><th>most_common_vals</th><th>most_common_freqs</th></tr>
    <tr class="tr-hi"><td>event_type</td><td class="tc-y">5</td><td>login,purchase,view</td><td class="tc-r">0.90, 0.05, 0.04</td></tr>
    <tr><td>user_id</td><td class="tc-g">-0.95</td><td>（省略）</td><td>（省略）</td></tr>
  </table></div>
</div>`,
  output: `<p>統計情報の問題診断と対策の優先順位：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>問題</th><th>原因</th><th>対策</th></tr>
<tr class="tr-hi"><td>rows推定が大きく乖離</td><td>ANALYZEが未実施（大量INSERT後）</td><td class="tc-g">ANALYZE events を即実行</td></tr>
<tr class="tr-hi4"><td>event_typeの分布が偏っている</td><td>most_common_freqsのサンプルが古い</td><td class="tc-y">statistics_target を上げる</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① まず統計情報の現状を確認する</span>
<span class="kw">SELECT</span>
    schemaname,
    tablename,
    last_analyze,                          <span class="cmt">-- 最後に ANALYZE が実行された日時</span>
    last_autoanalyze,                      <span class="cmt">-- autovacuumによる最終ANALYZE日時</span>
    n_live_tup,                            <span class="cmt">-- 現在の行数（生きている行）</span>
    n_dead_tup,                            <span class="cmt">-- 削除済みで未回収の行数（VACUUMが必要なサイン）</span>
    n_mod_since_analyze                    <span class="cmt">-- ANALYZE後に変更された行数（大きければ統計が古い）</span>
<span class="kw">FROM</span>  pg_stat_user_tables
<span class="kw">WHERE</span> relname <span class="op">=</span> <span class="str">'events'</span>;

<span class="cmt">-- ② 統計情報を即時更新する（手動ANALYZE）</span>
<span class="kw">ANALYZE</span> <span class="tbl">events</span>;                          <span class="cmt">-- eventsテーブルの統計を今すぐ更新</span>
<span class="cmt">-- これだけでオプティマイザの推定精度が改善し実行計画が変わることが多い</span>

<span class="cmt">-- ③ 統計サンプル数を増やして精度を上げる（偏りが強い列向け）</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">events</span>
    <span class="kw">ALTER COLUMN</span> event_type
    <span class="kw">SET STATISTICS</span> <span class="num">500</span>;                   <span class="cmt">-- デフォルト100 → 500に増やす（最大10000）</span>
<span class="cmt">-- 値が多様だったり分布が偏っている列はサンプル数を増やすと推定精度が上がる</span>
<span class="kw">ANALYZE</span> <span class="tbl">events</span>;                          <span class="cmt">-- 設定変更後は再度ANALYZEを実行する</span>

<span class="cmt">-- ④ n_distinct が実態と違う場合は手動で上書きする</span>
<span class="cmt">-- 例: event_typeは実際は20種類あるのに5と推定されている場合</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">events</span>
    <span class="kw">ALTER COLUMN</span> event_type
    <span class="kw">SET</span> (n_distinct <span class="op">=</span> <span class="num">20</span>);               <span class="cmt">-- 実際の種類数を明示的に指定（オプティマイザのヒント）</span>
<span class="kw">ANALYZE</span> <span class="tbl">events</span>;

<span class="cmt">-- ⑤ autovacuumの閾値を下げる（大量更新テーブル向け）</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">events</span>
    <span class="kw">SET</span> (autovacuum_analyze_scale_factor <span class="op">=</span> <span class="num">0.01</span>);  <span class="cmt">-- デフォルト0.2(20%) → 1%の変更でANALYZEを発動</span>

<span class="cmt">-- ⑥ 統計情報の確認（ANALYZE後に偏りを確認）</span>
<span class="kw">SELECT</span>
    attname          <span class="kw">AS</span> col,
    n_distinct,                                   <span class="cmt">-- 負数は比率: -0.95 = 全行の95%が一意</span>
    most_common_vals,                             <span class="cmt">-- 最頻出の値のリスト</span>
    most_common_freqs,                            <span class="cmt">-- 各最頻出値の出現割合</span>
    histogram_bounds                              <span class="cmt">-- ヒストグラム（値の分布境界）</span>
<span class="kw">FROM</span>   pg_stats
<span class="kw">WHERE</span>  tablename <span class="op">=</span> <span class="str">'events'</span>
  <span class="kw">AND</span>  attname   <span class="op">=</span> <span class="str">'event_type'</span>;

<span class="cmt">/*
  実行順序（統計情報の確認と改善）:
  1. pg_stat_user_tables で最終ANALYZE日時と変更行数を確認
  2. ANALYZE でサンプリングして pg_stats を更新
  3. EXPLAIN ANALYZE でオプティマイザの推定が改善されたか確認
  4. 推定がまだ悪ければ SET STATISTICS で精度を上げる
  5. n_distinct が実態と乖離すれば明示的に上書き
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>統計情報が古いとオプティマイザが誤選択する（Estimated vs Actual の乖離）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>状態</th><th>DBの推定（rows）</th><th>実際の行数</th><th>選ばれる実行計画</th></tr>
<tr class="tr-hi2"><td>統計が新鮮</td><td class="tc-g">50万行</td><td class="tc-g">50万行</td><td class="tc-g">Hash Join（適切）</td></tr>
<tr class="tr-hi"><td>統計が古い（ANALYZE未実施）</td><td class="tc-r">100行（古い情報）</td><td class="tc-r">50万行（実際）</td><td class="tc-r">Nested Loop（誤選択・遅い）</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">ANALYZE 1回で推定精度が改善し、正しい実行計画が選ばれる</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>n_distinct の読み方（pg_stats の重要フィールド）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>n_distinct の値</th><th>意味</th><th>例</th></tr>
<tr class="tr-hi2"><td>正の整数（例: 5）</td><td>推定ユニーク値数 = 5種類</td><td>status列: 'pending','done','failed'など</td></tr>
<tr class="tr-hi"><td>負の小数（例: -0.95）</td><td>全行の95%が一意（高カーディナリティ）</td><td>user_id, email など</td></tr>
<tr class="tr-hi4"><td>-1.0</td><td>全行が一意（PKなど）</td><td>order_id, log_id など</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>ANALYZEはDBが「テーブルの中身をサンプリングして、どんな値がどれくらいあるか」を調べる処理です。この情報をオプティマイザが「何件くらいあるか」の推定に使います。大量INSERT後は必ずANALYZEを実行する習慣をつけましょう。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>SET STATISTICS の使い所：</strong>デフォルトのstatistics_target（100）はほとんどのテーブルで十分ですが、「値の種類が多い」「分布が偏っている」「パーティション列」などの場合は500〜1000に上げると推定精度が改善します。ただし値を上げるとANALYZEの時間とpg_statisticsのサイズが増加します。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>n_mod_since_analyze の監視：</strong><code>pg_stat_user_tables.n_mod_since_analyze</code> が行数の20%を超えている場合、autovacuumが追いついていないサインです。このメトリクスを定期的に監視してしきい値超過をアラートする運用が推奨されます。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>autovacuumを無効化する：</strong><code>autovacuum = off</code> にするとデッドタプルの回収と統計更新が止まり、テーブルが肥大化してクエリが遅くなります。パフォーマンスチューニングのつもりでautovacuumを無効化する誤った対応を見ることがあります。autovacuumは無効化せず、設定パラメータで頻度を調整してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>全テーブルにSET STATISTICS 1000を設定する：</strong>全列のstatistics_targetを高くするとANALYZEが遅くなり、pg_statisticsが肥大化します。精度改善が必要な列（偏りが強い、推定乖離が大きいとEXPLAINで確認できた列）に限定して設定してください。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：スロークエリが突然発生したときの初動対応フロー</div>
<div class="column-body">
本番で突然クエリが遅くなった場合の初動対応として：①まず <code>pg_stat_user_tables</code> で <code>n_mod_since_analyze</code> が大きいテーブルがないか確認、②大きければ <code>ANALYZE テーブル名</code> を実行、③改善しなければ <code>EXPLAIN ANALYZE BUFFERS</code> で実行計画を確認、という手順が実務の定番です。<strong>「チューニング前に必ずANALYZEを疑う」</strong>ことがトラブル解決の最速ルートです。特にデータ移行・バッチ処理後は自動的にANALYZEをパイプラインに組み込むことをお勧めします。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q9  部分インデックス — 条件付きINDEXで小さく高速に保つ
══════════════════════════════════════════════════ */
{
  num: 9,
  title: "部分インデックス（Partial Index） — WHERE付きINDEXで必要な行だけをインデックス化する",
  tags: [["r","Partial Index"],["r","WHERE付きINDEX"],["o","インデックスサイズ削減"],["g","選択的クエリ"]],
  premise: `<p><strong>部分インデックス（Partial Index）</strong>は <code>WHERE</code> 句を付きのインデックスで、<em>条件に一致する行だけ</em>をインデックスに格納します。全行をインデックス化する通常のインデックスと比べて、<em>サイズが小さく・更新コストが低く・キャッシュヒット率が高い</em>という3つのメリットがあります。</p>
<pre><span class="cmt">-- 部分インデックスの作成構文</span>
<span class="kw">CREATE INDEX</span> idx_orders_pending
    <span class="kw">ON</span> <span class="tbl">orders</span> (created_at)             <span class="cmt">-- インデックスのキー列</span>
    <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'pending'</span>;           <span class="cmt">-- この条件の行だけをインデックスに格納</span>

<span class="cmt">-- このインデックスが有効なクエリ（WHERE が一致している必要がある）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'pending'</span>             <span class="cmt">-- ✅ 部分インデックスの条件と一致 → 使われる</span>
  <span class="kw">AND</span>  created_at <span class="op">&gt;</span> <span class="str">'2024-06-01'</span>;

<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;</span> <span class="str">'2024-06-01'</span>;     <span class="cmt">-- ❌ status条件なし → 使われない</span></pre>
<div class="callout ok"><strong>部分インデックスが最も効果的なケース：</strong>「99%の行は closed/done だが、1%の pending 行だけを頻繁に参照する」のように、<em>データの偏りが大きくホット（よく参照される）行が少ない</em>テーブルに最適です。</div>`,
  question: `<p><code>notifications</code>（1億件）テーブルで、<em>未読のお知らせだけを取得するクエリ</em>が高頻度で実行されます。全件の99%は既読（is_read=true）で、未読は1%（約100万件）しかありません。通常インデックスと部分インデックスの<em>サイズ・速度・更新コストを比較</em>し、最適な設計を示してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>id (PK)</th><th>user_id</th><th>message</th><th>is_read</th><th>created_at</th></tr>
    <tr><td>1</td><td>U001</td><td>…</td><td>true（既読）</td><td>2024-01-01</td></tr>
    <tr><td class="tc-y">2</td><td>U001</td><td>…</td><td class="tc-y">false（未読）</td><td>2024-06-15</td></tr>
    <tr><td>3</td><td>U002</td><td>…</td><td>true（既読）</td><td>2024-03-10</td></tr>
    <tr class="tr-dim"><td>…</td><td>…</td><td>…</td><td class="null">…9900万行が true…</td><td>…</td></tr>
  </table></div>
</div>`,
  output: `<p>通常INDEXと部分INDEXの比較：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>指標</th><th class="tc-r">通常INDEX（is_read列全体）</th><th class="tc-g">部分INDEX（is_read=false のみ）</th></tr>
<tr><td>インデックスサイズ</td><td class="tc-r">1億行分（大）</td><td class="tc-g">100万行分（1/100 のサイズ）</td></tr>
<tr><td>キャッシュヒット率</td><td class="tc-r">低（メモリに乗りにくい）</td><td class="tc-g">高（小さいのでメモリに常駐）</td></tr>
<tr><td>UPDATE(既読化)コスト</td><td class="tc-r">全INDEX更新が必要</td><td class="tc-g">is_read=falseの行だけ更新</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① 通常のINDEX（全行対象）との比較のために定義</span>
<span class="cmt">-- ❌ 非効率: 1億行全体にINDEXを作る（is_read=true の9900万行は不要なのに格納される）</span>
<span class="kw">CREATE INDEX</span> idx_notif_user_isread_bad
    <span class="kw">ON</span> <span class="tbl">notifications</span> (user_id, is_read, created_at);   <span class="cmt">-- 全1億行がINDEXに入る</span>

<span class="cmt">-- ② 部分インデックス（未読行だけを対象）</span>
<span class="kw">CREATE INDEX</span> idx_notif_unread                         <span class="cmt">-- インデックス名（unreadと明示）</span>
    <span class="kw">ON</span> <span class="tbl">notifications</span> (user_id, created_at <span class="kw">DESC</span>)       <span class="cmt">-- ユーザー×日付（新しい順）でインデックス化</span>
    <span class="kw">WHERE</span> is_read <span class="op">=</span> <span class="kw">FALSE</span>;                             <span class="cmt">-- 未読行のみ（100万行だけがINDEXに入る）</span>
<span class="cmt">-- 結果: 1/100のサイズで同等の速度が出る</span>

<span class="cmt">-- ③ 部分インデックスが効くクエリ（WHERE に is_read=FALSE が必要）</span>
<span class="kw">SELECT</span>
    id,
    message,
    created_at
<span class="kw">FROM</span>  <span class="tbl">notifications</span>
<span class="kw">WHERE</span> user_id  <span class="op">=</span> <span class="str">'U001'</span>               <span class="cmt">-- インデックスの第1列で絞り込む</span>
  <span class="kw">AND</span> is_read  <span class="op">=</span> <span class="kw">FALSE</span>               <span class="cmt">-- 部分インデックスの条件と一致 → このINDEXが選ばれる</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>             <span class="cmt">-- インデックスのソート順と一致 → ソート不要</span>
<span class="kw">LIMIT</span> 20;                             <span class="cmt">-- 最新20件だけ取得</span>

<span class="cmt">-- ④ 既読化（is_read=true に更新）するとインデックスから削除される</span>
<span class="kw">UPDATE</span> <span class="tbl">notifications</span>
<span class="kw">SET</span>    is_read  <span class="op">=</span> <span class="kw">TRUE</span>,              <span class="cmt">-- 既読にすると部分INDEXの対象外になる → 自動でINDEXから除去</span>
       read_at  <span class="op">=</span> <span class="fn">NOW</span>()
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
  <span class="kw">AND</span>  is_read <span class="op">=</span> <span class="kw">FALSE</span>;

<span class="cmt">-- ⑤ ユニーク制約にも部分インデックスが使える</span>
<span class="cmt">-- 例: 1ユーザー1種類の招待コードは「未使用状態」でのみユニーク制約をかける</span>
<span class="kw">CREATE UNIQUE INDEX</span> idx_invite_unique_unused
    <span class="kw">ON</span> <span class="tbl">invitations</span> (user_id, code)

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
