<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLタイムゾーン基礎10選 — TIMESTAMP・AT TIME ZONE・UTC設計パターン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens ──────────────────────────────── */
  :root {
    --bg:     #0a0e13;
    --bg2:    #131920;
    --bg3:    #1c2330;
    --bg4:    #263040;
    --border: #2a3545;
    --text:   #cdd9e5;
    --dim:    #768390;
    --accent: #4dabf7;   /* blue  — primary highlight   */
    --green:  #3fb950;
    --orange: #f0883e;
    --red:    #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw:     #ff7b72;   /* SQL keyword                 */
    --fn:     #79c0ff;   /* function / type             */
    --str:    #a5d6ff;   /* string literal              */
    --num:    #f0c674;   /* numeric literal             */
    --cmt:    #6a737d;   /* comment                     */
    --tbl:    #ffa657;   /* table / column name         */
    --op:     #f0883e;   /* operator                    */
  }

  /* ── Reset & base ───────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  /* ── Site header ────────────────────────────────── */
  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex  { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim);
  }

  /* ── Sticky tabs ────────────────────────────────── */
  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none;
    border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }
  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width .2s; }

  /* ── Main layout ────────────────────────────────── */
  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Question header ────────────────────────────── */
  .q-header  { margin-bottom: 18px; }
  .q-number  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title   { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags    { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag     { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent);  border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green);   border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange);  border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple);  border: 1px solid #3a2060; }

  /* ── Accordion ──────────────────────────────────── */
  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon    { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title   { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill    { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body  { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  /* ── Typography helpers ─────────────────────────── */
  p       { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong  { color: var(--accent); font-weight: 600; }
  em      { color: var(--yellow); font-style: normal; font-weight: 600; }
  code    { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  /* ── Code block ─────────────────────────────────── */
  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  /* syntax tokens */
  .kw  { color: var(--kw);    font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--op); }
  .tz  { color: var(--purple); }  /* timezone string */

  /* ── Callouts ───────────────────────────────────── */
  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  /* ── Data section / tables ──────────────────────── */
  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables     { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap   { flex: 1; min-width: 220px; }
  .data-tbl-name   { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }


  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border); border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  /* row highlight variants */
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  /* cell color helpers */
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }


  /* ── Insight box ────────────────────────────────── */
  .insight-box { background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row   { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon  { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em     { color: var(--yellow); }
  .insight-body code   { font-size: 11px; }

  /* ── Anti-pattern box ───────────────────────────── */
  .anti-box { background: #160a0a; border: 1px solid #3a1515; border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row  { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code   { font-size: 11px; }

  /* ── Column box ─────────────────────────────────── */
  .column-box {
    background: #0d1520; border: 1px solid #1c3550; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px; border-left: 3px solid var(--fn);
  }
  .column-title { font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: .5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .column-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--fn); }

  /* ── Nav bar ────────────────────────────────────── */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }

  /* ── SQL Step Visualizer ───────────────────── */
  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;
    --sql-blue-bg:   rgba(88,166,255,0.15); --sql-blue-txt:   #58a6ff; --sql-blue-bd:   #1f6feb;
    --sql-orange-bg: rgba(227,137,59,0.15); --sql-orange-txt: #e3893b; --sql-orange-bd: #7d4e00;
    --sql-green-bg:  rgba(63,185,80,0.15);  --sql-green-txt:  #3fb950; --sql-green-bd:  #238636;
    --sql-red-bg:    rgba(248,81,73,0.12);  --sql-red-txt:    #f85149;
    --sql-grp1-bg: rgba(88,166,255,0.03);
    --sql-grp2-bg: rgba(88,166,255,0.08);
    --sql-grp3-bg: rgba(88,166,255,0.14);
    --border-radius: 6px;
    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1.5rem;
  }
  .sv-nav-btn { padding:6px 16px; border:1px solid var(--color-border-sub); border-radius:var(--border-radius); font-size:11px; background:var(--color-bg-panel); color:var(--color-txt-main); cursor:pointer; transition:all 0.2s; }
  .sv-nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .sv-nav-btn:not(:disabled):hover { border-color:var(--color-border-main); background:#1f2a38; }
  .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline:2px solid var(--sql-blue-txt); outline-offset:2px; }
  .sv-dot { height:6px; border:none; background:var(--color-border-sub); border-radius:3px; cursor:pointer; padding:0; transition:width 0.3s cubic-bezier(0.4,0,0.2,1),background 0.3s; flex-shrink:0; width:8px; }
  .sv-dot.done   { background:var(--color-border-main); }
  .sv-dot.active { background:var(--sql-blue-txt); width:24px; }
  .sv-table { border-collapse:collapse; width:100%; font-family:var(--font-mono); font-size:10px; }
  .sv-table th { padding:6px 12px; font-size:9px; font-weight:600; border:1px solid var(--color-border-sub); text-align:left; transition:all 0.3s ease; white-space:nowrap; }
  .sv-table td { padding:6px 12px; border:1px solid var(--color-border-sub); white-space:nowrap; background:var(--color-bg-base); color:var(--color-txt-main); transition:background 0.3s ease,opacity 0.3s ease; }
  .sv-table th.col-base   { background:var(--sql-blue-bg);   color:var(--sql-blue-txt); }
  .sv-table th.col-eval   { background:var(--sql-orange-bg); color:var(--sql-orange-txt); }
  .sv-table th.col-select { background:var(--sql-green-bg);  color:var(--sql-green-txt); }
  .sv-table tr.row-dimmed td { background:transparent; opacity:0.28; }
  .sv-table tr.row-grp-1 td { background:var(--sql-grp1-bg); }
  .sv-table tr.row-grp-2 td { background:var(--sql-grp2-bg); }
  .sv-table tr.row-grp-3 td { background:var(--sql-grp3-bg); }
  .sv-table td.val-pass   { background:var(--sql-green-bg) !important; border-left:2px solid var(--sql-green-txt); color:var(--sql-green-txt); font-weight:600; }
  .sv-table td.val-fail   { background:var(--sql-red-bg) !important; border-left:2px solid var(--sql-red-txt); color:var(--sql-red-txt); text-decoration:line-through; opacity:0.7; }
  .sv-table td.val-dimmed { background:transparent !important; opacity:0.2; color:var(--color-txt-muted); }
  .sql-kw { color:var(--sql-blue-txt); font-weight:600; }
  .sql-hl-from,.sql-hl-join,.sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-select,.sql-hl-sub { border-radius:3px; padding:2px 4px; color:var(--sql-orange-txt); }
  .sql-hl-from,.sql-hl-join { background:var(--sql-blue-bg); }
  .sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-sub { background:var(--sql-orange-bg); }
  .sql-hl-select { background:var(--sql-green-bg); }
  .sv-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:9px; font-weight:600; letter-spacing:0.02em; }
  .badge-blue   { background:var(--sql-blue-bg);   color:var(--sql-blue-txt);   border:1px solid var(--sql-blue-bd); }
  .badge-orange { background:var(--sql-orange-bg); color:var(--sql-orange-txt); border:1px solid var(--sql-orange-bd); }
  .badge-green  { background:var(--sql-green-bg);  color:var(--sql-green-txt);  border:1px solid var(--sql-green-bd); }
  @keyframes sv-fade-in { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  .sv-animate { animation:sv-fade-in 0.3s ease forwards; }
  .sv-mobile-collapse summary::-webkit-details-marker { display:none; }
  .sv-mobile-collapse summary { list-style:none; }
  .sv-collapse-icon { transition:transform 0.2s ease; display:inline-block; }
  .sv-mobile-collapse[open] .sv-collapse-icon { transform:rotate(180deg); }
  @media (min-width:641px) {
    .sv-mobile-collapse > summary { pointer-events:none; }
    .sv-collapse-icon { display:none !important; }
  }
  @media (max-width:640px) {
    .sv-sidebar { flex:1 1 100% !important; min-width:100% !important; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">TZ<br><span style="font-size:10px;opacity:.6">SQL</span></div>
      <div class="header-text-wrap">
        <div class="header-title">タイムゾーンで学ぶ SQL 基礎10選（TIMESTAMP / TIMESTAMPTZ / AT TIME ZONE / UTC設計 / DST / DATE_TRUNC / 多地域対応編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎〜実務</span>
      <span class="htag">タイムゾーン</span>
      <span class="htag">UTC設計</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">モダンWeb必須</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>

function initVisualizer(root, data) {
  let currentStepIndex = 0;

  function getLegendHTML(type) {
    const mkLegend = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div>
      </div>`;
    if (type === "base")   return mkLegend("blue",   "データ取得・結合対象") + dimLegend;
    if (type === "eval")   return mkLegend("orange", "評価対象の列・キー") + dimLegend + passFail;
    if (type === "group")  return mkLegend("orange", "グループ化キー・集計対象") +
      `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === "select") return mkLegend("green",  "出力対象の列") + dimLegend;
    return "";
  }

  function renderSQL(ex, stepId) {
    return ex.sql.map(t => {
      const isMatch = t.h && t.h.split(" ").includes(stepId);
      const cls = `${t.k || ""} ${isMatch ? `sql-hl-${stepId}` : ""}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join("");
  }

  function renderStepInfo(step) {
    return `

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>AT TIME ZONE は「タイムゾーンを切り替えて時刻を表示する」演算子です。UTCで保存されたデータをユーザーの地域時刻で表示する、最も基本的なタイムゾーン変換方法です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>地域名 vs 固定オフセット：</strong><code>AT TIME ZONE 'Asia/Tokyo'</code>（地域名）と <code>AT TIME ZONE '+09'</code>（固定オフセット）は通常同じ結果ですが、<em>夏時間（DST）がある地域では必ず地域名を使う必要があります。</em> <code>America/New_York</code> は季節によって -5 と -4 を自動で切り替えますが、<code>'-05'</code> の固定オフセットではDSTが反映されません。</div></div>

  title: "日付範囲クエリとタイムゾーン — 「日本時間の今日」をUTCで正しく絞り込む",
  tags: [["r","範囲クエリ"],["r","DATE_TRUNC"],["o","UTC絞り込み"],["g","SARGable"]],
  premise: `<p>DBがUTCでTIMESTAMPTZを保存している場合、<em>「日本時間(JST)の2024-06-01の注文」</em>を取得するには、JSTの0:00〜23:59をUTCに変換した範囲（前日の15:00〜当日の14:59 UTC）で絞り込む必要があります。</p>
<pre><span class="cmt">-- JST「2024-06-01」の範囲をUTCで表すと</span>
<span class="cmt">-- JST 2024-06-01 00:00:00 = UTC 2024-05-31 15:00:00</span>
<span class="cmt">-- JST 2024-06-01 23:59:59 = UTC 2024-06-01 14:59:59</span>

<span class="cmt">-- DATE_TRUNC を使ったタイムゾーン対応の日付切り捨て</span>
<span class="kw">SELECT</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'day'</span>, <span class="fn">NOW</span>() <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>)
       <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span> <span class="kw">AS</span> today_jst_as_utc;
<span class="cmt">-- 「今日のJST 0:00」をUTCのTIMESTAMPTZとして返す</span></pre>
<div class="callout warn"><strong>よくある誤り：</strong><code>WHERE created_at::DATE = '2024-06-01'</code> はセッションTZに依存します。セッションがUTCの場合「UTC日付が2024-06-01」の範囲になり、JST基準とは9時間ズレます。さらに <code>::DATE</code> によるキャストはインデックスを無効化（非SARGable）する場合があります。</div>`,
  question: `<p><code>orders</code> テーブル（<code>created_at TIMESTAMPTZ</code>、内部はUTC）から、<em>日本時間（JST）で 2024-06-01（6月1日）に作成された注文</em>を取得してください。インデックスが有効になるSARGableな範囲指定で書いてください。</p>

    <tr class="tr-hi2"><td>3</td><td>U002</td><td>2024-06-01 05:30:00+00</td><td class="tc-g">2024-06-01 14:30:00 JST（対象）</td></tr>
    <tr class="tr-hi2"><td>4</td><td>U003</td><td>2024-06-01 14:59:59+00</td><td class="tc-g">2024-06-01 23:59:59 JST（対象）</td></tr>
    <tr><td>5</td><td>U002</td><td>2024-06-01 15:00:00+00</td><td class="tc-r">2024-06-02 00:00:00 JST（翌日）</td></tr>
  </table></div>
</div>`,

<tr><th>order_id</th><th>user_id</th><th>created_at（UTC）</th><th>JST表示</th></tr>

<tr class="tr-hi2"><td>3</td><td>U002</td><td>2024-06-01 05:30:00+00</td><td class="tc-g">2024-06-01 14:30:00+09</td></tr>

</table></div>`,
  answer: `<pre><span class="cmt">-- ① 固定日付でJST範囲をUTCに変換して絞り込む（SARGable・推奨）</span>
<span class="kw">SELECT</span>
    order_id,

<span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">WHERE</span>

                <span class="cmt">-- JST 2024-06-01 00:00:00 → UTC 2024-05-31 15:00:00+00 に変換</span>
<span class="kw">AND</span> created_at  <span class="op">&lt;</span>  <span class="str">'2024-06-02 00:00:00'</span>::<span class="fn">TIMESTAMP</span> <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>;
                <span class="cmt">-- JST 2024-06-02 00:00:00 → UTC 2024-06-01 15:00:00+00 に変換</span>
                <span class="cmt">-- ✅ SARGable: created_at列を加工しないためインデックスが使える</span>

<span class="cmt">-- ② DATE_TRUNC を使って「今日のJST」を動的に計算する方法</span>

        <span class="op">+</span> <span class="fn">INTERVAL</span> <span class="str">'1 day'</span>;                             <span class="cmt">-- 翌日の0:00まで</span>

<span class="cmt">-- ❌ NG: 非SARGable + セッションTZ依存の書き方</span>
<span class="cmt">-- WHERE created_at::DATE = '2024-06-01'
--   → ::DATE でキャストするとインデックスが使えない

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>「JSTの今日」を「UTCで保存されたデータ」から取り出すには、JSTの0:00と翌日0:00をUTCに換算してから範囲検索する必要があります。JST+9時間なので「JSTの境界からマイナス9時間のUTC」を計算します。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DATE_TRUNC の二段パターン：</strong><code>DATE_TRUNC('day', NOW() AT TIME ZONE 'Asia/Tokyo') AT TIME ZONE 'Asia/Tokyo'</code> は「今日のJST 0:00をUTCのTIMESTAMPTZとして返す」便利なイディオムです。暗記するより「JSTのTIMESTAMPに変換→切り捨て→UTCのTIMESTAMPTZに戻す」の3ステップを理解することが重要です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>インデックスへの影響：</strong>WHERE句の左辺（<code>created_at</code>）を加工しなければSARGableです。<code>AT TIME ZONE</code> を定数リテラルに適用している（右辺での変換）ため、<code>created_at</code> のインデックスはそのまま使えます。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong><code>WHERE (created_at AT TIME ZONE 'Asia/Tokyo')::DATE = '2024-06-01'</code>：</strong>左辺のcreated_atカラムに変換を適用しているため非SARGableになります。左辺はカラムのみ、右辺で変換・計算を行うのが鉄則です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong><code>WHERE created_at BETWEEN '2024-06-01' AND '2024-06-01 23:59:59'</code>：</strong>UTC時刻でBETWEENを書いてもJSTの「6月1日」とは一致しません。必ずTZ変換してから範囲を計算してください。また BETWEEN は終端を含む（<=）ため、マイクロ秒単位のデータでは <code>&lt;</code> で翌日0:00を使う方が正確です。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：「レポートの日次集計がずれる」問題</div>
<div class="column-body">
「DBはUTCで保存しているのに日次レポートの件数が前日・翌日とズレる」というトラブルは、日付範囲をUTC基準で計算していることが原因のほとんどです。レポートSQL作成時は<strong>「ユーザーが見る日付のTZで0:00を計算し、そのUTC換算値で範囲検索する」</strong>ことを徹底してください。BIツール（Metabase・Lookerなど）のタイムゾーン設定も同様の問題を起こすため、BIの表示TZとSQLのTZを一致させる確認作業を日次レポートリリース前に必ず行いましょう。
</div>
</div>
`

  tags: [["r","DATE_TRUNC"],["r","GROUP BY"],["o","週次・月次集計"],["g","集計"]],
  premise: `<p><strong>DATE_TRUNC</strong> は日時を指定した精度（日・週・月・年など）で切り捨てる関数です。タイムゾーン引数を渡すことで、<em>そのTZ基準での切り捨て</em>が行えます。</p>
<pre><span class="cmt">-- UTC基準の月切り捨て（日本向けレポートには不適切なことが多い）</span>
<span class="kw">SELECT</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at) <span class="kw">AS</span> month_utc
<span class="kw">FROM</span>   <span class="tbl">orders</span>;

<span class="cmt">-- タイムゾーン引数を渡す方法（PostgreSQL 14以降 / 推奨）</span>
<span class="kw">SELECT</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at, <span class="tz">'Asia/Tokyo'</span>) <span class="kw">AS</span> month_jst_utc
<span class="kw">FROM</span>   <span class="tbl">orders</span>;
<span class="cmt">-- TIMESTAMPTZ を返す（JST基準で月初0:00を計算しUTCで返す）

-- 旧来の2段変換（PostgreSQL 13以前でも動く）</span>
<span class="kw">SELECT</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>,
           created_at <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>   <span class="cmt">-- TIMESTAMP(JST)に変換</span>
       ) <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>               <span class="cmt">-- TIMESTAMPTZ(UTC)に戻す</span>
<span class="kw">AS</span> month_jst_utc
<span class="kw">FROM</span>   <span class="tbl">orders</span>;</pre>`,

<span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, created_at)  <span class="kw">AS</span> month_utc   <span class="cmt">-- UTC基準で月の先頭に切り捨て</span>

  , <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>

<span class="kw">ORDER BY</span> <span class="num">1</span>;

*/</span></pre>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>DATE_TRUNCは「日時を指定した粒度で切り捨てる」関数です。<code>DATE_TRUNC('month', ts)</code> は「ts が属する月の1日0:00を返す」ため、GROUP BYと組み合わせると月次集計ができます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>週次集計の注意：</strong><code>DATE_TRUNC('week', ts)</code> は <em>月曜始まり</em>（ISO 8601）です。日曜始まりの週次集計が必要な場合は <code>DATE_TRUNC('week', ts + INTERVAL '1 day') - INTERVAL '1 day'</code> のような調整が必要です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>PostgreSQL 14のTZ引数：</strong><code>DATE_TRUNC(unit, ts, timezone)</code> の第3引数はPostgreSQL 14から追加されました。それ以前は二段変換パターンを使います。本番DBのバージョンを確認して使い分けてください。</div></div>
</div>

<div class="anti-box">

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>TO_CHAR で月を取り出してGROUP BYする：</strong><code>GROUP BY TO_CHAR(created_at, 'YYYY-MM')</code> はTEXT型でのグループ化になり、ソートで問題が起きます（2024-09 > 2024-10 がTEXT比較で発生）。DATE_TRUNCを使って TIMESTAMPTZ のままGROUP BYするのが正確で安全です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>集計クエリにTZ変換を入れてインデックスを無効化する：</strong>GROUP BYのためのTZ変換は集計列に対して行うためSELECT列のみの話ですが、WHERE句でも同様の変換を列に直接適用するのはNGです。WHERE句は必ずSARGableに保ちましょう（Q5参照）。</div></div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>UTCにはDSTがありません。「全てのデータをUTCで保存する」ことで、DSTによる「存在しない時刻」「重複する時刻」の問題はDBレベルでは発生しません。問題が起きるのは「ローカル時刻のリテラルを直接解釈するとき」だけです。</div></div>

  premise: `<p><strong>EXTRACT</strong> は日時から特定の要素（年・月・日・時・分・秒など）を取り出す関数です。<strong>EPOCH</strong> を使うと「UNIX エポック（1970-01-01 00:00:00 UTC）からの経過秒数」を取得でき、2つの時刻の差を秒数で計算するのに使います。</p>
<pre><span class="cmt">-- EPOCHで経過秒数を取得する</span>
<span class="kw">SELECT</span> <span class="fn">EXTRACT</span>(<span class="fn">EPOCH</span> <span class="kw">FROM</span> <span class="fn">NOW</span>());              <span class="cmt">-- 現在時刻のUnixタイムスタンプ</span>
<span class="kw">SELECT</span> <span class="fn">EXTRACT</span>(<span class="fn">EPOCH</span> <span class="kw">FROM</span> end_at <span class="op">-</span> start_at);  <span class="cmt">-- 2時刻の差を秒数で返す</span>

<span class="cmt">-- 年月日時分秒を個別に取り出す</span>
<span class="kw">SELECT</span>
    <span class="fn">EXTRACT</span>(<span class="fn">YEAR</span>   <span class="kw">FROM</span> <span class="fn">NOW</span>()),   <span class="cmt">-- 年</span>
    <span class="fn">EXTRACT</span>(<span class="fn">MONTH</span>  <span class="kw">FROM</span> <span class="fn">NOW</span>()),   <span class="cmt">-- 月 (1-12)</span>
    <span class="fn">EXTRACT</span>(<span class="fn">DOW</span>    <span class="kw">FROM</span> <span class="fn">NOW</span>()),   <span class="cmt">-- 曜日 (0=日曜〜6=土曜)</span>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>EXTRACT はSQLで「日時から特定の部分を取り出す」関数です。<code>EXTRACT(EPOCH FROM ts)</code> は特殊で「UNIX エポック（1970年1月1日UTC）からの経過秒数」を返します。2時刻の差（INTERVAL型）にもEPOCHが使え、「何秒かかったか」を計算できます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>AT TIME ZONEと組み合わせてから抽出：</strong>TIMESTAMPTZの時・分・曜日などを「特定のTZ基準」で取り出したい場合は、先に AT TIME ZONE でローカル化してから EXTRACT します。セッションTZに依存した抽出は再現性が低くバグの原因になります。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>INTERVAL演算との使い分け：</strong>経過時間を表す場合、<code>ts2 - ts1</code> は INTERVAL 型を返します（例: <code>01:45:30</code>）。一方 <code>EXTRACT(EPOCH FROM ts2 - ts1)</code> は整数（秒数）を返します。アプリAPIに「何秒」で返すならEPOCH、人間が読む「何時間何分」ならINTERVALをTO_CHARでフォーマットするのが一般的です。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>AGEで経過時間を計算してEPOCHに使う：</strong><code>EXTRACT(EPOCH FROM AGE(ts2, ts1))</code> は月・年を含むINTERVALでは月の日数が定まらないため正確な秒数を返しません。正確な秒数差は <code>EXTRACT(EPOCH FROM ts2 - ts1)</code> を使いましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>EXTRACT(DOW ...) で月曜始まりを期待する：</strong>EXTRACTの <code>DOW</code> は日曜=0、土曜=6です。ISO 8601準拠の月曜=1なら <code>EXTRACT(ISODOW FROM ts)</code> を使ってください。週次集計で曜日を間違えると集計単位がズレます。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：UnixエポックとフロントエンドのDate変換</div>
<div class="column-body">
APIレスポンスでタイムスタンプをどの形式で返すかは設計の重要な選択です。<strong>ISO 8601形式（<code>"2024-06-01T09:30:00+09:00"</code>）</strong>はTZ情報を含み可読性が高い。<strong>Unixエポック秒（<code>1717191000</code>）</strong>はTZ情報を持たず（常にUTC基準）軽量です。JavaScriptの <code>new Date(epochMs)</code> はエポックミリ秒を受け付けます（秒×1000に変換）。SQLでエポックを返す場合は <code>EXTRACT(EPOCH FROM ts)::BIGINT * 1000</code> でミリ秒に変換するのが慣例です。
</div>
</div>

      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',
        (Array.isArray(q.viz)
          ? q.viz.map((_, vIdx) => `<div class="sql-viz-wrapper" id="viz-${i}-${vIdx}" tabindex="-1" style="margin-bottom: 24px;"></div>`).join('')
          : q.viz ? `<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>` : ''
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => {
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById(`viz-${i}-${vIdx}`), v));
      } else {
        initVisualizer(document.getElementById('viz-' + i), q.viz);
      }
    }
  });
  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p,j)=> p.classList.toggle('active', j===i));
  document.querySelectorAll('.tab-btn').forEach((b,j)=> b.classList.toggle('active', j===i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1)/QS.length*100)+'%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});

let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});

</script>
</body>
</html>
