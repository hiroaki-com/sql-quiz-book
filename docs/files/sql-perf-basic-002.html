<html lang="ja">

<title>SQLパフォーマンス最適化10選 — N+1/列指定/HAVING/関数インデックス/型変換/LIKE/NULL/UNION ALL/JOIN/OFFSET（基礎編）</title>

<style>
/* ── Design tokens ── */
:root {
  --bg:     #0a0e13;
  --bg2:    #131920;
  --bg3:    #1c2330;
  --bg4:    #263040;
  --border: #2a3545;
  --text:   #cdd9e5;
  --dim:    #768390;
  --accent: #4dabf7;
  --green:  #3fb950;
  --orange: #f0883e;
  --red:    #f85149;
  --purple: #bc8cff;
  --yellow: #e3b341;
  --kw:     #ff7b72;
  --fn:     #79c0ff;
  --str:    #a5d6ff;
  --num:    #f0c674;
  --cmt:    #6a737d;
  --tbl:    #ffa657;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}

/* ── Header ── */
.site-header{background:var(--bg2)}
.header-inner{padding:16px}
.header-flex{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.header-badge{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1;white-space:nowrap}
.header-text-wrap{flex:1}
.header-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.header-tags{display:flex;gap:6px;flex-wrap:wrap}
.htag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}

/* ── Sticky tabs ── */
.sticky-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.tab-num{margin-right:5px}
.prog-wrap{height:2px;background:var(--bg4)}
.prog-fill{height:100%;background:var(--accent);transition:width .2s}

/* ── Main / Panel ── */
main{max-width:960px;margin:0 auto;padding:22px 14px 90px}
.panel{display:none}
.panel.active{display:block}

/* ── Question header ── */
.q-header{margin-bottom:18px}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;font-weight:600}
.tag-r{background:#1a2c44;color:var(--accent);border:1px solid #1e4070}
.tag-g{background:#162416;color:var(--green);border:1px solid #1e3a1e}
.tag-o{background:#2e1e0a;color:var(--orange);border:1px solid #4a2e0a}
.tag-p{background:#1e1433;color:var(--purple);border:1px solid #3a2060}

/* ── Accordion ── */
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.acc-head:hover{background:var(--bg3)}
.acc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-title{font-size:13px;font-weight:600;flex:1}
.acc-pill{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;flex-shrink:0}
.pill-blue  {background:#112233;color:var(--accent);border:1px solid #1a3a55}
.pill-green {background:#0e1f0e;color:var(--green);border:1px solid #1a3a1a}
.pill-orange{background:#1e1205;color:var(--orange);border:1px solid #3a2010}
.pill-red   {background:#1e0a0a;color:var(--red);border:1px solid #3a1010}
.pill-purple{background:#160f2a;color:var(--purple);border:1px solid #3a1a60}
.acc-chevron{color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .2s}
.acc.closed .acc-chevron{transform:rotate(-90deg)}
.acc-body{padding:14px 16px;border-top:1px solid var(--border)}
.acc.closed .acc-body{display:none}

/* ── Typography ── */
p{font-size:13.5px;margin-bottom:10px}
p:last-child{margin-bottom:0}
strong{color:var(--accent);font-weight:600}
em{color:var(--yellow);font-style:normal;font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--tbl)}

/* ── Code blocks ── */
pre{background:#060a0f;border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;margin:8px 0}
.kw {color:var(--kw);font-weight:700}
.fn {color:var(--fn)}
.tbl{color:var(--tbl)}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.op {color:var(--orange)}

/* ── Callouts ── */
.callout{border-left:3px solid var(--accent);background:#0e1e33;padding:9px 13px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px}
.callout.warn  {border-left-color:var(--yellow);background:#1e1a08}
.callout.danger{border-left-color:var(--red);background:#1e0e0e}
.callout.ok    {border-left-color:var(--green);background:#0a1e0a}

/* ── Data section ── */
.data-section{margin:14px 0}
.data-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tbl);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.data-label::before{content:'';display:block;width:3px;height:12px;background:var(--tbl);border-radius:2px}
.data-tables{display:flex;gap:14px;flex-wrap:wrap}
.data-tbl-wrap{flex:1;min-width:220px}
.data-tbl-name{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:4px}

/* ── Visual tables ── */
.tbl-wrap{overflow-x:auto;margin-bottom:4px}
table.vtbl{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#060a0f;border:1px solid var(--border);border-radius:4px;min-width:100%}
table.vtbl th{background:var(--bg3);color:var(--tbl);padding:5px 11px;border:1px solid var(--border);text-align:left;white-space:nowrap;font-weight:600}
table.vtbl td{padding:4px 11px;border:1px solid #1c2635;white-space:nowrap}
table.vtbl tr:nth-child(even) td{background:#080c12}
.tr-hi  td{background:#0e1e33!important}
.tr-hi2 td{background:#0e1e0e!important}
.tr-hi3 td{background:#1e1433!important}
.tr-hi4 td{background:#1e1a0a!important}
.tr-dim td{opacity:.4}
.tc-hi{color:var(--accent)!important;font-weight:700}
.tc-g {color:var(--green)!important;font-weight:700}
.tc-p {color:var(--purple)!important;font-weight:700}
.tc-y {color:var(--yellow)!important;font-weight:700}
.tc-o {color:var(--orange)!important;font-weight:700}
.tc-r {color:var(--red)!important;font-weight:700}
.null {color:var(--dim)!important;font-style:italic}

/* ── Flow viz ── */
.viz-flow{margin:6px 0 14px}
.step-block{margin-bottom:8px}
.step-label{display:flex;align-items:center;gap:8px;font-size:11px;font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sn1{background:#1a2744;color:var(--accent)}
.sn2{background:#1a2e1a;color:var(--green)}
.sn3{background:#2e1a2e;color:var(--purple)}
.sn4{background:#2e1a0a;color:var(--orange)}
.step-desc{color:var(--dim)}
.step-desc strong{color:var(--text)}
.arrow{text-align:center;padding:4px 0;font-size:13px;font-family:'JetBrains Mono',monospace}
.arrow-text{color:var(--dim);font-size:11px}

/* ── Insight / Anti / Column boxes ── */
.insight-box{background:#0a1520;border:1px solid #1a3a55;border-radius:8px;padding:14px 16px;margin-top:14px}
.insight-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.insight-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.insight-body{font-size:12.5px;color:var(--text);line-height:1.6}
.insight-body strong{color:var(--accent)}
.insight-body em{color:var(--yellow)}
.insight-body code{font-size:11px}

.anti-box{background:#160a0a;border:1px solid #3a1515;border-radius:8px;padding:14px 16px;margin-top:10px}
.anti-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:1px;margin-bottom:10px}
.anti-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.anti-body{font-size:12.5px;color:var(--text);line-height:1.6}
.anti-body strong{color:var(--red)}
.anti-body code{font-size:11px}

.column-box{background:#0d1520;border:1px solid #1c3550;border-left:3px solid var(--fn);border-radius:8px;padding:14px 16px;margin-top:10px}
.column-title{font-size:11px;font-weight:700;color:var(--fn);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.column-body{font-size:12.5px;color:var(--text);line-height:1.6}
.column-body strong{color:var(--fn)}

/* ── Nav ── */
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:#0e1e33}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}

/* ── Responsive ── */
@media(max-width:520px){
  .header-inner{padding:12px 10px 6px}
  .q-title{font-size:15px}
  pre{font-size:11px;padding:10px}
  table.vtbl{font-size:10.5px}
  .acc-title{font-size:12px}
  .header-badge{font-size:14px;padding:5px 8px}
  main{padding:16px 10px 60px}
  .data-tables{flex-direction:column}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">PERF</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 基礎10選（N+1回避／SELECT *の罠／HAVINGの誤用／SARGable／型変換／前方一致／NULL安全／UNION ALL／JOIN／OFFSET編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">チューニング</span>
      <span class="htag">全RDBMS対応</span>
      <span class="htag">002</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  N+1問題 — JOINで1クエリに統合する
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "N+1問題 — 「ループ中のSELECT」を1回のJOINにまとめる",
  tags: [["r","N+1問題"],["r","JOIN"],["o","ループ回避"],["g","超基礎"]],
  premise: `<p><strong>N+1問題</strong>とは、プログラム側で「1件のリストを取得した後、そのリストのN件それぞれに対して、ループで1回ずつSQLを実行してしまう」非常に遅いパターンのことです。</p>
<pre><span class="cmt">-- N+1の典型例（アプリコードのイメージ）</span>
<span class="cmt">-- ① まずユーザー一覧を取得（1回のクエリ）</span>
<span class="kw">SELECT</span> user_id, name <span class="kw">FROM</span> <span class="tbl">users</span>;  <span class="cmt">-- 1,000件見つかったとする</span>

<span class="cmt">-- ② 見つかった1,000件に対して、プログラム内でループして毎回SQLを投げる</span>
<span class="kw">SELECT</span> order_id <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="num">1</span>;
<span class="kw">SELECT</span> order_id <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="num">2</span>;
<span class="cmt">-- ... これが 1,000回繰り返される = 合計 1,001 回のクエリ！</span></pre>
<div class="callout warn"><strong>なぜ遅いのか：</strong>DBの処理自体より、プログラムとデータベースの間を行き来する「通信時間（ネットワーク往復）」が1000回発生することが原因です。SQLの世界では<strong>「必要なデータはJOINを使って1回のクエリで一気に持ってくる」</strong>のが基本中の基本です。</div>`,
  question: `<p>ユーザーの一覧と、それぞれのユーザーの「注文履歴」を同時に取得したいです。ループ処理を回避するために、<em>1回のSQLで結合（JOIN）して取得してください。</em>まだ注文したことがないユーザーも一覧に含めること。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ users（ユーザー）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>user_id</th><th>name</th></tr>
        <tr><td>1</td><td>田中</td></tr>
        <tr><td>2</td><td>鈴木</td></tr>
        <tr><td>3</td><td>佐藤</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（注文履歴）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>user_id</th><th>amount</th></tr>
        <tr><td>101</td><td>1</td><td>3000</td></tr>
        <tr><td>102</td><td>1</td><td>5000</td></tr>
        <tr><td>103</td><td>3</td><td>1500</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>期待する結果（注文がない鈴木さんもNULLで表示される）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th class="tc-g">order_id</th><th class="tc-y">amount</th></tr>
<tr class="tr-hi2"><td>1</td><td>田中</td><td class="tc-g">101</td><td class="tc-y">3000</td></tr>
<tr class="tr-hi2"><td>1</td><td>田中</td><td class="tc-g">102</td><td class="tc-y">5000</td></tr>
<tr class="tr-hi"><td>2</td><td>鈴木</td><td class="null">NULL</td><td class="null">NULL</td></tr>
<tr class="tr-hi2"><td>3</td><td>佐藤</td><td class="tc-g">103</td><td class="tc-y">1500</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 正解: LEFT JOIN を使って1回のクエリにまとめる</span>
<span class="kw">SELECT</span>                                 <span class="cmt">-- 【超基礎】データベースからデータを取り出す命令</span>
    u.user_id,                         <span class="cmt">-- 【超基礎】取得したい列を「テーブルの別名.列名」で指定</span>
    u.name,                            <span class="cmt">-- 【超基礎】カンマ区切りで複数指定</span>
    o.order_id,
    o.amount                           <span class="cmt">-- 【超基礎】最後の列にはカンマを付けない</span>
<span class="kw">FROM</span>      <span class="tbl">users</span> u                      <span class="cmt">-- 【超基礎】起点となるテーブル。u という短い別名を付ける</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">orders</span> o                     <span class="cmt">-- 【超基礎】ordersテーブルを結合。注文がない人も残すため LEFT JOIN</span>
    <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id;          <span class="cmt">-- 【超基礎】どの列を鍵にして繋ぎ合わせるかの条件を指定</span>

<span class="cmt">/*
  実行順序:
  1. FROM users u           → まずusersテーブルを用意する
  2. LEFT JOIN orders o     → user_idを鍵にしてordersテーブルを横に繋げる
  3. ON u.user_id=o.user_id → どの行同士を繋ぐかを判定する
  4. SELECT                 → 必要な列だけを切り取って結果を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>N+1問題：1,001回のクエリが発生する流れ（遅い）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>クエリ</th><th>通信の往復（ラウンドトリップ）</th><th>速度への影響</th></tr>
<tr class="tr-hi"><td>SELECT * FROM users</td><td class="tc-r">1回目</td><td class="tc-y">普通</td></tr>
<tr class="tr-hi"><td>SELECT * FROM orders WHERE user_id=1</td><td class="tc-r">2回目</td><td class="tc-r">積み重なると非常に遅い</td></tr>
<tr class="tr-hi"><td>SELECT * FROM orders WHERE user_id=2...</td><td class="tc-r">3〜1001回目</td><td class="tc-r">通信待ちだけで数秒かかる</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">JOINを使えば、DB内部で一気に処理して結果だけを1回で返してくれる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>JOINによる一括処理：1回のクエリで完結（速い）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>クエリ</th><th>通信の往復</th><th>速度への影響</th></tr>
<tr class="tr-hi2"><td>SELECT ... FROM users LEFT JOIN orders ...</td><td class="tc-g">たった1回</td><td class="tc-g">一瞬で終わる</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>N+1問題はSQLそのものの問題ではなく、「プログラムがSQLを呼び出す回数」の問題です。データベースは「1回の重い処理」より「1000回の軽い処理」の方が圧倒的に苦手です。必ず <code>JOIN</code> を使って1回でデータを取ってきましょう。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>INNER JOIN と LEFT JOIN の違い：</strong><code>INNER JOIN</code> は両方にデータがある行だけを残します（注文がない鈴木さんは消える）。<code>LEFT JOIN</code> は左側（先に書いた users テーブル）の行を全て残します。一覧表示では <code>LEFT JOIN</code> を使うことが多いです。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORM（ActiveRecordなど）に任せきりにする：</strong>フレームワークの便利機能は、デフォルトでN+1問題を発生させることが多いです。裏でどんなSQLが発行されているかをログで確認し、必要に応じて <code>includes</code> などを指定するか、生のSQLを書きましょう。</div></div>
</div>
`
},

  premise: `<p><strong>WHERE</strong> と <strong>HAVING</strong> はどちらもデータを絞り込む役割ですが、<strong>実行されるタイミング</strong>が全く異なります。<br>
<code>WHERE</code> は「グループにまとめる前（GROUP BY の前）」に実行され、<code>HAVING</code> は「まとめた後（GROUP BY の後）」に実行されます。</p>
<pre><span class="cmt">-- SQL の実行順序（超重要！）</span>
<span class="cmt">-- 1. FROM → 2. WHERE → 3. GROUP BY → 4. HAVING → 5. SELECT</span>

<span class="cmt">-- NG: まとめる前でいい条件を HAVING に書いている</span>
<span class="kw">SELECT</span> user_id, <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> user_id <span class="kw">HAVING</span> status <span class="op">=</span> <span class="str">'completed'</span>; <span class="cmt">-- ❌ 全件集計してから捨てる無駄！</span></pre>
<div class="callout warn"><strong>HAVING に書いていいのは集計関数（SUM, COUNTなど）を含む条件だけ：</strong>普通の列の条件は必ず <code>WHERE</code> に書いて、先に処理対象の行を減らしてください。</div>`,
  question: `<p><code>orders</code> テーブルから、<strong>「完了（completed）した注文の件数が 3件以上 あるユーザー」</strong>を取得したいです。現在のクエリは全て <code>HAVING</code> に書いてしまって遅いです。適切に <code>WHERE</code> と <code>HAVING</code> に分けてください。</p>
<pre><span class="cmt">-- 現在の非効率なクエリ</span>
<span class="kw">SELECT</span> user_id, <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> order_count <span class="kw">FROM</span> <span class="tbl">orders</span>
<span class="kw">GROUP BY</span> user_id
<span class="kw">HAVING</span> status <span class="op">=</span> <span class="str">'completed'</span>  <span class="cmt">-- ❌ これは WHERE に書くべき！</span>
   <span class="kw">AND</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="op">&gt;=</span> <span class="num">3</span>;        <span class="cmt">-- ✅ 集計関数なので HAVING でOK</span></pre>`,

</table></div>`,
  answer: `<pre><span class="cmt">-- 正解: 集計前の条件は WHERE、集計結果の条件は HAVING に分ける</span>

    user_id,
    <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> order_count      <span class="cmt">-- 【超基礎】グループ内の行数を数える関数</span>
<span class="kw">FROM</span> <span class="tbl">orders</span>

  3. GROUP BY user_id      → 80万件をユーザーごとにグループ化する
  4. HAVING COUNT(*) >= 3  → 集計結果（件数）が3以上のユーザーだけ残す

</table></div>
</div>
</div>
<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>SQLの実行順序を暗記してください。<code>FROM → WHERE → GROUP BY → HAVING → SELECT</code> です。データベースに楽をさせるには「できるだけ早い段階（WHERE）で不要な行を捨てる」ことが鉄則です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>HAVINGの使い方：</strong>HAVINGは「<code>COUNT(*)</code> や <code>SUM(price)</code> などの集計関数を使った条件」を書くための専用の場所だと思ってください。それ以外の単なる列の条件は全て WHERE に書きます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT で付けた別名を WHERE で使う：</strong><code>SELECT COUNT(*) AS cnt ... WHERE cnt >= 3</code> はエラーになります。なぜなら、SELECT（別名を付ける）より WHERE の方が先に実行されるからです。HAVING なら一部のDBでは許容されますが、標準SQLでは HAVING 句内に集計関数を直接書くのが正しい作法です。</div></div>
</div>
`

{

  premise: `<p>SQLにおける <strong>NULL</strong> は「ゼロ」や「空文字」ではなく、<strong>「値が不明・存在しない」</strong>という特別な状態です。<br>
そのため、普通の比較演算子（<code>=</code> や <code>!=</code>）を使うと、結果は TRUE でも FALSE でもなく <strong>UNKNOWN（不明）</strong> になり、行が取得できなくなります。</p>
<pre><span class="cmt">-- NG: = や != は NULL に対して使えない（常に結果が0件になるバグ）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> deleted_at <span class="op">=</span> <span class="kw">NULL</span>;   <span class="cmt">-- ❌ 何も返ってこない</span>

<span class="cmt">-- OK: NULLの判定には必ず IS NULL / IS NOT NULL を使う</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> deleted_at <span class="kw">IS NULL</span>;  <span class="cmt">-- ✅ 退会していないユーザー</span></pre>
<div class="callout warn"><strong>計算時のNULLの罠：</strong><code>1000 + NULL</code> の結果は <code>NULL</code> になってしまいます（不明な値に足し算しても不明なまま）。これを防ぐのが <code>COALESCE</code>（コアルス）関数です。</div>`,
  question: `<p><code>orders</code> テーブルから、送料（<code>shipping_fee</code>）を含めた「合計金額」を計算したいです。ただし、送料無料の場合は <code>shipping_fee</code> が <code>NULL</code> になっています。<br>
現在のクエリだと、送料無料の人の合計金額が <code>NULL</code> になってしまいます。<code>COALESCE</code> 関数を使って修正してください。</p>
<pre><span class="cmt">-- 現在のバグがあるクエリ</span>
<span class="kw">SELECT</span> order_id, amount <span class="op">+</span> shipping_fee <span class="kw">AS</span> total_price
<span class="kw">FROM</span> <span class="tbl">orders</span>;</pre>`,
  output: `<p>期待する結果（NULLを0として計算する）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_id</th><th>amount</th><th class="null">shipping_fee</th><th class="tc-g">total_price</th></tr>
<tr class="tr-hi2"><td>1</td><td>5000</td><td>500</td><td class="tc-g">5500</td></tr>
<tr class="tr-hi2"><td>2</td><td>8000</td><td class="null">NULL</td><td class="tc-g">8000（8000 + 0）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 正解: COALESCE関数を使って、NULLだったら 0 に変換してから足し算する</span>
<span class="kw">SELECT</span>                                          <span class="cmt">-- 【超基礎】データを取り出す命令</span>
    order_id,
    amount,
    amount <span class="op">+</span> <span class="fn">COALESCE</span>(shipping_fee, <span class="num">0</span>) <span class="kw">AS</span> total_price
    <span class="cmt">-- ✅ 【超基礎】COALESCE(列, 代わりの値) は、列がNULLなら代わりの値を返します。</span>
    <span class="cmt">-- これにより「8000 + 0 = 8000」と正しく計算されます。</span>
<span class="kw">FROM</span> <span class="tbl">orders</span>;                                    <span class="cmt">-- 【超基礎】対象のテーブル</span>

<span class="cmt">-- 参考: IS NULL の正しい使い方（WHERE句）</span>
<span class="kw">SELECT</span> order_id <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> shipping_fee <span class="kw">IS NULL</span>;

<span class="cmt">/*
  実行順序:
  1. FROM orders   → テーブルの行を1つずつ見る
  2. SELECT        → 列を計算する。shipping_feeがNULLなら0にして、amountと足す。
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>NG：NULLをそのまま計算した結果（NULLの伝播）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>計算式</th><th>結果</th><th>理由</th></tr>
<tr class="tr-hi"><td><code>8000 + NULL</code></td><td class="tc-r">NULL</td><td>「8000円と不明な金額を足したらいくら？」→「不明」になる</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">COALESCE で計算する前に「ゼロ」に変換してあげる</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>OK：COALESCE を使った結果</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>計算式</th><th>結果</th><th>理由</th></tr>
<tr class="tr-hi2"><td><code>8000 + COALESCE(NULL, 0)</code></td><td class="tc-g">8000</td><td>「不明なら0円とする」と明記したため正しく足し算できる</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>SQLのNULLによるバグは、初心者から上級者まで一番よく踏む罠です。「NULLとの <code>=</code> 比較はダメ、絶対 <code>IS NULL</code>」「NULLを足し算・引き算すると全てNULLに壊れるから <code>COALESCE</code> を使う」の2つは完全に暗記してください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(*) と COUNT(列名) の違い：</strong><code>COUNT(*)</code> はNULLを含めた「行数」を数えますが、<code>COUNT(列名)</code> は「その列がNULLではない件数」だけを数えます。これもよくある罠なので使い分けましょう。</div></div>
</div>
<div class="anti-box">

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>設計時に何でもかんでもNULLを許可する：</strong>「送料無料なら0を入れる」というテーブル設計（デフォルト値0、NOT NULL制約）にしておけば、そもそもCOALESCEは不要です。意味もなくNULLを許可するテーブル設計はバグの温床になります。</div></div>
</div>
`

<div class="callout ok"><strong>解決策：</strong>テーブル同士を <code>JOIN</code>（結合）してから、<code>GROUP BY</code>（グループ化）して集計する形に書き換えることで、一括処理になり劇的に高速化します。</div>`,

  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 002</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();
</script>
</body>
