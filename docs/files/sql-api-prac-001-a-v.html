<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL応用5選 — API実務 × テーブル変化で理解する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw);    font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout { border-left: 3px solid var(--accent); background: #0e1e33; padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px; }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: 0.4; }
  .tc-hi { color: var(--accent)  !important; font-weight: 700; }
  .tc-g  { color: var(--green)   !important; font-weight: 700; }
  .tc-p  { color: var(--purple)  !important; font-weight: 700; }
  .tc-y  { color: var(--yellow)  !important; font-weight: 700; }
  .tc-o  { color: var(--orange)  !important; font-weight: 700; }
  .tc-r  { color: var(--red)     !important; font-weight: 700; }
  .null  { color: var(--dim)     !important; font-style: italic; }


  .exec-box { background: #060a0f; border: 1px solid var(--bg4); border-radius: 6px; padding: 12px 14px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
  .exec-title { color: var(--purple); font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; }
  .exec-row { display: flex; gap: 8px; margin-bottom: 5px; align-items: flex-start; }
  .exec-n    { color: var(--dim);    width: 14px; flex-shrink: 0; }
  .exec-step { color: var(--yellow); min-width: 160px; flex-shrink: 0; }
  .exec-desc { color: var(--dim); line-height: 1.5; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .column-box {
    background: #0a1017; border: 1px solid #1a2333; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .column-title { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #8a9ad4; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .column-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: #8a9ad4; }
  .column-body code { font-size: 11px; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }
  /* ── SQL Step Visualizer ─────────────────────────────── */
  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;
    --sql-blue-bg:    rgba(88,166,255,0.15); --sql-blue-txt:   #58a6ff; --sql-blue-bd:    #1f6feb;
    --sql-orange-bg:  rgba(227,137,59,0.15); --sql-orange-txt: #e3893b; --sql-orange-bd:  #7d4e00;
    --sql-green-bg:   rgba(63,185,80,0.15);  --sql-green-txt:  #3fb950; --sql-green-bd:   #238636;
    --sql-red-bg:     rgba(248,81,73,0.12);  --sql-red-txt:    #f85149;
    --sql-grp1-bg: rgba(88,166,255,0.03);
    --sql-grp2-bg: rgba(88,166,255,0.08);
    --sql-grp3-bg: rgba(88,166,255,0.14);
    --border-radius: 6px;
    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1rem;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .sv-nav-btn { padding:6px 16px; border:1px solid var(--color-border-sub); border-radius:var(--border-radius); font-size:11px; background:var(--color-bg-panel); color:var(--color-txt-main); cursor:pointer; transition:all 0.2s; }
  .sv-nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .sv-nav-btn:not(:disabled):hover { border-color:var(--color-border-main); background:#1f2a38; }
  .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline:2px solid var(--sql-blue-txt); outline-offset:2px; }
  .sv-dot { height:6px; border:none; background:var(--color-border-sub); border-radius:3px; cursor:pointer; padding:0; transition:width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink:0; width:8px; }
  .sv-dot.done { background:var(--color-border-main); }
  .sv-dot.active { background:var(--sql-blue-txt); width:24px; }
  .sv-table { border-collapse:collapse; width:100%; font-family:var(--font-mono); font-size:10px; }
  .sv-table th { padding:6px 12px; font-size:9px; font-weight:600; border:1px solid var(--color-border-sub); text-align:left; white-space:nowrap; }
  .sv-table td { padding:6px 12px; border:1px solid var(--color-border-sub); white-space:nowrap; background:var(--color-bg-base); color:var(--color-txt-main); transition:background 0.3s ease, opacity 0.3s ease; }
  .sv-table th.col-base   { background:var(--sql-blue-bg);   color:var(--sql-blue-txt); }
  .sv-table th.col-eval   { background:var(--sql-orange-bg); color:var(--sql-orange-txt); }
  .sv-table th.col-select { background:var(--sql-green-bg);  color:var(--sql-green-txt); }
  .sv-table tr.row-dimmed td { background:transparent; opacity:0.28; }
  .sv-table tr.row-grp-1 td { background:var(--sql-grp1-bg); }
  .sv-table tr.row-grp-2 td { background:var(--sql-grp2-bg); }
  .sv-table tr.row-grp-3 td { background:var(--sql-grp3-bg); }
  .sv-table td.val-pass   { background:var(--sql-green-bg)!important; border-left:2px solid var(--sql-green-txt); color:var(--sql-green-txt); font-weight:600; }
  .sv-table td.val-fail   { background:var(--sql-red-bg)!important;   border-left:2px solid var(--sql-red-txt);   color:var(--sql-red-txt); text-decoration:line-through; opacity:0.7; }
  .sv-table td.val-dimmed { background:transparent!important; opacity:0.2; color:var(--color-txt-muted); }

  .sql-hl-from,.sql-hl-join,.sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-select,.sql-hl-sub,.sql-hl-window,.sql-hl-eval,.sql-hl-anchor,.sql-hl-recurse,.sql-hl-cte_base,.sql-hl-cte_act_prep,.sql-hl-cte_join,.sql-hl-from_raw,.sql-hl-group_totals { border-radius:3px; padding:2px 4px; color:var(--sql-orange-txt); }
  .sql-hl-from,.sql-hl-join,.sql-hl-cte_base,.sql-hl-cte_act_prep,.sql-hl-cte_join,.sql-hl-from_raw { background:var(--sql-blue-bg); color:var(--sql-blue-txt); }
  .sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-sub,.sql-hl-window,.sql-hl-eval,.sql-hl-anchor,.sql-hl-recurse,.sql-hl-group_totals { background:var(--sql-orange-bg); }
  .sql-hl-select { background:var(--sql-green-bg); color:var(--sql-green-txt); }
  .sql-kw { color:var(--sql-blue-txt); font-weight:600; }
  .cmt { color:var(--color-txt-muted); font-style:italic; }

  .sv-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:9px; font-weight:600; letter-spacing:0.02em; }
  .badge-blue   { background:var(--sql-blue-bg);   color:var(--sql-blue-txt);   border:1px solid var(--sql-blue-bd); }
  .badge-orange { background:var(--sql-orange-bg); color:var(--sql-orange-txt); border:1px solid var(--sql-orange-bd); }
  .badge-green  { background:var(--sql-green-bg);  color:var(--sql-green-txt);  border:1px solid var(--sql-green-bd); }
  @keyframes sv-fade-in { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:none;} }
  .sv-animate { animation:sv-fade-in 0.3s ease forwards; }
  .tbl-label { font-size:9px; font-weight:500; color:var(--color-txt-sub); margin-bottom:6px; }
  .sv-mobile-collapse summary::-webkit-details-marker { display:none; }
  .sv-mobile-collapse summary { list-style:none; }
  .sv-collapse-icon { transition:transform 0.2s ease; display:inline-block; }
  .sv-mobile-collapse[open] .sv-collapse-icon { transform:rotate(180deg); }
  @media (min-width:641px) {
    .sv-mobile-collapse > summary { pointer-events:none; }
    .sv-collapse-icon { display:none!important; }
  }
  @media (max-width:640px) { .sv-sidebar { flex:1 1 100%!important; min-width:100%!important; } }

</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">応用5</span></div>
      <div class="header-text-wrap">
        <div class="header-title">テーブル変化で理解する SQL 応用5選（API実務編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 中〜上級</span>
      <span class="htag">実務BI</span>
      <span class="htag">API開発</span>
      <span class="htag">PostgreSQL/BigQuery対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>

(function() {
  function getLegendHTML(type) {
    const mk = (c, t) =>
      '<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-' + c + '-bg);border:1px solid var(--sql-' + c + '-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">' + t + '</span></div>';
    const dim =
      '<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>';
    const pf =
      '<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">' +
        '<div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div>' +
        '<div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div>' +
      '</div>';
    if (type === 'base')   return mk('blue',   'データ取得・結合対象') + dim;
    if (type === 'eval')   return mk('orange', '評価対象の列・キー') + dim + pf;
    if (type === 'group')  return mk('orange', 'グループ化キー・集計対象') +
      '<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;">' +
        '<div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div>' +
        '<div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div>' +
        '<div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div>' +
      '</div><span style="color:var(--color-txt-sub)">グループ分類</span></div>';
    if (type === 'select') return mk('green',  '出力対象の列') + dim;
    return '';
  }

  function renderSQL(data, stepId) {
    return data.sql.map(function(t) {
      var isMatch = t.h && t.h.split(' ').includes(stepId);
      var cls = ((t.k || '') + ' ' + (isMatch ? 'sql-hl-' + stepId : '')).trim();

/* ═══════════════════════════════════════════════════════
   Q2  CASE WHEN ピボット — 月別×ステータスのクロス集計
═══════════════════════════════════════════════════════ */
{
  num: 2,
  title: "CASE WHEN ピボット — 月別×ステータスのクロス集計",
  tags: [["r","PIVOT"],["o","CASE WHEN"],["g","GROUP BY"],["p","ダッシュボードBI"]],
  premise: `<p>SQLには専用の <code>PIVOT</code> 構文がない場合（PostgreSQL / BigQuery など）、<strong>CASE WHEN + 集計関数</strong> の組み合わせで行を列に変換します。これは「条件付き集計」と呼ばれ、ダッシュボードAPIのレスポンス整形で極めて頻繁に登場します。</p>
<pre><span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'completed'</span> <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>)
<span class="cmt">-- ↑ 条件に合う行の amount だけ合計。合わない行は 0 として無視される</span></pre>
<div class="callout warn"><strong>ELSE 0 vs ELSE NULL の違い：</strong><br>
ELSE 0 → SUM に加算される（合計に影響しない）<br>
ELSE NULL → SUM は NULL を無視するので結果は同じ。ただし COUNT の場合は挙動が異なる。COUNT(CASE WHEN ... THEN 1 END) で NULL は除外される。</div>`,
  question: `<p>orders テーブルを使い、<em>月ごと・ステータスごとの件数と金額合計</em> を1行に横展開してください。</p>
<p>ステータス：<code>completed</code> / <code>pending</code> / <code>cancelled</code></p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（抜粋）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>ordered_at</th><th>amount</th><th>status</th></tr>
        <tr><td>1</td><td>2024-01-05</td><td>30,000</td><td>completed</td></tr>
        <tr><td>2</td><td>2024-01-12</td><td>15,000</td><td>pending</td></tr>
        <tr><td>3</td><td>2024-01-20</td><td>12,000</td><td>cancelled</td></tr>
        <tr><td>4</td><td>2024-02-03</td><td>40,000</td><td>completed</td></tr>
        <tr><td>5</td><td>2024-02-14</td><td>18,000</td><td>pending</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th>completed_count</th><th>completed_amount</th><th>pending_count</th><th>pending_amount</th><th>cancelled_count</th><th>cancelled_amount</th></tr>
<tr><td>2024-01</td><td>8</td><td>320,000</td><td>3</td><td>85,000</td><td>1</td><td>12,000</td></tr>
<tr><td>2024-02</td><td>11</td><td>480,000</td><td>2</td><td>44,000</td><td>2</td><td>28,000</td></tr>

</table></div>`,
  answer: `<pre><span class="kw">SELECT</span>
  <span class="fn">TO_CHAR</span>(ordered_at, <span class="str">'YYYY-MM'</span>) <span class="kw">AS</span> month,  <span class="cmt">-- TO_CHAR: 日時型を文字列(年月)に変換</span>

  <span class="cmt">-- completed の件数：条件に合う行のみ 1 を返し COUNT で合計</span>
  <span class="cmt">-- ※ COUNT は NULL を数えない性質を利用している。ELSE を省略すると ELSE NULL になる</span>
  <span class="fn">COUNT</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'completed'</span>  <span class="kw">THEN</span> <span class="num">1</span> <span class="kw">END</span>) <span class="kw">AS</span> completed_count,

  <span class="cmt">-- completed の金額合計：条件に合う行の amount のみ集計（他は 0 扱い）</span>
  <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'completed'</span>  <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> completed_amount,

  <span class="cmt">-- pending の件数</span>
  <span class="fn">COUNT</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'pending'</span>    <span class="kw">THEN</span> <span class="num">1</span> <span class="kw">END</span>) <span class="kw">AS</span> pending_count,

  <span class="cmt">-- pending の金額合計</span>
  <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'pending'</span>    <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> pending_amount,

  <span class="cmt">-- cancelled の件数</span>
  <span class="fn">COUNT</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'cancelled'</span>  <span class="kw">THEN</span> <span class="num">1</span> <span class="kw">END</span>) <span class="kw">AS</span> cancelled_count,

  <span class="cmt">-- cancelled の金額合計</span>
  <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'cancelled'</span>  <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> cancelled_amount

<span class="kw">FROM</span>  <span class="tbl">orders</span>                             <span class="cmt">-- FROM: 全注文データを取り出す</span>
<span class="kw">GROUP BY</span> <span class="fn">TO_CHAR</span>(ordered_at, <span class="str">'YYYY-MM'</span>)  <span class="cmt">-- GROUP BY: 抽出した年月ごとにグループ化</span>
<span class="kw">ORDER BY</span> month <span class="kw">ASC</span>;                        <span class="cmt">-- ORDER BY: 月の昇順(古い順)で出力 (ASCは省略可能)</span>

<span class="cmt">/*
  実行順序 (超基礎):
  1. FROM orders               → 全注文を準備
  2. GROUP BY TO_CHAR(...)     → 年月ごとにデータを集約する
  3. SELECT (CASE WHEN ...)    → 各グループ内で条件別に値を振り分ける
  4. COUNT / SUM               → 振り分けた結果から件数・金額を計算
  5. ORDER BY month            → 月順に並べて出力
*/</span></pre>`,
  explain: `
<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>COUNT / SUM での ELSE の違い：</strong><code>SUM(CASE WHEN ... THEN amount ELSE 0 END)</code> はゼロを加算するので全件が対象になりますが、結果は同じです。一方 COUNT では <em>ELSE 0 を付けると0もカウントされてしまう</em>ため、COUNT の場合は必ず <code>ELSE NULL</code> か省略にします。</div></div>

{

  title: "再帰CTE — 組織階層ツリーを深さ付きで全展開",
  tags: [["r","再帰CTE"],["o","WITH RECURSIVE"],["g","階層構造"],["p","組織図API"]],
  premise: `<p><strong>再帰CTE（WITH RECURSIVE）</strong> は、自分自身を参照しながら繰り返し処理を行うSQLの構文です。ツリー構造（組織階層・カテゴリ親子・コメントスレッド）の展開に使います。</p>
<pre><span class="kw">WITH RECURSIVE</span> cte <span class="kw">AS</span> (
  <span class="cmt">-- ① アンカー部（初回：ルートノードを取得）</span>
  <span class="kw">SELECT</span> id, parent_id, name, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span> <span class="tbl">employees</span>
  <span class="kw">WHERE</span> parent_id <span class="kw">IS NULL</span>  <span class="cmt">-- 親なし = トップ</span>

  <span class="kw">UNION ALL</span>               <span class="cmt">-- ② 再帰部と縦に連結</span>

  <span class="cmt">-- ③ 再帰部（前回結果に子を結合して繰り返す）</span>
  <span class="kw">SELECT</span> e.id, e.parent_id, e.name, c.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span> <span class="tbl">employees</span> e
  <span class="kw">JOIN</span> cte c <span class="kw">ON</span> e.parent_id <span class="op">=</span> c.id  <span class="cmt">-- 前回の id に子を繋ぐ</span>
)</pre>

  answer: `<pre><span class="cmt">-- WITH RECURSIVE: 再帰呼び出しを可能にするCTE構文</span>
<span class="kw">WITH RECURSIVE</span>

org_tree <span class="kw">AS</span> (

  <span class="cmt">-- ① アンカー部: 最初に実行される（parent_id が NULL のルートノードのみ取得）</span>
  <span class="kw">SELECT</span>
    emp_id,
    name,
    department,
    parent_id,
    <span class="num">0</span>    <span class="kw">AS</span> depth,           <span class="cmt">-- ルートの深さは 0 で固定（数値のハードコード）</span>
    name <span class="kw">AS</span> path            <span class="cmt">-- パスの初期値は自分の名前だけ</span>
  <span class="kw">FROM</span> <span class="tbl">employees</span>
  <span class="kw">WHERE</span> parent_id <span class="kw">IS NULL</span>  <span class="cmt">-- IS NULL: NULL である行だけを抽出する条件</span>

  <span class="kw">UNION ALL</span>               <span class="cmt">-- UNION ALL: アンカー結果と再帰結果を縦に積み上げる（重複も保持）</span>

  <span class="cmt">-- ② 再帰部: org_tree（前回結果）に子を JOIN して1階層ずつ掘り下げる</span>
  <span class="kw">SELECT</span>
    e.emp_id,
    e.name,
    e.department,
    e.parent_id,
    o.depth <span class="op">+</span> <span class="num">1</span>,            <span class="cmt">-- 親の depth に +1 して1階層深くする</span>
    o.path <span class="op">||</span> <span class="str">' &gt; '</span> <span class="op">||</span> e.name  <span class="cmt">-- || は文字列結合演算子。親のパスに自分の名前を延長する</span>
  <span class="kw">FROM</span> <span class="tbl">employees</span> e
  <span class="cmt">-- JOIN: テーブルe（全社員）とテーブルo（前回見つかった親）を結合</span>
  <span class="kw">JOIN</span> org_tree   o <span class="kw">ON</span> e.parent_id <span class="op">=</span> o.emp_id  <span class="cmt">-- e の親ID が o のID と一致するものを探す</span>
  <span class="kw">WHERE</span> o.depth <span class="op">&lt;</span> <span class="num">10</span>        <span class="cmt">-- 深さ上限：無限ループを防ぐための必須ガード</span>
)

<span class="cmt">-- ③ 最終的な出力</span>
<span class="kw">SELECT</span>
  emp_id,
  name,
  department,
  depth,
  path
<span class="kw">FROM</span>  org_tree
<span class="kw">ORDER BY</span> depth, emp_id;  <span class="cmt">-- 深さ昇順（上が先）、同じ深さは emp_id 順</span>

<span class="cmt">/*
  実行順序 (超基礎):
  1. アンカー部              → ルート行（depth=0）を取得
  2. UNION ALL + 再帰部(1回目) → 前回結果(depth=0)の子供である depth=1 の行を取得
  3. UNION ALL + 再帰部(2回目) → depth=1 の子供である depth=2 の行を取得
  4. ...繰り返し（子がなくなるか depth >= 10 で終了）
  5. 全イテレーションを縦に結合 → org_tree CTE が完成
  6. SELECT ... FROM org_tree → 結果を取り出す
  7. ORDER BY depth, emp_id  → ツリー構造順に出力
*/</span></pre>`,

  premise: `<p><strong>PERCENTILE_CONT(fraction)</strong> は順序集合集計関数（Ordered-Set Aggregate）です。fraction に <code>0.5</code> を指定すると中央値（median）が得られます。平均値は外れ値に引きずられますが、中央値は外れ値に強いため価格・リードタイム・応答時間の分析で特に重要です。</p>
<pre><span class="fn">PERCENTILE_CONT</span>(<span class="num">0.5</span>) <span class="kw">WITHIN GROUP</span> (<span class="kw">ORDER BY</span> price)
<span class="cmt">-- ↑ 0.5 = 中央値。0.9 なら上位10%のしきい値（P90）</span>

<span class="fn">PERCENTILE_DISC</span>(<span class="num">0.5</span>) <span class="kw">WITHIN GROUP</span> (<span class="kw">ORDER BY</span> price)
<span class="cmt">-- DISC: 実際に存在する値を返す。CONT: 線形補間で計算</span></pre>
<div class="callout"><strong>CONT vs DISC：</strong> 偶数個のデータで中央値を計算する場合、CONT は隣り合う2値の平均を返し、DISC は小さい方の値を返します。</div>`,

  <span class="cmt">-- P75（第3四分位）: 下位75%のしきい値</span>

  3. GROUP BY category          → カテゴリごとにデータをまとめる

  7. ORDER BY category          → カテゴリ名の昇順で出力
*/</span></pre>`,

{

  title: "複数CTE連鎖 — 登録月別コホートのリテンション率を算出",
  tags: [["r","コホート分析"],["g","複数CTE"],["o","リテンション"],["p","SaaS BI"]],
  premise: `<p><strong>コホート分析</strong>は「同じ時期に登録したユーザーグループ（コホート）が、その後どの割合で継続しているか」を追跡する分析手法です。SaaS・アプリのBI分析で必須のパターンです。</p>
<p>複数のCTEを連鎖させることで、複雑な計算を段階的に分解できます。</p>
<pre><span class="kw">WITH</span>
cohort_base <span class="kw">AS</span> (...),   <span class="cmt">-- ① 登録月ごとのコホートを定義</span>
activity    <span class="kw">AS</span> (...),   <span class="cmt">-- ② ユーザーの活動月を特定</span>
joined      <span class="kw">AS</span> (...)    <span class="cmt">-- ③ コホートと活動を結合して月差を計算</span>
<span class="kw">SELECT</span> ...               <span class="cmt">-- ④ リテンション率を集計</span></pre>
<div class="callout"><code>DATE_TRUNC('month', date)</code> は日付を月の初日に切り捨て、月単位グループ化に使います（BigQuery では <code>DATE_TRUNC(date, MONTH)</code>）。</div>`,
  question: `<p>users・orders テーブルから、<em>登録月ごとのユーザーが翌月・翌々月・3ヶ月後にどの割合でオーダーしているか</em>（リテンション率）を算出してください。</p>
<p>（リテンション率は%表示・小数点1桁とします）</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">

  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>cohort_month</th><th>cohort_size</th><th>month_0</th><th>month_1</th><th>month_2</th><th>month_3</th></tr>
<tr><td>2024-01</td><td>120</td><td>100.0%</td><td>62.5%</td><td>45.8%</td><td>38.3%</td></tr>
<tr><td>2024-02</td><td>95</td><td>100.0%</td><td>58.9%</td><td>42.1%</td><td>35.8%</td></tr>
<tr><td>2024-03</td><td>140</td><td>100.0%</td><td>65.0%</td><td>47.9%</td><td class="null">—</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 各ユーザーの「登録月（cohort_month）」を定義する</span>
cohort_base <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, registered_at) <span class="kw">AS</span> cohort_month  <span class="cmt">-- 日付を月の初日(YYYY-MM-01)に切り捨てる</span>
  <span class="kw">FROM</span> <span class="tbl">users</span>
),

<span class="cmt">-- ② 各ユーザーが注文した月を重複なく列挙する</span>
activity <span class="kw">AS</span> (
  <span class="kw">SELECT</span> <span class="kw">DISTINCT</span>  <span class="cmt">-- DISTINCT: 重複行を除去して「1ユーザーにつき1月あたり1行」にする</span>
    user_id,
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, ordered_at) <span class="kw">AS</span> active_month
  <span class="kw">FROM</span> <span class="tbl">orders</span>
),

<span class="cmt">-- ③ コホートと活動を結合し、「登録からの経過月数」を計算する</span>
cohort_activity <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    c.cohort_month,
    c.user_id,
    <span class="cmt">-- EXTRACT: 日付から年や月などの特定の要素を抽出する関数</span>
    <span class="cmt">-- 年差分×12 + 月差分 で経過月数を算出（0=登録月, 1=翌月 ...）</span>
    <span class="fn">EXTRACT</span>(<span class="kw">YEAR  FROM</span> a.active_month) <span class="op">*</span> <span class="num">12</span>
    <span class="op">+</span> <span class="fn">EXTRACT</span>(<span class="kw">MONTH FROM</span> a.active_month)
    <span class="op">-</span> <span class="fn">EXTRACT</span>(<span class="kw">YEAR  FROM</span> c.cohort_month) <span class="op">*</span> <span class="num">12</span>
    <span class="op">-</span> <span class="fn">EXTRACT</span>(<span class="kw">MONTH FROM</span> c.cohort_month) <span class="kw">AS</span> month_offset
  <span class="kw">FROM</span>  cohort_base c
  <span class="cmt">-- LEFT JOIN: activityがない（注文していない）ユーザーの行も消さずに残す</span>
  <span class="kw">LEFT JOIN</span> activity a <span class="kw">ON</span> c.user_id <span class="op">=</span> a.user_id
  <span class="kw">WHERE</span> a.active_month <span class="kw">IS NULL</span>                       <span class="cmt">-- 未活動の場合</span>
     <span class="kw">OR</span> a.active_month <span class="op">&gt;=</span> c.cohort_month             <span class="cmt">-- 登録月以降の活動のみ対象（過去の異常値を除外）</span>
)

<span class="cmt">-- ④ コホート月ごとにリテンション率を集計する</span>
<span class="kw">SELECT</span>
  <span class="fn">TO_CHAR</span>(cohort_month, <span class="str">'YYYY-MM'</span>)  <span class="kw">AS</span> cohort_month,
  <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id)           <span class="kw">AS</span> cohort_size,  <span class="cmt">-- COUNT DISTINCT: ユーザーの重複なしの純粋な人数</span>

  <span class="cmt">-- 登録月（month_0）に活動したユーザー割合 → 常に100%になる</span>
  <span class="cmt">-- ROUND(値, 1): 小数第1位で四捨五入</span>
  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">0</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_0_rate,

  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_1_rate,

  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">2</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_2_rate,

  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">3</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_3_rate

<span class="kw">FROM</span>  cohort_activity
<span class="kw">GROUP BY</span> cohort_month
<span class="kw">ORDER BY</span> cohort_month;

<span class="cmt">/*
  実行順序 (超基礎):
  1. cohort_base CTE        → 各ユーザーの登録月を定義
  2. activity CTE           → 各ユーザーの注文月を重複除去で列挙
  3. cohort_activity CTE    → ユーザーごとに登録月とのズレ（month_offset）を計算
  4. GROUP BY cohort_month  → 登録月ごとに集約
  5. COUNT(DISTINCT CASE)   → 各経過月で活動した人数を算出
  6. ÷ cohort_size × 100   → 割合（%）を計算
  7. ORDER BY cohort_month  → 登録月の古い順に出力
*/</span></pre>`,

        "bc": "badge-green",
        "label": "リテンション率 (%) の出力",
        "desc": "各月の活動ユーザー数を cohort_size で割り、×100 して ROUND(x, 1) でパーセント表示にします。month_0 は登録月のため常に 100.0% になります。",
        "type": "select",
        "cols": ["cohort_month", "cohort_size", "month_0_rate", "month_1_rate", "month_2_rate", "month_3_rate"],
        "ch": ["col-select", "col-select", "col-select", "col-select", "col-select", "col-select"],
        "rows": [
          { "v": ["2024-01", 120, "100.0%", "62.5%", "45.8%", "38.3%"] },
          { "v": ["2024-02", 95, "100.0%", "58.9%", "42.1%", "35.8%"] },
          { "v": ["2024-03", 140, "100.0%", "65.0%", "47.9%", "—"] }
        ],
        "cnt": "結果: 3行 × 6列"
      }
    ],
    "sql": [
      { "t": "WITH\n\n-- ① 各ユーザーの登録月（cohort_month）を定義\n", "k": "cmt", "h": "cte_base" },
      { "t": "cohort_base AS (\n  SELECT user_id, DATE_TRUNC('month', registered_at) AS cohort_month\n  FROM users\n),\n\n", "k": "", "h": "cte_base" },
      { "t": "-- ② 各ユーザーが注文した月を列挙\n", "k": "cmt", "h": "cte_act_prep" },
      { "t": "activity AS (\n  SELECT DISTINCT user_id, DATE_TRUNC('month', ordered_at) AS active_month\n  FROM orders\n),\n\n", "k": "", "h": "cte_act_prep" },
      { "t": "-- ③ コホートと活動を結合し、経過月数を計算\n", "k": "cmt", "h": "cte_join" },
      { "t": "cohort_activity AS (\n  SELECT c.cohort_month, c.user_id,\n    EXTRACT(YEAR FROM a.active_month) * 12 + EXTRACT(MONTH FROM a.active_month)\n    - EXTRACT(YEAR FROM c.cohort_month) * 12 - EXTRACT(MONTH FROM c.cohort_month) AS month_offset\n  FROM cohort_base c\n  LEFT JOIN activity a ON c.user_id = a.user_id\n  WHERE a.active_month IS NULL OR a.active_month >= c.cohort_month\n)\n\n", "k": "", "h": "cte_join" },
      { "t": "-- ④ リテンション率の集計\n", "k": "cmt", "h": "group select" },
      { "t": "SELECT\n  TO_CHAR(cohort_month, 'YYYY-MM') AS cohort_month,\n  COUNT(DISTINCT user_id) AS cohort_size,\n\n", "k": "", "h": "group select" },
      { "t": "  ROUND(COUNT(DISTINCT ", "k": "", "h": "select" },
      { "t": "CASE WHEN month_offset = 0 THEN user_id END", "k": "", "h": "group select" },
      { "t": ") * 100.0 / COUNT(DISTINCT user_id), 1) AS month_0_rate,\n\n  -- month_1, month_2, month_3 も同様 ...\n", "k": "cmt", "h": "select" },
      { "t": "\nFROM cohort_activity\n", "k": "", "h": "group select" },
      { "t": "GROUP BY cohort_month\n", "k": "", "h": "group" },
      { "t": "ORDER BY cohort_month;", "k": "", "h": "select" }
    ]
  }
}

]; // QS end

/* ─── UI ─── */
function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = { r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p' };
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識', q.premise)}
      ${acc('❓','pill-green','問題','問題', q.question)}
      ${acc('📊','pill-orange','出力','期待出力', q.output)}
      ${acc('✅','pill-red','回答','模範解答コード', q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',
        (Array.isArray(q.viz)
          ? q.viz.map(function(_, vIdx) { return '<div class="sql-viz-wrapper" id="viz-' + i + '-' + vIdx + '" tabindex="-1" style="margin-bottom:24px;"></div>'; }).join('')
          : (q.viz ? '<div class="sql-viz-wrapper" id="viz-' + i + '" tabindex="-1"></div>' : '')
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');


  QS.forEach(function(q, i) {
    if (!q.viz) return;
    if (Array.isArray(q.viz)) {
      q.viz.forEach(function(v, vIdx) {
        initVisualizer(document.getElementById('viz-' + i + '-' + vIdx), v);
      });
    } else {
      initVisualizer(document.getElementById('viz-' + i), q.viz);
    }
  });
    go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}


document.addEventListener('keydown', function(e) {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  var wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  if (e.key === 'ArrowRight') wrap.__viz.next();
  else wrap.__viz.prev();
});

var wasMobile = window.innerWidth <= 640;
window.addEventListener('resize', function() {
  var isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(function(el) {
      el.open = !isMobile;
    });
  }
});

buildAll();
</script>
</body>
</html>
