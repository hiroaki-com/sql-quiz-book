<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL処理ステップ可視化</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; min-height: 100vh; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
    }

    .sql-viz-wrapper {
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      --font-sans: system-ui, -apple-system, sans-serif;

      --color-bg-base:    #0d1117;
      --color-bg-panel:   #161b22;
      --color-border-main:#30363d;
      --color-border-sub: #21262d;
      --color-txt-main:   #e6edf3;
      --color-txt-sub:    #8b949e;
      --color-txt-muted:  #6e7681;

      --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
      --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
      --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
      --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;

      --sql-grp1-bg: rgba(88, 166, 255, 0.03);
      --sql-grp2-bg: rgba(88, 166, 255, 0.08);
      --sql-grp3-bg: rgba(88, 166, 255, 0.14);

      --border-radius: 6px;

      background: var(--color-bg-base);
      color: var(--color-txt-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .sv-tab { padding: 6px 14px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 13px; font-weight: 500; background: transparent; color: var(--color-txt-sub); cursor: pointer; transition: all 0.2s ease; }
    .sv-tab:hover { background: var(--color-bg-panel); }
    .sv-tab.active { background: var(--sql-blue-bg); color: var(--sql-blue-txt); border-color: var(--sql-blue-bd); }
    .sv-tab:focus-visible, .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline: 2px solid var(--sql-blue-txt); outline-offset: 2px; }

    .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 12px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
    .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }

    .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
    .sv-dot.done { background: var(--color-border-main); }
    .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }

    .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 12px; }
    .sv-table th { padding: 6px 12px; font-size: 11px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
    .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }

    .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
    .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
    .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }

    .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
    .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
    .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
    .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }

    .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
    .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
    .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }

    .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
    
    /* ハイライト用のクラス */
    .sql-hl-from, .sql-hl-join, .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-select, .sql-hl-sub, .sql-hl-case, .sql-hl-order, .sql-hl-partition {
      border-radius: 3px; padding: 2px 4px;
    }
    .sql-hl-from, .sql-hl-join { background: var(--sql-blue-bg); color: var(--sql-blue-txt); }
    .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub, .sql-hl-case, .sql-hl-order, .sql-hl-partition { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
    .sql-hl-select { background: var(--sql-green-bg); color: var(--sql-green-txt); }

    .sv-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
    .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
    .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }

    @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .sv-animate { animation: sv-fade-in 0.3s ease forwards; }

    .tbl-label { font-size: 12px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }
    .row-count { font-size: 12px; font-family: var(--font-mono); color: var(--color-txt-sub); margin-top: 8px; text-align: right; }

    .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
    .sv-mobile-collapse summary { list-style: none; }
    .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
    .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }

    @media (min-width: 641px) {
      .sv-mobile-collapse > summary { pointer-events: none; }
      .sv-collapse-icon { display: none !important; }
    }
    @media (max-width: 640px) {
      .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; }
    }
  </style>
</head>
<body>

<h2 class="sr-only">SQL処理ステップ可視化</h2>

<div class="sql-viz-wrapper">

  <div id="sv-tabs" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>

  <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">

    <div class="sv-sidebar" style="flex:0 0 300px;min-width:240px;">
      <div style="font-size:11px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
      <div id="sv-sqlbox" style="font-family:var(--font-mono);font-size:11px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>

      <details id="sv-legend-container" class="sv-mobile-collapse" style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;;background:var(--color-bg-panel);">
        <summary style="font-size:11px;font-weight:600;color:var(--color-txt-muted);letter-spacing:0.06em;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;margin:0;">
          <span>LEGEND (現在のステップ)</span>
          <span class="sv-collapse-icon" style="font-size:10px;">▼</span>
        </summary>
        <div id="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:10px;margin-top:12px;border-top:1px dashed var(--color-border-sub);padding-top:12px;"></div>
      </details>
    </div>

    <div style="flex:1;min-width:280px;max-width:100%;">
      <div id="sv-stepinfo" style="margin-bottom:16px;"></div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;" id="sv-ctrls"></div>
      <div style="font-size:11px;color:var(--color-txt-muted);margin-bottom:16px;">💡 キーボードの ← → 矢印キーでも移動できます</div>
      <div id="sv-tarea" class="sv-animate"></div>
      <div class="row-count" id="sv-rowcount"></div>
    </div>

  </div>
</div>

<script>
(() => {
  const EXERCISES = [
    {
      id: "q1", label: "Q1. INNER JOIN + WHERE",
      steps: [
        { id: "from", badge: "① FROM / INNER JOIN", bc: "badge-blue",
          label: "左: users, 右: plans",
          desc: "結合対象の2つのテーブルを準備します。INNER JOIN では、両方のテーブルに存在するキーを持つ行のみが結果に残ります。",
          type: "base", join: true,
          left: {
            label: "users (u) 左テーブル", cols: ["user_id", "user_name", "plan_id"],
            rows: [
              { v: [1, "Alice", 10] },
              { v: [2, "Bob", 20] },
              { v: [3, "Charlie", 30] },
              { v: [4, "Dave", 10] }
            ]
          },
          right: {
            label: "plans (p) 右テーブル", cols: ["plan_id", "plan_name", "price"],
            rows: [
              { v: [10, "Basic", "500"] },
              { v: [20, "Premium", "1,500"] },
              { v: [40, "Pro", "3,000"] }
            ]
          },
          cnt: "左: 4行 / 右: 3行" },

        { id: "join", badge: "② ON (結合条件)", bc: "badge-orange",
          label: "ON u.plan_id = p.plan_id",
          desc: "plan_id をキーに突き合わせます。左の Charlie (30) は右に存在せず、右の Pro (40) は左に存在しないため、両方とも除外されます（LEFT JOINとの違いです）。",
          type: "eval", join: true,
          left: {
            label: "users (u)", cols: ["user_id", "user_name", "plan_id"], ch: ["", "", "col-eval"],
            rows: [
              { v: [1, "Alice", 10], cc: ["", "", "val-pass"] },
              { v: [2, "Bob", 20], cc: ["", "", "val-pass"] },
              { c: "row-dimmed", v: [3, "Charlie", "30 ✗"], cc: ["", "", "val-fail"] },
              { v: [4, "Dave", 10], cc: ["", "", "val-pass"] }
            ]
          },
          right: {
            label: "plans (p)", cols: ["plan_id", "plan_name", "price"], ch: ["col-eval"],
            rows: [
              { v: [10, "Basic", "500"], cc: ["val-pass"] },
              { v: [20, "Premium", "1,500"], cc: ["val-pass"] },
              { c: "row-dimmed", v: ["40 ✗", "Pro", "3,000"], cc: ["val-fail"] }
            ]
          },
          cnt: "結合成功: 3行" },

        { id: "where", badge: "③ WHERE", bc: "badge-orange",
          label: "WHERE p.price >= 1000",
          desc: "結合後の仮想テーブルに対して条件を適用します。price が 1000 未満の Basic プランのユーザー（Alice, Dave）が除外されます。",
          type: "eval",
          cols: ["user_name", "u.plan_id", "plan_name", "price"],
          ch: ["", "", "", "col-eval"],
          rows: [
            { c: "row-dimmed", v: ["Alice", 10, "Basic", "500"], cc: ["", "", "", "val-fail"] },
            { v: ["Bob", 20, "Premium", "1,500"], cc: ["", "", "", "val-pass"] },
            { c: "row-dimmed", v: ["Dave", 10, "Basic", "500"], cc: ["", "", "", "val-fail"] }
          ],
          cnt: "3行 → 1行" },

        { id: "select", badge: "④ SELECT", bc: "badge-green",
          label: "SELECT u.user_name, p.plan_name",
          desc: "条件をクリアした行から、指定された列だけを抽出して最終結果とします。",
          type: "select",
          cols: ["user_name", "plan_name"],
          ch: ["col-select", "col-select"],
          rows: [
            { v: ["Bob", "Premium"] }
          ],
          cnt: "結果: 1行 × 2列" }
      ],
      sql: [
        { t: "SELECT", k: "sql-kw", h: "select" }, { t: " u.user_name, p.plan_name\n", k: "", h: "select" },
        { t: "FROM       ", k: "sql-kw", h: "from" }, { t: "users", k: "", h: "from" }, { t: " u\n", k: "", h: "from" },
        { t: "INNER JOIN ", k: "sql-kw", h: "from" }, { t: "plans", k: "", h: "from" }, { t: " p\n", k: "", h: "from" },
        { t: "  ON ", k: "sql-kw", h: "join" }, { t: "u.plan_id = p.plan_id\n", k: "", h: "join" },
        { t: "WHERE      ", k: "sql-kw", h: "where" }, { t: "p.price >= 1000;", k: "", h: "where" }
      ]
    },
    {
      id: "q2", label: "Q2. CASE式 (条件分岐)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "FROM employees",
          desc: "対象テーブル employees 全体をメモリに読み込みます。",
          type: "base",
          cols: ["emp_id", "emp_name", "salary"],
          ch: ["col-base", "col-base", "col-base"],
          rows: [
            { v: [1, "伊藤", "900,000"] },
            { v: [2, "渡辺", "600,000"] },
            { v: [3, "小林", "400,000"] },
            { v: [4, "加藤", "550,000"] }
          ], cnt: "全 4行 読込" },

        { id: "case", badge: "② CASE (評価)", bc: "badge-orange",
          label: "CASE WHEN salary >= ...",
          desc: "各行の salary の値を上から順に評価し、条件に合致した結果を新しい列（salary_class）として生成します。WHEREと違い行数は減りません。",
          type: "eval",
          cols: ["emp_name", "salary", "CASE評価結果 (salary_class)"],
          ch: ["", "col-eval", "col-eval"],
          rows: [
            { v: ["伊藤", "900,000", "High (>= 800k)"], cc: ["", "", "val-pass"] },
            { v: ["渡辺", "600,000", "Mid (>= 500k)"],  cc: ["", "", "val-pass"] },
            { v: ["小林", "400,000", "Low (ELSE)"],     cc: ["", "", "val-pass"] },
            { v: ["加藤", "550,000", "Mid (>= 500k)"],  cc: ["", "", "val-pass"] }
          ], cnt: "仮想列の追加" },

        { id: "order", badge: "③ ORDER BY", bc: "badge-orange",
          label: "ORDER BY salary DESC",
          desc: "salary が大きい順（降順）に行を並び替えます。",
          type: "eval",
          cols: ["emp_name", "salary", "salary_class"],
          ch: ["", "col-eval", ""],
          rows: [
            { v: ["伊藤", "900,000", "High"], cc: ["", "val-pass", ""] },
            { v: ["渡辺", "600,000", "Mid"],  cc: ["", "val-pass", ""] },
            { v: ["加藤", "550,000", "Mid"],  cc: ["", "val-pass", ""] },
            { v: ["小林", "400,000", "Low"],  cc: ["", "val-pass", ""] }
          ], cnt: "並び替え完了" },

        { id: "select", badge: "④ SELECT", bc: "badge-green",
          label: "SELECT emp_name, salary, salary_class",
          desc: "最終的な列を選択して結果を出力します。",
          type: "select",
          cols: ["emp_name", "salary", "salary_class"],
          ch: ["col-select", "col-select", "col-select"],
          rows: [
            { v: ["伊藤", "900,000", "High"] },
            { v: ["渡辺", "600,000", "Mid"] },
            { v: ["加藤", "550,000", "Mid"] },
            { v: ["小林", "400,000", "Low"] }
          ], cnt: "結果: 4行 × 3列" }
      ],
      sql: [
        { t: "SELECT\n", k: "sql-kw", h: "select" },
        { t: "  emp_name,\n  salary,\n", k: "", h: "select" },
        { t: "  CASE\n", k: "sql-kw", h: "case select" },
        { t: "    WHEN salary >= 800000 THEN 'High'\n    WHEN salary >= 500000 THEN 'Mid'\n    ELSE 'Low'\n", k: "", h: "case select" },
        { t: "  END ", k: "sql-kw", h: "case select" }, { t: "AS salary_class\n", k: "", h: "select" },
        { t: "FROM     ", k: "sql-kw", h: "from" }, { t: "employees\n", k: "", h: "from" },
        { t: "ORDER BY ", k: "sql-kw", h: "order" }, { t: "salary DESC;", k: "", h: "order" }
      ]
    },
    {
      id: "q3", label: "Q3. ウィンドウ関数 (ROW_NUMBER)",
      steps: [
        { id: "from", badge: "① FROM", bc: "badge-blue",
          label: "FROM products",
          desc: "対象テーブル products 全体を読み込みます。GROUP BYと異なり、後続の処理で行数は減りません。",
          type: "base",
          cols: ["id", "category", "product_name", "sales"],
          ch: ["col-base", "col-base", "col-base", "col-base"],
          rows: [
            { v: [1, "家電", "TV", 500] },
            { v: [2, "家電", "冷蔵庫", 800] },
            { v: [3, "食品", "米", 300] },
            { v: [4, "食品", "パン", 100] },
            { v: [5, "食品", "肉", 600] }
          ], cnt: "全 5行 読込" },

        { id: "partition", badge: "② PARTITION BY", bc: "badge-orange",
          label: "PARTITION BY category",
          desc: "category の値ごとに「ウィンドウ（枠）」を分割します。集約は行わず、行のまとまりを作るだけです。",
          type: "group",
          cols: ["id", "category", "product_name", "sales"],
          ch: ["", "col-eval", "", ""],
          rows: [
            { c: "row-grp-1", v: [1, "家電", "TV", 500] },
            { c: "row-grp-1", v: [2, "家電", "冷蔵庫", 800] },
            { c: "row-grp-2", v: [3, "食品", "米", 300] },
            { c: "row-grp-2", v: [4, "食品", "パン", 100] },
            { c: "row-grp-2", v: [5, "食品", "肉", 600] }
          ], cnt: "2つのウィンドウに分割" },

        { id: "order", badge: "③ ORDER BY (ウィンドウ内)", bc: "badge-orange",
          label: "ORDER BY sales DESC",
          desc: "分割された各ウィンドウ（色別）の中で、sales が大きい順に並び替えます。",
          type: "group",
          cols: ["id", "category", "product_name", "sales"],
          ch: ["", "", "", "col-eval"],
          rows: [
            { c: "row-grp-1", v: [2, "家電", "冷蔵庫", 800] },
            { c: "row-grp-1", v: [1, "家電", "TV", 500] },
            { c: "row-grp-2", v: [5, "食品", "肉", 600] },
            { c: "row-grp-2", v: [3, "食品", "米", 300] },
            { c: "row-grp-2", v: [4, "食品", "パン", 100] }
          ], cnt: "ウィンドウ内でソート" },

        { id: "select", badge: "④ SELECT / ROW_NUMBER()", bc: "badge-green",
          label: "ROW_NUMBER() OVER (...)",
          desc: "並び替えた順に、各ウィンドウ内で 1, 2, 3... と連番（rnk）を付与し、結果を出力します。",
          type: "select",
          cols: ["category", "product_name", "sales", "rnk (順位)"],
          ch: ["col-select", "col-select", "col-select", "col-select"],
          rows: [
            { c: "row-grp-1", v: ["家電", "冷蔵庫", 800, "1"] },
            { c: "row-grp-1", v: ["家電", "TV", 500, "2"] },
            { c: "row-grp-2", v: ["食品", "肉", 600, "1"] },
            { c: "row-grp-2", v: ["食品", "米", 300, "2"] },
            { c: "row-grp-2", v: ["食品", "パン", 100, "3"] }
          ], cnt: "結果: 5行 × 4列" }
      ],
      sql: [
        { t: "SELECT\n", k: "sql-kw", h: "select" },
        { t: "  category,\n  product_name,\n  sales,\n", k: "", h: "select" },
        { t: "  ROW_NUMBER() ", k: "sql-kw", h: "select" }, { t: "OVER (\n", k: "sql-kw", h: "partition order select" },
        { t: "    PARTITION BY ", k: "sql-kw", h: "partition select" }, { t: "category\n", k: "", h: "partition select" },
        { t: "    ORDER BY ", k: "sql-kw", h: "order select" }, { t: "sales DESC\n", k: "", h: "order select" },
        { t: "  ) ", k: "sql-kw", h: "select" }, { t: "AS rnk\n", k: "", h: "select" },
        { t: "FROM ", k: "sql-kw", h: "from" }, { t: "products;", k: "", h: "from" }
      ]
    }
  ];

  let currentExerciseIndex = 0;
  let currentStepIndex = 0;
  let wasMobile = window.innerWidth <= 640;

  window.addEventListener("resize", () => {
    const isMobile = window.innerWidth <= 640;
    if (wasMobile !== isMobile) {
      wasMobile = isMobile;
      document.querySelectorAll(".sv-mobile-collapse").forEach(el => el.open = !isMobile);
    }
  });

  function getLegendHTML(type) {
    const mkLegend = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:11px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:11px;">✗ 除外</span></div>
      </div>`;

    if (type === "base") return mkLegend("blue", "データ取得・結合対象") + dimLegend;
    if (type === "eval") return mkLegend("orange", "評価対象の列・キー") + dimLegend + passFail;
    if (type === "group") return mkLegend("orange", "グループ化キー・集計対象") + `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === "select") return mkLegend("green", "出力対象の列") + dimLegend;
    return "";
  }

  function renderSQL(ex, stepId) {
    return ex.sql.map(t => {
      const isMatch = t.h && t.h.split(" ").includes(stepId);
      const cls = `${t.k || ""} ${isMatch ? `sql-hl-${stepId}` : ""}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join("");
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" id="sv-stepinfo-details" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>
          <code style="font-size:11px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
          <span class="sv-collapse-icon" style="margin-left:auto;font-size:10px;color:var(--color-txt-muted);">▼</span>
        </summary>
        <div style="margin-top:12px;font-size:10px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
      </details>
    `;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ""}">${col}</th>`).join("");
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ""}">${val}</td>`).join("");
      return `<tr class="${r.c || ""}">${tds}</tr>`;
    }).join("");
    const labelHtml = label ? `<div class="tbl-label">▸ ${label}</div>` : "";
    return `<div style="flex:1;min-width:260px;">${labelHtml}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ""}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
          ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
          <div style="display:flex;align-items:center;font-size:24px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
          ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
        </div>
      `;
    }
    return buildTable("", step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? "active" : (i < currentStepIndex ? "done" : "");
      return `<button class="sv-dot ${cls}" onclick="svGoToStep(${i})" aria-label="ステップ${i+1}"></button>`;
    }).join("");
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:12px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" onclick="svGoToStep(${currentStepIndex - 1})" ${currentStepIndex === 0 ? "disabled" : ""}>← Prev</button>
        <button class="sv-nav-btn" onclick="svGoToStep(${currentStepIndex + 1})" ${currentStepIndex === total - 1 ? "disabled" : ""}>Next →</button>
      </div>
    `;
  }

  function renderAll() {
    const ex = EXERCISES[currentExerciseIndex];
    const step = ex.steps[currentStepIndex];

    document.getElementById("sv-tabs").innerHTML = EXERCISES.map((e, i) =>
      `<button class="sv-tab ${i === currentExerciseIndex ? "active" : ""}" onclick="svGoToExercise(${i})">${e.label}</button>`
    ).join("");

    document.getElementById("sv-sqlbox").innerHTML = renderSQL(ex, step.id);
    document.getElementById("sv-legend").innerHTML = getLegendHTML(step.type);
    document.getElementById("sv-stepinfo").innerHTML = renderStepInfo(step);

    const tarea = document.getElementById("sv-tarea");
    tarea.classList.remove("sv-animate");
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add("sv-animate");

    document.getElementById("sv-rowcount").innerText = step.cnt || "";
    document.getElementById("sv-ctrls").innerHTML = renderControls(ex.steps.length);

    document.querySelectorAll(".sv-mobile-collapse").forEach(el => el.open = !wasMobile);
  }

  window.svGoToExercise = (i) => { currentExerciseIndex = i; currentStepIndex = 0; renderAll(); };
  window.svGoToStep = (i) => {
    const total = EXERCISES[currentExerciseIndex].steps.length;
    if (i >= 0 && i < total) { currentStepIndex = i; renderAll(); }
  };

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") svGoToStep(currentStepIndex + 1);
    else if (e.key === "ArrowLeft") svGoToStep(currentStepIndex - 1);
  });

  renderAll();
})();
</script>
</body>
</html>
