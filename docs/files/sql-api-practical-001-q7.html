  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }

  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }

    border-left: 3px solid var(--accent); background: #0e1e33;

  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {

  table.vtbl tr:nth-child(even) td { background: #080c12; }

  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }

  .exec-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .exec-n { color: var(--dim); width: 14px; flex-shrink: 0; }
  .exec-step { color: var(--yellow); min-width: 140px; }
  .exec-desc { color: var(--dim); }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;

  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">応用7</span></div>
      <div class="header-text-wrap">
        <div class="header-title">テーブル変化で理解する SQL 応用7選（API実務編）</div>
        <div class="header-sub">NTILE / PIVOT / 再帰CTE / PERCENTILE / コホート / LEAD / FILTER</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 中〜上級</span>
      <span class="htag">実務BI</span>
      <span class="htag">API開発</span>
      <span class="htag">PostgreSQL/BigQuery対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [
/* ═══════════════════════════════════════════════════════
   Q1  NTILE — ユーザーを購入金額で4分位ランク帯に分類
═══════════════════════════════════════════════════════ */
{
  num: 1,
  title: "NTILE — ユーザーを購入金額4分位でランク帯に分類",
  tags: [["r","NTILE"],["o","4分位"],["g","CTE"],["p","セグメント分析"]],
  premise: `<p><strong>NTILE(n)</strong> は行全体を <em>n 個の等しいバケツ（桶）</em> に分割し、各行が何番目のバケツに属するかを返すウィンドウ関数です。RFM分析・顧客ランク付け・パーセンタイル帯分類などBI業務の頻出パターンです。</p>
<pre><span class="fn">NTILE</span>(<span class="num">4</span>) <span class="kw">OVER</span> (
  <span class="kw">ORDER BY</span> total_amount <span class="kw">DESC</span>  <span class="cmt">-- 高い順に並べてバケツを振る</span>
) <span class="kw">AS</span> quartile                   <span class="cmt">-- 1=上位25%, 2=次の25%... と番号がつく</span></pre>
<div class="callout"><strong>NTILE の挙動：</strong> 行数がn で割り切れない場合、余りの行は先頭のバケツに1行ずつ加算されます。例：13行を4分割 → 4,3,3,3行。</div>
<p>NTILE で得た番号に <code>CASE WHEN</code> でラベルを付けると、APIレスポンスでそのままセグメント名を返せます。</p>`,
  question: `<p>orders テーブルから各ユーザーの累計購入金額を集計し、<em>4分位（NTILE(4)）でランク帯</em>に分類してください。</p>
<p>quartile 1 → <code>'platinum'</code>、2 → <code>'gold'</code>、3 → <code>'silver'</code>、4 → <code>'bronze'</code> のラベルを付与し、購入金額の降順で出力します。</p>
<p>テーブル：orders(order_id, user_id, amount, status) / users(user_id, name)</p>
<p>出力：user_id, name, total_amount, quartile, segment</p>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>total_amount</th><th>quartile</th><th>segment</th></tr>
<tr class="tr-hi"><td>3</td><td>山田</td><td>98,000</td><td>1</td><td>platinum</td></tr>
<tr class="tr-hi"><td>1</td><td>田中</td><td>72,000</td><td>1</td><td>platinum</td></tr>
<tr class="tr-hi2"><td>5</td><td>鈴木</td><td>55,000</td><td>2</td><td>gold</td></tr>
<tr class="tr-hi2"><td>2</td><td>佐藤</td><td>34,000</td><td>2</td><td>gold</td></tr>
<tr class="tr-hi3"><td>6</td><td>高橋</td><td>21,000</td><td>3</td><td>silver</td></tr>
<tr class="tr-hi3"><td>4</td><td>木村</td><td>18,000</td><td>3</td><td>silver</td></tr>
<tr><td>7</td><td>中村</td><td>9,000</td><td>4</td><td>bronze</td></tr>
<tr><td>8</td><td>小林</td><td>3,000</td><td>4</td><td>bronze</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① ユーザーごとの累計購入金額を集計する</span>
user_totals <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_amount  <span class="cmt">-- SUM: グループ内の合計値</span>
  <span class="kw">FROM</span>  <span class="tbl">orders</span>
  <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'completed'</span>       <span class="cmt">-- 完了済みのみ集計対象</span>
  <span class="kw">GROUP BY</span> user_id               <span class="cmt">-- user_id ごとに1行に集約</span>
),

<span class="cmt">-- ② 累計金額の降順で4分位バケツ番号を振る</span>
ranked <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    total_amount,
    <span class="fn">NTILE</span>(<span class="num">4</span>) <span class="kw">OVER</span> (
      <span class="kw">ORDER BY</span> total_amount <span class="kw">DESC</span>  <span class="cmt">-- 金額の高い順に 1,2,3,4 を割り振る</span>
    ) <span class="kw">AS</span> quartile
  <span class="kw">FROM</span> user_totals
)

<span class="cmt">-- ③ usersと結合してname取得、quartileをセグメント名に変換</span>
<span class="kw">SELECT</span>
  r.user_id,
  u.name,
  r.total_amount,
  r.quartile,
  <span class="kw">CASE</span> r.quartile            <span class="cmt">-- CASE: 値ごとに異なる結果を返す条件分岐</span>
    <span class="kw">WHEN</span> <span class="num">1</span> <span class="kw">THEN</span> <span class="str">'platinum'</span>
    <span class="kw">WHEN</span> <span class="num">2</span> <span class="kw">THEN</span> <span class="str">'gold'</span>
    <span class="kw">WHEN</span> <span class="num">3</span> <span class="kw">THEN</span> <span class="str">'silver'</span>
    <span class="kw">ELSE</span>       <span class="str">'bronze'</span>
  <span class="kw">END</span> <span class="kw">AS</span> segment
<span class="kw">FROM</span>  ranked r
<span class="kw">JOIN</span>  <span class="tbl">users</span>  u <span class="kw">ON</span> r.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- JOIN: user_idが一致する行を横に結合</span>
<span class="kw">ORDER BY</span> r.total_amount <span class="kw">DESC</span>;             <span class="cmt">-- 金額降順で出力</span>

<span class="cmt">/*
  実行順序:
  1. FROM orders + WHERE       → completedのみ読み込む
  2. GROUP BY user_id          → ユーザーごとに集約
  3. SUM(amount)               → user_totals CTE 完成
  4. NTILE(4) OVER(ORDER BY)   → 全ユーザーをバケツに振り分け → ranked CTE 完成
  5. JOIN users                → name列を付加
  6. CASE quartile             → セグメント名に変換
  7. ORDER BY total_amount DESC→ 結果を金額降順で並べる
*/</span></pre>`,
  explain: `
<div class="viz-flow">

<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>user_totals CTE</strong> — GROUP BY で1ユーザー1行に集約</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th class="tc-hi">total_amount</th></tr>
<tr><td>1（田中）</td><td class="tc-hi">72,000</td></tr>
<tr><td>2（佐藤）</td><td class="tc-hi">34,000</td></tr>
<tr><td>3（山田）</td><td class="tc-hi">98,000</td></tr>
<tr><td>4（木村）</td><td class="tc-hi">18,000</td></tr>
<tr><td>5（鈴木）</td><td class="tc-hi">55,000</td></tr>
<tr><td>6（高橋）</td><td class="tc-hi">21,000</td></tr>
<tr><td>7（中村）</td><td class="tc-hi">9,000</td></tr>
<tr><td>8（小林）</td><td class="tc-hi">3,000</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">NTILE(4) OVER (ORDER BY total_amount DESC) — 降順で4等分</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>ranked CTE</strong> — 8行を4バケツに2行ずつ割り振り</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>total_amount</th><th class="tc-hi">quartile</th><th>バケツの意味</th></tr>
<tr class="tr-hi"><td>3（山田）</td><td>98,000</td><td class="tc-hi">1</td><td>上位 25%</td></tr>
<tr class="tr-hi"><td>1（田中）</td><td>72,000</td><td class="tc-hi">1</td><td>上位 25%</td></tr>
<tr class="tr-hi2"><td>5（鈴木）</td><td>55,000</td><td class="tc-g">2</td><td>上位 25〜50%</td></tr>
<tr class="tr-hi2"><td>2（佐藤）</td><td>34,000</td><td class="tc-g">2</td><td>上位 25〜50%</td></tr>
<tr class="tr-hi3"><td>6（高橋）</td><td>21,000</td><td class="tc-p">3</td><td>上位 50〜75%</td></tr>
<tr class="tr-hi3"><td>4（木村）</td><td>18,000</td><td class="tc-p">3</td><td>上位 50〜75%</td></tr>
<tr><td>7（中村）</td><td>9,000</td><td class="tc-y">4</td><td>下位 25%</td></tr>
<tr><td>8（小林）</td><td>3,000</td><td class="tc-y">4</td><td>下位 25%</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">JOIN users + CASE quartile → segment名を付与</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn3">3</span><span class="step-desc"><strong>最終出力</strong> — ラベル付きセグメント</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>total_amount</th><th>quartile</th><th class="tc-hi">segment</th></tr>
<tr class="tr-hi"><td>3</td><td>山田</td><td>98,000</td><td>1</td><td class="tc-hi">platinum</td></tr>
<tr class="tr-hi"><td>1</td><td>田中</td><td>72,000</td><td>1</td><td class="tc-hi">platinum</td></tr>

  premise: `<p>SQLには専用の <code>PIVOT</code> 構文がない場合（PostgreSQL / BigQuery など）、<strong>CASE WHEN + 集計関数</strong> の組み合わせで行を列に変換します。これは「条件付き集計」と呼ばれ、ダッシュボードAPIのレスポンス整形で極めて頻繁に登場します。</p>
<pre><span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'completed'</span> <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>)

ELSE 0 → SUM に加算される（意図通り合計に影響しない）<br>

  premise: `<p><strong>再帰CTE（WITH RECURSIVE）</strong> は、自分自身を参照しながら繰り返し処理を行うSQLの構文です。ツリー構造（組織階層・カテゴリ親子・コメントスレッド）の展開に使います。</p>
<pre><span class="kw">WITH RECURSIVE</span> cte <span class="kw">AS</span> (
  <span class="cmt">-- ① アンカー部（初回：ルートノードを取得）</span>
  <span class="kw">SELECT</span> id, parent_id, name, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span> <span class="tbl">employees</span>
  <span class="kw">WHERE</span> parent_id <span class="kw">IS NULL</span>  <span class="cmt">-- 親なし = トップ</span>

  <span class="kw">UNION ALL</span>               <span class="cmt">-- ② 再帰部と連結</span>

  <span class="cmt">-- ③ 再帰部（前回結果に子を結合して繰り返す）</span>
  <span class="kw">SELECT</span> e.id, e.parent_id, e.name, c.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span> <span class="tbl">employees</span> e
  <span class="kw">JOIN</span> cte c <span class="kw">ON</span> e.parent_id <span class="op">=</span> c.id  <span class="cmt">-- 前回の id に子を繋ぐ</span>
)</pre>
<div class="callout warn">無限ループ防止のため、必ず <code>depth &lt; n</code> や <code>LIMIT</code> で深さ上限を設けること。DBによっては <code>MAXRECURSION</code> オプションもある。</div>`,

/* ═══════════════════════════════════════════════════════
   Q5  コホート分析 — 登録月別リテンション率の算出
═══════════════════════════════════════════════════════ */
{
  num: 5,
  title: "複数CTE連鎖 — 登録月別コホートのリテンション率を算出",
  tags: [["r","コホート分析"],["g","複数CTE"],["o","リテンション"],["p","SaaS BI"]],
  premise: `<p><strong>コホート分析</strong>は「同じ時期に登録したユーザーグループ（コホート）が、その後どの割合で継続しているか」を追跡する分析手法です。SaaS・アプリのBI分析で必須のパターンです。</p>
<p>複数のCTEを連鎖させることで、複雑な計算を段階的に分解できます。</p>
<pre><span class="kw">WITH</span>
cohort_base <span class="kw">AS</span> (...),   <span class="cmt">-- ① 登録月ごとのコホートを定義</span>
activity    <span class="kw">AS</span> (...),   <span class="cmt">-- ② ユーザーの活動月を特定</span>
joined      <span class="kw">AS</span> (...)    <span class="cmt">-- ③ コホートと活動を結合して月差を計算</span>
<span class="kw">SELECT</span> ...               <span class="cmt">-- ④ リテンション率を集計</span></pre>
<div class="callout"><code>DATE_TRUNC('month', date)</code> は日付を月の初日に切り捨て、コホートの月単位グループ化に使います（BigQuery では <code>DATE_TRUNC(date, MONTH)</code>）。</div>`,
  question: `<p>users・orders テーブルから、<em>登録月ごとのユーザーが翌月・翌々月・3ヶ月後にどの割合でオーダーしているか</em>（リテンション率）を算出してください。</p>
<p>テーブル：users(user_id, registered_at) / orders(order_id, user_id, ordered_at)</p>
<p>出力：cohort_month, cohort_size, month_0_rate, month_1_rate, month_2_rate, month_3_rate（%表示・小数点1桁）</p>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>cohort_month</th><th>cohort_size</th><th>month_0</th><th>month_1</th><th>month_2</th><th>month_3</th></tr>
<tr><td>2024-01</td><td>120</td><td>100.0%</td><td>62.5%</td><td>45.8%</td><td>38.3%</td></tr>
<tr><td>2024-02</td><td>95</td><td>100.0%</td><td>58.9%</td><td>42.1%</td><td>35.8%</td></tr>
<tr><td>2024-03</td><td>140</td><td>100.0%</td><td>65.0%</td><td>47.9%</td><td class="null">—</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 各ユーザーの「登録月（cohort_month）」を定義する</span>
cohort_base <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, registered_at) <span class="kw">AS</span> cohort_month  <span class="cmt">-- 月の初日に切り捨て</span>
  <span class="kw">FROM</span> <span class="tbl">users</span>
),

<span class="cmt">-- ② 各ユーザーが注文した月を重複なく列挙する</span>
activity <span class="kw">AS</span> (
  <span class="kw">SELECT</span> <span class="kw">DISTINCT</span>
    user_id,
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, ordered_at) <span class="kw">AS</span> active_month  <span class="cmt">-- 注文した月</span>
  <span class="kw">FROM</span> <span class="tbl">orders</span>
),

<span class="cmt">-- ③ コホートと活動を結合し、「登録からの経過月数」を計算する</span>
cohort_activity <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    c.cohort_month,
    c.user_id,
    <span class="cmt">-- 活動月と登録月の月差（0=登録月, 1=翌月 ...）</span>
    <span class="fn">EXTRACT</span>(<span class="kw">YEAR  FROM</span> a.active_month) <span class="op">*</span> <span class="num">12</span>
    <span class="op">+</span> <span class="fn">EXTRACT</span>(<span class="kw">MONTH FROM</span> a.active_month)
    <span class="op">-</span> <span class="fn">EXTRACT</span>(<span class="kw">YEAR  FROM</span> c.cohort_month) <span class="op">*</span> <span class="num">12</span>
    <span class="op">-</span> <span class="fn">EXTRACT</span>(<span class="kw">MONTH FROM</span> c.cohort_month) <span class="kw">AS</span> month_offset  <span class="cmt">-- 経過月数</span>
  <span class="kw">FROM</span>  cohort_base c
  <span class="kw">LEFT JOIN</span> activity a <span class="kw">ON</span> c.user_id <span class="op">=</span> a.user_id  <span class="cmt">-- LEFT JOIN: 注文がないユーザーも残す</span>
  <span class="kw">WHERE</span> a.active_month <span class="kw">IS NULL</span>
     <span class="kw">OR</span> a.active_month <span class="op">&gt;=</span> c.cohort_month             <span class="cmt">-- 登録月以降のみ対象</span>
)

<span class="cmt">-- ④ コホート月ごとにリテンション率を集計する</span>
<span class="kw">SELECT</span>
  <span class="fn">TO_CHAR</span>(cohort_month, <span class="str">'YYYY-MM'</span>)  <span class="kw">AS</span> cohort_month,
  <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id)           <span class="kw">AS</span> cohort_size,    <span class="cmt">-- コホートの総人数</span>

  <span class="cmt">-- 各月の継続率: その月に活動したユーザー数 / コホート全体</span>
  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">0</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_0_rate,

  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_1_rate,

  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">2</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_2_rate,

  <span class="fn">ROUND</span>(<span class="fn">COUNT</span>(<span class="kw">DISTINCT CASE WHEN</span> month_offset <span class="op">=</span> <span class="num">3</span> <span class="kw">THEN</span> user_id <span class="kw">END</span>) <span class="op">*</span> <span class="num">100.0</span>
    <span class="op">/</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id), <span class="num">1</span>)  <span class="kw">AS</span> month_3_rate

<span class="kw">FROM</span>  cohort_activity
<span class="kw">GROUP BY</span> cohort_month
<span class="kw">ORDER BY</span> cohort_month;

<span class="cmt">/*
  実行順序:
  1. cohort_base CTE        → 各ユーザーの登録月を定義
  2. activity CTE           → 各ユーザーの注文月を重複除去で列挙
  3. cohort_activity CTE    → 登録月とのずれ（month_offset）を計算
  4. GROUP BY cohort_month  → 登録月ごとに集約
  5. COUNT(DISTINCT CASE)   → 各経過月の活動ユーザー数を算出
  6. ÷ cohort_size × 100   → リテンション率（%）に変換
  7. ORDER BY cohort_month  → 登録月の昇順で出力
*/</span></pre>`,
  explain: `

with_interval <span class="kw">AS</span> (

  premise: `<p><strong>FILTER (WHERE ...)</strong> は PostgreSQL 9.4+ で使える集計関数の拡張構文です。<code>SUM(CASE WHEN ... END)</code> と同じ結果を、より可読性高く記述できます。BI向けのダッシュボードAPIで複数条件を1クエリにまとめる際に非常に有効です。</p>
<pre><span class="cmt">-- 旧来の書き方（Q2で学んだパターン）</span>
<span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> status <span class="op">=</span> <span class="str">'completed'</span> <span class="kw">THEN</span> amount <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>)

<span class="cmt">-- FILTER を使った書き方（同じ結果・より直感的）</span>
<span class="fn">SUM</span>(amount) <span class="kw">FILTER</span> (<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'completed'</span>)</pre>
<div class="callout"><strong>FILTER の利点：</strong> COUNT・AVG・MAX にも使えます。特に <code>COUNT(*) FILTER (WHERE ...)</code> は <code>COUNT(CASE WHEN ... THEN 1 END)</code> よりも明快です。</div>
<div class="callout warn">FILTER 構文は <strong>PostgreSQL / DuckDB / SQLite 3.30+</strong> で使えますが、<strong>BigQuery・MySQL・SQL Server は未対応</strong> です。移植性が必要な場合は CASE WHEN を使いましょう。</div>`,

  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','基礎文法・概念',q.premise)}
      ${acc('❓','pill-green','問題','何を求めるか',q.question)}
      ${acc('📊','pill-orange','出力例','期待する結果',q.output)}
      ${acc('✅','pill-red','模範回答','SQL（コメント付き）',q.answer)}
      ${acc('🔍','pill-blue','解説','テーブル変化の可視化',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));

  const activeTab = document.getElementById('tabRow').children[i];
  if(activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});

  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
