  .site-header { background: var(--bg2); }

  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;

  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }

  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .viz-flow { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }
  .step-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green); }
  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }
  .step-desc { color: var(--dim); }
  .step-desc strong { color: var(--text); }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: 0.4; }
  .tc-hi { color: var(--accent) !important; font-weight: 700; }
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }

  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }
</style>
</head>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">BASIC</span></div>
      <div class="header-text-wrap">
        <div class="header-title">WebApp API・バッチ処理で学ぶ SQL 基礎文法10選（SELECT/WHERE/JOIN/GROUP BY/INSERT/UPDATE/DELETE/CTE/サブクエリ/CASE WHEN編）</div>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  SELECT + WHERE + ORDER BY
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "SELECT + WHERE + ORDER BY — APIレスポンスの基本データ取得パターン",
  tags: [["r","SELECT"],["r","WHERE"],["r","ORDER BY"],["g","API取得"]],
  premise: `<p><strong>SELECT</strong> はテーブルから行・列を取り出す最基本の命令です。<strong>WHERE</strong> で条件絞り込み、<strong>ORDER BY</strong> で並び順を制御します。</p>
<pre><span class="kw">SELECT</span>   col1, col2                 <span class="cmt">-- 取得したい列を列挙（* で全列）</span>
<span class="kw">FROM</span>     <span class="tbl">table_name</span>               <span class="cmt">-- 対象テーブル</span>
<span class="kw">WHERE</span>    col1 <span class="op">=</span> <span class="str">'value'</span>           <span class="cmt">-- 絞り込み条件（省略可）</span>
<span class="kw">ORDER BY</span> col2 <span class="kw">DESC</span>;               <span class="cmt">-- 並び順（ASC=昇順/DESC=降順、省略時はASC）</span></pre>
<div class="callout"><strong>WHERE の比較演算子：</strong><code>=</code>（等しい）、<code>!=</code> または <code>&lt;&gt;</code>（等しくない）、<code>&gt;</code> <code>&lt;</code> <code>&gt;=</code> <code>&lt;=</code>（大小比較）、<code>LIKE '%word%'</code>（部分一致）、<code>IN (a, b, c)</code>（複数値いずれか）、<code>IS NULL</code>（NULL判定） — <code>= NULL</code> は <strong>NG</strong></div>
<p>APIでユーザー一覧を返すエンドポイントでは、<em>WHERE で active なユーザーだけ絞り、ORDER BY で最新順にする</em>のが定石です。</p>`,
  question: `<p><code>users</code> テーブルから、<em>status が 'active' かつ plan が 'premium' のユーザー</em>を、<em>created_at の新しい順</em>で取得してください。取得する列は <code>user_id, name, email, created_at</code> のみとします。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ users</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>user_id</th><th>name</th><th>email</th><th>status</th><th>plan</th><th>created_at</th></tr>
        <tr><td>1</td><td>田中 太郎</td><td>tanaka@ex.com</td><td>active</td><td>premium</td><td>2024-03-10</td></tr>
        <tr><td>2</td><td>佐藤 花子</td><td>sato@ex.com</td><td>inactive</td><td>premium</td><td>2024-02-01</td></tr>
        <tr><td>3</td><td>鈴木 一郎</td><td>suzuki@ex.com</td><td>active</td><td>free</td><td>2024-04-05</td></tr>
        <tr><td>4</td><td>山田 次郎</td><td>yamada@ex.com</td><td>active</td><td>premium</td><td>2024-01-20</td></tr>
        <tr><td>5</td><td>伊藤 三郎</td><td>ito@ex.com</td><td>active</td><td>premium</td><td>2024-05-15</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>期待する出力（active + premium のみ、created_at 降順）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>email</th><th class="tc-hi">created_at</th></tr>
<tr class="tr-hi"><td>5</td><td>伊藤 三郎</td><td>ito@ex.com</td><td class="tc-hi">2024-05-15</td></tr>
<tr class="tr-hi"><td>1</td><td>田中 太郎</td><td>tanaka@ex.com</td><td class="tc-hi">2024-03-10</td></tr>
<tr class="tr-hi"><td>4</td><td>山田 次郎</td><td>yamada@ex.com</td><td class="tc-hi">2024-01-20</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px">※ user_id:2(inactive)・3(free) は除外</p>`,
  answer: `<pre><span class="kw">SELECT</span>
  user_id,                          <span class="cmt">-- ユーザーID</span>
  name,                             <span class="cmt">-- 氏名</span>
  email,                            <span class="cmt">-- メールアドレス</span>
  created_at                        <span class="cmt">-- 登録日時</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>                         <span class="cmt">-- 対象テーブル</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'active'</span>           <span class="cmt">-- 条件①: active ユーザーのみ</span>
  <span class="kw">AND</span>  plan   <span class="op">=</span> <span class="str">'premium'</span>          <span class="cmt">-- 条件②: AND で複数条件を AND 結合</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>;          <span class="cmt">-- 登録日の新しい順（DESC=降順）</span>

<span class="cmt">/*
  実行順序（SQLの論理的な評価順）:
  1. FROM users          → テーブル全行を読み込む
  2. WHERE status='active' AND plan='premium'
                         → 2条件をANDで絞り込む → 3行残る
  3. SELECT user_id, name, email, created_at
                         → 必要な列だけ射影（列を選択）する
  4. ORDER BY created_at DESC
                         → 登録日の降順に並び替える
  ★ SELECT は FROM・WHERE より後に評価される（書く順番と実行順は異なる）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>FROM で全行読み込み → WHERE で絞り込む</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>status</th><th>plan</th><th>WHERE通過?</th></tr>
<tr class="tr-hi2"><td>1</td><td>田中 太郎</td><td class="tc-g">active</td><td class="tc-g">premium</td><td class="tc-g">✓ 残る</td></tr>
<tr class="tr-dim"><td>2</td><td>佐藤 花子</td><td class="tc-r">inactive</td><td>premium</td><td class="tc-r">✗ 除外</td></tr>
<tr class="tr-dim"><td>3</td><td>鈴木 一郎</td><td>active</td><td class="tc-r">free</td><td class="tc-r">✗ 除外</td></tr>
<tr class="tr-hi2"><td>4</td><td>山田 次郎</td><td class="tc-g">active</td><td class="tc-g">premium</td><td class="tc-g">✓ 残る</td></tr>
<tr class="tr-hi2"><td>5</td><td>伊藤 三郎</td><td class="tc-g">active</td><td class="tc-g">premium</td><td class="tc-g">✓ 残る</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">SELECT で列を絞り → ORDER BY created_at DESC で並び替え</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>最終結果（created_at 降順）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>email</th><th class="tc-hi">created_at</th></tr>
<tr class="tr-hi"><td>5</td><td>伊藤 三郎</td><td>ito@ex.com</td><td class="tc-hi">2024-05-15 ← 最新</td></tr>
<tr class="tr-hi"><td>1</td><td>田中 太郎</td><td>tanaka@ex.com</td><td class="tc-hi">2024-03-10</td></tr>
<tr class="tr-hi"><td>4</td><td>山田 次郎</td><td>yamada@ex.com</td><td class="tc-hi">2024-01-20 ← 最古</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>APIエンドポイントの定番パターン：</strong><code>GET /users?status=active&plan=premium</code> のようなクエリパラメータを WHERE 条件に変換するのが最頻出パターン。アプリ層でパラメータを受け取りバインド変数（プリペアドステートメント）で安全にSQL化する。</div></div>

  premise: `<p><strong>GROUP BY</strong> は指定した列の値ごとに行をグループ化し、<strong>集計関数</strong>（COUNT/SUM/AVG/MAX/MIN）でグループ内を1行に集約します。<strong>HAVING</strong> は集計後の結果をさらに絞り込みます（WHERE の集計後バージョン）。</p>
<pre><span class="kw">SELECT</span>   col1,
         <span class="fn">COUNT</span>(<span class="op">*</span>)    <span class="kw">AS</span> cnt,    <span class="cmt">-- COUNT(*): グループ内の全行数</span>
         <span class="fn">SUM</span>(col2)   <span class="kw">AS</span> total,  <span class="cmt">-- SUM: 合計</span>
         <span class="fn">AVG</span>(col2)   <span class="kw">AS</span> avg     <span class="cmt">-- AVG: 平均</span>
<span class="kw">FROM</span>     <span class="tbl">table_name</span>
<span class="kw">GROUP BY</span> col1                    <span class="cmt">-- col1 の値ごとにグループ化</span>
<span class="kw">HAVING</span>   <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="op">&gt;</span> <span class="num">1</span>;          <span class="cmt">-- HAVING: 集計後の絞り込み（WHERE は集計前）</span></pre>
<div class="callout warn"><strong>WHERE と HAVING の違い：</strong>WHERE は GROUP BY の前（個々の行を絞り込む）、HAVING は GROUP BY の後（集計結果を絞り込む）。<code>HAVING COUNT(*) > 5</code> のように集計関数を条件にする場合は必ず HAVING を使う。</div>`,

  premise: `<p><strong>DELETE</strong> はテーブルから行を物理的に削除します。一方、<strong>論理削除</strong>は行を消さず <code>deleted_at</code> 列に削除日時を記録するパターンで、API開発では論理削除が主流です。</p>
<pre><span class="cmt">-- 物理削除（完全に消える・元に戻せない）</span>
<span class="kw">DELETE FROM</span> <span class="tbl">table_name</span>             <span class="cmt">-- 対象テーブル</span>
<span class="kw">WHERE</span> id <span class="op">=</span> <span class="num">1</span>;                       <span class="cmt">-- 必須！省略すると全行削除</span>

<span class="cmt">-- 論理削除（deleted_at に日時を入れるだけ、行は残る）</span>
<span class="kw">UPDATE</span> <span class="tbl">table_name</span>
<span class="kw">SET</span>    deleted_at <span class="op">=</span> <span class="fn">NOW</span>()           <span class="cmt">-- NULL → 現在日時 に変更することで「削除済み」を表現</span>
<span class="kw">WHERE</span>  id <span class="op">=</span> <span class="num">1</span>
  <span class="kw">AND</span>  deleted_at <span class="kw">IS NULL</span>;          <span class="cmt">-- まだ削除されていない行のみ（べき等性の確保）</span></pre>
<div class="callout"><strong>論理削除の利点：</strong>①データ復元が可能 ②監査ログとして削除履歴が残る ③外部キー参照が壊れない。取得クエリには <code>WHERE deleted_at IS NULL</code> を常に付ける必要がある。</div>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>論理削除が実務標準の理由：</strong>①削除取り消し（undo）が可能 ②「いつ誰が削除したか」の監査証跡になる ③外部テーブルから参照している場合に参照整合性エラーが発生しない。特にユーザーや注文データは論理削除が原則。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>全クエリに deleted_at IS NULL を付ける：</strong>論理削除を採用すると全てのSELECT/UPDATE/DELETEに <code>WHERE deleted_at IS NULL</code> が必要になる。ORMのデフォルトスコープやビュー（VIEW）で自動適用するのが実務上のベストプラクティス。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>物理削除が適切なケース：</strong>GDPRなどの法的な「忘れられる権利」対応、PII（個人情報）の完全消去が必要な場合は物理削除が必須。論理削除ではデータが残り続けるため法的要件を満たせない場合がある。</div></div>

<tr class="tr-hi3"><td>U02</td><td class="tc-g">佐藤 花子</td><td class="tc-p">2</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px">※ U03は過去30日の注文が0件のため除外</p>`,
  answer: `<pre><span class="kw">WITH</span>
  <span class="cmt">-- CTE①: 過去30日以内の注文をユーザーごとに集計</span>
  recent_orders <span class="kw">AS</span> (
    <span class="kw">SELECT</span>
      user_id,                      <span class="cmt">-- グループ化キー</span>
      <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> order_count        <span class="cmt">-- 過去30日の注文件数を集計</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span>
    <span class="kw">WHERE</span>  ordered_at <span class="op">&gt;=</span> <span class="fn">CURRENT_DATE</span> <span class="op">-</span> <span class="kw">INTERVAL</span> <span class="str">'30 days'</span>  <span class="cmt">-- 現在日から30日前以降</span>
    <span class="kw">GROUP BY</span> user_id                <span class="cmt">-- ユーザーIDごとにグループ化</span>
  ),
  <span class="cmt">-- CTE②: 2件以上のユーザーだけに絞り込む（VIPの定義）</span>
  vip_users <span class="kw">AS</span> (
    <span class="kw">SELECT</span> user_id, order_count     <span class="cmt">-- CTE①の結果を参照</span>
    <span class="kw">FROM</span>   recent_orders            <span class="cmt">-- CTE①の名前でテーブルのように参照</span>
    <span class="kw">WHERE</span>  order_count <span class="op">&gt;=</span> <span class="num">2</span>        <span class="cmt">-- VIP条件: 2件以上</span>
  )
<span class="cmt">-- 本体クエリ: VIPユーザーをusersテーブルとJOINして名前を付加</span>
<span class="kw">SELECT</span>
  v.user_id,                        <span class="cmt">-- VIPユーザーID</span>
  u.name,                           <span class="cmt">-- ユーザー名（usersテーブルから）</span>
  v.order_count                     <span class="cmt">-- 注文件数（CTE②から）</span>
<span class="kw">FROM</span>       vip_users v              <span class="cmt">-- CTE②をメインテーブルとして使う</span>
<span class="kw">INNER JOIN</span> <span class="tbl">users</span>    u              <span class="cmt">-- usersテーブルと結合</span>
  <span class="kw">ON</span>  v.user_id <span class="op">=</span> u.user_id         <span class="cmt">-- 結合条件</span>
<span class="kw">ORDER BY</span> v.order_count <span class="kw">DESC</span>;       <span class="cmt">-- 注文件数の多い順</span>

<span class="cmt">/*
  実行順序:
  1. CTE① recent_orders       → orders から過去30日分を GROUP BY で集計
  2. CTE② vip_users           → recent_orders から order_count >= 2 に絞る
  3. FROM vip_users v          → CTE②を起点にする
  4. INNER JOIN users u        → users テーブルと結合して名前を取得
  5. SELECT v.user_id, ...     → 必要な列を選択
  6. ORDER BY order_count DESC → 降順に並び替え
  ★ CTE はサブクエリをネストせずに「上から順番に読める」設計にできる
*/</span></pre>`,
  explain: `

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>CTE② vip_users → INNER JOIN users で名前を付加</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th class="tc-g">name（JOINで付加）</th><th class="tc-p">order_count</th></tr>

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>CTEの命名で意図を伝える：</strong><code>recent_orders</code>（最近の注文）、<code>vip_users</code>（VIPユーザー）のように意味のある名前をつけることで、SQLを読んだ人が「何をしているか」を即座に理解できる。コメントの代わりになる。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>CTEは同じ結果を複数回参照できる：</strong>同じサブクエリを2回書く必要があるときにCTEで1回定義すれば複数箇所から参照できる。コードの重複排除とメンテナンス性向上に効果的。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>バッチSQL設計の定番構成：</strong>CTEで①データ抽出・②絞り込み・③集計、の各ステップを分けて定義し、本体クエリで最終形を作る構成がバッチSQL設計の王道パターン。デバッグ時はCTEを1段ずつ単独でSELECTして中間結果を確認できる。</div></div>
</div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>過度にネストしたサブクエリ：</strong><code>SELECT * FROM (SELECT * FROM (SELECT ...) sub1) sub2</code> のように3重・4重にネストするとどこで何をしているか全く読めなくなる。2段階以上になったらCTEへリファクタリングすること。</div></div>

</div>
`
},

/* ══════════════════════════════════════════════════

{
  num: 9,
  title: "EXISTS / NOT EXISTS — 関連データの存在チェックを効率的に行う",
  tags: [["r","EXISTS"],["r","NOT EXISTS"],["o","存在チェック"],["g","条件フィルタ"]],
  premise: `<p><strong>EXISTS</strong> はサブクエリが1行以上の結果を返すかどうかを TRUE/FALSE で判定します。「関連データが存在する行だけ取得」「まだ処理されていない行を取得」のバッチ処理で頻出です。</p>
<pre><span class="kw">SELECT</span> col1
<span class="kw">FROM</span>   <span class="tbl">table_a</span> a
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (                      <span class="cmt">-- サブクエリが1件以上あれば TRUE</span>
  <span class="kw">SELECT</span> <span class="num">1</span>                          <span class="cmt">-- EXISTS内はSELECT 1でよい（列は何でもよい）</span>
  <span class="kw">FROM</span>   <span class="tbl">table_b</span> b
  <span class="kw">WHERE</span>  b.a_id <span class="op">=</span> a.id              <span class="cmt">-- 外側のテーブルを参照（相関サブクエリ）</span>
);

<span class="kw">WHERE</span>  <span class="kw">NOT EXISTS</span> (...)             <span class="cmt">-- NOT EXISTS: サブクエリが0件のとき TRUE</span></pre>
<div class="callout"><strong>EXISTS vs IN の違い：</strong><code>WHERE id IN (SELECT id FROM ...)</code> でも似たことができるが、EXISTSはサブクエリが1行見つかった時点でスキャンを中断するため大量データで高速。また IN はサブクエリにNULLが含まれると予期しない動作をする場合がある。</div>`,

  answer: `<pre><span class="kw">SELECT</span>

<span class="kw">FROM</span>  <span class="tbl">users</span> u                       <span class="cmt">-- 外側（メイン）クエリのテーブル</span>
<span class="kw">WHERE</span> <span class="kw">NOT EXISTS</span> (                  <span class="cmt">-- orders にレコードが存在しない場合にTRUE</span>
  <span class="kw">SELECT</span> <span class="num">1</span>                          <span class="cmt">-- SELECT 1 でよい（列の中身は評価されない）</span>

)
<span class="kw">ORDER BY</span> u.user_id <span class="kw">ASC</span>;            <span class="cmt">-- ユーザーIDの昇順</span>

     - user_id=3 → orders に存在する → NOT EXISTS = FALSE → 除外

  3. SELECT u.user_id, u.name  → 残った行の列を選択

*/</span></pre>`,

<tr class="tr-hi2"><td>2</td><td>佐藤 花子</td><td class="null">なし</td><td class="tc-g">TRUE</td><td class="tc-g">✓ 残る</td></tr>
<tr class="tr-dim"><td>3</td><td>鈴木 一郎</td><td class="tc-r">あり（102）</td><td class="tc-r">FALSE</td><td class="tc-r">✗ 除外</td></tr>
<tr class="tr-hi2"><td>4</td><td>山田 次郎</td><td class="null">なし</td><td class="tc-g">TRUE</td><td class="tc-g">✓ 残る</td></tr>
<tr class="tr-hi2"><td>5</td><td>伊藤 三郎</td><td class="null">なし</td><td class="tc-g">TRUE</td><td class="tc-g">✓ 残る</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">ORDER BY user_id ASC → 最終結果</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>最終結果（未注文ユーザー3名）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th class="tc-g">name</th></tr>

<tr class="tr-hi2"><td>4</td><td class="tc-g">山田 次郎</td></tr>
<tr class="tr-hi2"><td>5</td><td class="tc-g">伊藤 三郎</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>バッチ処理での活用例：</strong>「まだメールを送っていないユーザーを取得」<code>NOT EXISTS (SELECT 1 FROM email_logs WHERE user_id = u.user_id)</code>、「未課金ユーザーへのリマインダー送信」など、処理済み/未処理を管理するバッチに頻出。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>SELECT 1 の理由：</strong>EXISTS はサブクエリが1行でも返せばTRUEになる。SELECT している列の値は評価されないため、<code>SELECT 1</code>（定数）で書くのが慣例。<code>SELECT *</code> でも動くが意図が伝わりにくい。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>LEFT JOIN + IS NULL との使い分け：</strong>両者は同じ結果を返すがクエリプランナーによってパフォーマンスが異なる場合がある。PostgreSQLでは両者を同等に最適化することが多い。可読性から NOT EXISTS の方が意図が明確なのでこちらを推奨。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>NOT IN でのNULL問題：</strong><code>WHERE user_id NOT IN (SELECT user_id FROM orders)</code> は orders.user_id にNULLが1件でも含まれると全件 FALSE になり0件が返る。NOT IN はNULLに弱いため NOT EXISTS を使う方が安全。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>相関サブクエリで外側テーブルの参照を忘れる：</strong><code>WHERE EXISTS (SELECT 1 FROM orders)</code>（<code>WHERE o.user_id = u.user_id</code> なし）はordersに1行でもあれば全ユーザーがTRUEになる。外側テーブルとの結合条件は必須。</div></div>
</div>

/* ══════════════════════════════════════════════════

{
  num: 10,
  title: "CASE WHEN — バッチ集計・APIレスポンスで値を条件分岐して変換する",
  tags: [["r","CASE WHEN"],["r","THEN/ELSE"],["o","値変換"],["g","APIレスポンス"]],
  premise: `<p><strong>CASE WHEN</strong> はSQLのif-else構文です。SELECT・WHERE・ORDER BY・GROUP BY など様々な場所で使えます。APIレスポンスでDBの値をラベル変換したり、集計で条件付きカウントを行うバッチ処理に頻出です。</p>
<pre><span class="cmt">-- 単純CASE（列の値を列挙して分岐）</span>
<span class="kw">CASE</span> col1
  <span class="kw">WHEN</span> <span class="str">'val1'</span> <span class="kw">THEN</span> <span class="str">'表示A'</span>         <span class="cmt">-- col1 = 'val1' のとき</span>
  <span class="kw">WHEN</span> <span class="str">'val2'</span> <span class="kw">THEN</span> <span class="str">'表示B'</span>         <span class="cmt">-- col1 = 'val2' のとき</span>
  <span class="kw">ELSE</span> <span class="str">'その他'</span>                    <span class="cmt">-- どれにも一致しない場合（省略すると NULL）</span>
<span class="kw">END</span>                                <span class="cmt">-- CASE は必ず END で閉じる</span>

<span class="cmt">-- 検索CASE（任意の条件式で分岐・より汎用的）</span>
<span class="kw">CASE</span>
  <span class="kw">WHEN</span> col2 <span class="op">&gt;</span> <span class="num">100</span> <span class="kw">THEN</span> <span class="str">'大'</span>         <span class="cmt">-- 比較演算子も使える</span>
  <span class="kw">WHEN</span> col2 <span class="op">&gt;</span> <span class="num">50</span>  <span class="kw">THEN</span> <span class="str">'中'</span>         <span class="cmt">-- 上から順に評価し最初に一致した THEN を返す</span>
  <span class="kw">ELSE</span> <span class="str">'小'</span>
<span class="kw">END</span></pre>
<div class="callout ok"><strong>CASE WHEN の評価順：</strong>上から順に評価し、最初に TRUE になった WHEN ... THEN を返して終了します。残りの条件は評価されません。</div>`,

  answer: `<pre><span class="kw">SELECT</span>

  <span class="cmt">-- 購買ランクの条件分岐（検索CASE: 上から順に評価）</span>
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> amount <span class="op">&gt;=</span> <span class="num">10000</span> <span class="kw">THEN</span> <span class="str">'premium'</span>   <span class="cmt">-- 10000以上は premium</span>
    <span class="kw">WHEN</span> amount <span class="op">&gt;=</span>  <span class="num">5000</span> <span class="kw">THEN</span> <span class="str">'standard'</span>  <span class="cmt">-- 5000以上（10000未満）は standard</span>
    <span class="kw">ELSE</span>                       <span class="str">'basic'</span>     <span class="cmt">-- それ未満は basic（ELSE は省略するとNULLになる）</span>
  <span class="kw">END</span> <span class="kw">AS</span> rank_label,                <span class="cmt">-- CASE の結果に列名 rank_label を付ける</span>

  <span class="cmt">-- status を日本語ラベルに変換（単純CASE: 値を列挙）</span>
  <span class="kw">CASE</span> status                       <span class="cmt">-- status 列の値を順番に比較</span>
    <span class="kw">WHEN</span> <span class="str">'completed'</span> <span class="kw">THEN</span> <span class="str">'完了'</span>      <span class="cmt">-- 'completed' のとき '完了' を返す</span>
    <span class="kw">WHEN</span> <span class="str">'pending'</span>   <span class="kw">THEN</span> <span class="str">'処理中'</span>    <span class="cmt">-- 'pending' のとき '処理中' を返す</span>
    <span class="kw">WHEN</span> <span class="str">'cancelled'</span> <span class="kw">THEN</span> <span class="str">'キャンセル'</span> <span class="cmt">-- 'cancelled' のとき 'キャンセル' を返す</span>
    <span class="kw">ELSE</span> <span class="str">'不明'</span>                       <span class="cmt">-- 想定外の値は '不明'（安全のため常にELSEを書く）</span>
  <span class="kw">END</span> <span class="kw">AS</span> status_label                <span class="cmt">-- 列名 status_label を付ける</span>

<span class="kw">FROM</span>   <span class="tbl">orders</span>                        <span class="cmt">-- 対象テーブル</span>
<span class="kw">ORDER BY</span> ordered_at <span class="kw">DESC</span>;           <span class="cmt">-- 注文日の新しい順</span>

<span class="cmt">/*

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p', fn:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','基礎文法・概念',q.premise)}
      ${acc('❓','pill-green','問題','テーブルデータ付き',q.question)}
      ${acc('📊','pill-orange','出力例','期待する結果',q.output)}
      ${acc('✅','pill-red','模範回答','SQL（コメント付き）',q.answer)}
      ${acc('🔍','pill-purple','解説','変化の可視化＋学習ポイント',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
