<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLタイムゾーン基礎10選 — TIMESTAMP・AT TIME ZONE・UTC設計パターン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens ──────────────────────────────── */
  :root {
    --bg:     #0a0e13;
    --bg2:    #131920;
    --bg3:    #1c2330;
    --bg4:    #263040;
    --border: #2a3545;
    --text:   #cdd9e5;
    --dim:    #768390;
    --accent: #4dabf7;   /* blue  — primary highlight   */
    --green:  #3fb950;
    --orange: #f0883e;
    --red:    #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw:     #ff7b72;   /* SQL keyword                 */
    --fn:     #79c0ff;   /* function / type             */
    --str:    #a5d6ff;   /* string literal              */
    --num:    #f0c674;   /* numeric literal             */
    --cmt:    #6a737d;   /* comment                     */
    --tbl:    #ffa657;   /* table / column name         */
    --op:     #f0883e;   /* operator                    */
  }

  /* ── Reset & base ───────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  /* ── Site header ────────────────────────────────── */
  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex  { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim);
  }

  /* ── Sticky tabs ────────────────────────────────── */
  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none;
    border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }
  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width .2s; }

  /* ── Main layout ────────────────────────────────── */
  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Question header ────────────────────────────── */
  .q-header  { margin-bottom: 18px; }
  .q-number  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title   { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags    { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag     { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent);  border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green);   border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange);  border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple);  border: 1px solid #3a2060; }

  /* ── Accordion ──────────────────────────────────── */
  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon    { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title   { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill    { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body  { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  /* ── Typography helpers ─────────────────────────── */
  p       { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong  { color: var(--accent); font-weight: 600; }
  em      { color: var(--yellow); font-style: normal; font-weight: 600; }
  code    { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  /* ── Code block ─────────────────────────────────── */
  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  /* syntax tokens */
  .kw  { color: var(--kw);    font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--op); }
  .tz  { color: var(--purple); }  /* timezone string */

  /* ── Callouts ───────────────────────────────────── */
  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  /* ── Data section / tables ──────────────────────── */
  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables     { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap   { flex: 1; min-width: 220px; }
  .data-tbl-name   { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  /* ── Visualization tables ───────────────────────── */
  .viz-flow { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }
  .step-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .step-num   { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green);  }
  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }
  .step-desc        { color: var(--dim); }
  .step-desc strong { color: var(--text); }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border); border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  /* row highlight variants */
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: .4; }
  /* cell color helpers */
  .tc-hi { color: var(--accent) !important; font-weight: 700; }
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }

  .arrow      { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  /* ── Insight box ────────────────────────────────── */
  .insight-box { background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row   { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon  { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em     { color: var(--yellow); }
  .insight-body code   { font-size: 11px; }

  /* ── Anti-pattern box ───────────────────────────── */
  .anti-box { background: #160a0a; border: 1px solid #3a1515; border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row  { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code   { font-size: 11px; }

  /* ── Column box ─────────────────────────────────── */
  .column-box {
    background: #0d1520; border: 1px solid #1c3550; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px; border-left: 3px solid var(--fn);
  }
  .column-title { font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: .5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .column-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--fn); }

  /* ── Nav bar ────────────────────────────────────── */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">TZ<br><span style="font-size:10px;opacity:.6">SQL</span></div>
      <div class="header-text-wrap">
        <div class="header-title">タイムゾーンで学ぶ SQL 基礎10選（TIMESTAMP / TIMESTAMPTZ / AT TIME ZONE / UTC設計 / DST / DATE_TRUNC / 多地域対応編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎〜実務</span>
      <span class="htag">タイムゾーン</span>
      <span class="htag">UTC設計</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">モダンWeb必須</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  TIMESTAMP vs TIMESTAMPTZ — 型の基本的な違い
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "TIMESTAMP vs TIMESTAMPTZ — タイムゾーン情報を持つかどうかの根本的な違い",
  tags: [["r","TIMESTAMP"],["r","TIMESTAMPTZ"],["o","型の違い"],["g","基礎"]],
  premise: `<p>PostgreSQL には日時を扱う型が2種類あります。<strong>TIMESTAMP</strong>（タイムゾーンなし）と <strong>TIMESTAMPTZ</strong>（タイムゾーンあり）です。モダンWebアプリの設計では <em>TIMESTAMPTZ を使うことが強く推奨</em>されます。</p>
<pre><span class="cmt">-- タイムゾーンなし（壁時計の時刻をそのまま保存）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">events_bad</span> (
    id          <span class="fn">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    title       <span class="fn">TEXT</span>,
    happened_at <span class="fn">TIMESTAMP</span>        <span class="cmt">-- どのタイムゾーンの時刻か不明になる</span>
);

<span class="cmt">-- タイムゾーンあり（UTC基準で内部保存・表示時に変換）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">events_good</span> (
    id          <span class="fn">SERIAL</span> <span class="kw">PRIMARY KEY</span>,
    title       <span class="fn">TEXT</span>,
    happened_at <span class="fn">TIMESTAMPTZ</span>     <span class="cmt">-- 内部はUTC。参照時にセッションTZで表示</span>
);</pre>
<div class="callout warn"><strong>TIMESTAMPTZの誤解：</strong>「TIMESTAMPTZはタイムゾーン文字列を保存する」は<em>誤り</em>です。内部は常にUTCで保存され、表示時にセッションのタイムゾーン設定に従ってオフセットを付けて表示します。保存サイズはどちらも8バイトで同じです。</div>
<p>TIMESTAMP は「タイムゾーンのコンテキストなしに時刻の数値だけを保存する」ため、サーバーのタイムゾーン設定が変わると同じ数値が別の瞬間を指すことになります。</p>`,
  question: `<p>以下のような <code>events</code> テーブルに、<em>東京時刻（JST / UTC+9）で 2024-06-01 10:00:00</em> のイベントを INSERT します。TIMESTAMP と TIMESTAMPTZ の両方のカラムに同じリテラルを INSERT したとき、<em>セッションのタイムゾーンを UTC に切り替えると表示がどう変わるか</em>を示してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ events（比較用）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>id</th><th>title</th><th>ts_no_tz (TIMESTAMP)</th><th>ts_with_tz (TIMESTAMPTZ)</th></tr>
        <tr><td>1</td><td>リリース</td><td class="null">（INSERT後に確認）</td><td class="null">（INSERT後に確認）</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- セッションをJSTに設定してINSERT</span>
<span class="kw">SET</span> <span class="fn">timezone</span> <span class="op">=</span> <span class="tz">'Asia/Tokyo'</span>;
<span class="kw">INSERT INTO</span> <span class="tbl">events</span> (title, ts_no_tz, ts_with_tz)
<span class="kw">VALUES</span> (<span class="str">'リリース'</span>, <span class="str">'2024-06-01 10:00:00'</span>, <span class="str">'2024-06-01 10:00:00'</span>);</pre>`,
  output: `<p>セッションTZをUTCに切り替えたときの SELECT 結果の違い：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>セッションTZ</th><th>ts_no_tz（TIMESTAMP）</th><th>ts_with_tz（TIMESTAMPTZ）</th></tr>
<tr class="tr-hi2"><td>Asia/Tokyo (JST)</td><td>2024-06-01 10:00:00</td><td class="tc-g">2024-06-01 10:00:00+09</td></tr>
<tr class="tr-hi"><td>UTC（切替後）</td><td class="tc-r">2024-06-01 10:00:00（変化しない！）</td><td class="tc-g">2024-06-01 01:00:00+00（正しくUTCに変換）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① セッションをJSTに設定する</span>
<span class="kw">SET</span> <span class="fn">timezone</span> <span class="op">=</span> <span class="tz">'Asia/Tokyo'</span>;     <span class="cmt">-- 【超基礎】このセッション中の表示・解釈をJST(UTC+9)にする</span>

<span class="cmt">-- ② 両方のカラムに同じリテラルをINSERT</span>
<span class="kw">INSERT INTO</span> <span class="tbl">events</span> (title, ts_no_tz, ts_with_tz)
<span class="kw">VALUES</span> (
    <span class="str">'リリース'</span>,
    <span class="str">'2024-06-01 10:00:00'</span>,      <span class="cmt">-- TIMESTAMP: TZ情報なし → そのまま10:00:00と保存</span>
    <span class="str">'2024-06-01 10:00:00'</span>       <span class="cmt">-- TIMESTAMPTZ: セッションTZ(JST)と解釈しUTC変換して保存</span>
                                  <span class="cmt">--              → 内部では 2024-06-01 01:00:00 UTC で保存</span>
);

<span class="cmt">-- ③ JSTのままSELECT（この時点では両者同じに見える）</span>
<span class="kw">SELECT</span> ts_no_tz, ts_with_tz <span class="kw">FROM</span> <span class="tbl">events</span>;
<span class="cmt">-- ts_no_tz:   2024-06-01 10:00:00
-- ts_with_tz: 2024-06-01 10:00:00+09   ← +09 オフセットが表示される</span>

<span class="cmt">-- ④ セッションをUTCに切り替えて再SELECT（ここで差が出る）</span>
<span class="kw">SET</span> <span class="fn">timezone</span> <span class="op">=</span> <span class="tz">'UTC'</span>;             <span class="cmt">-- 【超基礎】セッションをUTCに変更</span>

<span class="kw">SELECT</span> ts_no_tz, ts_with_tz <span class="kw">FROM</span> <span class="tbl">events</span>;
<span class="cmt">-- ts_no_tz:   2024-06-01 10:00:00      ← ❌ TZなし: UTC切替後も同じ数値のまま(10時を指すのはJSTだけのはず)
-- ts_with_tz: 2024-06-01 01:00:00+00  ← ✅ TZあり: UTC+9→UTC変換で9時間引いた正しい値が表示</span>

<span class="cmt">/*
  実行順序:
  1. SET timezone            → セッションのTZ設定を変更
  2. INSERT                  → TIMESTAMP は文字列をそのまま保存 / TIMESTAMPTZ はUTCに正規化して保存
  3. SET timezone = 'UTC'    → 表示TZをUTCに切り替え
  4. SELECT                  → TIMESTAMP はTZ変換なし / TIMESTAMPTZ はUTCで表示
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>TIMESTAMP は「壁時計の数値だけ保存するメモ帳」です。どのタイムゾーンの時刻なのかという情報を持たないため、文脈によって指す瞬間が変わります。TIMESTAMPTZ は「UTCという世界共通の基準で保存する時計」で、常に一意の瞬間を指します。</div></div>

</div>
</div>

<span class="kw">SHOW</span> <span class="fn">timezone</span>;                              <span class="cmt">-- 例: 'UTC' や 'Asia/Tokyo'</span>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>DATE_TRUNCは「日時を指定した粒度で切り捨てる」関数です。<code>DATE_TRUNC('month', ts)</code> は「ts が属する月の1日0:00を返す」ため、GROUP BYと組み合わせると月次集計ができます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>週次集計の注意：</strong><code>DATE_TRUNC('week', ts)</code> は <em>月曜始まり</em>（ISO 8601）です。日曜始まりの週次集計が必要な場合は <code>DATE_TRUNC('week', ts + INTERVAL '1 day') - INTERVAL '1 day'</code> のような調整が必要です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>PostgreSQL 14のTZ引数：</strong><code>DATE_TRUNC(unit, ts, timezone)</code> の第3引数はPostgreSQL 14から追加されました。それ以前は二段変換パターンを使います。本番DBのバージョンを確認して使い分けてください。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>TO_CHAR で月を取り出してGROUP BYする：</strong><code>GROUP BY TO_CHAR(created_at, 'YYYY-MM')</code> はTEXT型でのグループ化になり、ソートで問題が起きます（2024-09 > 2024-10 がTEXT比較で発生）。DATE_TRUNCを使って TIMESTAMPTZ のままGROUP BYするのが正確で安全です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>集計クエリにTZ変換を入れてインデックスを無効化する：</strong>GROUP BYのためのTZ変換は集計列に対して行うためSELECT列のみの話ですが、WHERE句でも同様の変換を列に直接適用するのはNGです。WHERE句は必ずSARGableに保ちましょう（Q5参照）。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：BIツールのタイムゾーン設定とSQL</div>
<div class="column-body">
MetabaseやLookerなどのBIツールは独自のTZ設定を持っており、「BI側でJSTに設定しているのにSQLのDATE_TRUNCがUTC基準だった」というズレが頻繁に発生します。<strong>SQLとBIのTZを一致させるルールをチームで明文化する</strong>か、Lookerの <code>convert_tz</code> 機能やMetabaseのReportのTZ設定を使ってBIツール側で変換する方法を統一してください。データ基盤のdbt（データ変換ツール）を使っている場合は、dbtのモデルでJST変換済みのビューを用意してBIがTZを意識しないで済む設計も有効です。
</div>
</div>
`
},

{
  num: 7,
  title: "サマータイム（DST）の落とし穴 — 存在しない時刻と重複する時刻",
  tags: [["r","DST"],["r","サマータイム"],["o","America/New_York"],["g","エッジケース"]],
  premise: `<p><strong>サマータイム（DST: Daylight Saving Time / 夏時間）</strong>は、一部の国や地域で1年に2回、時計を1時間進める（春）/戻す（秋）制度です。これにより<em>「存在しない時刻」と「2回繰り返す時刻」</em>が生まれます。</p>
<div class="callout danger"><strong>米国東部（America/New_York）のDST境界：</strong><br>
・<strong>春（3月 第2日曜 2:00）：</strong>時計を2:00→3:00に1時間進める → <em>2:00〜2:59:59 が存在しない</em><br>
・<strong>秋（11月 第1日曜 2:00）：</strong>時計を2:00→1:00に1時間戻す → <em>1:00〜1:59:59 が2回繰り返す</em></div>
<pre><span class="cmt">-- DST切り替えがある地域のTZを使う際は地域名を必ず使う</span>
<span class="cmt">-- ❌ 固定オフセット：DSTを反映しない</span>
<span class="kw">SELECT</span> <span class="str">'2024-03-10 07:00:00'</span>::<span class="fn">TIMESTAMPTZ</span> <span class="kw">AT TIME ZONE</span> <span class="tz">'-05'</span>;

<span class="cmt">-- ✅ 地域名：DSTを自動で反映する</span>

<div class="tbl-wrap"><table class="vtbl">

<tr class="tr-hi3"><td>秋: 重複する時刻（1回目）</td><td class="tc-p">2024-11-03 01:30:00 NY(EDT)</td><td>2024-11-03 05:30:00 UTC</td><td>EDT(-4)として解釈</td></tr>
<tr class="tr-hi3"><td>秋: 重複する時刻（2回目）</td><td class="tc-p">2024-11-03 01:30:00 NY(EST)</td><td>2024-11-03 06:30:00 UTC</td><td>EST(-5)として解釈</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① 存在しない時刻を試みる（2024-03-10: DSTで2:00→3:00にスキップ）</span>
<span class="kw">SELECT</span>
    <span class="str">'2024-03-10 02:30:00 America/New_York'</span>::<span class="fn">TIMESTAMPTZ</span>  <span class="kw">AS</span> ambiguous_spring
    <span class="cmt">-- 存在しない2:30はEST(-5)として解釈: UTC 07:30</span>
  , <span class="str">'2024-03-10 02:30:00 America/New_York'</span>::<span class="fn">TIMESTAMPTZ</span>
        <span class="kw">AT TIME ZONE</span> <span class="tz">'America/New_York'</span>           <span class="kw">AS</span> local_display;
    <span class="cmt">-- → 03:30 と表示される（スキップされた時刻はEDT開始後として表示）</span>

<span class="cmt">-- ② 重複する時刻（2024-11-03: DSTで2:00→1:00に巻き戻る）</span>
<span class="kw">SELECT</span>
    <span class="cmt">-- EDT(-4)のうちの1:30（DSTが終わる前）</span>
    <span class="str">'2024-11-03 01:30:00-04'</span>::<span class="fn">TIMESTAMPTZ</span> <span class="kw">AS</span> edt_1_30    <span class="cmt">-- UTC 05:30</span>
  , <span class="str">'2024-11-03 01:30:00-05'</span>::<span class="fn">TIMESTAMPTZ</span> <span class="kw">AS</span> est_1_30;   <span class="cmt">-- UTC 06:30（1時間後）</span>
    <span class="cmt">-- 同じローカル時刻でも異なるUTC値になることを確認</span>

<span class="cmt">-- ③ DSTを考慮した「24時間後」ではなく「翌日の同じ時刻」を計算する</span>
<span class="kw">SELECT</span>
    <span class="cmt">-- ❌ 単純な24時間加算: DST越えで時刻がズレる</span>

        <span class="op">+</span> <span class="fn">INTERVAL</span> <span class="str">'24 hours'</span>
        <span class="kw">AT TIME ZONE</span> <span class="tz">'America/New_York'</span>  <span class="kw">AS</span> plus_24h_local <span class="cmt">-- → 13:00（1時間ズレ）</span>

  , <span class="cmt">-- ✅ ローカル時刻で「1日」を加算してUTCに戻す: 正しく翌日の同じ時刻</span>

            <span class="op">+</span> <span class="fn">INTERVAL</span> <span class="str">'1 day'</span>                <span class="cmt">-- ローカル時刻で1日後</span>
        ) <span class="kw">AT TIME ZONE</span> <span class="tz">'America/New_York'</span>   <span class="cmt">-- NYのTIMESTAMP → TIMESTAMPTZ(UTC)</span>
    ) <span class="kw">AT TIME ZONE</span> <span class="tz">'America/New_York'</span>      <span class="cmt">-- 表示をローカルに変換</span>
        <span class="kw">AS</span> plus_1day_local;               <span class="cmt">-- → 12:00（正しく翌日の正午）</span>

<span class="cmt">/*
  実行順序（③の正しい方法）:
  1. '2024-03-09 12:00:00'::TIMESTAMP  → TZなし時刻として解釈
  2. + INTERVAL '1 day'               → ローカル時刻で1日後（2024-03-10 12:00:00）
  3. AT TIME ZONE 'America/New_York'  → NYのTIMESTAMPTZとして解釈（DSTを自動適用）
  4. AT TIME ZONE 'America/New_York'  → 表示のためローカルに変換
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>米国東部のDSTカレンダー（2024年）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>日時（NY時刻）</th><th>変化</th><th>UTC オフセット</th><th>影響</th></tr>
<tr class="tr-hi4"><td>2024-03-10 02:00（EST）</td><td class="tc-y">→ 03:00 に飛ぶ（DST開始）</td><td class="tc-y">-5 → -4</td><td class="tc-r">02:00〜02:59 が存在しない</td></tr>
<tr class="tr-hi3"><td>2024-11-03 02:00（EDT）</td><td class="tc-p">→ 01:00 に戻る（DST終了）</td><td class="tc-p">-4 → -5</td><td class="tc-p">01:00〜01:59 が2回現れる</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">UTCで保存すれば全ての瞬間が一意に特定できる</span></div>

<div class="step-block">

<div class="tbl-wrap"><table class="vtbl">

<tr class="tr-hi2"><td>+ INTERVAL '1 day'（ローカルで加算）</td><td>2024-03-09 12:00</td><td class="tc-g">2024-03-10 12:00（正しい）</td><td>23時間（DST分だけ短い）</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>UTCにはDSTがありません。「全てのデータをUTCで保存する」ことで、DSTによる「存在しない時刻」「重複する時刻」の問題はDBレベルでは発生しません。問題が起きるのは「ローカル時刻のリテラルを直接解釈するとき」だけです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>INTERVALの'1 day' vs '24 hours'：</strong>PostgreSQLでは <code>INTERVAL '1 day'</code> と <code>INTERVAL '24 hours'</code> はTIMESTAMPに加算するときは同じですが、TIMESTAMPTZ に加算するとDST越えで差が生じます。「カレンダー上の翌日」を意図するなら、ローカルTIMESTAMPに加算してからTIMESTAMPTZに変換する方法が正確です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>日本はDSTなし（現在）：</strong>日本には現在DSTがないため、JSTは常に+09:00で固定です。ただし「日本向けにしか使わないからDSTを気にしなくていい」は危険な前提です。グローバル展開の予定やユーザーが海外からアクセスする可能性がある場合は、最初からDSTを考慮した設計にしておきましょう。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>スケジューラで「毎日 XX:00 UTC」を設定してローカル時刻がズレる：</strong>「毎朝9:00 NYT」の処理を「毎日14:00 UTC（冬時間）」でスケジュールすると、夏時間中は13:00 UTCになり1時間ズレます。クロン設定はローカル時刻（タイムゾーン対応のスケジューラ）か、UTC+DSTオフセット計算をサポートしたツールを使ってください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>固定オフセット（-05:00）でAmerica/New_Yorkを代替する：</strong>NYは夏 -4:00 / 冬 -5:00 です。固定 -05:00 では夏時間中の時刻が1時間ずれます。必ず <code>America/New_York</code> などの地域名を使ってください。</div></div>
</div>

<div class="column-box">

<div class="column-body">
定期バッチや通知スケジュールを設計するとき、DSTがある地域ユーザー向けには<strong>「ローカル時刻でのスケジュール + TZを指定」</strong>方式が最も安全です。AWS EventBridgeはcron式にTZを指定できます。Node.jsの <code>node-cron</code> はTZ環境変数で制御できます。<strong>「UTC基準の固定時刻でスケジュール」するとDST切り替えのたびにユーザーへの通知時刻が1時間ズレる</strong>問題が発生します。過去に「サマータイムが始まった日の翌朝、全員に1時間遅れでプッシュ通知が届いた」というインシデントが実際に複数報告されています。
</div>
</div>
`

/* ══════════════════════════════════════════════════
   Q8  EXTRACT / EPOCH とタイムゾーン
══════════════════════════════════════════════════ */
{
  num: 8,
  title: "EXTRACT と EPOCH — 経過秒数・時間差の正確な計算",
  tags: [["r","EXTRACT"],["r","EPOCH"],["o","時間差計算"],["g","経過時間"]],
  premise: `<p><strong>EXTRACT</strong> は日時から特定の要素（年・月・日・時・分・秒など）を取り出す関数です。<strong>EPOCH</strong> を使うと「UNIX エポック（1970-01-01 00:00:00 UTC）からの経過秒数」を取得でき、2つの時刻の差を秒数で計算するのに使います。</p>
<pre><span class="cmt">-- EPOCHで経過秒数を取得する</span>
<span class="kw">SELECT</span> <span class="fn">EXTRACT</span>(<span class="fn">EPOCH</span> <span class="kw">FROM</span> <span class="fn">NOW</span>());              <span class="cmt">-- 現在時刻のUnixタイムスタンプ</span>
<span class="kw">SELECT</span> <span class="fn">EXTRACT</span>(<span class="fn">EPOCH</span> <span class="kw">FROM</span> end_at <span class="op">-</span> start_at);  <span class="cmt">-- 2時刻の差を秒数で返す</span>

<span class="cmt">-- 年月日時分秒を個別に取り出す</span>
<span class="kw">SELECT</span>
    <span class="fn">EXTRACT</span>(<span class="fn">YEAR</span>   <span class="kw">FROM</span> <span class="fn">NOW</span>()),   <span class="cmt">-- 年</span>
    <span class="fn">EXTRACT</span>(<span class="fn">MONTH</span>  <span class="kw">FROM</span> <span class="fn">NOW</span>()),   <span class="cmt">-- 月 (1-12)</span>
    <span class="fn">EXTRACT</span>(<span class="fn">DOW</span>    <span class="kw">FROM</span> <span class="fn">NOW</span>()),   <span class="cmt">-- 曜日 (0=日曜〜6=土曜)</span>
    <span class="fn">EXTRACT</span>(<span class="fn">HOUR</span>   <span class="kw">FROM</span> <span class="fn">NOW</span>());</span>  <span class="cmt">-- 時 (0-23)</span></pre>
<div class="callout warn"><strong>タイムゾーンとEXTRACTの関係：</strong>TIMESTAMPTZ に EXTRACT(HOUR FROM ...) を使うと、<em>セッションのタイムゾーン</em>に基づいて時を取り出します。「JST 9:00」のレコードに UTC セッションで EXTRACT(HOUR) を使うと「0」が返ります。</div>`,
  question: `<p>ユーザーのセッション時間を管理する <code>user_sessions</code> テーブルがあります。<em>①セッション継続時間を秒・分・時間で計算し、②JSTのどの時間帯にログインが多いか集計し、③有効期限（24時間）を過ぎたセッションを検出</em>するクエリを書いてください。</p>
<div class="data-section">
  <div class="data-label">user_sessionsテーブル</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>session_id</th><th>user_id</th><th>login_at（UTC）</th><th>logout_at（UTC）</th></tr>
    <tr><td>1</td><td>U001</td><td>2024-06-01 00:30:00+00</td><td>2024-06-01 02:15:00+00</td></tr>
    <tr><td>2</td><td>U002</td><td>2024-06-01 03:00:00+00</td><td>2024-06-01 03:45:30+00</td></tr>
    <tr><td>3</td><td>U003</td><td>2024-06-01 12:00:00+00</td><td class="null">NULL（まだログイン中）</td></tr>
  </table></div>
</div>`,
  output: `<p>セッション継続時間と時間帯分析：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>session_id</th><th>duration_sec</th><th>duration_min</th><th>login_hour_jst</th><th>expired?</th></tr>
<tr class="tr-hi2"><td>1</td><td class="tc-g">6300</td><td class="tc-g">105.0分</td><td class="tc-g">9時（JST）</td><td class="tc-g">NO</td></tr>
<tr class="tr-hi2"><td>2</td><td class="tc-g">2730</td><td class="tc-g">45.5分</td><td class="tc-g">12時（JST）</td><td class="tc-g">NO</td></tr>
<tr class="tr-hi"><td>3</td><td class="null">NULL（継続中）</td><td class="null">—</td><td class="tc-g">21時（JST）</td><td class="tc-r">YES（24h超）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① セッション継続時間を秒・分・時間で計算する</span>
<span class="kw">SELECT</span>
    session_id,
    user_id,
    login_at,
    logout_at,
    <span class="cmt">-- 継続時間（秒）: EPOCHで差分を秒数として取得</span>
    <span class="fn">EXTRACT</span>(<span class="fn">EPOCH</span> <span class="kw">FROM</span>
        <span class="fn">COALESCE</span>(logout_at, <span class="fn">NOW</span>()) <span class="op">-</span> login_at     <span class="cmt">-- logout_atがNULLなら現在時刻を使う</span>
    )::INTEGER                                     <span class="cmt">-- 秒数を整数に変換</span>
        <span class="kw">AS</span> duration_sec

  , <span class="fn">ROUND</span>(                                        <span class="cmt">-- 【超基礎】四捨五入</span>
        <span class="fn">EXTRACT</span>(<span class="fn">EPOCH</span> <span class="kw">FROM</span>
            <span class="fn">COALESCE</span>(logout_at, <span class="fn">NOW</span>()) <span class="op">-</span> login_at
        ) / <span class="num">60.0</span>, <span class="num">1</span>                             <span class="cmt">-- 秒÷60で分に変換（小数点1桁）</span>
    )   <span class="kw">AS</span> duration_min

  , <span class="cmt">-- ログイン時刻をJSTの「時」で取り出す</span>
    <span class="fn">EXTRACT</span>(<span class="fn">HOUR</span> <span class="kw">FROM</span>
        login_at <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>       <span class="cmt">-- UTCをJSTに変換してから時を抽出</span>
    )::INTEGER   <span class="kw">AS</span> login_hour_jst               <span class="cmt">-- セッションTZに依存しない正確な時</span>

<span class="kw">FROM</span> <span class="tbl">user_sessions</span>;

<span class="cmt">-- ② JSTのどの時間帯にログインが多いか集計</span>
<span class="kw">SELECT</span>

<tr class="tr-hi2"><td>EXTRACT(EPOCH FROM ts2 - ts1)</td><td class="tc-g">2時刻の差（秒数）</td><td>経過時間の計算</td></tr>

<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>EXTRACT はSQLで「日時から特定の部分を取り出す」関数です。<code>EXTRACT(EPOCH FROM ts)</code> は特殊で「UNIX エポック（1970年1月1日UTC）からの経過秒数」を返します。2時刻の差（INTERVAL型）にもEPOCHが使え、「何秒かかったか」を計算できます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>AT TIME ZONEと組み合わせてから抽出：</strong>TIMESTAMPTZの時・分・曜日などを「特定のTZ基準」で取り出したい場合は、先に AT TIME ZONE でローカル化してから EXTRACT します。セッションTZに依存した抽出は再現性が低くバグの原因になります。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>INTERVAL演算との使い分け：</strong>経過時間を表す場合、<code>ts2 - ts1</code> は INTERVAL 型を返します（例: <code>01:45:30</code>）。一方 <code>EXTRACT(EPOCH FROM ts2 - ts1)</code> は整数（秒数）を返します。アプリAPIに「何秒」で返すならEPOCH、人間が読む「何時間何分」ならINTERVALをTO_CHARでフォーマットするのが一般的です。</div></div>
</div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>AGEで経過時間を計算してEPOCHに使う：</strong><code>EXTRACT(EPOCH FROM AGE(ts2, ts1))</code> は月・年を含むINTERVALでは月の日数が定まらないため正確な秒数を返しません。正確な秒数差は <code>EXTRACT(EPOCH FROM ts2 - ts1)</code> を使いましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>EXTRACT(DOW ...) で月曜始まりを期待する：</strong>EXTRACTの <code>DOW</code> は日曜=0、土曜=6です。ISO 8601準拠の月曜=1なら <code>EXTRACT(ISODOW FROM ts)</code> を使ってください。週次集計で曜日を間違えると集計単位がズレます。</div></div>

APIレスポンスでタイムスタンプをどの形式で返すかは設計の重要な選択です。<strong>ISO 8601形式（<code>"2024-06-01T09:30:00+09:00"</code>）</strong>はTZ情報を含み可読性が高い。<strong>Unixエポック秒（<code>1717191000</code>）</strong>はTZ情報を持たず（常にUTC基準）軽量です。JavaScriptの <code>new Date(epochMs)</code> はエポックミリ秒を受け付けます（秒×1000に変換）。SQLでエポックを返す場合は <code>EXTRACT(EPOCH FROM ts)::BIGINT * 1000</code> でミリ秒に変換するのが慣例です。
</div>
</div>
`

  premise: `<p>これまで学んだタイムゾーン処理を統合した<strong>実務レベルの設計パターン</strong>です。「UTCで保存、ローカル時刻で表示・検索、DSTを自動考慮、ユーザーTZを動的に適用」の4原則を1つのスキーマとクエリセットで実現します。</p>

② <strong>表示・集計時にAT TIME ZONEでローカル変換</strong>（DBに保存時は変換しない）<br>
③ <strong>地域名（IANA TZ名）を使う</strong>（固定オフセットやTZ略語は使わない）<br>

<tr class="tr-hi2"><td>ローカル表示</td><td class="tc-g">AT TIME ZONE u.timezone</td><td>動的TZ変換</td></tr>

<tr class="tr-hi2"><td>日付範囲検索</td><td class="tc-g">ts >= JSTの0:00をUTCに変換</td><td>SARGable・インデックス有効</td></tr>

  answer: `<pre><span class="cmt">-- ══════════════════════════════════════════
-- ① スキーマ設計（タイムゾーン対応の正しい設計）
-- ══════════════════════════════════════════</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">users</span> (
    user_id   <span class="fn">TEXT</span>         <span class="kw">PRIMARY KEY</span>,
    name      <span class="fn">TEXT</span>         <span class="kw">NOT NULL</span>,
    timezone  <span class="fn">TEXT</span>         <span class="kw">NOT NULL DEFAULT</span> <span class="str">'UTC'</span>,    <span class="cmt">-- IANAタイムゾーン名を格納</span>
    created_at <span class="fn">TIMESTAMPTZ</span> <span class="kw">NOT NULL DEFAULT</span> <span class="fn">NOW</span>()       <span class="cmt">-- ✅ TIMESTAMPTZ + DEFAULT NOW()</span>
);

<span class="kw">CREATE TABLE</span> <span class="tbl">orders</span> (
    order_id   <span class="fn">BIGSERIAL</span>   <span class="kw">PRIMARY KEY</span>,
    user_id    <span class="fn">TEXT</span>         <span class="kw">NOT NULL REFERENCES</span> <span class="tbl">users</span>(user_id),
    amount     <span class="fn">NUMERIC</span>(<span class="num">12</span>,<span class="num">2</span>) <span class="kw">NOT NULL</span>,
    status     <span class="fn">TEXT</span>         <span class="kw">NOT NULL DEFAULT</span> <span class="str">'pending'</span>,
    created_at <span class="fn">TIMESTAMPTZ</span> <span class="kw">NOT NULL DEFAULT</span> <span class="fn">NOW</span>(),       <span class="cmt">-- ✅ TIMESTAMPTZ（絶対にTIMESTAMPを使わない）</span>
    updated_at <span class="fn">TIMESTAMPTZ</span> <span class="kw">NOT NULL DEFAULT</span> <span class="fn">NOW</span>()
);
<span class="kw">CREATE INDEX</span> idx_orders_created_at <span class="kw">ON</span> <span class="tbl">orders</span> (created_at); <span class="cmt">-- 日付検索用インデックス</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_id    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id);    <span class="cmt">-- ユーザー別検索用インデックス</span>

<span class="cmt">-- ══════════════════════════════════════════
-- ② ユーザーのローカル時刻での注文表示
-- ══════════════════════════════════════════</span>
<span class="kw">SELECT</span>
    o.order_id,
    o.amount,
    o.status,
    o.created_at                                                <span class="cmt">-- UTC保存値（内部確認用）</span>
  , o.created_at <span class="kw">AT TIME ZONE</span> u.timezone <span class="kw">AS</span> local_created_at <span class="cmt">-- ユーザーのTZでローカル表示</span>
  , u.timezone                                                  <span class="cmt">-- 適用したTZを表示</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>  o
<span class="kw">JOIN</span>   <span class="tbl">users</span>   u <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id   <span class="cmt">-- 【超基礎】JOINでユーザーのTZ情報を取得</span>
<span class="kw">WHERE</span>  o.user_id <span class="op">=</span> <span class="str">'U001'</span>                      <span class="cmt">-- 特定ユーザーの注文</span>
<span class="kw">ORDER BY</span> o.created_at <span class="kw">DESC</span>;                   <span class="cmt">-- 新しい順に表示</span>

<span class="cmt">-- ══════════════════════════════════════════
-- ③ JST基準の日次売上レポート（月別集計）
-- ══════════════════════════════════════════</span>
<span class="kw">SELECT</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>,
        created_at <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>  <span class="cmt">-- UTCをJSTのTIMESTAMPに変換</span>
    ) <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>               <span class="cmt">-- JSTのTIMESTAMP → UTCのTIMESTAMPTZに戻す</span>
        <span class="kw">AS</span> month_jst                           <span class="cmt">-- JST基準の月初（UTCで返る）</span>
  , <span class="fn">COUNT</span>(<span class="op">*</span>)     <span class="kw">AS</span> order_count
  , <span class="fn">SUM</span>(amount)  <span class="kw">AS</span> total_amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'completed'</span>                   <span class="cmt">-- 完了済みのみ集計</span>
<span class="kw">GROUP BY</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>,
    created_at <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>
) <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>
<span class="kw">ORDER BY</span> <span class="num">1</span>;

<span class="cmt">-- ══════════════════════════════════════════
-- ④ JST基準の日付範囲検索（SARGable）
-- ══════════════════════════════════════════</span>
<span class="kw">SELECT</span> order_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>
    created_at <span class="op">&gt;=</span>                                              <span class="cmt">-- ✅ 列を加工せずSARGable</span>
        <span class="str">'2024-06-01 00:00:00'</span>::<span class="fn">TIMESTAMP</span> <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>
        <span class="cmt">-- JST 2024-06-01 00:00 → UTC 2024-05-31 15:00:00+00 に変換</span>
<span class="kw">AND</span> created_at  <span class="op">&lt;</span>
        <span class="str">'2024-06-02 00:00:00'</span>::<span class="fn">TIMESTAMP</span> <span class="kw">AT TIME ZONE</span> <span class="tz">'Asia/Tokyo'</span>;
        <span class="cmt">-- JST 2024-06-02 00:00 → UTC 2024-06-01 15:00:00+00 に変換</span>

<span class="cmt">-- ══════════════════════════════════════════
-- ⑤ 直近24時間の注文サマリ（TZ非依存）
-- ══════════════════════════════════════════</span>
<span class="kw">SELECT</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)                          <span class="kw">AS</span> order_count_24h
  , <span class="fn">SUM</span>(amount)                       <span class="kw">AS</span> total_amount_24h
  , <span class="fn">AVG</span>(amount)                       <span class="kw">AS</span> avg_amount_24h       <span class="cmt">-- 【超基礎】平均金額</span>
  , <span class="fn">MIN</span>(created_at)                   <span class="kw">AS</span> oldest_in_24h        <span class="cmt">-- 最も古い注文</span>
  , <span class="fn">MAX</span>(created_at)                   <span class="kw">AS</span> newest_in_24h        <span class="cmt">-- 最も新しい注文</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;=</span> <span class="fn">NOW</span>() <span class="op">-</span> <span class="fn">INTERVAL</span> <span class="str">'24 hours'</span>;    <span class="cmt">-- ✅ UTCの相対時刻なのでTZ非依存</span>

<span class="cmt">/*
  総まとめの実行順序ルール:
  1. スキーマ → TIMESTAMPTZ + DEFAULT NOW() で全自動UTC保存
  2. 表示変換 → SELECT/WHERE でAT TIME ZONEを適用（INSERT時は変換しない）
  3. 日次集計 → DATE_TRUNC + 二段AT TIME ZONEでJST月初を計算
  4. 日付検索 → WHEREの左辺をカラムのみにしてSARGableを維持
  5. 相対期間 → NOW() - INTERVAL でTZを気にしない絶対時刻差を使う
*/</span></pre>`,
  explain: `

/* ══════════════════════════════════════════════════

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = { r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p' };
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">` +
    `<span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p,j)=> p.classList.toggle('active', j===i));
  document.querySelectorAll('.tab-btn').forEach((b,j)=> b.classList.toggle('active', j===i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1)/QS.length*100)+'%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();
