<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLステップアップ10選 — 実務で差がつく応用パターン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  /* ── Header ── */
  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--red); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--red); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  /* ── Tabs ── */
  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--red); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--red); transition: width 0.2s; }

  /* ── Layout ── */
  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Question Header ── */
  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent);  border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green);   border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange);  border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple);  border: 1px solid #3a2060; }
  .tag-y { background: #2e2a16; color: var(--yellow);  border: 1px solid #4a451e; }

  /* ── Accordion ── */
  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon  { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill  { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  /* ── Typography ── */
  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  /* ── Code blocks ── */
  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw);     font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt);    font-style: italic; }
  .op  { color: var(--orange); }

  /* ── Callouts ── */
  .callout        { border-left: 3px solid var(--accent); background: #0e1e33; padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px; }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  /* ── Data section ── */
  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables   { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  /* ── Step visualizer ── */
  .viz-flow   { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }
  .step-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .step-num   { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green); }
  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }
  .step-desc        { color: var(--dim); }
  .step-desc strong { color: var(--text); }

  /* ── Tables ── */
  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: 0.4; }
  .tc-hi { color: var(--accent)  !important; font-weight: 700; }
  .tc-g  { color: var(--green)   !important; font-weight: 700; }
  .tc-p  { color: var(--purple)  !important; font-weight: 700; }
  .tc-y  { color: var(--yellow)  !important; font-weight: 700; }
  .tc-o  { color: var(--orange)  !important; font-weight: 700; }
  .tc-r  { color: var(--red)     !important; font-weight: 700; }
  .null  { color: var(--dim)     !important; font-style: italic; }
  .arrow      { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  /* ── Info boxes — shared flex row ── */
  .flex-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }

  .insight-box   { background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-icon  { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em     { color: var(--yellow); }
  .insight-body code   { font-size: 11px; }

  .anti-box   { background: #160a0a; border: 1px solid #3a1515; border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code   { font-size: 11px; }

  .practical-box   { background: #0d1b14; border: 1px solid #1a3b26; border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .practical-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--green); letter-spacing: 1px; margin-bottom: 10px; }
  .practical-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .practical-body strong { color: var(--green); }
  .practical-body code   { font-size: 11px; }

  /* ── Navigation ── */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); background: #1e0a0a; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width: 520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">応用10</span></div>
      <div class="header-text-wrap">
        <div class="header-title">実務で差がつくSQLステップアップ10選 — 複雑なビジネスロジックを解き明かす応用パターン</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 応用</span>
      <span class="htag">高度なウィンドウ関数</span>
      <span class="htag">クロス集計(PIVOT)</span>
      <span class="htag">WITH RECURSIVE</span>
      <span class="htag">RFM分析</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1 累積和・移動平均 (SUM OVER, ROWS BETWEEN)
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "ウィンドウ関数応用 — 累積売上と移動平均",
  tags: [["r","SUM() OVER"],["o","ROWS BETWEEN"],["g","ウィンドウ関数"],["p","トレンド分析"]],
  premise: `<p>ウィンドウ関数は集計範囲（フレーム）を詳細にコントロールできます。<strong>累積和（累計）</strong>や<strong>移動平均</strong>は、時系列データのトレンドを可視化する実務の基本です。</p>
<pre><span class="cmt">-- 累積和（行が追加されるごとに足していく）</span>
<span class="fn">SUM</span>(sales) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> date)  <span class="cmt">-- ORDER BYのみを指定すると「先頭行から現在の行まで」の集計になる</span>

<span class="cmt">-- 移動平均（直近N日間の平均）</span>
<span class="fn">AVG</span>(sales) <span class="kw">OVER</span> (
  <span class="kw">ORDER BY</span> date
  <span class="kw">ROWS BETWEEN</span> <span class="num">2</span> <span class="kw">PRECEDING AND CURRENT ROW</span> <span class="cmt">-- 現在の行と「2行前」までの計3行を対象にする</span>
)</pre>
<div class="callout"><strong>フレーム指定の構文：</strong><br>
<code>ROWS BETWEEN [開始] AND [終了]</code><br>
・<code>N PRECEDING</code> : N行前<br>
・<code>CURRENT ROW</code> : 現在の行<br>
・<code>UNBOUNDED PRECEDING</code> : 先頭行（ORDER BYのデフォルト開始位置）</div>`,
  question: `<p>daily_sales テーブルを用いて、日ごとの<em>売上、その月内の累積売上、直近3日間（当日含む）の移動平均</em>を算出してください。</p>
<p>累積売上は月が変わったらリセットされるようにします。日付の昇順で出力してください。</p>

<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ daily_sales</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>sales_date</th><th>amount</th></tr>
        <tr><td>2025-05-29</td><td>10,000</td></tr>
        <tr><td>2025-05-30</td><td>15,000</td></tr>
        <tr><td>2025-05-31</td><td>20,000</td></tr>
        <tr><td>2025-06-01</td><td>12,000</td></tr>
        <tr><td>2025-06-02</td><td>18,000</td></tr>
        <tr><td>2025-06-03</td><td>24,000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>sales_date</th><th>amount</th><th class="tc-hi">cumulative_sales</th><th class="tc-g">moving_avg_3d</th></tr>
<tr><td>2025-05-29</td><td>10,000</td><td class="tc-hi">10,000</td><td class="tc-g">10,000</td></tr>
<tr><td>2025-05-30</td><td>15,000</td><td class="tc-hi">25,000</td><td class="tc-g">12,500</td></tr>
<tr><td>2025-05-31</td><td>20,000</td><td class="tc-hi">45,000</td><td class="tc-g">15,000</td></tr>
<tr><td>2025-06-01</td><td>12,000</td><td class="tc-o">12,000</td><td class="tc-g">15,667</td></tr>
<tr><td>2025-06-02</td><td>18,000</td><td class="tc-o">30,000</td><td class="tc-g">16,667</td></tr>
<tr><td>2025-06-03</td><td>24,000</td><td class="tc-o">54,000</td><td class="tc-g">18,000</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ cumulative_salesは月ごとにリセット。moving_avg_3dは月を跨いでも直近3日の平均を計算（整数に四捨五入）。</p>`,
  answer: `<pre><span class="kw">SELECT</span>
  sales_date,
  amount,

  <span class="cmt">-- 累積売上（月ごとの累計）</span>
  <span class="fn">SUM</span>(amount) <span class="kw">OVER</span> (
    <span class="kw">PARTITION BY</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, sales_date) <span class="cmt">-- 月ごとに集計範囲をリセット</span>
    <span class="kw">ORDER BY</span>     sales_date                       <span class="cmt">-- 日付順に足し上げる</span>
  ) <span class="kw">AS</span> cumulative_sales,
  <span class="cmt">-- ORDER BYを指定した時点で暗黙的に「ROWS BETWEEN 先頭 AND 現在の行」になる</span>

  <span class="cmt">-- 直近3日間の移動平均（当日＋過去2日）</span>
  <span class="fn">ROUND</span>(
    <span class="fn">AVG</span>(amount) <span class="kw">OVER</span> (
      <span class="kw">ORDER BY</span> sales_date
      <span class="kw">ROWS BETWEEN</span> <span class="num">2</span> <span class="kw">PRECEDING AND CURRENT ROW</span>    <span class="cmt">-- 2行前 ～ 現在の行 (計3行) を対象</span>
    ),
    <span class="num">0</span>
  ) <span class="kw">AS</span> moving_avg_3d

<span class="kw">FROM</span>  <span class="tbl">daily_sales</span>
<span class="kw">ORDER BY</span> sales_date;

<span class="cmt">/*
  SQL実行順序:
  1. FROM daily_sales           → テーブル全6行を読み込む
  2. SUM() OVER(PARTITION BY..) → 月で区切り、日順で累積和を計算（6月1日でリセット）
  3. AVG() OVER(ROWS BETWEEN..) → 月区切りなしで、現在の行を含めた直近3行の平均を計算
  4. SELECT ...                 → 計算列を出力（ROUNDで整数化）
  5. ORDER BY sales_date        → 日付の昇順で並べ替え
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>PARTITION BY + ORDER BY</strong> — 累積和（月ごとのリセット）</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>sales_date</th><th>amount</th><th class="tc-hi">累積計算プロセス</th><th class="tc-hi">cumulative</th></tr>
<tr class="tr-hi"><td>05-29</td><td>10,000</td><td class="tc-g">10,000</td><td class="tc-hi">10,000</td></tr>
<tr class="tr-hi"><td>05-30</td><td>15,000</td><td class="tc-g">10,000 + 15,000</td><td class="tc-hi">25,000</td></tr>
<tr class="tr-hi"><td>05-31</td><td>20,000</td><td class="tc-g">10,000 + 15,000 + 20,000</td><td class="tc-hi">45,000</td></tr>
<tr class="tr-hi4"><td>06-01</td><td>12,000</td><td class="tc-o">12,000 (月替わりでリセット)</td><td class="tc-o">12,000</td></tr>
<tr class="tr-hi4"><td>06-02</td><td>18,000</td><td class="tc-o">12,000 + 18,000</td><td class="tc-o">30,000</td></tr>
</table></div>
</div>
<div class="step-block" style="margin-top:10px;">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>ROWS BETWEEN</strong> — 移動平均（直近3行の枠をスライド）</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>sales_date</th><th>対象となる行（amount）</th><th>計算内訳</th><th class="tc-g">moving_avg</th></tr>
<tr><td>05-29</td><td>[10,000]</td><td>10,000 ÷ 1</td><td class="tc-g">10,000</td></tr>

<pre><span class="cmt">-- 1. NULLIF: 値が一致したら NULL を返す</span>
<span class="fn">NULLIF</span>(impressions, <span class="num">0</span>)

<span class="cmt">-- 割り算の分母に使うことで「ゼロ除算（Division by zero）エラー」を防ぐ。</span>

<span class="fn">COALESCE</span>(clicks, <span class="num">0</span>)
<span class="cmt">-- clicks が NULL なら 0 を返す。NULLによる計算結果の伝播を防ぐ。</span></pre>
<div class="callout warn"><strong>SQLの四則演算とNULL：</strong><br>
SQLでは <code>100 + NULL</code> の結果は <code>100</code> ではなく <code>NULL</code> になります。また、<code>100 / 0</code> は即座にクエリエラーとなり処理が停止します。この2つは実務バグの2大原因です。</div>`,
  question: `<p>campaign_results テーブルから、各キャンペーンの <em>クリック率（CTR: clicks ÷ impressions × 100）</em> をパーセントで算出してください。</p>

        <tr><td>C02</td><td class="tc-o">0</td><td>0</td></tr>

        <tr><td>C04</td><td>5,000</td><td class="null">NULL</td></tr>

<tr><td>C02</td><td class="tc-o">0</td><td>0</td><td class="tc-r">0.0</td></tr>
<tr><td>C03</td><td class="null">NULL</td><td>50</td><td class="tc-r">0.0</td></tr>

  <span class="fn">COALESCE</span>(
    <span class="fn">ROUND</span>(
      <span class="cmt">-- 分子: clicksがNULLなら0にする。* 100.0で小数計算にする</span>
      <span class="fn">COALESCE</span>(clicks, <span class="num">0</span>) * <span class="num">100.0</span>

      <span class="cmt">-- 分母: impressionsが0ならNULLにする（ゼロ除算回避）</span>

  [C03] 50*100 / NULLIF(NULL,0) → 5000 / NULL = NULL → COALESCE(NULL, 0.0) = 0.0
  [C04] COALESCE(NULL,0)*100 / 5000 → 0 / 5000 = 0 → 0.0
*/</span></pre>`,

<div class="viz-flow">

<div class="tbl-wrap"><table class="vtbl">
<tr><th>ID</th><th>分子 <code>COALESCE(clk,0)</code></th><th>分母 <code>NULLIF(imp,0)</code></th><th>割り算結果</th><th class="tc-g">最終 <code>COALESCE(結果,0)</code></th></tr>

<tr><td>C03</td><td>5000</td><td class="null">NULL</td><td class="null">NULL</td><td class="tc-g">0.0</td></tr>
<tr><td>C04</td><td class="tc-o">0（NULL回避）</td><td>5000</td><td>0</td><td class="tc-g">0.0</td></tr>

</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="flex-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足：</strong>割り算を行う際は<strong>常に分母が0になる可能性を疑う</strong>のがSQLの鉄則です。<code>NULLIF(列, 0)</code> を分母に挟むだけで、0によるエラーを安全な NULL（計算不能）に変換できます。</div></div>
<div class="flex-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COALESCE は複数引数を取れる：</strong><code>COALESCE(email, phone, address, '連絡先不明')</code> のように3つ以上の引数を渡すと、「最初に見つかった NULL でない値」を返します。優先順位をつけた値の取得に便利です。</div></div>

<pre><span class="kw">WITH RECURSIVE</span> cte_name <span class="kw">AS</span> (
  <span class="cmt">-- 1. 非再帰項（ベースとなる最初の行。社長やトップカテゴリなど）</span>
  <span class="kw">SELECT</span> ...
  <span class="kw">UNION ALL</span>
  <span class="cmt">-- 2. 再帰項（CTE自身を参照し、ループして次の階層を呼び出す）</span>
  <span class="kw">SELECT</span> ... <span class="kw">FROM</span> table <span class="kw">JOIN</span> cte_name <span class="kw">ON</span> ...
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> cte_name;</pre>
<div class="callout ok"><strong>ループが止まる条件：</strong><br>
再帰項の JOIN で「これ以上部下がいない（一致する行がない）」状態になると、UNION ALL される行が 0 になり、自動的に再帰処理が終了します。</div>`,

   Q8 複数CTEによる処理の分割
══════════════════════════════════════════════════ */
{

  title: "複数CTE — 複雑なロジックを段階的に整理する",
  tags: [["r","複数CTE"],["o","WITH"],["g","中間テーブル"],["p","ロジック整理"]],
  premise: `<p>実務のSQLは何百行にもなることがあり、1つの巨大なクエリの中に全ての JOIN や GROUP BY を詰め込むと「どの粒度（行の単位）で結合しているのか」が全く分からなくなります。<strong>複数のCTE</strong> をカンマ区切りで定義して、処理を部品化しましょう。</p>
<pre><span class="kw">WITH</span>
  cte1 <span class="kw">AS</span> ( <span class="kw">SELECT</span> ... ),              <span class="cmt">-- 1つ目の中間テーブル</span>
  cte2 <span class="kw">AS</span> ( <span class="kw">SELECT</span> ... <span class="kw">FROM</span> cte1 ),    <span class="cmt">-- cte1を利用して2つ目を作る</span>
  cte3 <span class="kw">AS</span> ( <span class="kw">SELECT</span> ... )               <span class="cmt">-- 独立した別の集計を作る</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> cte2 <span class="kw">JOIN</span> cte3 ...;      <span class="cmt">-- 最後に綺麗に結合する</span></pre>
<div class="callout ok"><strong>鉄則「1対多のテーブルを先に集計してからJOINする」：</strong><br>
明細テーブルをそのままマスタにJOINすると行が増殖し、他の集計がおかしくなります（ファントムリード/ファン・トラップ）。明細テーブルはCTE内で <code>GROUP BY</code> して <strong>「ユーザー1人に1行」の粒度にしてから</strong> 本流のクエリにJOINするのが安全です。</div>`,
  question: `<p>users テーブルに対して、page_views テーブルからの「総アクセス数」と、orders テーブルからの「総購入金額」を結合したいです。</p>
<p><em>アクセス集計CTE、購入集計CTE を別々に作成し、最後に users テーブルと LEFT JOIN して統合</em>してください。アクセスや購入がない場合は 0 を表示します。</p>

<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">

  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th class="tc-hi">total_views</th><th class="tc-g">total_amount</th></tr>
<tr><td>1</td><td>田中</td><td class="tc-hi">15</td><td class="tc-g">3,000</td></tr>
<tr><td>2</td><td>佐藤</td><td class="tc-hi">20</td><td class="tc-o">0</td></tr>
<tr><td>3</td><td>山田</td><td class="tc-o">0</td><td class="tc-g">7,000</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ CTEで「ユーザーごとの集計表」を作ってからJOINしているため、行の増殖バグが起きない。</p>`,
  answer: `<pre><span class="kw">WITH</span>
<span class="cmt">-- 1. アクセス数をユーザー単位(1行)に集計するCTE</span>
user_views <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    user_id,
    <span class="fn">SUM</span>(views) <span class="kw">AS</span> sum_views
  <span class="kw">FROM</span> <span class="tbl">page_views</span>

),

<span class="cmt">-- 2. 購入金額をユーザー単位(1行)に集計するCTE</span>
user_orders <span class="kw">AS</span> (

<span class="cmt">-- 3. 最後に users を起点にして安全な粒度(1対1)でJOINする</span>
<span class="kw">SELECT</span>

  <span class="fn">COALESCE</span>(o.sum_amount, <span class="num">0</span>) <span class="kw">AS</span> total_amount
<span class="kw">FROM</span>       <span class="tbl">users</span> u
<span class="kw">LEFT JOIN</span>  user_views  v <span class="kw">ON</span> u.user_id <span class="op">=</span> v.user_id
<span class="kw">LEFT JOIN</span>  user_orders o <span class="kw">ON</span> u.user_id <span class="op">=</span> o.user_id

<span class="kw">ORDER BY</span> u.user_id;

<span class="cmt">/*
  SQL実行順序:
  1. user_views CTE  → page_views を集計し、[id1: 15], [id2: 20] のマートを作る
  2. user_orders CTE → orders を集計し、[id1: 3000], [id3: 7000] のマートを作る
  3. FROM users u    → 起点となる全3行
  4. LEFT JOIN       → CTEの結果をJOIN。id2のorders、id3のviewsは結合先がないためNULL
  5. SELECT ...      → COALESCEでNULLを0に変換して出力
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>危険な書き方（アンチパターン）</strong> — もしCTEを使わずに直接JOINしたら？</span></div>
<div class="callout danger" style="font-size:12px;">
<code>FROM users LEFT JOIN page_views LEFT JOIN orders</code><br>
田中(id=1) は views が <strong>2行</strong>、orders が <strong>1行</strong> あります。<br>
直接JOINすると 1行×2行×1行 ＝ <strong>2行に増殖</strong> します。<br>
その結果、オーダー金額(3,000)が2行に複製され、合計すると <strong>6,000円と二重計上</strong> されてしまう深刻なバグ（ファン・トラップ）が発生します。
</div>
</div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>CTE による「粒度の統一」</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>テーブル・CTE名</th><th>粒度（1行の意味）</th><th>状態</th></tr>
<tr><td>users</td><td>1ユーザー</td><td class="tc-g">OK</td></tr>
<tr class="tr-hi4"><td>page_views（元）</td><td>1アクセスイベント</td><td class="tc-r">NG（複数行あり）</td></tr>
<tr><td>user_views（CTE）</td><td>1ユーザー</td><td class="tc-g">GROUP BY済・OK</td></tr>
<tr class="tr-hi4"><td>orders（元）</td><td>1回の注文</td><td class="tc-r">NG（複数行あり）</td></tr>
<tr><td>user_orders（CTE）</td><td>1ユーザー</td><td class="tc-g">GROUP BY済・OK</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="flex-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足：</strong>CTE（Common Table Expression）を複数つなげる場合、<code>WITH</code> は最初の1回だけ書き、2つ目以降は <code>,（カンマ）</code> で区切って <code>名前 AS ( SELECT... )</code> を続けます。最後のCTEの後にはカンマを付けず、本流の SELECT を書きます。</div></div>
<div class="flex-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>CTE同士の参照：</strong><code>cte2</code> の中で <code>FROM cte1</code> のように、先に定義した CTE を参照することも可能です。ロジックを段階的に深めたい場合に威力を発揮します。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="flex-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>サブクエリのネスト（マトリョーシカ状態）：</strong>CTEを使わず <code>FROM (SELECT ... FROM (SELECT ...))</code> のようにサブクエリを入れ子にしていくと、コードが右にどんどんインデントされ、読み解くのが不可能になります。「CTEで上から下へ読む」スタイルが現代SQLのスタンダードです。</div></div>
</div>
<div class="practical-box">
<div class="practical-title">💼 PRACTICAL COLUMN</div>
<div class="flex-row"><span class="insight-icon">🏢</span><div class="practical-body"><strong>実務コードの9割はこの「複数CTE」スタイル</strong><br>複雑なビジネスロジック（例：アクティブユーザー定義、割引クーポンの適応、税率計算）を1つのSQLで書く場合、10個以上のCTEをカンマで繋いで1000行のクエリを書くことも珍しくありません。「データクレンジングのCTE」「集計のCTE」「結合のCTE」と役割ごとにブロックを分けることで、バグが起きにくく他人がレビューしやすい保守性の高いコードになります。</div></div>
</div>`

/* ══════════════════════════════════════════════════

{

  title: "相関サブクエリ応用 — 各ユーザーの「最新のステータス」を取得",
  tags: [["r","ROW_NUMBER()"],["o","最新行の取得"],["g","ウィンドウ関数"],["p","履歴テーブル操作"]],
  premise: `<p>実務で頻出する「履歴テーブル（ログ）から、各ユーザーの最新の行だけを全列抽出する」問題です。相関サブクエリ（<code>WHERE date = (SELECT MAX(date)...)</code>）を使う古典的な方法もありますが、現在では <strong>ROW_NUMBER() + CTE</strong> の組み合わせが最も読みやすく、高速な定石です。</p>
<pre><span class="kw">WITH</span> ranked_log <span class="kw">AS</span> (
  <span class="kw">SELECT</span> *,
    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> user_id         <span class="cmt">-- ユーザーごとにグループ化</span>
      <span class="kw">ORDER BY</span>     updated_at <span class="kw">DESC</span> <span class="cmt">-- 日時の「降順（新しい順）」で連番</span>
    ) <span class="kw">AS</span> rn
  <span class="kw">FROM</span> <span class="tbl">status_history</span>
)
<span class="kw">SELECT</span> * <span class="kw">FROM</span> ranked_log <span class="kw">WHERE</span> rn <span class="op">=</span> <span class="num">1</span>;  <span class="cmt">-- 1番（最新）だけを残す</span></pre>`,

<tr><th>user_id</th><th class="tc-hi">current_plan</th><th class="tc-g">last_changed_at</th></tr>
<tr><td>U10</td><td class="tc-hi">Premium</td><td class="tc-g">2025-06-20</td></tr>

<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ U10は3回の変更のうち最新のPremium、U20は最新のFreeが抽出される。</p>`,
  answer: `<pre><span class="kw">WITH</span> ranked_history <span class="kw">AS</span> (

                           [U20] 05-01は 1、02-15は 2
  2. FROM ranked_history → CTEの結果を読み込む
  3. WHERE rn = 1        → 連番が1の行（最新行）だけを残す

  explain: `

<tr class="tr-dim"><td>U10</td><td>01-01 (最古)</td><td>Free</td><td>3</td></tr>
<tr class="tr-hi"><td>U20</td><td class="tc-g">05-01 (最新)</td><td>Free (解約)</td><td class="tc-hi">1</td></tr>

</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">WHERE rn = 1 でフィルタリング</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>なぜ MAX() + GROUP BY ではダメなのか？</strong></span></div>

</div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="flex-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足：</strong>中級Q10の復習ですが、ウィンドウ関数は <code>WHERE</code> に直接書けないため必ず CTE かサブクエリで包む必要があります。</div></div>
<div class="flex-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>初回の行を取りたい場合：</strong>「最初に登録したプラン」を取りたい場合は、<code>ORDER BY changed_at ASC</code> に変更するだけで取得できます。要件変更に非常に強い書き方です。</div></div>

<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="flex-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>相関サブクエリを使う（古典的で遅い）：</strong><br>

</div>
<div class="practical-box">
<div class="practical-title">💼 PRACTICAL COLUMN</div>
<div class="flex-row"><span class="insight-icon">🏢</span><div class="practical-body"><strong>イベントログは常にこのパターンで捌く</strong><br>アクセスログ・購買ログ・ステータス変更履歴など、DBに追記（INSERT）され続けるテーブルから「現在の最新状態（Snapshot）」を復元する処理は、データ基盤構築（ETL処理）の最重要ステップです。「各IDの最新行を取る」と言われたら、脊髄反射で <code>WITH CTE AS (ROW_NUMBER() OVER(PARTITION BY id ORDER BY date DESC))</code> を書けるようにしましょう。</div></div>
</div>`

  <li><strong>一般顧客</strong> : 上記のどちらにも当てはまらない</li>
</ul>
<p>※分析の基準日（現在の日付）は <code>'2025-06-01'</code> とします。経過日数の計算には <code>CURRENT_DATE</code> の代わりにこの固定日を使ってください。顧客IDの昇順で出力します。</p>

<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ order_history</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>customer_id</th><th>order_date</th><th>amount</th></tr>
        <tr><td>C01</td><td>2025-05-15</td><td>8,000</td></tr>
        <tr><td>C01</td><td>2025-05-20</td><td>15,000</td></tr>
        <tr><td>C01</td><td>2025-05-30</td><td>5,000</td></tr>
        <tr><td>C02</td><td>2024-12-10</td><td>12,000</td></tr>
        <tr><td>C02</td><td>2025-01-05</td><td>8,000</td></tr>
        <tr><td>C03</td><td>2025-05-10</td><td>4,000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>customer_id</th><th class="tc-g">recency_days</th><th class="tc-g">frequency</th><th class="tc-g">monetary</th><th class="tc-hi">customer_segment</th></tr>
<tr><td>C01</td><td class="tc-g">2</td><td class="tc-g">3</td><td class="tc-g">28,000</td><td class="tc-hi">優良顧客</td></tr>
<tr><td>C02</td><td class="tc-r">147</td><td class="tc-g">2</td><td class="tc-g">20,000</td><td class="tc-o">離反注意</td></tr>
<tr><td>C03</td><td class="tc-g">22</td><td class="tc-g">1</td><td class="tc-g">4,000</td><td class="tc-p">一般顧客</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ C01: 最新5/30から基準日6/1まで2日。回数3, 金額28,000 なので優良顧客。<br>C02: 最新1/5から147日経過しているため離反注意。</p>`,
  answer: `<pre><span class="kw">WITH</span> rfm_metrics <span class="kw">AS</span> (
  <span class="cmt">-- 1. まずは各顧客の R・F・M の数値を計算するCTE</span>
  <span class="kw">SELECT</span>
    customer_id,

    <span class="cmt">-- Recency(R): 基準日 - 顧客の最も新しい(MAX)購入日 ＝ 経過日数</span>
    <span class="cmt">-- PostgreSQLの場合、DATE型同士の引き算で日数がINTで返る</span>
    (<span class="str">'2025-06-01'</span>::<span class="kw">DATE</span> <span class="op">-</span> <span class="fn">MAX</span>(order_date)) <span class="kw">AS</span> recency_days,
    <span class="cmt">-- MySQLの場合: DATEDIFF('2025-06-01', MAX(order_date))</span>

    <span class="cmt">-- Frequency(F): 購入回数</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> frequency,

    <span class="cmt">-- Monetary(M): 累計購入金額</span>
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> monetary

  <span class="kw">FROM</span> <span class="tbl">order_history</span>
  <span class="kw">GROUP BY</span> customer_id
)

<span class="cmt">-- 2. 計算したRFM指標をもとに、CASE式でセグメントを判定する</span>
<span class="kw">SELECT</span>
  customer_id,
  recency_days,
  frequency,
  monetary,

  <span class="kw">CASE</span>
    <span class="cmt">-- 条件① 優良顧客の判定（Fが3以上 かつ Mが20,000以上）</span>
    <span class="kw">WHEN</span> frequency <span class="op">&gt;=</span> <span class="num">3</span> <span class="kw">AND</span> monetary <span class="op">&gt;=</span> <span class="num">20000</span>
      <span class="kw">THEN</span> <span class="str">'優良顧客'</span>

    <span class="cmt">-- 条件② 離反注意の判定（Rが90より大きい）</span>
    <span class="cmt">-- CASE式は上から順に評価されるため、優良顧客でありかつ90日経過している場合は「優良顧客」が優先される設計</span>
    <span class="kw">WHEN</span> recency_days <span class="op">&gt;</span> <span class="num">90</span>
      <span class="kw">THEN</span> <span class="str">'離反注意'</span>

    <span class="cmt">-- 条件③ 上記以外</span>
    <span class="kw">ELSE</span> <span class="str">'一般顧客'</span>
  <span class="kw">END</span> <span class="kw">AS</span> customer_segment

<span class="kw">FROM</span> rfm_metrics
<span class="kw">ORDER BY</span> customer_id;

<span class="cmt">/*
  SQL実行順序:
  1. rfm_metrics CTE → 元テーブルを顧客単位(GROUP BY)に圧縮
                       C01: 最新日付 5/30 → '2025-06-01' - '2025-05-30' = 2日 (R)
                            回数 3回 (F), 金額 28,000 (M)
                       C02: 最新日付 1/5 → 147日 (R) / 回数 2 (F) / 金額 20,000 (M)
                       C03: 最新日付 5/10 → 22日 (R) / 回数 1 (F) / 金額 4,000 (M)
  2. FROM rfm_metrics → 計算済みのCTEを読み込む
  3. SELECT ...       → 計算済みの列を参照しながら、CASE式でセグメント判定
                       C01: F>=3 AND M>=20000 に合致 → 優良顧客
                       C02: recency > 90 に合致 → 離反注意
                       C03: どちらも合致しない → 一般顧客
  4. ORDER BY ...     → 顧客IDの昇順で出力
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>RFMの算出（CTE）</strong> — 生の明細データから指標を抽出</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ID</th><th>MAX(order_date)</th><th class="tc-g">Recency (基準日-MAX)</th><th class="tc-g">Frequency (COUNT)</th><th class="tc-g">Monetary (SUM)</th></tr>
<tr><td>C01</td><td>2025-05-30</td><td class="tc-g">6/1 - 5/30 = 2日</td><td class="tc-g">3回</td><td class="tc-g">28,000円</td></tr>
<tr><td>C02</td><td>2025-01-05</td><td class="tc-r">6/1 - 1/5 = 147日</td><td class="tc-g">2回</td><td class="tc-g">20,000円</td></tr>
<tr><td>C03</td><td>2025-05-10</td><td class="tc-g">6/1 - 5/10 = 22日</td><td class="tc-g">1回</td><td class="tc-g">4,000円</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">CASE 式による条件分岐（上から順に評価される）</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>CASE式の評価ロジック</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ID</th><th>① 優良 (F>=3 且つ M>=20000)</th><th>② 離反 (R > 90)</th><th class="tc-hi">最終判定</th></tr>
<tr class="tr-hi"><td>C01</td><td class="tc-hi">TRUE (3>=3, 28k>=20k)</td><td>未評価（①で決定）</td><td class="tc-hi">優良顧客</td></tr>
<tr class="tr-hi4"><td>C02</td><td class="tc-dim">FALSE (Fが2)</td><td class="tc-o">TRUE (147 > 90)</td><td class="tc-o">離反注意</td></tr>
<tr class="tr-hi3"><td>C03</td><td class="tc-dim">FALSE</td><td class="tc-dim">FALSE</td><td class="tc-p">一般顧客（ELSE）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="flex-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足：</strong>CASE 式は <code>IF - ELSE IF - ELSE</code> の構文です。重要なのは「上の WHEN 条件に合致した時点で評価が終わり、下の WHEN は見られない」という点です。条件の優先順位を考えて記述する順序を決めます。</div></div>
<div class="flex-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ロジックの分離の美しさ：</strong>このクエリでは、集計処理（CTE）と、ビジネスルールの判定（外側のSELECT）をきれいに分けています。もしCTEを使わずに書くと <code>CASE WHEN COUNT(*) >= 3 AND SUM(amount) >= 20000 THEN...</code> のように式が肥大化し、読みにくくなります。</div></div>

}

/* ─── 共通レンダリング関数 ─── */
function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = { r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p', y:'tag-y' };
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].split(':')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue' ,'前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','要件とデータ',q.question)}
      ${acc('📊','pill-orange','出力例','期待される出力結果',q.output)}
      ${acc('✅','pill-red'  ,'模範回答','実務レベルの模範解答',q.answer)}
      ${acc('🔍','pill-purple','解説','ステップ別解説とポイント',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildAll();
</script>
