<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLデータモデリング10選 — 正規化・主キー・FK・リレーション・NULL設計・型選択（基礎編）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== CSS変数（カラートークン） ===== */
  :root {
    --bg:     #0a0e13;
    --bg2:    #131920;
    --bg3:    #1c2330;
    --bg4:    #263040;
    --border: #2a3545;
    --text:   #cdd9e5;
    --dim:    #768390;
    --accent: #4dabf7;   /* メインアクセント：青 */
    --green:  #3fb950;
    --orange: #f0883e;
    --red:    #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    /* シンタックスハイライト */
    --kw:  #ff7b72;   /* キーワード */
    --fn:  #79c0ff;   /* 関数 */
    --str: #a5d6ff;   /* 文字列 */
    --num: #f0c674;   /* 数値 */
    --cmt: #6a737d;   /* コメント */
    --tbl: #ffa657;   /* テーブル名 */
    --op:  #f0883e;   /* 演算子 */
  }

  /* ===== リセット & ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  /* ===== サイトヘッダー ===== */
  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex  { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim);
  }

  /* ===== タブ（スティッキー） ===== */
  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row     { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none;
    border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  /* ===== プログレスバー ===== */
  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  /* ===== メインコンテンツ ===== */
  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel       { display: none; }
  .panel.active { display: block; }

  /* ===== 問題ヘッダー ===== */
  .q-header   { margin-bottom: 18px; }
  .q-number   { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title    { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags     { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag      { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r      { background: #1a2c44; color: var(--accent);  border: 1px solid #1e4070; }
  .tag-g      { background: #162416; color: var(--green);   border: 1px solid #1e3a1e; }
  .tag-o      { background: #2e1e0a; color: var(--orange);  border: 1px solid #4a2e0a; }
  .tag-p      { background: #1e1433; color: var(--purple);  border: 1px solid #3a2060; }

  /* ===== アコーディオン ===== */
  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head {
    display: flex; align-items: center; gap: 10px; padding: 11px 14px;
    cursor: pointer; user-select: none;
  }
  .acc-head:hover  { background: var(--bg3); }
  .acc-icon        { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title       { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill        { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron     { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body        { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  /* ===== 本文テキスト ===== */
  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em     { color: var(--yellow); font-style: normal; font-weight: 600; }
  code   { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  /* ===== コードブロック ===== */
  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  /* シンタックスハイライト用クラス */
  .kw  { color: var(--kw);  font-weight: 700; }
  .fn  { color: var(--fn);  }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--op);  }

  /* ===== コールアウト ===== */
  .callout        { border-left: 3px solid var(--accent); background: #0e1e33; padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px; }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  /* ===== データセクション（テーブル表示） ===== */
  .data-section  { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables   { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  /* ===== ビジュアライゼーション（フロー図） ===== */
  .viz-flow   { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }
  .step-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .step-num   { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  /* ステップ番号カラー */
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green);  }
  .sn3 { background: #2e1a2e; color: var(--purple);  }
  .sn4 { background: #2e1a0a; color: var(--orange);  }
  .step-desc        { color: var(--dim); }
  .step-desc strong { color: var(--text); }

  /* ===== データテーブル ===== */
  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  /* テーブル行ハイライト */
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: 0.4; }
  /* テーブルセルカラー */
  .tc-hi { color: var(--accent) !important; font-weight: 700; }
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }

  /* ===== 矢印 ===== */
  .arrow      { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  /* ===== インサイトボックス ===== */
  .insight-box   { background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row   { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon  { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em     { color: var(--yellow); }
  .insight-body code   { font-size: 11px; }

  /* ===== アンチパターンボックス ===== */
  .anti-box   { background: #160a0a; border: 1px solid #3a1515; border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row   { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code   { font-size: 11px; }

  /* ===== コラムボックス ===== */
  .column-box   { background: #0d1520; border: 1px solid #1c3550; border-radius: 8px; padding: 14px 16px; margin-top: 10px; border-left: 3px solid var(--fn); }
  .column-title { font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .column-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--fn); }

  /* ===== ナビゲーションバー ===== */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  /* ===== レスポンシブ ===== */
  @media (max-width: 520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title      { font-size: 15px; }
    pre           { font-size: 11px; padding: 10px; }
    table.vtbl    { font-size: 10.5px; }
    .acc-title    { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main          { padding: 16px 10px 60px; }
    .data-tables  { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ===== サイトヘッダー ===== -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">MODEL</span></div>
      <div class="header-text-wrap">
        <div class="header-title">データモデリングで学ぶ SQL 基礎10選（正規化／主キー／外部キー／1対多・多対多リレーション／NULL設計／型選択／論理削除／ステータス管理／監査カラム設計）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎</span>
      <span class="htag">データモデリング</span>
      <span class="htag">テーブル設計</span>
      <span class="htag">PostgreSQL対応</span>
    </div>
  </div>
</header>

<!-- ===== スティッキータブ ===== -->
<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
/* ========================================================
   問題データ定義
   各問題は以下のキーを持つオブジェクト:
   num      : 問題番号
   title    : タイトル
   tags     : [[色, テキスト], ...] の配列
   premise  : 前提知識 HTML
   question : 問題 HTML
   output   : 期待出力 HTML
   answer   : 模範解答コード（pre 要素の中身）HTML
   explain  : 解説 HTML
======================================================== */
const QS = [

/* ══════════════════════════════════════════════════
   Q1  正規化の基礎 — 繰り返し項目と関数従属性
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "正規化の基礎 — 繰り返し列・非正規形から3NFへ",
  tags: [["r","正規化"],["r","1NF"],["o","関数従属性"],["g","3NF"]],
  premise: `<p><strong>正規化（Normalization）</strong>とは、テーブルの冗長性（重複・矛盾）を排除し、データの整合性を保ちやすい設計に変換するプロセスです。正規化の段階を<em>第N正規形（NF: Normal Form）</em>と呼びます。</p>
<div class="callout"><strong>正規化の3つの主要ステップ：</strong><br>
・<em>第1正規形（1NF）</em> → 繰り返し列・配列列をなくし、1セルに1値だけ持つ<br>
・<em>第2正規形（2NF）</em> → 部分関数従属（複合PKの一部だけに依存する列）を別テーブルに分離<br>
・<em>第3正規形（3NF）</em> → 推移的関数従属（非キー列が別の非キー列に依存）を別テーブルに分離</div>
<p>実務では <em>3NFを目指すことが基本</em> であり、すべてのWebアプリのテーブル設計の土台となります。過度な正規化（5NF以上）はJOINが複雑になり、パフォーマンスとのトレードオフが発生します。</p>`,
  question: `<p>以下の「非正規形テーブル」には複数の設計上の問題があります。<em>問題を特定し、適切に正規化（3NF）されたテーブル群を設計・作成してください</em>。</p>
<div class="data-section">
  <div class="data-label">問題のある非正規形テーブル（orders_bad）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>order_id</th><th>user_name</th><th>user_email</th><th>user_zip</th><th>user_city</th><th>item1_name</th><th>item1_qty</th><th>item2_name</th><th>item2_qty</th></tr>
    <tr><td>1</td><td>田中太郎</td><td>tanaka@example.com</td><td>150-0001</td><td>渋谷区</td><td>Tシャツ</td><td>2</td><td>パンツ</td><td>1</td></tr>
    <tr><td>2</td><td>田中太郎</td><td>tanaka@example.com</td><td>150-0001</td><td>渋谷区</td><td>靴</td><td>1</td><td class="null">NULL</td><td class="null">NULL</td></tr>
    <tr><td>3</td><td>鈴木花子</td><td>suzuki@example.com</td><td>160-0022</td><td>新宿区</td><td>バッグ</td><td>1</td><td>財布</td><td>1</td></tr>
  </table></div>
</div>
<p>このテーブルの問題点を列挙し、3NFに正規化された<code>CREATE TABLE</code>文を書いてください。</p>`,
  output: `<p>正規化後のテーブル構成（3テーブルに分離）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>テーブル</th><th>役割</th><th>解消した問題</th></tr>
<tr class="tr-hi2"><td>users</td><td>ユーザー情報</td><td class="tc-g">ユーザー情報の重複をなくす</td></tr>
<tr class="tr-hi2"><td>orders</td><td>注文ヘッダー</td><td class="tc-g">1注文 = 1行に整理</td></tr>
<tr class="tr-hi2"><td>order_items</td><td>注文明細</td><td class="tc-g">繰り返し列（item1/item2）を行に変換</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① ユーザーテーブル（ユーザー情報の重複を排除）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">users</span> (                     <span class="cmt">-- 【超基礎】テーブルを作るコマンド</span>
    user_id   <span class="fn">SERIAL</span>      <span class="kw">PRIMARY KEY</span>,  <span class="cmt">-- 【超基礎】SERIAL=自動採番の整数, PRIMARY KEY=重複・NULLを許さない主キー</span>
    name      <span class="fn">VARCHAR</span>(<span class="num">100</span>) <span class="kw">NOT NULL</span>,     <span class="cmt">-- 【超基礎】NOT NULLで空値を禁止</span>
    email     <span class="fn">VARCHAR</span>(<span class="num">255</span>) <span class="kw">NOT NULL</span>
              <span class="kw">UNIQUE</span>,                    <span class="cmt">-- 【超基礎】UNIQUEで同じメールアドレスの二重登録を防ぐ</span>
    zip_code  <span class="fn">VARCHAR</span>(<span class="num">8</span>),               <span class="cmt">-- 郵便番号（任意のためNULL許可）</span>
    city      <span class="fn">VARCHAR</span>(<span class="num">100</span>)               <span class="cmt">-- 市区町村（任意のためNULL許可）</span>
);
<span class="cmt">-- ↑ 田中太郎の情報を「1か所だけ」に集約。注文が増えても住所変更は1行だけ更新すればよい</span>

<span class="cmt">-- ② 注文ヘッダーテーブル（1注文 = 1行）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">orders</span> (
    order_id   <span class="fn">SERIAL</span>       <span class="kw">PRIMARY KEY</span>,  <span class="cmt">-- 【超基礎】注文ごとの一意なID</span>
    user_id    <span class="fn">INTEGER</span>      <span class="kw">NOT NULL</span>      <span class="cmt">-- 【超基礎】どのユーザーの注文かを参照する外部キー列</span>
               <span class="kw">REFERENCES</span> <span class="tbl">users</span>(user_id)  <span class="cmt">-- 【超基礎】REFERENCES = 外部キー制約（usersにない値は登録できない）</span>
               <span class="kw">ON DELETE CASCADE</span>,         <span class="cmt">-- ユーザー削除時に関連注文も自動削除</span>
    ordered_at <span class="fn">TIMESTAMPTZ</span> <span class="kw">NOT NULL</span>

</div>

<p>PostgreSQL 13以降では <code>gen_random_uuid()</code> でUUIDを生成でき、16以降では <code>GENERATED ALWAYS AS IDENTITY</code> が推奨の自動採番方式です。</p>`,
  question: `<p>以下の3つのテーブルを適切な主キー型で設計してください。①<em>内部的な注文管理テーブル</em>（結合が多い）、②<em>外部APIに公開するAPIトークンテーブル</em>（URLに含まれる）、③<em>社員テーブル</em>（社員番号が一意の業務キー）の3パターンです。選択した理由もコメントで示してください。</p>`,

<tr class="tr-hi2"><td>api_tokens（公開URL）</td><td class="tc-g">UUID</td><td>推測困難でセキュア</td></tr>

  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>主キー型の比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>型</th><th>サイズ</th><th>生成方法</th><th>推測困難？</th><th>結合効率</th><th>向いている用途</th></tr>
<tr class="tr-hi2"><td>SERIAL / BIGSERIAL</td><td class="tc-g">4 / 8 byte</td><td>自動採番</td><td class="tc-r">NO（連番）</td><td class="tc-g">◎ 最高</td><td>内部管理テーブル</td></tr>
<tr class="tr-hi3"><td>UUID</td><td class="tc-y">16 byte</td><td>乱数生成</td><td class="tc-g">YES</td><td class="tc-y">△ やや遅い</td><td>外部公開ID・分散システム</td></tr>
<tr class="tr-hi"><td>自然キー（VARCHAR）</td><td class="tc-r">可変</td><td>業務値</td><td>場合による</td><td class="tc-r">△ 遅い</td><td>変わらない業務コード</td></tr>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>整数PKを外部公開した場合のリスク（IDOR脆弱性）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">

</table></div>
</div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>PRIMARY KEY は「テーブルのすべての行を一意に区別するための列」です。DBは自動的にPKにインデックスを作成するため、PKでの検索・結合は常に高速です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>サロゲートキーの最大の利点：</strong>業務の都合でメールアドレスや社員番号が変わっても、内部IDは変わりません。自然キーをPKにすると変更時に外部キーを持つすべてのテーブルのデータも更新が必要になり、データ整合性の維持が困難になります。</div></div>

</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>メールアドレスをPKにする：</strong>メールアドレスは変更される可能性があり、VARCHAR(255)のPKはインデックスが巨大になり結合も遅くなります。メールアドレスはUNIQUE制約だけで一意性を保証し、PKは別のサロゲートキーにするのが正解です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>複合自然キーをPKにする：</strong>（年度 + 部署コード + 連番）のような複合自然キーをPKにすると外部キー参照が煩雑になります。<code>REFERENCES 親(year, dept_code, seq)</code> のように複合外部キーになり、JOIN条件も複数列の結合が必要になります。</div></div>
</div>
<div class="column-box">

APIレスポンスに含めるIDと、DBの内部結合に使うIDを分離するパターンが実務で増えています。たとえば注文テーブルで <code>order_id BIGSERIAL PRIMARY KEY</code>（内部結合用）と <code>public_order_id UUID DEFAULT gen_random_uuid() UNIQUE</code>（外部公開用）の両方を持たせる設計です。<strong>「URLに出るIDはUUID、テーブル結合にはBIGINT」</strong>という使い分けで、セキュリティと処理効率を両立させます。
</div>
</div>
`

  premise: `<p><strong>外部キー（Foreign Key）制約</strong>は「このテーブルの列の値は、参照先テーブルの主キーに存在する値でなければならない」というルールをDBレベルで強制します。アプリ側の検証だけに頼らず、DB側でデータの整合性を保証する重要な機能です。</p>
<div class="callout"><strong>ON DELETE / ON UPDATE の選択肢：</strong><br>
・<code>RESTRICT</code>（デフォルト）→ 参照されている行の削除・更新を禁止（エラー）<br>
・<code>CASCADE</code> → 親の削除・更新に合わせて子も自動で削除・更新<br>
・<code>SET NULL</code> → 親が削除されると子の外部キー列をNULLに更新<br>
・<code>SET DEFAULT</code> → 親が削除されると子の外部キー列をデフォルト値に更新</div>`,
  question: `<p>ブログアプリのテーブルを設計します。<em>各テーブルのON DELETE動作を適切に選択</em>してください。要件は①ユーザー削除時に投稿も削除、②投稿削除時にコメントも削除、③タグ削除時は投稿タグの紐付けだけ削除（投稿は残す）、④ユーザー削除時にそのユーザーが書いたコメントは「削除済みユーザー」として残す（NULL化）、の4つです。</p>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>INNER JOINは「両方に存在するデータだけほしい」、LEFT JOINは「左テーブルはすべて出したい（右にデータがなくてもOK）」という使い分けです。「商品がないカテゴリも一覧に出す」ような要件はLEFT JOINが正解です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(列名) vs COUNT(*) の使い分け：</strong>LEFT JOINと組み合わせる場合、<code>COUNT(*)</code>は一致しない行のNULL行も1件とカウントしてしまいます。<code>COUNT(p.product_id)</code>のように「右テーブルの列」を指定すると、NULLを除外して正確な件数（商品なしカテゴリは0）が得られます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>テーブルエイリアス（別名）の使い方：</strong><code>FROM categories c</code>の<code>c</code>がエイリアスです。長いテーブル名を省略できるだけでなく、<em>同じテーブルを複数回JOINする（自己結合）</em>場合に区別するためにも必須の知識です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WHERE句でJOIN条件を書く（古いスタイル）：</strong><code>FROM categories, products WHERE categories.category_id = products.category_id</code>はSQL-89スタイルで現在は非推奨です。意図が不明確でLEFT JOINが書けません。JOIN...ON構文を使いましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BYに含める列を間違える：</strong><code>GROUP BY c.category_id</code>だけだと<code>c.name</code>がSELECTに出せません（PostgreSQLは主キーで分かる場合は許可することもあるが、標準SQLでは全てのSELECT列か集計関数が必要）。GROUP BYには<code>SELECT</code>に出す非集計列をすべて含める習慣を持ちましょう。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：APIのN+1問題とJOINの関係</div>
<div class="column-body">
「商品一覧を取得してから、各商品のカテゴリ名を別のクエリで取得する」コードはN+1問題の典型です。商品が100件あれば101回クエリが走ります。<strong>JOIN（またはORMのeager loading）で1回のクエリにまとめる</strong>ことで、DBとの通信回数を劇的に減らせます。「一覧APIが遅い」ときはまずN+1を疑い、EXPLAIN ANALYZEで確認する習慣をつけましょう。
</div>
</div>
`
},

<div class="callout ok"><strong>中間テーブルの特徴：</strong><br>
・両テーブルの外部キーを組み合わせた複合主キーが典型的（重複を防ぐ）<br>
・必要に応じて追加属性（役割・有効期間など）を持てる<br>

<p>典型例：「生徒と授業（1人の生徒が複数の授業を受け、1つの授業に複数の生徒が参加）」「商品とタグ（1商品が複数のタグを持ち、1つのタグが複数の商品に付く）」</p>`,
  question: `<p>「生徒（students）」と「授業（courses）」の多対多テーブルを設計してください。中間テーブル名は <code>enrollments</code>（受講）とし、<em>受講日（enrolled_at）と成績（grade）も属性として持つ</em>ように設計してください。さらに、<em>「Alice が受講しているすべての授業名と成績を取得するクエリ」</em>も書いてください。</p>

</table></div>`,
  answer: `<pre><span class="cmt">-- ① 生徒テーブル（多対多の一方）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">students</span> (
    student_id <span class="fn">BIGSERIAL</span>   <span class="kw">PRIMARY KEY</span>,
    name       <span class="fn">VARCHAR</span>(<span class="num">100</span>) <span class="kw">NOT NULL</span>
);

<span class="cmt">-- ② 授業テーブル（多対多のもう一方）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">courses</span> (
    course_id <span class="fn">BIGSERIAL</span>   <span class="kw">PRIMARY KEY</span>,
    title     <span class="fn">VARCHAR</span>(<span class="num">200</span>) <span class="kw">NOT NULL</span>
);

<span class="cmt">-- ③ 中間テーブル（多対多を1対多×2に分解）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">enrollments</span> (
    student_id  <span class="fn">BIGINT</span>       <span class="kw">NOT NULL</span>
                <span class="kw">REFERENCES</span> <span class="tbl">students</span>(student_id) <span class="kw">ON DELETE CASCADE</span>,  <span class="cmt">-- 生徒削除→受講履歴も削除</span>
    course_id   <span class="fn">BIGINT</span>       <span class="kw">NOT NULL</span>
                <span class="kw">REFERENCES</span>  <span class="tbl">courses</span>(course_id) <span class="kw">ON DELETE CASCADE</span>,  <span class="cmt">-- 授業削除→受講履歴も削除</span>
    enrolled_at <span class="fn">DATE</span>         <span class="kw">NOT NULL</span> <span class="kw">DEFAULT</span> <span class="fn">CURRENT_DATE</span>,       <span class="cmt">-- 【超基礎】DATE型：日付のみ（時刻なし）</span>
    grade       <span class="fn">VARCHAR</span>(<span class="num">3</span>),                                         <span class="cmt">-- 成績（まだない場合はNULL許可）</span>
    <span class="kw">PRIMARY KEY</span> (student_id, course_id)                             <span class="cmt">-- 【超基礎】複合PK：同じ生徒が同じ授業に2回登録できない</span>
);
<span class="cmt">-- 中間テーブルのポイント:
-- ・複合PKが「同じ組み合わせの重複」を防ぐ制約として機能する
-- ・関係の属性（enrolled_at, grade）を持てる
-- ・サロゲートPKを追加して "id BIGSERIAL PRIMARY KEY" にする設計もある
--   （その場合 UNIQUE(student_id, course_id) で一意制約を別途付ける）</span>

<span class="cmt">-- ④ Alice が受講しているすべての授業名と成績を取得</span>
<span class="kw">SELECT</span>
    s.name          <span class="kw">AS</span> student_name,   <span class="cmt">-- 【超基礎】studentsテーブルの列</span>
    c.title         <span class="kw">AS</span> course_title,   <span class="cmt">-- 【超基礎】coursesテーブルの列</span>
    e.grade,                            <span class="cmt">-- 中間テーブルが持つ属性</span>
    e.enrolled_at
<span class="kw">FROM</span>       <span class="tbl">students</span>    s               <span class="cmt">-- 【超基礎】起点となるテーブル</span>
<span class="kw">INNER JOIN</span> <span class="tbl">enrollments</span> e               <span class="cmt">-- 【超基礎】中間テーブルを経由して</span>
           <span class="kw">ON</span> e.student_id <span class="op">=</span> s.student_id
<span class="kw">INNER JOIN</span> <span class="tbl">courses</span>     c               <span class="cmt">-- 【超基礎】もう一方のテーブルに到達する</span>
           <span class="kw">ON</span> c.course_id <span class="op">=</span> e.course_id
<span class="kw">WHERE</span>      s.name <span class="op">=</span> <span class="str">'Alice'</span>          <span class="cmt">-- 特定の生徒で絞り込み</span>
<span class="kw">ORDER BY</span>   e.enrolled_at;             <span class="cmt">-- 受講日順に並べる</span>

<span class="cmt">/*

  5. SELECT s.name, c.title, e.grade   → 必要な列を返す
  6. ORDER BY e.enrolled_at            → 受講日順に並べる
*/</span></pre>`,

<div class="step-block">

</div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>多対多の関係は「中間テーブルを追加して1対多×2に変換する」ことが基本です。「生徒と授業」「ユーザーとタグ」「商品とカテゴリ（複数カテゴリ対応）」など、実務で非常に頻出のパターンです。</div></div>

  premise: `<p><strong>NULL</strong> はSQLにおける「値が不明・未設定であることを表す特殊な状態」です。NULLは値ではなく「状態」であるため、<code>= NULL</code>や <code>!= NULL</code>は機能せず、<code>IS NULL</code> / <code>IS NOT NULL</code> を使わなければなりません。また、NULLを含む演算の結果はほぼNULLになります。</p>
<div class="callout warn"><strong>NULLの落とし穴：</strong><br>
・<code>NULL = NULL</code> → FALSE（NULLはNULLと等しくない）<br>
・<code>NULL + 100</code> → NULL（NULLとの演算結果はNULL）<br>
・<code>COUNT(*)</code> はNULLを数えるが <code>COUNT(列名)</code> はNULLを除外する<br>
・<code>WHERE col != '値'</code> はcol=NULLの行を含まない（NULLは除外される）</div>
<p>テーブル設計では「この列にNULLを許可する必要があるか？」を常に意識し、<em>不要なNULLは NOT NULL + DEFAULT で防ぐ</em>のが設計原則です。</p>`,
  question: `<p>ECサイトのユーザープロファイルテーブルを設計します。各列について<em>NULL許可/NOT NULL/DEFAULT値を適切に設定</em>し、さらに「配送先住所が未設定のユーザーに対してデフォルトの配送先メッセージを表示するクエリ」を書いてください。</p>

<div class="tbl-wrap"><table class="vtbl">

<tr class="tr-hi2"><td>田中太郎</td><td class="tc-g">東京都渋谷区1-2-3</td></tr>

  answer: `<pre><span class="cmt">-- テーブル定義（NULL設計を明示）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">user_profiles</span> (
    user_id          <span class="fn">BIGSERIAL</span>     <span class="kw">PRIMARY KEY</span>,          <span class="cmt">-- 【超基礎】自動採番PKはNULL不可が自動適用</span>
    email            <span class="fn">VARCHAR</span>(<span class="num">255</span>) <span class="kw">NOT NULL</span> <span class="kw">UNIQUE</span>,        <span class="cmt">-- 【超基礎】NOT NULL: 空値禁止、UNIQUE: 重複禁止</span>
    name             <span class="fn">VARCHAR</span>(<span class="num">100</span>) <span class="kw">NOT NULL</span>,               <span class="cmt">-- 【超基礎】必須項目はNOT NULL</span>
    phone            <span class="fn">VARCHAR</span>(<span class="num">20</span>),                        <span class="cmt">-- 【超基礎】制約なし = NULL許可（任意項目）</span>
    shipping_address <span class="fn">TEXT</span>,                               <span class="cmt">-- NULL = まだ配送先が未登録の状態を表す</span>
    is_newsletter    <span class="fn">BOOLEAN</span>      <span class="kw">NOT NULL</span>
                     <span class="kw">DEFAULT</span> <span class="fn">FALSE</span>,                      <span class="cmt">-- 【超基礎】DEFAULT: INSERTで省略した場合の初期値。BOOLEANにNULLは不要</span>
    created_at       <span class="fn">TIMESTAMPTZ</span>  <span class="kw">NOT NULL</span>
                     <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()                       <span class="cmt">-- 【超基礎】登録日時は自動設定（INSERTで指定不要）</span>
);

<span class="cmt">-- サンプルデータのINSERT（shipping_address を省略 → NULLになる）</span>
<span class="kw">INSERT INTO</span> <span class="tbl">user_profiles</span> (email, name, shipping_address)

<span class="cmt">-- ↑ is_newsletter はDEFAULT(FALSE)が適用される
--   created_at はDEFAULT(NOW())が適用される</span>

<span class="cmt">-- COALESCEで配送先メッセージを表示（NULLの場合に代替テキストを返す）</span>
<span class="kw">SELECT</span>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>NULLは「値がない」ではなく「値が不明」という状態です。NULLを含む演算・比較はほぼすべてNULLかUNKNOWNになります。<code>WHERE col = NULL</code>が機能しない理由がここにあります。</div></div>

</div>
</div>

<tr class="tr-hi"><td>論理削除（UPDATE）</td><td>田中太郎</td><td>deleted_at に現在時刻がセットされる</td></tr>
<tr class="tr-hi2"><td>active_users VIEWを参照</td><td>全ユーザー</td><td class="tc-g">deleted_atがNULLのユーザーのみ表示</td></tr>
<tr class="tr-hi3"><td>復元（UPDATE）</td><td>削除済みユーザー</td><td class="tc-p">deleted_at を NULL に戻す</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① テーブル定義（deleted_at列で論理削除を管理）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">users</span> (
    user_id    <span class="fn">BIGSERIAL</span>    <span class="kw">PRIMARY KEY</span>,
    name       <span class="fn">VARCHAR</span>(<span class="num">100</span>) <span class="kw">NOT NULL</span>,
    email      <span class="fn">VARCHAR</span>(<span class="num">255</span>) <span class="kw">NOT NULL</span> <span class="kw">UNIQUE</span>,
    created_at <span class="fn">TIMESTAMPTZ</span>  <span class="kw">NOT NULL</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>(),
    deleted_at <span class="fn">TIMESTAMPTZ</span>                                      <span class="cmt">-- 【超基礎】NULL = 生存中, 値あり = 削除済み（削除日時）</span>
);

<span class="cmt">-- 論理削除の実行（DELETE文ではなくUPDATEを使う）</span>
<span class="kw">UPDATE</span> <span class="tbl">users</span>
<span class="kw">SET</span>    deleted_at <span class="op">=</span> <span class="fn">NOW</span>()          <span class="cmt">-- 【超基礎】削除日時に現在時刻をセット（DELETE文は使わない）</span>
<span class="kw">WHERE</span>  user_id    <span class="op">=</span> <span class="num">1</span>             <span class="cmt">-- 対象ユーザーを指定</span>
  <span class="kw">AND</span>  deleted_at  <span class="kw">IS NULL</span>;       <span class="cmt">-- 既に削除済みなら更新しない（べき等性の確保）</span>

<span class="cmt">-- ② VIEWで「生存中ユーザーのみ」をデフォルトフィルタとして定義</span>
<span class="kw">CREATE VIEW</span> active_users <span class="kw">AS</span>        <span class="cmt">-- 【超基礎】VIEWは保存されたSELECTクエリ（仮想テーブル）</span>
    <span class="kw">SELECT</span> user_id, name, email, created_at
    <span class="kw">FROM</span>   <span class="tbl">users</span>
    <span class="kw">WHERE</span>  deleted_at <span class="kw">IS NULL</span>;     <span class="cmt">-- 【超基礎】deleted_atがNULL = 削除されていない行のみ</span>
<span class="cmt">-- VIEWを定義しておくと、アプリのクエリが「WHERE deleted_at IS NULL」の書き漏れを防げる</span>

<span class="cmt">-- ③ VIEWを普通のテーブルのように使う（削除済みが自動で除外される）</span>
<span class="kw">SELECT</span> <span class="op">*</span>                           <span class="cmt">-- VIEWから参照するため削除済みは自動で除外される</span>
<span class="kw">FROM</span>   active_users               <span class="cmt">-- 【超基礎】VIEWはテーブルと同じ構文で参照できる</span>
<span class="kw">ORDER BY</span> created_at;

<span class="cmt">-- ④ 誤って削除したユーザーを復元（deleted_at を NULL に戻す）</span>
<span class="kw">UPDATE</span> <span class="tbl">users</span>
<span class="kw">SET</span>    deleted_at <span class="op">=</span> <span class="kw">NULL</span>           <span class="cmt">-- 【超基礎】NULLに戻すことで「生存中」の状態に復元</span>
<span class="kw">WHERE</span>  user_id    <span class="op">=</span> <span class="num">2</span>             <span class="cmt">-- 復元対象のユーザーを指定</span>
  <span class="kw">AND</span>  deleted_at  <span class="kw">IS NOT NULL</span>;   <span class="cmt">-- 削除済みの行だけ対象（べき等性）</span>

<span class="cmt">-- 削除済みユーザー一覧を確認（監査目的）</span>
<span class="kw">SELECT</span> user_id, name, deleted_at
<span class="kw">FROM</span>   <span class="tbl">users</span>                      <span class="cmt">-- VIEWではなく元テーブルを参照して削除済みも見る</span>
<span class="kw">WHERE</span>  deleted_at <span class="kw">IS NOT NULL</span>    <span class="cmt">-- 削除済みのみ</span>
<span class="kw">ORDER BY</span> deleted_at <span class="kw">DESC</span>;        <span class="cmt">-- 最近削除した順</span>

<span class="cmt">/*
  論理削除のクエリ実行ポイント:
  1. DELETE ではなく UPDATE SET deleted_at = NOW() を使う
  2. 生存中チェック: AND deleted_at IS NULL（二重削除防止）
  3. 復元時: SET deleted_at = NULL（NULLで生存状態に戻す）
  4. 通常クエリ: VIEWを経由して deleted_at IS NULL が自動適用される
  5. 監査クエリ: 元テーブルを直接参照して削除済みも含めて見る
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>物理削除 vs 論理削除の比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>比較項目</th><th>物理削除（DELETE）</th><th>論理削除（UPDATE deleted_at）</th></tr>
<tr><td>データ復元</td><td class="tc-r">不可（WALがあれば可能だが困難）</td><td class="tc-g">可能（deleted_at = NULLに戻す）</td></tr>
<tr><td>削除履歴</td><td class="tc-r">残らない</td><td class="tc-g">deleted_atに削除日時が残る</td></tr>
<tr><td>DBサイズ</td><td class="tc-g">行が減る</td><td class="tc-r">行数が増える（物理行は残る）</td></tr>
<tr><td>クエリの複雑さ</td><td class="tc-g">シンプル</td><td class="tc-r">全クエリにWHERE deleted_at IS NULLが必要</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">VIEWで deleted_at IS NULL フィルタを集中管理してクエリの書き漏れを防ぐ</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>VIEWの動作：active_users は常に deleted_at IS NULL でフィルタされる</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th><th>deleted_at</th><th>active_usersで見える？</th></tr>
<tr class="tr-hi2"><td>1</td><td>田中太郎</td><td class="tc-g">NULL</td><td class="tc-g">✓ 見える</td></tr>
<tr class="tr-hi"><td>2</td><td>鈴木花子</td><td class="tc-r">2024-03-15</td><td class="tc-r">✗ 見えない（削除済み）</td></tr>
<tr class="tr-hi2"><td>3</td><td>佐藤次郎</td><td class="tc-g">NULL</td><td class="tc-g">✓ 見える</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>論理削除では「DELETEを使わず、UPDATEで削除日時をセットする」のが基本パターンです。deleted_atがNULLなら生存中、値があれば削除済みという規則を設計の出発点にします。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>VIEWの役割：</strong>VIEWは「保存されたSELECTクエリ」です。active_usersというVIEWを定義しておけば、アプリのコードはactive_usersを参照するだけでよく、WHERE deleted_at IS NULLの書き漏れが根本的になくなります。VIEWは「よく使うクエリのショートカット」として機能します。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>論理削除とUNIQUE制約の問題：</strong>emailにUNIQUE制約がある場合、ユーザーを論理削除してから同じメールアドレスで再登録しようとすると、削除済み行とUNIQUE衝突が起きます。この問題は「削除済みならemail列をNULLに更新する」か「UNIQUE制約に条件を付ける（WHERE deleted_at IS NULL）部分インデックスで対応する」方法で解決します。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>論理削除フラグを is_deleted BOOLEAN にする：</strong>is_deletedではいつ削除したかが記録されません。監査ログや「30日以上前に削除されたデータを本物削除する」バッチ処理ができなくなります。削除日時が不要なケースは稀なので、deleted_at TIMESTAMPTZが推奨です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>全テーブルに論理削除を適用する：</strong>論理削除はデータ復元や監査が必要なテーブルにのみ適用すべきです。セッショントークン・ログ・通知キューのような「消えてもよいデータ」は物理削除の方がシンプルで効率的です。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：ORMと論理削除の連携</div>
<div class="column-body">
Railsでは <code>acts_as_paranoid</code>、Djangoでは <code>django-soft-delete</code> などのgemやライブラリが論理削除を自動化します。これらは <code>Model.destroy(id)</code> を呼ぶとDELETEではなくUPDATE deleted_atに変換し、<code>Model.all</code>は自動的に<code>WHERE deleted_at IS NULL</code>を付けます。<strong>ORM側の自動フィルタに依存していると、生SQLやDB Consoleから参照した際に削除済みデータが混入しているケースに気づきにくい</strong>点に注意が必要です。定期的に元テーブルを直接確認する運用ルールを設けましょう。
</div>
</div>
`

  premise: `<p>注文の「pending/completed/cancelled」のようなステータス値を管理する方法として、代表的な3つのアプローチがあります。</p>
<div class="callout"><strong>ステータス管理の3つのアプローチ：</strong><br>
・<code>VARCHAR + CHECK制約</code> → シンプルだが値のリストをDB内に固定して変更時にALTER TBL必要<br>
・<code>ENUM型</code> → PostgreSQL独自の型。型安全で明確だが値の追加・削除がALTER TYPE必要<br>
・<code>マスターテーブル（参照テーブル）</code> → 最も柔軟。ステータスの追加・削除がINSERT/DELETEで対応。画面表示名や順番も管理できる</div>
<p>実務では「値が変わらない」ならENUMやCHECK制約、「業務要件でステータスの追加・変更が見込まれる」「ステータスに付随するメタデータが必要」ならマスターテーブルが推奨です。</p>`,
  question: `<p>ECサイトの注文ステータスを管理するテーブルを設計します。以下の要件に応じて<em>①ENUM型での設計</em>と<em>②マスターテーブルでの設計</em>の両方を実装し、それぞれの長所・短所を比較してください。要件：ステータスは pending/processing/shipped/delivered/cancelled の5種類（将来追加の可能性あり）。</p>`,
  output: `<p>2つのアプローチの比較：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>比較項目</th><th>ENUM</th><th>マスターテーブル</th></tr>
<tr><td>値の追加</td><td class="tc-r">ALTER TYPE（テーブルロック）</td><td class="tc-g">INSERT（ロックなし）</td></tr>
<tr><td>値の削除</td><td class="tc-r">難しい（参照中は不可）</td><td class="tc-g">論理削除で対応可</td></tr>
<tr><td>表示名の管理</td><td class="tc-r">できない</td><td class="tc-g">display_name列で管理</td></tr>
<tr><td>シンプルさ</td><td class="tc-g">シンプル</td><td class="tc-r">JOIN が必要</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① ENUM型でのステータス管理</span>
<span class="kw">CREATE TYPE</span> order_status_enum <span class="kw">AS</span> <span class="fn">ENUM</span> (  <span class="cmt">-- 【超基礎】カスタム型を作成する（PostgreSQL独自機能）</span>
    <span class="str">'pending'</span>,     <span class="cmt">-- 注文受付</span>
    <span class="str">'processing'</span>, <span class="cmt">-- 処理中</span>
    <span class="str">'shipped'</span>,    <span class="cmt">-- 発送済み</span>
    <span class="str">'delivered'</span>, <span class="cmt">-- 配達完了</span>
    <span class="str">'cancelled'</span>  <span class="cmt">-- キャンセル</span>
);

<span class="kw">CREATE TABLE</span> <span class="tbl">orders_enum</span> (
    order_id   <span class="fn">BIGSERIAL</span>          <span class="kw">PRIMARY KEY</span>,
    user_id    <span class="fn">BIGINT</span>             <span class="kw">NOT NULL</span>,
    status     order_status_enum  <span class="kw">NOT NULL</span>        <span class="cmt">-- 【超基礎】ENUM型の列。定義外の値はエラーになる</span>
               <span class="kw">DEFAULT</span> <span class="str">'pending'</span>,               <span class="cmt">-- 注文作成時は pending がデフォルト</span>
    created_at <span class="fn">TIMESTAMPTZ</span>        <span class="kw">NOT NULL</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);
<span class="cmt">-- ENUMの長所: 型安全（'pnding' のようなタイポをDB側で弾く）、シンプル、ストレージ効率が良い
-- ENUMの短所: 値の追加は ALTER TYPE order_status_enum ADD VALUE 'returned';
--             値の削除は困難（参照している行があるとDROPできない）
--             表示名（日本語）の管理ができない</span>

<span class="cmt">-- ② マスターテーブルでのステータス管理（推奨：将来の変更に強い）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">order_statuses</span> (           <span class="cmt">-- ステータスのマスターテーブル</span>
    code         <span class="fn">VARCHAR</span>(<span class="num">20</span>) <span class="kw">PRIMARY KEY</span>, <span class="cmt">-- 【超基礎】VARCHARをPKにする（コードが自然キー）</span>
    display_name <span class="fn">VARCHAR</span>(<span class="num">50</span>) <span class="kw">NOT NULL</span>,    <span class="cmt">-- 画面表示用の日本語名</span>

    sort_order   <span class="fn">SMALLINT</span>    <span class="kw">NOT NULL</span>,    <span class="cmt">-- 画面表示の並び順</span>
    is_terminal  <span class="fn">BOOLEAN</span>     <span class="kw">NOT NULL</span>     <span class="cmt">-- TRUE = これ以上遷移しない終端ステータス</span>
                 <span class="kw">DEFAULT</span> <span class="kw">FALSE</span>
);

<span class="cmt">-- マスターデータのINSERT</span>
<span class="kw">INSERT INTO</span> <span class="tbl">order_statuses</span> (code, display_name, sort_order, is_terminal) <span class="kw">VALUES</span>
    (<span class="str">'pending'</span>,     <span class="str">'注文受付中'</span>,   <span class="num">1</span>, <span class="kw">FALSE</span>),
    (<span class="str">'processing'</span>, <span class="str">'処理中'</span>,       <span class="num">2</span>, <span class="kw">FALSE</span>),
    (<span class="str">'shipped'</span>,    <span class="str">'発送済み'</span>,     <span class="num">3</span>, <span class="kw">FALSE</span>),
    (<span class="str">'delivered'</span>, <span class="str">'配達完了'</span>,     <span class="num">4</span>, <span class="kw">TRUE</span>),   <span class="cmt">-- 終端ステータス</span>
    (<span class="str">'cancelled'</span>, <span class="str">'キャンセル'</span>,   <span class="num">5</span>, <span class="kw">TRUE</span>);   <span class="cmt">-- 終端ステータス</span>

<span class="kw">CREATE TABLE</span> <span class="tbl">orders</span> (
    order_id   <span class="fn">BIGSERIAL</span>   <span class="kw">PRIMARY KEY</span>,
    user_id    <span class="fn">BIGINT</span>      <span class="kw">NOT NULL</span>,
    status     <span class="fn">VARCHAR</span>(<span class="num">20</span>) <span class="kw">NOT NULL</span>
               <span class="kw">DEFAULT</span> <span class="str">'pending'</span>
               <span class="kw">REFERENCES</span> <span class="tbl">order_statuses</span>(code), <span class="cmt">-- 【超基礎】マスターに存在するコードのみ登録できる</span>
    created_at <span class="fn">TIMESTAMPTZ</span> <span class="kw">NOT NULL</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);

<span class="cmt">-- マスターテーブルを結合して日本語名付きで注文一覧を取得</span>
<span class="kw">SELECT</span>

<span class="kw">FROM</span>       <span class="tbl">orders</span>          o
<span class="kw">INNER JOIN</span> <span class="tbl">order_statuses</span> s <span class="kw">ON</span> s.code <span class="op">=</span> o.status  <span class="cmt">-- マスターテーブルを結合</span>
<span class="kw">ORDER BY</span>   s.sort_order;                   <span class="cmt">-- マスターの並び順で表示</span>

<span class="cmt">/*
  実行順序（注文一覧クエリ）:
  1. FROM orders o                   → 注文テーブルを読む
  2. INNER JOIN order_statuses s     → status コードでマスターテーブルを結合
  3. SELECT o.order_id, s.display_name → 注文IDと日本語ステータス名を返す
  4. ORDER BY s.sort_order           → マスターで定義した表示順
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>ENUMの値追加：ALTER TYPE が必要でロックを伴う場合がある</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>操作</th><th>ENUM</th><th>マスターテーブル</th></tr>
<tr><td>値を追加（returned を追加）</td><td class="tc-y">ALTER TYPE order_status_enum ADD VALUE 'returned';<br>（PostgreSQL 9.1以降は軽量だが他DBでは注意）</td><td class="tc-g">INSERT INTO order_statuses VALUES('returned', '返品', ...);<br>ロックなし</td></tr>
<tr><td>値を削除（processing を廃止）</td><td class="tc-r">困難（参照行があるとエラー）</td><td class="tc-g">is_active=FALSEで論理削除</td></tr>

</div>

<div class="tbl-wrap"><table class="vtbl">

<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>ステータスのような「決まった選択肢から選ぶ値」は、VARCHAR + 制約でも、ENUMでも、マスターテーブルでも表現できます。「値が変わらず少ない（3〜5個程度）」ならENUMかCHECK制約、「追加・変更の可能性があるか表示名が必要」ならマスターテーブルを選びます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>is_terminal（終端ステータス）の活用：</strong>マスターテーブルに is_terminal 列を持たせると「これ以上ステータスが変わらない注文」をアプリ側のロジックなしにSQL側で判定できます。<code>WHERE NOT s.is_terminal</code>で「まだ処理中の注文」を取得するクエリが書けます。このような「ステータス自体の属性」はマスターテーブルならではの設計です。</div></div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ステータスを数値（0,1,2,3）で管理する：</strong><code>status = 2</code>がどの状態を表すかコードを見ないとわかりません。アプリとDBで番号の意味がズレた場合にサイレントなバグになります。テキストコード（'pending', 'shipped'など）を使いましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ステータス遷移のルールをDB側で持たない：</strong>「キャンセル済みの注文を再度発送済みにできる」というバグはアプリ側だけで防ぐより、DB側のCHECK制約やトリガーで遷移ルールを実装する方が確実です。ビジネスロジックが複雑な場合は状態遷移テーブルをDBに持たせる設計も検討します。</div></div>

  answer: `<pre><span class="cmt">-- ① 商品テーブル（監査カラム付き）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">products</span> (

                 <span class="kw">ON DELETE SET NULL</span>
);

<span class="cmt">-- ② updated_at を自動更新するトリガー関数を作成</span>
<span class="kw">CREATE OR REPLACE FUNCTION</span> <span class="fn">set_updated_at</span>()  <span class="cmt">-- 【超基礎】FUNCTION: 再利用可能な処理のまとめ</span>
<span class="kw">RETURNS</span> TRIGGER                               <span class="cmt">-- 【超基礎】TRIGGER用の特殊な戻り値型</span>

/* ========================================================
   ユーティリティ関数
======================================================== */

/**
 * アコーディオンのHTML文字列を生成する
 * @param {string} icon     - アイコン絵文字
 * @param {string} pillCls  - ピルのCSSクラス
 * @param {string} pillTxt  - ピルのテキスト
 * @param {string} title    - アコーディオンのタイトル
 * @param {string} content  - 本文HTML
 */
function acc(icon, pillCls, pillTxt, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillCls}">${pillTxt}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

/**
 * タグのHTML文字列を生成する
 * @param {Array} tags - [[色コード, テキスト], ...] の配列
 */
function tagHTML(tags) {
  const cls = { r: 'tag-r', g: 'tag-g', o: 'tag-o', p: 'tag-p' };
  return tags.map(([c, t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

/**
 * 全パネルとタブを生成してDOMに挿入する
 */
function buildAll() {
  // タブ行を生成
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
       <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
     </button>`
  ).join('');

  // 各問題パネルを生成
  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘', 'pill-blue',   '前提', '前提知識',               q.premise)}
      ${acc('❓', 'pill-green',  '問題', '問題',                   q.question)}
      ${acc('📊', 'pill-orange', '出力', '期待出力',               q.output)}
      ${acc('✅', 'pill-red',    '解答', '模範解答コード',         q.answer)}
      ${acc('🔍', 'pill-purple', '解説', '解説（テーブル変化・ポイント）', q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i - 1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i + 1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i + 1})" ${i === QS.length - 1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0); // 最初の問題を表示
}

/**
 * 指定インデックスの問題に切り替える
 * @param {number} i - 問題インデックス（0始まり）
 */
function go(i) {
  if (i < 0 || i >= QS.length) return;

  // パネルの表示切り替え
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));

  // タブのアクティブ切り替え
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));

  // アクティブなタブをスクロールして表示
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  // プログレスバーを更新
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';

  // ページトップにスクロール
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ページ読み込み時に全コンテンツを生成
buildAll();
</script>
