<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLパフォーマンス最適化 実践10選 — 複合インデックス/カーソルページング/RETURNING/部分インデックス/カバリング/UNNEST/CTE/DISTINCT ON/バルクINSERT/クエリプラン（実践編）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ── */
:root {
  --bg:     #0a0e13;
  --bg2:    #131920;
  --bg3:    #1c2330;
  --bg4:    #263040;
  --border: #2a3545;
  --text:   #cdd9e5;
  --dim:    #768390;
  --accent: #4dabf7;
  --green:  #3fb950;
  --orange: #f0883e;
  --red:    #f85149;
  --purple: #bc8cff;
  --yellow: #e3b341;
  --kw:     #ff7b72;
  --fn:     #79c0ff;
  --str:    #a5d6ff;
  --num:    #f0c674;
  --cmt:    #6a737d;
  --tbl:    #ffa657;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}

/* ── Header ── */
.site-header{background:var(--bg2)}
.header-inner{padding:16px}
.header-flex{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.header-badge{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1;white-space:nowrap}
.header-text-wrap{flex:1}
.header-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.header-tags{display:flex;gap:6px;flex-wrap:wrap}
.htag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}

/* ── Sticky tabs ── */
.sticky-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.tab-num{margin-right:5px}
.prog-wrap{height:2px;background:var(--bg4)}
.prog-fill{height:100%;background:var(--accent);transition:width .2s}

/* ── Main / Panel ── */
main{max-width:960px;margin:0 auto;padding:22px 14px 90px}
.panel{display:none}
.panel.active{display:block}

/* ── Question header ── */
.q-header{margin-bottom:18px}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;font-weight:600}
.tag-r{background:#1a2c44;color:var(--accent);border:1px solid #1e4070}
.tag-g{background:#162416;color:var(--green);border:1px solid #1e3a1e}
.tag-o{background:#2e1e0a;color:var(--orange);border:1px solid #4a2e0a}
.tag-p{background:#1e1433;color:var(--purple);border:1px solid #3a2060}

/* ── Accordion ── */
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.acc-head:hover{background:var(--bg3)}
.acc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-title{font-size:13px;font-weight:600;flex:1}
.acc-pill{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;flex-shrink:0}
.pill-blue  {background:#112233;color:var(--accent);border:1px solid #1a3a55}
.pill-green {background:#0e1f0e;color:var(--green);border:1px solid #1a3a1a}
.pill-orange{background:#1e1205;color:var(--orange);border:1px solid #3a2010}
.pill-red   {background:#1e0a0a;color:var(--red);border:1px solid #3a1010}
.pill-purple{background:#160f2a;color:var(--purple);border:1px solid #3a1a60}
.acc-chevron{color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .2s}
.acc.closed .acc-chevron{transform:rotate(-90deg)}
.acc-body{padding:14px 16px;border-top:1px solid var(--border)}
.acc.closed .acc-body{display:none}

/* ── Typography ── */
p{font-size:13.5px;margin-bottom:10px}
p:last-child{margin-bottom:0}
strong{color:var(--accent);font-weight:600}
em{color:var(--yellow);font-style:normal;font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--tbl)}

/* ── Code blocks ── */
pre{background:#060a0f;border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;margin:8px 0}
.kw {color:var(--kw);font-weight:700}
.fn {color:var(--fn)}
.tbl{color:var(--tbl)}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.op {color:var(--orange)}

/* ── Callouts ── */
.callout{border-left:3px solid var(--accent);background:#0e1e33;padding:9px 13px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px}
.callout.warn  {border-left-color:var(--yellow);background:#1e1a08}
.callout.danger{border-left-color:var(--red);background:#1e0e0e}
.callout.ok    {border-left-color:var(--green);background:#0a1e0a}

/* ── Data section ── */
.data-section{margin:14px 0}
.data-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tbl);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.data-label::before{content:'';display:block;width:3px;height:12px;background:var(--tbl);border-radius:2px}
.data-tables{display:flex;gap:14px;flex-wrap:wrap}
.data-tbl-wrap{flex:1;min-width:220px}
.data-tbl-name{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:4px}

/* ── Visual tables ── */
.tbl-wrap{overflow-x:auto;margin-bottom:4px}
table.vtbl{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#060a0f;border:1px solid var(--border);border-radius:4px;min-width:100%}
table.vtbl th{background:var(--bg3);color:var(--tbl);padding:5px 11px;border:1px solid var(--border);text-align:left;white-space:nowrap;font-weight:600}
table.vtbl td{padding:4px 11px;border:1px solid #1c2635;white-space:nowrap}
table.vtbl tr:nth-child(even) td{background:#080c12}
.tr-hi  td{background:#0e1e33!important}
.tr-hi2 td{background:#0e1e0e!important}
.tr-hi3 td{background:#1e1433!important}
.tr-hi4 td{background:#1e1a0a!important}
.tr-dim td{opacity:.4}
.tc-hi{color:var(--accent)!important;font-weight:700}
.tc-g {color:var(--green)!important;font-weight:700}
.tc-p {color:var(--purple)!important;font-weight:700}
.tc-y {color:var(--yellow)!important;font-weight:700}
.tc-o {color:var(--orange)!important;font-weight:700}
.tc-r {color:var(--red)!important;font-weight:700}
.null {color:var(--dim)!important;font-style:italic}

/* ── Flow viz ── */
.viz-flow{margin:6px 0 14px}
.step-block{margin-bottom:8px}
.step-label{display:flex;align-items:center;gap:8px;font-size:11px;font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sn1{background:#1a2744;color:var(--accent)}
.sn2{background:#1a2e1a;color:var(--green)}
.sn3{background:#2e1a2e;color:var(--purple)}
.sn4{background:#2e1a0a;color:var(--orange)}
.step-desc{color:var(--dim)}
.step-desc strong{color:var(--text)}
.arrow{text-align:center;padding:4px 0;font-size:13px;font-family:'JetBrains Mono',monospace}
.arrow-text{color:var(--dim);font-size:11px}

/* ── Insight / Anti / Column boxes ── */
.insight-box{background:#0a1520;border:1px solid #1a3a55;border-radius:8px;padding:14px 16px;margin-top:14px}
.insight-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.insight-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.insight-body{font-size:12.5px;color:var(--text);line-height:1.6}
.insight-body strong{color:var(--accent)}
.insight-body em{color:var(--yellow)}
.insight-body code{font-size:11px}

.anti-box{background:#160a0a;border:1px solid #3a1515;border-radius:8px;padding:14px 16px;margin-top:10px}
.anti-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:1px;margin-bottom:10px}
.anti-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.anti-body{font-size:12.5px;color:var(--text);line-height:1.6}
.anti-body strong{color:var(--red)}
.anti-body code{font-size:11px}

.column-box{background:#0d1520;border:1px solid #1c3550;border-left:3px solid var(--fn);border-radius:8px;padding:14px 16px;margin-top:10px}
.column-title{font-size:11px;font-weight:700;color:var(--fn);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.column-body{font-size:12.5px;color:var(--text);line-height:1.6}
.column-body strong{color:var(--fn)}

/* ── Nav ── */
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:#0e1e33}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}

/* ── Responsive ── */
@media(max-width:520px){
  .header-inner{padding:12px 10px 6px}
  .q-title{font-size:15px}
  pre{font-size:11px;padding:10px}
  table.vtbl{font-size:10.5px}
  .acc-title{font-size:12px}
  .header-badge{font-size:14px;padding:5px 8px}
  main{padding:16px 10px 60px}
  .data-tables{flex-direction:column}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">PERF</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 実践10選（複合インデックス／カーソルページング／RETURNING／部分インデックス／カバリングインデックス／UNNEST IN句／CTEマテリアライズ／DISTINCT ON／バルクINSERT／EXPLAINクエリプラン 編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 実践</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">Web API対応</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">prac-002</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  複合インデックスの列順序 — LEFT-PREFIX RULE
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "複合インデックスの列順序 — LEFT-PREFIX RULEでインデックスが使われない罠",
  tags: [["r","複合インデックス"],["r","LEFT-PREFIX"],["o","Index Scan"],["g","インデックス設計"]],
  premise: `<p><strong>複合インデックス</strong>とは、複数列をまとめて1つのインデックスにしたものです。<code>CREATE INDEX ON orders (status, created_at)</code> を作ると、B-Treeは <em>まず status で並び替え、同じ status の中で created_at で並び替え</em> た構造になります。</p>
<p>この構造から生まれるのが <strong>LEFT-PREFIX RULE（左端一致ルール）</strong> です。WHERE句でインデックスが使われるのは、<em>インデックスの先頭列から連続して使われる場合だけ</em>です。途中の列を飛ばすと、それ以降の列のインデックスは効きません。</p>
<pre><span class="cmt">-- インデックス: (status, created_at, user_id) の場合</span>
<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'paid'</span>                              <span class="cmt">-- ✅ 1列目を使用 → Index Scan</span>
<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'paid'</span> <span class="kw">AND</span> created_at <span class="op">&gt;</span> <span class="str">'2024-01-01'</span>  <span class="cmt">-- ✅ 1・2列目を使用 → Index Scan</span>
<span class="kw">WHERE</span> created_at <span class="op">&gt;</span> <span class="str">'2024-01-01'</span>                   <span class="cmt">-- ❌ 1列目を飛ばした → Seq Scan（インデックス未使用）</span>
<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'paid'</span> <span class="kw">AND</span> user_id <span class="op">=</span> <span class="num">100</span>           <span class="cmt">-- ⚠️ 1列目のみ有効。3列目はインデックス未使用</span></pre>
<div class="callout warn"><strong>カーディナリティと列順序：</strong>一般的に <em>カーディナリティが高い列（値の種類が多い列）を先に置く</em> と絞り込みが強くなりますが、WHERE句で必ず使われる列を先頭に置くことを優先してください。APIのフィルタ条件として常に登場する列が複合インデックスの先頭候補です。</div>`,
  question: `<p><code>orders</code>テーブル（500万件）に以下のインデックスが存在します。3つのAPIクエリのうち、<em>インデックスが正しく使われるものとそうでないものを判別し</em>、適切なインデックスを再設計してください。</p>
<pre><span class="cmt">-- 既存インデックス</span>
<span class="kw">CREATE INDEX</span> idx_orders_status_date <span class="kw">ON</span> <span class="tbl">orders</span> (status, created_at);

<span class="cmt">-- API-A: ステータス × 日付範囲フィルタ（注文一覧API）</span>
<span class="kw">SELECT</span> order_id, user_id, amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'paid'</span>
  <span class="kw">AND</span>  created_at <span class="op">&gt;=</span> <span class="str">'2024-01-01'</span>
  <span class="kw">AND</span>  created_at <span class="op">&lt;</span>  <span class="str">'2025-01-01'</span>;

<span class="cmt">-- API-B: 日付範囲のみフィルタ（管理画面ダッシュボード）</span>
<span class="kw">SELECT</span> order_id, user_id, amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  created_at <span class="op">&gt;=</span> <span class="str">'2024-12-01'</span>
  <span class="kw">AND</span>  created_at <span class="op">&lt;</span>  <span class="str">'2025-01-01'</span>;

<span class="cmt">-- API-C: user_id × status フィルタ（ユーザー注文履歴API）</span>
<span class="kw">SELECT</span> order_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="num">1001</span>
  <span class="kw">AND</span>  status <span class="op">=</span> <span class="str">'paid'</span>;</pre>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（500万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id(PK)</th><th>user_id</th><th>status</th><th>amount</th><th>created_at</th></tr>
        <tr><td>1</td><td>1001</td><td>paid</td><td>5000</td><td>2024-03-15</td></tr>
        <tr><td>2</td><td>2002</td><td>pending</td><td>2000</td><td>2024-12-10</td></tr>
        <tr><td>3</td><td>1001</td><td>paid</td><td>8000</td><td>2024-12-20</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>インデックス使用判別と対策：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>API</th><th>既存インデックスの効き</th><th>推奨対応</th></tr>
<tr class="tr-hi2"><td>API-A</td><td class="tc-g">✅ Index Scan（先頭列statusを使用）</td><td>そのまま有効</td></tr>
<tr class="tr-hi"><td>API-B</td><td class="tc-r">❌ Seq Scan（先頭列statusを飛ばした）</td><td>created_at 単独インデックスを追加</td></tr>
<tr class="tr-hi"><td>API-C</td><td class="tc-r">❌ Seq Scan（user_idがインデックスにない）</td><td>(user_id, status) 複合インデックスを追加</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 既存インデックス（API-A には有効、API-B・C には効かない）</span>
<span class="cmt">-- CREATE INDEX idx_orders_status_date ON orders (status, created_at);</span>

<span class="cmt">-- ════════════════════════════════════════
   API-B 用: created_at の単独インデックス
   ════════════════════════════════════════</span>
<span class="kw">CREATE INDEX</span> idx_orders_created_at        <span class="cmt">-- インデックス名（命名規則: idx_テーブル_列名）</span>
    <span class="kw">ON</span> <span class="tbl">orders</span> (created_at);              <span class="cmt">-- 【超基礎】先頭列がcreated_atなのでAPI-BのWHEREに直接マッチ</span>

<span class="cmt">-- ════════════════════════════════════════
   API-C 用: (user_id, status) 複合インデックス
   ════════════════════════════════════════</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_status
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id, status);         <span class="cmt">-- user_idが先頭 → user_id=1001で絞り込み後statusで絞る</span>
<span class="cmt">-- 【ポイント】user_idは高カーディナリティ（種類が多い）→ 先頭に置くと絞り込み力が強い</span>
<span class="cmt">-- 【ポイント】statusだけのインデックスは低カーディナリティ（paid/pending/cancelled等）→ 絞り込みが弱い</span>

<span class="cmt">-- ════════════════════════════════════════
   インデックスの効きを確認する: EXPLAIN ANALYZE
   ════════════════════════════════════════</span>
<span class="kw">EXPLAIN ANALYZE</span>                          <span class="cmt">-- 【超基礎】実際にクエリを実行して実行計画を表示するコマンド</span>
<span class="kw">SELECT</span> order_id, user_id, amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="num">1001</span>
  <span class="kw">AND</span>  status  <span class="op">=</span> <span class="str">'paid'</span>;
<span class="cmt">-- → "Index Scan using idx_orders_user_status" と表示されれば成功</span>
<span class="cmt">-- → "Seq Scan" と表示されたらインデックスが使われていない（要調査）</span>

<span class="cmt">/*
  実行順序（API-C, インデックス追加後）:
  1. FROM orders                    → 500万行を対象に
  2. WHERE user_id = 1001           → idx_orders_user_status の先頭列でIndex Scan → 数件に絞る

<span class="kw">SELECT</span>
    u.user_id,
    u.name,
    <span class="fn">COALESCE</span>(o.order_count,  <span class="num">0</span>) <span class="kw">AS</span> order_count,  <span class="cmt">-- NULLなら0（注文なしユーザー対策）</span>

<span class="kw">FROM</span>      <span class="tbl">users</span> u

<span class="cmt">-- ① ordersをuser_idで集計してサブクエリをJOIN（集計済みなのでusersとの結合は1:1）</span>
<span class="kw">LEFT JOIN</span> (

    <span class="kw">FROM</span>     <span class="tbl">orders</span>

<span class="cmt">-- ② reviewsも同様にGROUP BY集計してJOIN</span>
<span class="kw">LEFT JOIN</span> (
    <span class="kw">SELECT</span>   user_id,
             <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> review_count
    <span class="kw">FROM</span>     <span class="tbl">reviews</span>
    <span class="kw">GROUP BY</span> user_id
) r <span class="kw">ON</span> r.user_id <span class="op">=</span> u.user_id

<span class="cmt">-- ③ loginsはMAX集計でuser_idごとの最新日を取得してJOIN</span>
<span class="kw">LEFT JOIN</span> (

  8. SELECT COALESCE(…)          → 列を返す（NULLを0に変換）

<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>相関サブクエリ方式 vs LEFT JOIN集計方式の処理比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>方式</th><th>テーブル走査回数（users 1,000件の場合）</th><th>特徴</th></tr>
<tr class="tr-hi"><td class="tc-r">相関サブクエリ</td><td class="tc-r">orders:1000回 + reviews:1000回 + logins:1000回 = 3,001回</td><td class="tc-r">行ごとに実行</td></tr>
<tr class="tr-hi2"><td class="tc-g">LEFT JOIN集計</td><td class="tc-g">orders:1回 + reviews:1回 + logins:1回 + users:1回 = 4回</td><td class="tc-g">1度だけ集計してJOIN</td></tr>
</table></div>
</div>

<div class="tbl-wrap"><table class="vtbl">
<tr><th>users.user_id</th><th>o.order_count（JOINの結果）</th><th>COALESCE後</th></tr>

<tr class="tr-hi"><td>2（鈴木）</td><td class="null">NULL（ordersに一致なし）</td><td class="tc-y">0</td></tr>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>LEFT JOINは「左のテーブルの全行を残しつつ、右のテーブルに一致する行を結合する」操作です。右側に一致する行がない場合は NULL が入ります。COALESCE と組み合わせることで「一致なし → 0」という自然な集計結果を作れます。</div></div>

  premise: `<p><strong>部分インデックス（Partial Index）</strong>は、テーブルの行全体ではなく <em>WHERE条件を満たす行だけ</em>をインデックスに格納する機能です。例えば「未処理ジョブ（status='pending'）」が全体の1%しかなければ、そこだけのインデックスは99%小さくなります。</p>
<pre><span class="cmt">-- 通常のインデックス（全件 500万行）</span>

<span class="cmt">-- 部分インデックス（pending の行だけ、例えば5,000行）</span>

<div class="data-section">

<span class="cmt">-- → done/running は格納されないのでINSERT/UPDATEの更新コストもほぼゼロ</span>

<span class="cmt">-- ════════════════════════════════

<span class="cmt">-- ════════════════════════════════
   応用: FOR UPDATE SKIP LOCKED（複数ワーカーによる競合防止）

<span class="kw">SELECT</span> job_id, payload

<span class="kw">LIMIT</span>  <span class="num">10</span>
<span class="kw">FOR UPDATE</span> <span class="kw">SKIP LOCKED</span>;                    <span class="cmt">-- ✅ 【実務必須】他のワーカーがロック中の行をスキップ</span>
<span class="cmt">-- SKIP LOCKED がないと複数ワーカーが同じジョブを処理してしまう（二重処理バグ）</span>

<span class="cmt">/*

<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>通常インデックス vs 部分インデックスの格納内容</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>インデックスの種類</th><th>格納される行</th><th>エントリ数</th><th>サイズ（概算）</th></tr>
<tr class="tr-hi"><td>CREATE INDEX ON job_queue (status)</td><td class="tc-r">全行（done含む）</td><td class="tc-r">1,000万</td><td class="tc-r">大</td></tr>
<tr class="tr-hi2"><td>部分インデックス WHERE status='pending'</td><td class="tc-g">pendingのみ</td><td class="tc-g">10,000</td><td class="tc-g">1/1000</td></tr>

</div>
<div class="arrow">↓ <span class="arrow-text">ジョブが完了してdoneになった行はインデックスから自動的に削除される（メンテナンス不要）</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>部分インデックスが適用されるクエリの条件</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>クエリのWHERE条件</th><th>部分インデックスの適用</th></tr>
<tr class="tr-hi2"><td>WHERE status = 'pending'</td><td class="tc-g">✅ 使用（インデックス条件と完全一致）</td></tr>
<tr class="tr-hi2"><td>WHERE status = 'pending' AND created_at > '2025-01-01'</td><td class="tc-g">✅ 使用（インデックス条件を含む）</td></tr>
<tr class="tr-hi"><td>WHERE status = 'running'</td><td class="tc-r">❌ 未使用（running はインデックスにない）</td></tr>
<tr class="tr-hi"><td>WHERE created_at > '2025-01-01'（statusなし）</td><td class="tc-r">❌ 未使用（インデックス条件が満たされない）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>部分インデックスは <code>CREATE INDEX … WHERE 条件</code> で作成します。このインデックスはクエリの WHERE 条件がインデックスの WHERE 条件を「含む」場合にのみ使用されます。PostgreSQL のオプティマイザが自動的に判断します。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ジョブキューへの応用：</strong>ジョブキューはほとんどの行が <code>done</code> 状態で蓄積されていきます。通常インデックスにこれらも含まれると、インデックスが肥大化してキャッシュに乗りにくくなります。部分インデックスで <code>pending/running</code> だけをインデックス化すると、インデックス全体がメモリに常駐でき超高速になります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>FOR UPDATE SKIP LOCKED：</strong>複数ワーカーが同時にジョブを取得する際、SKIP LOCKED は「他のワーカーがロック中の行を飛ばして次の行を取得する」ため、待ち合いなしに並行処理できます。PostgreSQL 9.5以降・MySQL 8.0以降で使用可能です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>部分インデックスと異なる条件でクエリを書く：</strong><code>WHERE status = 'pending'</code> の部分インデックスに対して <code>WHERE status != 'done'</code>（pending+running）で検索しても適用されません。部分インデックスの条件と「意味が同じでも式が違う」場合は使われません。クエリの WHERE 条件とインデックスの WHERE 条件を完全に一致させてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>完了済みジョブを削除せずに蓄積し続ける：</strong>done状態のジョブが何百万件も蓄積するとテーブルが肥大化し、VACUUM の効率も低下します。定期的に古いdoneジョブをアーカイブテーブルに移動（PARTITION BY RANGEなど）するか削除する設計を組み込んでください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：SidekiqやDelayed::Jobが遅い本当の原因</div>
<div class="column-body">
Railsのバックグラウンドジョブ処理で有名なDelayed::JobやGoodJobはDB（PostgreSQL）をジョブキューとして使います。<strong>大量のジョブが蓄積した環境でジョブ取得が遅くなる原因の多くが、部分インデックスの未設定です</strong>。GoodJobはpostgres-native-advisoryロックとSKIP LOCKEDを使い、部分インデックスも自動作成されます。独自実装のジョブキューテーブルを使う場合は、本問のように部分インデックスとSKIP LOCKEDを必ず組み込んでください。
</div>
</div>
`

/* ══════════════════════════════════════════════════
   Q6  カバリングインデックス — Index Only Scan でテーブルアクセスをゼロにする
══════════════════════════════════════════════════ */
{
  num: 6,
  title: "カバリングインデックス — Index Only Scanでテーブル本体へのアクセスをゼロにする",
  tags: [["r","カバリングインデックス"],["r","INCLUDE"],["o","Index Only Scan"],["g","ストレージI/O削減"]],
  premise: `<p>通常のインデックス検索（Index Scan）では、インデックスで行の位置を特定した後に<em>テーブル本体（ヒープ）にアクセスして列値を取得</em>します。このヒープアクセスがボトルネックになるケースがあります。</p>
<p><strong>カバリングインデックス</strong>は、クエリに必要な列をすべてインデックスに含め、<em>テーブル本体を一切読まずにインデックスだけで結果を返す</em>（Index Only Scan）技術です。PostgreSQL 11以降は <code>INCLUDE</code> 句で検索条件外の列をインデックスに追加できます。</p>
<pre><span class="cmt">-- Index Scan（テーブル本体へのアクセスあり）</span>
<span class="cmt">-- インデックス: (user_id) → 行位置を特定 → ヒープ(テーブル)から name, email を取得</span>

<span class="cmt">-- Index Only Scan（テーブル本体へのアクセスなし）</span>
<span class="cmt">-- インデックス: (user_id) INCLUDE (name, email) → インデックスから直接 name, email を返す</span></pre>
<div class="callout ok"><strong>Index Only Scan が有効な条件：</strong>① SELECTする列がすべてインデックスに含まれている、② テーブルのvisibility map が最新（VACUUM済み）</div>`,
  question: `<p>以下の「アクティブユーザーのメールアドレス一覧取得API」は毎秒500回実行され、レスポンスタイムの改善が求められています。<em>カバリングインデックスを設計してIndex Only Scanに変えてください</em>。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ users（500万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>user_id(PK)</th><th>email</th><th>name</th><th>is_active</th><th>created_at</th><th>bio</th></tr>
        <tr><td>1</td><td>tanaka@ex.com</td><td>田中</td><td>true</td><td>2023-01-01</td><td>（長文）</td></tr>
        <tr><td>2</td><td>suzuki@ex.com</td><td>鈴木</td><td>false</td><td>2023-03-15</td><td>（長文）</td></tr>
        <tr><td>3</td><td>sato@ex.com</td><td>佐藤</td><td>true</td><td>2024-06-20</td><td>（長文）</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 現在のインデックス（単純な部分インデックス）</span>
<span class="kw">CREATE INDEX</span> idx_users_active <span class="kw">ON</span> <span class="tbl">users</span> (is_active) <span class="kw">WHERE</span> is_active <span class="op">=</span> <span class="kw">TRUE</span>;

<span class="cmt">-- 対象クエリ（毎秒500回実行）</span>
<span class="kw">SELECT</span> user_id, email, name   <span class="cmt">-- ← この3列だけ使う</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  is_active <span class="op">=</span> <span class="kw">TRUE</span>      <span class="cmt">-- ← フィルタ条件</span>
<span class="kw">ORDER BY</span> user_id;             <span class="cmt">-- ← user_idでソート</span></pre>`,
  output: `<p>EXPLAIN ANALYZEで確認できる改善点：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>項目</th><th>改善前</th><th>改善後</th></tr>
<tr class="tr-hi"><td>実行計画</td><td class="tc-r">Index Scan + Heap Fetch</td><td class="tc-g">Index Only Scan</td></tr>
<tr class="tr-hi2"><td>テーブル本体へのアクセス</td><td class="tc-r">アクティブユーザー分（例:50万回）</td><td class="tc-g">0回</td></tr>
<tr class="tr-hi2"><td>I/Oコスト</td><td class="tc-r">高（ランダムI/O）</td><td class="tc-g">低（インデックスのみ）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ════════════════════════════════
   カバリングインデックスの作成（PostgreSQL 11以降）
   ════════════════════════════════</span>
<span class="kw">CREATE INDEX</span> idx_users_active_covering
    <span class="kw">ON</span> <span class="tbl">users</span> (user_id)                  <span class="cmt">-- ① 検索・ソートに使う列（B-Treeキー）</span>
    <span class="kw">INCLUDE</span> (email, name)              <span class="cmt">-- ② SELECTで使う列をインデックスに追加（INCLUDEはPostgreSQL 11+）</span>
    <span class="kw">WHERE</span>  is_active <span class="op">=</span> <span class="kw">TRUE</span>;            <span class="cmt">-- ③ 部分インデックスと組み合わせ（falseは格納しない）</span>

<span class="cmt">-- 【設計意図の解説】
--   ① user_id: ORDER BY user_id にマッチ → インデックス順でソートコストゼロ
--   ② email, name: INCLUDE に入れることでヒープアクセスなしに値を返せる
--                  INCLUDE列はB-Treeの並び替えには使われない（キーは①のみ）
--   ③ WHERE is_active=TRUE: 非アクティブユーザーをインデックスから除外</span>

<span class="cmt">-- クエリ（変更不要 → Index Only Scan になる）</span>
<span class="kw">SELECT</span> user_id, email, name           <span class="cmt">-- すべてインデックスに含まれる列 → ヒープアクセスなし</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  is_active <span class="op">=</span> <span class="kw">TRUE</span>              <span class="cmt">-- 部分インデックスの条件と一致</span>
<span class="kw">ORDER BY</span> user_id;                     <span class="cmt">-- インデックスキーと一致 → ソートコストなし</span>

<span class="cmt">-- EXPLAIN で確認</span>
<span class="kw">EXPLAIN</span> (<span class="kw">ANALYZE</span>, <span class="kw">BUFFERS</span>)           <span class="cmt">-- BUFFERSオプションでI/O回数も確認できる</span>
<span class="kw">SELECT</span> user_id, email, name
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  is_active <span class="op">=</span> <span class="kw">TRUE</span>
<span class="kw">ORDER BY</span> user_id;
<span class="cmt">-- 出力例:
--   Index Only Scan using idx_users_active_covering on users
--   Heap Fetches: 0   ← テーブル本体へのアクセスがゼロ
--   Buffers: shared hit=120  ← インデックスのページだけ読んでいる</span>

<span class="cmt">/*
  実行順序（Index Only Scan）:
  1. WHERE is_active=TRUE     → 部分インデックスを使って対象行を特定
  2. ORDER BY user_id         → インデックスはuser_id順 → ソートコストゼロ
  3. SELECT user_id,email,name → すべてインデックスに含まれる → ヒープアクセスゼロ
  → テーブル本体を一度も読まずに結果を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>Index Scan vs Index Only Scan のデータアクセス経路</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>フェーズ</th><th>Index Scan（従来）</th><th>Index Only Scan（カバリング）</th></tr>
<tr class="tr-hi2"><td>検索フェーズ</td><td>インデックスで行位置(ctid)を特定</td><td class="tc-g">インデックスで行位置を特定</td></tr>
<tr class="tr-hi"><td>データ取得フェーズ</td><td class="tc-r">ヒープ(テーブル本体)にアクセス<br>→ランダムI/O発生</td><td class="tc-g">インデックスから直接返す<br>→ヒープアクセスなし</td></tr>
<tr class="tr-hi2"><td>未使用列（bio等）</td><td class="tc-r">ヒープ1ページ丸ごと読む→捨てる</td><td class="tc-g">インデックスに含まれないので読まない</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">bioのような大きな列がテーブルにあるほど、Index Only Scanの恩恵が大きい</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>インデックスキー列とINCLUDE列の違い</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>列の種類</th><th>B-Treeキー（通常の列）</th><th>INCLUDE列</th></tr>
<tr class="tr-hi2"><td>並び替えに使われるか</td><td class="tc-g">使われる（ORDER BY高速化）</td><td class="tc-r">使われない</td></tr>
<tr class="tr-hi2"><td>WHERE条件の絞り込み</td><td class="tc-g">使える</td><td class="tc-r">使えない</td></tr>
<tr class="tr-hi2"><td>SELECT列のヒープアクセス回避</td><td class="tc-g">可能</td><td class="tc-g">可能（これが目的）</td></tr>
<tr class="tr-hi2"><td>インデックスサイズへの影響</td><td>増加（並び替え構造に含まれる）</td><td>増加（リーフページのみ）</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>カバリングインデックスとは「クエリのSELECT/WHERE/ORDER BYに必要な列をすべてインデックスに含める」設計です。DBはインデックスだけで結果を返せるため、テーブル本体のランダムI/Oが完全になくなります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>Heap Fetchesが0かを確認：</strong>EXPLAIN (ANALYZE, BUFFERS) の出力で <code>Heap Fetches: 0</code> と表示されれば Index Only Scan が完全に機能しています。<code>Heap Fetches: 大きな数</code> になる場合は、テーブルのVISIBILITY MAPが古くなっている可能性があり、<code>VACUUM users</code> を実行してください。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>インデックスのサイズとのトレードオフ：</strong>INCLUDE列を追加するとインデックスサイズが増えます。email や name のような頻繁に更新される列をINCLUDEすると、更新のたびにインデックスも更新されます。<em>読み取り頻度が高く、更新頻度が低い列</em> をINCLUDEの候補にしてください。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>すべての列をINCLUDEに入れる：</strong>INCLUDEに大量の列を入れると、インデックスサイズがテーブルと同じになります。インデックスがメモリに乗りきらなくなるとむしろ遅くなります。本当に必要な列だけに絞ってください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>PostgreSQL 10以前ではINCLUDEが使えない：</strong>INCLUDE句はPostgreSQL 11以降の機能です。それより古いバージョンでは、インデックスキーに列を追加する方法しかありません（例: <code>(user_id, email, name) WHERE is_active=TRUE</code>）。ただしこの場合、ORDER BY以外の目的で追加した列もキーになるためインデックスが若干大きくなります。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：メール通知・一括送信バッチとIndex Only Scan</div>
<div class="column-body">
「アクティブユーザー全員にメール送信」のようなバッチ処理では、usersテーブルから user_id と email だけを取得します。<strong>このクエリが毎分走る場合、テーブル本体を何度も読まずにインデックスだけで完結するカバリングインデックスの恩恵は極めて大きいです</strong>。bioや profile_image_url のような大容量列が同じテーブルにある場合は特に顕著で、ページI/Oが劇的に減少します。PostgreSQL の <code>pg_stat_user_tables</code> で <code>heap_blks_read</code>（ヒープ読み込みブロック数）が多いテーブルを探し、カバリングインデックスの候補を見つけてください。
</div>
</div>
`
},

{
  num: 7,
  title: "UNNEST と大量IN句 — 数千件のINリストをUNNESTで安全・高速に処理する",
  tags: [["r","UNNEST"],["r","IN句"],["o","配列"],["g","バッチ検索"]],
  premise: `<p>APIで「複数IDで一括取得」するとき、<code>WHERE id IN (1, 2, 3, …)</code> を使います。数十件なら問題ありませんが、<em>数千件のIDをIN句に並べるとクエリのパースコストが大きくなり、クエリキャッシュにも載りにくくなります</em>。PostgreSQLの <code>UNNEST</code> 関数を使うと、配列を行に展開してJOINできます。</p>
<pre><span class="cmt">-- NG: IN句に1000件のリテラル（プランキャッシュが効かない）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">products</span> <span class="kw">WHERE</span> product_id <span class="kw">IN</span> (<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>,<span class="cmt">…1000件…</span>);

<span class="cmt">-- OK: UNNESTで配列を行に展開してJOIN</span>
<span class="kw">SELECT</span> p.<span class="op">*</span>
<span class="kw">FROM</span>   <span class="fn">UNNEST</span>(<span class="kw">ARRAY</span>[<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>,<span class="cmt">…</span>]::<span class="tbl">int</span>[]) <span class="kw">AS</span> t(product_id)  <span class="cmt">-- 配列 → 行に展開</span>
<span class="kw">JOIN</span>   <span class="tbl">products</span> p <span class="kw">USING</span> (product_id);                     <span class="cmt">-- JOINで結合</span></pre>`,
  question: `<p>カートAPIで選択された商品IDリスト（最大5,000件）をもとに商品情報を一括取得しています。<em>UNNESTを使った方法と、その順序保持バリアントを実装してください</em>。また、存在しないIDに対してNULL行を返すパターンも示してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ products</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>product_id(PK)</th><th>name</th><th>price</th><th>stock</th></tr>
        <tr><td>101</td><td>商品A</td><td>1000</td><td>5</td></tr>
        <tr><td>102</td><td>商品B</td><td>2000</td><td>0</td></tr>
        <tr><td>103</td><td>商品C</td><td>500</td><td>10</td></tr>
      </table></div>
    </div>
  </div>
</div>
<pre><span class="cmt">-- 入力: product_ids = [101, 103, 999, 102]（999は存在しないID）</span>
<span class="cmt">-- 要件: 入力の順序通りに結果を返したい + 存在しないIDはNULLで返す</span></pre>`,
  output: `<p>期待出力（入力順序を保持 + 存在しないIDはNULL）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>input_order</th><th>product_id</th><th>name</th><th>price</th></tr>
<tr><td>1</td><td>101</td><td>商品A</td><td>1000</td></tr>
<tr><td>2</td><td>103</td><td>商品C</td><td>500</td></tr>
<tr class="tr-hi"><td>3</td><td>999</td><td class="null">NULL</td><td class="null">NULL</td></tr>
<tr><td>4</td><td>102</td><td>商品B</td><td>2000</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ════════════════════════════════
   基本: UNNEST で配列を行に展開してJOIN
   ════════════════════════════════</span>
<span class="kw">SELECT</span>
    p.product_id,
    p.name,
    p.price,
    p.stock
<span class="kw">FROM</span>   <span class="fn">UNNEST</span>(                               <span class="cmt">-- 【超基礎】UNNEST: 配列の各要素を1行ずつに展開する関数</span>
           <span class="kw">ARRAY</span>[<span class="num">101</span>, <span class="num">103</span>, <span class="num">999</span>, <span class="num">102</span>]::<span class="tbl">int</span>[]  <span class="cmt">-- ::int[] は配列の型キャスト（整数配列に変換）</span>
       ) <span class="kw">AS</span> t(product_id)                    <span class="cmt">-- t はテーブルエイリアス、product_idは列名</span>
<span class="kw">JOIN</span>   <span class="tbl">products</span> p <span class="kw">USING</span> (product_id);      <span class="cmt">-- USING: 同名列でJOIN（ON p.product_id = t.product_id と同じ）</span>

<span class="cmt">-- ════════════════════════════════
   応用①: 入力順序を保持する（WITH ORDINALITY）
   ════════════════════════════════</span>
<span class="kw">SELECT</span>
    ord          <span class="kw">AS</span> input_order,              <span class="cmt">-- 配列内の順番（1始まり）</span>
    t.product_id <span class="kw">AS</span> product_id,
    p.name,
    p.price
<span class="kw">FROM</span>   <span class="fn">UNNEST</span>(
           <span class="kw">ARRAY</span>[<span class="num">101</span>, <span class="num">103</span>, <span class="num">999</span>, <span class="num">102</span>]::<span class="tbl">int</span>[]
       ) <span class="kw">WITH ORDINALITY</span> <span class="kw">AS</span> t(product_id, ord)  <span class="cmt">-- WITH ORDINALITY: 配列の添え字（順番）を列として追加</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">products</span> p <span class="kw">USING</span> (product_id)   <span class="cmt">-- LEFT JOIN: 存在しないIDでもNULLを返す（INNER JOINだと消える）</span>
<span class="kw">ORDER BY</span> ord;                              <span class="cmt">-- 入力配列の順番通りにソート</span>

<span class="cmt">-- ════════════════════════════════
   応用②: パラメータとして渡す（アプリコードのイメージ）
   ════════════════════════════════</span>
<span class="cmt">-- アプリ側: $1 にINT配列をバインド（例: Go/Python の DB ライブラリ）</span>
<span class="kw">SELECT</span> p.product_id, p.name, p.price
<span class="kw">FROM</span>   <span class="fn">UNNEST</span>(<span class="str">$1</span>::<span class="tbl">int</span>[]) <span class="kw">WITH ORDINALITY</span> <span class="kw">AS</span> t(product_id, ord)  <span class="cmt">-- $1 はパラメータ（プリペアドステートメント）</span>
<span class="kw">LEFT JOIN</span> <span class="tbl">products</span> p <span class="kw">USING</span> (product_id)
<span class="kw">ORDER BY</span> ord;
<span class="cmt">-- → クエリ形式が常に同じ（配列サイズによらない）→ プランキャッシュが効く</span>

<span class="cmt">/*
  実行順序:
  1. UNNEST(ARRAY[…]) WITH ORDINALITY  → 配列を行に展開（[101,1], [103,2], [999,3], [102,4]）
  2. LEFT JOIN products USING(product_id) → 各IDをproductsテーブルと結合（存在しないIDはNULL）
  3. ORDER BY ord                       → 入力の順番通りに並べ替え
  4. SELECT ...                         → 結果列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>UNNEST WITH ORDINALITY の展開結果</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>UNNEST展開後 product_id</th><th>WITH ORDINALITY の ord（順番）</th></tr>
<tr class="tr-hi2"><td class="tc-hi">101</td><td class="tc-g">1</td></tr>
<tr class="tr-hi2"><td class="tc-hi">103</td><td class="tc-g">2</td></tr>
<tr class="tr-hi2"><td class="tc-hi">999</td><td class="tc-g">3</td></tr>
<tr class="tr-hi2"><td class="tc-hi">102</td><td class="tc-g">4</td></tr>
</table></div>
</div>
<div class="arrow">↓ <span class="arrow-text">LEFT JOINで存在しない999はNULL、ordを使ってORDER BYで入力順を維持</span></div>
<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>IN句 vs UNNEST の特性比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>特性</th><th>IN句（リテラル）</th><th>UNNEST + JOIN</th></tr>
<tr class="tr-hi"><td>プランキャッシュ</td><td class="tc-r">件数が変わるたびに新プラン</td><td class="tc-g">常に同じプラン（キャッシュ有効）</td></tr>
<tr class="tr-hi2"><td>順序保持</td><td class="tc-r">ORDER BYなしでは保証なし</td><td class="tc-g">WITH ORDINALITY で保持可能</td></tr>
<tr class="tr-hi2"><td>存在しないID処理</td><td class="tc-r">単純に除外される</td><td class="tc-g">LEFT JOINでNULLとして返せる</td></tr>
<tr class="tr-hi"><td>5000件の場合</td><td class="tc-r">クエリ文字列が数十KB</td><td class="tc-g">配列パラメータ1つ</td></tr>
</table></div>
</div>
</div>
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>UNNESTは配列の各要素を1行として展開する関数です。<code>UNNEST(ARRAY[1,2,3])</code> は「1」「2」「3」の3行を持つ仮想テーブルになります。この仮想テーブルにJOINすることで、配列内の各IDに対応する行を一度に取得できます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>WITH ORDINALITYの使いどころ：</strong>フロントエンドから送られてきた商品IDの順番（カートの並び順など）をそのまま維持してDBからデータを返したい場合に便利です。ORDINALITYは1始まりの連番なのでそのままORDER BYに使えます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>ANY演算子との使い分け：</strong><code>WHERE product_id = ANY($1::int[])</code> は <code>WHERE product_id IN (…)</code> と意味は同じで、配列パラメータを渡せます。プランキャッシュは効きますが順序保持やNULL返却は不可能です。シンプルな一致検索はANY、順序保持やNULL返却が必要なケースはUNNESTを選んでください。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>アプリ側でループして1件ずつ取得する：</strong>5,000件のIDを1件ずつSELECTするのは最悪のN+1パターンです。UNNESTや <code>ANY($1::int[])</code> を使って必ず1クエリで一括取得してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>動的IN句生成でSQLインジェクションのリスク：</strong>アプリ側でIDをカンマ区切りで連結してIN句を組み立てる実装は、インジェクションリスクと文字列長の問題があります。プリペアドステートメントと配列パラメータ（<code>$1::int[]</code>）を使ってください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：GraphQLのDataLoaderとUNNEST</div>
<div class="column-body">
GraphQLのN+1問題を解決するDataLoader（Facebook製）は、1リクエスト内のIDを集約してバッチ取得します。このバッチ取得のSQLとしてUNNESTは最適な実装です。<strong>DataLoaderがIDのリストを渡してくる場合、<code>UNNEST($1::int[]) WITH ORDINALITY</code> でJOINするとIDの順序通りに結果が返るため、DataLoader側でIDと結果を対応付ける処理が簡略化されます</strong>。Node.js/GoのPostgreSQLドライバはすべてint[]やtext[]の配列バインドをサポートしています。
</div>
</div>
`

/* ══════════════════════════════════════════════════
   Q8  CTEのマテリアライズ制御 — MATERIALIZED vs NOT MATERIALIZED

{
  num: 8,
  title: "CTEのマテリアライズ制御 — WITH句が「最適化の壁」になるケースと対処法",
  tags: [["r","CTE"],["r","MATERIALIZED"],["o","クエリ最適化"],["g","実行計画制御"]],
  premise: `<p><strong>CTE（Common Table Expression）</strong> は <code>WITH 名前 AS (…)</code> で定義する名前付きサブクエリです。PostgreSQL 12以前では、CTEは常にマテリアライズ（結果を一時テーブルに保存）されていました。これにより<em>「最適化の壁（Optimization Fence）」</em>が生まれ、外側のWHEREがCTE内に押し込まれない問題がありました。</p>
<pre><span class="cmt">-- PostgreSQL 12以前: CTEはすべてマテリアライズ（一時テーブル化）</span>
<span class="kw">WITH</span> active_users <span class="kw">AS</span> (
    <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> is_active <span class="op">=</span> <span class="kw">TRUE</span>  <span class="cmt">-- ← まずここを全件実行して一時保存</span>
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> active_users <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="num">1001</span>;  <span class="cmt">-- ← その後でWHEREを適用（遅い）</span>

<span class="cmt">-- PostgreSQL 12以降: NOT MATERIALIZEDでインライン展開</span>
<span class="kw">WITH</span> active_users <span class="kw">AS</span> <span class="kw">NOT MATERIALIZED</span> (
    <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> is_active <span class="op">=</span> <span class="kw">TRUE</span>
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> active_users <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="num">1001</span>;  <span class="cmt">-- ← user_id=1001もCTE内に押し込まれる</span></pre>`,
  question: `<p>以下の2つのCTEクエリについて、<em>MATERIALIZEDとNOT MATERIALIZEDの使い分けを説明し</em>、それぞれ最適な書き方に修正してください。</p>
<pre><span class="cmt">-- クエリA: ユーザー詳細ページAPI（特定1ユーザーのデータを取得）</span>
<span class="kw">WITH</span> all_active <span class="kw">AS</span> (
    <span class="kw">SELECT</span> user_id, name, email, plan
    <span class="kw">FROM</span>   <span class="tbl">users</span>
    <span class="kw">WHERE</span>  is_active <span class="op">=</span> <span class="kw">TRUE</span>   <span class="cmt">-- 50万件のアクティブユーザー全件を一時保存してしまう</span>
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> all_active <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="str">:user_id</span>;

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>CTE（WITH句）は複雑なクエリを読みやすく分割するための機能です。名前付きサブクエリとも呼ばれます。<code>WITH 名前 AS (SELECT …) SELECT … FROM 名前</code> の形で使います。可読性向上に非常に有効ですが、パフォーマンス特性を理解した上で使うことが重要です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>PostgreSQL 12以降のデフォルト挙動：</strong>PostgreSQL 12以降ではオプティマイザがMATERIALIZEDかNOT MATERIALIZEDかを自動判断します。ただし副作用（VOLATILE関数など）を含む場合は常にMATERIALIZEDになります。パフォーマンスが出ない場合は明示的に指定して実行計画を固定するのが安全です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>CTEは「デバッグ用途」にも使える：</strong>複雑なJOINやサブクエリをCTE化すると、中間結果を <code>SELECT * FROM cte名</code> で確認できます。開発中はCTEを使って段階的にクエリを組み立て、完成後にパフォーマンスを考慮して必要に応じてNOT MATERIALIZEDやインライン化を検討する進め方が実用的です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTEを「パフォーマンス最適化のための分割」だと誤解する：</strong>「CTEに分割すればDBが賢く処理してくれる」という誤解は多いです。PostgreSQL 11以前ではCTEはむしろパフォーマンスの壁になります。CTEは可読性向上のためのツールであり、パフォーマンスはMATERIALIZEDの制御と実行計画の確認で判断してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WITH RECURSIVE以外でCTEを1回だけ参照してMATERIALIZEDのままにする：</strong>CTEを1回しか参照しない場合でMATERIALIZEDだと、中間一時テーブルの書き込みコストが無駄になります。1回しか参照しないCTEはNOT MATERIALIZEDにするか、素直にサブクエリに書き直すことを検討してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：マテリアライズドビューとCTEの使い分け</div>
<div class="column-body">
重い月次集計をAPIリクエストのたびに実行するのは非効率です。<strong>バッチで1日1回計算してマテリアライズドビュー（MATERIALIZED VIEW）に保存し、APIはそこから高速に読む設計</strong>が実務の定番です。CTE内のMATERIALIZEDはあくまでクエリ内の一時キャッシュですが、マテリアライズドビューはテーブルとしてディスクに永続化されます。<code>REFRESH MATERIALIZED VIEW CONCURRENTLY 名前</code> を使えば、リフレッシュ中も古いデータを参照可能（ロックなし）にできます（PostgreSQL 9.4以降）。
</div>
</div>

  premise: `<p><strong>DISTINCT ON</strong>（PostgreSQL専用）は「指定列の値が同じグループの中で最初の1行だけ残す」機能です。GROUP BY + MAX + JOINや、ROW_NUMBER Window関数を使う方法より短く書けることが多いです。</p>
<pre><span class="cmt">-- 各ユーザーの最新注文を取得する3つの方法</span>

<span class="cmt">-- ① サブクエリ + JOIN（冗長）</span>
<span class="kw">SELECT</span> o.<span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> o
<span class="kw">JOIN</span> (<span class="kw">SELECT</span> user_id, <span class="fn">MAX</span>(created_at) <span class="kw">AS</span> latest <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">GROUP BY</span> user_id) t
<span class="kw">ON</span> o.user_id <span class="op">=</span> t.user_id <span class="kw">AND</span> o.created_at <span class="op">=</span> t.latest;

<span class="cmt">-- ② ROW_NUMBER（汎用・MySQL/SQL Server でも使える）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> (
    <span class="kw">SELECT</span> <span class="op">*</span>, <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (<span class="kw">PARTITION BY</span> user_id <span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>) <span class="kw">AS</span> rn
    <span class="kw">FROM</span> <span class="tbl">orders</span>
) t <span class="kw">WHERE</span> rn <span class="op">=</span> <span class="num">1</span>;

<span class="cmt">-- ③ DISTINCT ON（PostgreSQL限定・最も簡潔）</span>
<span class="kw">SELECT</span> <span class="kw">DISTINCT ON</span> (user_id) <span class="op">*</span>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>DISTINCT ONは「同じ値の行が複数あるとき、最初の1行だけを残す」機能です。「最初の1行」はORDER BYで決まります。<code>DISTINCT ON (room_id)</code> + <code>ORDER BY room_id, sent_at DESC</code> なら「room_idごとに最も新しいsent_atの行だけを残す」という意味になります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DISTINCT ON のルール：</strong>DISTINCT ONに指定した列は必ずORDER BYの先頭に置く必要があります。<code>DISTINCT ON (room_id)</code> なら <code>ORDER BY room_id, …</code> が必須です。これを守らないとエラーになります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>サブクエリで外側の ORDER BY を自由に変える：</strong>DISTINCT ONの制約（DISTINCT ON列がORDER BYの先頭）のため、「最新メッセージがあるルームを上に」のような外側ソートはサブクエリに包んで行います。内側でDISTINCT ON、外側で自由なORDER BYというパターンが定番です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>DISTINCT ON の ORDER BY を間違える：</strong><code>ORDER BY sent_at DESC</code>（room_idなし）にするとエラーになります。DISTINCT ONに指定した列が必ずORDER BYの先頭でなければなりません。<code>ORDER BY room_id, sent_at DESC</code> が正しい形です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>同一グループの最大値と他の列を取得するためにGROUP BY + JOINを使う：</strong><code>GROUP BY room_id</code>でsent_atのMAXを取ってから再JOINするパターンは、sent_atが重複した場合に複数行が返ることがあります（タイムスタンプ重複問題）。DISTINCT ONはORDER BYで一意の順序を指定するため、この問題が起きません。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：SlackライクなDMの「最新メッセージ一覧」実装</div>
<div class="column-body">
SlackやLINEのようなチャットUIで「チャンネル一覧に最新メッセージのプレビューを表示する」機能は、まさにこのDISTINCT ONパターンの典型です。<strong>ルーム数が多くなるとこのクエリは毎秒数百回実行されるため、<code>(room_id, sent_at DESC)</code>の複合インデックスは必須</strong>です。インデックスが効けばDISTINCT ONの各グループ先頭行をインデックスのみで直接取得でき（Index Only Scan）、5,000万件でもミリ秒で返ります。さらにRedisを使って「ルームごとの最新メッセージ」をキャッシュするパターンと組み合わせることで、大規模トラフィックにも対応できます。
</div>
</div>

function acc(icon, pillClass, pillText, title, content) {

      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">

    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES prac-002</div>

        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}

      <div class="nav-bar">

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}
