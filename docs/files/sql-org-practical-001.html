  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }

  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }

  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }

  p { font-size: 13.5px; margin-bottom: 10px; }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;

  }

  .fn  { color: var(--fn); }

  .callout {

  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .viz-flow { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }

  .step-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green); }
  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }

  table.vtbl tr:nth-child(even) td { background: #080c12; }
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }

  .tc-hi { color: var(--accent) !important; font-weight: 700; }
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }

  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  .exec-box { background: #060a0f; border: 1px solid var(--bg4); border-radius: 6px; padding: 12px 14px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
  .exec-title { color: var(--purple); font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; }
  .exec-row { display: flex; gap: 8px; margin-bottom: 5px; align-items: flex-start; }
  .exec-n { color: var(--dim); width: 14px; flex-shrink: 0; }
  .exec-step { color: var(--yellow); min-width: 160px; flex-shrink: 0; }
  .exec-desc { color: var(--dim); line-height: 1.5; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }

  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }

  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">組織10</span></div>
      <div class="header-text-wrap">
        <div class="header-title">企業組織データで学ぶ SQL 応用10選（実務BI編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 中〜上級</span>
      <span class="htag">組織分析</span>
      <span class="htag">HR Analytics</span>
      <span class="htag">PostgreSQL/BigQuery対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  DENSE_RANK — 部署内売上ランキング（同率対応）
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "DENSE_RANK — 部署内売上ランキングを同率考慮で算出",
  tags: [["r","DENSE_RANK"],["o","PARTITION BY"],["g","CTE"],["p","部署別ランキング"]],
  premise: `<p><strong>DENSE_RANK()</strong> は同値に同順位を振り、次の順位を飛ばさないウィンドウ関数です。部署別ランキング・社内表彰・昇格候補抽出など、組織分析で頻出します。</p>
<pre><span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> dept_id          <span class="cmt">-- 部署ごとに独立したウィンドウを作成</span>
  <span class="kw">ORDER BY</span>    total_sales <span class="kw">DESC</span> <span class="cmt">-- 売上の降順でランク付け（高い方が1位）</span>
) <span class="kw">AS</span> dept_rank</pre>
<div class="callout"><strong>3兄弟の違い（同値が2人いるとき）：</strong><br>
ROW_NUMBER → 1, 2, 3, 4（同値でも必ず別番号）<br>
RANK       → 1, 1, 3, 4（同率あり・次を飛ばす）<br>
DENSE_RANK → 1, 1, 2, 3（同率あり・次を飛ばさない）</div>
<p>組織ランキングでは <em>「3位は何人いるか」を正確に表したい</em> ので DENSE_RANK が最適です。RANK だと「2位が2人いると4位が続く」という直感に反する表示になります。</p>`,
  question: `<p>employees テーブルと sales_results テーブルを結合し、<em>各部署内での四半期売上ランキング</em>を DENSE_RANK で算出してください。</p>
<p>各部署の上位3位以内の社員のみを出力し、同率の場合は全員含めます。</p>
<p>出力：dept_name, emp_name, total_sales, dept_rank</p>

<div class="data-section">
  <div class="data-label">使用テーブル（サンプルデータ）</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ employees</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>emp_id</th><th>emp_name</th><th>dept_id</th></tr>
        <tr><td>1</td><td>田中</td><td>10</td></tr>
        <tr><td>2</td><td>佐藤</td><td>10</td></tr>
        <tr><td>3</td><td>山田</td><td>10</td></tr>
        <tr><td>4</td><td>鈴木</td><td>20</td></tr>
        <tr><td>5</td><td>高橋</td><td>20</td></tr>
        <tr><td>6</td><td>木村</td><td>20</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ sales_results</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>emp_id</th><th>quarter</th><th>total_sales</th></tr>
        <tr><td>1</td><td>2024Q1</td><td>820,000</td></tr>
        <tr><td>2</td><td>2024Q1</td><td>750,000</td></tr>
        <tr><td>3</td><td>2024Q1</td><td>750,000</td></tr>
        <tr><td>4</td><td>2024Q1</td><td>990,000</td></tr>
        <tr><td>5</td><td>2024Q1</td><td>640,000</td></tr>
        <tr><td>6</td><td>2024Q1</td><td>880,000</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ departments</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>dept_id</th><th>dept_name</th></tr>
        <tr><td>10</td><td>営業一部</td></tr>
        <tr><td>20</td><td>営業二部</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>dept_name</th><th>emp_name</th><th>total_sales</th><th>dept_rank</th></tr>
<tr><td>営業一部</td><td>田中</td><td>820,000</td><td>1</td></tr>
<tr><td>営業一部</td><td>佐藤</td><td>750,000</td><td>2</td></tr>
<tr><td>営業一部</td><td>山田</td><td>750,000</td><td>2</td></tr>
<tr><td>営業二部</td><td>鈴木</td><td>990,000</td><td>1</td></tr>
<tr><td>営業二部</td><td>木村</td><td>880,000</td><td>2</td></tr>
<tr><td>営業二部</td><td>高橋</td><td>640,000</td><td>3</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span> <span class="cmt">-- 一時テーブル（CTE）を定義する構文。クエリを小分けにして読みやすくします</span>

<span class="cmt">-- ① 部署内売上ランキングを算出する（CTEで一段ラップ）</span>
ranked <span class="kw">AS</span> (
  <span class="kw">SELECT</span>                            <span class="cmt">-- 取得したい列（カラム）を指定する</span>
    d.dept_name,                    <span class="cmt">-- 部署名（departments テーブルから）</span>
    e.emp_name,                     <span class="cmt">-- 社員名（employees テーブルから）</span>
    s.total_sales,                  <span class="cmt">-- 四半期売上（sales_results テーブルから）</span>
    <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (             <span class="cmt">-- 同率を考慮した順位を付けるウィンドウ関数</span>
      <span class="kw">PARTITION BY</span> e.dept_id         <span class="cmt">-- 部署ごとに独立してランク付け（部署が変わると1からリセット）</span>
      <span class="kw">ORDER BY</span>    s.total_sales <span class="kw">DESC</span> <span class="cmt">-- 売上が高いほど小さい数字（1位）になる。DESCは降順（大きい順）</span>
    ) <span class="kw">AS</span> dept_rank                  <span class="cmt">-- 計算結果の列に AS で別名を付ける</span>
  <span class="kw">FROM</span>       <span class="tbl">sales_results</span> s        <span class="cmt">-- データ取得元のメインテーブルを指定（s はエイリアス/別名）</span>
  <span class="kw">JOIN</span>       <span class="tbl">employees</span>     e  <span class="kw">ON</span> s.emp_id  <span class="op">=</span> e.emp_id   <span class="cmt">-- 社員IDをキーにして社員テーブルを結合（紐付け）</span>
  <span class="kw">JOIN</span>       <span class="tbl">departments</span>   d  <span class="kw">ON</span> e.dept_id <span class="op">=</span> d.dept_id  <span class="cmt">-- 部署IDをキーにして部署テーブルを結合</span>
  <span class="kw">WHERE</span>      s.quarter <span class="op">=</span> <span class="str">'2024Q1'</span>                       <span class="cmt">-- 条件に合致する行だけを絞り込む</span>
)

<span class="cmt">-- ② CTEの結果から上位3位以内のみ取得（同率3位は全員含む）</span>
<span class="cmt">-- ※ ウィンドウ関数の結果は同じSELECTのWHEREで使えないため CTEが必須</span>
<span class="kw">SELECT</span>      <span class="cmt">-- CTE(ranked)から最終的なデータを取り出す</span>
  dept_name,
  emp_name,
  total_sales,
  dept_rank
<span class="kw">FROM</span>  ranked                       <span class="cmt">-- 上で作った一時テーブルからデータを取得</span>
<span class="kw">WHERE</span> dept_rank <span class="op">&lt;=</span> <span class="num">3</span>               <span class="cmt">-- 3位以下（1, 2, 3位）に絞る（&lt;= は以下を表す比較演算子）</span>
<span class="kw">ORDER BY</span> dept_name, dept_rank;    <span class="cmt">-- 並び替えの指定: 部署名の昇順 → 同部署内は順位の昇順</span>

<span class="cmt">/*
  SQL実行順序:
  1. FROM sales_results           → 売上テーブルを読み込む

</table></div>`,
  answer: `<pre><span class="kw">WITH</span> <span class="cmt">-- CTEを開始</span>

<span class="cmt">-- ① 部署ごとの年間実績合計を集計する</span>
actuals <span class="kw">AS</span> (
  <span class="kw">SELECT</span> <span class="cmt">-- 取得列を指定</span>
    dept_id,
    <span class="fn">SUM</span>(amount) <span class="kw">AS</span> actual_amount    <span class="cmt">-- 月次実績を年間合計に集約（SUM = 合計）</span>
  <span class="kw">FROM</span>  <span class="tbl">actual_expenses</span>             <span class="cmt">-- 取得元テーブル</span>
  <span class="kw">WHERE</span> <span class="fn">EXTRACT</span>(<span class="kw">YEAR FROM</span> expense_month) <span class="op">=</span> <span class="num">2024</span>  <span class="cmt">-- EXTRACT で日付から「年」だけを取り出して絞る</span>
  <span class="kw">GROUP BY</span> dept_id                                <span class="cmt">-- 部署IDごとにデータをグループ化（まとめて1行にする）</span>
),

<span class="cmt">-- ② 予算テーブルと実績を結合して差異を計算する</span>
variance_calc <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    b.dept_name,
    b.budget_amount,
    <span class="fn">COALESCE</span>(a.actual_amount, <span class="num">0</span>) <span class="kw">AS</span> actual_amount,  <span class="cmt">-- 実績がない部署は0として扱う</span>
    b.budget_amount <span class="op">-</span> <span class="fn">COALESCE</span>(a.actual_amount, <span class="num">0</span>) <span class="kw">AS</span> variance,  <span class="cmt">-- 差異 = 予算 - 実績（正=残、負=超過）</span>
    <span class="fn">ROUND</span>(
      <span class="fn">COALESCE</span>(a.actual_amount, <span class="num">0</span>) <span class="op">*</span> <span class="num">100.0</span>           <span class="cmt">-- * 100.0 で浮動小数点除算にする（整数除算防止）</span>
      <span class="op">/</span> <span class="fn">NULLIF</span>(b.budget_amount, <span class="num">0</span>)                    <span class="cmt">-- NULLIF: 予算0円でのゼロ除算を防いでNULLにする</span>
    , <span class="num">1</span>) <span class="kw">AS</span> usage_pct                                 <span class="cmt">-- ROUNDで小数点1桁に丸める</span>
  <span class="kw">FROM</span>      <span class="tbl">budgets</span>  b
  <span class="kw">LEFT JOIN</span> actuals a <span class="kw">ON</span> b.dept_id <span class="op">=</span> a.dept_id  <span class="cmt">-- LEFT JOIN: 実績がない部署も予算側は残す</span>
  <span class="kw">WHERE</span>     b.fiscal_year <span class="op">=</span> <span class="num">2024</span>                <span class="cmt">-- 対象年度を絞る</span>
)

<span class="cmt">-- ③ 消化率に応じたアラートを付与して出力する</span>
<span class="kw">SELECT</span>
  dept_name,
  budget_amount,
  actual_amount,
  variance,
  usage_pct,
  <span class="kw">CASE</span> <span class="cmt">-- 条件分岐（if文のようなもの）の開始</span>
    <span class="cmt">-- 条件は上から評価されるため、より厳しい条件（超過）を先に書く</span>
    <span class="kw">WHEN</span> usage_pct <span class="op">&gt;</span>  <span class="num">100</span> <span class="kw">THEN</span> <span class="str">'超過'</span>    <span class="cmt">-- 100%超 = 予算オーバー</span>
    <span class="kw">WHEN</span> usage_pct <span class="op">&gt;=</span>  <span class="num">90</span> <span class="kw">THEN</span> <span class="str">'要注意'</span>  <span class="cmt">-- 90%以上（かつ100%以下）= 残り少ない</span>
    <span class="kw">ELSE</span>                       <span class="str">'正常'</span>      <span class="cmt">-- 90%未満</span>
  <span class="kw">END</span> <span class="kw">AS</span> alert
<span class="kw">FROM</span>  variance_calc
<span class="kw">ORDER BY</span> usage_pct <span class="kw">DESC</span>;  <span class="cmt">-- 消化率の高い順（危険度順）に並べる</span>

<span class="cmt">/*
  SQL実行順序:

  2. GROUP BY dept_id                  → 部署別に年間合計を算出 → actuals完成
  3. FROM budgets LEFT JOIN actuals    → 予算と実績を部署IDで結合
  4. variance / usage_pct の計算      → variance_calc CTE完成
  5. CASE usage_pct                    → アラートラベルを付与
  6. ORDER BY usage_pct DESC          → 消化率の高い順（危険度順）に出力
*/</span></pre>`,

{

  tags: [["r","NOT EXISTS"],["o","全否定"],["g","サブクエリ"],["p","リソース配置分析"]],
  premise: `<p><strong>NOT EXISTS</strong> は「サブクエリが1行も返さないとき TRUE」を意味します。「一度も参加していない〇〇がある社員」という否定的な条件の検索に最適です。</p>
<pre><span class="kw">WHERE NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span>                   <span class="cmt">-- SELECT 1は「何でもよい」の慣用句（SELECT *と同義）</span>
  <span class="kw">FROM</span> <span class="tbl">project_members</span> pm
  <span class="kw">WHERE</span> pm.emp_id    <span class="op">=</span> e.emp_id      <span class="cmt">-- 外部クエリの社員と紐付け（相関サブクエリ）</span>
    <span class="kw">AND</span> pm.project_id <span class="op">=</span> p.project_id  <span class="cmt">-- 外部クエリのプロジェクトと紐付け</span>
)</pre>`,
  question: `<p>employees / projects / project_members テーブルを使い、<em>少なくとも1つ以上のプロジェクトに一度も参加したことがない社員</em>を抽出してください。</p>
<p>出力：emp_name, dept_name, unassigned_project_names（カンマ区切り）, unassigned_count</p>

<div class="data-section">
  <div class="data-label">使用テーブル（サンプルデータ）</div>

<tr><td>佐藤</td><td>開発部</td><td>モバイルアプリ開発, データ基盤構築</td><td>2</td></tr>
<tr><td>山田</td><td>営業部</td><td>基幹システム刷新</td><td>1</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 全社員 × 全プロジェクトの組み合わせを生成する（CROSS JOIN）</span>
<span class="cmt">-- CROSS JOIN: 結合条件なしで全組み合わせを作る（3社員 × 3PJ = 9行）</span>
all_combinations <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    e.emp_id,
    e.emp_name,
    e.dept_name,
    p.project_id,
    p.project_name
  <span class="kw">FROM</span>       <span class="tbl">employees</span> e
  <span class="kw">CROSS JOIN</span> <span class="tbl">projects</span>  p  <span class="cmt">-- 結合条件（ON）なしで全ての組み合わせを掛け合わせる（クロス結合）</span>
),

<span class="cmt">-- ② 組み合わせのうち「参加記録がない」ものだけ残す</span>
unassigned <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    ac.emp_id,
    ac.emp_name,
    ac.dept_name,
    ac.project_name
  <span class="kw">FROM</span> all_combinations ac
  <span class="kw">WHERE NOT EXISTS</span> (                  <span class="cmt">-- サブクエリが0行 = 参加記録なし = TRUEで残す</span>
    <span class="kw">SELECT</span> <span class="num">1</span>                          <span class="cmt">-- 何でもよい（存在確認だけが目的）</span>
    <span class="kw">FROM</span>  <span class="tbl">project_members</span> pm
    <span class="kw">WHERE</span> pm.emp_id    <span class="op">=</span> ac.emp_id     <span class="cmt">-- この社員が（外部クエリと相関）</span>
      <span class="kw">AND</span> pm.project_id <span class="op">=</span> ac.project_id  <span class="cmt">-- このプロジェクトに参加した記録があるか</span>
  )
)

<span class="cmt">-- ③ 社員ごとに未参加プロジェクトをカンマ結合して集約する</span>
<span class="kw">SELECT</span> <span class="cmt">-- 最終的な取得処理</span>
  emp_name,
  dept_name,
  <span class="cmt">-- STRING_AGG: グループ化された複数行の文字列を、指定した区切り文字で1つの文字列に合体させる関数</span>
  <span class="fn">STRING_AGG</span>(project_name, <span class="str">', '</span> <span class="kw">ORDER BY</span> project_name)  <span class="cmt">-- カンマ区切りで連結、名前順</span>
    <span class="kw">AS</span> unassigned_project_names,
  <span class="fn">COUNT</span>(<span class="op">*</span>)  <span class="kw">AS</span> unassigned_count        <span class="cmt">-- COUNT(*): グループ内の行数を数える集計関数</span>
<span class="kw">FROM</span>  unassigned
<span class="kw">GROUP BY</span> emp_id, emp_name, dept_name   <span class="cmt">-- 社員ごとに1行に集約</span>
<span class="kw">ORDER BY</span> emp_name;                     <span class="cmt">-- 名前の50音順で出力</span>

<span class="cmt">/*
  SQL実行順序:
  1. CROSS JOIN employees × projects → 全組み合わせ生成（3×3=9行）
  2. NOT EXISTS サブクエリ           → 各組み合わせで参加記録をチェック
  3. unassigned CTE 完成             → 未参加の（社員,PJ）ペアが残る
  4. GROUP BY emp_id                 → 社員ごとに集約
  5. STRING_AGG(...)                 → 未参加PJ名をカンマ区切りで連結
  6. COUNT(*)                        → 未参加PJ数をカウント
  7. ORDER BY emp_name               → 名前順に出力
*/</span></pre>`,
  explain: `

<div class="step-block">

  premise: `<p><strong>再帰CTE（Recursive CTE）</strong> は自分自身を参照できるCTEで、ツリー構造や階層データを深さに制限なく展開するのに使います。Q2のSELF JOINでは「上司の上司」を取ろうとするたびにJOINを追加する必要がありましたが、再帰CTEなら何階層でも自動的に追いかけられます。</p>
<pre><span class="kw">WITH RECURSIVE</span> org_tree <span class="kw">AS</span> (

  <span class="cmt">-- 基底クエリ（Anchor）: 再帰の起点となる最初の1行</span>
  <span class="kw">SELECT</span> emp_id, emp_name, manager_id, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span>   <span class="tbl">employees</span>
  <span class="kw">WHERE</span>  manager_id <span class="kw">IS NULL</span>  <span class="cmt">-- トップ（CEOなど）から始める</span>

  <span class="kw">UNION ALL</span>

  <span class="cmt">-- 再帰クエリ（Recursive）: org_tree に結合して1階層ずつ下に掘る</span>
  <span class="kw">SELECT</span> e.emp_id, e.emp_name, e.manager_id, t.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span>   <span class="tbl">employees</span> e
  <span class="kw">JOIN</span>   org_tree   t <span class="kw">ON</span> e.manager_id <span class="op">=</span> t.emp_id  <span class="cmt">-- 前の結果の子を取得</span>
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> org_tree;</pre>
<div class="callout"><strong>UNION ALL vs UNION：</strong>再帰CTEでは必ず <code>UNION ALL</code> を使います。<code>UNION</code>（重複除去あり）は各反復で重複チェックをするため非常に重くなります。</div>`,

  answer: `<pre><span class="kw">WITH RECURSIVE</span> <span class="cmt">-- 自分自身を呼び出す特殊なCTE（再帰CTE）の宣言</span>

<span class="cmt">-- ① 再帰CTE: トップから1階層ずつ下に向かって全社員を展開する</span>
org_tree <span class="kw">AS</span> (

  <span class="cmt">-- 基底クエリ（Anchor Member）: 再帰の起点を定義する</span>
  <span class="cmt">-- manager_id が NULL の社員 = トップ（CEO）から始める</span>
  <span class="kw">SELECT</span>
    emp_id,
    emp_name,
    job_title,
    manager_id,
    <span class="num">0</span>        <span class="kw">AS</span> depth,        <span class="cmt">-- トップは深さ 0</span>
    emp_name <span class="kw">AS</span> path           <span class="cmt">-- トップの経路 = 自分自身の名前</span>
  <span class="kw">FROM</span>   <span class="tbl">employees</span>
  <span class="kw">WHERE</span>  manager_id <span class="kw">IS NULL</span>   <span class="cmt">-- IS NULL: 値がNULL（空っぽ）であるかを判定（= NULL とは書けない）</span>

  <span class="kw">UNION ALL</span>  <span class="cmt">-- 上のSELECT結果と下のSELECT結果を、重複チェックなしでそのまま縦に結合する</span>

  <span class="cmt">-- 再帰クエリ（Recursive Member）: 前の反復結果（org_tree）に子を結合する</span>
  <span class="cmt">-- 子が存在する限りこのクエリを繰り返す（結果が0行になったら停止）</span>
  <span class="kw">SELECT</span>
    e.emp_id,
    e.emp_name,
    e.job_title,
    e.manager_id,
    t.depth <span class="op">+</span> <span class="num">1</span>                             <span class="cmt">-- 1階層下るごとに depth を +1</span>
      <span class="kw">AS</span> depth,
    t.path <span class="op">||</span> <span class="str">' → '</span> <span class="op">||</span> e.emp_name           <span class="cmt">-- || は文字列結合演算子（経路を '→' でつなぐ）</span>
      <span class="kw">AS</span> path
  <span class="kw">FROM</span>   <span class="tbl">employees</span>  e
  <span class="kw">JOIN</span>   org_tree    t <span class="kw">ON</span> e.manager_id <span class="op">=</span> t.emp_id  <span class="cmt">-- 前の結果の社員が上司の子を取得</span>
),

<span class="cmt">-- ② 各社員の配下人数を集計する（直接の部下だけでなく全配下を数える）</span>
<span class="cmt">-- 「誰かの manager_id に自分の emp_id が含まれるか」を逆引きで集計</span>
sub_count <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    t.emp_id,
    <span class="fn">COUNT</span>(sub.emp_id) <span class="kw">AS</span> subordinate_count  <span class="cmt">-- 配下にいる社員数（自分を除く）</span>
  <span class="kw">FROM</span>       org_tree t
  <span class="kw">LEFT JOIN</span>  org_tree sub                        <span class="cmt">-- 全社員と再度結合（LEFT: 部下0人も残す）</span>
    <span class="kw">ON</span> sub.path <span class="kw">LIKE</span> t.path <span class="op">||</span> <span class="str">' →%'</span>          <span class="cmt">-- 経路が自分から始まる社員が配下</span>
  <span class="kw">GROUP BY</span> t.emp_id                              <span class="cmt">-- 社員ごとに配下数を集計</span>
)

<span class="cmt">-- ③ 再帰結果と配下人数を結合して出力</span>
<span class="kw">SELECT</span>
  t.emp_id,
  t.emp_name,
  t.job_title,
  t.depth,
  t.path,
  s.subordinate_count
<span class="kw">FROM</span>  org_tree   t
<span class="kw">JOIN</span>  sub_count  s <span class="kw">ON</span> t.emp_id <span class="op">=</span> s.emp_id  <span class="cmt">-- 配下人数を結合</span>
<span class="kw">ORDER BY</span> t.path;                             <span class="cmt">-- 経路順（自然な組織ツリー順）で出力</span>

<span class="cmt">/*
  SQL実行順序:
  1. Anchor（基底クエリ）実行     → CEO行（depth=0, path='田中'）を生成
  2. Recursive（再帰クエリ）×1回目→ CEOの直属部下（depth=1）を取得
  3. Recursive ×2回目            → 部長の部下（depth=2）を取得
  4. Recursive ×3回目            → 課長の部下（depth=3）を取得
  5. Recursive ×4回目            → 結果0行 → 反復終了
  6. org_tree CTE 完成（全6行）
  7. sub_count: LIKE で経路をチェックして配下を集計
  8. JOIN + ORDER BY path        → 組織ツリー順で出力
*/</span></pre>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足：</strong><code>UNION</code> は2つの検索結果をくっつけますが、重複を取り除くため処理が重くなります。<code>UNION ALL</code> は重複を気にせずそのまま繋げるため高速です。また、NULLの判定には <code>= NULL</code> ではなく <code>IS NULL</code> を使います（NULLは未知の値であり、比較演算子が使えないため）。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>再帰CTEの2部構成：</strong>「基底クエリ（起点を1行生成）」+ UNION ALL +「再帰クエリ（前の結果を参照して子を取得）」。子が0行になった時点で自動停止します。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>SELF JOINとの使い分け：</strong>SELF JOINは階層数が事前に決まっている場合に向く（2階層なら2回JOIN）。階層数が不定（ツリーの深さが可変）なら再帰CTEを使います。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>無限ループ対策：</strong>循環参照（A→B→A）があるデータでは再帰が終わらない。PostgreSQLでは <code>CYCLE emp_id SET is_cycle USING path</code> で検知できる。本番環境では <code>WHERE depth &lt; 20</code> など深さ上限を設けると安全です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>UNION ALL でなく UNION を使う：</strong>再帰部分で <code>UNION</code>（重複除去あり）を使うと、反復ごとに全結果と重複チェックが走り非常に重くなります。再帰CTEでは必ず <code>UNION ALL</code>。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WITH RECURSIVE を WITH だけにする：</strong>PostgreSQL/BigQueryでは自己参照CTEには <code>WITH RECURSIVE</code> が必須。<code>WITH</code> だけだと「org_tree テーブルが存在しない」エラーになります。</div></div>
</div>`

  premise: `<p>多くのRDBMSには専用のPIVOT構文がありませんが、<strong>SUM(CASE WHEN ... THEN 値 ELSE 0 END)</strong> のパターンで同等のクロス集計が実現できます。「行 → 列」変換とも呼ばれ、売上レポート・勤怠集計・マトリクス表の生成でよく使います。</p>
<pre><span class="cmt">-- 特定の条件に一致する行のみ集計する「条件付きSUM」</span>
<span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> quarter <span class="op">=</span> <span class="str">'2024Q1'</span> <span class="kw">THEN</span> total_sales <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> q1_sales
<span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> quarter <span class="op">=</span> <span class="str">'2024Q2'</span> <span class="kw">THEN</span> total_sales <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> q2_sales</pre>
<div class="callout"><strong>ELSE 0 の重要性：</strong>ELSE を省略すると条件が一致しない行は NULL になり、SUM(NULL) = NULL になってしまいます。<code>ELSE 0</code> にすることで、その期の実績がない行も 0 として加算されます。</div>`,

    <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> quarter <span class="op">=</span> <span class="str">'2024Q2'</span> <span class="kw">THEN</span> total_sales <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> q2_sales,
    <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> quarter <span class="op">=</span> <span class="str">'2024Q3'</span> <span class="kw">THEN</span> total_sales <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> q3_sales,
    <span class="fn">SUM</span>(<span class="kw">CASE WHEN</span> quarter <span class="op">=</span> <span class="str">'2024Q4'</span> <span class="kw">THEN</span> total_sales <span class="kw">ELSE</span> <span class="num">0</span> <span class="kw">END</span>) <span class="kw">AS</span> q4_sales,

    <span class="cmt">-- 年間合計: 全四半期のSUM（条件なし）</span>
    <span class="fn">SUM</span>(total_sales)  <span class="kw">AS</span> annual_total

)

  <span class="kw">CASE</span> <span class="fn">GREATEST</span>(q1_sales, q2_sales, q3_sales, q4_sales)

      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
