<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLパフォーマンス最適化10選（基礎編）— インデックス/SELECT*/JOIN/NULL/LIKE/GROUP BY/サブクエリ/ORDER BY/EXISTS/複合インデックス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ── */
:root {
  --bg:     #0a0e13;
  --bg2:    #131920;
  --bg3:    #1c2330;
  --bg4:    #263040;
  --border: #2a3545;
  --text:   #cdd9e5;
  --dim:    #768390;
  --accent: #4dabf7;
  --green:  #3fb950;
  --orange: #f0883e;
  --red:    #f85149;
  --purple: #bc8cff;
  --yellow: #e3b341;
  --kw:     #ff7b72;
  --fn:     #79c0ff;
  --str:    #a5d6ff;
  --num:    #f0c674;
  --cmt:    #6a737d;
  --tbl:    #ffa657;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}

/* ── Header ── */
.site-header{background:var(--bg2)}
.header-inner{padding:16px}
.header-flex{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.header-badge{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1;white-space:nowrap}
.header-text-wrap{flex:1}
.header-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.header-tags{display:flex;gap:6px;flex-wrap:wrap}
.htag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}

/* ── Sticky tabs ── */
.sticky-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.tab-num{margin-right:5px}
.prog-wrap{height:2px;background:var(--bg4)}
.prog-fill{height:100%;background:var(--accent);transition:width .2s}

/* ── Main / Panel ── */
main{max-width:960px;margin:0 auto;padding:22px 14px 90px}
.panel{display:none}
.panel.active{display:block}

/* ── Question header ── */
.q-header{margin-bottom:18px}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;font-weight:600}
.tag-r{background:#1a2c44;color:var(--accent);border:1px solid #1e4070}
.tag-g{background:#162416;color:var(--green);border:1px solid #1e3a1e}
.tag-o{background:#2e1e0a;color:var(--orange);border:1px solid #4a2e0a}
.tag-p{background:#1e1433;color:var(--purple);border:1px solid #3a2060}

/* ── Accordion ── */
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.acc-head:hover{background:var(--bg3)}
.acc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-title{font-size:13px;font-weight:600;flex:1}
.acc-pill{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;flex-shrink:0}
.pill-blue  {background:#112233;color:var(--accent);border:1px solid #1a3a55}
.pill-green {background:#0e1f0e;color:var(--green);border:1px solid #1a3a1a}
.pill-orange{background:#1e1205;color:var(--orange);border:1px solid #3a2010}
.pill-red   {background:#1e0a0a;color:var(--red);border:1px solid #3a1010}
.pill-purple{background:#160f2a;color:var(--purple);border:1px solid #3a1a60}
.acc-chevron{color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .2s}
.acc.closed .acc-chevron{transform:rotate(-90deg)}
.acc-body{padding:14px 16px;border-top:1px solid var(--border)}
.acc.closed .acc-body{display:none}

/* ── Typography ── */
p{font-size:13.5px;margin-bottom:10px}
p:last-child{margin-bottom:0}
strong{color:var(--accent);font-weight:600}
em{color:var(--yellow);font-style:normal;font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--tbl)}

/* ── Code blocks ── */
pre{background:#060a0f;border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;margin:8px 0}
.kw {color:var(--kw);font-weight:700}
.fn {color:var(--fn)}
.tbl{color:var(--tbl)}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.op {color:var(--orange)}

/* ── Callouts ── */
.callout{border-left:3px solid var(--accent);background:#0e1e33;padding:9px 13px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px}
.callout.warn  {border-left-color:var(--yellow);background:#1e1a08}
.callout.danger{border-left-color:var(--red);background:#1e0e0e}
.callout.ok    {border-left-color:var(--green);background:#0a1e0a}

/* ── Data section ── */
.data-section{margin:14px 0}
.data-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tbl);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.data-label::before{content:'';display:block;width:3px;height:12px;background:var(--tbl);border-radius:2px}
.data-tables{display:flex;gap:14px;flex-wrap:wrap}
.data-tbl-wrap{flex:1;min-width:220px}
.data-tbl-name{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:4px}

/* ── Visual tables ── */
.tbl-wrap{overflow-x:auto;margin-bottom:4px}
table.vtbl{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#060a0f;border:1px solid var(--border);border-radius:4px;min-width:100%}
table.vtbl th{background:var(--bg3);color:var(--tbl);padding:5px 11px;border:1px solid var(--border);text-align:left;white-space:nowrap;font-weight:600}
table.vtbl td{padding:4px 11px;border:1px solid #1c2635;white-space:nowrap}
table.vtbl tr:nth-child(even) td{background:#080c12}
.tr-hi  td{background:#0e1e33!important}
.tr-hi2 td{background:#0e1e0e!important}
.tr-hi3 td{background:#1e1433!important}
.tr-hi4 td{background:#1e1a0a!important}
.tr-dim td{opacity:.4}
.tc-hi{color:var(--accent)!important;font-weight:700}
.tc-g {color:var(--green)!important;font-weight:700}
.tc-p {color:var(--purple)!important;font-weight:700}
.tc-y {color:var(--yellow)!important;font-weight:700}
.tc-o {color:var(--orange)!important;font-weight:700}
.tc-r {color:var(--red)!important;font-weight:700}
.null {color:var(--dim)!important;font-style:italic}

/* ── Insight / Anti / Column boxes ── */
.insight-box{background:#0a1520;border:1px solid #1a3a55;border-radius:8px;padding:14px 16px;margin-top:14px}
.insight-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.insight-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.insight-body{font-size:12.5px;color:var(--text);line-height:1.6}
.insight-body strong{color:var(--accent)}
.insight-body em{color:var(--yellow)}
.insight-body code{font-size:11px}

.anti-box{background:#160a0a;border:1px solid #3a1515;border-radius:8px;padding:14px 16px;margin-top:10px}
.anti-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:1px;margin-bottom:10px}
.anti-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.anti-body{font-size:12.5px;color:var(--text);line-height:1.6}
.anti-body strong{color:var(--red)}
.anti-body code{font-size:11px}

.column-box{background:#0d1520;border:1px solid #1c3550;border-left:3px solid var(--fn);border-radius:8px;padding:14px 16px;margin-top:10px}
.column-title{font-size:11px;font-weight:700;color:var(--fn);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.column-body{font-size:12.5px;color:var(--text);line-height:1.6}
.column-body strong{color:var(--fn)}

/* ── Nav ── */
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:#0e1e33}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}

/* ── Responsive ── */
@media(max-width:520px){
  .header-inner{padding:12px 10px 6px}
  .q-title{font-size:15px}
  pre{font-size:11px;padding:10px}
  table.vtbl{font-size:10.5px}
  .acc-title{font-size:12px}
  .header-badge{font-size:14px;padding:5px 8px}
  main{padding:16px 10px 60px}
  .data-tables{flex-direction:column}
}

/* ── SQL Step Visualizer ── */
.sql-viz-wrapper {
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  --font-sans: system-ui, -apple-system, sans-serif;
  --color-bg-base:    #0d1117;
  --color-bg-panel:   #161b22;
  --color-border-main:#30363d;
  --color-border-sub: #21262d;
  --color-txt-main:   #e6edf3;
  --color-txt-sub:    #8b949e;
  --color-txt-muted:  #6e7681;
  --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
  --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
  --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
  --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;
  --sql-grp1-bg: rgba(88, 166, 255, 0.03);
  --sql-grp2-bg: rgba(88, 166, 255, 0.08);
  --sql-grp3-bg: rgba(88, 166, 255, 0.14);
  --border-radius: 6px;
  background: var(--color-bg-base);
  color: var(--color-txt-main);
  font-family: var(--font-sans);
  min-height: auto;
  padding: 1.5rem;
}
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
}
.sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 11px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
.sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }
.sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
.sv-dot.done { background: var(--color-border-main); }
.sv-dot.active { background: var(--sql-blue-txt); width: 24px; }
.sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 10px; }
.sv-table th { padding: 6px 12px; font-size: 9px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
.sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }
.sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
.sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
.sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }
.sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
.sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
.sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
.sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }
.sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
.sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
.sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }
.sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
.sql-hl-from, .sql-hl-join, .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-select, .sql-hl-sub, .sql-hl-eval, .sql-hl-join-eval, .sql-hl-join-res, .sql-hl-from-users {
  border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt);
}
.sql-hl-from, .sql-hl-join, .sql-hl-from-users, .sql-hl-join-res { background: var(--sql-blue-bg); }
.sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub, .sql-hl-eval, .sql-hl-join-eval { background: var(--sql-orange-bg); }
.sql-hl-select { background: var(--sql-green-bg); }
.sv-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
.badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
.badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
.badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }
@keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.sv-animate { animation: sv-fade-in 0.3s ease forwards; }
.tbl-label { font-size: 9px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }
.sv-mobile-collapse summary::-webkit-details-marker { display: none; }
.sv-mobile-collapse summary { list-style: none; }
.sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
.sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }
@media (min-width: 641px) {
  .sv-mobile-collapse > summary { pointer-events: none; }
  .sql-viz-wrapper .sv-collapse-icon { display: none !important; }
}
@media (max-width: 640px) {
  .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">BASIC</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 基礎10選（インデックス基礎／SELECT*問題／JOIN選択／NULL基礎／LIKE検索／GROUP BY集計／サブクエリ→JOIN変換／ORDER BYとインデックス／EXISTSとIN／複合インデックス 編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎〜中級</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">実務頻出</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">002</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>

function initVisualizer(root, data) {
  if (!root || !data) return;
  var currentStepIndex = 0;

  function getLegendHTML(type) {
    var mkLegend = function(color, text) {
      return '<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-'+color+'-bg);border:1px solid var(--sql-'+color+'-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">'+text+'</span></div>';
    };
    var dimLegend = '<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>';
    var passFail = '<div style="display:flex;align-items:center;gap:10px;margin-top:4px;"><div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div><div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div></div>';
    if (type === "base") return mkLegend("blue", "データ取得・結合対象") + dimLegend;
    if (type === "eval") return mkLegend("orange", "評価対象の列・キー") + dimLegend + passFail;
    if (type === "group") return mkLegend("orange", "グループ化キー・集計対象") + '<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>';
    if (type === "select") return mkLegend("green", "出力対象の列") + dimLegend;
    return "";
  }

  function renderSQL(d, stepId) {
    return d.sql.map(function(t) {
      var isMatch = t.h && t.h.split(" ").indexOf(stepId) !== -1;
      var cls = (t.k || "") + (isMatch ? " sql-hl-" + stepId : "");
      return '<span class="' + cls.trim() + '">' + t.t + '</span>';
    }).join("");
  }

  function renderStepInfo(step) {
    return '<details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;">' +
      '<summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">' +
      '<span class="sv-badge ' + step.bc + '">' + step.badge + '</span>' +
      '<code style="font-size:10px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">' + step.label + '</code>' +
      '<span class="sv-collapse-icon" style="margin-left:auto;font-size:9px;color:var(--color-txt-muted);">▼</span>' +
      '</summary>' +
      '<div style="margin-top:12px;font-size:10px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">' + step.desc + '</div>' +
      '</details>';
  }

  function buildTable(label, cols, rows, headerClasses) {
    var thead = cols.map(function(col, i) { return '<th class="' + ((headerClasses && headerClasses[i]) || "") + '">' + col + '</th>'; }).join("");

<span class="kw">FROM</span>   <span class="tbl">users</span>  u

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>JOINの選択ルールは「一致しない行も結果に含みたいか」で決まります。「全員のリストに情報を付け足す」→ LEFT JOIN。「両方に存在するものだけでよい」→ INNER JOIN。このシンプルなルールを覚えてください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>テーブルの別名（エイリアス）：</strong><code>FROM users u</code> の <code>u</code> がテーブルの別名です。以降 <code>u.user_id</code> のように短く書けます。複数テーブルをJOINする場合は必ず別名を付けて <code>テーブル名.列名</code> で列を指定し、どのテーブルの列かを明確にしましょう。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>LEFT JOINの後のWHERE注意点：</strong><code>LEFT JOIN ... WHERE 右テーブルの列 IS NOT NULL</code> と書くと、実質的に INNER JOIN と同じ結果になります。LEFT JOINで「全件残したい」のに WHERE 条件で右テーブルの列を必須チェックしてしまう落とし穴に注意してください。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>LEFT JOINの右テーブルにWHERE条件を付けるとINNER JOINになる：</strong><code>LEFT JOIN orders o ON ... WHERE o.status = 'pending'</code> は、o.statusがNULLのユーザー（注文なし）がWHEREで除外されます。「注文のないユーザーも含めたいが、あれば pending のもの」という場合は <code>ON ... AND o.status = 'pending'</code> とON句に条件を移してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>JOIN条件の列にインデックスがない：</strong>JOINのON句で指定する列（結合キー）にインデックスがないと、大きなテーブルのJOINが非常に遅くなります。外部キー（FK）列には必ずインデックスを作成するのが基本ルールです。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：JOINの種類まとめ</div>
<div class="column-body">
実務で使うJOINは主に3種類です。<strong>INNER JOIN：</strong>両テーブルに存在する行だけ（デフォルトのJOIN）。<strong>LEFT JOIN：</strong>左テーブルの全行 + 右の一致行（一致なしはNULL）。<strong>FULL OUTER JOIN：</strong>両テーブルのいずれかに存在する行（一致なしはNULL）。CROSS JOINはデカルト積（件数が膨大になる）でほぼ使いません。基本の2種類（INNER / LEFT）をしっかり使い分けられれば実務の9割はカバーできます。
</div>
</div>
`

  premise: `<p>SQLの <strong>NULL</strong> は「値が存在しない・不明」を表します。通常の比較演算子（<code>=</code>、<code>!=</code>）はNULLに使えず、常に <em>UNKNOWN</em>（真でも偽でもない）を返します。この性質を知らないと「なぜか全件0件になる」バグが発生します。</p>
<pre><span class="cmt">-- NULLとの比較は必ず UNKNOWN になる</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> phone <span class="op">=</span>  <span class="kw">NULL</span>;  <span class="cmt">-- ❌ 常に0件（= は NULL に使えない）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> phone <span class="op">!=</span> <span class="kw">NULL</span>;  <span class="cmt">-- ❌ これも常に0件</span>

<span class="cmt">-- NULLの判定には IS NULL / IS NOT NULL を使う</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> phone <span class="kw">IS NULL</span>;      <span class="cmt">-- ✅ phoneが未登録のユーザー</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">users</span> <span class="kw">WHERE</span> phone <span class="kw">IS NOT NULL</span>; <span class="cmt">-- ✅ phoneが登録済みのユーザー</span></pre>
<div class="callout warn"><strong>NULLの演算：</strong>NULLを含む四則演算の結果は全てNULLになります。<code>5000 + NULL = NULL</code>、<code>NULL * 0 = NULL</code>。NULLを含む列を集計・演算する場合は事前に <code>COALESCE</code> でデフォルト値に変換してください。</div>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>NULLは「値が存在しない」特別な状態です。<code>NULL = NULL</code> は TRUE ではなく UNKNOWN です。NULLの判定は必ず <code>IS NULL</code> / <code>IS NOT NULL</code> を使います。これはSQLで最も多い初歩的なバグの一つです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COALESCEの書き方：</strong><code>COALESCE(expr1, expr2, expr3)</code> は左から評価して最初にNULLでない値を返します。<code>COALESCE(a, b, 0)</code> と書けば「aがNULLならb、bもNULLなら0」という連鎖が使えます。SUM/AVGはNULLを無視するため、「NULLを0として集計したい」場合は <code>SUM(COALESCE(col, 0))</code> と書きます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>NULLとインデックス：</strong>PostgreSQLのBTreeインデックスはNULL値も格納します。<code>WHERE phone IS NULL</code> の条件もインデックスを使えます。ただし、NULL値が多い列への <code>WHERE col IS NOT NULL</code> には部分インデックス（<code>WHERE col IS NOT NULL</code> 付き）を検討してください。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BY + AVG でNULLを意図せず除外する：</strong>AVGはNULLをスキップして計算します。「NULLを0として平均したい」のに <code>AVG(bonus)</code> と書くと、bonusがNULLの社員が除外された平均になります。意図を明確にするため <code>AVG(COALESCE(bonus, 0))</code> と書きましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>空文字列とNULLを混同する：</strong><code>''</code>（空文字）と <code>NULL</code> は別物です。<code>WHERE name = ''</code> は名前が空文字のユーザーを返し、NULLのユーザーは返しません。データ投入時に「値がない」を空文字で入れているかNULLで入れているか、設計を統一してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：NOT NULL 制約とデフォルト値の設計</div>
<div class="column-body">
NULLの問題を根本から減らすには、スキーマ設計時に <strong>NOT NULL 制約と DEFAULT 値を積極的に使う</strong>ことが有効です。<code>bonus NUMERIC NOT NULL DEFAULT 0</code> とすることで、bonusにNULLが混入しません。「NULLが意味を持つ列（例: 退会日時 deleted_at）」と「本来NULLを許容すべきでない列（例: 金額）」を設計段階で分けておくことが品質の高いDBの基本です。
</div>
</div>
`

/* ══════════════════════════════════════════════════
   Q6  GROUP BY と集計関数の基礎 — WHERE / HAVING の正しい使い分け
══════════════════════════════════════════════════ */
{
  num: 6,
  title: "GROUP BY と集計 — WHERE は集計前・HAVING は集計後のフィルタリング",
  tags: [["r","GROUP BY"],["r","WHERE"],["o","HAVING"],["g","集計関数"]],
  premise: `<p><strong>GROUP BY</strong> は「同じ値を持つ行をグループ化して集計する」命令です。<code>COUNT</code>・<code>SUM</code>・<code>AVG</code>・<code>MAX</code>・<code>MIN</code> が<em>集計関数</em>です。</p>
<p><strong>SQL の論理的な実行順序</strong>は次の通りで、WHERE は GROUP BY の<em>前</em>に評価されます。</p>
<pre><span class="cmt">-- SQL の論理実行順序</span>
<span class="cmt">-- 1. FROM  → 2. WHERE  → 3. GROUP BY  → 4. HAVING  → 5. SELECT  → 6. ORDER BY  → 7. LIMIT</span>

<span class="cmt">-- WHERE: 集計前の行単位フィルタ（集計関数は使えない）</span>

<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>GROUP BYはテーブルの行を「同じ値のグループ」にまとめます。SELECT に書けるのは「GROUP BYで指定した列」と「集計関数の結果」だけです。GROUP BYにない列をSELECTに書くとエラーになります（グループ内に複数の値があって一つに決められないため）。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>WHERE vs HAVING の判断基準：</strong>「この条件に集計関数（COUNT/SUM/AVG/MAX/MIN）が含まれるか？」で判断します。含まれる → HAVING。含まれない → WHERE。この基準を守るだけで意図通りの結果とパフォーマンスが得られます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>GROUP BY の列とSELECTの式を一致させる：</strong>DATE_TRUNC などの関数式をSELECTに書いた場合、GROUP BYにも同じ式を書きます。PostgreSQLではSELECTのエイリアス名（<code>AS month</code>）をGROUP BYに使える場合もありますが、移植性のために式をそのまま書くのが安全です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BYの列をSELECTに入れ忘れる：</strong><code>GROUP BY user_id, month</code> としているのに <code>SELECT SUM(amount)</code> だけ書くのは、どのユーザーのどの月の合計か分からなくなります。GROUP BYの列は全てSELECTにも含めましょう。</div></div>

<div class="column-body">

  premise: `<p><strong>相関サブクエリ（Correlated Subquery）</strong>とは、外側のクエリの各行を参照するサブクエリです。「外側の行数N回だけサブクエリが実行される」ため、N+1問題と同様のパフォーマンス問題が発生します。</p>
<pre><span class="cmt">-- 相関サブクエリの例（外側の行ごとにサブクエリが実行される）</span>
<span class="kw">SELECT</span>
    u.user_id,
    (
        <span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>)             <span class="cmt">-- ← このサブクエリが各ユーザー行ごとに1回実行される</span>
        <span class="kw">FROM</span>   <span class="tbl">orders</span> o
        <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- ← 外側の u.user_id を参照（これが「相関」）</span>
    ) <span class="kw">AS</span> order_count
<span class="kw">FROM</span> <span class="tbl">users</span> u;                        <span class="cmt">-- 1,000ユーザーいれば1,000回サブクエリが実行される</span></pre>
<div class="callout warn"><strong>相関サブクエリの問題：</strong>外側テーブルの行数Nに比例してサブクエリが実行されます。GROUP BY + JOIN に書き換えると1回の実行で済みます。</div>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>CTEは <code>WITH 名前 AS (クエリ)</code> と書いて名前付きの一時テーブルを定義します。複雑なクエリを段階的に書けるため可読性が上がります。CTEで先に集計してからJOINするパターンは実務でよく使われます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COUNT(*) vs COUNT(列名)：</strong>注文なしユーザーをLEFT JOINすると、ordersの列はNULLになります。<code>COUNT(*)</code> は行数をカウントするためNULL行も1としてカウントしますが、<code>COUNT(o.order_id)</code> はNULLを除外するため「注文なしユーザーは0件」と正しく計算できます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>相関サブクエリが有効な場面：</strong>相関サブクエリが常に悪いわけではありません。「外側の行数が少ない」「サブクエリでLIMIT 1を使う（Q1のLATERAL参照）」「EXISTS条件チェック」などでは相関サブクエリが簡潔に書けます。大量行の場合はJOIN変換を検討しましょう。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT句に複数の相関サブクエリを並べる：</strong>SELECTに3つの相関サブクエリを書くと、ユーザー数×3回のサブクエリが実行されます。同じテーブルに対する複数の相関サブクエリは1回のGROUP BY集計にまとめられないか検討してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTEを多用してパフォーマンスを下げる：</strong>PostgreSQL 12以前ではCTEはマテリアライズ（実体化）されてインデックスが効かない場合がありました。PostgreSQL 12以降はオプティマイザがインライン展開できるようになりましたが、重いCTEを何段も重ねる場合はEXPLAINで実行計画を確認してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：ORMが生成する相関サブクエリに注意</div>
<div class="column-body">
一部のORMは「集計値を付けて取得する」クエリを相関サブクエリで生成することがあります。<strong>ORMが生成したSQLをログで確認し、相関サブクエリが頻繁に実行されていないか監視すること</strong>が重要です。DjangoなどでのAnnotateやSQLAlchemyのhybrid_propertyは、内部で相関サブクエリになることがあります。スロークエリログで「同じパターンが大量に出ている」場合は相関サブクエリを疑いましょう。
</div>
</div>
`

  premise: `<p><strong>ORDER BY</strong> は結果を特定の列でソートする命令です。ソート対象の列にインデックスがある場合、DBはそのインデックスを利用して「既にソート済みのデータを順番に読む」ため、追加のソート処理が不要になります。</p>
<pre><span class="cmt">-- ソートにインデックスが使える条件</span>
<span class="cmt">-- ① WHERE条件でインデックスを使って絞り込んだ後、そのインデックスの順序でORDER BY</span>
<span class="kw">SELECT</span> order_id, amount
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> 'U001'        <span class="cmt">-- user_id にインデックスあり</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>;     <span class="cmt">-- (user_id, created_at) 複合インデックスがあればさらに高速</span>

<span class="cmt">-- ② ページネーションと組み合わせる場合（OFFSET は大きくなると遅い）</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">ORDER BY</span> order_id <span class="kw">LIMIT</span> <span class="num">10</span> <span class="kw">OFFSET</span> <span class="num">10000</span>;  <span class="cmt">-- OFFSET大 → 遅い</span></pre>
<div class="callout warn"><strong>大きなOFFSETの問題：</strong><code>LIMIT 10 OFFSET 10000</code> はDBが10010行読んでから先頭10000行を捨てます。ページ数が増えるほど遅くなります。「キーセットページネーション」（WHERE id > 最後のid の条件でページを進める）が高速な代替手段です。</div>`,

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>複合インデックスの列順：</strong>複合インデックス <code>(user_id, created_at DESC)</code> は「まず user_id で絞り込み、その中でcreated_at降順に並んでいる」状態です。WHEREの絞り込み列を先頭に、ORDER BYの列を後に配置するのが基本設計です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>キーセットページネーション：</strong><code>WHERE id > 前ページの最後のID</code> を使う方式はどのページでも常に「先頭からN件読む」だけで済みます。OFFSET方式はページ数に比例して読む行数が増えるため、大量データのページネーションには向きません。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>計算式でORDER BYする：</strong><code>ORDER BY price * quantity DESC</code> のように列に演算を適用したORDER BYはインデックスが使えず全行ソートになります。頻繁に使うなら生成列（Generated Column）を作ってインデックスを付けてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BYの列がWHERE条件と無関係な場合：</strong>WHERE user_id='U001' で絞ってから ORDER BY amount でソートする場合、(user_id, created_at) の複合インデックスはソートには使えません。「WHERE列」と「ORDER BY列」を合わせた複合インデックスを検討してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：管理画面の一覧ページとパフォーマンス</div>
<div class="column-body">
管理画面の一覧ページは「件数が増えるにつれて遅くなる」典型例です。<strong>ページ数が少ない段階はOFFSETで問題ありませんが、レコードが10万件を超えた辺りからキーセットページネーションへの移行を検討するタイミングです。</strong>また、管理画面では「全件エクスポート」ボタンがDBに大ダメージを与えることがあります。エクスポートは非同期バッチで処理してメールやダウンロードURLで提供する設計が実務では安全です。
</div>
</div>
`
},

  premise: `<p><strong>EXISTS</strong> は「サブクエリの結果が1件でも存在するか」を確認します。<strong>IN</strong> は「値がリストまたはサブクエリの結果に含まれるか」を確認します。どちらも「関連するデータが存在するか」チェックに使えますが、<em>動作・パフォーマンス・NULL安全性</em>に違いがあります。</p>
<pre><span class="cmt">-- IN: サブクエリの全結果を取得してからリストと照合</span>
<span class="kw">WHERE</span> user_id <span class="kw">IN</span> (<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> status<span class="op">=</span><span class="str">'done'</span>)

<span class="cmt">-- EXISTS: 1件でも見つかった時点で評価を終了（短絡評価）</span>
<span class="kw">WHERE</span> <span class="kw">EXISTS</span> (
    <span class="kw">SELECT</span> <span class="num">1</span>          <span class="cmt">-- SELECT 1 は「存在確認だけしたい」慣習的な書き方</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span> o
    <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- 外側テーブルを参照</span>
      <span class="kw">AND</span>  o.status  <span class="op">=</span> <span class="str">'done'</span>
)</pre>

  answer: `<pre><span class="cmt">-- シナリオ1: IN（DISTINCT付き）→ EXISTS に書き換え</span>

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 002 BASIC</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',
  (Array.isArray(q.viz)
    ? q.viz.map(function(_, vIdx) { return '<div class="sql-viz-wrapper" id="viz-'+i+'-'+vIdx+'" tabindex="-1" style="margin-bottom: 24px;"></div>'; }).join('')
    : q.viz ? '<div class="sql-viz-wrapper" id="viz-'+i+'" tabindex="-1"></div>' : ''
  ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach(function(q, i) {
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach(function(v, vIdx) { initVisualizer(document.getElementById('viz-'+i+'-'+vIdx), v); });
      } else {
        initVisualizer(document.getElementById('viz-'+i), q.viz);
      }
    }
  });
  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}


document.addEventListener('keydown', function(e) {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  var wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});
(function() {
  var wasMobile = window.innerWidth <= 640;
  document.querySelectorAll('.sv-mobile-collapse').forEach(function(el) { el.open = !wasMobile; });
  window.addEventListener('resize', function() {
    var isMobile = window.innerWidth <= 640;
    if (wasMobile !== isMobile) {
      wasMobile = isMobile;
      document.querySelectorAll('.sv-mobile-collapse').forEach(function(el) { el.open = !isMobile; });
    }
  });
})();

buildAll();
