<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLパフォーマンス最適化10選 — JOIN使い分け／サブクエリ最適化／ORDER BY INDEX／COUNT最適化／デッドロック／pg_trgm／タイムゾーン／UPDATE JOIN／DISTINCT vs GROUP BY／NULL部分INDEX（基礎編003）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0e13;
  --bg2:    #131920;
  --bg3:    #1c2330;
  --bg4:    #263040;
  --border: #2a3545;
  --text:   #cdd9e5;
  --dim:    #768390;
  --accent: #4dabf7;
  --green:  #3fb950;
  --orange: #f0883e;
  --red:    #f85149;
  --purple: #bc8cff;
  --yellow: #e3b341;
  --kw:     #ff7b72;
  --fn:     #79c0ff;
  --str:    #a5d6ff;
  --num:    #f0c674;
  --cmt:    #6a737d;
  --tbl:    #ffa657;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6}
.site-header{background:var(--bg2)}
.header-inner{padding:16px}
.header-flex{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.header-badge{background:var(--bg3);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1;white-space:nowrap}
.header-text-wrap{flex:1}
.header-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.header-tags{display:flex;gap:6px;flex-wrap:wrap}
.htag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--dim)}
.sticky-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.tab-row{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.tab-num{margin-right:5px}
.prog-wrap{height:2px;background:var(--bg4)}
.prog-fill{height:100%;background:var(--accent);transition:width .2s}
main{max-width:960px;margin:0 auto;padding:22px 14px 90px}
.panel{display:none}
.panel.active{display:block}
.q-header{margin-bottom:18px}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.q-title{font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.3}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;font-weight:600}
.tag-r{background:#1a2c44;color:var(--accent);border:1px solid #1e4070}
.tag-g{background:#162416;color:var(--green);border:1px solid #1e3a1e}
.tag-o{background:#2e1e0a;color:var(--orange);border:1px solid #4a2e0a}
.tag-p{background:#1e1433;color:var(--purple);border:1px solid #3a2060}
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px}
.acc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.acc-head:hover{background:var(--bg3)}
.acc-icon{font-size:14px;width:22px;text-align:center;flex-shrink:0}
.acc-title{font-size:13px;font-weight:600;flex:1}
.acc-pill{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:3px;flex-shrink:0}
.pill-blue  {background:#112233;color:var(--accent);border:1px solid #1a3a55}
.pill-green {background:#0e1f0e;color:var(--green);border:1px solid #1a3a1a}
.pill-orange{background:#1e1205;color:var(--orange);border:1px solid #3a2010}
.pill-red   {background:#1e0a0a;color:var(--red);border:1px solid #3a1010}
.pill-purple{background:#160f2a;color:var(--purple);border:1px solid #3a1a60}
.acc-chevron{color:var(--dim);font-size:11px;flex-shrink:0;transition:transform .2s}
.acc.closed .acc-chevron{transform:rotate(-90deg)}
.acc-body{padding:14px 16px;border-top:1px solid var(--border)}
.acc.closed .acc-body{display:none}
p{font-size:13.5px;margin-bottom:10px}
p:last-child{margin-bottom:0}
strong{color:var(--accent);font-weight:600}
em{color:var(--yellow);font-style:normal;font-weight:600}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:1px 5px;border-radius:3px;color:var(--tbl)}
pre{background:#060a0f;border:1px solid var(--border);border-radius:6px;padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;margin:8px 0}
.kw {color:var(--kw);font-weight:700}
.fn {color:var(--fn)}
.tbl{color:var(--tbl)}
.str{color:var(--str)}
.num{color:var(--num)}
.cmt{color:var(--cmt);font-style:italic}
.op {color:var(--orange)}
.callout{border-left:3px solid var(--accent);background:#0e1e33;padding:9px 13px;border-radius:0 5px 5px 0;margin:10px 0;font-size:13px}
.callout.warn  {border-left-color:var(--yellow);background:#1e1a08}
.callout.danger{border-left-color:var(--red);background:#1e0e0e}
.callout.ok    {border-left-color:var(--green);background:#0a1e0a}
.data-section{margin:14px 0}
.data-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--tbl);letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.data-label::before{content:'';display:block;width:3px;height:12px;background:var(--tbl);border-radius:2px}
.data-tables{display:flex;gap:14px;flex-wrap:wrap}
.data-tbl-wrap{flex:1;min-width:220px}
.data-tbl-name{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--orange);margin-bottom:4px}
.tbl-wrap{overflow-x:auto;margin-bottom:4px}
table.vtbl{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px;background:#060a0f;border:1px solid var(--border);border-radius:4px;min-width:100%}
table.vtbl th{background:var(--bg3);color:var(--tbl);padding:5px 11px;border:1px solid var(--border);text-align:left;white-space:nowrap;font-weight:600}
table.vtbl td{padding:4px 11px;border:1px solid #1c2635;white-space:nowrap}
table.vtbl tr:nth-child(even) td{background:#080c12}
.insight-box{background:#0a1520;border:1px solid #1a3a55;border-radius:8px;padding:14px 16px;margin-top:14px}
.insight-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.insight-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.insight-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.insight-body{font-size:12.5px;color:var(--text);line-height:1.6}
.insight-body strong{color:var(--accent)}
.insight-body em{color:var(--yellow)}
.insight-body code{font-size:11px}
.anti-box{background:#160a0a;border:1px solid #3a1515;border-radius:8px;padding:14px 16px;margin-top:10px}
.anti-title{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:1px;margin-bottom:10px}
.anti-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.anti-body{font-size:12.5px;color:var(--text);line-height:1.6}
.anti-body strong{color:var(--red)}
.anti-body code{font-size:11px}
.column-box{background:#0d1520;border:1px solid #1c3550;border-left:3px solid var(--fn);border-radius:8px;padding:14px 16px;margin-top:10px}
.column-title{font-size:11px;font-weight:700;color:var(--fn);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.column-body{font-size:12.5px;color:var(--text);line-height:1.6}
.column-body strong{color:var(--fn)}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px}
.nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;transition:border-color .15s,color .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:#0e1e33}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:center}
@media(max-width:520px){
  .header-inner{padding:12px 10px 6px}
  .q-title{font-size:15px}
  pre{font-size:11px;padding:10px}
  table.vtbl{font-size:10.5px}
  .acc-title{font-size:12px}
  .header-badge{font-size:14px;padding:5px 8px}
  main{padding:16px 10px 60px}
  .data-tables{flex-direction:column}
}
.sql-viz-wrapper {
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  --font-sans: system-ui, -apple-system, sans-serif;
  --color-bg-base:    #0d1117;
  --color-bg-panel:   #161b22;
  --color-border-main:#30363d;
  --color-border-sub: #21262d;
  --color-txt-main:   #e6edf3;
  --color-txt-sub:    #8b949e;
  --color-txt-muted:  #6e7681;
  --sql-blue-bg:    rgba(88,166,255,0.15); --sql-blue-txt:   #58a6ff; --sql-blue-bd:   #1f6feb;
  --sql-orange-bg:  rgba(227,137,59,0.15); --sql-orange-txt: #e3893b; --sql-orange-bd: #7d4e00;
  --sql-green-bg:   rgba(63,185,80,0.15);  --sql-green-txt:  #3fb950; --sql-green-bd:  #238636;
  --sql-red-bg:     rgba(248,81,73,0.12);  --sql-red-txt:    #f85149;
  --sql-grp1-bg: rgba(88,166,255,0.03);
  --sql-grp2-bg: rgba(88,166,255,0.08);
  --sql-grp3-bg: rgba(88,166,255,0.14);
  --border-radius: 6px;
  background: var(--color-bg-base);
  color: var(--color-txt-main);
  font-family: var(--font-sans);
  min-height: auto;
  padding: 1.5rem;
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
.sv-nav-btn{padding:6px 16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);font-size:11px;background:var(--color-bg-panel);color:var(--color-txt-main);cursor:pointer;transition:all 0.2s}
.sv-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.sv-nav-btn:not(:disabled):hover{border-color:var(--color-border-main);background:#1f2a38}
.sv-dot{height:6px;border:none;background:var(--color-border-sub);border-radius:3px;cursor:pointer;padding:0;transition:width 0.3s cubic-bezier(0.4,0,0.2,1),background 0.3s;flex-shrink:0;width:8px}
.sv-dot.done{background:var(--color-border-main)}
.sv-dot.active{background:var(--sql-blue-txt);width:24px}
.sv-dot:focus-visible,.sv-nav-btn:focus-visible{outline:2px solid var(--sql-blue-txt);outline-offset:2px}
.sv-table{border-collapse:collapse;width:100%;font-family:var(--font-mono);font-size:10px}
.sv-table th{padding:6px 12px;font-size:9px;font-weight:600;border:1px solid var(--color-border-sub);text-align:left;transition:all 0.3s ease;white-space:nowrap}
.sv-table td{padding:6px 12px;border:1px solid var(--color-border-sub);white-space:nowrap;background:var(--color-bg-base);color:var(--color-txt-main);transition:background 0.3s ease,opacity 0.3s ease}
.sv-table th.col-base  {background:var(--sql-blue-bg);  color:var(--sql-blue-txt)}
.sv-table th.col-eval  {background:var(--sql-orange-bg);color:var(--sql-orange-txt)}
.sv-table th.col-select{background:var(--sql-green-bg); color:var(--sql-green-txt)}
.sv-table tr.row-dimmed td{background:transparent;opacity:.28}
.sv-table tr.row-grp-1 td{background:var(--sql-grp1-bg)}
.sv-table tr.row-grp-2 td{background:var(--sql-grp2-bg)}
.sv-table tr.row-grp-3 td{background:var(--sql-grp3-bg)}
.sv-table td.val-pass  {background:var(--sql-green-bg)!important;border-left:2px solid var(--sql-green-txt);color:var(--sql-green-txt);font-weight:600}
.sv-table td.val-fail  {background:var(--sql-red-bg)!important;border-left:2px solid var(--sql-red-txt);color:var(--sql-red-txt);text-decoration:line-through;opacity:.7}
.sv-table td.val-dimmed{background:transparent!important;opacity:.2;color:var(--color-txt-muted)}
.sql-kw{color:var(--sql-blue-txt);font-weight:600}
.sql-hl-from,.sql-hl-join,.sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-select,.sql-hl-sub{border-radius:3px;padding:2px 4px;color:var(--sql-orange-txt)}
.sql-hl-from,.sql-hl-join{background:var(--sql-blue-bg)}
.sql-hl-where,.sql-hl-group,.sql-hl-having,.sql-hl-agg,.sql-hl-sub{background:var(--sql-orange-bg)}
.sql-hl-select{background:var(--sql-green-bg)}
.sv-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;letter-spacing:0.02em}
.badge-blue  {background:var(--sql-blue-bg);  color:var(--sql-blue-txt);  border:1px solid var(--sql-blue-bd)}
.badge-orange{background:var(--sql-orange-bg);color:var(--sql-orange-txt);border:1px solid var(--sql-orange-bd)}
.badge-green {background:var(--sql-green-bg); color:var(--sql-green-txt); border:1px solid var(--sql-green-bd)}
@keyframes sv-fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sv-animate{animation:sv-fade-in 0.3s ease forwards}
.tbl-label{font-size:9px;font-weight:500;color:var(--color-txt-sub);margin-bottom:6px}
.sv-mobile-collapse summary::-webkit-details-marker{display:none}
.sv-mobile-collapse summary{list-style:none}
.sv-collapse-icon{transition:transform 0.2s ease;display:inline-block}
.sv-mobile-collapse[open] .sv-collapse-icon{transform:rotate(180deg)}
@media(min-width:641px){.sv-mobile-collapse>summary{pointer-events:none}.sv-collapse-icon{display:none!important}}
@media(max-width:640px){.sv-sidebar{flex:1 1 100%!important;min-width:100%!important}}
</style>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">PERF</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 基礎10選（JOIN使い分け／FROM句サブクエリ／ORDER BY INDEX／COUNT最適化／デッドロック回避／pg_trgm全文検索／タイムゾーン対応／UPDATE JOIN／DISTINCT vs GROUP BY／NULLと部分INDEX 編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">チューニング</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">003</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
function initVisualizer(root, data) {
  let currentStepIndex = 0;

  function getLegendHTML(type) {
    const mk = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dim =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const pf =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;"><div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div><div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div></div>`;
    if (type === 'base')   return mk('blue',   'データ取得・結合対象') + dim;
    if (type === 'eval')   return mk('orange', '評価対象の列・キー') + dim + pf;
    if (type === 'group')  return mk('orange', 'グループ化キー・集計対象') +
      `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === 'select') return mk('green',  '出力対象の列') + dim;
    return '';
  }

  function renderSQL(step) {
    return data.sql.map(t => {
      const isMatch = t.h && t.h.split(' ').includes(step.id);
      const cls = `${t.k || ''} ${isMatch ? `sql-hl-${step.id}` : ''}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join('');
  }

  function renderStepInfo(step) {
    return `<details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;">
      <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
        <span class="sv-badge ${step.bc}">${step.badge}</span>
        <code style="font-size:10px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
        <span class="sv-collapse-icon" style="margin-left:auto;font-size:9px;color:var(--color-txt-muted);">▼</span>
      </summary>
      <div style="margin-top:12px;font-size:11px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
    </details>`;
  }

  function buildTable(label, cols, rows, ch) {
    const thead = cols.map((c, i) => `<th class="${ch && ch[i] || ''}">${c}</th>`).join('');
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc && r.cc[ci] || ''}">${val}</td>`).join('');
      return `<tr class="${r.c || ''}">${tds}</tr>`;
    }).join('');
    const lbl = label ? `<div class="tbl-label">▸ ${label}</div>` : '';
    return `<div style="flex:1;min-width:260px;">${lbl}<div style="overflow-x:auto;"><table class="sv-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
        ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
        <div style="display:flex;align-items:center;font-size:20px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
        ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
      </div>`;
    }
    return buildTable('', step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? 'active' : (i < currentStepIndex ? 'done' : '');
      return `<button class="sv-dot ${cls}" data-action="goto" data-idx="${i}" aria-label="ステップ${i+1}"></button>`;
    }).join('');
    return `<div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:10px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">

<div class="insight-box">

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>FROM句サブクエリは「内側を先に全件実行してから外側で使う」という評価順です。集計後の結果に対する絞り込みを外側のWHEREで書くより、GROUP BY + HAVING でまとめる方が意図が明確でDBも最適化しやすくなります。</div></div>

{
  num: 3,
  title: "ORDER BY とインデックス — ソート処理を消してレスポンスを高速化",
  tags: [["r","ORDER BY"],["r","INDEX"],["o","Sort回避"],["g","ASC/DESC"]],
  premise: `<p>ORDER BY はインデックスの並び順と一致するとき、<em>追加のソート処理（Sort ノード）を行わずにインデックス順で行を取得</em>できます。一方、インデックスと逆順・別列でORDER BYすると「Index Scan後にSort」という2ステップになりコストが増えます。</p>
<pre><span class="cmt">-- インデックスが (created_at ASC) の場合</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">ASC</span>;   <span class="cmt">-- ✅ ソート不要（インデックス順と一致）</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>;  <span class="cmt">-- ✅ インデックスを逆読みするだけ（Sort不要）</span>
<span class="kw">ORDER BY</span> amount <span class="kw">DESC</span>;      <span class="cmt">-- ❌ インデックスと別列 → Sort ノードが追加される</span></pre>
<div class="callout ok"><strong>複合インデックスとORDER BYの組み合わせ：</strong>ORDER BY で複数列を使う場合、インデックスの列順・昇降順が完全に一致するとソートを回避できます。<code>ORDER BY user_id ASC, created_at DESC</code> の場合は <code>CREATE INDEX ON t (user_id ASC, created_at DESC)</code> のインデックスが必要です。</div>`,
  question: `<p><code>orders</code> テーブルで、「ユーザーごとの注文を<em>新しい順</em>で取得する」クエリがあります。EXPLAINでSortノードが出ており遅い状況です。<em>ソートを回避するインデックスを設計</em>し、クエリの実行計画の変化を示してください。</p>
<pre><span class="cmt">-- 遅いクエリ（user_id は単一インデックスがあるが created_at がない）</span>
<span class="kw">SELECT</span> order_id, user_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>   <span class="cmt">-- created_at のインデックスがない → Sort が発生</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;</pre>
<div class="data-section">
  <div class="data-label">EXPLAIN ANALYZEの出力（改善前）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>ノード</th><th>コスト</th><th>問題</th></tr>
    <tr class="tr-hi"><td>Sort（created_at DESC）</td><td class="tc-r">cost=4520</td><td class="tc-r">❌ Sort ノードがボトルネック</td></tr>
    <tr><td>Index Scan on user_id</td><td class="tc-y">cost=320</td><td class="tc-g">—</td></tr>
  </table></div>
</div>`,
  output: `<p>インデックス作成後のEXPLAIN（Sortノードが消える）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>ノード</th><th class="tc-g">コスト（改善後）</th><th>変化</th></tr>
<tr class="tr-hi2"><td>Index Scan Backward（user_id, created_at）</td><td class="tc-g">cost=0.56..85</td><td class="tc-g">✅ Sort ノードが消えた</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① ソートを回避するための複合インデックスを作成する</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_created
    <span class="kw">ON</span> <span class="tbl">orders</span> (
        user_id,              <span class="cmt">-- 【超基礎】WHERE句で等値絞り込みに使う列を先頭に</span>
        created_at <span class="kw">DESC</span>       <span class="cmt">-- 【応用】ORDER BY の列と昇降順を一致させる → Sort回避</span>
    );

<span class="cmt">-- ② クエリは変更なし（インデックスを追加するだけで実行計画が変わる）</span>
<span class="kw">SELECT</span>
    order_id,                 <span class="cmt">-- 【超基礎】必要な列だけ指定</span>
    user_id,
    amount,
    created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id    <span class="op">=</span> <span class="str">'U001'</span>  <span class="cmt">-- 【超基礎】インデックス先頭列で絞り込み → Index Scan 発動</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>    <span class="cmt">-- ✅ インデックスの2列目と一致 → Sort ノードが不要になる</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;                   <span class="cmt">-- 【超基礎】先頭20件 → 早期打ち切りで高速終了</span>

<span class="cmt">-- ③ ORDER BY が複数列・複合昇降順の場合のインデックス設計例</span>
<span class="cmt">-- クエリ: ORDER BY user_id ASC, created_at DESC</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_asc_created_desc
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id <span class="kw">ASC</span>, created_at <span class="kw">DESC</span>);  <span class="cmt">-- 各列の昇降順をORDER BYに揃える</span>

<span class="cmt">-- ④ EXPLAIN で Sortノードの有無を確認する方法</span>
<span class="kw">EXPLAIN ANALYZE</span>
<span class="kw">SELECT</span> order_id, user_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">DESC</span>
<span class="kw">LIMIT</span>  <span class="num">20</span>;
<span class="cmt">-- 改善前: Sort -> Index Scan  (Sortノードあり)
-- 改善後: Index Scan Backward (Sortノードなし → インデックスを逆順に読むだけ)</span>

<span class="cmt">/*
  実行順序（インデックス作成後）:
  1. FROM orders                     → テーブル参照
  2. Index Scan（user_id='U001'）    → 先頭列で絞り込み
  3. created_at DESC 順で取得        → インデックス順と一致 → Sort 不要
  4. LIMIT 20                        → 20件取得した時点で早期終了
  5. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>ORDER BYはインデックスの並び順と一致するとき「Sort ノード（追加ソート処理）」が不要になります。EXPLAINの出力で <code>Sort</code> ノードが見えたら、そのORDER BYに対応したインデックスを作成できないか検討してください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DESCとインデックスの向き：</strong>PostgreSQLのBTreeインデックスは順方向・逆方向どちらにも走査できます。<code>created_at ASC</code> のインデックスがあれば <code>ORDER BY created_at DESC</code> も「Index Scan Backward」として追加コストなく使えます。ただし、複合インデックスで<em>列ごとに昇降順が混在する場合</em>（例：<code>ORDER BY a ASC, b DESC</code>）は、インデックス側でも昇降順を合わせる必要があります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>LIMIT との組み合わせが鍵：</strong>LIMIT を付けることでインデックス走査が必要な行数に達した時点で早期終了します。Sort後にLIMITする場合は「全件ソートしてから先頭N件を返す」ため、LIMITの恩恵を受けられません。インデックスによるSort回避 + LIMIT の組み合わせが最大効果を発揮します。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>

</div>

{

  tags: [["r","COUNT"],["r","EXISTS"],["o","NULL除外"],["g","件数確認"]],
  premise: `<p>SQLのCOUNTには3つの書き方があり、それぞれ動作とパフォーマンスが異なります。目的に合った書き方を選ぶことが「正確さ」と「速さ」の両立につながります。</p>
<pre><span class="cmt">-- COUNT(*): 全行をカウント（NULLも含む・最速）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- COUNT(col): 指定列がNULLでない行だけをカウント</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(user_id) <span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- COUNT(DISTINCT col): 重複を除いた種類数をカウント（重い）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> user_id) <span class="kw">FROM</span> <span class="tbl">orders</span>;</pre>
<div class="callout warn"><strong>「行が存在するか」の確認にCOUNTを使わない：</strong><code>SELECT COUNT(*) FROM orders WHERE user_id='U001'</code> で件数が0かどうか確認するのは非効率です。<code>EXISTS</code> は1件見つかった瞬間に処理を終了するため、存在確認には必ずEXISTSを使います。</div>`,
  question: `<p>以下の3つのシナリオで、<em>正しいCOUNT / EXISTS の書き方</em>をそれぞれ示してください。パフォーマンスの観点から理由も説明してください。</p>
<pre><span class="cmt">-- シナリオA: ordersテーブルの総件数を取得したい</span>
<span class="cmt">-- シナリオB: emailがNULLでないユーザーの件数を取得したい（usersテーブル）</span>
<span class="cmt">-- シナリオC: 特定ユーザー（user_id='U001'）の注文が「1件でもあるか」を確認したい</span></pre>
<div class="data-section">
  <div class="data-label">usersテーブルの状況</div>
  <div class="tbl-wrap"><table class="vtbl">

</div>`,

<tr class="tr-hi2"><td>A: 総件数</td><td>COUNT(*)</td><td class="tc-y">3（全行カウント）</td></tr>
<tr class="tr-hi2"><td>B: email非NULLの件数</td><td>COUNT(email)</td><td class="tc-y">2（NULLを除く）</td></tr>
<tr class="tr-hi2"><td>C: 存在確認</td><td>EXISTS</td><td class="tc-y">TRUE / FALSE</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- シナリオA: 総件数 → COUNT(*) が最速・最適</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">AS</span> total_orders     <span class="cmt">-- 【超基礎】全行をカウント（NULLも1件としてカウント）</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>;
<span class="cmt">-- COUNT(*) は列の値を参照しないため最も高速
-- PostgreSQLはシーケンシャルスキャンまたは最小インデックスでカウント</span>

<span class="cmt">-- シナリオB: NULL除外カウント → COUNT(列名) を使う</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(email) <span class="kw">AS</span> users_with_email  <span class="cmt">-- 【超基礎】email がNULLでない行だけをカウント</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>;
<span class="cmt">-- COUNT(email) は email = NULL の行をスキップする
-- NG: COUNT(*) を使うと「全ユーザー数」になり意図と異なる</span>

<span class="cmt">-- シナリオC: 存在確認 → EXISTS を使う（COUNT より圧倒的に高速）</span>
<span class="kw">SELECT</span>
    <span class="kw">CASE</span> <span class="kw">WHEN</span> <span class="kw">EXISTS</span> (            <span class="cmt">-- 【超基礎】サブクエリが1件でも返せばTRUE</span>
        <span class="kw">SELECT</span> <span class="num">1</span>                    <span class="cmt">-- 【超基礎】存在確認だけなのでSELECT 1が慣習（何を返すかは不問）</span>
        <span class="kw">FROM</span>   <span class="tbl">orders</span>

    ) <span class="kw">THEN</span> <span class="kw">TRUE</span>
      <span class="kw">ELSE</span> <span class="kw">FALSE</span>
    <span class="kw">END</span> <span class="kw">AS</span> has_orders;

<span class="cmt">-- アプリ側の IF 分岐に使う場合（より簡潔な書き方）</span>

        <span class="kw">FROM</span>   <span class="tbl">orders</span> o
        <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id  <span class="cmt">-- 外側のuser_idを参照（相関サブクエリ）</span>
    ) <span class="kw">AS</span> has_orders                   <span class="cmt">-- TRUE/FALSEのブール値を返す列</span>
<span class="kw">FROM</span>   <span class="tbl">users</span> u;

<span class="cmt">-- NG: COUNT(*) で存在確認（全件スキャンが必要で遅い）</span>
<span class="kw">SELECT</span> <span class="fn">COUNT</span>(<span class="op">*</span>) <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> user_id <span class="op">=</span> <span class="str">'U001'</span>;  <span class="cmt">-- ❌ 全件カウントしてから0かどうか判定</span>
<span class="cmt">-- EXISTS なら1件見つかった時点で終了。COUNT は全件走査が必要。</span>

<span class="cmt">/*

  3. Short-circuit               → 1件一致した時点で残りのordersを読むのをやめる
  4. SELECT has_orders           → TRUE/FALSE を返す
*/</span></pre>`,

{
  num: 5,
  title: "デッドロック回避 — ロック取得順序を統一して循環待ちを防ぐ",
  tags: [["r","デッドロック"],["r","ロック順序"],["o","FOR UPDATE"],["g","トランザクション"]],
  premise: `<p><strong>デッドロック</strong>とは、2つのトランザクションが互いに相手が持つロックの解放を待ち続け、永遠に進めなくなる状態です。PostgreSQLは検出後に一方をロールバックして解消しますが、頻繁に起きるとパフォーマンスが低下します。</p>
<pre><span class="cmt">-- デッドロックが起きる典型例</span>
<span class="cmt">-- トランザクションA: 口座1をロック → 次に口座2をロックしようとする</span>
<span class="kw">BEGIN</span>; <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">1</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- ロック: id=1</span>
       <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">2</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- 待機: id=2はBがロック中</span>

<span class="cmt">-- トランザクションB: 口座2をロック → 次に口座1をロックしようとする</span>
<span class="kw">BEGIN</span>; <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">2</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- ロック: id=2</span>
       <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">accounts</span> <span class="kw">WHERE</span> id<span class="op">=</span><span class="num">1</span> <span class="kw">FOR UPDATE</span>; <span class="cmt">-- 待機: id=1はAがロック中 → デッドロック</span></pre>
<div class="callout danger"><strong>デッドロックの結果：</strong>PostgreSQLはデッドロックを検出した時点でいずれかのトランザクションを強制ROLLBACKします。アプリはエラーを受け取り、再試行ロジックが必要です。</div>`,
  question: `<p><code>accounts</code> テーブルで「送金処理（送り元から引いて、受け取り先に足す）」を行うAPIがあります。同時に逆方向の送金が来るとデッドロックが起きています。<em>ロック取得順序を統一してデッドロックを防ぐSQL</em>を書いてください。</p>
<div class="data-section">
  <div class="data-label">accounts テーブル</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>account_id(PK)</th><th>owner_name</th><th>balance</th></tr>
    <tr><td>1</td><td>田中（送り元）</td><td>100000</td></tr>
    <tr><td>2</td><td>鈴木（受け取り先）</td><td>50000</td></tr>
  </table></div>
</div>
<pre><span class="cmt">-- 現在のデッドロックが起きるコード（概念）</span>
<span class="cmt">-- API Aが呼ばれたとき: 送り元=1 → 受け取り先=2 の順にロック</span>
<span class="cmt">-- API Bが同時に呼ばれたとき: 送り元=2 → 受け取り先=1 の順にロック</span>
<span class="cmt">-- → 互いに相手のロックを待つ → デッドロック発生</span></pre>`,
  output: `<p>送金後の口座残高（田中→鈴木へ10,000円送金）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>account_id</th><th>owner_name</th><th class="tc-g">balance（送金後）</th></tr>
<tr class="tr-hi2"><td>1</td><td>田中</td><td class="tc-g">90000</td></tr>
<tr class="tr-hi2"><td>2</td><td>鈴木</td><td class="tc-g">60000</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- デッドロック回避策: 常に「account_id の小さい方から順にロック」するルールを統一</span>

<span class="cmt">-- 送金処理（from_id=1, to_id=2, amount=10000 の例）</span>
<span class="kw">BEGIN</span>;                                       <span class="cmt">-- 【超基礎】トランザクション開始</span>

<span class="cmt">-- ① 小さいidから順にロックを取得（from_id と to_id のどちらが小さくても同じ順序）</span>
<span class="kw">SELECT</span> account_id, balance
<span class="kw">FROM</span>   <span class="tbl">accounts</span>
<span class="kw">WHERE</span>  account_id <span class="kw">IN</span> (<span class="num">1</span>, <span class="num">2</span>)              <span class="cmt">-- 【超基礎】両口座をIN句でまとめて指定</span>
<span class="kw">ORDER BY</span> account_id <span class="kw">ASC</span>                    <span class="cmt">-- ✅ 常にidの昇順で取得 → ロック順序を統一</span>
<span class="kw">FOR UPDATE</span>;                                 <span class="cmt">-- 【超基礎】取得した行に排他ロックをかける</span>
<span class="cmt">-- ASC指定により id=1 → id=2 の順でロックが取られる
-- 逆方向の送金（2→1）でも同じ順序になるのでデッドロックが起きない</span>

<span class="cmt">-- ② 残高チェック（送り元の残高が送金額以上か確認）</span>
<span class="cmt">-- ※ アプリ側でロック取得後に残高を確認し、不足なら ROLLBACK する</span>

<span class="cmt">-- ③ 送り元の残高を減らす</span>
<span class="kw">UPDATE</span> <span class="tbl">accounts</span>
<span class="kw">SET</span>    balance <span class="op">=</span> balance <span class="op">-</span> <span class="num">10000</span>          <span class="cmt">-- 【超基礎】現在のbalanceから送金額を減算</span>
<span class="kw">WHERE</span>  account_id <span class="op">=</span> <span class="num">1</span>;                   <span class="cmt">-- 送り元（田中）を更新</span>

<span class="cmt">-- ④ 受け取り先の残高を増やす</span>
<span class="kw">UPDATE</span> <span class="tbl">accounts</span>
<span class="kw">SET</span>    balance <span class="op">=</span> balance <span class="op">+</span> <span class="num">10000</span>          <span class="cmt">-- 【超基礎】現在のbalanceに送金額を加算</span>
<span class="kw">WHERE</span>  account_id <span class="op">=</span> <span class="num">2</span>;                   <span class="cmt">-- 受け取り先（鈴木）を更新</span>

<span class="kw">COMMIT</span>;                                    <span class="cmt">-- 【超基礎】トランザクション確定（ロック解放）</span>

<span class="cmt">-- デッドロック発生時の再試行パターン（アプリ側の疑似コード）
-- BEGIN ... FOR UPDATE ... UPDATE ... COMMIT
-- ↑ DEADLOCK エラー（PostgreSQL error 40P01）を受け取ったら
-- 少し待ってから同じトランザクションを再実行する</span>

<span class="cmt">/*
  実行順序:
  1. BEGIN                          → トランザクション開始
  2. SELECT ... FOR UPDATE ORDER BY → id昇順でロック取得（id=1→id=2の順序を保証）
  3. UPDATE accounts SET balance-=  → 送り元の残高を減らす
  4. UPDATE accounts SET balance+=  → 受け取り先の残高を増やす
  5. COMMIT                         → 全更新を確定しロック解放
*/</span></pre>`,
  explain: `
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>デッドロックは「2つのトランザクションが異なる順序で同じ行のロックを取ろうとするとき」に起きます。解決策はシンプルで「全てのトランザクションが同じ順序でロックを取得する」ことです。ORDER BY id ASC で取得順を固定するのが最も確実です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>アプリ側の再試行ロジック：</strong>デッドロックは「統計的に発生する可能性があるもの」として設計し、アプリ側でPostgreSQLの error code 40P01（deadlock_detected）を受け取ったら短いwait後に再試行するロジックを必ず実装してください。ロック順序統一と再試行の両方が揃って堅牢な設計になります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>lock_timeout の設定：</strong><code>SET lock_timeout = '5s'</code> でトランザクションごとにロック待ちのタイムアウトを設定できます。デッドロックではなく単純なロック待ちが長引く問題にはlock_timeoutが有効です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>トランザクション中に外部APIを呼ぶ：</strong>BEGIN〜COMMITの間に外部HTTP APIを呼ぶと、API応答待ちの間もDBのロックが保持されます。外部APIが遅れるとロック待ち時間が大幅に増加しデッドロックリスクも上がります。「DB処理 → COMMIT → 外部API呼び出し」の順序に変えてください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>不必要にFOR UPDATEを使う：</strong>FOR UPDATEを「念のため」付けると更新しない行にも排他ロックがかかり、他のトランザクションを不要に待たせます。実際に更新する行にのみFOR UPDATEを使い、参照のみなら通常のSELECTを使いましょう。</div></div>
</div>
<div class="column-box">

<div class="column-body">

</div>
</div>

/* ══════════════════════════════════════════════════
   Q6  pg_trgm全文検索 — LIKE '%xxx%' を高速化するGINインデックス
══════════════════════════════════════════════════ */
{
  num: 6,
  title: "pg_trgm + GINインデックス — LIKE '%keyword%' 部分一致を高速化する",
  tags: [["r","pg_trgm"],["r","GIN"],["o","LIKE部分一致"],["g","全文検索"]],
  premise: `<p>通常のBTreeインデックスは <code>LIKE '%keyword%'</code>（前後に%がある部分一致）に対応できずSeq Scanになります。PostgreSQLの <strong>pg_trgm 拡張</strong>を使うと、「3文字単位（トライグラム）に分解した転置インデックス（GIN）」を作成し、部分一致検索にもインデックスが効くようになります。</p>
<pre><span class="cmt">-- pg_trgm 拡張の有効化（初回のみ。スーパーユーザー権限が必要）</span>
<span class="kw">CREATE EXTENSION IF NOT EXISTS</span> pg_trgm;

<span class="cmt">-- トライグラムGINインデックスの作成</span>
<span class="kw">CREATE INDEX</span> idx_products_name_trgm
    <span class="kw">ON</span> <span class="tbl">products</span> <span class="kw">USING GIN</span> (name <span class="fn">gin_trgm_ops</span>);
<span class="cmt">-- gin_trgm_ops: LIKE/ILIKE/~ に対応したGIN演算子クラス</span></pre>
<div class="callout ok"><strong>トライグラムとは：</strong>文字列を3文字の重複ありスライスに分解したものです。例えば「postgres」は「pos」「ost」「stg」「tgr」…のように分解されます。この分解済みインデックスを使うことで、部分一致の高速検索が可能になります。</div>`,
  question: `<p><code>products</code> テーブル（50万件）で「商品名に特定のキーワードが含まれる商品を検索する」機能があります。現在のLIKE検索が遅い原因を特定し、<em>pg_trgm GINインデックスを使って高速化</em>してください。大文字小文字を無視した検索（ILIKE）にも対応してください。</p>
<pre><span class="cmt">-- 現在の遅い検索クエリ</span>
<span class="kw">SELECT</span> product_id, name, price
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  name <span class="kw">ILIKE</span> <span class="str">'%スマートフォン%'</span>   <span class="cmt">-- 前後に% → BTreeインデックス使えない → Seq Scan</span>
<span class="kw">ORDER BY</span> price <span class="kw">ASC</span>
<span class="kw">LIMIT</span>  <span class="num">50</span>;</pre>
<div class="data-section">
  <div class="data-label">productsテーブル（サンプル）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>product_id(PK)</th><th>name</th><th>price</th></tr>
    <tr><td>1</td><td>スマートフォン iPhone15</td><td>120000</td></tr>
    <tr><td>2</td><td>スマートフォンケース</td><td>2000</td></tr>
    <tr><td>3</td><td>ノートPC ThinkPad</td><td>150000</td></tr>
    <tr><td>4</td><td>Android スマートフォン</td><td>80000</td></tr>
  </table></div>
</div>`,
  output: `<p>「スマートフォン」を含む商品（価格昇順）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>product_id</th><th class="tc-g">name</th><th>price</th></tr>
<tr class="tr-hi2"><td>2</td><td class="tc-g">スマートフォンケース</td><td>2000</td></tr>
<tr class="tr-hi2"><td>4</td><td class="tc-g">Android スマートフォン</td><td>80000</td></tr>
<tr class="tr-hi2"><td>1</td><td class="tc-g">スマートフォン iPhone15</td><td>120000</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① pg_trgm 拡張を有効化（初回のみ実行）</span>
<span class="kw">CREATE EXTENSION IF NOT EXISTS</span> pg_trgm;   <span class="cmt">-- 【応用】pg_trgm: トライグラム検索拡張機能</span>

<span class="cmt">-- ② ILIKE（大文字小文字無視）対応のGINインデックスを作成</span>
<span class="kw">CREATE INDEX</span> idx_products_name_trgm
    <span class="kw">ON</span> <span class="tbl">products</span> <span class="kw">USING GIN</span>             <span class="cmt">-- 【応用】GIN: 転置インデックス（LIKE/ILIKEに対応）</span>
    (name <span class="fn">gin_trgm_ops</span>);               <span class="cmt">-- 【応用】gin_trgm_ops: LIKE/ILIKEの演算子クラス</span>

<span class="cmt">-- ③ インデックスを使った高速な部分一致検索（クエリは変更なし）</span>
<span class="kw">SELECT</span>
    product_id,                          <span class="cmt">-- 【超基礎】必要な列だけ指定</span>
    name,
    price
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  name <span class="kw">ILIKE</span> <span class="str">'%スマートフォン%'</span>      <span class="cmt">-- ✅ GINインデックスが有効（ILIKE + 前後%でもOK）</span>
<span class="kw">ORDER BY</span> price <span class="kw">ASC</span>                     <span class="cmt">-- 【超基礎】価格昇順で並び替え</span>
<span class="kw">LIMIT</span>  <span class="num">50</span>;                             <span class="cmt">-- 【超基礎】先頭50件だけ取得</span>

<span class="cmt">-- ④ 類似度検索（% 演算子）の応用: 「スペルが近い商品」を探す</span>
<span class="kw">SELECT</span> name, <span class="fn">similarity</span>(name, <span class="str">'スマートフォン'</span>) <span class="kw">AS</span> sim
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  name <span class="op">%</span> <span class="str">'スマートフォン'</span>               <span class="cmt">-- % 演算子: similarity > 0.3 の行を返す（GINが有効）</span>
<span class="kw">ORDER BY</span> sim <span class="kw">DESC</span>
<span class="kw">LIMIT</span>  <span class="num">10</span>;

<span class="cmt">-- ⑤ LIKEの前方一致はBTreeインデックスも使えることを確認</span>
<span class="kw">CREATE INDEX</span> idx_products_name_btree
    <span class="kw">ON</span> <span class="tbl">products</span> (name);              <span class="cmt">-- 通常BTreeインデックス</span>
<span class="cmt">-- WHERE name LIKE 'スマート%'（前方一致のみ）→ BTreeが有効
-- WHERE name LIKE '%スマート%'（部分一致）→ BTree無効、gin_trgmが必要</span>

<span class="cmt">/*
  実行順序（③のクエリ）:
  1. FROM products                 → テーブル参照
  2. GIN Index Scan（name, trgm）  → 'スマートフォン' のトライグラムでインデックス検索
  3. WHERE name ILIKE '%スマートフォン%' → GIN結果を精密フィルタ
  4. ORDER BY price ASC            → 結果をソート
  5. LIMIT 50                      → 先頭50件返す
*/</span></pre>`,

<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>WHEREでのタイムゾーン変換はSARGable問題に注意：</strong><code>WHERE (created_at AT TIME ZONE 'Asia/Tokyo')::DATE = '2024-01-15'</code> は列に変換を適用しているためインデックスが効きません。パフォーマンスが必要な場合は<em>アプリ側でUTCに変換してからSQLに渡す</em>方が確実です。</div></div>

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>UPDATEは通常「自テーブルの値を変更する」命令ですが、PostgreSQLの <code>UPDATE ... FROM</code> を使うと「別テーブルの値を参照してUPDATE」ができます。MySQL/MariaDBでは <code>UPDATE a JOIN b ON ... SET a.col = b.col</code> という構文になります。</div></div>

  premise: `<p><strong>DISTINCT</strong> は全列の組み合わせが重複する行を除去します。<strong>GROUP BY</strong> はグループ化して集計します。「集計なしに重複を除去したい」場合は両方使えますが、内部処理と用途が異なります。</p>
<pre><span class="cmt">-- DISTINCT: 全列が同じ行を1行にまとめる</span>
<span class="kw">SELECT DISTINCT</span> user_id, status <span class="kw">FROM</span> <span class="tbl">orders</span>;

<span class="cmt">-- GROUP BY: グループ化して集計（集計なしの場合はDISTINCTと同等）</span>
<span class="kw">SELECT</span> user_id, status <span class="kw">FROM</span> <span class="tbl">orders</span> <span class="kw">GROUP BY</span> user_id, status;</pre>

  question: `<p>以下の3つのシナリオで、<em>DISTINCT / GROUP BY / その他の書き方</em>のどれが最適か示してください。理由とパフォーマンスの観点も説明してください。</p>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>DISTINCTは「取得した結果から重複を除去する」後処理です。GROUP BYは「グループ化して集計する」処理で、集計なしでもDISTINCTと同等の動作をします。「どの列の重複を除去したいか」を明確にするためにGROUP BYの方が意図が伝わりやすいケースが多いです。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>DISTINCTが発生するのは「設計の問題」：</strong>JOINして行が増えたからDISTINCTで除去する、というパターンは「結合の設計に問題がある」シグナルです。「相手テーブルのデータ列は不要で存在確認のみ」ならEXISTS、「集計値が必要」ならGROUP BY + 集計関数、という根本解決を検討してください。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>DISTINCT ON（PostgreSQL独自機能）：</strong>PostgreSQLには <code>SELECT DISTINCT ON (user_id) user_id, created_at FROM orders ORDER BY user_id, created_at DESC</code> のように「特定列の重複を除去しつつ他列は保持する」DISTINCT ONがあります。各ユーザーの最新注文1件を取得するようなTop-Nパターンに使えます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT DISTINCT * を多用する：</strong>全列の組み合わせで重複除去するDISTINCT *は、列数が多いほど比較コストが増大します。特にTEXT・JSONB列がある場合は非常に重くなります。「なぜ重複するか」の原因分析をせずDISTINCTで解決しようとするのはアンチパターンです。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BY の後にDISTINCTを付ける：</strong><code>SELECT DISTINCT user_id FROM orders GROUP BY user_id</code> のように GROUP BY の後に DISTINCT を付けるのは冗長です。GROUP BY の時点で user_id はすでに一意になっているため、DISTINCT は何もしません（二重のSort/Hashコストが発生する可能性がある）。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：DISTINCT が出てきたらSQLレビューのサイン</div>
<div class="column-body">
コードレビューでSQLに DISTINCT が出てきたら、チームで「なぜ重複が発生するのか」を確認するのが良い習慣です。多くの場合、<strong>①JOINの設計に問題がある（EXISTSで書き直せる）、②重複が発生しているなら GROUP BY を使うべき、③ DISTINCT ON で列を絞れる</strong>という3つのどれかに該当します。「DISTINCTは動作するが根本解決ではない」という認識を持つことで、より効率的なクエリ設計への改善が進みます。
</div>
</div>
`

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>SQLのNULLは「値が不明」を表すため、通常の比較演算子（= !=）では扱えません。<code>NULL = NULL</code> は TRUE ではなく UNKNOWN になります。NULLの判定には必ず <code>IS NULL</code> / <code>IS NOT NULL</code> を使ってください。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>部分インデックスのNULL除外：</strong>「90%がNULL」のような疎な列にインデックスを張る場合、<code>WHERE col IS NOT NULL</code> の部分インデックスを使うことでインデックスサイズを1/10以下にできます。小さいインデックスはメモリのバッファキャッシュに乗りやすく、繰り返しアクセスでさらに高速になります。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>NOT NULL制約とインデックスの設計：</strong>設計段階でNOT NULL制約を付けられる列には付けてください。NOT NULL制約があればNULL除外の部分インデックスは不要になり（全行が対象）、クエリの絞り込みも単純になります。「NULLを0やデフォルト値で代替できないか」を設計段階で検討することが、後のチューニングコストを下げます。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>GROUP BYやJOIN条件にNULLが含まれる列を使う：</strong>GROUP BY user_id でuser_idにNULLがある場合、全てのNULL行は「NULLというグループ」として1つのグループにまとめられます。これが意図した動作か確認し、必要なら <code>WHERE user_id IS NOT NULL</code> で事前除外してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>NULLの意味をテーブルで統一しない：</strong>あるカラムで「NULL=未設定」「NULL=無効」「NULL=対象外」など複数の意味でNULLを使うと、クエリが複雑になりバグの温床になります。NULLの意味を1つに決めてコメントやドキュメントで明示し、意味が複数必要な場合は別の列（status ENUM など）を用意してください。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：任意項目の設計とNULL戦略</div>
<div class="column-body">
ユーザー登録フォームの「任意入力項目」（電話番号・生年月日など）はNULLを使うか、空文字やデフォルト値を使うか、設計段階で決める必要があります。<strong>「入力されていないこと自体が意味を持つ」フィールドにはNULL、「必ず何かの値が入る（未入力=0や空文字）」フィールドにはNOT NULL制約＋デフォルト値</strong>というルールが実務での使い分けの基本です。また、NULL可能列でよく絞り込む場合は、今回のような部分インデックス（WHERE col IS NOT NULL）を設計段階で検討に含めておくと、データ量が増えてからのチューニングコストを大幅に削減できます。
</div>
</div>

/* ══════════════════════════════════════════════════
   UI Builder
══════════════════════════════════════════════════ */
function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]||'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
      <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
    </button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length} — SERIES 003</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント・アンチパターン）',
        (Array.isArray(q.viz)
          ? q.viz.map((_, vIdx) => `<div class="sql-viz-wrapper" id="viz-${i}-${vIdx}" tabindex="-1" style="margin-bottom:24px;"></div>`).join('')
          : q.viz ? `<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>` : ''
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i===0?'disabled':''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => {
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById(`viz-${i}-${vIdx}`), v));
      } else {
        initVisualizer(document.getElementById('viz-' + i), q.viz);
      }
    }
  });

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  document.getElementById('progFill').style.width = ((i+1) / QS.length * 100) + '%';
  window.scrollTo({top:0, behavior:'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});

let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});
</script>
