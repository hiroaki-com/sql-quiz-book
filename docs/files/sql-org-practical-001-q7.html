<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL組織分析7選 — 企業データ × テーブル変化で理解する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-sub { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  /* ── テーブルデータセクション（問題欄用） ── */
  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  /* ── ビジュアライズ ── */
  .viz-flow { margin: 6px 0 14px; }
  .step-block { margin-bottom: 8px; }
  .step-label { display: flex; align-items: center; gap: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-bottom: 5px; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .sn1 { background: #1a2744; color: var(--accent); }
  .sn2 { background: #1a2e1a; color: var(--green); }
  .sn3 { background: #2e1a2e; color: var(--purple); }
  .sn4 { background: #2e1a0a; color: var(--orange); }
  .step-desc { color: var(--dim); }
  .step-desc strong { color: var(--text); }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }
  .tr-hi  td { background: #0e1e33 !important; }
  .tr-hi2 td { background: #0e1e0e !important; }
  .tr-hi3 td { background: #1e1433 !important; }
  .tr-hi4 td { background: #1e1a0a !important; }
  .tr-dim td { opacity: 0.4; }
  .tc-hi { color: var(--accent) !important; font-weight: 700; }
  .tc-g  { color: var(--green)  !important; font-weight: 700; }
  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }
  .null  { color: var(--dim)    !important; font-style: italic; }

  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  /* ── 実行順序ボックス ── */
  .exec-box { background: #060a0f; border: 1px solid var(--bg4); border-radius: 6px; padding: 12px 14px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
  .exec-title { color: var(--purple); font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; }
  .exec-row { display: flex; gap: 8px; margin-bottom: 5px; align-items: flex-start; }
  .exec-n { color: var(--dim); width: 14px; flex-shrink: 0; }
  .exec-step { color: var(--yellow); min-width: 160px; flex-shrink: 0; }
  .exec-desc { color: var(--dim); line-height: 1.5; }

  /* ── ポイント・アンチパターンボックス ── */
  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  /* ── ナビ ── */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">組織7</span></div>
      <div class="header-text-wrap">
        <div class="header-title">企業組織データで学ぶ SQL 応用7選（実務BI編）</div>
        <div class="header-sub">DENSE_RANK / SELF JOIN / RATIO / LEAD評価 / FIRST_VALUE / NOT EXISTS / 予算差異</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★★ 中〜上級</span>
      <span class="htag">組織分析</span>
      <span class="htag">HR Analytics</span>
      <span class="htag">PostgreSQL/BigQuery対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  DENSE_RANK — 部署内売上ランキング（同率対応）
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "DENSE_RANK — 部署内売上ランキングを同率考慮で算出",
  tags: [["r","DENSE_RANK"],["o","PARTITION BY"],["g","CTE"],["p","部署別ランキング"]],
  premise: `<p><strong>DENSE_RANK()</strong> は同値に同順位を振り、次の順位を飛ばさないウィンドウ関数です。部署別ランキング・社内表彰・昇格候補抽出など、組織分析で頻出します。</p>
<pre><span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> dept_id          <span class="cmt">-- 部署ごとに独立したウィンドウ</span>
  <span class="kw">ORDER BY</span>    total_sales <span class="kw">DESC</span> <span class="cmt">-- 売上降順でランク付け</span>
) <span class="kw">AS</span> dept_rank</pre>
<div class="callout"><strong>3兄弟の違い（同値が2人いるとき）：</strong><br>
ROW_NUMBER → 1, 2, 3, 4（同値でも必ず別番号）<br>
RANK       → 1, 1, 3, 4（同率あり・次を飛ばす）<br>
DENSE_RANK → 1, 1, 2, 3（同率あり・次を飛ばさない）</div>
<p>組織ランキングでは <em>「3位は何人いるか」を正確に表したい</em> ので DENSE_RANK が最適です。RANK だと「2位が2人いると4位が続く」という直感に反する表示になります。</p>`,
  question: `<p>employees テーブルと sales_results テーブルを結合し、<em>各部署内での四半期売上ランキング</em>を DENSE_RANK で算出してください。</p>
<p>各部署の上位3位以内の社員のみを出力し、同率の場合は全員含めます。</p>
<p>出力：dept_name, emp_name, total_sales, dept_rank</p>

<div class="data-section">
  <div class="data-label">使用テーブル（サンプルデータ）</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ employees</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>emp_id</th><th>emp_name</th><th>dept_id</th></tr>
        <tr><td>1</td><td>田中</td><td>10</td></tr>
        <tr><td>2</td><td>佐藤</td><td>10</td></tr>
        <tr><td>3</td><td>山田</td><td>10</td></tr>
        <tr><td>4</td><td>鈴木</td><td>20</td></tr>
        <tr><td>5</td><td>高橋</td><td>20</td></tr>
        <tr><td>6</td><td>木村</td><td>20</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ sales_results</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>emp_id</th><th>quarter</th><th>total_sales</th></tr>
        <tr><td>1</td><td>2024Q1</td><td>820,000</td></tr>
        <tr><td>2</td><td>2024Q1</td><td>750,000</td></tr>
        <tr><td>3</td><td>2024Q1</td><td>750,000</td></tr>
        <tr><td>4</td><td>2024Q1</td><td>990,000</td></tr>
        <tr><td>5</td><td>2024Q1</td><td>640,000</td></tr>
        <tr><td>6</td><td>2024Q1</td><td>880,000</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ departments</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>dept_id</th><th>dept_name</th></tr>
        <tr><td>10</td><td>営業一部</td></tr>
        <tr><td>20</td><td>営業二部</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>dept_name</th><th>emp_name</th><th>total_sales</th><th>dept_rank</th></tr>
<tr><td>営業一部</td><td>田中</td><td>820,000</td><td>1</td></tr>
<tr><td>営業一部</td><td>佐藤</td><td>750,000</td><td>2</td></tr>
<tr><td>営業一部</td><td>山田</td><td>750,000</td><td>2</td></tr>
<tr><td>営業二部</td><td>鈴木</td><td>990,000</td><td>1</td></tr>
<tr><td>営業二部</td><td>木村</td><td>880,000</td><td>2</td></tr>
<tr><td>営業二部</td><td>高橋</td><td>640,000</td><td>3</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 部署内売上ランキングを算出する</span>
ranked <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    d.dept_name,
    e.emp_name,
    s.total_sales,
    <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> e.dept_id         <span class="cmt">-- 部署ごとに独立してランク付け</span>
      <span class="kw">ORDER BY</span>    s.total_sales <span class="kw">DESC</span> <span class="cmt">-- 売上が高いほど順位が低い数字（1位）</span>
    ) <span class="kw">AS</span> dept_rank
  <span class="kw">FROM</span>       <span class="tbl">sales_results</span> s
  <span class="kw">JOIN</span>       <span class="tbl">employees</span>     e  <span class="kw">ON</span> s.emp_id  <span class="op">=</span> e.emp_id   <span class="cmt">-- 社員情報を付加</span>
  <span class="kw">JOIN</span>       <span class="tbl">departments</span>   d  <span class="kw">ON</span> e.dept_id <span class="op">=</span> d.dept_id  <span class="cmt">-- 部署名を付加</span>
  <span class="kw">WHERE</span>      s.quarter <span class="op">=</span> <span class="str">'2024Q1'</span>                          <span class="cmt">-- 対象四半期を絞る</span>
)

<span class="cmt">-- ② 各部署の上位3位以内のみ取得（同率3位は全員含む）</span>
<span class="cmt">-- ※ ウィンドウ関数結果はWHEREで直接使えないため CTEで一段ラップ必須</span>
<span class="kw">SELECT</span>
  dept_name,
  emp_name,
  total_sales,
  dept_rank
<span class="kw">FROM</span>  ranked
<span class="kw">WHERE</span> dept_rank <span class="op">&lt;=</span> <span class="num">3</span>               <span class="cmt">-- 3位以内（同率3位は複数行出る）</span>
<span class="kw">ORDER BY</span> dept_name, dept_rank;    <span class="cmt">-- 部署名 → 順位の昇順で出力</span>

<span class="cmt">/*
  実行順序:
  1. FROM sales_results           → 売上テーブルを読み込む
  2. JOIN employees               → 社員情報（dept_id）を結合
  3. JOIN departments             → 部署名を結合
  4. WHERE quarter = '2024Q1'     → 四半期で絞り込む
  5. DENSE_RANK() OVER(PARTITION) → 部署ごとに売上ランクを付与
  6. ranked CTE 完成
  7. WHERE dept_rank <= 3         → 上位3位以内に絞り込む
  8. ORDER BY dept_name, rank     → 部署・順位順で出力
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>JOIN後の中間テーブル</strong> — 全カラムが揃った状態</span></div>

      <span class="op">/</span> <span class="fn">NULLIF</span>(b.budget_amount, <span class="num">0</span>)    <span class="cmt">-- NULLIF: 予算0円でのゼロ除算防止</span>
    , <span class="num">1</span>) <span class="kw">AS</span> usage_pct
  <span class="kw">FROM</span>      <span class="tbl">budgets</span>  b

  <span class="kw">PARTITION BY</span> emp_id

<span class="fn">LAST_VALUE</span>(job_title) <span class="kw">OVER</span> (
  <span class="kw">PARTITION BY</span> emp_id
  <span class="kw">ORDER BY</span>    changed_at
  <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</span>

  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 社員ごとに入社時と最新の役職・日付を付与する</span>
career <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    emp_id,
    emp_name,
    job_title,
    changed_at,

    <span class="cmt">-- ウィンドウ内の最初の値（入社時役職）</span>
    <span class="fn">FIRST_VALUE</span>(job_title)  <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> emp_id
      <span class="kw">ORDER BY</span>    changed_at
    ) <span class="kw">AS</span> first_title,

    <span class="cmt">-- ウィンドウ内の最初の日付（入社日）</span>
    <span class="fn">FIRST_VALUE</span>(changed_at) <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> emp_id
      <span class="kw">ORDER BY</span>    changed_at
    ) <span class="kw">AS</span> first_date,

    <span class="cmt">-- ウィンドウ全体の最後の値（最新役職）※フレーム指定が必須！</span>
    <span class="fn">LAST_VALUE</span>(job_title)  <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> emp_id
      <span class="kw">ORDER BY</span>    changed_at
      <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING</span>  <span class="cmt">-- 先頭から</span>
               <span class="kw">AND UNBOUNDED FOLLOWING</span>   <span class="cmt">-- 末尾まで（フレーム全体）</span>
    ) <span class="kw">AS</span> current_title,

    <span class="cmt">-- 最新の変更日</span>
    <span class="fn">LAST_VALUE</span>(changed_at) <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> emp_id
      <span class="kw">ORDER BY</span>    changed_at
      <span class="kw">ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING</span>
    ) <span class="kw">AS</span> current_date,

    <span class="cmt">-- 重複除去用: 社員ごとの行番号</span>
    <span class="fn">ROW_NUMBER</span>() <span class="kw">OVER</span> (
      <span class="kw">PARTITION BY</span> emp_id <span class="kw">ORDER BY</span> changed_at
    ) <span class="kw">AS</span> rn
  <span class="kw">FROM</span> <span class="tbl">job_history</span>
)

<span class="cmt">-- ② 1社員1行に絞り、昇進フラグと日数を付与する</span>
<span class="kw">SELECT</span>
  emp_name,

    <span class="kw">THEN</span> (current_date <span class="op">-</span> first_date)  <span class="cmt">-- 日付の差分 = 日数（整数）</span>
    <span class="kw">ELSE</span> <span class="kw">NULL</span>
  <span class="kw">END</span> <span class="kw">AS</span> days_to_promote,
  (first_title <span class="op">&lt;&gt;</span> current_title) <span class="kw">AS</span> is_promoted  <span class="cmt">-- 比較結果がBoolean（true/false）</span>
<span class="kw">FROM</span>  career
<span class="kw">WHERE</span> rn <span class="op">=</span> <span class="num">1</span>              <span class="cmt">-- 各社員の最初の行だけ残す（全列に入社時〜最新が付いているため）</span>
<span class="kw">ORDER BY</span> emp_name;

*/</span></pre>`,

{

  title: "NOT EXISTS — 一度も参加していないプロジェクトがある社員を抽出",
  tags: [["r","NOT EXISTS"],["o","全否定"],["g","サブクエリ"],["p","リソース配置分析"]],
  premise: `<p><strong>NOT EXISTS</strong> は「サブクエリが1行も返さないとき TRUE」を意味します。「一度も参加していない〇〇がある社員」という否定的な条件の検索に最適です。</p>
<pre><span class="kw">WHERE NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span>
  <span class="kw">FROM</span> <span class="tbl">project_members</span> pm
  <span class="kw">WHERE</span> pm.emp_id    <span class="op">=</span> e.emp_id      <span class="cmt">-- 外部クエリの社員と紐付け</span>
    <span class="kw">AND</span> pm.project_id <span class="op">=</span> p.project_id  <span class="cmt">-- 外部クエリのプロジェクトと紐付け</span>
)
<span class="cmt">-- 「その社員がそのプロジェクトに参加した記録がない」ときTRUE</span></pre>
<div class="callout"><strong>「全プロジェクトに参加したことがない社員」と「あるプロジェクトに参加したことがない社員」は別物：</strong><br>
前者は CROSS JOIN + NOT EXISTS の組み合わせ、後者は特定 project_id を指定した NOT EXISTS で実現します。</div>`,
  question: `<p>employees / projects / project_members テーブルを使い、<em>少なくとも1つ以上のプロジェクトに一度も参加したことがない社員</em>（未配置プロジェクトあり）を抽出してください。</p>
<p>出力：emp_name, dept_name, unassigned_project_names（カンマ区切り）, unassigned_count</p>

<div class="data-section">
  <div class="data-label">使用テーブル（サンプルデータ）</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ employees</div>

      </table></div>
    </div>

        <tr><td>P1</td><td>基幹システム刷新</td></tr>
        <tr><td>P2</td><td>モバイルアプリ開発</td></tr>

        <tr><td>1</td><td>P2</td></tr>
        <tr><td>2</td><td>P1</td></tr>

<tr><th>emp_name</th><th>dept_name</th><th>unassigned_project_names</th><th>unassigned_count</th></tr>
<tr><td>田中</td><td>開発部</td><td>データ基盤構築</td><td>1</td></tr>
<tr><td>佐藤</td><td>開発部</td><td>モバイルアプリ開発, データ基盤構築</td><td>2</td></tr>
<tr><td>山田</td><td>営業部</td><td>基幹システム刷新</td><td>1</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>

<span class="cmt">-- ① 全社員 × 全プロジェクトの組み合わせを生成する（CROSS JOIN）</span>
all_combinations <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    e.emp_id,
    e.emp_name,
    e.dept_name,
    p.project_id,
    p.project_name
  <span class="kw">FROM</span>             <span class="tbl">employees</span> e
  <span class="kw">CROSS JOIN</span>       <span class="tbl">projects</span>  p  <span class="cmt">-- CROSS JOIN: 全組み合わせを生成（3社員 × 3PJ = 9行）</span>
),

<span class="cmt">-- ② その組み合わせのうち「参加記録がない」ものだけ残す</span>
unassigned <span class="kw">AS</span> (
  <span class="kw">SELECT</span>
    ac.emp_id,
    ac.emp_name,
    ac.dept_name,
    ac.project_name
  <span class="kw">FROM</span> all_combinations ac
  <span class="kw">WHERE NOT EXISTS</span> (           <span class="cmt">-- 参加記録が1件もない = TRUE</span>
    <span class="kw">SELECT</span> <span class="num">1</span>
    <span class="kw">FROM</span>  <span class="tbl">project_members</span> pm
    <span class="kw">WHERE</span> pm.emp_id    <span class="op">=</span> ac.emp_id     <span class="cmt">-- この社員が</span>
      <span class="kw">AND</span> pm.project_id <span class="op">=</span> ac.project_id  <span class="cmt">-- このプロジェクトに参加した記録があるか</span>
  )
)

<span class="cmt">-- ③ 社員ごとに未参加プロジェクトをカンマ結合して集約する</span>
<span class="kw">SELECT</span>
  emp_name,
  dept_name,
  <span class="fn">STRING_AGG</span>(project_name, <span class="str">', '</span> <span class="kw">ORDER BY</span> project_name)  <span class="cmt">-- プロジェクト名をカンマ区切りで連結</span>
    <span class="kw">AS</span> unassigned_project_names,
  <span class="fn">COUNT</span>(*)            <span class="kw">AS</span> unassigned_count   <span class="cmt">-- 未参加プロジェクト数</span>
<span class="kw">FROM</span>  unassigned
<span class="kw">GROUP BY</span> emp_id, emp_name, dept_name   <span class="cmt">-- 社員ごとに集約</span>
<span class="kw">ORDER BY</span> emp_name;

<span class="cmt">/*
  実行順序:
  1. CROSS JOIN employees × projects → 全組み合わせ生成（3×3=9行）
  2. NOT EXISTS サブクエリ           → 各組み合わせで参加記録をチェック
  3. unassigned CTE 完成             → 未参加の（社員, PJ）ペアが残る
  4. GROUP BY emp_id                 → 社員ごとに集約
  5. STRING_AGG(...)                 → 未参加PJ名をカンマ区切りで連結
  6. COUNT(*)                        → 未参加PJ数をカウント
  7. ORDER BY emp_name               → 名前順に出力
*/</span></pre>`,
