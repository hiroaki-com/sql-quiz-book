<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL応用文法 Q6〜Q10 — API・バッチ処理で理解する実践パターン（応用編 vol.3）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--purple); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--purple); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--purple); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--purple); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .column-box {
    background: #0d1520; border: 1px solid #1c3550; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
    border-left: 3px solid var(--fn);
  }
  .column-title {
    font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: 0.5px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .column-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--fn); }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--purple); color: var(--purple); background: #160f2a; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }

  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;
    --sql-blue-bg:    rgba(88,166,255,0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
    --sql-orange-bg:  rgba(227,137,59,0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
    --sql-green-bg:   rgba(63,185,80,0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
    --sql-red-bg:     rgba(248,81,73,0.12);   --sql-red-txt:    #f85149;
    --sql-grp1-bg: rgba(88,166,255,0.03);
    --sql-grp2-bg: rgba(88,166,255,0.08);
    --sql-grp3-bg: rgba(88,166,255,0.14);
    --border-radius: 6px;
    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1.5rem;
  }
  .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 11px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
  .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }
  .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
  .sv-dot.done { background: var(--color-border-main); }
  .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }
  .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 10px; }
  .sv-table th { padding: 6px 12px; font-size: 9px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; white-space: nowrap; }
  .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }
  .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
  .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
  .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }
  .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
  .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
  .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
  .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }
  .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
  .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
  .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }
  .sql-kw  { color: var(--sql-blue-txt); font-weight: 600; }
  
  .sql-hl-from, .sql-hl-join, .sql-hl-target, .sql-hl-lateral, .sql-hl-compare, .sql-hl-seq_scan, .sql-hl-base_data, .sql-hl-start, .sql-hl-func_scan_base { background: var(--sql-blue-bg); }
  .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub, .sql-hl-update, .sql-hl-classify, .sql-hl-execute, .sql-hl-where_eval, .sql-hl-create_idx, .sql-hl-create_multi, .sql-hl-insert, .sql-hl-delete, .sql-hl-func_eval, .sql-hl-create_func { background: var(--sql-orange-bg); }
  .sql-hl-select, .sql-hl-result, .sql-hl-idx_scan, .sql-hl-idx_scan_multi, .sql-hl-commit, .sql-hl-func_scan { background: var(--sql-green-bg); }
  
  .sql-hl-from, .sql-hl-join, .sql-hl-target, .sql-hl-lateral, .sql-hl-compare, .sql-hl-seq_scan, .sql-hl-base_data, .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub, .sql-hl-update, .sql-hl-classify, .sql-hl-execute, .sql-hl-where_eval, .sql-hl-create_idx, .sql-hl-create_multi, .sql-hl-select, .sql-hl-result, .sql-hl-idx_scan, .sql-hl-idx_scan_multi, .sql-hl-start, .sql-hl-insert, .sql-hl-delete, .sql-hl-func_eval, .sql-hl-create_func, .sql-hl-commit, .sql-hl-func_scan, .sql-hl-func_scan_base { border-radius: 3px; padding: 2px 4px; }
  
  .sql-hl-from, .sql-hl-join, .sql-hl-target, .sql-hl-lateral, .sql-hl-compare, .sql-hl-seq_scan, .sql-hl-base_data, .sql-hl-start, .sql-hl-func_scan_base { color: var(--sql-blue-txt); }
  .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub, .sql-hl-update, .sql-hl-classify, .sql-hl-execute, .sql-hl-where_eval, .sql-hl-create_idx, .sql-hl-create_multi, .sql-hl-insert, .sql-hl-delete, .sql-hl-func_eval, .sql-hl-create_func { color: var(--sql-orange-txt); }
  .sql-hl-select, .sql-hl-result, .sql-hl-idx_scan, .sql-hl-idx_scan_multi, .sql-hl-commit, .sql-hl-func_scan { color: var(--sql-green-txt); }

  .sv-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
  .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
  .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
  .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }
  @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .sv-animate { animation: sv-fade-in 0.3s ease forwards; }
  .tbl-label { font-size: 9px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }
  .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
  .sv-mobile-collapse summary { list-style: none; }
  .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
  .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }
  @media (min-width: 641px) { .sv-mobile-collapse > summary { pointer-events: none; } .sv-collapse-icon { display: none !important; } }
  @media (max-width: 640px) { .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; } }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">PRAC</span></div>
      <div class="header-text-wrap">
        <div class="header-title">WebApp API・バッチ処理で学ぶ SQL 応用文法 Q6〜Q10 vol.3（LATERAL/JSONB/差分更新バッチ/EXPLAIN/ROLLUP編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★ 中級〜上級</span>
      <span class="htag">API前提</span>
      <span class="htag">バッチ処理</span>
      <span class="htag">PostgreSQL対応</span>
      <span class="htag">vol.3 応用編</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
function initVisualizer(root, data) {
  let currentStepIndex = 0;

  root.innerHTML = `
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
      <div class="sv-sidebar" style="flex:0 0 280px;min-width:240px;">
        <div style="font-size:12px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
        <div class="sv-sqlbox" style="font-family:var(--font-mono);font-size:10px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>
        <details class="sv-legend-container sv-mobile-collapse" style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:12px 14px;background:var(--color-bg-panel);">
          <summary style="font-size:11px;font-weight:600;color:var(--color-txt-muted);letter-spacing:0.06em;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;margin:0;">
            <span>LEGEND (現在のステップ)</span>
            <span class="sv-collapse-icon" style="font-size:10px;">▼</span>
          </summary>
          <div class="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:10px;margin-top:12px;border-top:1px dashed var(--color-border-sub);padding-top:12px;"></div>
        </details>
      </div>
      <div style="flex:1;min-width:300px;">
        <div class="sv-stepinfo" style="margin-bottom:16px;"></div>
        <div class="sv-ctrls" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;"></div>
        <div class="sv-tarea sv-animate"></div>
        <div class="sv-rowcount" style="font-size:10px;font-family:var(--font-mono);color:var(--color-txt-sub);margin-top:8px;text-align:right;"></div>
      </div>
    </div>
  `;

  function getLegendHTML(type) {
    const mk = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dim =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const pf =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">

  function renderSQL(data, stepId) {
    return data.sql.map(t => {
      const isMatch = t.h && t.h.split(' ').includes(stepId);
      const cls = ((t.k || '') + (isMatch ? ' sql-hl-' + stepId : '')).trim();
      return `<span${cls ? ' class="' + cls + '"' : ''}>${t.t}</span>`;
    }).join('');
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>
          <code style="font-size:11px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
          <span class="sv-collapse-icon" style="margin-left:auto;font-size:9px;color:var(--color-txt-muted);">▼</span>
        </summary>
        <div style="margin-top:12px;font-size:11px;line-height:1.6;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
      </details>`;
  }

  function buildTable(label, cols, rows, ch) {
    const thead = cols.map((c, i) => `<th class="${ch?.[i] || ''}">${c}</th>`).join('');
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ''}">${val}</td>`).join('');
      return `<tr class="${r.c || ''}">${tds}</tr>`;
    }).join('');
    const lbl = label ? `<div class="tbl-label">▸ ${label}</div>` : '';
    return `<div style="flex:1;min-width:240px;">${lbl}<div style="overflow-x:auto;"><table class="sv-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
        ${buildTable(step.left.label,  step.left.cols,  step.left.rows,  step.left.ch)}
        <div style="display:flex;align-items:center;font-size:20px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
        ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
      </div>`;
    }
    return buildTable('', step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? 'active' : (i < currentStepIndex ? 'done' : '');
      return `<button class="sv-dot ${cls}" data-action="goto" data-idx="${i}" aria-label="ステップ${i+1}"></button>`;
    }).join('');
    return `<div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:10px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" data-action="prev" ${currentStepIndex === 0 ? 'disabled' : ''}>← Prev</button>
        <button class="sv-nav-btn" data-action="next" ${currentStepIndex === total - 1 ? 'disabled' : ''}>Next →</button>
      </div>`;
  }

  function renderAll() {
    const step = data.steps[currentStepIndex];
    root.querySelector('.sv-sqlbox').innerHTML    = renderSQL(data, step.id);
    root.querySelector('.sv-legend').innerHTML    = getLegendHTML(step.type);
    root.querySelector('.sv-stepinfo').innerHTML  = renderStepInfo(step);
    const tarea = root.querySelector('.sv-tarea');
    tarea.classList.remove('sv-animate');
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add('sv-animate');
    root.querySelector('.sv-rowcount').textContent = step.cnt || '';
    root.querySelector('.sv-ctrls').innerHTML = renderControls(data.steps.length);
    root.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = window.innerWidth > 640);
  }

  root.__viz = {
    next: () => { if (currentStepIndex < data.steps.length - 1) { currentStepIndex++; renderAll(); } },
    prev: () => { if (currentStepIndex > 0) { currentStepIndex--; renderAll(); } },
    goTo: i => { if (i >= 0 && i < data.steps.length) { currentStepIndex = i; renderAll(); } }
  };

  root.querySelector('.sv-ctrls').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    if (a === 'prev')      root.__viz.prev();
    else if (a === 'next') root.__viz.next();
    else if (a === 'goto') root.__viz.goTo(Number(btn.dataset.idx));
  });

  renderAll();
}

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：JSON vs JSONB の選び方：</strong>PostgreSQL には JSON 型と JSONB 型の2種類があります。JSON はテキストを保存しキーの順序・空白を保持しますが、インデックスが貼れません。JSONB はバイナリ変換して格納し、GINインデックスが使えて検索が高速です。<strong>実務では基本的に JSONB を選ぶ</strong>のが推奨です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>->> と -> のどちらを使うか：</strong><code>-&gt;&gt;</code> はテキスト型を返すので WHERE や GROUP BY での比較に便利。<code>-&gt;</code> は JSONB 型を返すのでネストされた JSON（<code>settings -&gt; 'address' -&gt;&gt; 'city'</code>）をたどるときに使います。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>jsonb_set vs || 演算子：</strong><code>settings || '{"language":"ja"}'::jsonb</code> でも部分更新できます。|| はキーを上書き（なければ追加）しますが、ネストされたキーの更新には jsonb_set が必要です。シンプルなトップレベルのキー変更なら || が簡潔です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>jsonb_each / jsonb_array_elements：</strong><code>SELECT * FROM user_settings, jsonb_each(settings)</code> で JSONB のキー・値ペアを行に展開できます。動的なキーのレポートや JSONB 内の配列を行に展開する <code>jsonb_array_elements</code> と組み合わせると、複雑な JSON 集計も SQL 内で完結できます。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>UPDATE で WHERE を忘れる：</strong><code>UPDATE user_settings SET settings = jsonb_set(settings, '{language}', '"ja"'::jsonb)</code> と WHERE なしで実行すると全ユーザーの language が書き換わります。UPDATE 文には必ず WHERE を書くこと。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>検索可能な属性を JSONB だけに頼る：</strong>頻繁に検索・集計するカラム（user_idや状態フラグ）を JSONB 内だけに格納すると、インデックス設計が複雑になりパフォーマンスが劣化します。よく使うカラムは通常の列として持ち、補助的な可変属性だけ JSONB に入れる設計が鉄則です。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：ユーザー設定APIとJSONBの使い所</div>
<div class="column-body">
ユーザー設定（テーマ・通知設定・UI言語など）は追加項目が多く、RDBの列追加コストが高い領域です。<strong>JSONB は「スキーマが変わりやすい補助属性」に向いており、追加項目ごとにALTER TABLEが不要</strong>というメリットがあります。ただし「ユーザーIDや登録日時」など必ず検索するカラムは通常の列に残し、JSONB は補完的なデータに使うというバランスが重要です。
</div>
</div>
`

  premise: `<p>外部システムとのデータ同期バッチでは、「全件DELETEしてINSERT」よりも<em>差分のみを更新</em>する方が安全・高速です。サブクエリ（<code>NOT EXISTS</code>等）を使って「追加すべき行・更新すべき行・削除すべき行」を分類し、1トランザクションで実行するパターンを学びます。</p>
<pre><span class="cmt">-- 新データにあって現データにない → INSERT対象</span>
<span class="kw">WHERE NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> <span class="tbl">現データ</span> c <span class="kw">WHERE</span> c.id <span class="op">=</span> n.id
)

<span class="cmt">-- 現データにあって新データにない → DELETE対象</span>
<span class="kw">WHERE NOT EXISTS</span> (
  <span class="kw">SELECT</span> <span class="num">1</span> <span class="kw">FROM</span> <span class="tbl">新データ</span> n <span class="kw">WHERE</span> n.id <span class="op">=</span> c.id
)</pre>
<div class="callout ok"><strong>NOT IN vs NOT EXISTS：</strong><code>NOT IN</code> はサブクエリの結果に NULL が1つでも含まれると全体が <code>FALSE</code>（または <code>UNKNOWN</code>）になり、意図しない結果を生む罠があります。実務では <code>NOT EXISTS</code> を使うのが安全です。</div>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：NOT IN vs NOT EXISTS の違い：</strong>NOT IN はサブクエリの結果に NULL が1つでも含まれると全行がマッチしなくなる（NULL の三値論理の罠）。サブクエリにNULLが入りうる場合は <code>NOT EXISTS (...)</code> か <code>LEFT JOIN ... WHERE ... IS NULL</code> パターンが安全です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>EXCEPT / INTERSECT での差分検出：</strong>EXCEPT を使うと「全列が一致する行の差集合」が取れます。主キーだけでなく全カラムの差分を見たい場合に便利です。大量データでは NOT EXISTS より EXCEPT のほうが可読性が高い場合があります。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>PostgreSQL の MERGE 文（v15+）：</strong>PostgreSQL 15 から MERGE が使えます。<code>MERGE INTO products_current USING products_new ON (条件) WHEN MATCHED AND 変化あり THEN UPDATE ... WHEN NOT MATCHED BY TARGET THEN INSERT ... WHEN NOT MATCHED BY SOURCE THEN DELETE</code> と1文で差分更新が書けます。バージョンを確認して積極的に使いましょう。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>updated_at タイムスタンプで変更追跡：</strong>UPDATE 後に <code>updated_at = NOW()</code> をセットすることで「いつ同期されたか」を追跡できます。障害発生時に「最後の同期時刻」を確認して、再実行すべき範囲を特定するのに役立ちます。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>全件 TRUNCATE + INSERT：</strong>同期バッチ実行中に他のAPI・クエリがテーブルを参照すると空テーブルを見てしまう。また全行書き換えはWALログ・インデックス再構築コストが差分更新より大幅に高い。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>トランザクションを張らずに分割実行：</strong>INSERT/DELETE/UPDATE を別々にコミットすると、途中でエラーが起きたとき「INSERTだけ完了してDELETEは未実行」という中途半端な状態になる。3操作を必ず同一トランザクションでまとめること。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：外部システム同期バッチのエラー設計</div>
<div class="column-body">
差分更新バッチは <strong>BEGIN → INSERT/DELETE/UPDATE → COMMIT</strong> の1トランザクションにすることで冪等性（何度実行しても同じ結果）が保てます。さらに「どの行をINSERT/DELETE/UPDATEしたか」をログテーブルに書き込んでおくと障害発生時の調査が容易になります。CTE を使って <code>WITH ins AS (...INSERT ... RETURNING *) INSERT INTO sync_log SELECT ...</code> とすることで、メイン処理とログ書き込みを同一トランザクション内で行う設計も実務でよく使われます。
</div>
</div>
`

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：インデックスとは何か：</strong>インデックスは「本の巻末索引」のようなものです。索引なし（Seq Scan）は本の全ページをめくって探す状態、索引あり（Index Scan）はページ番号が記載された索引を引く状態です。WHERE で頻繁に検索される列に作成します。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>CONCURRENTLY の重要性：</strong>本番DBで <code>CREATE INDEX</code>（CONCURRENTLY なし）はテーブル全体をロックして、インデックス作成が終わるまでINSERT/UPDATE/SELECTが待機状態になります。<code>CONCURRENTLY</code> を付けるとロックなしで作成でき、本番トラフィックへの影響を最小化できます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>インデックスの副作用：</strong>インデックスはSELECTを高速にしますが、INSERT/UPDATE/DELETE 時にインデックスも更新されるためその分だけ書き込みが遅くなります。また、ストレージ容量を消費します。使われていないインデックスは <code>pg_stat_user_indexes</code> で確認して削除しましょう。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>pg_stat_statements でスロークエリを特定：</strong><code>SELECT query, total_exec_time, calls FROM pg_stat_statements ORDER BY total_exec_time DESC LIMIT 10;</code> で累計実行時間の多いクエリ（= 改善効果が大きいクエリ）を特定できます。EXPLAIN は特定後に使うツールです。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WHERE で関数を使って既存インデックスを無効化：</strong><code>WHERE LOWER(name) = 'coffee'</code> は name 列のインデックスを使えません（BTreeインデックスはLOWER後の値を知らないため）。関数インデックスを作るか、最初からデータをlowercaseで保存するか、生成列（Generated Column）を使うこと。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>WHERE で型が合わずインデックスが効かない：</strong><code>WHERE user_id = 1</code>（整数）と書いたが user_id 列が VARCHAR 型の場合、型キャストが発生してインデックスが効かないことがあります。<code>WHERE user_id = '1'</code>（文字列）と合わせること。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：インデックス設計の現場判断</div>
<div class="column-body">
インデックスは「全てに貼れば速くなる」わけではありません。<strong>「検索が多く更新が少ない列」「カーディナリティ（値の種類）が高い列」が効果的</strong>です。例えばステータス列（active/inactive の2値）にインデックスを貼っても、全行の半数が取得対象になるためプランナが Seq Scan を選ぶことが多いです。本番で困ったときは <code>EXPLAIN ANALYZE</code> → ボトルネック特定 → 最小限のインデックス追加 → 再度 EXPLAIN で効果確認、というサイクルを繰り返すことが実務の基本です。
</div>
</div>
`

{

  title: "ROLLUP / CUBE — 多次元集計レポートを1クエリで生成する",
  tags: [["r","ROLLUP / CUBE"],["fn","GROUPING SETS"],["g","多次元集計"],["o","レポートバッチ"]],
  premise: `<p><strong>ROLLUP</strong> は階層的な小計・合計を自動で付加するGROUP BYの拡張です。<strong>CUBE</strong> は全組み合わせの集計を生成します。<strong>GROUPING SETS</strong> はそれらを柔軟に指定できる一般化版です。バッチ集計レポートで複数の GROUP BY クエリを1本化できます。</p>
<pre><span class="kw">GROUP BY</span> <span class="kw">ROLLUP</span>(col1, col2)
<span class="cmt">-- col1+col2の集計、col1だけの小計、全体合計の3段階を自動生成</span>

<span class="kw">GROUP BY</span> <span class="kw">CUBE</span>(col1, col2)
<span class="cmt">-- (col1,col2), (col1), (col2), () の全4パターンの集計を生成</span>

<span class="kw">GROUP BY</span> <span class="kw">GROUPING SETS</span>((col1, col2), (col1), ())
<span class="cmt">-- 任意の集計パターンを列挙する（ROLLUP/CUBEの一般化版）</span></pre>
<div class="callout"><strong>GROUPING() 関数：</strong><code>GROUPING(col1)</code> は小計・合計行で列が集計されていると 1 を返します。これを使って小計行の NULL を '合計' 等の文字列に置き換えることができます。</div>`,
  question: `<p><code>sales</code> テーブルから、<em>年・月・カテゴリ別の売上合計</em>を ROLLUP を使って取得してください。年合計・全体合計（小計行）も含め、GROUPING() 関数で NULL を分かりやすいラベルに置き換えること。さらに同じテーブルで CUBE を使った全組み合わせ集計も示してください。</p>
<div class="data-section">

      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>ROLLUP（年→月→カテゴリの階層集計）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th class="tc-hi">year_label</th><th class="tc-g">month_label</th><th class="tc-p">category_label</th><th class="tc-y">total_amount</th></tr>
<tr class="tr-hi"><td class="tc-hi">2023</td><td class="tc-g">12</td><td class="tc-p">drink</td><td class="tc-y">3000</td></tr>

<tr class="tr-hi2"><td class="tc-hi">2024</td><td class="tc-g">1月計</td><td class="tc-p">—</td><td class="tc-y">5000</td></tr>
<tr class="tr-hi2"><td class="tc-hi">2024</td><td class="tc-g">2</td><td class="tc-p">drink</td><td class="tc-y">1500</td></tr>
<tr class="tr-hi2"><td class="tc-hi">2024</td><td class="tc-g">2</td><td class="tc-p">food</td><td class="tc-y">4000</td></tr>
<tr class="tr-hi2"><td class="tc-hi">2024</td><td class="tc-g">2月計</td><td class="tc-p">—</td><td class="tc-y">5500</td></tr>

  answer: `<pre><span class="cmt">-- ① ROLLUP: 年→月→カテゴリの階層的な小計・合計を生成</span>
<span class="kw">SELECT</span>
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> <span class="fn">GROUPING</span>(year) <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> <span class="str">'総計'</span>          <span class="cmt">-- yearが集計対象なら総計</span>
    <span class="kw">WHEN</span> <span class="fn">GROUPING</span>(month) <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> year<span class="op">::</span><span class="kw">TEXT</span> <span class="op">||</span> <span class="str">'年計'</span>
    <span class="kw">ELSE</span> year<span class="op">::</span><span class="kw">TEXT</span>
  <span class="kw">END</span> <span class="kw">AS</span> year_label,

  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> <span class="fn">GROUPING</span>(month) <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> <span class="str">'—'</span>
    <span class="kw">WHEN</span> <span class="fn">GROUPING</span>(category) <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> month<span class="op">::</span><span class="kw">TEXT</span> <span class="op">||</span> <span class="str">'月計'</span>
    <span class="kw">ELSE</span> month<span class="op">::</span><span class="kw">TEXT</span>
  <span class="kw">END</span> <span class="kw">AS</span> month_label,

  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> <span class="fn">GROUPING</span>(category) <span class="op">=</span> <span class="num">1</span> <span class="kw">THEN</span> <span class="str">'—'</span>
    <span class="kw">ELSE</span> category
  <span class="kw">END</span> <span class="kw">AS</span> category_label,

  <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_amount
<span class="kw">FROM</span> <span class="tbl">sales</span>
<span class="kw">GROUP BY</span> <span class="kw">ROLLUP</span>(year, month, category)         <span class="cmt">-- 階層順（年 > 月 > カテゴリ）で集計</span>
<span class="kw">ORDER BY</span>
  <span class="fn">GROUPING</span>(year), year <span class="kw">NULLS LAST</span>,             <span class="cmt">-- 明細を先、合計行(NULL)を後に</span>
  <span class="fn">GROUPING</span>(month), month <span class="kw">NULLS LAST</span>,
  <span class="fn">GROUPING</span>(category), category <span class="kw">NULLS LAST</span>;

<span class="cmt">-- ② CUBE: 指定列の全組み合わせパターンの集計を生成</span>
<span class="kw">SELECT</span>
  year,
  category,
  <span class="fn">SUM</span>(amount) <span class="kw">AS</span> total_amount,
  <span class="fn">GROUPING</span>(year) <span class="kw">AS</span> g_year,          <span class="cmt">-- 1: yearが集計対象</span>
  <span class="fn">GROUPING</span>(category) <span class="kw">AS</span> g_category   <span class="cmt">-- 1: categoryが集計対象</span>
<span class="kw">FROM</span> <span class="tbl">sales</span>
<span class="kw">GROUP BY</span> <span class="kw">CUBE</span>(year, category)        <span class="cmt">-- 2^2 = 4パターンの集計</span>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：ROLLUP の NULL は「集計のNULL」：</strong>ROLLUP が生成する合計・小計行では、集計されたレベルの列が NULL になります。これはデータが空なのではなく「この列は集計対象（全てを合算）」を意味します。GROUPING() 関数でデータNULLと区別できます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ROLLUP は「階層の順序が重要」：</strong>ROLLUP(year, month, category) は「year &gt; month &gt; category」の順に階層集計します。ROLLUP(category, year) と書くと「category &gt; year」になり意味が変わります。必ず「大 → 小」の粒度順で書くこと。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>GROUPING SETS で完全な制御：</strong><code>GROUP BY GROUPING SETS ((year, month), (year), ())</code> は ROLLUP(year, month) と同等です。「year×category と year のみ」のような非階層な組み合わせが必要なときは GROUPING SETS で直接列挙します。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>UNION ALL との違い（パフォーマンス）：</strong>ROLLUP は複数の GROUP BY クエリを UNION ALL したのと等価ですが、内部的に1回のテーブルスキャンで全集計レベルを処理します（DB次第）。複数の GROUP BY + UNION ALL クエリを ROLLUP に置き換えることで、I/O と実行時間を削減できます。</div></div>
</div>

</div>

<div class="column-body">
Redash・Metabase・Tableau などのBIツールに渡す集計クエリでは、<strong>ROLLUP/CUBE を使うことで「ドリルダウン（全体→年→月→カテゴリ）に必要な全粒度のデータを1クエリで生成</strong>できます。アプリ側で「全体合計クエリ」「年別クエリ」「月別クエリ」を別々に実行する手間がなくなり、バッチ処理の設計が大幅にシンプルになります。結果をキャッシュして配信するレポートバッチの実装に特に向いています。
</div>
</div>

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p', fn:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / 10</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',
        (Array.isArray(q.viz)
          ? q.viz.map((_, vIdx) => `<div class="sql-viz-wrapper" id="viz-${i}-${vIdx}" tabindex="-1" style="margin-bottom:24px;"></div>`).join('')
          : `<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>`
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => {
    if (!q.viz) return;
    if (Array.isArray(q.viz)) {
      q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById('viz-' + i + '-' + vIdx), v));
    } else {
      initVisualizer(document.getElementById('viz-' + i), q.viz);
    }
  });
  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});
let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});
</script>
