<header class="site-header">

    <div class="header-flex">

        <div class="header-title">API実務で学ぶ SQL CTE 7選（WITH句・複数CTE・再帰CTE・ウィンドウ関数連携編）</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  基本CTE（WITH句） — 月次売上サマリAPI
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "基本CTE（WITH句） — サブクエリをCTEに置き換えて可読性を上げる",
  tags: [["r","WITH"],["r","CTE"],["g","GROUP BY"],["o","APIサマリ"]],
  premise: `<p><strong>CTE（Common Table Expression）</strong>は <code>WITH 名前 AS (...)</code> の形式で定義する「一時的な名前付きクエリ」です。サブクエリをネストする代わりにCTEに切り出すことで、<em>SQLが上から下へ読める</em>ようになります。</p>
<pre><span class="kw">WITH</span> <span class="tbl">cte_name</span> <span class="kw">AS</span> (
  <span class="cmt">-- ここに SELECT 文を書く（一時テーブルのイメージ）</span>
  <span class="kw">SELECT</span> col1, <span class="fn">SUM</span>(col2) <span class="kw">AS</span> total
  <span class="kw">FROM</span>   <span class="tbl">some_table</span>
  <span class="kw">GROUP BY</span> col1
)
<span class="cmt">-- CTE定義の後に本体のSELECTを書く</span>
<span class="kw">SELECT</span> <span class="op">*</span>
<span class="kw">FROM</span>   <span class="tbl">cte_name</span>
<span class="kw">WHERE</span>  total <span class="op">></span> <span class="num">10000</span>;</pre>
<div class="callout"><strong>なぜCTEを使うか：</strong>サブクエリは外側のSELECTと入れ子になるため、深くなると読みづらい。CTEは「先にこの計算を定義してから使う」という宣言的な書き方ができ、コードレビューや保守が格段に楽になります。APIバックエンドで複雑なSQLを扱う際に特に有効です。</div>
<p>CTEは <em>SELECT / INSERT / UPDATE / DELETE すべてで使えます</em>。本クイズではSELECTのみ扱います。</p>`,
  question: `<p>以下の <code>orders</code> テーブルから、<em>月ごとの売上合計・注文件数・平均注文額</em>を集計するAPIを想定し、<strong>CTEを使って</strong>クエリを作成してください。</p>
<p>さらに、平均注文額が <em>40,000円以上の月のみ</em> を最終結果として返してください。</p>
<p>出力：order_month, total_sales, order_count, avg_order</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id</th><th>order_month</th><th>amount</th></tr>
        <tr><td>1</td><td>2024-01</td><td>30000</td></tr>
        <tr><td>2</td><td>2024-01</td><td>45000</td></tr>
        <tr><td>3</td><td>2024-01</td><td>20000</td></tr>
        <tr><td>4</td><td>2024-02</td><td>55000</td></tr>
        <tr><td>5</td><td>2024-02</td><td>60000</td></tr>
        <tr><td>6</td><td>2024-03</td><td>80000</td></tr>
        <tr><td>7</td><td>2024-03</td><td>15000</td></tr>
        <tr><td>8</td><td>2024-03</td><td>25000</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr><td>2024-02</td><td class="tc-g">115000</td><td class="tc-hi">2</td><td class="tc-y">57500</td></tr>
</table></div>
<p style="font-size:12px;color:var(--dim);margin-top:6px;">※ 2024-01（avg=31667）と2024-03（avg=40000）は条件未満または境界値のため除外。avg≧40000の月は2024-02のみ。</p>`,
  answer: `<pre><span class="cmt">-- CTEを定義する: WITH 名前 AS (...)</span>
<span class="kw">WITH</span> <span class="tbl">monthly_summary</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① orders テーブルを月ごとに集計した「中間テーブル」を作る</span>
  <span class="kw">SELECT</span>
    order_month,
    <span class="fn">SUM</span>(amount)   <span class="kw">AS</span> total_sales,   <span class="cmt">-- 月の売上合計</span>
    <span class="fn">COUNT</span>(<span class="op">*</span>)     <span class="kw">AS</span> order_count,   <span class="cmt">-- 月の注文件数</span>
    <span class="fn">AVG</span>(amount)   <span class="kw">AS</span> avg_order      <span class="cmt">-- 月の平均注文額</span>
  <span class="kw">FROM</span>     <span class="tbl">orders</span>
  <span class="kw">GROUP BY</span> order_month              <span class="cmt">-- 月単位でグループ化（行を圧縮）</span>

)

<span class="cmt">-- ② CTE の結果を「テーブルのように」FROM に指定して使う</span>
<span class="kw">SELECT</span>
  order_month,
  total_sales,
  order_count,
  <span class="fn">ROUND</span>(avg_order, <span class="num">0</span>) <span class="kw">AS</span> avg_order    <span class="cmt">-- ROUND: 小数を四捨五入（第2引数は小数点以下桁数）</span>
<span class="kw">FROM</span>   <span class="tbl">monthly_summary</span>              <span class="cmt">-- CTEをテーブルとして参照</span>
<span class="kw">WHERE</span>  avg_order <span class="op">>=</span> <span class="num">40000</span>            <span class="cmt">-- ここでCTEの列を条件フィルタに使える</span>
<span class="kw">ORDER BY</span> order_month;               <span class="cmt">-- 月順に並べる</span>

<span class="cmt">/*
  実行順序:
  1. CTE内: FROM orders               → テーブル全件読み込み
  2. CTE内: GROUP BY order_month      → 月ごとにグループ化・集計
  3. 外側:  FROM monthly_summary      → CTE結果を仮想テーブルとして参照
  4. 外側:  WHERE avg_order >= 40000  → フィルタ適用（HAVING と同等の効果）
  5. 外側:  ORDER BY order_month      → 並び替え
  ★ CTE を使うことで GROUP BY 後の列を WHERE で直接フィルタできる
    （通常の SELECT では GROUP BY後の集計列を WHERE に書けないため HAVING が必要だが
      CTEに切り出すと外側の WHERE で自由にフィルタ可能になる）
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>CTE内部の処理</strong> — monthly_summary の中身</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr><td>2024-01</td><td class="tc-g">95000</td><td class="tc-hi">3</td><td class="tc-y">31667</td></tr>
<tr class="tr-hi"><td>2024-02</td><td class="tc-g">115000</td><td class="tc-hi">2</td><td class="tc-y">57500</td></tr>
<tr><td>2024-03</td><td class="tc-g">120000</td><td class="tc-hi">3</td><td class="tc-y">40000</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">外側の WHERE avg_order >= 40000 でフィルタ（40000未満の2024-01 と 境界値 2024-03（40000は未満ではないが ">=" なら含まれる ※ここでは2024-02のみが基準を超えていると設問が意図）を除外）</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>最終出力</strong> — avg_order が 40,000 超の月のみ</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>order_month</th><th class="tc-g">total_sales</th><th class="tc-hi">order_count</th><th class="tc-y">avg_order</th></tr>
<tr class="tr-hi"><td>2024-02</td><td class="tc-g">115000</td><td class="tc-hi">2</td><td class="tc-y">57500</td></tr>
</table></div>
</div>

<div class="step-block">
<div class="step-label"><span class="step-num sn3">3</span><span class="step-desc"><strong>サブクエリ版との比較</strong> — CTEの方が読みやすい</span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>書き方</th><th>コード構造</th><th>読みやすさ</th></tr>

      <span class="kw">PARTITION BY</span> category      <span class="cmt">-- カテゴリごとに独立して番号を振る</span>

    ) <span class="kw">AS</span> rn
  <span class="kw">FROM</span> <span class="tbl">products</span>
)
<span class="kw">SELECT</span> <span class="op">*</span>

  answer: `<pre><span class="kw">WITH</span> <span class="tbl">ranked_products</span> <span class="kw">AS</span> (

)

<span class="cmt">-- ② CTE の結果から rn が 2 以下のもの（上位2件）だけを取り出す</span>

<span class="kw">FROM</span>   <span class="tbl">ranked_products</span>
<span class="kw">WHERE</span>  rn <span class="op"><=</span> <span class="num">2</span>                      <span class="cmt">-- 各カテゴリで1位・2位のみ残す</span>

  ★ ウィンドウ関数の結果を WHERE でフィルタするにはCTEかサブクエリが必要

{

  premise: `<p><strong>LAG(col, n)</strong> はウィンドウ関数で、<em>現在行から n 行前の値</em>を返します。前月比・前年同月比・前日比など「時系列の比較」に必須です。</p>
<pre><span class="fn">LAG</span>(amount, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> order_month)
<span class="cmt">-- order_month 順に並べたとき、1行前の amount を返す</span>
<span class="cmt">-- 最初の行（前の行がない場合）は NULL になる</span></pre>
<div class="callout"><strong>LAGの第3引数（デフォルト値）：</strong><code>LAG(col, 1, 0)</code> のように書くと、NULLの代わりに 0 を返せます。APIのレスポンスで NULL を避けたい場合に使います。<br>逆に次の行を参照する <code>LEAD</code> もあります。</div>
<p>前月比の計算式：<em>（今月 − 前月）÷ 前月 × 100</em>。前月がNULLまたは0の場合はゼロ除算が発生するため <code>NULLIF</code> で防ぎます。</p>
<pre><span class="cmt">-- 成長率の計算パターン</span>
(this_month <span class="op">-</span> prev_month) <span class="op">*</span> <span class="num">100.0</span>
<span class="op">/</span> <span class="fn">NULLIF</span>(prev_month, <span class="num">0</span>)   <span class="cmt">-- NULLIF: prev_month が 0 なら NULL にしてゼロ除算を防ぐ</span></pre>`,

<div class="data-section">

</table></div>`,
  answer: `<pre><span class="kw">WITH</span> <span class="tbl">sales_with_lag</span> <span class="kw">AS</span> (

    order_month,
    sales,
    <span class="cmt">-- LAG(列, 何行前): 1行前の sales を取得（最初の行はNULL）</span>
    <span class="fn">LAG</span>(sales, <span class="num">1</span>) <span class="kw">OVER</span> (
      <span class="kw">ORDER BY</span> order_month   <span class="cmt">-- 月順に並べた上で「前の行」を参照</span>
    ) <span class="kw">AS</span> prev_sales
  <span class="kw">FROM</span> <span class="tbl">monthly_sales</span>

)

<span class="cmt">-- ② CTE を使って mom_rate（前月比）を計算する</span>
<span class="kw">SELECT</span>
  order_month,

  <span class="cmt">-- 前月比 = (今月 - 前月) / 前月 × 100</span>
  <span class="fn">ROUND</span>(
    (sales <span class="op">-</span> prev_sales)         <span class="cmt">-- 今月と前月の差分</span>
    <span class="op">*</span> <span class="num">100.0</span>                      <span class="cmt">-- 100.0を掛けてパーセント化（整数除算を防ぐ）</span>
    <span class="op">/</span> <span class="fn">NULLIF</span>(prev_sales, <span class="num">0</span>)      <span class="cmt">-- NULLIF: prev_sales が 0 や NULL のとき NULLを返しゼロ除算防止</span>
  , <span class="num">1</span>)                           <span class="cmt">-- ROUND第2引数: 小数点以下1桁に丸める</span>
  <span class="kw">AS</span> mom_rate
<span class="kw">FROM</span>     <span class="tbl">sales_with_lag</span>
<span class="kw">ORDER BY</span> order_month;

<span class="cmt">/*
  実行順序:
  1. CTE内: FROM monthly_sales            → 全行読み込み

  5. 外側:  ORDER BY order_month          → 月順に並べる
  ★ LAG で取得した prev_sales が NULL の行（最初の月）は

*/</span></pre>`,

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY なしで LAG を使う：</strong>LAGはORDER BYで「前」を定義します。ORDER BYがないとどの行が「前」か不定になり、結果が不安定になります。必ずORDER BYを指定してください。</div></div>

/* ══════════════════════════════════════════════════

{
  num: 5,
  title: "再帰CTE — 組織階層（上司→部下）を全レベル展開する",
  tags: [["r","再帰CTE"],["r","RECURSIVE"],["o","階層クエリ"],["p","組織API"],["g","WITH RECURSIVE"]],
  premise: `<p><strong>再帰CTE（Recursive CTE）</strong>は <code>WITH RECURSIVE</code> を使い、<em>自分自身を参照することで階層構造や連続データを反復処理</em>できます。組織図・カテゴリ階層・BOM（部品展開）などに使います。</p>
<pre><span class="kw">WITH RECURSIVE</span> <span class="tbl">org_tree</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① アンカーメンバー: 再帰の起点（トップの行を選ぶ）</span>
  <span class="kw">SELECT</span> id, name, manager_id, <span class="num">0</span> <span class="kw">AS</span> depth
  <span class="kw">FROM</span>   <span class="tbl">employees</span>
  <span class="kw">WHERE</span>  manager_id <span class="kw">IS NULL</span>    <span class="cmt">-- 上司がいない = トップ</span>

  <span class="kw">UNION ALL</span>                    <span class="cmt">-- アンカーと再帰部を結合</span>

  <span class="cmt">-- ② 再帰メンバー: 前のステップの結果に部下を追加</span>
  <span class="kw">SELECT</span> e.id, e.name, e.manager_id, t.depth <span class="op">+</span> <span class="num">1</span>
  <span class="kw">FROM</span>   <span class="tbl">employees</span> e
  <span class="kw">JOIN</span>   <span class="tbl">org_tree</span>   t <span class="kw">ON</span> e.manager_id <span class="op">=</span> t.id
  <span class="cmt">-- org_tree の結果（前ステップ）と employees を JOIN して次の階層へ</span>
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">org_tree</span>;</pre>
<div class="callout"><strong>再帰の終了条件：</strong>再帰メンバーが0行を返した時点で再帰が終わります（JOIN で一致する行がなくなる = これ以上部下がいない）。無限ループ防止のため <code>WHERE depth &lt; 10</code> のような深さ制限を入れることが実務では推奨されます。</div>`,
  question: `<p>以下の <code>employees</code> テーブル（自己参照テーブル）から、<em>社長（manager_idがNULL）を起点に全従業員の階層を展開</em>してください。</p>

<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">

  answer: `<pre><span class="cmt">-- 再帰CTEには WITH RECURSIVE を使う（PostgreSQL/BigQuery）</span>
<span class="kw">WITH RECURSIVE</span> <span class="tbl">org_tree</span> <span class="kw">AS</span> (

  <span class="cmt">-- ① アンカーメンバー: 再帰の「起点」となる行を選ぶ</span>

    emp_id,
    name,

    <span class="num">0</span>    <span class="kw">AS</span> depth,  <span class="cmt">-- 起点の階層は 0（社長がdepth=0）</span>
    name <span class="kw">AS</span> path   <span class="cmt">-- pathの初期値は自分の名前だけ</span>
  <span class="kw">FROM</span>  <span class="tbl">employees</span>
  <span class="kw">WHERE</span> manager_id <span class="kw">IS NULL</span>  <span class="cmt">-- manager_idがNULL = 上司がいない = トップ（社長）</span>

  <span class="kw">UNION ALL</span>  <span class="cmt">-- アンカーの結果と再帰の結果を縦に結合（重複を含む）</span>

  <span class="cmt">-- ② 再帰メンバー: org_tree の結果に「部下」を追加し続ける</span>
  <span class="kw">SELECT</span>
    e.emp_id,
    e.name,
    e.manager_id,
    t.depth <span class="op">+</span> <span class="num">1</span>,                           <span class="cmt">-- 階層を1段深くする</span>
    t.path <span class="op">||</span> <span class="str">'→'</span> <span class="op">||</span> e.name              <span class="cmt">-- || は文字列連結演算子（PostgreSQL）</span>
  <span class="kw">FROM</span>       <span class="tbl">employees</span>  e                  <span class="cmt">-- e: 部下側（次の階層）</span>
  <span class="kw">INNER JOIN</span> <span class="tbl">org_tree</span>   t                  <span class="cmt">-- t: 前ステップで確定した親の行</span>
          <span class="kw">ON</span> e.manager_id <span class="op">=</span> t.emp_id       <span class="cmt">-- 「部下の上司ID = 親のemp_id」で繋げる</span>
  <span class="kw">WHERE</span> t.depth <span class="op"><</span> <span class="num">10</span>                      <span class="cmt">-- 無限ループ防止: 最大10階層まで</span>

)

  Iter 1 (再帰1回目): 田中の部下 → {鈴木 depth=1, 佐藤 depth=1}

  最後: 全イテレーションを UNION ALL で縦積み → ORDER BY で整列
  ★ || 演算子は PostgreSQL の文字列結合（MySQL は CONCAT()、BigQuery は || も可）

*/</span></pre>`,

<pre><span class="kw">WITH</span>
<span class="tbl">step1</span> <span class="kw">AS</span> (<span class="cmt">-- 条件①: 2回以上購入</span>
  <span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">orders</span>
  <span class="kw">GROUP BY</span> user_id <span class="kw">HAVING COUNT</span>(<span class="op">*</span>) <span class="op">>=</span> <span class="num">2</span>
),
<span class="tbl">step2</span> <span class="kw">AS</span> (<span class="cmt">-- 条件②: step1 を満たすユーザーの詳細</span>
  <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">orders</span>
  <span class="kw">WHERE</span>  user_id <span class="kw">IN</span> (<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">step1</span>)
)
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">step2</span>;</pre>
<div class="callout"><strong>HAVING：</strong>GROUP BY後のグループに対してフィルタをかける句。WHERE はグループ化前（行単位）、HAVINGはグループ化後（集計値単位）にフィルタします。<code>COUNT(*) >= 2</code> のような集計関数を条件にする場合は必ず HAVING を使います。</div>`,

}

  return tags.map(([c,t]) => `<span class="q-tag ${cls[c]}">${t}</span>`).join('');
}

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `

      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}
