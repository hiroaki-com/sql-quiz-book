<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLパフォーマンス最適化 Q6〜Q10 — ロック・バルク処理・統計情報・部分インデックス・並列クエリ（応用編）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--orange); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--orange); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--orange); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--orange); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }

  .tc-g { color: var(--green); }
  .tc-r { color: var(--red); }
  .tc-y { color: var(--yellow); }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .column-box {
    background: #0d1520; border: 1px solid #1c3550; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
    border-left: 3px solid var(--fn);
  }
  .column-title {
    font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: 0.5px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .column-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--fn); }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); background: #1e1205; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }

  /* Visualizer Styles */
  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;

    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;

    --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
    --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
    --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
    --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;

    --sql-grp1-bg: rgba(88, 166, 255, 0.03);
    --sql-grp2-bg: rgba(88, 166, 255, 0.08);
    --sql-grp3-bg: rgba(88, 166, 255, 0.14);

    --border-radius: 6px;

    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1.5rem;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 11px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
  .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }

  .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
  .sv-dot.done { background: var(--color-border-main); }
  .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }
  .sv-nav-btn:focus-visible, .sv-dot:focus-visible { outline: 2px solid var(--sql-blue-txt); outline-offset: 2px; }

  .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 10px; }
  .sv-table th { padding: 6px 12px; font-size: 9px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
  .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }

  .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
  .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
  .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }

  .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
  .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
  .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
  .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }

  .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
  .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
  .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }

  .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
  .sql-hl-step1, .sql-hl-step2, .sql-hl-step3, .sql-hl-step4, .sql-hl-step5 {
    border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt); background: var(--sql-orange-bg);
  }

  .sv-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
  .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
  .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
  .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }

  @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .sv-animate { animation: sv-fade-in 0.3s ease forwards; }

  .tbl-label { font-size: 9px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }

  .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
  .sv-mobile-collapse summary { list-style: none; }
  .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
  .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }

  @media (min-width: 641px) {
    .sv-mobile-collapse > summary { pointer-events: none; }
    .sv-collapse-icon { display: none !important; }
  }
  @media (max-width: 640px) {
    .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">ADVC</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 応用 Q6〜Q10（ロック／バルク処理／統計情報／部分インデックス／並列クエリ編）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★ 応用</span>
      <span class="htag">パフォーマンス</span>
      <span class="htag">チューニング上級</span>
      <span class="htag">PostgreSQL対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
function initVisualizer(root, data) {
  if (!root || !data) return;
  let currentStepIndex = 0;

  function getLegendHTML(type) {
    const mkLegend = (color, text) => `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend = `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail = `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div>
      </div>`;

    if (type === "base") return mkLegend("blue", "データ取得・結合対象") + dimLegend;
    if (type === "eval") return mkLegend("orange", "評価対象の列・キー") + dimLegend + passFail;
    if (type === "group") return mkLegend("orange", "グループ化キー・集計対象") + `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === "select") return mkLegend("green", "出力対象の列") + dimLegend;
    return "";
  }

  function renderSQL(d, stepId) {
    return d.sql.map(t => {
      const isMatch = t.h && t.h.split(" ").includes(stepId);
      const cls = `${t.k || ""} ${isMatch ? `sql-hl-${stepId}` : ""}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join("");
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" open style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>
          <code style="font-size:10px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
          <span class="sv-collapse-icon" style="margin-left:auto;font-size:9px;color:var(--color-txt-muted);">▼</span>
        </summary>
        <div style="margin-top:12px;font-size:10px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
      </details>
    `;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ""}">${col}</th>`).join("");
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ""}">${val}</td>`).join("");
      return `<tr class="${r.c || ""}">${tds}</tr>`;
    }).join("");
    const labelHtml = label ? `<div class="tbl-label">▸ ${label}</div>` : "";
    return `<div style="flex:1;min-width:260px;">${labelHtml}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ""}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">

<span class="kw">FROM</span> <span class="str">'/tmp/orders.csv'</span>
<span class="kw">WITH</span> (FORMAT CSV, HEADER <span class="kw">TRUE</span>);          <span class="cmt">-- CSVフォーマット、ヘッダ行あり</span></pre>`,
  question: `<p>外部システムから毎日500万件のログデータをPostgreSQLに取り込むETLパイプラインを設計してください。現在は <code>INSERT INTO ... VALUES</code> を1件ずつ実行して<em>6時間かかっている</em>処理を、<em>30分以内</em>に短縮することが目標です。</p>
<div class="data-section">
  <div class="data-label">取り込み対象テーブル</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>列名</th><th>型</th><th>制約</th></tr>
    <tr><td>log_id</td><td>BIGINT</td><td>PK（自動採番）</td></tr>
    <tr><td>user_id</td><td>VARCHAR(20)</td><td>INDEX あり</td></tr>
    <tr><td>action</td><td>VARCHAR(50)</td><td></td></tr>
    <tr><td>amount</td><td>NUMERIC(12,2)</td><td></td></tr>
    <tr><td>logged_at</td><td>TIMESTAMPTZ</td><td>INDEX あり</td></tr>
  </table></div>
</div>`,
  output: `<p>最適化手法の効果比較：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>手法</th><th>500万件の投入時間目安</th><th>備考</th></tr>
<tr class="tr-hi"><td>INSERT 1件ずつ</td><td class="tc-r">6時間</td><td>コミット500万回</td></tr>
<tr class="tr-hi4"><td>バッチINSERT（1000件ずつ）</td><td class="tc-y">20〜30分</td><td>コミット5000回</td></tr>
<tr class="tr-hi2"><td>COPY コマンド</td><td class="tc-g">5〜10分</td><td>最速。COMMITは1回</td></tr>
<tr class="tr-hi2"><td>COPY + INDEX無効化 + UNLOGGED</td><td class="tc-g">2〜3分</td><td>最高速（クラッシュ時リスクあり）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ═══ 戦略1: バッチINSERT（アプリ側で1000件まとめてINSERT）═══</span>
<span class="kw">BEGIN</span>;   <span class="cmt">-- 【超基礎】トランザクション開始（COMMITを500万回→5000回に削減）</span>
<span class="kw">INSERT INTO</span> <span class="tbl">event_logs</span> (user_id, action, amount, logged_at)
<span class="kw">VALUES</span>
    (<span class="str">'U001'</span>, <span class="str">'purchase'</span>, <span class="num">3000</span>, <span class="str">'2024-06-15 10:00:00'</span>),  <span class="cmt">-- 1件目</span>
    (<span class="str">'U002'</span>, <span class="str">'login'</span>,    <span class="kw">NULL</span>,  <span class="str">'2024-06-15 10:00:01'</span>),  <span class="cmt">-- 2件目</span>
    <span class="cmt">-- … （1000件まとめてVALUESに列挙）</span>
    (<span class="str">'U999'</span>, <span class="str">'logout'</span>,   <span class="kw">NULL</span>,  <span class="str">'2024-06-15 10:00:59'</span>);  <span class="cmt">-- 1000件目</span>
<span class="kw">COMMIT</span>;
<span class="cmt">-- アプリ（Python/Node.js等）でこれを5000回繰り返す（5000回のCOMMIT）</span>

<span class="cmt">-- ═══ 戦略2: COPY コマンド（CSVから直接投入・最速）═══</span>
<span class="cmt">-- ① INDEXを一時的に削除（投入中のINDEX更新コストを排除）</span>
<span class="kw">DROP INDEX</span> idx_event_logs_user_id;   <span class="cmt">-- 投入後に再作成する</span>
<span class="kw">DROP INDEX</span> idx_event_logs_logged_at;

<span class="cmt">-- ② COPYで一括投入（1回のトランザクションで全500万件を処理）</span>
<span class="kw">COPY</span> <span class="tbl">event_logs</span> (user_id, action, amount, logged_at)
<span class="kw">FROM</span>  <span class="str">'/tmp/event_logs_20240615.csv'</span>  <span class="cmt">-- DBサーバー上のCSVファイルパス</span>
<span class="kw">WITH</span> (
    FORMAT  CSV,                       <span class="cmt">-- CSV形式を指定</span>
    HEADER  <span class="kw">TRUE</span>,                     <span class="cmt">-- 1行目はヘッダとして無視する</span>
    NULL    <span class="str">''</span>,                        <span class="cmt">-- 空文字をNULLとして扱う</span>
    ENCODING <span class="str">'UTF8'</span>                   <span class="cmt">-- 文字コードを指定</span>
);

<span class="cmt">-- ③ INDEXを再作成（CONCURRENTLY: テーブルロックなしで作成）</span>
<span class="kw">CREATE INDEX CONCURRENTLY</span> idx_event_logs_user_id
    <span class="kw">ON</span> <span class="tbl">event_logs</span> (user_id);         <span class="cmt">-- 同時アクセスを止めずにINDEX構築</span>
<span class="kw">CREATE INDEX CONCURRENTLY</span> idx_event_logs_logged_at
    <span class="kw">ON</span> <span class="tbl">event_logs</span> (logged_at);

<span class="cmt">-- ═══ 戦略3: UNLOGGED TABLE（WAL書き込みなし・最高速・クラッシュリスクあり）═══</span>
<span class="kw">CREATE UNLOGGED TABLE</span> <span class="tbl">event_logs_staging</span> (  <span class="cmt">-- WALログに書かない → 速いがクラッシュでデータ消失</span>
    <span class="kw">LIKE</span> <span class="tbl">event_logs</span>                          <span class="cmt">-- event_logsと同じ列定義をコピー</span>
);
<span class="cmt">-- UNLOGGEDテーブルにCOPYで高速投入 → 加工・検証 → 本番テーブルに INSERT SELECT</span>
<span class="kw">INSERT INTO</span> <span class="tbl">event_logs</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> <span class="tbl">event_logs_staging</span>
<span class="kw">WHERE</span> amount <span class="op">IS NOT NULL</span>              <span class="cmt">-- バリデーション後に本番へ移す</span>
  <span class="kw">AND</span> logged_at <span class="op">&gt;</span> <span class="str">'2024-01-01'</span>;

<span class="cmt">/*
  ETLパイプラインの実行順序:
  1. INDEXを削除（DROP INDEX）
  2. COPY でCSV全件投入（1トランザクション・WAL最適化）
  3. ANALYZE event_logs（統計情報を更新・オプティマイザが正確な計画を立てられるように）
  4. INDEXをCREATE INDEX CONCURRENTLYで再作成（本番アクセスをブロックしない）
*/</span></pre>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>1件ずつのINSERTが遅い最大の理由は「1件ごとにCOMMITが発生し、ディスクへの書き込みが確定される」からです。1000件まとめると1/1000のCOMMIT回数になり、劇的に速くなります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COPY vs INSERT の使い分け：</strong>COPYはDBサーバーがローカルファイルを直接読むため、クライアントからのネットワーク転送オーバーヘッドがありません。アプリからストリーミングで送る場合は <code>\COPY</code>（psqlクライアントコマンド）またはライブラリの COPY API（Pythonの <code>psycopg2.copy_from</code> 等）を使います。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>CREATE INDEX CONCURRENTLY の注意点：</strong>通常の <code>CREATE INDEX</code> はテーブルへの書き込みをブロックしますが、<code>CONCURRENTLY</code> を付けるとブロックなしで作成できます。ただしCONCURRENTLYはトランザクション内では実行できません。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>本番テーブルをUNLOGGEDに変更する：</strong><code>ALTER TABLE event_logs SET UNLOGGED</code> はデータの耐久性を失います。サーバークラッシュ時にデータが消失します。UNLOGGEDはステージングテーブルや一時的な集計テーブルに限定して使用し、本番データは必ず通常テーブルに保存してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>COPY中にINDEXを残したままにする：</strong>大量COPYでINDEXが存在すると、投入のたびにBTreeの再バランスが発生します。INDEXを事前に削除して後から再作成する方が、大多数のケースで総所要時間が短くなります（目安：10万件以上なら削除→再作成が有利）。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：\COPY とCOPYの違い（権限とセキュリティ）</div>
<div class="column-body">
<code>COPY</code>（SQLコマンド）はDBサーバー上のファイルを読むため、<strong>superuser権限</strong>が必要です。一方 <code>\COPY</code>（psqlのメタコマンド）はクライアント側のファイルを読み、一般ユーザーでも実行できます。本番環境ではsuperuser権限を持つユーザーを最小化するセキュリティ要件があるため、アプリから実行する場合は <code>pg_read_server_files</code> ロールを必要最小限のユーザーに付与するか、ライブラリのCOPY APIを使うのが安全です。
</div>
</div>
`

{
  num: 8,
  title: "統計情報とANALYZE — オプティマイザが誤った実行計画を選ぶ原因と対策",
  tags: [["r","ANALYZE"],["r","n_distinct"],["o","統計情報"],["g","オプティマイザ"]],
  premise: `<p>PostgreSQLのオプティマイザは<em>統計情報</em>をもとに実行計画を決定します。統計情報が古くなると「実際は100万件あるのに10件と推定してNestedLoopを選ぶ」のような<em>誤選択</em>が発生し、突然クエリが遅くなります。</p>
<pre><span class="cmt">-- 統計情報を手初動で更新する</span>
<span class="kw">ANALYZE</span> <span class="tbl">orders</span>;                     <span class="cmt">-- 指定テーブルの統計を更新</span>
<span class="kw">ANALYZE</span>;                              <span class="cmt">-- 全テーブルの統計を更新</span>

<span class="cmt">-- 現在の統計情報を確認する</span>
<span class="kw">SELECT</span>
    attname         <span class="kw">AS</span> col,           <span class="cmt">-- 列名</span>
    n_distinct,                        <span class="cmt">-- 推定ユニーク値数（負数は比率を意味する）</span>
    correlation                        <span class="cmt">-- 物理順序との相関（1.0=完全昇順,-1.0=完全降順）</span>
<span class="kw">FROM</span>   pg_stats
<span class="kw">WHERE</span>  tablename <span class="op">=</span> <span class="str">'orders'</span>;</pre>
<div class="callout warn"><strong>AUTO VACUUM と ANALYZE の関係：</strong>PostgreSQLは autovacuum デーモンが自動でVACUUM・ANALYZEを実行します。しかし「大量INSERT直後」「急激なデータ増加後」は autovacuum が追いつかず統計情報が古いままになることがあります。</div>`,
  question: `<p>以下のシナリオで<em>統計情報の問題</em>を特定し、適切なANALYZE・統計精度向上の設定を示してください。</p>
<p>シナリオ：<code>events</code> テーブルに大量INSERT後、特定のevent_typeを絞り込むクエリが急に遅くなった。EXPLAIN ANALYZEを確認すると「rows=100（推定）だが actual rows=500000」と大きく乖離している。</p>
<div class="data-section">
  <div class="data-label">pg_stats での確認結果（問題発生中）</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>col</th><th>n_distinct</th><th>most_common_vals</th><th>most_common_freqs</th></tr>
    <tr class="tr-hi"><td>event_type</td><td class="tc-y">5</td><td>login,purchase,view</td><td class="tc-r">0.90, 0.05, 0.04</td></tr>
    <tr><td>user_id</td><td class="tc-g">-0.95</td><td>（省略）</td><td>（省略）</td></tr>
  </table></div>
</div>`,
  output: `<p>統計情報の問題診断と対策の優先順位：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>問題</th><th>原因</th><th>対策</th></tr>
<tr class="tr-hi"><td>rows推定が大きく乖離</td><td>ANALYZEが未実施（大量INSERT後）</td><td class="tc-g">ANALYZE events を即実行</td></tr>
<tr class="tr-hi4"><td>event_typeの分布が偏っている</td><td>most_common_freqsのサンプルが古い</td><td class="tc-y">statistics_target を上げる</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① まず統計情報の現状を確認する</span>
<span class="kw">SELECT</span>
    schemaname,
    tablename,
    last_analyze,                          <span class="cmt">-- 最後に ANALYZE が実行された日時</span>
    last_autoanalyze,                      <span class="cmt">-- autovacuumによる最終ANALYZE日時</span>
    n_live_tup,                            <span class="cmt">-- 現在の行数（生きている行）</span>
    n_dead_tup,                            <span class="cmt">-- 削除済みで未回収の行数（VACUUMが必要なサイン）</span>
    n_mod_since_analyze                    <span class="cmt">-- ANALYZE後に変更された行数（大きければ統計が古い）</span>
<span class="kw">FROM</span>  pg_stat_user_tables
<span class="kw">WHERE</span> relname <span class="op">=</span> <span class="str">'events'</span>;

<span class="cmt">-- ② 統計情報を即時更新する（手動ANALYZE）</span>
<span class="kw">ANALYZE</span> <span class="tbl">events</span>;                          <span class="cmt">-- eventsテーブルの統計を今すぐ更新</span>
<span class="cmt">-- これだけでオプティマイザの推定精度が改善し実行計画が変わることが多い</span>

<span class="cmt">-- ③ 統計サンプル数を増やして精度を上げる（偏りが強い列向け）</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">events</span>
    <span class="kw">ALTER COLUMN</span> event_type
    <span class="kw">SET STATISTICS</span> <span class="num">500</span>;                   <span class="cmt">-- デフォルト100 → 500に増やす（最大10000）</span>
<span class="cmt">-- 値が多様だったり分布が偏っている列はサンプル数を増やすと推定精度が上がる</span>
<span class="kw">ANALYZE</span> <span class="tbl">events</span>;                          <span class="cmt">-- 設定変更後は再度ANALYZEを実行する</span>

<span class="cmt">-- ④ n_distinct が実態と違う場合は手動で上書きする</span>
<span class="cmt">-- 例: event_typeは実際は20種類あるのに5と推定されている場合</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">events</span>
    <span class="kw">ALTER COLUMN</span> event_type
    <span class="kw">SET</span> (n_distinct <span class="op">=</span> <span class="num">20</span>);               <span class="cmt">-- 実際の種類数を明示的に指定（オプティマイザのヒント）</span>
<span class="kw">ANALYZE</span> <span class="tbl">events</span>;

<span class="cmt">-- ⑤ autovacuumの閾値を下げる（大量更新テーブル向け）</span>
<span class="kw">ALTER TABLE</span> <span class="tbl">events</span>
    <span class="kw">SET</span> (autovacuum_analyze_scale_factor <span class="op">=</span> <span class="num">0.01</span>);  <span class="cmt">-- デフォルト0.2(20%) → 1%の変更でANALYZEを発動</span>

<span class="cmt">-- ⑥ 統計情報の確認（ANALYZE後に偏りを確認）</span>
<span class="kw">SELECT</span>
    attname          <span class="kw">AS</span> col,
    n_distinct,                                   <span class="cmt">-- 負数は比率: -0.95 = 全行の95%が一意</span>
    most_common_vals,                             <span class="cmt">-- 最頻出の値のリスト</span>
    most_common_freqs,                            <span class="cmt">-- 各最頻出値の出現割合</span>
    histogram_bounds                              <span class="cmt">-- ヒストグラム（値の分布境界）</span>
<span class="kw">FROM</span>   pg_stats
<span class="kw">WHERE</span>  tablename <span class="op">=</span> <span class="str">'events'</span>
  <span class="kw">AND</span>  attname   <span class="op">=</span> <span class="str">'event_type'</span>;

  premise: `<p><strong>部分インデックス（Partial Index）</strong>は <code>WHERE</code> 句を付きのインデックスで、<em>条件に一致する行だけ</em>をインデックスに格納します。全行をインデックス化する通常のインデックスと比べて、<em>サイズが小さく・更新コストが低く・キャッシュヒット率が高い</em>という3つのメリットがあります。</p>
<pre><span class="cmt">-- 部分インデックスの作成構文</span>
<span class="kw">CREATE INDEX</span> idx_orders_pending
    <span class="kw">ON</span> <span class="tbl">orders</span> (created_at)             <span class="cmt">-- インデックスのキー列</span>
    <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'pending'</span>;           <span class="cmt">-- この条件の行だけをインデックスに格納</span>

<span class="cmt">-- このインデックスが有効なクエリ（WHERE が一致している必要がある）</span>

  <span class="kw">AND</span>  created_at <span class="op">&gt;</span> <span class="str">'2024-06-01'</span>;

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>部分インデックスは「よく検索される条件の行だけを本の索引に載せる」イメージです。99%の「どうせ検索しない行」を索引から除くことで、索引が薄くなり、必要な情報を素早く見つけられます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>部分UNIQUEインデックスの強力な使い方：</strong><code>CREATE UNIQUE INDEX ... WHERE is_active = TRUE</code> のように、特定条件下でのみユニーク制約をかけることができます。「論理削除（is_deleted=false）の行だけでメールアドレスをユニークにする」といった要件を、アプリロジックなしでDB側で保証できます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>「ホット行」パターンの認識：</strong>ステータス列で特定の値（'pending', 'processing', 'unread', 'active'）だけが頻繁に参照される場合、その値だけを部分インデックスにするパターンは非常に効果的です。データが成熟するほど（古いデータが completed/read/inactive になるほど）インデックスが小さく保たれる自己最適化の特性があります。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>部分INDEXの条件とクエリの条件を完全一致させない：</strong><code>WHERE is_read = FALSE</code> の部分INDEXに対して、クエリが <code>WHERE NOT is_read</code> と書かれている場合、DBによってはINDEXが使われないことがあります。部分INDEXの条件式とWHERE句の書き方を統一してください。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>データが偏っていないのに部分INDEXを使う：</strong>全行の50%がpending、50%がcompletedのような均一な分布では部分INDEXのサイズ削減効果が薄く、複数のINDEXを管理するコストだけが増えます。部分INDEXは「ホット（頻繁に参照される）行が全体の数%以下」の場合に最も効果的です。</div></div>
</div>

  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>

      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

}

        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => { 
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById(`viz-${i}-${vIdx}`), v));
      } else {
        initVisualizer(document.getElementById('viz-' + i), q.viz);
      }
    } 
  });

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});
let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});
</script>
</body>
</html>
