<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL BI・マネタイズ集計10選 — APIで学ぶ王道パターン（中級編）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e13;
    --bg2: #131920;
    --bg3: #1c2330;
    --bg4: #263040;
    --border: #2a3545;
    --text: #cdd9e5;
    --dim: #768390;
    --accent: #4dabf7;
    --green: #3fb950;
    --orange: #f0883e;
    --red: #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --kw: #ff7b72;
    --fn: #79c0ff;
    --str: #a5d6ff;
    --num: #f0c674;
    --cmt: #6a737d;
    --tbl: #ffa657;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }

  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none; border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .q-header { margin-bottom: 18px; }
  .q-number { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r { background: #1a2c44; color: var(--accent); border: 1px solid #1e4070; }
  .tag-g { background: #162416; color: var(--green); border: 1px solid #1e3a1e; }
  .tag-o { background: #2e1e0a; color: var(--orange); border: 1px solid #4a2e0a; }
  .tag-p { background: #1e1433; color: var(--purple); border: 1px solid #3a2060; }

  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
  .acc-head:hover { background: var(--bg3); }
  .acc-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em { color: var(--yellow); font-style: normal; font-weight: 600; }
  code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  .kw  { color: var(--kw); font-weight: 700; }
  .fn  { color: var(--fn); }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--orange); }

  .callout {
    border-left: 3px solid var(--accent); background: #0e1e33;
    padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px;
  }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  .data-section { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }


  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }


  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
  }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em { color: var(--yellow); }
  .insight-body code { font-size: 11px; }

  .anti-box {
    background: #160a0a; border: 1px solid #3a1515; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;
  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .column-box {
    background: #161124; border: 1px solid #3a2060; border-radius: 8px;
    padding: 14px 16px; margin-top: 14px;
    border-left: 4px solid var(--purple);
  }
  .column-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--purple); letter-spacing: 1px; margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .column-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--purple); font-weight: 700; }
  .column-body code { font-size: 11px; background: #261b3d; color: var(--text); padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }
    table.vtbl { font-size: 10.5px; }
    .acc-title { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }
  }

  /* ── sql-viz-wrapper: ステップ可視化スコープ CSS ── */
  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;

    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;

    --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
    --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
    --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
    --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;

    --sql-grp1-bg: rgba(88, 166, 255, 0.03);
    --sql-grp2-bg: rgba(88, 166, 255, 0.08);
    --sql-grp3-bg: rgba(88, 166, 255, 0.14);

    --border-radius: 6px;

    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1.5rem 0;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;
  }

  .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 12px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
  .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }

  .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
  .sv-dot.done { background: var(--color-border-main); }
  .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }

  .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 12px; }
  .sv-table th { padding: 6px 12px; font-size: 11px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
  .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }

  .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
  .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
  .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }

  .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
  .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
  .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
  .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }

  .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
  .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
  .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }

  .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
  .sql-hl-from, .sql-hl-join, .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-select, .sql-hl-sub {
    border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt);
  }
  .sql-hl-from, .sql-hl-join { background: var(--sql-blue-bg); }
  .sql-hl-where, .sql-hl-group, .sql-hl-having, .sql-hl-agg, .sql-hl-sub { background: var(--sql-orange-bg); }
  .sql-hl-select { background: var(--sql-green-bg); }

  .sv-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
  .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
  .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
  .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }

  @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .sv-animate { animation: sv-fade-in 0.3s ease forwards; }

  .tbl-label { font-size: 12px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }

  .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
  .sv-mobile-collapse summary { list-style: none; }
  .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
  .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }

  @media (min-width: 641px) {
    .sv-mobile-collapse > summary { pointer-events: none; }
    .sv-collapse-icon { display: none !important; }
  }
  @media (max-width: 640px) {
    .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">BI</span></div>
      <div class="header-text-wrap">
        <div class="header-title">マネタイズ BI 集計で学ぶ SQL 王道パターン10選（WINDOW関数 / DATE集計 / UPSERT / COALESCE / 複合JOIN / UNION / LATERAL / JSON / STRING_AGG / 条件付き集計）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★★ 中級</span>
      <span class="htag">API前提</span>
      <span class="htag">BI・KPI集計</span>
      <span class="htag">マネタイズ</span>
      <span class="htag">PostgreSQL対応</span>
    </div>
  </div>
</header>

<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>

function initVisualizer(root, data) {
  let currentStepIndex = 0;

  root.innerHTML = `
<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
  <div class="sv-sidebar" style="flex:0 0 280px;min-width:240px;">
    <div style="font-size:12px;font-weight:600;color:var(--color-txt-sub);margin-bottom:6px;letter-spacing:0.05em;">SQL QUERY</div>
    <div class="sv-sqlbox" style="font-family:var(--font-mono);font-size:13px;line-height:1.8;white-space:pre-wrap;overflow-x:hidden;word-break:break-all;background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:16px;"></div>
    <details class="sv-legend-container sv-mobile-collapse" style="margin-top:16px;border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:12px 14px;background:var(--color-bg-panel);">
      <summary style="font-size:11px;font-weight:600;color:var(--color-txt-muted);letter-spacing:0.06em;cursor:pointer;outline:none;display:flex;align-items:center;justify-content:space-between;margin:0;">
        <span>LEGEND (現在のステップ)</span>
        <span class="sv-collapse-icon" style="font-size:10px;">▼</span>
      </summary>
      <div class="sv-legend" style="display:flex;flex-direction:column;gap:8px;font-size:12px;margin-top:12px;border-top:1px dashed var(--color-border-sub);padding-top:12px;"></div>
    </details>
  </div>
  <div style="flex:1;min-width:300px;">
    <div class="sv-stepinfo" style="margin-bottom:16px;"></div>
    <div class="sv-ctrls" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;"></div>
    <div style="font-size:11px;color:var(--color-txt-muted);margin-bottom:16px;">💡 ← → キーで移動できます（このビジュアライザにフォーカスがあるとき）</div>
    <div class="sv-tarea sv-animate"></div>
    <div class="sv-rowcount" style="font-size:12px;font-family:var(--font-mono);color:var(--color-txt-sub);margin-top:8px;text-align:right;"></div>
  </div>
</div>`;

  function getLegendHTML(type) {
    const mkLegend = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:11px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:11px;">✗ 除外</span></div>
      </div>`;
    if (type === "base")   return mkLegend("blue", "データ取得・結合対象") + dimLegend;
    if (type === "eval")   return mkLegend("orange", "評価対象の列・キー") + dimLegend + passFail;
    if (type === "group")  return mkLegend("orange", "グループ化キー・集計対象") +
      `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === "select") return mkLegend("green", "出力対象の列") + dimLegend;

  function renderSQL(vizData, stepId) {
    return vizData.sql.map(t => {
      const isMatch = t.h && t.h.split(" ").includes(stepId);
      const cls = `${t.k || ""} ${isMatch ? `sql-hl-${stepId}` : ""}`.trim();
      return `<span class="${cls}">${t.t}</span>`;
    }).join("");
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:10px 14px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>

      </details>
    `;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ""}">${col}</th>`).join("");
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ""}">${val}</td>`).join("");
      return `<tr class="${r.c || ""}">${tds}</tr>`;
    }).join("");
    const labelHtml = label ? `<div class="tbl-label">▸ ${label}</div>` : "";
    return `<div style="flex:1;min-width:260px;">${labelHtml}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ""}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
          ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
          <div style="display:flex;align-items:center;font-size:24px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
          ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
        </div>
      `;
    }
    return buildTable("", step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? "active" : (i < currentStepIndex ? "done" : "");
      return `<button class="sv-dot ${cls}" data-action="goto" data-idx="${i}" aria-label="ステップ${i+1}"></button>`;
    }).join("");
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:12px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="sv-nav-btn" data-action="prev" ${currentStepIndex === 0 ? "disabled" : ""}>← Prev</button>
        <button class="sv-nav-btn" data-action="next" ${currentStepIndex === total - 1 ? "disabled" : ""}>Next →</button>
      </div>
    `;
  }

  function renderAll() {
    const step = data.steps[currentStepIndex];
    root.querySelector('.sv-sqlbox').innerHTML = renderSQL(data, step.id);
    root.querySelector('.sv-legend').innerHTML = getLegendHTML(step.type);
    root.querySelector('.sv-stepinfo').innerHTML = renderStepInfo(step);
    const tarea = root.querySelector('.sv-tarea');
    tarea.classList.remove('sv-animate');
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add('sv-animate');
    root.querySelector('.sv-rowcount').textContent = step.cnt || '';
    root.querySelector('.sv-ctrls').innerHTML = renderControls(data.steps.length);
  }

  root.__viz = {
    next: () => { if (currentStepIndex < data.steps.length - 1) { currentStepIndex++; renderAll(); } },
    prev: () => { if (currentStepIndex > 0)                     { currentStepIndex--; renderAll(); } },
    goTo: i  => { if (i >= 0 && i < data.steps.length)         { currentStepIndex = i; renderAll(); } }
  };

  root.querySelector('.sv-ctrls').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    if (a === 'prev')      root.__viz.prev();
    else if (a === 'next') root.__viz.next();
    else if (a === 'goto') root.__viz.goTo(Number(btn.dataset.idx));
  });

  renderAll();

  const wasMobileInit = window.innerWidth <= 640;
  root.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobileInit);
}

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足（GROUP BYと集約関数）：</strong><code>GROUP BY</code> は指定した列の値が同じ行を「1つのグループ」にまとめます。まとめた後は、<code>SUM()</code>（合計）や <code>COUNT()</code>（件数）といった集約関数を使って、グループごとの計算結果を出力します。グループ化しない列を SELECT にそのまま書くことはできません。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>月次レポートAPIの基本形：</strong><code>GET /reports/revenue?granularity=monthly</code> のようなエンドポイントに直結するパターン。<code>granularity</code> パラメータに応じて <code>'day'</code>/<code>'week'</code>/<code>'month'</code> を切り替えるだけで日次・週次・月次を対応できる。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>TO_CHAR での表示形式変換：</strong>APIレスポンスで <code>"month": "2024-01"</code> と返したい場合は <code>TO_CHAR(DATE_TRUNC('month', paid_at), 'YYYY-MM')</code> で文字列に変換する。フロントでそのまま表示ラベルに使えて便利。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>インデックスとの相性：</strong><code>paid_at</code> にインデックスを張っても、<code>DATE_TRUNC('month', paid_at)</code> を WHERE で使う場合は関数インデックスが必要。期間絞り込みは <code>WHERE paid_at &gt;= '2024-01-01' AND paid_at &lt; '2024-04-01'</code> のように元の列で範囲指定するほうが高速。</div></div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足（INNER JOIN と LEFT JOIN の違い）：</strong><code>INNER JOIN</code> は両方のテーブルに一致するデータがある行だけを残します。一方、<code>LEFT JOIN</code> は「左側（FROMに書いたテーブル）」の全データを基準とし、右側のテーブルに一致するデータがなくても、行を消さずに右側の列をすべて <code>NULL</code> にして残す結合方法です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ユーザー分析APIの定番：</strong><code>GET /analytics/users/summary</code> では「全ユーザーの購買状況を返す」要件が多い。INNER JOIN では未購入ユーザーが消えてしまうため、LEFT JOIN が必須。このパターンを覚えるだけで「0件ユーザーの取りこぼし」バグが防げる。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>ON 句と WHERE 句のフィルタの違い：</strong>LEFT JOIN の右テーブルへの絞り込み条件は ON に書く。WHERE に書くと NULL 行（=注文なし）が除外されてしまい INNER JOIN と同じ動作になる。「LEFT JOIN なのに結果が少ない」バグの最多原因。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>複数テーブルを LEFT JOIN：</strong>users → orders → reviews と3テーブルを LEFT JOIN する場合も同じ発想。左テーブル（users）の全行を維持しながら右テーブルを順番に繋いでいく。JOIN の順番と ON 条件を慎重に確認すること。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>LEFT JOIN しているのに WHERE で右テーブルの列を絞る：</strong><code>LEFT JOIN orders o ON ... WHERE o.status = 'completed'</code> は o.status が NULL の行（注文なしユーザー）も除外するため INNER JOIN と同じになる。右テーブルの条件は必ず ON 句に書く。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SUM の NULL を COALESCE で変換し忘れる：</strong>注文なしユーザーの SUM は NULL（0ではない）。COALESCE なしで返すと APIレスポンスで <code>"total_amount": null</code> になりフロントがクラッシュする原因になる。</div></div>
</div>

<div class="column-box">
<div class="column-title"><span class="insight-icon">☕</span> 実務での活用コラム：巨大テーブルの LEFT JOIN によるパフォーマンス劣化対策</div>
<div class="column-body">購入履歴（orders）が数千万行ある場合、単純に <code>LEFT JOIN</code> してから <code>GROUP BY</code> すると、一時的な結合データが肥大化しメモリを大量に消費します。実務では「<strong>先に orders テーブル側だけで user_id ごとに COUNT して小さくまとめた CTE</strong>」を作り、それを users テーブルに LEFT JOIN する方が、結合される行数が減少し圧倒的に高速になります。クエリの実行計画（EXPLAIN）を見て遅いと感じたら「先に集約してから結合」を試してみてください。</div>
</div>
`

  premise: `<p><strong>ON CONFLICT</strong>（PostgreSQL）は INSERT 時に一意制約違反が発生した場合の動作を指定します。<strong>DO UPDATE</strong> でUPDATE（UPSERT）、<strong>DO NOTHING</strong> でスキップができます。バッチで集計結果を冪等に書き込む際の必須パターンです。</p>

<span class="kw">DO UPDATE SET</span>
  col2 <span class="op">=</span> <span class="kw">EXCLUDED</span>.col2;          <span class="cmt">-- EXCLUDED: INSERTしようとした値（衝突した新しい値）</span></pre>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足（1対多のJOINによる行の増殖）：</strong>1つの商品に対してタグが2つ、レビューが3つある状態でこれらをすべて同時に <code>LEFT JOIN</code> すると、結果は 2×3 = 6行に増殖（カーテシアン積）してしまいます。これが集計の際に「SUMやCOUNTの数が合わない」原因になります。多対多の場合は結合前に集約（CTEなど）しておくのが基本です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>商品詳細APIの1クエリ化：</strong><code>GET /products/{id}</code> の詳細APIで「タグ配列 + 評価スコア + レビュー数」を別々に3クエリで取得していたなら、このパターンで1クエリに統合できる。フロントに JSON 配列で返したい場合は <code>STRING_AGG</code> の代わりに <code>ARRAY_AGG(tag_name ORDER BY tag_name)</code> を使う。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>FILTER によるピボット集計：</strong><code>COUNT(*) FILTER (WHERE status='A')</code> と <code>COUNT(*) FILTER (WHERE status='B')</code> を同じSELECTに並べると「ステータスAの件数 / ステータスBの件数」をピボット形式で1行に収められる。管理画面のサマリーAPIに最適。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>ARRAY_AGG でJSON配列を直接生成：</strong><code>ARRAY_AGG(tag_name ORDER BY tag_name)</code> は PostgreSQL の配列型を返す。JSONレスポンスでは <code>json_agg</code> や <code>jsonb_agg</code> を使うとネストしたJSONオブジェクトの配列も生成できる。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>ORDER BY なしの STRING_AGG：</strong><code>STRING_AGG(tag_name, ', ')</code> は連結順が保証されず、毎回異なる順序でタグが並ぶ可能性がある。フロントに表示する一覧でUIが変化してしまう。必ず <code>ORDER BY tag_name</code> を指定して順序を固定すること。</div></div>

</div>

<div class="column-box">
<div class="column-title"><span class="insight-icon">☕</span> 実務での活用コラム：JSON関数による完全なデータ構造化</div>
<div class="column-body">現代のAPI開発では <code>STRING_AGG</code> で単なるカンマ区切り文字列にするより、<code>JSON_AGG(JSON_BUILD_OBJECT('id', t.id, 'name', t.tag_name))</code> のように <strong>DB側で直接 JSON 配列を作ってしまう</strong> 手法が主流になりつつあります。これにより、「タグ名自体にカンマが含まれていて分割が壊れる」といったバグを防ぎ、フロントエンド側でパース処理なしでそのまま扱える堅牢なAPIレスポンスが実現します。</div>

  tags: [["r","WITH CTE"],["r","複数CTE"],["o","KPI集計"],["g","BI・分析API"]],
  premise: `<p><strong>WITH CTE（Common Table Expression）</strong> は一時的な名前付き結果セットを定義し、後続のSELECTから名前で参照できます。複雑な集計を「ステップごとに分解」して可読性を上げる必須テクニックです。</p>
<pre><span class="kw">WITH</span>
  cte1 <span class="kw">AS</span> (                         <span class="cmt">-- 最初のCTE: 1ステップ目の結果を定義</span>
    <span class="kw">SELECT</span> col1, <span class="fn">SUM</span>(col2) <span class="kw">AS</span> total
    <span class="kw">FROM</span> <span class="tbl">table_a</span>
    <span class="kw">GROUP BY</span> col1
  ),
  cte2 <span class="kw">AS</span> (                         <span class="cmt">-- 2番目のCTE: cte1 を参照できる</span>
    <span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> cte1
    <span class="kw">WHERE</span> total <span class="op">&gt;</span> <span class="num">1000</span>
  )
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> cte2;               <span class="cmt">-- 最終クエリ: CTE を参照</span></pre>
<div class="callout ok"><strong>CTE の利点：</strong>①長いサブクエリをネストせず上から読める ②同じ中間結果を複数箇所で再利用できる ③デバッグ時にCTEごとに単独実行して確認できる。BIクエリでは「生データ収集 → フィルタ → 集計 → ランキング」をCTEで段階的に書くのが実務標準。</div>`,
  question: `<p>以下の3ステップのKPI集計をCTEで分解して書いてください。<br>①月次売上（<code>monthly_revenue</code>）を集計 → ②前月比（growth_pct）を計算 → ③成長率が10%以上の月と10%未満の月でタイプを分けて返す（<code>growth_type</code>）。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ payments（succeeded のみ集計対象）</div>

        <tr><th>payment_id</th><th>amount</th><th>status</th><th>paid_at</th></tr>
        <tr><td>1</td><td>80000</td><td>succeeded</td><td>2024-01-15</td></tr>
        <tr><td>2</td><td>20000</td><td>succeeded</td><td>2024-01-28</td></tr>
        <tr><td>3</td><td>120000</td><td>succeeded</td><td>2024-02-10</td></tr>
        <tr><td>4</td><td>10000</td><td>failed</td><td>2024-02-20</td></tr>
        <tr><td>5</td><td>99000</td><td>succeeded</td><td>2024-03-05</td></tr>
        <tr><td>6</td><td>51000</td><td>succeeded</td><td>2024-03-22</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>3ステップを CTE で分解した最終結果：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>month</th><th>revenue</th><th class="tc-o">prev_revenue</th><th class="tc-p">growth_pct</th><th class="tc-g">growth_type</th></tr>
<tr><td>2024-01-01</td><td>100000</td><td class="null">NULL</td><td class="null">NULL</td><td class="tc-g">基準月</td></tr>
<tr class="tr-hi3"><td>2024-02-01</td><td>120000</td><td class="tc-o">100000</td><td class="tc-p">+20.0</td><td class="tc-g">急成長</td></tr>
<tr class="tr-hi4"><td>2024-03-01</td><td>150000</td><td class="tc-o">120000</td><td class="tc-p">+25.0</td><td class="tc-g">急成長</td></tr>
</table></div>`,
  answer: `<pre><span class="kw">WITH</span>                                <span class="cmt">-- WITH句: 一時的な名前付き結果セット(CTE)を定義する（超基礎）</span>

<span class="cmt">-- ① 月次売上集計: DATE_TRUNC で月ごとに GROUP BY（Q2で学んだパターン）</span>
monthly_revenue <span class="kw">AS</span> (                <span class="cmt">-- 1つ目のCTEの名前を定義</span>
  <span class="kw">SELECT</span>                            <span class="cmt">-- 列を指定（超基礎）</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, paid_at) <span class="kw">AS</span> month,  <span class="cmt">-- 月の先頭日に切り捨て</span>
    <span class="fn">SUM</span>(amount)                  <span class="kw">AS</span> revenue <span class="cmt">-- 月次売上合計</span>
  <span class="kw">FROM</span>   <span class="tbl">payments</span>                   <span class="cmt">-- テーブルを指定（超基礎）</span>
  <span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'succeeded'</span>       <span class="cmt">-- 成功した決済のみに絞り込む（超基礎）</span>
  <span class="kw">GROUP BY</span>
    <span class="fn">DATE_TRUNC</span>(<span class="str">'month'</span>, paid_at)    <span class="cmt">-- 月ごとにグループ化</span>
),                                  <span class="cmt">-- カンマで複数のCTEを繋ぐ</span>

<span class="cmt">-- ② 前月比計算: LAG で前月売上を取得し growth_pct を算出（Q3で学んだパターン）</span>
with_growth <span class="kw">AS</span> (                    <span class="cmt">-- 2つ目のCTE</span>
  <span class="kw">SELECT</span>
    month,                          <span class="cmt">-- 月（1つ目のCTEから引き継ぐ）</span>
    revenue,                        <span class="cmt">-- 今月の売上</span>

    <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (          <span class="cmt">-- 1行前の値を取得</span>
      <span class="kw">ORDER BY</span> month                <span class="cmt">-- 月昇順で前月値を取得</span>
    ) <span class="kw">AS</span> prev_revenue,              <span class="cmt">-- 前月売上（先頭月はNULL）</span>

    <span class="fn">ROUND</span>(
      (revenue <span class="op">-</span> <span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month))
      <span class="op">/</span> <span class="fn">NULLIF</span>(<span class="fn">LAG</span>(revenue, <span class="num">1</span>) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month), <span class="num">0</span>)
      <span class="op">*</span> <span class="num">100.0</span>,                      <span class="cmt">-- 100.0 で浮動小数点演算に</span>
      <span class="num">1</span>                             <span class="cmt">-- 小数点以下1桁に丸める</span>
    ) <span class="kw">AS</span> growth_pct                 <span class="cmt">-- 前月比成長率（%）</span>

  <span class="kw">FROM</span> monthly_revenue              <span class="cmt">-- ★重要: ① で作った CTE をテーブルのように参照する</span>
),

<span class="cmt">-- ③ 成長タイプ分類: CASE WHEN で growth_pct の値に応じてラベルを付与</span>
with_type <span class="kw">AS</span> (                      <span class="cmt">-- 3つ目のCTE</span>
  <span class="kw">SELECT</span>
    month,
    revenue,
    prev_revenue,
    growth_pct,

    <span class="cmt">-- CASE WHEN: 条件によって返す値を分岐させる（超基礎）</span>
    <span class="kw">CASE</span>
      <span class="kw">WHEN</span> growth_pct <span class="kw">IS NULL</span>       <span class="cmt">-- 前月データなし（先頭月）</span>
        <span class="kw">THEN</span> <span class="str">'基準月'</span>
      <span class="kw">WHEN</span> growth_pct <span class="op">&gt;=</span> <span class="num">10</span>         <span class="cmt">-- 10%以上の成長</span>
        <span class="kw">THEN</span> <span class="str">'急成長'</span>
      <span class="kw">WHEN</span> growth_pct <span class="op">&gt;=</span> <span class="num">0</span>          <span class="cmt">-- 0%以上10%未満の成長</span>
        <span class="kw">THEN</span> <span class="str">'微増'</span>
      <span class="kw">ELSE</span>                          <span class="cmt">-- それ以外(0%未満：マイナス)</span>
        <span class="str">'減少'</span>
    <span class="kw">END</span> <span class="kw">AS</span> growth_type              <span class="cmt">-- タイプラベル</span>

  <span class="kw">FROM</span> with_growth                  <span class="cmt">-- ★重要: ② で作った CTE を参照する</span>
)

<span class="cmt">-- 最終SELECT: ③ の CTE を全列取得・月昇順で返す</span>
<span class="kw">SELECT</span> <span class="op">*</span> <span class="kw">FROM</span> with_type             <span class="cmt">-- 最後に with_type から全列(*)を取得する（超基礎）</span>
<span class="kw">ORDER BY</span> month <span class="kw">ASC</span>;                 <span class="cmt">-- 最終結果を月昇順(ASC)で出力（超基礎）</span>

<span class="cmt">/*
  実行順序（CTE は上から順に評価される）:
  1. payments → WHERE succeeded → DATE_TRUNC月次集計
       → monthly_revenue: 1月=100000, 2月=120000, 3月=150000
  2. monthly_revenue → LAG前月値 → ROUND成長率

  3. with_growth → CASE WHEN でタイプ分類
       → with_type: 1月(基準月), 2月(急成長), 3月(急成長)
  4. SELECT * FROM with_type ORDER BY month ASC → 最終結果を取得・並び替え
  ★ CTEは上から下へ順番に評価され、後のCTEは前のCTEを参照できる
  ★ サブクエリのネストと違い、各ステップを独立して読める・デバッグできる
*/</span></pre>`,

        type: "select",
        cols: ["month","revenue","prev_revenue","growth_pct","growth_type"],

        rows: [

    ],
    sql: [
      { t: "WITH\n", k: "sql-kw", h: "group agg where select" },

      { t: "with_growth ", k: "", h: "agg" },
      { t: "AS", k: "sql-kw", h: "agg" },
      { t: " (\n  SELECT month, revenue, LAG(revenue,1) ", k: "", h: "agg" },
      { t: "OVER", k: "sql-kw", h: "agg" },
      { t: " (ORDER BY month) AS prev_revenue,\n  ROUND(...) AS growth_pct\n  FROM monthly_revenue\n),\n", k: "", h: "agg" },
      { t: "with_type ", k: "", h: "where" },

      { t: " WHEN growth_pct IS NULL THEN \'\u57fa\u6e96\u6708\'\n    WHEN growth_pct>=10 THEN \'\u6025\u6210\u9577\'\n    ELSE \'\u5b89\u5b9a\u6210\u9577\' END AS growth_type\n  FROM with_growth\n)\n", k: "", h: "where" },

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎補足（サブクエリとCTE）：</strong><code>SELECT * FROM (SELECT * FROM table)</code> のようにFROM句の中に直接書くのがサブクエリです。対して <code>WITH name AS (SELECT * FROM table)</code> と先頭に定義して名前を付けるのがCTEです。結果は同じですが、CTEのほうが「上から下へ」処理の流れ通りに読めるため、複雑なクエリで圧倒的に読みやすくなります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>BI集計SQLはCTEで分解するのが実務標準：</strong>本番のダッシュボードAPIでは「生データ取得 → フィルタ・変換 → 集計 → ランキング・ラベル付け」の4〜6ステップをCTEで書く。サブクエリのネストと異なり、各CTEを単独でSELECTしてデバッグできる点が大きな利点。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>CTEの再利用：</strong>同じCTEを最終SELECT内で複数回 JOIN することもできる。例えば <code>WITH base AS (...)</code> を定義して <code>SELECT a.month, b.revenue FROM base a JOIN base b ON ...</code> のように自己参照も可能（再帰CTEは <code>WITH RECURSIVE</code>）。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>このクエリで学んだパターンの組み合わせ：</strong>Q2（DATE_TRUNC月次集計）+ Q3（LAG前月比）+ Q10（CTE分解）を1本のクエリに統合した形がこの問題。個々のパターンを理解した上で組み合わせることで、実務レベルのBI集計クエリが書けるようになる。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTEを使わずサブクエリを多重ネストする：</strong>同じロジックをサブクエリで書くと <code>SELECT * FROM (SELECT * FROM (SELECT ...) sub1) sub2 WHERE ...</code> と右にどんどんネストして可読性が壊滅する。3ステップ以上の集計は必ずCTEで書くこと。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTEを1か所でしか使わないのに乱用する：</strong>1か所でしか参照しない簡単なサブクエリをすべてCTEにすると逆に冗長になる。CTEは「①同じ結果を複数箇所で再利用 ②可読性が明らかに上がる ③複雑な多段階集計」の場合に限って使うのが適切。</div></div>
</div>

<div class="column-box">
<div class="column-title"><span class="insight-icon">☕</span> 実務での活用コラム：CTEのパフォーマンスとマテリアライズ</div>
<div class="column-body">PostgreSQL 12 以降、CTE はデフォルトで「インライン展開」されるようになり、最適化が効きやすくなりました。しかし、重い処理を行う CTE を後続で複数回参照する場合、毎回その重い処理が走ってしまうことがあります。その際は <code>WITH cte_name AS MATERIALIZED (...)</code> と <strong>MATERIALIZED キーワードを明示</strong> することで、CTEの結果を一時テーブルとしてキャッシュさせ、クエリ全体の実行時間を劇的に短縮できる場合があります。</div>
</div>
`
}

];

function acc(icon, pillClass, pillText, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillClass}">${pillText}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p', fn:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力例','期待出力',q.output)}
      ${acc('✅','pill-red','模範回答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',`<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>${q.explain}`)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => { if (q.viz) initVisualizer(document.getElementById('viz-' + i), q.viz); });
  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});

let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});

</script>
