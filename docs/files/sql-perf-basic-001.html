  .tc-p  { color: var(--purple) !important; font-weight: 700; }
  .tc-y  { color: var(--yellow) !important; font-weight: 700; }
  .tc-o  { color: var(--orange) !important; font-weight: 700; }
  .tc-r  { color: var(--red)    !important; font-weight: 700; }

  .arrow { text-align: center; padding: 4px 0; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .arrow-text { color: var(--dim); font-size: 11px; }

  .insight-box {
    background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px;

  .insight-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

  }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code { font-size: 11px; }

  .column-box {
    background: #0d1520; border: 1px solid #1c3550; border-radius: 8px;
    padding: 14px 16px; margin-top: 10px;

  }
  .column-title {
    font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: 0.5px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;

  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }

  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  @media (max-width:520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title { font-size: 15px; }
    pre { font-size: 11px; padding: 10px; }

    main { padding: 16px 10px 60px; }
    .data-tables { flex-direction: column; }

</style>

<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">PERF</span></div>
      <div class="header-text-wrap">
        <div class="header-title">パフォーマンス最適化で学ぶ SQL 基礎10選（INDEX／EXPLAIN／SARGable／EXISTS／部分INDEX／カバリングINDEX／複合INDEX／統計情報／クエリリライト編）</div>

</div>

<main id="mainContent"></main>

<script>
const QS = [

/* ══════════════════════════════════════════════════
   Q1  インデックスの基本 — CREATE INDEX / Seq Scan vs Index Scan
══════════════════════════════════════════════════ */
{
  num: 1,
  title: "CREATE INDEX — シーケンシャルスキャンとインデックススキャンの違い",
  tags: [["r","INDEX"],["r","CREATE INDEX"],["o","Seq Scan"],["g","Index Scan"]],
  premise: `<p><strong>インデックス（索引）</strong>とは、特定の列の値を「どの物理位置に格納されているか」を記録したデータ構造です。本の巻末索引と同じ仕組みで、目的の行を<em>全ページを読まずに</em>素早く見つけられます。</p>
<pre><span class="cmt">-- インデックスを作成する基本構文</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_id        <span class="cmt">-- インデックス名（慣習: idx_テーブル名_列名）</span>
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id);              <span class="cmt">-- 対象テーブルと列を指定</span>

<span class="cmt">-- 不要になったインデックスを削除する</span>
<span class="kw">DROP INDEX</span> idx_orders_user_id;        <span class="cmt">-- インデックス名を指定して削除</span></pre>
<div class="callout"><strong>2種類のスキャン方法：</strong><br>
・<code>Seq Scan（シーケンシャルスキャン）</code> → テーブルを先頭から末尾まで全行読む。小テーブルや大量行を返すときは速い。<br>
・<code>Index Scan（インデックススキャン）</code> → インデックスで位置を特定してから必要な行だけ読む。少数行を返すときに圧倒的に速い。</div>
<p>インデックスは<em>自動的には作成されない</em>（PRIMARY KEY / UNIQUE 制約は例外）。WHERE句や JOIN ON で頻繁に使う列には積極的に作成します。</p>`,
  question: `<p><code>orders</code> テーブルには100万件のデータが入っています。<em>user_id = 'U001' の注文だけを取得するクエリ</em>が遅い原因を調べ、適切なインデックスを作成してください。また、インデックス作成前後でスキャン方法がどう変わるかも説明してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル（簡略）</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（100万行）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id (PK)</th><th>user_id</th><th>amount</th><th>status</th><th>created_at</th></tr>
        <tr><td>1</td><td>U001</td><td>3000</td><td>completed</td><td>2024-01-10</td></tr>
        <tr><td>2</td><td>U002</td><td>5000</td><td>pending</td><td>2024-01-11</td></tr>
        <tr><td>3</td><td>U001</td><td>1200</td><td>completed</td><td>2024-01-12</td></tr>
        <tr><td class="null">…</td><td class="null">…</td><td class="null">…</td><td class="null">…</td><td class="null">…</td></tr>
      </table></div>
    </div>
  </div>
</div>
<p>遅いクエリ（インデックスなし）：</p>
<pre><span class="kw">SELECT</span> order_id, amount, status
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>;           <span class="cmt">-- user_id に何もインデックスがない状態</span></pre>`,
  output: `<p>期待する成果物：<em>インデックス作成SQL</em> と、<em>スキャン変化の説明</em></p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>状態</th><th>スキャン種別</th><th>読込行数</th><th>速度感</th></tr>
<tr class="tr-hi"><td class="tc-r">インデックスなし</td><td class="tc-r">Seq Scan</td><td class="tc-r">100万行（全件）</td><td class="tc-r">遅い</td></tr>
<tr class="tr-hi2"><td class="tc-g">インデックスあり</td><td class="tc-g">Index Scan</td><td class="tc-g">数十行（対象のみ）</td><td class="tc-g">高速</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① インデックス作成（user_id列に対してBTreeインデックスを作る）</span>
<span class="kw">CREATE INDEX</span> idx_orders_user_id    <span class="cmt">-- 【超基礎】インデックスの名前（任意だが命名規則を統一する）</span>
    <span class="kw">ON</span> <span class="tbl">orders</span> (user_id);          <span class="cmt">-- 【超基礎】どのテーブルのどの列にインデックスを張るか</span>

<span class="cmt">-- ② インデックス作成後も、クエリ自体は変わらない</span>
<span class="kw">SELECT</span> order_id, amount, status   <span class="cmt">-- 【超基礎】必要な列だけ指定（SELECT * は使わない）</span>
<span class="kw">FROM</span>   <span class="tbl">orders</span>                    <span class="cmt">-- 【超基礎】対象テーブル</span>
<span class="kw">WHERE</span>  user_id <span class="op">=</span> <span class="str">'U001'</span>;         <span class="cmt">-- 【超基礎】インデックスが張られた列で絞り込む → Index Scan が発動</span>

<span class="cmt">/*
  実行順序（SQLの論理的な評価順）:
  1. FROM orders              → 【超基礎】テーブルを参照
  2. Index Scan on user_id   → 【超基礎】インデックスで 'U001' の物理位置を特定（全件を読まない）
  3. WHERE user_id = 'U001'  → 【超基礎】インデックスで絞り込まれた行だけ取得
  4. SELECT order_id, ...    → 【超基礎】必要な列だけ返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>インデックスなし → Seq Scan（全100万行をスキャン）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>読込順</th><th>order_id</th><th>user_id</th><th>条件一致？</th></tr>
<tr><td>1行目</td><td>1</td><td>U001</td><td class="tc-g">✓ 返す</td></tr>
<tr><td>2行目</td><td>2</td><td>U002</td><td class="tc-r">✗ 読み捨て</td></tr>
<tr><td>3行目</td><td>3</td><td>U001</td><td class="tc-g">✓ 返す</td></tr>
<tr class="tr-dim"><td class="null">…</td><td class="null">…</td><td class="null">…</td><td class="null">100万行まで全部読む</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">CREATE INDEX idx_orders_user_id ON orders (user_id) を実行</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>インデックスあり → Index Scan（対象行の物理位置を直接特定）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>インデックス（BTree）</th><th>user_id</th><th>物理位置(ctid)</th></tr>
<tr class="tr-hi2"><td>インデックスエントリ</td><td class="tc-g">U001</td><td class="tc-g">→ Page4/Row1, Page7/Row3 … のみ取得</td></tr>
<tr class="tr-dim"><td>（スキップ）</td><td class="tc-r">U002〜U999</td><td class="tc-r">読まない</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>インデックスは「列の値 → 行の物理位置」を記録した索引です。WHEREで絞り込む列にインデックスがあると、DB全行を読む（Seq Scan）ではなく、該当行の場所だけを素早く特定（Index Scan）できるためクエリが劇的に速くなります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>インデックスが効く列の目安：</strong>① WHERE句で等値・範囲検索する列、② JOIN ON で結合キーとなる列、③ ORDER BY・GROUP BY で頻繁に使う列。PRIMARY KEY と UNIQUE 制約には自動でインデックスが作られます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>インデックスのコスト：</strong>インデックスはINSERT/UPDATE/DELETE のたびに更新されるため、書き込みが多いテーブルでは書き込みが遅くなります。「読み取り頻度が高い列」に絞って作成するのが基本方針です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>Seq Scan が選ばれる場合：</strong>テーブルが小さい（数百行程度）か、返す行が全体の10〜15%を超える場合、DBオプティマイザはあえてSeq Scanを選ぶことがあります。インデックスを張っても使われないケースがある点を覚えておきましょう。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>全ての列にインデックスを張る：</strong>インデックスが多すぎるとINSERT/UPDATE/DELETEが遅くなります。バッチ処理で大量書き込みをするテーブルにはインデックスを最小限にとどめ、書き込み完了後にインデックスを再構築するパターンもあります。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>インデックスを張ったのに使われない：</strong><code>WHERE UPPER(email) = 'TEST@EXAMPLE.COM'</code> のように列に関数を適用するとインデックスが無効化されます（後述Q3参照）。また、カーディナリティ（値の種類数）が極端に低い列（例：is_deleted に true/false しかない）はインデックスの効果が薄いです。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：インデックスはいつ作るか</div>
<div class="column-body">
開発初期に全てのインデックスを先読みして設計するのは困難です。実務では<strong>「スロークエリログを監視して、実際に遅いクエリの WHERE／JOIN 列にインデックスを追加する」</strong>リアクティブなアプローチが主流です。PostgreSQL では <code>pg_stat_statements</code>、MySQLでは <code>slow_query_log</code> を使い、本番環境のクエリパターンを定期的にレビューする習慣が品質維持の鍵になります。
</div>
</div>
`
},

{

  title: "SARGable条件 — インデックスを殺すWHERE句の書き方と回避策",
  tags: [["r","SARGable"],["r","WHERE"],["o","インデックス無効化"],["g","リライト"]],
  premise: `<p><strong>SARGable（Search ARGument ABLE）</strong>とは、DBオプティマイザがインデックスを活用できる条件式の性質のことです。「SARGable でない」条件を書くと、インデックスがあっても必ずSeq Scanになります。</p>
<div class="callout warn"><strong>インデックスが無効化される代表パターン：</strong><br>
① <code>WHERE UPPER(email) = 'TEST@…'</code> — 列に関数を適用<br>
② <code>WHERE amount + 1000 > 5000</code> — 列を演算に使用<br>
③ <code>WHERE status LIKE '%complete%'</code> — 前方一致でない LIKE（先頭が %）<br>
④ <code>WHERE CAST(user_id AS TEXT) = '123'</code> — 暗黙の型変換</div>
<p>解決策は<em>「列には手を加えず、比較対象の定数側を変換する」</em>か、<em>関数インデックス（式インデックス）</em>を使うことです。</p>`,
  question: `<p>以下の3つの「遅いWHERE句」を、インデックスが有効になるように書き直してください。<code>users</code> テーブルには <code>email</code>・<code>created_at</code>・<code>status</code> の3列にインデックスが作成済みです。</p>
<pre><span class="cmt">-- NG-1: email 列に LOWER() を適用（インデックス無効）</span>
<span class="kw">WHERE</span> <span class="fn">LOWER</span>(email) <span class="op">=</span> <span class="str">'test@example.com'</span>

<span class="cmt">-- NG-2: 日付列に DATE() を適用（インデックス無効）</span>
<span class="kw">WHERE</span> <span class="fn">DATE</span>(created_at) <span class="op">=</span> <span class="str">'2024-06-01'</span>

<span class="cmt">-- NG-3: 文字列の前方に % を使った LIKE（インデックス無効）</span>
<span class="kw">WHERE</span> status <span class="kw">LIKE</span> <span class="str">'%active%'</span></pre>`,
  output: `<p>SARGable に書き直した3つの条件：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>#</th><th class="tc-r">NG（インデックス無効）</th><th class="tc-g">OK（インデックス有効）</th></tr>
<tr><td>1</td><td class="tc-r">LOWER(email) = '…'</td><td class="tc-g">email = LOWER('…') または 関数インデックス</td></tr>
<tr><td>2</td><td class="tc-r">DATE(created_at) = '2024-06-01'</td><td class="tc-g">created_at >= '…' AND created_at &lt; '…'</td></tr>
<tr><td>3</td><td class="tc-r">status LIKE '%active%'</td><td class="tc-g">status = 'active' （完全一致に変更）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- NG-1の修正：列に関数を使わず、定数側を変換する</span>
<span class="cmt">-- ❌ NG: LOWER(email) = 'test@example.com'  ← 全行に関数を適用してからIndex参照</span>
<span class="kw">WHERE</span> email <span class="op">=</span> <span class="fn">LOWER</span>(<span class="str">'TEST@EXAMPLE.COM'</span>)   <span class="cmt">-- ✅ OK: 定数側を変換。列は加工しない</span>

<span class="cmt">-- さらに良い方法: 関数インデックス（式インデックス）を作成して元のクエリを活かす</span>
<span class="kw">CREATE INDEX</span> idx_users_email_lower
    <span class="kw">ON</span> <span class="tbl">users</span> (<span class="fn">LOWER</span>(email));             <span class="cmt">-- 列の加工済み値でインデックスを作る</span>
<span class="cmt">-- 上記後なら LOWER(email) = '…' でもインデックスが効く</span>

<span class="cmt">-- NG-2の修正：DATE()を使わず範囲指定に変換する</span>
<span class="cmt">-- ❌ NG: DATE(created_at) = '2024-06-01'  ← 全行にDATE()を適用</span>
<span class="kw">WHERE</span> created_at <span class="op">&gt;=</span> <span class="str">'2024-06-01 00:00:00'</span>   <span class="cmt">-- ✅ OK: 範囲の開始点</span>
  <span class="kw">AND</span> created_at  <span class="op">&lt;</span>  <span class="str">'2024-06-02 00:00:00'</span>   <span class="cmt">-- ✅ OK: 翌日00:00未満で1日分を切り取る</span>

<span class="cmt">-- NG-3の修正：前後の%をなくし完全一致か前方一致に変える</span>
<span class="cmt">-- ❌ NG: status LIKE '%active%'  ← 先頭に%があるとBTreeインデックスが使えない</span>
<span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'active'</span>                    <span class="cmt">-- ✅ OK: 完全一致ならIndex Scan が有効</span>
<span class="cmt">-- もし部分一致が必須なら全文検索インデックス(GINなど)を使う</span>

<span class="cmt">/*
  実行順序（各クエリ共通）:
  1. FROM users              → テーブル参照
  2. インデックス評価         → SARGable条件なら Index Scan / 非SARGableなら Seq Scan
  3. WHERE フィルタ適用       → 条件を満たす行だけ絞り込む
  4. SELECT 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>なぜ「列への関数適用」がインデックスを無効にするのか</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>インデックス（emailのBTree）</th><th>格納されている値</th></tr>
<tr><td>インデックスエントリ1</td><td>admin@example.com</td></tr>
<tr><td>インデックスエントリ2</td><td>test@example.com</td></tr>
<tr><td>インデックスエントリ3</td><td>user@example.com</td></tr>
</table></div>
<p style="font-size:12px;margin-top:6px;color:var(--dim)">インデックスは<span style="color:var(--tbl)">元の値</span>で作られている。<code>LOWER(email)</code>のように列を加工すると「加工後の値」と一致するエントリがインデックスにないためSeq Scanになる。</p>
</div>

<div class="arrow">↓ <span class="arrow-text">定数側を変換すれば列の値はそのままなのでインデックスが使える</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>SARGable vs 非SARGable の対照表</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>パターン</th><th class="tc-r">非SARGable（❌）</th><th class="tc-g">SARGable（✅）</th></tr>
<tr><td>文字列変換</td><td class="tc-r">LOWER(col) = 'abc'</td><td class="tc-g">col = LOWER('ABC')</td></tr>
<tr><td>日付変換</td><td class="tc-r">DATE(col) = '2024-01-01'</td><td class="tc-g">col >= '2024-01-01' AND col &lt; '2024-01-02'</td></tr>
<tr><td>算術演算</td><td class="tc-r">col * 2 &gt; 100</td><td class="tc-g">col &gt; 50</td></tr>
<tr><td>LIKE</td><td class="tc-r">col LIKE '%word%'</td><td class="tc-g">col LIKE 'word%'（前方一致のみ可）</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>インデックスは「元の列の値」をキーに作られています。WHERE句で列の値を加工してしまうと、加工前の値でしか検索できないインデックスが「使えない」状態になります。ルールは単純で「<em>列はそのまま、加工するなら定数側を変える</em>」です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>関数インデックス（式インデックス）：</strong>どうしても列に関数を使う必要がある場合は、<code>CREATE INDEX ON users (LOWER(email))</code> のように加工後の値でインデックスを作成します。アプリ側のクエリを変えられない場合に有効な手段です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>LIKE '%xxx%' の代替：</strong>前後に % が必要な全文検索は、BTreeインデックスでは対応できません。PostgreSQLなら <code>pg_trgm</code> 拡張のGINインデックス、専用全文検索エンジン（Elasticsearch等）を使うのが実務の正解です。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>型の不一致による暗黙変換：</strong><code>WHERE user_id = 123</code> で user_id がVARCHAR型の場合、DBは暗黙的に <code>CAST(user_id AS INTEGER)</code> を行いSeq Scanになります。型を合わせて <code>WHERE user_id = '123'</code> と書くか、列の型定義を見直すことが大切です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>NULL 判定に = を使う：</strong><code>WHERE col = NULL</code> は常に FALSE（SQLにおけるNULLは「= で比較できない不明な値」）。<code>WHERE col IS NULL</code> と書く必要があります。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：ORMが生成するSQLに潜むSARGable問題</div>
<div class="column-body">
RailsのActiveRecordやDjangoのORMは便利ですが、日付フィルタリングなどで <code>DATE(created_at) = ?</code> のような非SARGableなSQLを自動生成することがあります。特にデータ量が増えてから発覚するため、<strong>機能リリース前にスロークエリが起きやすいエンドポイントのSQLをEXPLAIN ANALYZEで確認する</strong>ことをチームの習慣にしておくと、本番トラブルを未然に防げます。
</div>
</div>
`

<div class="arrow">↓ <span class="arrow-text">カバリングインデックスなら②のテーブルアクセスが消える</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>Index Only Scan：インデックスだけで完結（テーブルを読まない）</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>インデックス（カバリング）</th><th>user_id</th><th>status</th><th>order_id(付録)</th><th>amount(付録)</th><th>created_at(付録)</th></tr>
<tr class="tr-hi2"><td>エントリ1</td><td class="tc-g">U001</td><td class="tc-g">completed</td><td>101</td><td>3000</td><td>2024-01-10</td></tr>
<tr class="tr-hi2"><td>エントリ2</td><td class="tc-g">U001</td><td class="tc-g">completed</td><td>203</td><td>5000</td><td>2024-01-15</td></tr>
</table></div>
<p style="font-size:12px;margin-top:6px;color:var(--dim)">SELECTに必要な全列がインデックス内にあるため<span style="color:var(--green)">テーブル本体を読む必要がない</span>。</p>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong><code>SELECT *</code> は手軽ですが「本当に必要な列だけ指定する」ことがSQLの基本です。必要な列を明示することで①データ転送量削減、②カバリングインデックス活用、③コードの意図が明確になる、という3つのメリットがあります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>INCLUDE句（PostgreSQL 11以降）：</strong><code>INCLUDE(col)</code> で追加した列はBTreeのキー構造には影響せず、「インデックスリーフページに付録として乗せる」だけです。ORDER BY・JOIN ON・WHERE には使えませんが、SELECT専用の列を低コストで含められます。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>大きな列（TEXT/JSONB/BLOB）をSELECT *で取得するコスト：</strong>大きな列はメモリや通信帯域を大量に消費します。APIが不要な列まで毎回取得していると、スループット（同時処理件数）が大幅に低下します。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>全列をINCLUDEに入れてカバリングインデックスを作る：</strong>INCLUDE列が増えすぎるとインデックスサイズが肥大化し、メモリに乗りにくくなります。「よく使うクエリで必要な列」に絞ることが重要です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>SELECT * をORMの「お手軽取得」として常用する：</strong>ActiveRecordの <code>Model.all</code> や DjangoのORM デフォルトは全列取得です。必要な列だけ取る <code>.only(:id, :name)</code> や <code>.values('id', 'name')</code> を意識的に使いましょう。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：APIのレスポンス設計とSQLの列選択</div>
<div class="column-body">
APIのレスポンスを設計する際に「とりあえず全列返す」にしてしまうと、後からフィールドを追加・変更するたびにクライアントへの影響が出ます。<strong>「APIレスポンスに必要な列だけをSQLのSELECTに書く」</strong>設計原則は、パフォーマンスとAPI設計品質の両方を同時に高めます。GraphQLのようにクライアントが必要フィールドを指定できる仕組みとも相性が良く、バックエンドで「リクエストされたフィールドのみSELECTする」動的クエリ生成パターンにもつながります。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q6  EXISTS vs IN — 大量データでの使い分け
══════════════════════════════════════════════════ */
{
  num: 6,
  title: "EXISTS vs IN — 大量データでの相関サブクエリの使い分け",
  tags: [["r","EXISTS"],["r","IN"],["o","サブクエリ"],["g","パフォーマンス比較"]],
  premise: `<p><strong>EXISTS</strong> と <strong>IN</strong> はどちらも「別テーブルとの存在確認」に使いますが、データ量や状況によってパフォーマンスが大きく異なります。</p>
<pre><span class="cmt">-- IN を使った書き方</span>
<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">users</span>
<span class="kw">WHERE</span>  user_id <span class="kw">IN</span> (<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">orders</span>);

<span class="cmt">-- EXISTS を使った書き方</span>
<span class="kw">SELECT</span> user_id <span class="kw">FROM</span> <span class="tbl">users</span> u
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (
    <span class="kw">SELECT</span> <span class="num">1</span>                          <span class="cmt">-- EXISTS は存在確認だけなので SELECT 1 が慣習</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span> o
    <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id     <span class="cmt">-- 外側の行と突き合わせる「相関サブクエリ」</span>
);</pre>
<div class="callout warn"><strong>INとEXISTSの挙動の違い：</strong><br>
・<code>IN</code>：サブクエリを全件実行してリストを作り、外側の値がそのリストに含まれるか判定。リストにNULLが含まれると予期しない結果になる。<br>
・<code>EXISTS</code>：1件でも条件に合致すればTRUEで即座に次の行へ進む（Short-circuit）。NULLに対して安全。</div>`,
  question: `<p><code>users</code>（10万件）と <code>orders</code>（500万件）のテーブルで、<em>注文を1件以上持つユーザー</em>を取得してください。INとEXISTSの両方で書き、<em>パフォーマンスの観点からどちらが推奨か</em>を説明してください。</p>
<div class="data-section">
  <div class="data-label">使用テーブル</div>
  <div class="data-tables">
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ users（10万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>user_id(PK)</th><th>name</th></tr>
        <tr><td>U001</td><td>田中</td></tr>
        <tr><td>U002</td><td>鈴木</td></tr>
        <tr><td>U003</td><td>佐藤</td></tr>
      </table></div>
    </div>
    <div class="data-tbl-wrap">
      <div class="data-tbl-name">▸ orders（500万件）</div>
      <div class="tbl-wrap"><table class="vtbl">
        <tr><th>order_id(PK)</th><th>user_id</th><th>amount</th></tr>
        <tr><td>1</td><td>U001</td><td>3000</td></tr>
        <tr><td>2</td><td>U001</td><td>5000</td></tr>
        <tr><td>3</td><td>U003</td><td>1500</td></tr>
      </table></div>
    </div>
  </div>
</div>`,
  output: `<p>注文を1件以上持つユーザー（U002は注文なし → 除外）：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>user_id</th><th>name</th></tr>
<tr class="tr-hi2"><td>U001</td><td>田中</td></tr>
<tr class="tr-hi2"><td>U003</td><td>佐藤</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① IN を使った書き方（わかりやすいが大規模サブクエリは注意）</span>
<span class="kw">SELECT</span> user_id, name              <span class="cmt">-- 【超基礎】取得する列を明示</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>
<span class="kw">WHERE</span>  user_id <span class="kw">IN</span> (              <span class="cmt">-- 【超基礎】サブクエリが返す値のリストに含まれる行を取得</span>
    <span class="kw">SELECT</span> user_id               <span class="cmt">-- 【超基礎】サブクエリ: ordersから全user_idを取得</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span>               <span class="cmt">-- 500万件全件を読んでリストを生成 → メモリを使う</span>
);

<span class="cmt">-- ② EXISTS を使った書き方（大規模テーブルで推奨）</span>
<span class="kw">SELECT</span> u.user_id, u.name         <span class="cmt">-- 【超基礎】外側テーブルの列を取得</span>
<span class="kw">FROM</span>   <span class="tbl">users</span> u                  <span class="cmt">-- 【超基礎】メインのテーブル（エイリアス u）</span>
<span class="kw">WHERE</span>  <span class="kw">EXISTS</span> (                  <span class="cmt">-- 【超基礎】サブクエリが1件でも返せばTRUE</span>
    <span class="kw">SELECT</span> <span class="num">1</span>                    <span class="cmt">-- 【超基礎】存在確認だけなので値は何でもよい（1が慣習）</span>
    <span class="kw">FROM</span>   <span class="tbl">orders</span> o             <span class="cmt">-- 【超基礎】サブクエリ内のテーブル（エイリアス o）</span>
    <span class="kw">WHERE</span>  o.user_id <span class="op">=</span> u.user_id <span class="cmt">-- 【超基礎】外側の u.user_id と内側の o.user_id を突き合わせる（相関）</span>
);                               <span class="cmt">-- 1件でも見つかれば即座にTRUE → 残りは読まない（Short-circuit）</span>

<span class="cmt">-- ③ JOINを使った代替（モダンなオプティマイザでは同等か速いことも）</span>
<span class="kw">SELECT DISTINCT</span> u.user_id, u.name <span class="cmt">-- DISTINCT で重複を除去（複数注文のユーザーが重複しないよう）</span>
<span class="kw">FROM</span>   <span class="tbl">users</span>  u
<span class="kw">JOIN</span>   <span class="tbl">orders</span> o <span class="kw">ON</span> o.user_id <span class="op">=</span> u.user_id; <span class="cmt">-- 一致しない行（注文なし）は自動で除外される</span>

<span class="cmt">/*
  実行順序（EXISTSの場合）:
  1. FROM users u               → 外側テーブルを1行ずつ処理
  2. EXISTS サブクエリ評価       → 各 u.user_id に対してordersを検索
  3. Short-circuit               → ordersで1件でも一致したら即TRUE、残りはスキップ
  4. WHERE EXISTS = TRUE の行のみ → 条件を通過した行を保持
  5. SELECT user_id, name        → 列を返す
*/</span></pre>`,
  explain: `
<div class="viz-flow">
<div class="step-block">
<div class="step-label"><span class="step-num sn1">1</span><span class="step-desc"><strong>IN：サブクエリを全件実行してリスト化 → 外側と比較</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>処理ステップ</th><th>内容</th><th>コスト</th></tr>
<tr class="tr-hi"><td>① サブクエリを先に全件実行</td><td>ordersの500万件からuser_id全件を取得してリスト化</td><td class="tc-r">高（全件読む）</td></tr>
<tr class="tr-hi4"><td>② リストにNULLが含まれると…</td><td>WHERE col IN (1, 2, NULL) → NULL比較は常にFALSE → 予期しない結果</td><td class="tc-r">バグリスク</td></tr>
</table></div>
</div>

<div class="arrow">↓ <span class="arrow-text">EXISTSは「見つかった瞬間に処理を止める」Short-circuitが働く</span></div>

<div class="step-block">
<div class="step-label"><span class="step-num sn2">2</span><span class="step-desc"><strong>EXISTS：外側の行ごとにサブクエリ評価 → 1件一致で即打ち切り</strong></span></div>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>外側（users）</th><th>ordersを検索</th><th>1件でも一致？</th><th>結果</th></tr>
<tr class="tr-hi2"><td>U001（田中）</td><td>order_id=1（U001）を発見</td><td class="tc-g">✓ → 即TRUE</td><td class="tc-g">含める</td></tr>
<tr class="tr-hi"><td>U002（鈴木）</td><td>U002の注文を全検索</td><td class="tc-r">✗ → FALSE</td><td class="tc-r">除外</td></tr>
<tr class="tr-hi2"><td>U003（佐藤）</td><td>order_id=3（U003）を発見</td><td class="tc-g">✓ → 即TRUE</td><td class="tc-g">含める</td></tr>
</table></div>
</div>
</div>

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>EXISTSは「サブクエリが1件でも結果を返すか？」だけを確認します。<code>SELECT 1</code>と書くのは「何を返すかではなく、返せるかどうかだけ確認する」という意図の表明です。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>EXISTSのShort-circuit（短絡評価）：</strong>EXISTSは1件一致した時点でそのユーザーの評価を終了し次の行に進みます。U001が500万件の注文を持っていても、最初の1件を見つけた時点で終了します。INは全リストを先に作るため、この最適化が使えません。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>モダンなオプティマイザの現実：</strong>PostgreSQL 14以降などでは、INとEXISTSを同等の実行計画に変換できるケースも多く、実際の差は小さいこともあります。ただし、NULLの扱いとコードの意図の明確さから、<em>存在確認はEXISTSを使う</em>のがベストプラクティスです。</div></div>
</div>

<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>IN のサブクエリにNULLが混入する：</strong><code>WHERE user_id NOT IN (SELECT user_id FROM orders)</code> のように <code>NOT IN</code> を使うと、ordersのuser_idにNULLが1件でもあると結果が全件0件になります（NULLとの比較は常にUNKNOWN）。NOT INは <code>NOT EXISTS</code> で書き直すのが安全です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>EXISTSでSELECT *を使う：</strong><code>EXISTS (SELECT * FROM orders WHERE …)</code> と書いても動作しますが、<code>SELECT 1</code> の方が「値を返す必要がなく存在確認だけ」という意図が明確です。チームの可読性のためにも <code>SELECT 1</code> を使いましょう。</div></div>
</div>

<div class="column-box">
<div class="column-title">☕ 実務コラム：JOINとEXISTSの使い分け</div>
<div class="column-body">
「注文を持つユーザー」のような<em>存在確認だけが目的</em>なら EXISTS が最も意図が明確です。JOINを使うと1ユーザーが複数注文を持つ場合に行が重複するため、<code>DISTINCT</code>やサブクエリが必要になり複雑化します。<strong>「相手テーブルのデータ（列）は不要で、存在するかどうかだけを確認したい」</strong>場面では迷わず EXISTS を選ぶことで、意図が明確でパフォーマンスも安定したSQLになります。
</div>
</div>
`
},

/* ══════════════════════════════════════════════════
   Q7  部分インデックス — WHERE条件付きインデックスで容量とコストを削減
══════════════════════════════════════════════════ */
{
  num: 7,
  title: "部分インデックス（Partial Index）— 条件付きインデックスでサイズと速度を両立",
  tags: [["r","部分INDEX"],["r","Partial Index"],["o","WHERE付きINDEX"],["g","サイズ削減"]],
  premise: `<p><strong>部分インデックス（Partial Index）</strong>は、<em>テーブルの全行ではなく特定の条件を満たす行だけ</em>にインデックスを作成します。インデックスのサイズを削減しながら、特定クエリパターンへの高速化を実現します。</p>
<pre><span class="cmt">-- 通常のインデックス（全行が対象）</span>
<span class="kw">CREATE INDEX</span> idx_orders_status
    <span class="kw">ON</span> <span class="tbl">orders</span> (status);           <span class="cmt">-- 全100万行に対してインデックスを作成</span>

<span class="cmt">-- 部分インデックス（条件付き）</span>
<span class="kw">CREATE INDEX</span> idx_orders_pending
    <span class="kw">ON</span> <span class="tbl">orders</span> (created_at)
    <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'pending'</span>;     <span class="cmt">-- pending の行だけ（例えば1万行）に作成 → サイズ1/100</span></pre>
<div class="callout ok"><strong>部分インデックスが有効なシナリオ：</strong>① 「未処理のみ」「アクティブのみ」など、特定ステータスを頻繁に検索する、② 削除済みフラグ（is_deleted=false）を常に絞り込む、③ NULL以外の行だけを対象にする</div>`,
  question: `<p><code>orders</code> テーブルに100万件あり、そのうち <em>status='pending'（処理待ち）は全体の1%（約1万件）</em>です。バッチ処理が5分ごとに「pending の注文を created_at 昇順で取得」しています。<em>部分インデックスを作成</em>して、このバッチクエリを最適化してください。</p>
<div class="data-section">
  <div class="data-label">ordersテーブル ステータス分布</div>
  <div class="tbl-wrap"><table class="vtbl">
    <tr><th>status</th><th>件数</th><th>割合</th></tr>
    <tr class="tr-hi"><td>pending</td><td class="tc-y">10,000件</td><td class="tc-y">1%（バッチの対象）</td></tr>
    <tr class="tr-dim"><td>completed</td><td class="null">850,000件</td><td class="null">85%</td></tr>
    <tr class="tr-dim"><td>cancelled</td><td class="null">140,000件</td><td class="null">14%</td></tr>
  </table></div>
</div>
<pre><span class="cmt">-- 最適化対象のバッチクエリ</span>
<span class="kw">SELECT</span> order_id, user_id, amount, created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'pending'</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">ASC</span>
<span class="kw">LIMIT</span>  <span class="num">100</span>;</pre>`,
  output: `<p>部分インデックス作成前後の比較：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th></th><th class="tc-r">通常インデックス</th><th class="tc-g">部分インデックス</th></tr>
<tr><td>インデックスサイズ</td><td class="tc-r">100万行分</td><td class="tc-g">1万行分（1/100）</td></tr>
<tr><td>スキャン範囲</td><td class="tc-r">全インデックスを探索</td><td class="tc-g">pendingのみの小さなインデックス</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- 部分インデックスの作成（pendingの行だけを対象）</span>
<span class="kw">CREATE INDEX</span> idx_orders_pending_created  <span class="cmt">-- 名前に条件を反映させると意図が伝わりやすい</span>
    <span class="kw">ON</span> <span class="tbl">orders</span> (created_at)             <span class="cmt">-- 【超基礎】バッチクエリのORDER BYに使う列をキーにする</span>
    <span class="kw">WHERE</span> status <span class="op">=</span> <span class="str">'pending'</span>;           <span class="cmt">-- 【超基礎】インデックスに含める行の条件（pendingだけ）</span>

<span class="cmt">-- バッチクエリ（変更なし）: 部分インデックスが自動的に使われる</span>
<span class="kw">SELECT</span>                                 <span class="cmt">-- 【超基礎】必要な列だけ指定</span>
    order_id,
    user_id,
    amount,
    created_at
<span class="kw">FROM</span>   <span class="tbl">orders</span>                         <span class="cmt">-- 【超基礎】対象テーブル</span>
<span class="kw">WHERE</span>  status <span class="op">=</span> <span class="str">'pending'</span>             <span class="cmt">-- 【超基礎】部分インデックスのWHERE条件と一致 → 発動</span>
<span class="kw">ORDER BY</span> created_at <span class="kw">ASC</span>              <span class="cmt">-- 【超基礎】インデックスのキー順と同じ → Sort不要</span>
<span class="kw">LIMIT</span>  <span class="num">100</span>;                           <span class="cmt">-- 【超基礎】上位100件だけ取得（早期終了も可能）</span>

<span class="cmt">-- NG: 部分インデックスの条件と合わないクエリでは使われない
-- WHERE status = 'completed' → 部分インデックスの対象外（Seq Scan or 別Indexが必要）</span>

<span class="cmt">/*
  実行順序（バッチクエリ）:
  1. FROM orders                       → テーブル参照
  2. 部分Index Scan（pendingのみの索引） → 1万行のみの小さなインデックスを使う
  3. WHERE status='pending'            → インデックスが既にpendingのみなのでフィルタ不要

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>相関サブクエリは「外側の行ごとに毎回サブクエリが実行される」ため、外側テーブルが大きいほど実行回数が増えます。JOINを使うとDBはテーブルを1回だけ読んでから結合するため、根本的に効率が違います。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>COALESCE の役割：</strong><code>COALESCE(expr, 0)</code> は「値がNULLなら0を返す」関数です。LEFT JOINで注文がないユーザーは COUNT や SUM が NULL になるため、COALESCE で 0 に変換してAPIレスポンスにNULLが混入しないようにします。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>CTEによる可読性向上：</strong>CTEで集計を先に分離することで「ordersの集計ロジック」と「usersとの結合ロジック」が明確に分かれ、コードレビューや仕様変更時の修正が容易になります。複雑なクエリはCTEで段階的に分解するのが実務の定石です。</div></div>
<div class="insight-row"><span class="insight-icon">⚡</span><div class="insight-body"><strong>COUNT(o.order_id) vs COUNT(*)の違い：</strong>LEFT JOIN使用時、<code>COUNT(*)</code> はNULL行（注文なしユーザー）も1件とカウントします。<code>COUNT(o.order_id)</code> はNULL列を除外するため、注文なしユーザーが正しく0件になります。LEFT JOINと組み合わせるときは <code>COUNT(結合テーブルの列)</code> を使います。</div></div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CTEを「パフォーマンス改善の魔法」と思う：</strong>PostgreSQL 12以前ではCTEはマテリアライズ（一時テーブルに実体化）されるため、必ずしも速くはありませんでした。PostgreSQL 12以降はオプティマイザがCTEをインライン展開できますが、複雑なケースでは <code>WITH order_summary AS MATERIALIZED (…)</code> vs <code>NOT MATERIALIZED</code> の選択が必要です。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>LEFT JOINで意図せず行が増える：</strong>「1対多」の関係でLEFT JOINすると、1側のテーブルの1行が多側の複数行と結合して行が増えます。GROUP BYを付けずに結果を使うと期待より多い行数になります。結合後の行数を常に意識し、GROUP BYやDISTINCTの必要性を判断してください。</div></div>

RailsのActiveRecordで <code>User.where(plan: 'premium').each { |u| u.orders.count }</code> のようなコードを書くと、SQLレベルで相関サブクエリと同等のN+1クエリが発生します。<strong>ORMレベルでは <code>includes</code>・<code>eager_load</code>・<code>joins</code> を使い、DBレベルでは相関サブクエリをJOIN+GROUP BYで書き直す</strong>ことが根本的な解決策です。NewRelic・Datadog APMなどのトレースツールで「クエリが100回以上実行されているエンドポイント」を定期的にチェックし、N+1を早期発見する習慣が実務の品質維持に直結します。

function tagHTML(tags) {
  const cls = {r:'tag-r', g:'tag-g', o:'tag-o', p:'tag-p', fn:'tag-p'};
  return tags.map(([c,t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

function buildAll() {
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})"><span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}</button>`
  ).join('');

  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘','pill-blue','前提','前提知識',q.premise)}
      ${acc('❓','pill-green','問題','問題',q.question)}
      ${acc('📊','pill-orange','出力','期待出力',q.output)}
      ${acc('✅','pill-red','解答','模範解答コード',q.answer)}
      ${acc('🔍','pill-purple','解説','解説（テーブル変化・ポイント）',q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i-1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i+1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i+1})" ${i === QS.length-1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  go(0);
}

function go(i) {
  if (i < 0 || i >= QS.length) return;
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

buildAll();
</script>
</body>
</html>
