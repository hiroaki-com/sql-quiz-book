<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLデータモデリング10選 — 正規化・主キー・FK・リレーション・NULL設計・型選択（基礎編）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== CSS変数（カラートークン） ===== */
  :root {
    --bg:     #0a0e13;
    --bg2:    #131920;
    --bg3:    #1c2330;
    --bg4:    #263040;
    --border: #2a3545;
    --text:   #cdd9e5;
    --dim:    #768390;
    --accent: #4dabf7;   /* メインアクセント：青 */
    --green:  #3fb950;
    --orange: #f0883e;
    --red:    #f85149;
    --purple: #bc8cff;
    --yellow: #e3b341;
    /* シンタックスハイライト */
    --kw:  #ff7b72;   /* キーワード */
    --fn:  #79c0ff;   /* 関数 */
    --str: #a5d6ff;   /* 文字列 */
    --num: #f0c674;   /* 数値 */
    --cmt: #6a737d;   /* コメント */
    --tbl: #ffa657;   /* テーブル名 */
    --op:  #f0883e;   /* 演算子 */
  }

  /* ===== リセット & ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; }
  body { min-height: 100vh; }

  /* ===== サイトヘッダー ===== */
  .site-header { background: var(--bg2); }
  .header-inner { padding: 16px; }
  .header-flex  { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .header-badge {
    background: var(--bg3); border: 1px solid var(--accent); border-radius: 6px;
    padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; white-space: nowrap;
  }
  .header-text-wrap { flex: 1; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .header-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
  .htag {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim);
  }

  /* ===== タブ（スティッキー） ===== */
  .sticky-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .tab-row     { display: flex; overflow-x: auto; scrollbar-width: none; }
  .tab-btn {
    flex-shrink: 0; background: none; border: none;
    border-top: 2px solid transparent; border-bottom: 2px solid transparent;
    color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 9px 14px; cursor: pointer; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg3); }
  .tab-num { margin-right: 5px; }
  .tab-btn.active .tab-num { color: var(--accent); }

  /* ===== プログレスバー ===== */
  .prog-wrap { height: 2px; background: var(--bg4); }
  .prog-fill { height: 100%; background: var(--accent); transition: width 0.2s; }

  /* ===== メインコンテンツ ===== */
  main { max-width: 960px; margin: 0 auto; padding: 22px 14px 90px; }
  .panel       { display: none; }
  .panel.active { display: block; }

  /* ===== 問題ヘッダー ===== */
  .q-header   { margin-bottom: 18px; }
  .q-number   { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .q-title    { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .q-tags     { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-tag      { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; font-weight: 600; }
  .tag-r      { background: #1a2c44; color: var(--accent);  border: 1px solid #1e4070; }
  .tag-g      { background: #162416; color: var(--green);   border: 1px solid #1e3a1e; }
  .tag-o      { background: #2e1e0a; color: var(--orange);  border: 1px solid #4a2e0a; }
  .tag-p      { background: #1e1433; color: var(--purple);  border: 1px solid #3a2060; }

  /* ===== アコーディオン ===== */
  .acc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  .acc-head {
    display: flex; align-items: center; gap: 10px; padding: 11px 14px;
    cursor: pointer; user-select: none;
  }
  .acc-head:hover  { background: var(--bg3); }
  .acc-icon        { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
  .acc-title       { font-size: 13px; font-weight: 600; flex: 1; }
  .acc-pill        { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .pill-blue   { background: #112233; color: var(--accent); border: 1px solid #1a3a55; }
  .pill-green  { background: #0e1f0e; color: var(--green);  border: 1px solid #1a3a1a; }
  .pill-orange { background: #1e1205; color: var(--orange); border: 1px solid #3a2010; }
  .pill-red    { background: #1e0a0a; color: var(--red);    border: 1px solid #3a1010; }
  .pill-purple { background: #160f2a; color: var(--purple); border: 1px solid #3a1a60; }
  .acc-chevron     { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .acc.closed .acc-chevron { transform: rotate(-90deg); }
  .acc-body        { padding: 14px 16px; border-top: 1px solid var(--border); }
  .acc.closed .acc-body { display: none; }

  /* ===== 本文テキスト ===== */
  p { font-size: 13.5px; margin-bottom: 10px; }
  p:last-child { margin-bottom: 0; }
  strong { color: var(--accent); font-weight: 600; }
  em     { color: var(--yellow); font-style: normal; font-weight: 600; }
  code   { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: var(--bg4); padding: 1px 5px; border-radius: 3px; color: var(--tbl); }

  /* ===== コードブロック ===== */
  pre {
    background: #060a0f; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; line-height: 1.6; margin: 8px 0;
  }
  /* シンタックスハイライト用クラス */
  .kw  { color: var(--kw);  font-weight: 700; }
  .fn  { color: var(--fn);  }
  .tbl { color: var(--tbl); }
  .str { color: var(--str); }
  .num { color: var(--num); }
  .cmt { color: var(--cmt); font-style: italic; }
  .op  { color: var(--op);  }

  /* ===== コールアウト ===== */
  .callout        { border-left: 3px solid var(--accent); background: #0e1e33; padding: 9px 13px; border-radius: 0 5px 5px 0; margin: 10px 0; font-size: 13px; }
  .callout.warn   { border-left-color: var(--yellow); background: #1e1a08; }
  .callout.danger { border-left-color: var(--red);    background: #1e0e0e; }
  .callout.ok     { border-left-color: var(--green);  background: #0a1e0a; }

  /* ===== データセクション（テーブル表示） ===== */
  .data-section  { margin: 14px 0; }
  .data-label {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--tbl); letter-spacing: 1px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .data-label::before { content: ''; display: block; width: 3px; height: 12px; background: var(--tbl); border-radius: 2px; }
  .data-tables   { display: flex; gap: 14px; flex-wrap: wrap; }
  .data-tbl-wrap { flex: 1; min-width: 220px; }
  .data-tbl-name { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--orange); margin-bottom: 4px; }

  /* ===== データテーブル ===== */
  .tbl-wrap { overflow-x: auto; margin-bottom: 4px; }
  table.vtbl {
    border-collapse: collapse; font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; background: #060a0f; border: 1px solid var(--border);
    border-radius: 4px; min-width: 100%;
  }
  table.vtbl th { background: var(--bg3); color: var(--tbl); padding: 5px 11px; border: 1px solid var(--border); text-align: left; white-space: nowrap; font-weight: 600; }
  table.vtbl td { padding: 4px 11px; border: 1px solid #1c2635; white-space: nowrap; }
  table.vtbl tr:nth-child(even) td { background: #080c12; }

  /* ===== インサイトボックス ===== */
  .insight-box   { background: #0a1520; border: 1px solid #1a3a55; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
  .insight-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .insight-row   { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .insight-icon  { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .insight-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .insight-body strong { color: var(--accent); }
  .insight-body em     { color: var(--yellow); }
  .insight-body code   { font-size: 11px; }

  /* ===== アンチパターンボックス ===== */
  .anti-box   { background: #160a0a; border: 1px solid #3a1515; border-radius: 8px; padding: 14px 16px; margin-top: 10px; }
  .anti-title { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--red); letter-spacing: 1px; margin-bottom: 10px; }
  .anti-row   { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .anti-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .anti-body strong { color: var(--red); }
  .anti-body code   { font-size: 11px; }

  /* ===== コラムボックス ===== */
  .column-box   { background: #0d1520; border: 1px solid #1c3550; border-radius: 8px; padding: 14px 16px; margin-top: 10px; border-left: 3px solid var(--fn); }
  .column-title { font-size: 11px; font-weight: 700; color: var(--fn); letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .column-body  { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .column-body strong { color: var(--fn); }

  /* ===== ナビゲーションバー ===== */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 10px; }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 9px 16px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #0e1e33; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { font-size: 11px; color: var(--dim); font-family: 'JetBrains Mono', monospace; text-align: center; }

  /* ===== レスポンシブ ===== */
  @media (max-width: 520px) {
    .header-inner { padding: 12px 10px 6px; }
    .q-title      { font-size: 15px; }
    pre           { font-size: 11px; padding: 10px; }
    table.vtbl    { font-size: 10.5px; }
    .acc-title    { font-size: 12px; }
    .header-badge { font-size: 14px; padding: 5px 8px; }
    main          { padding: 16px 10px 60px; }
    .data-tables  { flex-direction: column; }
  }

  /* ===== SQL ステップビジュアライザー ===== */
  .sql-viz-wrapper {
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    --font-sans: system-ui, -apple-system, sans-serif;
    --color-bg-base:    #0d1117;
    --color-bg-panel:   #161b22;
    --color-border-main:#30363d;
    --color-border-sub: #21262d;
    --color-txt-main:   #e6edf3;
    --color-txt-sub:    #8b949e;
    --color-txt-muted:  #6e7681;
    --sql-blue-bg:    rgba(88, 166, 255, 0.15);  --sql-blue-txt:   #58a6ff;  --sql-blue-bd:    #1f6feb;
    --sql-orange-bg:  rgba(227, 137, 59, 0.15);  --sql-orange-txt: #e3893b;  --sql-orange-bd:  #7d4e00;
    --sql-green-bg:   rgba(63, 185, 80, 0.15);   --sql-green-txt:  #3fb950;  --sql-green-bd:   #238636;
    --sql-red-bg:     rgba(248, 81, 73, 0.12);   --sql-red-txt:    #f85149;
    --sql-grp1-bg: rgba(88, 166, 255, 0.03);
    --sql-grp2-bg: rgba(88, 166, 255, 0.08);
    --sql-grp3-bg: rgba(88, 166, 255, 0.14);
    --border-radius: 6px;
    background: var(--color-bg-base);
    color: var(--color-txt-main);
    font-family: var(--font-sans);
    min-height: auto;
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .sql-viz-wrapper .sv-nav-btn { padding: 6px 16px; border: 1px solid var(--color-border-sub); border-radius: var(--border-radius); font-size: 11px; background: var(--color-bg-panel); color: var(--color-txt-main); cursor: pointer; transition: all 0.2s; }
  .sql-viz-wrapper .sv-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sql-viz-wrapper .sv-nav-btn:not(:disabled):hover { border-color: var(--color-border-main); background: #1f2a38; }
  .sql-viz-wrapper .sv-nav-btn:focus-visible, .sql-viz-wrapper .sv-dot:focus-visible { outline: 2px solid var(--sql-blue-txt); outline-offset: 2px; }
  .sql-viz-wrapper .sv-dot { height: 6px; border: none; background: var(--color-border-sub); border-radius: 3px; cursor: pointer; padding: 0; transition: width 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s; flex-shrink: 0; width: 8px; }
  .sql-viz-wrapper .sv-dot.done { background: var(--color-border-main); }
  .sql-viz-wrapper .sv-dot.active { background: var(--sql-blue-txt); width: 24px; }
  .sql-viz-wrapper .sv-table { border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 10px; }
  .sql-viz-wrapper .sv-table th { padding: 6px 12px; font-size: 9px; font-weight: 600; border: 1px solid var(--color-border-sub); text-align: left; transition: all 0.3s ease; white-space: nowrap; }
  .sql-viz-wrapper .sv-table td { padding: 6px 12px; border: 1px solid var(--color-border-sub); white-space: nowrap; background: var(--color-bg-base); color: var(--color-txt-main); transition: background 0.3s ease, opacity 0.3s ease; }
  .sql-viz-wrapper .sv-table th.col-base   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt); }
  .sql-viz-wrapper .sv-table th.col-eval   { background: var(--sql-orange-bg); color: var(--sql-orange-txt); }
  .sql-viz-wrapper .sv-table th.col-select { background: var(--sql-green-bg);  color: var(--sql-green-txt); }
  .sql-viz-wrapper .sv-table tr.row-dimmed td { background: transparent; opacity: 0.28; }
  .sql-viz-wrapper .sv-table tr.row-grp-1 td { background: var(--sql-grp1-bg); }
  .sql-viz-wrapper .sv-table tr.row-grp-2 td { background: var(--sql-grp2-bg); }
  .sql-viz-wrapper .sv-table tr.row-grp-3 td { background: var(--sql-grp3-bg); }
  .sql-viz-wrapper .sv-table td.val-pass   { background: var(--sql-green-bg) !important; border-left: 2px solid var(--sql-green-txt); color: var(--sql-green-txt); font-weight: 600; }
  .sql-viz-wrapper .sv-table td.val-fail   { background: var(--sql-red-bg) !important; border-left: 2px solid var(--sql-red-txt); color: var(--sql-red-txt); text-decoration: line-through; opacity: 0.7; }
  .sql-viz-wrapper .sv-table td.val-dimmed { background: transparent !important; opacity: 0.2; color: var(--color-txt-muted); }
  .sql-viz-wrapper .sql-kw { color: var(--sql-blue-txt); font-weight: 600; }
  .sql-viz-wrapper .sql-hl-from, .sql-viz-wrapper .sql-hl-join { background: var(--sql-blue-bg); border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt); }
  .sql-viz-wrapper .sql-hl-where, .sql-viz-wrapper .sql-hl-group, .sql-viz-wrapper .sql-hl-having, .sql-viz-wrapper .sql-hl-agg, .sql-viz-wrapper .sql-hl-sub { background: var(--sql-orange-bg); border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt); }
  .sql-viz-wrapper .sql-hl-select { background: var(--sql-green-bg); border-radius: 3px; padding: 2px 4px; color: var(--sql-orange-txt); }
  .sql-viz-wrapper .sv-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
  .sql-viz-wrapper .badge-blue   { background: var(--sql-blue-bg);   color: var(--sql-blue-txt);   border: 1px solid var(--sql-blue-bd); }
  .sql-viz-wrapper .badge-orange { background: var(--sql-orange-bg); color: var(--sql-orange-txt); border: 1px solid var(--sql-orange-bd); }
  .sql-viz-wrapper .badge-green  { background: var(--sql-green-bg);  color: var(--sql-green-txt);  border: 1px solid var(--sql-green-bd); }
  .sql-viz-wrapper .tbl-label { font-size: 9px; font-weight: 500; color: var(--color-txt-sub); margin-bottom: 6px; }
  .sql-viz-wrapper .sv-mobile-collapse summary::-webkit-details-marker { display: none; }
  .sql-viz-wrapper .sv-mobile-collapse summary { list-style: none; }
  .sql-viz-wrapper .sv-collapse-icon { transition: transform 0.2s ease; display: inline-block; }
  .sql-viz-wrapper .sv-mobile-collapse[open] .sv-collapse-icon { transform: rotate(180deg); }
  @keyframes sv-fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .sv-animate { animation: sv-fade-in 0.3s ease forwards; }
  @media (min-width: 641px) { .sql-viz-wrapper .sv-mobile-collapse > summary { pointer-events: none; } .sql-viz-wrapper .sv-collapse-icon { display: none !important; } }
  @media (max-width: 640px) { .sql-viz-wrapper .sv-sidebar { flex: 1 1 100% !important; min-width: 100% !important; } }
</style>
</head>
<body>

<!-- ===== サイトヘッダー ===== -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-flex">
      <div class="header-badge">SQL<br><span style="font-size:10px;opacity:.6">MODEL</span></div>
      <div class="header-text-wrap">
        <div class="header-title">データモデリングで学ぶ SQL 基礎10選（正規化／主キー／外部キー／1対多・多対多リレーション／NULL設計／型選択／論理削除／ステータス管理／監査カラム設計）</div>
      </div>
    </div>
    <div class="header-tags">
      <span class="htag">★ 基礎</span>
      <span class="htag">データモデリング</span>
      <span class="htag">テーブル設計</span>
      <span class="htag">PostgreSQL対応</span>
    </div>
  </div>
</header>

<!-- ===== スティッキータブ ===== -->
<div class="sticky-tabs">
  <div class="tab-row" id="tabRow"></div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
</div>

<main id="mainContent"></main>

<script>
/* ========================================================
   SQL ステップビジュアライザー
   initVisualizer(root, data) — 単一ルート要素にビジュアライザーを初期化する
   root : .sql-viz-wrapper 要素
   data : { steps: Step[], sql: Token[] }
======================================================== */
function initVisualizer(root, data) {
  if (!root || !data) return;
  let currentStepIndex = 0;

  function getLegendHTML(type) {
    const mkLegend = (color, text) =>
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:var(--sql-${color}-bg);border:1px solid var(--sql-${color}-bd);border-radius:2px;"></div><span style="color:var(--color-txt-sub)">${text}</span></div>`;
    const dimLegend =
      `<div style="display:flex;align-items:center;gap:8px;"><div style="width:16px;height:10px;background:transparent;border:1px dashed var(--color-border-main);border-radius:2px;opacity:0.5;"></div><span style="color:var(--color-txt-muted)">除外・非表示データ</span></div>`;
    const passFail =
      `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-green-bg);border-left:2px solid var(--sql-green-txt);border-radius:2px;"></div><span style="color:var(--sql-green-txt);font-weight:600;font-size:9px;">✓ 通過</span></div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:16px;height:10px;background:var(--sql-red-bg);border-left:2px solid var(--sql-red-txt);border-radius:2px;"></div><span style="color:var(--sql-red-txt);font-weight:600;font-size:9px;">✗ 除外</span></div>
      </div>`;
    if (type === "base")   return mkLegend("blue", "データ取得・結合対象") + dimLegend;
    if (type === "eval")   return mkLegend("orange", "評価対象の列・キー") + dimLegend + passFail;
    if (type === "group")  return mkLegend("orange", "グループ化キー・集計対象") + `<div style="display:flex;align-items:center;gap:8px;"><div style="display:flex;gap:4px;"><div style="width:14px;height:10px;background:var(--sql-grp1-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp2-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div><div style="width:14px;height:10px;background:var(--sql-grp3-bg);border:1px solid var(--color-border-main);border-radius:2px;"></div></div><span style="color:var(--color-txt-sub)">グループ分類</span></div>`;
    if (type === "select") return mkLegend("green", "出力対象の列") + dimLegend;
    return "";
  }

  function renderSQL(step) {
    return data.sql.map(t => {
      const isMatch = t.h && t.h.split(" ").includes(step.id);
      const cls = `${t.k || ""} ${isMatch ? `sql-hl-${step.id}` : ""}`.trim();
      return cls ? `<span class="${cls}">${t.t}</span>` : t.t;
    }).join("");
  }

  function renderStepInfo(step) {
    return `
      <details class="sv-mobile-collapse" style="background:var(--color-bg-panel);border:1px solid var(--color-border-sub);border-radius:var(--border-radius);padding:8px 10px;">
        <summary style="cursor:pointer;outline:none;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none;margin:0;">
          <span class="sv-badge ${step.bc}">${step.badge}</span>
          <code style="font-size:10px;font-weight:700;color:var(--color-txt-main);font-family:var(--font-mono);">${step.label}</code>
          <span class="sv-collapse-icon" style="margin-left:auto;font-size:9px;color:var(--color-txt-muted);">▼</span>
        </summary>
        <div style="margin-top:12px;font-size:11px;line-height:1.5;color:var(--color-txt-sub);border-top:1px dashed var(--color-border-sub);padding-top:12px;">${step.desc}</div>
      </details>
    `;
  }

  function buildTable(label, cols, rows, headerClasses) {
    const thead = cols.map((col, i) => `<th class="${headerClasses?.[i] || ""}">${col}</th>`).join("");
    const tbody = rows.map(r => {
      const tds = r.v.map((val, ci) => `<td class="${r.cc?.[ci] || ""}">${val}</td>`).join("");
      return `<tr class="${r.c || ""}">${tds}</tr>`;
    }).join("");
    const labelHtml = label ? `<div class="tbl-label">▸ ${label}</div>` : "";
    return `<div style="flex:1;min-width:260px;">${labelHtml}<div style="overflow-x:auto;"><table class="sv-table">${thead ? `<thead><tr>${thead}</tr></thead>` : ""}<tbody>${tbody}</tbody></table></div></div>`;
  }

  function renderTableArea(step) {
    if (step.join) {
      return `
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;">
          ${buildTable(step.left.label, step.left.cols, step.left.rows, step.left.ch)}
          <div style="display:flex;align-items:center;font-size:20px;color:var(--sql-blue-txt);padding-top:28px;">⋈</div>
          ${buildTable(step.right.label, step.right.cols, step.right.rows, step.right.ch)}
        </div>
      `;
    }
    return buildTable("", step.cols, step.rows, step.ch);
  }

  function renderControls(total) {
    const dots = Array.from({length: total}, (_, i) => {
      const cls = i === currentStepIndex ? "active" : (i < currentStepIndex ? "done" : "");
      return `<button class="sv-dot ${cls}" data-action="goto" data-idx="${i}" aria-label="ステップ${i+1}"></button>`;
    }).join("");
    return `
      <div style="display:flex;gap:6px;align-items:center;">${dots}</div>
      <span style="font-size:10px;font-family:var(--font-mono);font-weight:600;color:var(--color-txt-muted);">${currentStepIndex + 1} / ${total}</span>

        <button class="sv-nav-btn" data-action="prev" ${currentStepIndex === 0 ? "disabled" : ""}>← Prev</button>
        <button class="sv-nav-btn" data-action="next" ${currentStepIndex === total - 1 ? "disabled" : ""}>Next →</button>
      </div>
    `;
  }

  root.innerHTML = `
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">
      <div class="sv-sidebar" style="flex:0 0 300px;min-width:240px;">

        </details>

        <div class="sv-tarea sv-animate"></div>
        <div class="sv-rowcount" style="font-size:11px;font-family:var(--font-mono);color:var(--color-txt-sub);margin-top:8px;text-align:right;"></div>
      </div>
    </div>
  `;

  function renderAll() {
    const step = data.steps[currentStepIndex];
    root.querySelector('.sv-sqlbox').innerHTML = renderSQL(step);
    root.querySelector('.sv-legend').innerHTML = getLegendHTML(step.type);
    root.querySelector('.sv-stepinfo').innerHTML = renderStepInfo(step);
    const tarea = root.querySelector('.sv-tarea');
    tarea.classList.remove('sv-animate');
    void tarea.offsetWidth;
    tarea.innerHTML = renderTableArea(step);
    tarea.classList.add('sv-animate');
    root.querySelector('.sv-rowcount').textContent = step.cnt || '';
    root.querySelector('.sv-ctrls').innerHTML = renderControls(data.steps.length);
    root.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = window.innerWidth > 640);
  }

  root.__viz = {
    next:  () => { if (currentStepIndex < data.steps.length - 1) { currentStepIndex++; renderAll(); } },
    prev:  () => { if (currentStepIndex > 0) { currentStepIndex--; renderAll(); } },
    goTo:  i  => { if (i >= 0 && i < data.steps.length) { currentStepIndex = i; renderAll(); } }
  };

  root.querySelector('.sv-ctrls').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const a = btn.dataset.action;
    if (a === 'prev') root.__viz.prev();
    else if (a === 'next') root.__viz.next();
    else if (a === 'goto') root.__viz.goTo(Number(btn.dataset.idx));
  });

  renderAll();
}

<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>正規化の実務的な境界線：</strong>3NFで設計しておけばほぼすべての更新時異常を防げます。ECサイトのような構造では users / orders / order_items の3テーブル分割が基本パターンで、実務でも最も頻出の設計です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>配列・JSON列で繰り返し項目を1列に詰め込む：</strong><code>items TEXT DEFAULT '[]'</code>のようにJSON配列を1列に詰めると1NFを満たさず、SQLで集計・検索が困難になります。後から「特定商品を含む注文を集計したい」という要件が出た際に詰みます。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>過度な正規化（4NF・5NF）：</strong>実務では3NFで十分なケースがほとんどです。過度に正規化するとJOINが増えてクエリが複雑になり、パフォーマンスも悪化します。「読み取りが多いテーブルは意図的に非正規化（denormalize）する」という逆の選択も設計の判断として重要です。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：注文履歴の「スナップショット」問題</div>

</div>
</div>
`

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>外部キー制約は「子テーブルに、親テーブルに存在しないIDを入れることを防ぐ」DBレベルのガードレールです。アプリのバグや直接DBを操作したときでも、データの整合性が守られます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>ON DELETE の選び方の基準：</strong>「親が消えたら子も不要」→ CASCADE。「親が消えても子のデータは残したい（誰が書いたか不明として扱う）」→ SET NULL。「親は絶対に削除させたくない（参照されている間は削除禁止）」→ RESTRICT（デフォルト）。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>外部キー列には必ずインデックスを：</strong>PostgreSQLは外部キー列に自動でインデックスを作成しません。子テーブルの外部キー列（post_id, user_id等）には手動でインデックスを作成することで、親テーブルを削除する際のFK検索と、JOINのパフォーマンスが大幅に向上します。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>外部キー制約を「パフォーマンスが落ちる」という理由でやめる：</strong>大量書き込みがある場合に外部キーのバリデーションコストを避けるため制約をなくすケースがありますが、データ整合性の崩壊リスクが高まります。バルクインサート時だけ一時的に制約を遅延実行（DEFERRABLE）する方法を検討しましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>CASCADE を多用して連鎖削除を意識しない：</strong>CASCADE は強力ですが、深い階層（親→子→孫→…）に設定するとひとつのDELETEが大量の行を削除し、意図せずデータを全消去する事故につながります。重要なテーブルほどRESTRICTにして「明示的に削除せざるを得ない」設計が安全です。</div></div>
</div>

ユーザー削除を「完全削除」でなく「論理削除（deleted_at列）」にする実務では、外部キーのON DELETEが発動しません。この場合はアプリ側で「削除済みユーザーの投稿・コメントをどう扱うか」を明示的に設計する必要があります。<strong>「完全削除かどうかをビジネス要件として先に決め、それに合わせて外部キーのON DELETE動作を選ぶ」</strong>順序が重要です。論理削除の詳細はQ8で解説します。
</div>

  answer: `<pre><span class="cmt">-- ① 生徒テーブル（多対多の一方）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">students</span> (
    student_id <span class="fn">BIGSERIAL</span>   <span class="kw">PRIMARY KEY</span>,
    name       <span class="fn">VARCHAR</span>(<span class="num">100</span>) <span class="kw">NOT NULL</span>

<span class="cmt">-- ② 授業テーブル（多対多のもう一方）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">courses</span> (

    title     <span class="fn">VARCHAR</span>(<span class="num">200</span>) <span class="kw">NOT NULL</span>
);

<span class="cmt">-- ③ 中間テーブル（多対多を1対多×2に分解）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">enrollments</span> (
    student_id  <span class="fn">BIGINT</span>       <span class="kw">NOT NULL</span>
                <span class="kw">REFERENCES</span> <span class="tbl">students</span>(student_id) <span class="kw">ON DELETE CASCADE</span>,  <span class="cmt">-- 生徒削除→受講履歴も削除</span>
    course_id   <span class="fn">BIGINT</span>       <span class="kw">NOT NULL</span>
                <span class="kw">REFERENCES</span>  <span class="tbl">courses</span>(course_id) <span class="kw">ON DELETE CASCADE</span>,  <span class="cmt">-- 授業削除→受講履歴も削除</span>

    grade       <span class="fn">VARCHAR</span>(<span class="num">3</span>),                                         <span class="cmt">-- 成績（まだない場合はNULL許可）</span>
    <span class="kw">PRIMARY KEY</span> (student_id, course_id)                             <span class="cmt">-- 【超基礎】複合PK：同じ生徒が同じ授業に2回登録できない</span>
);
<span class="cmt">-- 中間テーブルのポイント:
-- ・複合PKが「同じ組み合わせの重複」を防ぐ制約として機能する

<span class="kw">FROM</span>       <span class="tbl">students</span>    s               <span class="cmt">-- 【超基礎】起点となるテーブル</span>

           <span class="kw">ON</span> e.student_id <span class="op">=</span> s.student_id

  premise: `<p><strong>論理削除（Soft Delete）</strong>は、行を物理的にDELETEするのではなく、「削除済みであることを示す列（削除日時）を更新」して「削除したように見せる」パターンです。データの復元・監査・データ分析のために削除履歴を保持できます。</p>

<p>論理削除の最大の課題は「全クエリに <code>WHERE deleted_at IS NULL</code> を漏れなく追加する」必要があることです。漏れると削除済みデータが混入します。この問題を解決するために<em>VIEWでデフォルトフィルタを適用する</em>手法が有効です。</p>`,

<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>論理削除では「DELETEを使わず、UPDATEで削除日時をセットする」のが基本パターンです。deleted_atがNULLなら生存中、値があれば削除済みという規則を設計の出発点にします。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>VIEWの役割：</strong>VIEWは「保存されたSELECTクエリ」です。active_usersというVIEWを定義しておけば、アプリのコードはactive_usersを参照するだけでよく、WHERE deleted_at IS NULLの書き漏れが根本的になくなります。VIEWは「よく使うクエリのショートカット」として機能します。</div></div>

<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>論理削除フラグを is_deleted BOOLEAN にする：</strong>is_deletedではいつ削除したかが記録されません。監査ログや「30日以上前に削除されたデータを本物削除する」バッチ処理ができなくなります。削除日時が不要なケースは稀なので、deleted_at TIMESTAMPTZが推奨です。</div></div>

</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：ORMと論理削除の連携</div>
<div class="column-body">
Railsでは <code>acts_as_paranoid</code>、Djangoでは <code>django-soft-delete</code> などのgemやライブラリが論理削除を自動化します。これらは <code>Model.destroy(id)</code> を呼ぶとDELETEではなくUPDATE deleted_atに変換し、<code>Model.all</code>は自動的に<code>WHERE deleted_at IS NULL</code>を付けます。<strong>ORM側の自動フィルタに依存していると、生SQLやDB Consoleから参照した際に削除済みデータが混入しているケースに気づきにくい</strong>点に注意が必要です。定期的に元テーブルを直接確認する運用ルールを設けましょう。
</div>
</div>

  premise: `<p>注文の「pending/completed/cancelled」のようなステータス値を管理する方法として、代表的な3つのアプローチがあります。</p>
<div class="callout"><strong>ステータス管理の3つのアプローチ：</strong><br>
・<code>VARCHAR + CHECK制約</code> → シンプルだが値のリストをDB内に固定して変更時にALTER TBL必要<br>
・<code>ENUM型</code> → PostgreSQL独自の型。型安全で明確だが値の追加・削除がALTER TYPE必要<br>
・<code>マスターテーブル（参照テーブル）</code> → 最も柔軟。ステータスの追加・削除がINSERT/DELETEで対応。画面表示名や順番も管理できる</div>
<p>実務では「値が変わらない」ならENUMやCHECK制約、「業務要件でステータスの追加・変更が見込まれる」「ステータスに付随するメタデータが必要」ならマスターテーブルが推奨です。</p>`,
  question: `<p>ECサイトの注文ステータスを管理するテーブルを設計します。以下の要件に応じて<em>①ENUM型での設計</em>と<em>②マスターテーブルでの設計</em>の両方を実装し、それぞれの長所・短所を比較してください。要件：ステータスは pending/processing/shipped/delivered/cancelled の5種類（将来追加の可能性あり）。</p>`,
  output: `<p>2つのアプローチの比較：</p>
<div class="tbl-wrap"><table class="vtbl">
<tr><th>比較項目</th><th>ENUM</th><th>マスターテーブル</th></tr>
<tr><td>値の追加</td><td class="tc-r">ALTER TYPE（テーブルロック）</td><td class="tc-g">INSERT（ロックなし）</td></tr>
<tr><td>値の削除</td><td class="tc-r">難しい（参照中は不可）</td><td class="tc-g">論理削除で対応可</td></tr>
<tr><td>表示名の管理</td><td class="tc-r">できない</td><td class="tc-g">display_name列で管理</td></tr>
<tr><td>シンプルさ</td><td class="tc-g">シンプル</td><td class="tc-r">JOIN が必要</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① ENUM型でのステータス管理</span>
<span class="kw">CREATE TYPE</span> order_status_enum <span class="kw">AS</span> <span class="fn">ENUM</span> (  <span class="cmt">-- 【超基礎】カスタム型を作成する（PostgreSQL独自機能）</span>
    <span class="str">'pending'</span>,     <span class="cmt">-- 注文受付</span>
    <span class="str">'processing'</span>, <span class="cmt">-- 処理中</span>
    <span class="str">'shipped'</span>,    <span class="cmt">-- 発送済み</span>
    <span class="str">'delivered'</span>, <span class="cmt">-- 配達完了</span>
    <span class="str">'cancelled'</span>  <span class="cmt">-- キャンセル</span>
);

<span class="kw">CREATE TABLE</span> <span class="tbl">orders_enum</span> (
    order_id   <span class="fn">BIGSERIAL</span>          <span class="kw">PRIMARY KEY</span>,
    user_id    <span class="fn">BIGINT</span>             <span class="kw">NOT NULL</span>,
    status     order_status_enum  <span class="kw">NOT NULL</span>        <span class="cmt">-- 【超基礎】ENUM型の列。定義外の値はエラーになる</span>
               <span class="kw">DEFAULT</span> <span class="str">'pending'</span>,               <span class="cmt">-- 注文作成時は pending がデフォルト</span>
    created_at <span class="fn">TIMESTAMPTZ</span>        <span class="kw">NOT NULL</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);
<span class="cmt">-- ENUMの長所: 型安全（'pnding' のようなタイポをDB側で弾く）、シンプル、ストレージ効率が良い
-- ENUMの短所: 値の追加は ALTER TYPE order_status_enum ADD VALUE 'returned';
--             値の削除は困難（参照している行があるとDROPできない）
--             表示名（日本語）の管理ができない</span>

<span class="cmt">-- ② マスターテーブルでのステータス管理（推奨：将来の変更に強い）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">order_statuses</span> (           <span class="cmt">-- ステータスのマスターテーブル</span>
    code         <span class="fn">VARCHAR</span>(<span class="num">20</span>) <span class="kw">PRIMARY KEY</span>, <span class="cmt">-- 【超基礎】VARCHARをPKにする（コードが自然キー）</span>
    display_name <span class="fn">VARCHAR</span>(<span class="num">50</span>) <span class="kw">NOT NULL</span>,    <span class="cmt">-- 画面表示用の日本語名</span>
    description  <span class="fn">TEXT</span>,                    <span class="cmt">-- ステータスの説明</span>
    sort_order   <span class="fn">SMALLINT</span>    <span class="kw">NOT NULL</span>,    <span class="cmt">-- 画面表示の並び順</span>
    is_terminal  <span class="fn">BOOLEAN</span>     <span class="kw">NOT NULL</span>     <span class="cmt">-- TRUE = これ以上遷移しない終端ステータス</span>
                 <span class="kw">DEFAULT</span> <span class="kw">FALSE</span>
);

<span class="cmt">-- マスターデータのINSERT</span>
<span class="kw">INSERT INTO</span> <span class="tbl">order_statuses</span> (code, display_name, sort_order, is_terminal) <span class="kw">VALUES</span>
    (<span class="str">'pending'</span>,     <span class="str">'注文受付中'</span>,   <span class="num">1</span>, <span class="kw">FALSE</span>),
    (<span class="str">'processing'</span>, <span class="str">'処理中'</span>,       <span class="num">2</span>, <span class="kw">FALSE</span>),
    (<span class="str">'shipped'</span>,    <span class="str">'発送済み'</span>,     <span class="num">3</span>, <span class="kw">FALSE</span>),
    (<span class="str">'delivered'</span>, <span class="str">'配達完了'</span>,     <span class="num">4</span>, <span class="kw">TRUE</span>),   <span class="cmt">-- 終端ステータス</span>
    (<span class="str">'cancelled'</span>, <span class="str">'キャンセル'</span>,   <span class="num">5</span>, <span class="kw">TRUE</span>);   <span class="cmt">-- 終端ステータス</span>

<span class="kw">CREATE TABLE</span> <span class="tbl">orders</span> (
    order_id   <span class="fn">BIGSERIAL</span>   <span class="kw">PRIMARY KEY</span>,
    user_id    <span class="fn">BIGINT</span>      <span class="kw">NOT NULL</span>,
    status     <span class="fn">VARCHAR</span>(<span class="num">20</span>) <span class="kw">NOT NULL</span>
               <span class="kw">DEFAULT</span> <span class="str">'pending'</span>
               <span class="kw">REFERENCES</span> <span class="tbl">order_statuses</span>(code), <span class="cmt">-- 【超基礎】マスターに存在するコードのみ登録できる</span>
    created_at <span class="fn">TIMESTAMPTZ</span> <span class="kw">NOT NULL</span> <span class="kw">DEFAULT</span> <span class="fn">NOW</span>()
);

<span class="cmt">-- マスターテーブルを結合して日本語名付きで注文一覧を取得</span>
<span class="kw">SELECT</span>
    o.order_id,
    o.status      <span class="kw">AS</span> status_code,           <span class="cmt">-- 内部コード</span>
    s.display_name <span class="kw">AS</span> status_display,        <span class="cmt">-- 画面表示用日本語</span>
    s.is_terminal                             <span class="cmt">-- 終端ステータスかどうか</span>
<span class="kw">FROM</span>       <span class="tbl">orders</span>          o
<span class="kw">INNER JOIN</span> <span class="tbl">order_statuses</span> s <span class="kw">ON</span> s.code <span class="op">=</span> o.status  <span class="cmt">-- マスターテーブルを結合</span>
<span class="kw">ORDER BY</span>   s.sort_order;                   <span class="cmt">-- マスターの並び順で表示</span>

<span class="cmt">/*

  1. FROM orders o                   → 注文テーブルを読む
  2. INNER JOIN order_statuses s     → status コードでマスターテーブルを結合
  3. SELECT o.order_id, s.display_name → 注文IDと日本語ステータス名を返す
  4. ORDER BY s.sort_order           → マスターで定義した表示順
*/</span></pre>`,

<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>ステータスのような「決まった選択肢から選ぶ値」は、VARCHAR + 制約でも、ENUMでも、マスターテーブルでも表現できます。「値が変わらず少ない（3〜5個程度）」ならENUMかCHECK制約、「追加・変更の可能性があるか表示名が必要」ならマスターテーブルを選びます。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>is_terminal（終端ステータス）の活用：</strong>マスターテーブルに is_terminal 列を持たせると「これ以上ステータスが変わらない注文」をアプリ側のロジックなしにSQL側で判定できます。<code>WHERE NOT s.is_terminal</code>で「まだ処理中の注文」を取得するクエリが書けます。このような「ステータス自体の属性」はマスターテーブルならではの設計です。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>CHECK制約による値制限：</strong>マスターテーブルを使わず「VARCHAR + CHECK制約」で簡易に実装する方法もあります。<code>CHECK (status IN ('pending', 'completed', 'cancelled'))</code>で列レベルのバリデーションが機能します。ただし値を追加するにはCHECK制約を変更するALTER TABLEが必要です。</div></div>

  premise: `<p><strong>監査カラム（Audit Columns）</strong>は、データがいつ・誰によって作成・更新されたかを記録するための標準的な列セットです。セキュリティ要件・デバッグ・データ分析・監査証跡のために実務ほぼ全てのテーブルに設けます。</p>
<div class="callout ok"><strong>典型的な監査カラムセット：</strong><br>
・<code>created_at TIMESTAMPTZ</code> → 行が作成された日時（一度セットされたら変わらない）<br>
・<code>updated_at TIMESTAMPTZ</code> → 行が最後に更新された日時（UPDATE のたびに自動更新）<br>
・<code>created_by BIGINT</code> → 行を作成したユーザーID<br>
・<code>updated_by BIGINT</code> → 行を最後に更新したユーザーID</div>
<p><em>updated_at の自動更新</em>は、アプリ側で毎回セットする方法と、PostgreSQLの<strong>TRIGGER（トリガー）</strong>で自動化する方法があります。トリガーを使うとアプリ側の実装漏れを根本的に防げます。</p>`,
  question: `<p>商品テーブルに監査カラムを追加し、<em>updated_atを自動更新するTRIGGERを作成</em>してください。また、「今週更新された商品一覧」と「最も最近更新した商品とその更新者」を取得するクエリも書いてください。</p>

    <tr><td>updated_at</td><td>TIMESTAMPTZ NOT NULL</td><td>INSERT/UPDATE時に現在時刻を自動セット</td></tr>
    <tr><td>created_by</td><td>BIGINT（usersを参照）</td><td>INSERTで指定</td></tr>
    <tr><td>updated_by</td><td>BIGINT（usersを参照）</td><td>UPDATE時にアプリが指定</td></tr>
  </table></div>
</div>`,

<tr><th>product_name</th><th>updated_at</th><th>updater_name</th></tr>

<tr class="tr-hi2"><td>ワイヤレスイヤホン</td><td class="tc-g">2024-12-15 09:15:00</td><td class="tc-g">鈴木花子（管理者）</td></tr>
</table></div>`,
  answer: `<pre><span class="cmt">-- ① 商品テーブル（監査カラム付き）</span>
<span class="kw">CREATE TABLE</span> <span class="tbl">products</span> (
    product_id   <span class="fn">BIGSERIAL</span>    <span class="kw">PRIMARY KEY</span>,
    name         <span class="fn">VARCHAR</span>(<span class="num">200</span>) <span class="kw">NOT NULL</span>,
    price        <span class="fn">NUMERIC</span>(<span class="num">10</span>,<span class="num">0</span>) <span class="kw">NOT NULL</span>,

    <span class="cmt">-- 監査カラム：いつ作成・更新されたか</span>
    created_at   <span class="fn">TIMESTAMPTZ</span>  <span class="kw">NOT NULL</span>
                 <span class="kw">DEFAULT</span> <span class="fn">NOW</span>(),              <span class="cmt">-- 【超基礎】INSERT時に現在時刻を自動セット</span>
    updated_at   <span class="fn">TIMESTAMPTZ</span>  <span class="kw">NOT NULL</span>
                 <span class="kw">DEFAULT</span> <span class="fn">NOW</span>(),              <span class="cmt">-- 初回はcreated_atと同値。UPDATEで自動更新（トリガーで実現）</span>

    <span class="cmt">-- 監査カラム：誰が作成・更新したか</span>
    created_by   <span class="fn">BIGINT</span>                     <span class="cmt">-- 作成者のuser_id（NULL可：システム自動作成の場合）</span>
                 <span class="kw">REFERENCES</span> <span class="tbl">users</span>(user_id)
                 <span class="kw">ON DELETE SET NULL</span>,
    updated_by   <span class="fn">BIGINT</span>                     <span class="cmt">-- 最終更新者のuser_id</span>
                 <span class="kw">REFERENCES</span> <span class="tbl">users</span>(user_id)
                 <span class="kw">ON DELETE SET NULL</span>
);

<span class="cmt">-- ② updated_at を自動更新するトリガー関数を作成</span>
<span class="kw">CREATE OR REPLACE FUNCTION</span> <span class="fn">set_updated_at</span>()  <span class="cmt">-- 【超基礎】FUNCTION: 再利用可能な処理のまとめ</span>
<span class="kw">RETURNS</span> TRIGGER                               <span class="cmt">-- 【超基礎】TRIGGER用の特殊な戻り値型</span>
<span class="kw">LANGUAGE</span> plpgsql                              <span class="cmt">-- PostgreSQLの手続き型言語（PL/pgSQL）を使う</span>
<span class="kw">AS</span> $$                                         <span class="cmt">-- $$ で囲まれた部分が関数の本体</span>
<span class="kw">BEGIN</span>
    NEW.updated_at <span class="op">:=</span> <span class="fn">NOW</span>();              <span class="cmt">-- 【超基礎】NEW = 更新後の行データ。updated_atに現在時刻をセット</span>
    <span class="kw">RETURN</span> NEW;                           <span class="cmt">-- 【超基礎】RETURN NEW = 変更した行データを返す</span>
<span class="kw">END</span>;
$$;

<span class="cmt">-- ③ トリガーをproductsテーブルのUPDATEに紐付ける</span>
<span class="kw">CREATE TRIGGER</span> trg_products_updated_at      <span class="cmt">-- トリガー名（慣習: trg_テーブル名_役割）</span>
    <span class="kw">BEFORE UPDATE ON</span> <span class="tbl">products</span>             <span class="cmt">-- 【超基礎】BEFORE UPDATE = UPDATE実行の直前に発動</span>
    <span class="kw">FOR EACH ROW</span>                          <span class="cmt">-- 【超基礎】更新された各行に対して発動</span>
    <span class="kw">EXECUTE FUNCTION</span> <span class="fn">set_updated_at</span>();   <span class="cmt">-- 上で定義したFUNCTIONを呼び出す</span>
<span class="cmt">-- これ以降、productsテーブルへのUPDATEは自動的にupdated_atが更新される</span>

<span class="cmt">-- ④ 今週更新された商品一覧</span>
<span class="kw">SELECT</span>
    product_id,
    name,
    price,
    updated_at
<span class="kw">FROM</span>   <span class="tbl">products</span>
<span class="kw">WHERE</span>  updated_at <span class="op">&gt;=</span> <span class="fn">DATE_TRUNC</span>(<span class="str">'week'</span>, <span class="fn">NOW</span>())  <span class="cmt">-- 【超基礎】DATE_TRUNC('week', NOW()) = 今週の月曜0時</span>
<span class="kw">ORDER BY</span> updated_at <span class="kw">DESC</span>;

<span class="cmt">-- ⑤ 最も最近更新した商品とその更新者（JOINで更新者名を取得）</span>
<span class="kw">SELECT</span>
    p.name          <span class="kw">AS</span> product_name,
    p.updated_at,
    u.name          <span class="kw">AS</span> updater_name       <span class="cmt">-- 更新者の名前（usersをJOINして取得）</span>
<span class="kw">FROM</span>      <span class="tbl">products</span> p
<span class="kw">LEFT JOIN</span> <span class="tbl">users</span>    u <span class="kw">ON</span> u.user_id <span class="op">=</span> p.updated_by  <span class="cmt">-- updated_byでusersを結合（NULLの場合もある）</span>
<span class="kw">ORDER BY</span>  p.updated_at <span class="kw">DESC</span>
<span class="kw">LIMIT</span>     <span class="num">10</span>;                               <span class="cmt">-- 最新10件だけ取得</span>

<span class="cmt">/*
  実行順序（TRIGGERの動作）:
  1. アプリが UPDATE products SET price = 3000 WHERE product_id = 1 を送信
  2. DBがBEFORE UPDATEトリガーを検知
  3. set_updated_at() 関数が実行される

  4. LIMIT 10                     → 先頭10件で打ち切り（早期終了）
  5. SELECT p.name, u.name, ...   → 列を返す
*/</span></pre>`,

  explain: `
<div class="insight-box">
<div class="insight-title">💡 LEARNING POINTS</div>
<div class="insight-row"><span class="insight-icon">🔰</span><div class="insight-body"><strong>超基礎：</strong>監査カラム（created_at, updated_at, created_by, updated_by）はほぼ全てのテーブルに追加するべき標準的な設計パターンです。「いつ・誰が作ったか・更新したか」が記録されていないテーブルは、トラブル調査やデータ分析で大きな障害になります。</div></div>
<div class="insight-row"><span class="insight-icon">🎯</span><div class="insight-body"><strong>TRIGGERの使いどころ：</strong>TRIGGERは「特定のDML（INSERT/UPDATE/DELETE）の前後に自動実行される処理」です。updated_at の自動更新のように「どのアプリから更新されても必ず実行したい処理」に適しています。アプリ側に実装するとサービス間・バッチ処理間で実装漏れが起きますが、TRIGGERはDB側で保証されます。</div></div>
<div class="insight-row"><span class="insight-icon">🔑</span><div class="insight-body"><strong>DATE_TRUNC 関数：</strong><code>DATE_TRUNC('week', NOW())</code>は「今週の月曜日の00:00:00」を返します。<code>DATE_TRUNC('month', NOW())</code>なら月初、<code>DATE_TRUNC('day', NOW())</code>なら今日の00:00:00です。期間での絞り込みに頻繁に使う重要な関数です。</div></div>
</div>
<div class="anti-box">
<div class="anti-title">⚠️ ANTI-PATTERNS</div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>updated_at をアプリ側だけで管理する：</strong>複数のサービス・バッチジョブがDBに書き込む場合、どこかで updated_at = NOW() の指定を忘れると古い日時のまま更新されます。TRIGGERで DB 側に持たせるか、少なくとも DEFAULT と NOT NULL でアプリ側の漏れを検知できるようにしましょう。</div></div>
<div class="anti-row"><span class="insight-icon">❌</span><div class="anti-body"><strong>created_at を TIMESTAMP（TZなし）で作成する：</strong>監査目的では「正確にいつ」が重要です。タイムゾーンなしのTIMESTAMPでは「これはJSTかUTCか」が曖昧になります。監査カラムには必ずTIMESTAMPTZを使いましょう。</div></div>
</div>
<div class="column-box">
<div class="column-title">☕ 実務コラム：監査テーブル（変更履歴）への発展</div>
<div class="column-body">
更新前の値も保存したい場合は、TRIGGERを使って<strong>変更履歴テーブル（audit_log）に変更前の行を丸ごとINSERT</strong>する設計があります。<code>OLD</code>（更新前の行）と <code>NEW</code>（更新後の行）をTRIGGER内で参照できるため、<code>INSERT INTO product_audit_log SELECT OLD.*, NOW() AS changed_at, 'UPDATE' AS operation</code>のような履歴保存が可能です。金融・医療・コンプライアンス要件のあるシステムでは、この変更履歴テーブルが監査証跡として必須になるケースがあります。
</div>
</div>
`

/* ========================================================
   ユーティリティ関数
======================================================== */

/**
 * アコーディオンのHTML文字列を生成する
 * @param {string} icon     - アイコン絵文字
 * @param {string} pillCls  - ピルのCSSクラス
 * @param {string} pillTxt  - ピルのテキスト
 * @param {string} title    - アコーディオンのタイトル
 * @param {string} content  - 本文HTML
 */
function acc(icon, pillCls, pillTxt, title, content) {
  return `<div class="acc closed">
    <div class="acc-head" onclick="this.parentElement.classList.toggle('closed')">
      <span class="acc-icon">${icon}</span>
      <span class="acc-title">${title}</span>
      <span class="acc-pill ${pillCls}">${pillTxt}</span>
      <span class="acc-chevron">▼</span>
    </div>
    <div class="acc-body">${content}</div>
  </div>`;
}

/**
 * タグのHTML文字列を生成する
 * @param {Array} tags - [[色コード, テキスト], ...] の配列
 */
function tagHTML(tags) {
  const cls = { r: 'tag-r', g: 'tag-g', o: 'tag-o', p: 'tag-p' };
  return tags.map(([c, t]) => `<span class="q-tag ${cls[c] || 'tag-r'}">${t}</span>`).join('');
}

/**
 * 全パネルとタブを生成してDOMに挿入する
 */
function buildAll() {
  // タブ行を生成
  document.getElementById('tabRow').innerHTML = QS.map((q, i) =>
    `<button class="tab-btn" onclick="go(${i})">
       <span class="tab-num">Q${q.num}</span>${q.title.split('—')[0].trim()}
     </button>`
  ).join('');

  // 各問題パネルを生成
  document.getElementById('mainContent').innerHTML = QS.map((q, i) => `
    <div class="panel" id="panel${i}">
      <div class="q-header">
        <div class="q-number">QUESTION ${q.num} / ${QS.length}</div>
        <div class="q-title">${q.title}</div>
        <div class="q-tags">${tagHTML(q.tags)}</div>
      </div>
      ${acc('📘', 'pill-blue',   '前提', '前提知識',               q.premise)}
      ${acc('❓', 'pill-green',  '問題', '問題',                   q.question)}
      ${acc('📊', 'pill-orange', '出力', '期待出力',               q.output)}
      ${acc('✅', 'pill-red',    '解答', '模範解答コード',         q.answer)}
      ${acc('🔍', 'pill-purple', '解説', '解説（テーブル変化・ポイント）',
        (Array.isArray(q.viz)
          ? q.viz.map((_, vIdx) => `<div class="sql-viz-wrapper" id="viz-${i}-${vIdx}" tabindex="-1" style="margin-bottom: 24px;"></div>`).join('')
          : q.viz ? `<div class="sql-viz-wrapper" id="viz-${i}" tabindex="-1"></div>` : ''
        ) + q.explain)}
      <div class="nav-bar">
        <button class="nav-btn" onclick="go(${i - 1})" ${i === 0 ? 'disabled' : ''}>← 前の問題</button>
        <div class="nav-info">${i + 1} / ${QS.length}<br><span style="font-size:10px;opacity:.5">タップで切替</span></div>
        <button class="nav-btn" onclick="go(${i + 1})" ${i === QS.length - 1 ? 'disabled' : ''}>次の問題 →</button>
      </div>
    </div>
  `).join('');

  QS.forEach((q, i) => {
    if (q.viz) {
      if (Array.isArray(q.viz)) {
        q.viz.forEach((v, vIdx) => initVisualizer(document.getElementById(`viz-${i}-${vIdx}`), v));
      } else {
        initVisualizer(document.getElementById('viz-' + i), q.viz);
      }
    }
  });

  go(0); // 最初の問題を表示
}

/**
 * 指定インデックスの問題に切り替える
 * @param {number} i - 問題インデックス（0始まり）
 */
function go(i) {
  if (i < 0 || i >= QS.length) return;

  // パネルの表示切り替え
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('active', j === i));

  // タブのアクティブ切り替え
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));

  // アクティブなタブをスクロールして表示
  const activeTab = document.getElementById('tabRow').children[i];
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  // プログレスバーを更新
  document.getElementById('progFill').style.width = ((i + 1) / QS.length * 100) + '%';

  // ページトップにスクロール
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ページ読み込み時に全コンテンツを生成
buildAll();

document.addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const wrap = document.activeElement && document.activeElement.closest('.sql-viz-wrapper');
  if (!wrap || !wrap.__viz) return;
  e.preventDefault();
  (e.key === 'ArrowRight' ? wrap.__viz.next : wrap.__viz.prev)();
});

let wasMobile = window.innerWidth <= 640;
document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !wasMobile);
window.addEventListener('resize', () => {
  const isMobile = window.innerWidth <= 640;
  if (wasMobile !== isMobile) {
    wasMobile = isMobile;
    document.querySelectorAll('.sv-mobile-collapse').forEach(el => el.open = !isMobile);
  }
});
</script>
